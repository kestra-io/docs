    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body.paused * {
      animation-play-state: paused !important;
    }

    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "JetBrains Mono", monospace;
    }

    .flow {
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: matrix(0.978148, 0.207912, -0.669131, 0.743145, 30, 0)
    }

    .card {
      width: 360px;
      height: 58px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.015);
      opacity: 0;
      transform: translateY(-12px);
      will-change: opacity, transform, border-color, box-shadow
    }

    .card.trigger {
      background: rgba(8, 233, 149, 0.025)
    }

    .badge {
      position: absolute;
      top: -9px;
      left: 14px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #08E995;
      background: #0a0a0c;
      padding: 1px 8px;
      border-radius: 6px;
      border: 1px solid rgba(8, 233, 149, 0.2);
      opacity: 0;
      will-change: opacity
    }

    .icn {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden
    }

    .icn svg {
      width: 22px;
      height: 22px
    }

    .lbl {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.01em;
      will-change: color
    }

    .rt {
      display: flex;
      align-items: center;
      min-width: 20px
    }

    .blt,
    .chk {
      opacity: 0;
      will-change: opacity, transform
    }

    .blt svg {
      width: 15px;
      height: 15px
    }

    .chk svg {
      width: 18px;
      height: 18px
    }

    .chk .cp {
      stroke-dasharray: 20;
      stroke-dashoffset: 20
    }

    .cn {
      height: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      opacity: 0;
      position: relative;
      will-change: opacity
    }

    .dt {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      will-change: background, transform
    }

    .pt {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #9041FF;
      box-shadow: 0 0 6px rgba(144, 65, 255, 0.3);
      opacity: 0;
      top: 0;
      will-change: top, opacity

    .c0 {
      animation: c0a 10s ease infinite
    }

    @keyframes c0a {

      0%,
      2% {
        opacity: 0;
        transform: translateY(-12px)
      }

      5% {
        opacity: 0.4;
        transform: translateY(0);
        border-color: rgba(255, 255, 255, 0.08)
      }

      9%,
      76% {

        transform: translateY(0);
        border-color: #08E995;
        box-shadow: 0 0 16px rgba(8, 233, 149, 0.08), inset 0 0 8px rgba(8, 233, 149, 0.02)

      88%,
      100% {
        opacity: 0;
        transform: translateY(0);
        box-shadow: none
      }
    }
