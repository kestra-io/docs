name: Visual Regression

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: Update Linux visual snapshots and commit them to the current branch
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-check:
    name: Visual Check (Linux)
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && !inputs.update_snapshots) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run visual tests
        run: npm run test:visual

      - name: Upload Playwright artifacts
        id: upload-artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Upsert sticky PR comment on failure
        if: ${{ failure() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.upload-artifacts.outputs.artifact-url }}
        with:
          script: |
            const artifactUrl = process.env.ARTIFACT_URL;
            const marker = "<!-- visual-regression-report -->";
            const workflowUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/workflows/visual-regression.yml`;
            const body = [
              marker,
              "## Visual Changes Detected",
              "",
              "Make sure changes are expected and review the Playwright report for details.",
              "",
              artifactUrl
                ? `Playwright report artifact: ${artifactUrl}`
                : "Open this workflow run and download the visual-regression-report artifact from the Artifacts section.",
              "",
              "To accept the updated visuals, click Accept, select the PR branch, set `update_snapshots=true`, and run the workflow.",
              "",
              `[Accept](${workflowUrl})`,
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Remove sticky PR comment on success
        if: ${{ success() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- visual-regression-report -->";
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (!existing) {
              return;
            }

            await github.rest.issues.deleteComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
            });

  update-linux-snapshots:
    name: Update Linux Snapshots
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_snapshots }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Regenerate Linux snapshots
        run: npm run test:visual:update

      - name: Upload Linux snapshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots-linux
          path: tests/visual-regression.spec.ts-snapshots/
          retention-days: 14

      - name: Commit updated Linux snapshots
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if git diff --quiet -- tests/visual-regression.spec.ts-snapshots; then
            echo "No Linux snapshot changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/visual-regression.spec.ts-snapshots
          git commit -m "test(visual): refresh linux snapshots"
          git push origin "HEAD:${BRANCH_NAME}"
