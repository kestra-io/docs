<svg width="120" height="36" viewBox="0 0 240 72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Jenkins butler head -->
  <g>
    <!-- bowl haircut (top) -->
    <path d="M30 14 Q30 4 40 4 Q50 4 50 14 L50 24 L30 24 Z" fill="#231F20"/>
    <!-- face -->
    <ellipse cx="40" cy="32" rx="13" ry="14" fill="#F5C8A6"/>
    <!-- ears -->
    <ellipse cx="27" cy="32" rx="2.5" ry="3" fill="#F5C8A6"/>
    <ellipse cx="53" cy="32" rx="2.5" ry="3" fill="#F5C8A6"/>
    <!-- eyes -->
    <circle cx="36" cy="30" r="1.4" fill="#231F20"/>
    <circle cx="44" cy="30" r="1.4" fill="#231F20"/>
    <!-- mustache -->
    <path d="M34 38 Q40 42 46 38 Q46 40 40 40 Q34 40 34 38 Z" fill="#231F20"/>
    <!-- collar/shirt -->
    <path d="M24 50 L40 46 L56 50 L56 68 L24 68 Z" fill="#FFFFFF"/>
    <path d="M24 50 L40 46 L56 50 L52 56 L40 52 L28 56 Z" fill="#FFFFFF" stroke="#231F20" stroke-width="0.6"/>
    <!-- bow tie -->
    <path d="M33 53 L40 56 L33 59 Z" fill="#D33833"/>
    <path d="M47 53 L40 56 L47 59 Z" fill="#D33833"/>
    <rect x="38.5" y="54" width="3" height="4" fill="#D33833"/>
  </g>
  <!-- Wordmark -->
  <g fill="#231F20" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="26">
    <text x="72" y="46">Jenkins</text>
  </g>
</svg>
