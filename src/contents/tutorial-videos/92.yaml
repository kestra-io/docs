title: "Make Your Kestra Flows Smarter with Dynamic Inputs | Kestra Tutorial 2026"
description: "In this Kestra tutorial, Developer Advocate Amara Graham shows you how to stop hardcoding values and make your flows truly reusable with inputs. You'll learn how to define inputs with an id, type, and optional defaults — critical for scheduled flows that run without manual intervention. Amara covers the most common input types (STRING, INT, BOOLEAN, and more) and walks through a practical example of parameterizing an API URL so it can be swapped at execution time without ever editing the flow itself. If you want to build flows that are flexible enough to run many ways from a single definition, this one's for you."
