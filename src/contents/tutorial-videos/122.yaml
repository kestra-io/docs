title: "Building and Maintaining Kestra's 1600+ Plugins"
description: "Kestra has over 1,600 plugins, and a small team builds and maintains all of them across dozens of third-party APIs, multiple Kestra versions, and a release cadence that doesn't slow down. Join François Delbrayelle and Will Russell for a live Q&A on how the plugin team uses AI to ship faster, where it shows up in the real workflow, where it falls short, and how they keep quality consistent at that scale."
