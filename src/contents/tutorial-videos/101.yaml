title: "Kestra Outputs: The Glue Between Your Tasks and Flows | Kestra Tutorial 2026"
description: "In this Kestra tutorial, Developer Advocate Amara Graham explains how outputs turn isolated tasks into a connected data pipeline. You'll learn how Kestra's internal storage works as a managed intermediary — eliminating the need to wire every tool directly to every other tool — and how to inspect, debug, and share task outputs from the Execution page. Amara then walks you through a practical multi-step pipeline: fetching data from an API, processing it in a Python + Polars Docker container, and querying the result with DuckDB using SQL — all chained together through outputs with no manual file transfers. By the end, you'll see how a few well-connected tasks can produce a fully auditable, shareable pipeline artifact."
