title: "Kestra 101: Learn the Basics of Your First Flow | Kestra Tutorial 2026"
description: "In this beginner-friendly Kestra tutorial, Developer Advocate Amara Graham covers everything you need to build your first flow. You'll learn the three required building blocks of every flow — id, namespace, and tasks — plus how to enrich them with labels and Markdown descriptions that render directly in the UI. Amara walks through how tasks work, how to discover available task types using the built-in editor, and how to run your first execution and read the results in the Gantt view. By the end, you'll have a working flow that hits a real API — and a solid foundation for everything that comes next."
