title: "AI Workflows in Production: Failure Modes and Fixes"
description: "Rafael Bartalotti rebuilt Víssimo's e-commerce integration stack and ran zero incidents through Black Friday, then his team added LLMs and found that the reliability contract breaks the moment one step is probabilistic. The failure modes are specific: non-deterministic outputs, variable latency, unbounded cost, silent partial execution. In this session, Rafael (Software Architect and Engineering Leader, Víssimo) and Will Russell (Lead Developer Advocate, Kestra) walk through how orchestration makes each one operationally safe, covering the four principles for reliable AI in production, how to build replay and audit by default, and what an orchestration platform needs to provide for AI workloads."
