title: "Beyond Sequential: Add Branching & Parallel Logic to Kestra Flows | Kestra Tutorial 2026"
description: "In this Kestra tutorial, Developer Advocate Amara Graham introduces Flowable Tasks — the special task type that controls not what your flow does, but how it moves. You'll learn four essential patterns: conditional branching with If, iterating over lists with ForEach, polling external systems with LoopUntil, and unlocking parallel execution by setting concurrencyLimit to 0. Amara walks through practical examples for each — from switching API endpoints based on user input, to processing multiple authors and file partitions simultaneously in isolated Docker containers. By the end, you'll have the tools to handle the full complexity of real-world pipelines, well beyond simple sequential task execution."
