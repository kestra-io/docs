title: "Tasks Runners Now GA 🎉"
description: "With the release of Kestra 0.18, Task Runners are now in general availability. We introduced task runners in Beta in Kestra 0.16.0, and since then, we've been improving their performance, stability, and usability. Thanks to the feedback from over 80 users and many enhancements and bug fixes, Task Runners are now generally available and ready for production use at scale."
