title: "Do Dev Containers make Open Source Contributions Easier?"
description: "Dev Containers is an extension of VSCode and GitHub Codespaces that allows you to use a container as your development environment, with the goal of making setting up a new project easier as all the dependencies you need are ready to go. Does this make it easier to get started contributing to new open source projects?"
