title: "Amazon Ion Explained: The Format Hiding Inside Your Kestra Workflows"
description: "Amazon Ion is a richly-typed superset of JSON that adds native timestamps
  and a compact binary encoding, serving as the internal data format for Kestra. This
  video explores the differences between Ion and JSON and demonstrates how the format
  works within Kestra's data pipelines."
