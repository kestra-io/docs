featureGrid:
  title: "Kestra vs. HP Operations Orchestrator at a Glance"
  tableData:
    - feature: Workflow definition
      kestra: Declarative YAML (code-first, Git-native, CI/CD deployable)
      competitor: Graphical flow designer (proprietary Studio, XML-based, not Git-native)
    - feature: Architecture
      kestra: "Cloud-native microservices (Kubernetes, Docker, air-gap ready)"
      competitor: "Java application server + RAS agents (legacy enterprise architecture)"
    - feature: Integrations
      kestra: 1,200+ open plugins (cloud, ITSM, Ansible, Terraform, databases)
      competitor: Content packs (proprietary, version-locked, licensed separately)
    - feature: Version control
      kestra: "Native Git, CI/CD, Terraform provider"
      competitor: HP OO proprietary repository (no native Git workflow)
    - feature: Self-service Apps
      kestra: Built-in dynamic forms with API-backed fields and inline approvals
      competitor: Flow inputs and run configurations (basic, no dynamic field population)
    - feature: Execution model
      kestra: Kubernetes-native workers, horizontally scalable, Kafka queue
      competitor: RAS (Remote Action Server) agents on target systems
    - feature: Event-driven triggers
      kestra: Webhooks, schedules, file detection, message queues, polling
      competitor: Schedule-based or manual trigger (limited event-driven)
    - feature: Observability
      kestra: Full step-level logs, artifacts, audit trail, error surfacing
      competitor: Execution logs per flow run (limited step-level visibility)
    - feature: Licensing
      kestra: Flat instance + worker-based pricing (open-source core)
      competitor: Complex enterprise licensing (executions, content packs, HA)
    - feature: Cloud-native support
      kestra: Native Kubernetes deployment, auto-scaling, cloud APIs
      competitor: "Runs on VMs/containers but not designed for Kubernetes-native ops"
    - feature: Multi-tenancy
      kestra: Native namespace isolation with per-namespace RBAC
      competitor: Tenant separation via organization units and role configuration
    - feature: Open source
      kestra: Apache 2.0 (open-source core)
      competitor: Proprietary enterprise software (no open-source option)

