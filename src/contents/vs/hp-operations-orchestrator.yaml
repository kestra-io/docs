brandColor:
  color: "#0096d6"

intro:
  title: "Kestra vs. HP Operations Orchestrator: Modernize Legacy IT Automation"
  description: "HP Operations Orchestrator (now under OpenText after Micro Focus) is an enterprise runbook tool used in large organizations for decades. Kestra offers a modern alternative—declarative YAML, cloud-native architecture, self-service Apps, and Git-native governance—without the licensing complexity and maintenance overhead of HP OO."

philosophy:
  mainTitle: "Legacy Enterprise Runbooks vs. Modern Declarative Orchestration"
  kestra:
    title: "Cloud-Native Orchestration for Modern IT"
    description: "Define workflows as declarative YAML that lives in Git. Run Ansible, Terraform, PowerShell, and REST APIs as coordinated steps with conditions, retries, and data passing. Self-service Apps with dynamic forms and inline approvals replace rigid runbook catalogs. Every execution is logged, auditable, and reproducible."
    subCardText: '"How do I modernize IT automation without the complexity of legacy enterprise tools?"'
  competitor:
    title: "Legacy Java-Based Runbook Automation"
    description: "HP Operations Orchestrator (HP OO), now an OpenText product, is an enterprise IT automation tool featuring a proprietary, Java-based graphical designer. While historically feature-rich, it struggles with legacy drawbacks like complex installation, Java overhead, proprietary content packs, and expensive licensing."
    shadowColor: "#0096D6"
    subCardBg: "var(--ks-background-blue-light)"
    subCardText: '"How do I automate ITIL processes and runbooks with enterprise-grade reliability?"'

businessValue:
