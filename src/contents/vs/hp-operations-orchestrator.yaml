commonQuestions:
  - question: "What is HP Operations Orchestrator and how does it compare to Kestra?"
    answer: "HP Operations Orchestrator (HP OO) is an enterprise IT process automation platform originally developed by HP, acquired by Micro Focus, and now part of OpenText. It uses a proprietary graphical flow designer (HP OO Studio) to build runbook automation flows using operations from content packs. Kestra is a modern, open-source alternative: declarative YAML workflows that live in Git, 1,200+ open plugins, cloud-native architecture, and a built-in UI—without Java application servers, content pack licensing, or proprietary designer tools."
  - question: "How do I migrate from HP OO to Kestra?"
    answer: "Migration follows a systematic mapping process: HP OO operations become Kestra task types (e.g., ServiceNow operations become io.kestra.plugin.servicenow.* tasks, Ansible operations become io.kestra.plugin.ansible.* tasks, script steps become io.kestra.plugin.scripts.* tasks). HP OO flow inputs become Kestra workflow inputs. Flow logic (branches, loops, error handling) maps to Kestra's YAML constructs for conditions, parallel tasks, and error handling. The Kestra team provides migration guidance for teams moving from HP OO."
  - question: "Can Kestra replace HP OO for ServiceNow integration?"
    answer: "Yes. Kestra has native ServiceNow plugins for creating, reading, and updating records across all ServiceNow tables. You can trigger workflows from ServiceNow webhooks, execute automation based on ticket state, and write back evidence (logs, artifacts, resolution notes) to close tickets automatically. This covers the most common HP OO use case: ITSM-driven runbook automation."
  - question: "How does Kestra handle the RAS (Remote Action Server) agent model?"
    answer: "Kestra uses worker groups as the equivalent of RAS agents. Workers are lightweight processes deployed close to execution targets—on-premises servers, OT networks, or isolated environments. Workers pick up tasks from a central queue, execute them locally, and report results back. Multiple worker groups can serve different network segments or execution environments without direct connectivity between targets and the Kestra control plane."
  - question: "Is Kestra suitable for ITIL-based process automation like HP OO?"
    answer: "Yes. Kestra handles all major ITIL process categories: incident management (event-triggered remediation), change management (approval workflows with audit trails), service requests (self-service Apps with forms), and problem management (scheduled runbooks with evidence logging). The YAML-first, Git-native model means every automated ITIL process is documented, versioned, and auditable by design."
  - question: "What is the licensing difference between HP OO and Kestra?"
    answer: "HP OO uses complex enterprise licensing tied to execution volume, content packs, and HA configuration—making cost predictability difficult as automation scales. Kestra's open-source core (Apache 2.0) is free for any use. The Kestra Enterprise Edition uses flat instance and worker-based pricing that aligns with infrastructure costs rather than execution volume. This makes Kestra significantly more cost-predictable as automation scales."
