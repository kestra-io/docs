    bulletColor: "#0096D6"
  footerText: "HP Operations Orchestrator served enterprises well for ITIL-era runbook automation, but the world has moved toward declarative, Git-native, cloud-agnostic automation. Organizations running HP OO today face high maintenance costs, Java dependency management, proprietary content packs, and difficulty integrating with modern DevOps toolchains. Kestra provides a migration path that keeps operational runbooks and ITSM integration while eliminating the legacy complexity."

setupSpeed:
  title: "Time to First Automated Workflow"
  subtitle: "Kestra runs in minutes on any infrastructure with a single Docker Compose command. HP Operations Orchestrator requires a Java application server, a database, deployment of the Central component, and configuration of content packs before running a single flow."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download Docker Compose, run it, open the UI, pick a Blueprint, and run your first IT automation workflow. YAML-defined, Git-ready from minute one. No Java application server, no content pack deployment."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick an IT Automation Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: Days
      two: to weeks
    description: "HP OO requires deploying the Central component on a Java application server, configuring an enterprise database, deploying content packs for integrations, and configuring LDAP/SSO. A production HA setup with clustered Central servers, load balancers, and failover databases takes days and typically requires professional services."
    shadowColor: "#0096D6"
    command: |
      # HP Operations Orchestrator installation:
      # 1. Install Java 11+ application server
      # 2. Configure enterprise DB (Oracle, MSSQL, PostgreSQL)
      # 3. Deploy HP OO Central WAR/installer
      # 4. Configure LDAP/SAML for SSO
      # 5. Deploy and activate content packs for each integration
      # 6. Configure RAS (Remote Action Server) agents
      #    on each execution target
      # Typical time: 2-5 days for dev, weeks for production HA
    lang: sh

easeOfUse:
  title: "Readable YAML vs. Proprietary Graphical Flow Designer"
  kestra:
    title: "Kestra: YAML Workflows Anyone Can Review"
    description: "Write orchestration logic in YAML that reads like documentation. The <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> helps draft workflows. Every flow is a file in Git—reviewable in pull requests, testable in CI/CD, and deployable via Terraform or GitOps. No proprietary designer required."
    code: |
      id: incident_remediation
      namespace: ops.itsm

      triggers:
        - id: servicenow_alert
          type: io.kestra.plugin.core.trigger.Webhook
          key: "{{ secret('WEBHOOK_KEY') }}"

      tasks:
        - id: diagnose
          type: io.kestra.plugin.scripts.python.Script
          script: |
            import json
            incident = json.loads('{{ trigger.body }}')
            # Run diagnostics based on incident type

        - id: auto_remediate
          type: io.kestra.plugin.ansible.cli.AnsibleCLI
          commands:
            - ansible-playbook remediate.yml
              -e "host={{ trigger.body.affected_ci }}"

        - id: validate
          type: io.kestra.plugin.scripts.shell.Commands
          commands:
            - ./health_check.sh "{{ trigger.body.affected_ci }}"

        - id: close_incident
          type: io.kestra.plugin.servicenow.table.Update
          table: incident
          id: "{{ trigger.body.sys_id }}"
          data:
            state: resolved
            close_notes: "Auto-remediated by Kestra"
    lang: yaml
  competitor:
    title: "HP OO: Graphical flow designer with proprietary operations"
    description: "HP OO flows are built in the proprietary Studio designer using drag-and-drop operation nodes from content packs. Flows are stored in a proprietary repository (not Git-native), versioned through HP OO's own system, and deployed via content packs. Integrating with modern APIs requires custom operations or content pack development."
    shadowColor: "#0096D6"
    code: |
      <!-- HP OO flow (XML stored in proprietary repository) -->
      <!-- Authored in HP OO Studio graphical designer -->
      <flow>
        <name>Incident Remediation</name>
        <steps>
          <step name="Get Incident Data">
            <operation ref="ServiceNow/GetRecord"/>
            <!-- Proprietary operation from content pack -->
          </step>
          <step name="Run Remediation">
            <operation ref="Ansible/RunPlaybook"/>
            <!-- Requires HP OO Ansible content pack -->
          </step>
          <step name="Update Ticket">
            <operation ref="ServiceNow/UpdateRecord"/>
          </step>
        </steps>
        <!-- No Git versioning; stored in HP OO repository -->
        <!-- Changes require Studio designer + deployment -->
      </flow>
    lang: xml

