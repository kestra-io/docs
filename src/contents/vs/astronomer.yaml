platformStrengths:
  title: Kestra Is Built for Teams Who Ship More Than Data Pipelines
  features:
    - title: No Python lock-in
      description: "Bring your Python scripts, SQL queries, Shell commands, and R notebooks. Kestra orchestrates all of them in YAML without wrapping anything in decorators or operators. Engineers write code in the language that fits the task, not the language the orchestrator demands."
    - title: Event-driven from the start
      description: "Native triggers for S3 file arrivals, Kafka messages, webhooks, database changes, and API callbacks. Kestra was built event-driven from day one, and unlimited event-driven workflows are available in the open-source version without additional configuration."
    - title: Orchestrate beyond data pipelines
      description: "Data pipelines, infrastructure provisioning, and business process automation run from one control plane. When your data team needs to trigger an infrastructure job or a business process after a pipeline completes, it's a native YAML trigger, not a workaround."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "Your team writes Python, SQL, Bash, and dbt, and you want orchestration that doesn't force everyone into Python."
      - "You need event-driven workflows that respond to real-time events, not just cron schedules."
      - "You want to orchestrate data, infrastructure, and business processes from one platform without adding more tools."
      - "Non-engineers need to trigger or monitor workflows without writing code."
      - "You want an open-source core you can run on your own infrastructure without a SaaS dependency."
  competitor:
    title: Choose Astronomer When
    list:
      - "Your team is deeply invested in Apache Airflow: custom operators, trained staff, and existing DAG libraries."
      - "You want managed Airflow infrastructure without running it yourself, and you're willing to pay the SaaS premium."
      - "Python-native data pipeline authoring is the right model for your data engineering team."
      - "Enterprise compliance requirements (SOC2, HIPAA, SSO) are non-negotiable and you need them out-of-the-box."
    shadowColor: "#C8D6FF"
    bulletColor: "#5B74F7"

commonQuestions:
  - question: How do I migrate from Astronomer/Airflow to Kestra?
    answer: "Kestra doesn't require you to refactor your business logic. Extract your Python logic from Airflow DAG files and run it directly as a Script task in Kestra. Your SQL queries, Shell scripts, and Python code work as-is. Define orchestration flow in YAML. Most teams migrate incrementally, running both platforms in parallel using Kestra's HTTP trigger to bridge them during transition. For a detailed breakdown of both upgrade and migration paths, see our <a href='/resources/airflow-2-eol-whitepaper'>Airflow 2 EOL guide</a>."
  - question: Does Kestra offer the same enterprise features as Astronomer?
    answer: "Yes. Kestra Enterprise includes RBAC with namespace isolation, SSO/SAML, audit logs for every execution, secrets management integrations (AWS Secrets Manager, HashiCorp Vault, Azure Key Vault), and SOC2 Type II compliance. The difference is that Kestra runs on your own infrastructure (your cloud or on-prem), rather than requiring Astronomer's SaaS platform."
  - question: Astronomer manages Airflow infrastructure for me. What does Kestra offer?
    answer: "Kestra Cloud is a fully managed version of Kestra for teams who want the same hands-off infrastructure experience. For teams that prefer self-hosted, the open-source version runs on Docker Compose or Kubernetes in under 5 minutes. You're not dependent on a SaaS vendor for production uptime."
  - question: Does Kestra support the same data pipeline use cases as Airflow on Astronomer?
    answer: "Yes. Kestra orchestrates ETL and ELT pipelines, dbt models, data quality checks, warehouse operations, and file transfers. With 1400+ plugins, it covers the same AWS, GCP, Azure, Snowflake, BigQuery, Databricks, Kafka, and data tool integrations as Airflow's provider ecosystem, defined in declarative YAML instead of Python operator classes."
  - question: What about Astronomer's observability and lineage features?
    answer: "Kestra provides built-in execution logs, real-time metrics, Gantt charts, and distributed tracing for every workflow. For data lineage, Kestra integrates with OpenLineage and your existing data catalog. Astronomer's pipeline lineage and SLA monitoring are purpose-built Airflow features; Kestra's observability is workflow-level and spans all task types, not just data pipelines."
  - question: Can Kestra and Astronomer run in parallel during migration?
    answer: "Yes. Teams commonly run both platforms during transition. Kestra can trigger Airflow DAGs via Astronomer's REST API, letting you migrate incrementally without a hard cutover. Start new workflows in Kestra, migrate existing pipelines on your timeline, and keep Astronomer running until you're confident in the switch."
