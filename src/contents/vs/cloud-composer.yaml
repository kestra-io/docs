    bulletColor: "#4285F4"

commonQuestions:
  - question: How do I migrate from Cloud Composer to Kestra?
    answer: "Kestra doesn't require you to refactor your business logic. Extract Python code from your Airflow DAG files and run it directly as a Script task in Kestra. SQL queries and Shell commands work as-is. Define orchestration in YAML. Most teams migrate incrementally, running both platforms in parallel: Kestra's HTTP trigger can call remaining Composer DAGs during transition so there's no hard cutover. For a detailed breakdown of both upgrade and migration paths, see our <a href='/resources/airflow-2-eol-whitepaper'>Airflow 2 EOL guide</a>."
  - question: Does Kestra integrate with GCP services?
    answer: "Yes. Kestra has native plugins for BigQuery, Cloud Storage, Pub/Sub, Cloud Run, Dataflow, Firestore, and more. The GCS trigger lets Kestra react to file arrivals natively without polling. GCP credentials are managed through Kestra's secrets management, and Kestra deployments on GCP typically run on GKE using the same IAM service account patterns your team already uses."
  - question: Cloud Composer handles Airflow upgrades for me. What does Kestra offer?
    answer: "Kestra upgrades run on your schedule: pull a new image, test in staging, and ship when your team is ready. There's no waiting for GCP to certify a version or schedule a maintenance window. Cloud Composer controls the upgrade cadence and typically lags the open-source Airflow release, including Airflow 3 support, by several months."
  - question: Does Kestra support the same data pipeline use cases as Cloud Composer?
    answer: "Yes. Kestra orchestrates ETL and ELT pipelines, dbt models, data quality checks, warehouse operations, and file transfers. With 1200+ plugins, it covers the same GCP integrations available through Airflow providers: BigQuery, GCS, Pub/Sub, Dataflow, and more. The difference is YAML task definitions instead of Python operator classes."
  - question: Can Kestra and Cloud Composer run in parallel during migration?
    answer: "Yes. Teams commonly run both during transition. Kestra can trigger Composer DAGs via the Airflow REST API, so you migrate incrementally: start new workflows in Kestra, move existing pipelines on your own timeline, and keep Composer running until you're confident in the switch."
  - question: How does Kestra handle multi-tenancy compared to Cloud Composer?
    answer: "Kestra uses namespace isolation out-of-the-box. Teams, projects, and environments get separate namespaces with scoped RBAC, secrets, and execution history. Cloud Composer's access model is IAM-based; strong team isolation typically requires separate Composer environments, each with its own GKE cluster and cost. Kestra handles this within a single deployment."
