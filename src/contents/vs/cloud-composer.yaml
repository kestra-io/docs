title: "Kestra vs. Google Cloud Composer: Orchestrate Beyond Managed Airflow"
description: "Compare Kestra vs Google Cloud Composer: YAML-first universal orchestration vs managed Apache Airflow on GCP. See setup complexity, cloud dependency, and what changes when Python DAGs aren't the only option."
competitorName: Cloud Composer
category: Data Orchestration
shortDescription: "GCP-managed Apache Airflow vs. open-source, multi-cloud YAML orchestration without vendor lock-in."

brandColor:
  color: "#4285F4"

intro:
  title: "Kestra vs. Google Cloud Composer: Orchestrate Beyond Managed Airflow"
  description: "Cloud Composer gives GCP-native teams managed Apache Airflow without running the infrastructure themselves. Kestra takes a different approach: declarative YAML orchestration that runs on any cloud, in any language, covering data pipelines, infrastructure automation, and business processes, without a 25-minute environment provisioning step before your first workflow runs."

philosophy:
  mainTitle: Two Ways to Think About Managed Orchestration
  kestra:
    title: "Universal Orchestration: Any Cloud, Any Language"
    description: "Declarative YAML orchestration with no cloud dependency baked into the architecture. Workflows describe what should run, not which managed services to wire together first. Python, SQL, Bash, R, and Go tasks run in isolated containers alongside GCP-native tasks, on any cloud or on-prem."
    subCardText: '"How do we orchestrate data, infrastructure, and business workflows without being pinned to one cloud provider?"'
  competitor:
    title: Managed Apache Airflow on GCP
    description: "Apache Airflow, fully managed on Google Kubernetes Engine. Cloud Composer handles Airflow upgrades, GKE cluster management, and Cloud SQL provisioning. DAGs are stored in Cloud Storage, and GCP IAM controls access. The GCP integration runs deep: BigQuery, Dataflow, Cloud Run, and Pub/Sub are first-class targets, and Python is the only way to author them."
    shadowColor: "#C6DAFC"
    subCardBg: "var(--ks-background-blue-light)"
    subCardText: '"How do we run Airflow on GCP without managing GKE clusters and Cloud SQL ourselves?"'

businessValue:
  mainTitle: "GCP-Bound Pipeline Scheduling vs. Cloud-Agnostic Workflow Orchestration"
  kestra:
    title: Universal Workflows, Any Cloud
    list:
      - "Data pipelines, infrastructure automation, business processes, AI workflows"
      - "Multi-language: Python, SQL, Bash, Go, Node.js, R"
      - "Event-driven at core: respond to Pub/Sub, S3, webhooks, database changes"
      - "Self-service for non-engineers via Kestra Apps"
      - "Runs on GCP, AWS, Azure, on-prem, or your laptop"
  competitor:
    title: Managed Airflow Inside GCP
    list:
      - "Apache Airflow on GKE, managed by Google"
      - "Python DAGs stored in Cloud Storage"
      - "Deep GCP integration: BigQuery, Dataflow, Cloud Run, Pub/Sub"
      - "Data engineering scope"
      - "GCP-only deployment"
    shadowColor: "#C6DAFC"
    bulletColor: "#4285F4"
  footerText: "Cloud Composer is a strong choice if your team is invested in Airflow and your data stack is primarily GCP. Kestra is the right choice if you need multi-language teams contributing without Python DAGs, orchestration that spans cloud providers, or a setup path that doesn't require a GKE cluster before your first workflow runs."

setupSpeed:
  title: Time to First Workflow
  subtitle: "Cloud Composer is Google's fully managed Airflow service—there is no local or self-hosted install option. This comparison reflects what's required to provision a Composer environment: enabling the API, creating a service account with Composer Worker permissions, configuring IAM roles across five permission levels, and waiting roughly 25 minutes for the GKE-backed environment to provision."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready (database and config included). Open the UI, pick a Blueprint, run it. No GCP project, no service account, no IAM roles, no GCS bucket."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: "~45"
      two: Minutes
    description: "Enable the Cloud Composer API, create a service account with Composer Worker role, assign five IAM permission levels, create the Composer environment (~25 min to provision), then upload DAG files to the GCS bucket and wait for the Airflow scheduler to detect them."
    shadowColor: "#C6DAFC"
    command: |
      # Step 1: Enable API
      gcloud services enable composer.googleapis.com

      # Step 2: Create service account + assign roles
      gcloud iam service-accounts create composer-sa
      gcloud projects add-iam-policy-binding PROJECT_ID \
        --member="serviceAccount:composer-sa@PROJECT_ID.iam.gserviceaccount.com" \
        --role="roles/composer.worker"

      # Step 3: Create environment (~25 min to provision)
      gcloud composer environments create my-env \
        --location=us-central1 \
        --service-account=composer-sa@PROJECT_ID.iam.gserviceaccount.com

      # Step 4: Upload DAGs to GCS, write Python DAGs...
    lang: sh

easeOfUse:
  title: Workflows Your Whole Team Can Read
  kestra:
    title: "Kestra: Readable by your whole team"
    description: "YAML is readable on day 1. Our docs are embedded in the UI for easy reference, the <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes workflows for you, or start with our library of Blueprints. No Python knowledge required to understand or modify a workflow."
    code: |
      id: daily_etl
      namespace: data.production

      tasks:
        - id: extract
          type: io.kestra.plugin.scripts.python.Script
          script: |
            # Paste your existing extraction logic here
            result = {"records": 1000}

        - id: transform
          type: io.kestra.plugin.dbt.cli.DbtCLI
          commands:
            - dbt run --select staging

        - id: notify
          type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
          url: "{{ secret('SLACK_WEBHOOK') }}"
          messageText: "ETL complete: {{ outputs.extract.vars.result.records }} records processed"

      triggers:
        - id: daily
          type: io.kestra.plugin.core.trigger.Schedule
          cron: "0 0 * * *"
    lang: yaml
  competitor:
    title: "Cloud Composer: Python DAGs in Cloud Storage, Airflow on GKE"
    description: "DAG files are Python scripts stored in a GCS bucket. Updating a workflow means pushing a new file to Cloud Storage and waiting for the Airflow scheduler to detect the change. Operators, dependencies, and scheduling logic are all Python. Non-Python contributors can view runs in the Airflow UI but cannot author or edit workflows."
    shadowColor: "#C6DAFC"
    code: |
      from airflow import DAG
      from airflow.operators.python import PythonOperator
      from airflow.operators.bash import BashOperator
      from airflow.providers.slack.operators.slack_webhook import SlackWebhookOperator
      from datetime import datetime

      def extract_data(**context):
          # extraction logic
          return {"records": 1000}

      with DAG('daily_etl', start_date=datetime(2024, 1, 1), schedule='@daily') as dag:
          extract = PythonOperator(
              task_id='extract',
              python_callable=extract_data,
          )
          transform = BashOperator(
              task_id='transform',
              bash_command='dbt run --select staging',
          )
          notify = SlackWebhookOperator(
              task_id='notify',
              slack_webhook_conn_id='slack_default',
              message='ETL complete',
          )
          extract >> transform >> notify
    lang: python

