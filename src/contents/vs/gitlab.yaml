title: "Kestra vs. GitLab CI/CD: Universal Orchestration vs. Software Delivery Pipelines"
description: "Compare Kestra vs GitLab CI/CD: Universal workflow orchestration for data, infrastructure, and operations vs. developer-focused pipelines tied to your code repository. See features, use cases, and deployment options."
competitorName: GitLab CI/CD
category: Infrastructure Automation
shortDescription: "Repository-scoped CI/CD pipelines vs. universal workflow orchestration for data, infrastructure, and operations."

brandColor:
  color: "#FC6D26"
  gradient: "linear-gradient(90deg, #FCA326, #E24329, #FC6D26)"

intro:
  title: "Kestra vs. GitLab CI/CD: Universal Orchestration vs. Software Delivery Pipelines"
  description: "GitLab CI/CD automates code builds, tests, and deployments inside the GitLab platform. Kestra is a workflow orchestration platform for teams that need more than software delivery: data pipelines, infrastructure automation, and business processes that run on schedules, events, or API triggers, independently of any code repository."

philosophy:
  mainTitle: Two Tools, Two Definitions of "Workflow"
  kestra:
    title: "Universal Orchestration: Any Workflow, Any Team"
    description: "Declarative YAML orchestration platform for engineering and data teams. Define data pipelines, infrastructure automation, and business workflows that trigger on any event, in any language, self-hosted or on Kestra Cloud, with GitOps and full audit trails."
    subCardText: '"How do I orchestrate workflows across data, infrastructure, and operations, not just code deployments?"'
  competitor:
    title: Software Delivery Pipelines Inside GitLab
    description: "CI/CD automation tightly integrated with GitLab source control. Define pipeline stages in .gitlab-ci.yml to build, test, and deploy code. Best for teams already using GitLab who need developer-focused pipeline automation tied to repository events."
    shadowColor: "#FCEADC"
    subCardBg: "var(--ks-background-orange-light)"
    subCardText: '"How do I automate building, testing, and deploying my code from my GitLab repo?"'

businessValue:
  mainTitle: "CI/CD Automates Code Delivery.<br />Orchestration Runs Your Business."
  kestra:
    title: Production-Grade Workflow Orchestration
    list:
      - Automate data pipelines, infrastructure provisioning, and business processes in one platform
      - Self-hosted or cloud, with full data residency control
      - "GitOps-native: version control, CI/CD, and Terraform for all workflows"
      - RBAC, audit logs, and multi-tenancy for enterprise compliance
      - Handles 100,000+ concurrent tasks with no per-minute compute billing
  competitor:
    title: Software Delivery Automation
    list:
      - Automates build, test, and deploy pipelines within GitLab repositories
      - Shared runners on GitLab.com (400 compute minutes/month on free tier)
      - Premium plan at $29/user/month unlocks 10,000 compute minutes/month
      - "Pipelines scope to git events: commits, merges, tags, or schedules"
      - Self-hosted GitLab requires significant infrastructure to operate
    shadowColor: "#FCEADC"
    bulletColor: "#FC6D26"
  footerText: "For software engineering teams automating code builds, tests, and deployments within GitLab, GitLab CI/CD is the natural fit. When workflows span data transformation, infrastructure automation, or business operations beyond your git repository, Kestra is built for that scope."

setupSpeed:
  title: Time to First Workflow
  subtitle: "GitLab CI/CD requires a repository and a configured runner before any pipeline runs. Shared runners simplify cloud setup, but pipelines are always repository-scoped. Self-hosted GitLab adds a full platform installation. Kestra runs standalone in two commands."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready (database and config included). Open the UI, pick a Blueprint, run it. No repository required, no cloud account, no per-minute billing."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: "~20"
      two: Minutes
    description: "Create a GitLab account, create a repository, add a .gitlab-ci.yml file, and configure runners (shared on GitLab.com, or register your own). Self-hosted GitLab requires a full platform installation before any pipeline can run."
    shadowColor: "#FCEADC"
    command: |
      # Create a GitLab repo, then add .gitlab-ci.yml:

      stages:
        - build
        - test
        - deploy

      build_job:
        stage: build
        script:
          - echo "Build step here"

      # Push to GitLab to trigger the pipeline
    lang: yaml

easeOfUse:
  title: General-Purpose Orchestration vs. Repository-Scoped Pipelines
  kestra:
    title: "Kestra: Readable by Your Whole Team"
    description: "YAML is readable on day 1. Our docs are embedded in the UI for easy reference, the <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes workflows for you, or start with our library of Blueprints. No git repository required to get started."
    code: |
      id: daily_report
      namespace: analytics

      triggers:
        - id: daily
          type: io.kestra.plugin.core.trigger.Schedule
          cron: "0 8 * * *"

      tasks:
        - id: run_dbt
          type: io.kestra.plugin.dbt.cli.DbtCLI
          commands:
            - dbt run --select reporting

        - id: notify
          type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
          url: "{{ secret('SLACK_WEBHOOK') }}"
          messageText: "Daily report ready"
    lang: yaml
  competitor:
    title: "GitLab CI/CD: Pipeline Stages Tied to Your Repository"
    description: "Pipelines are defined in .gitlab-ci.yml at the repository root. Stages and jobs map to software delivery steps. Scheduled triggers work for recurring tasks, but the pipeline always lives inside a repository and depends on runner availability."
    shadowColor: "#FCEADC"
    code: |
      # .gitlab-ci.yml

      stages:
        - transform
        - notify

      run_dbt:
        stage: transform
        image: python:3.11
        script:
          - pip install dbt-core dbt-postgres
          - dbt run --select reporting
        rules:
          - if: '$CI_PIPELINE_SOURCE == "schedule"'

      slack_notify:
        stage: notify
        script:
          - |
            curl -X POST "$SLACK_WEBHOOK" \
              -H 'Content-type: application/json' \
              --data '{"text":"Daily report ready"}'
        rules:
          - if: '$CI_PIPELINE_SOURCE == "schedule"'
            when: on_success
    lang: yaml

