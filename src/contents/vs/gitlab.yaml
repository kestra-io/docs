platformStrengths:
  title: Kestra Is Built for Workflows Beyond Code Delivery
  features:
    - title: Any trigger, not just git events
      description: "GitLab CI/CD is wired to repository events. Kestra triggers on schedules, webhooks, file arrivals on S3 or SFTP, Kafka messages, database row changes, and API polls. When your business processes depend on data arriving from an external system rather than a git push, Kestra handles it natively without requiring a dummy repository to host the workflow."
    - title: Data pipelines as first-class workflows
      description: "Kestra ships native plugins for dbt, Airbyte, Spark, Snowflake, BigQuery, Databricks, and 1,200+ more. Data engineers define ETL pipelines in the same YAML they use for everything else, with DAG visualization and retry semantics for data-specific failures. GitLab CI/CD can run a dbt job as a pipeline step, but each run draws from your plan quota and there is no native observability for data workloads."
    - title: No compute-minute ceiling
      description: "Kestra runs on your infrastructure and handles 100,000+ concurrent tasks with no per-minute billing. GitLab CI/CD caps free users at 400 compute minutes/month and Premium users at 10,000. For data teams running hundreds of scheduled pipelines daily, those ceilings fill up fast."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "Your workflows span data transformation, infrastructure provisioning, or business operations beyond code deployments."
      - "Triggers come from file arrivals, message queues, database events, or webhooks rather than git commits."
      - "Your team runs more scheduled jobs than a compute-minute quota can sustain."
      - "Non-engineers need to trigger or monitor workflows through a no-code interface."
      - "You want a workflow platform independent of your source control provider."
  competitor:
    title: Choose GitLab CI/CD When
    list:
      - "Your team uses GitLab for source control and needs tightly integrated build, test, and deploy pipelines."
      - "All your automation starts from repository events: commits, merge requests, or tags."
      - "You want security scanning, SAST, and compliance pipelines built into your delivery workflow."
      - "Your pipeline compute needs fit within your plan's minute quota."
      - "You want a single platform for code hosting, CI/CD, and DevSecOps without adding another system."
    shadowColor: "#FCEADC"
    bulletColor: "#FC6D26"

commonQuestions:
  - question: Can Kestra replace GitLab CI/CD for software deployments?
    answer: "Kestra handles scheduled and event-driven automation well, but GitLab CI/CD is optimized for software delivery: it integrates with merge requests, runs SAST and dependency scanning, enforces compliance pipelines, and manages deployment environments with native rollback. If you are building and deploying code from a GitLab repository, GitLab CI/CD is the right tool for that. Kestra fits the workflows that run after code is deployed: data pipelines, infrastructure reconciliation, and business process automation."
  - question: Can I run data pipelines in GitLab CI/CD?
    answer: "Yes, with limits. You can run dbt, Python scripts, or SQL jobs as GitLab pipeline steps using Docker images and scheduled triggers. But GitLab CI/CD has no native data plugins, no DAG visualization, no built-in retry semantics for data-specific failures, and compute-minute quotas that constrain how many jobs you can run. For teams running a handful of data jobs tied to code deployments, GitLab CI/CD works. For teams with dedicated data pipelines running independently of code releases, Kestra is purpose-built for that scope."
  - question: How does Kestra's trigger model differ from GitLab CI/CD?
    answer: "GitLab CI/CD triggers on repository events: pushes, merges, tags, and schedules configured per project. Kestra triggers on anything: schedules, HTTP webhooks, file arrivals on cloud storage or SFTP, Kafka and Pulsar message queue events, database row changes, and API polling. For workflows that respond to business events rather than code changes, Kestra's trigger model is broader and does not require a repository to host the workflow definition."
  - question: How do I run automation that does not belong to a specific repository?
    answer: "In GitLab CI/CD, every pipeline lives inside a repository. Cross-project automation requires configuring pipeline triggers across repos, which adds coordination overhead. In Kestra, workflows are standalone: defined in a namespace, stored in the Kestra backend, and deployable via the API, Terraform, or Git sync. A workflow that reconciles cloud infrastructure, syncs a data warehouse, and notifies Slack does not need to live next to application code."
  - question: Does Kestra support GitOps the way GitLab does?
    answer: "Yes. Kestra has native Git sync, a Terraform provider, and a CI/CD-friendly API for deploying flows from a pipeline. You can store all Kestra flows in a Git repository and push updates through a GitLab CI/CD pipeline if that is your existing deployment pattern. GitLab CI/CD handles the code delivery; Kestra handles the data pipelines, infrastructure automation, and operational workflows that run alongside or after it."
  - question: What does migrating scheduled GitLab CI/CD jobs to Kestra look like?
    answer: "Start by identifying your scheduled .gitlab-ci.yml pipelines that run data or infrastructure jobs independently of code changes. Re-express each job as a Kestra Flow: move scripts into Script tasks or call the appropriate plugin (dbt, SQL, HTTP, shell), configure the Schedule trigger, and set up retry and error-handling logic. Kestra's Blueprints library covers common patterns to accelerate the conversion. Most teams migrate incrementally, keeping GitLab CI/CD for code delivery while moving data and operational workflows to Kestra."
