title: "Redwood RunMyJobs vs Kestra for Workload Automation"
description: "Compare Kestra vs Redwood RunMyJobs: Open-source, developer-first orchestration in YAML vs. SaaS-first enterprise workload automation with SAP integration and GUI-driven job scheduling. See features, setup, and migration path."
competitorName: Redwood
category: Infrastructure Automation
shortDescription: "SaaS-first enterprise workload automation with SAP focus vs. open-source orchestration in YAML."
seeHowTitle: "Getting Started with Declarative Orchestration"
seeHowBody: "See how Kestra can simplify your workflows—and scale beyond legacy workload automation."

brandColor:
  color: "#e24650"

intro:
  title: "Kestra vs. Redwood RunMyJobs: Open-Source Orchestration vs. SaaS Workload Automation"
  description: "Redwood RunMyJobs is a SaaS-first platform that automates enterprise workloads, especially SAP environments. Kestra gives any engineer the power to build, deploy, and monitor workflows in YAML through Git. No vendor lock-in, no per-job metering."

philosophy:
  mainTitle: Two Approaches to Automation
  kestra:
    title: "Developer Self-Service Orchestration"
    description: "Declarative YAML workflows versioned in Git, executed in isolated containers, deployed through CI/CD. Any engineer can build and ship workflows without waiting on a vendor or central team. Open source at the core, with 1200+ plugins and event-driven triggers built in from day one."
    subCardText: '"How do we let every team build and ship workflows without being locked into a single vendor or SaaS platform?"'
  competitor:
    title: SaaS-First Workload Automation
    description: "Cloud-native SaaS platform focused on enterprise job scheduling and SAP workload automation. Jobs are defined through a GUI, executed by the RunMyJobs engine, and monitored from a centralized console. SAP-certified with deep integration into SAP ECC, S/4HANA, and BW environments."
    shadowColor: "#E24650"
    subCardBg: "var(--ks-background-red-light)"
    subCardText: '"How do we replace our legacy scheduler with a managed SaaS platform that handles SAP and enterprise workloads?"'

businessValue:
  mainTitle: "Open Platform vs. Managed SaaS"
  kestra:
    title: Self-Service Automation
    list:
      - "Data pipelines, infrastructure automation, business processes, and AI workflows"
      - "Any engineer ships workflows in YAML through Git and CI/CD"
      - "Event-driven at core: react to real events, not just batch schedules"
      - "Open source with 1200+ plugins, no per-job licensing, and a thriving community of contributors"
      - "Self-service for non-engineers via Kestra Apps"
  competitor:
    title: Enterprise SaaS Scheduling
    list:
      - "Enterprise job scheduling with SAP-certified integration"
      - "SaaS-delivered platform with no on-premise infrastructure to manage"
      - "Finance close automation and compliance-focused workflows"
      - "Proprietary subscription licensing with usage-based pricing"
      - "GUI-driven job definition managed through a centralized console"
    shadowColor: "#E24650"
    bulletColor: "#E24650"
  footerText: "Redwood RunMyJobs fits organizations that need a managed SaaS scheduler with deep SAP integration and want to offload infrastructure management to a vendor. Kestra is the right choice if you want developers to own their workflows in code, need event-driven automation beyond job scheduling, or want the flexibility of open source without proprietary lock-in."

setupSpeed:
  title: Time to First Workflow
  subtitle: "Redwood RunMyJobs is a SaaS platform that requires procurement, onboarding, and configuration before you can define your first job. Kestra's single Docker Compose command stands up everything in a format that's already production-shaped."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready (database and config included). Open the UI, pick a Blueprint, run it."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: "Weeks to"
      two: Months
    description: "As a SaaS platform, RunMyJobs handles infrastructure, but onboarding involves procurement, contract negotiation, tenant provisioning, SAP system connectivity setup, and user training. Connecting on-premise systems requires installing Redwood's connectivity components. There is no free tier or self-service trial to get started immediately."
    shadowColor: "#E24650"
    command: |
      # 1. Negotiate contract and subscription terms
      # 2. Provision your RunMyJobs SaaS tenant
      # 3. Install connectivity components for on-premise systems
      # 4. Configure SAP RFC connections (if applicable)
      # 5. Set up user roles and security policies
      # 6. Define jobs through the RunMyJobs GUI
      # 7. Schedule and test job chains

      # No self-hosted option or free trial available
    lang: sh

easeOfUse:
  title: YAML in Git vs. GUI-Defined Jobs
  kestra:
    title: "Kestra: Any engineer, any language"
    description: "YAML is readable on day 1. Our docs are embedded in the UI for easy reference, the <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes workflows for you, or start with our library of Blueprints. Engineers deploy through Git, same as application code."
    code: |
      id: data_pipeline
      namespace: finance.etl

      inputs:
        - id: date
          type: DATE
        - id: environment
          type: SELECT
          values: [dev, staging, prod]

      tasks:
        - id: extract_sap
          type: io.kestra.plugin.jdbc.oracle.Query
          sql: |
            SELECT * FROM sap_financial_data
            WHERE posting_date = '{{ inputs.date }}'

        - id: transform
          type: io.kestra.plugin.scripts.python.Script
          script: |
            import pandas as pd
            df = pd.read_csv("{{ outputs.extract_sap.uri }}")
            df['amount_usd'] = df['amount'] * df['fx_rate']
            df.to_csv("{{ outputDir }}/transformed.csv")

        - id: load_warehouse
          type: io.kestra.plugin.gcp.bigquery.Load
          from: "{{ outputs.transform.outputFiles['transformed.csv'] }}"
          destinationTable: "finance.fact_transactions"

        - id: notify
          type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
          url: "{{ secret('SLACK_WEBHOOK') }}"
          payload: |
            {"text": "Finance ETL complete for {{ inputs.date }}"}
    lang: yaml
  competitor:
    title: "Redwood: GUI-defined job chains"
    description: "Jobs are defined through the RunMyJobs web console using a graphical interface. Job chains establish dependencies between steps. Process definitions include parameters, scheduling rules, and alerting configurations. Modifying job logic requires access to the RunMyJobs GUI and appropriate permissions."
    shadowColor: "#E24650"
    code: |
      // RunMyJobs Process Definition (conceptual representation)
      {
        "processName": "Finance_ETL_Pipeline",
        "description": "Daily SAP data extraction and load",
        "jobChain": [
          {
            "step": 1,
            "jobType": "SAP",
            "name": "Extract_SAP_Financial_Data",
            "sapSystem": "PRD",
            "variant": "ZFIN_EXTRACT",
            "parameters": {
              "POSTING_DATE": "${date}",
              "COMPANY_CODE": "1000"
            }
          },
          {
            "step": 2,
            "jobType": "Script",
            "name": "Transform_Data",
            "scriptPath": "/opt/scripts/transform.py",
            "dependsOn": "Extract_SAP_Financial_Data"
          },
          {
            "step": 3,
            "jobType": "FileTransfer",
            "name": "Load_To_Warehouse",
            "source": "/data/transformed.csv",
            "destination": "bigquery://finance.fact_transactions",
            "dependsOn": "Transform_Data"
          }
        ],
        "schedule": {
          "type": "daily",
          "time": "02:00",
          "timezone": "UTC",
          "calendar": "BUSINESS_DAYS"
        },
        "alerting": {
          "onFailure": "ops-team@company.com"
        }
      }
    lang: json

