commonQuestions:
  - question: How hard is it to migrate from Redwood RunMyJobs to Kestra?
    answer: "Kestra doesn't require you to rewrite your business logic. Shell scripts, Python code, SQL queries, and file transfer operations work as-is in Kestra's Script and plugin tasks. The migration involves translating RunMyJobs process definitions into Kestra's YAML format and replacing RunMyJobs connectivity with Kestra's plugin-based integrations. Most teams start new workflows in Kestra and migrate existing jobs incrementally."
  - question: We use RunMyJobs primarily for SAP automation. Can Kestra handle SAP workloads?
    answer: "Kestra can connect to SAP systems through JDBC plugins and script-based tasks that invoke SAP APIs or BAPIs. However, Kestra does not have SAP-certified native integration like RunMyJobs does. If your automation is tightly coupled to SAP-specific features like BW process chains, ABAP job scheduling, or transport management, RunMyJobs has purpose-built tooling for that. Many organizations use Kestra for non-SAP workflows while keeping a specialized tool for SAP-specific automation."
  - question: Redwood is SaaS-only. Can Kestra run in the cloud too?
    answer: "Yes. Kestra offers both self-hosted deployment (Docker, Kubernetes) and Kestra Cloud, a fully managed service. Unlike RunMyJobs, you have the flexibility to choose where your workflows run. Self-host for full control, use Kestra Cloud for a managed experience, or start with open source and move to cloud later. You are never locked into a single deployment model."
  - question: How does Kestra's pricing compare to Redwood RunMyJobs?
    answer: "Kestra's open-source edition is free with 1200+ plugins and unlimited event-driven workflows. Enterprise features (RBAC, SSO, audit logs, multi-tenancy) are available on Kestra Enterprise and Kestra Cloud without per-job metering. Redwood RunMyJobs uses subscription-based pricing with usage tiers. Costs can grow unpredictably as job volumes increase."
  - question: Does Kestra support the same integrations as RunMyJobs?
    answer: "Kestra's 1200+ plugin library covers cloud providers (AWS, Azure, GCP), data warehouses (Snowflake, BigQuery, Databricks), databases, message queues (Kafka, RabbitMQ, Pulsar), and CI/CD tools. RunMyJobs has native connectors for SAP, Oracle E-Business Suite, and PeopleSoft that Kestra doesn't replicate directly. For cloud-native and data platform integrations, Kestra's open plugin ecosystem offers broader coverage."
  - question: RunMyJobs handles finance close automation. Does Kestra have an equivalent?
    answer: "Kestra is a general-purpose orchestration platform, not a purpose-built finance close tool. You can build finance close workflows in Kestra by orchestrating the underlying tasks (running reconciliation scripts, triggering SAP jobs, generating reports, sending notifications), but RunMyJobs offers a dedicated finance close module with pre-built templates and compliance features. If finance close automation is your primary use case, evaluate whether the pre-built tooling saves enough time to justify the vendor lock-in."
  - question: How does Kestra handle access control compared to RunMyJobs?
    answer: "Kestra provides namespace isolation with RBAC, SSO/SAML, audit logs for every execution, and secrets management integration with AWS Secrets Manager, HashiCorp Vault, and Azure Key Vault. RunMyJobs offers role-based access and audit logging within its SaaS platform. Both platforms handle enterprise access control requirements, but Kestra gives you more flexibility in where and how governance policies are enforced."
  - question: We have no on-premise infrastructure. Is Kestra still a good fit?
    answer: "Yes. Kestra Cloud is a fully managed service that requires no on-premise infrastructure. You get the same YAML-based workflow definitions, Git integration, and plugin ecosystem without managing servers. The difference from RunMyJobs is that you also have the option to self-host if your requirements change, and your workflow definitions are portable YAML files rather than locked inside a proprietary platform."
  - question: Can Kestra and RunMyJobs coexist during migration?
    answer: "Yes. Kestra and RunMyJobs can run side by side. Start by building new workflows in Kestra while existing RunMyJobs processes continue running. Kestra's webhook and API triggers can bridge the two systems during the transition, letting RunMyJobs trigger Kestra workflows or vice versa. Migrate jobs in batches, starting with the simplest non-SAP workloads."
  - question: Redwood acquired other products like ActiveBatch. Does that matter?
    answer: "Redwood has acquired multiple automation products (ActiveBatch, Tidal, Cerberus FTP). This gives them a broad portfolio, but it also means product consolidation is ongoing. Some acquired products may be merged or deprecated over time. Kestra is a single, purpose-built orchestration platform with a unified architecture and a consistent developer experience. There is no risk of product consolidation or feature removal due to acquisition strategy."
  - question: RunMyJobs has a visual job designer. Kestra only uses YAML?
    answer: "Kestra has both. The built-in editor lets you write YAML with autocompletion and embedded documentation, and the topology view provides a visual representation of your workflow. The key difference is that YAML is the source of truth, stored in Git, and deployable through CI/CD. RunMyJobs' visual designer produces job definitions that live inside the platform. Kestra's approach means your automation code follows the same development practices as your application code."
  - question: Can we replace RunMyJobs with just cron and scripts instead of Kestra?
    answer: "Teams sometimes consider replacing a scheduler with cron jobs and scripts because it seems simpler. But cron lacks dependency management, retry logic, real-time monitoring, alerting, and audit trails. The result is usually fragile scripts with no visibility into failures. Kestra is purpose-built for orchestration: DAG-based dependencies, configurable retries, real-time execution monitoring, and a full audit trail for every run. It replaces both the scheduler and the observability gap that cron creates."
