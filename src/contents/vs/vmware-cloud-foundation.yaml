category: Infrastructure Automation
shortDescription: "vSphere-coupled JavaScript vRO workflows vs. cloud-agnostic declarative YAML orchestration."
seeHowTitle: "Getting Started with Modern Infrastructure Orchestration"
seeHowBody: "See how Kestra replaces VMware Aria Automation with declarative YAML workflows across any cloud."
