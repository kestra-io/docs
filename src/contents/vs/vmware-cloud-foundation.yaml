setupSpeed:
  title: "Time to First Infrastructure Automation Workflow"
  subtitle: "Kestra starts in minutes with Docker Compose. VMware Aria Automation requires an existing vSphere environment, enterprise licensing, and a multi-step installation wizard that typically takes days and professional services."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, run it, open the UI, and pick an infrastructure automation Blueprint. Your first provisioning workflow includes a dynamic approval form, Terraform apply, and Ansible configuration—all in readable YAML ready for Git."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick an Infrastructure Automation Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: Days
      two: to weeks
    description: "VMware Aria Automation requires an existing vSphere environment, enterprise licensing, and a multi-step installation wizard. A typical deployment takes days of infrastructure preparation and often requires Broadcom professional services before the first workflow runs."
    shadowColor: "#00B135"
    command: |
      # VMware Aria Automation
      # Prerequisites:
      # - Existing vSphere/vCenter infrastructure
      # - Broadcom enterprise license
      # - Aria Automation appliance deployment
      # - vRO configuration and endpoint registration
      # - Service catalog setup
      # Typical time: 2-5 days + professional services
    lang: sh

easeOfUse:
  title: "Declarative YAML vs. JavaScript + Proprietary vRO APIs"
  kestra:
    title: "Kestra: Readable, reviewable, deployable"
    description: "YAML workflows read like documentation. The <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes them for you. Every workflow goes through Git and CI/CD—no hidden state in a UI. Approvals, secrets, retries, and ITSM integration are first-class YAML constructs."
    code: |
      id: vm_provision_with_approval
      namespace: infra.ops

      inputs:
        - id: vm_name
          type: STRING
        - id: environment
          type: SELECT
          values: [dev, staging, prod]

      tasks:
        - id: request_approval
          type: io.kestra.plugin.core.flow.Pause
          onResume:
            form:
              fields:
                - id: approved
                  type: SELECT
                  values: [yes, no]

        - id: provision
          type: io.kestra.plugin.terraform.cli.TerraformCLI
          commands:
            - terraform apply -auto-approve
          env:
            TF_VAR_vm_name: "{{ inputs.vm_name }}"

        - id: configure
          type: io.kestra.plugin.ansible.cli.AnsibleCLI
          commands:
            - ansible-playbook configure.yml

        - id: close_ticket
          type: io.kestra.plugin.servicenow.table.Update
          table: incident
          id: "{{ trigger.body.sys_id }}"
          data:
            state: resolved
    lang: yaml
  competitor:
    title: "vRO: JavaScript, proprietary APIs, poor DX"
    description: "VMware vRO workflows are written in JavaScript with proprietary vRO APIs that wrap vSphere objects. They're difficult to version, test, or debug. Error messages are often ambiguous and require vCenter-level access to diagnose. There is no native Git integration—workflows live in the vRO server."
    shadowColor: "#00B135"
    code: |
      // VMware vRO workflow (JavaScript + proprietary APIs)
      // No native Git, hard to test, ambiguous errors
      System.log("Starting VM provisioning...");
      var vcPlugin = Server.findForType("VC:SdkConnection")[0];
      var datacenter = vcPlugin.getAllDatacenters()[0];
      var folder = VcPlugin.getAllVirtualMachineFolder(datacenter)[0];
      var resPool = VcPlugin.getAllResourcePool(datacenter)[0];
      var spec = new VcVirtualMachineConfigSpec();
      spec.name = System.getContext().getParameter("vmName");
      // ... dozens more lines of proprietary JS ...
      // Error messages: "Cannot complete login due to an
      // incorrect user name or password" (even when it's
      // a network timeout, not an auth issue)
    lang: javascript

