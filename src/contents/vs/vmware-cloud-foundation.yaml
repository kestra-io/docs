intro:
  title: "Kestra vs. VMware Aria Automation: Beyond the vSphere Portal"
  description: "VMware Aria Automation (formerly vRA/vRO) is the go-to portal for catalog-driven VM provisioning in vSphere environments. But as infrastructure expands to AWS, Azure, GCP, and Kubernetes—and as teams demand Git-native workflows, clear error messages, and modern developer experience—the proprietary JavaScript vRO model breaks down. Kestra replaces vRA/vRO with declarative YAML workflows that work across every cloud, on-prem, and air-gapped environments."

philosophy:
  mainTitle: "Cloud-Agnostic Orchestration vs. vSphere-First Portal"
  kestra:
    title: "Multi-Cloud Infrastructure Orchestration"
    description: "Define every provisioning workflow in YAML. Orchestrate Terraform, Ansible, vSphere, AWS, Azure, and GCP in one flow. Self-service Apps with dynamic forms and approval gates replace the vRA catalog. Every workflow is Git-native, reviewable, and deployable through CI/CD—no JavaScript, no proprietary APIs, no hidden state."
    subCardText: '"How do I provision infrastructure across VMware, AWS, and Azure with one declarative workflow and a clear audit trail?"'
  competitor:
    title: "VMware-Centric Catalog Portal"
    description: "VMware Aria Automation provides a polished portal for catalog-driven VM provisioning tightly integrated with vSphere. But orchestration logic lives in vRO—JavaScript with proprietary APIs, ambiguous error messages, and no native Git integration. Expanding beyond VMware infrastructure adds friction."
    shadowColor: "#00B135"
    subCardBg: "var(--ks-background-blue-light)"
    subCardText: '"Why does debugging a failed vRO workflow take hours? And why can''t I version-control these JavaScript workflows properly?"'

