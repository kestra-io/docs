commonQuestions:
  - question: "How does Kestra compare to VMware Aria Automation (vRA/vRO)?"
    answer: "VMware Aria Automation focuses on catalog-driven VM and service provisioning tightly coupled to vSphere infrastructure. Workflows in vRO are JavaScript-based with proprietary APIs, difficult to version, and prone to ambiguous error messages. Kestra replaces vRA/vRO with declarative YAML workflows that work across VMware, AWS, Azure, GCP, and Kubernetes—with proper Git integration, clear logs, and self-service Apps that don't require a proprietary portal. Fortune 500 enterprises and Capgemini have replaced vRA/vRO with Kestra specifically for better developer experience, cleaner logs, and Git-native governance."
  - question: "Does Kestra support VMware vSphere integrations?"
    answer: "Yes. Kestra has native vSphere plugin support for VM lifecycle management—provisioning, snapshotting, resizing, and decommissioning. Combined with Terraform, Ansible, and PowerShell tasks in the same workflow, Kestra can replicate and extend everything vRA/vRO does for vSphere environments. You keep deep vSphere integration while gaining multi-cloud flexibility and a modern developer experience."
  - question: "How does Kestra handle self-service provisioning forms?"
    answer: "Kestra Apps provide dynamic, data-backed forms for self-service provisioning. Forms can be populated from APIs, CMDBs, or vCenter data—giving users dropdowns with live infrastructure data (available datastores, network segments, resource pools) rather than static values. Approval gates are inline YAML tasks that pause the workflow for human review before resources are created. This replaces the vRA service catalog with a single, flexible mechanism that works across any cloud."
  - question: "What happens to existing vRO workflows when migrating to Kestra?"
    answer: "Kestra's AI Copilot can help translate vRO JavaScript workflows into YAML. For complex vRO workflows, Kestra's professional services team has a proven migration playbook—typically converting vRO workflows to Kestra YAML while preserving business logic. Many organizations (including Fortune 500 enterprises) have migrated their entire vRA/vRO catalog to Kestra in phased migrations, running both systems in parallel during the transition period."
  - question: "How does Kestra address the Broadcom/VMware pricing concern?"
    answer: "Since Broadcom's acquisition of VMware, many organizations have seen significant licensing cost increases. Kestra's pricing is based on compute infrastructure (instances and workers), not per-VM or per-user counts—which typically results in substantial savings as vSphere environments grow. Kestra also has no vendor lock-in: workflows are YAML files in Git that can run on any infrastructure."
  - question: "Is Kestra suitable for air-gapped and regulated environments?"
    answer: "Yes. Kestra was designed for compliance-first deployments. It runs fully on-prem with no external dependencies, supports internal Postgres and S3-compatible storage, integrates with AD/OIDC for SSO, and works with enterprise secrets managers like CyberArk and HashiCorp Vault. Government customers like ITZBund and the Austrian Ministry of Defense chose Kestra specifically for its air-gap readiness and audit capabilities."
