featureGrid:
  title: "Kestra vs. VMware Aria Automation at a Glance"
  tableData:
    - feature: Primary use case
      kestra: Full infrastructure lifecycle (provision, configure, remediate, decommission)
      competitor: Catalog-driven VM provisioning tightly coupled to vSphere
    - feature: Workflow definition
      kestra: Declarative YAML (code-first, Git-native)
      competitor: JavaScript + proprietary vRO APIs (GUI-first, no native Git)
    - feature: Multi-cloud support
      kestra: "Cloud-agnostic: AWS, Azure, GCP, vSphere, Kubernetes"
      competitor: vSphere-first; multi-cloud requires Aria Multi-Cloud add-ons
    - feature: Developer experience
      kestra: YAML workflows, clear error messages, full execution logs
      competitor: Ambiguous error messages, proprietary APIs, difficult debugging
    - feature: IaC integration
      kestra: Native Terraform, Ansible, PowerShell, Python, Pulumi support
      competitor: vRO plugins (limited); Terraform requires extra configuration
    - feature: Self-service Apps
      kestra: Built-in dynamic forms, approvals, and RBAC per namespace
      competitor: vRA service catalog (VMware-centric, limited extensibility)
    - feature: Air-gapped deployment
      kestra: "✓ Fully supported (on-prem, Kubernetes)"
      competitor: Requires vSphere infrastructure; limited true air-gap support
    - feature: Version control
      kestra: Native (Git, CI/CD, Terraform provider)
      competitor: No native Git—workflows live in vRO server
    - feature: Observability
      kestra: Full execution logs, artifact storage, clear error messages
      competitor: Ambiguous vRO logs; requires vCenter access to diagnose failures
    - feature: Event-driven triggers
      kestra: Webhooks, schedules, file detection, message queues, flow triggers
      competitor: Catalog requests and basic event subscriptions
    - feature: Licensing model
      kestra: Flat instance + worker-based pricing
      competitor: Per-user + per-VM (Broadcom); costs increasing post-acquisition

