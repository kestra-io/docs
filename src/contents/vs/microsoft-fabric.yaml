platformStrengths:
  title: Kestra Orchestrates Across Any Stack
  features:
    - title: Multi-cloud and stack-agnostic by design
      description: "Kestra's 1,200+ plugins cover every major cloud provider, data warehouse, message queue, and database (AWS, GCP, Azure, Snowflake, Databricks, BigQuery, Kafka, and more). A pipeline that reads from S3, transforms in Databricks, and writes to Azure SQL lives in the same YAML as one that does the reverse. Adding a new tool to the stack means adding a plugin, not rearchitecting the platform."
    - title: Workflows in Git, deployed through CI/CD
      description: "Every Kestra flow is a YAML file reviewed in a pull request, versioned in Git, and deployed through the same CI/CD pipeline as your application code. Every change is tracked, every deployment is auditable, and rolling back a broken pipeline is a git revert. Automation gets the same engineering discipline as the rest of your infrastructure."
    - title: Self-hosted on any infrastructure
      description: "Kestra deploys on Docker or Kubernetes on any cloud or on-premises environment, including air-gapped clusters with no internet access required. Execution logs, workflow definitions, and secrets stay on your infrastructure. Teams operating in regulated industries or multi-cloud environments run Kestra where their data already lives, without taking a dependency on a single cloud provider's availability or pricing."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "Your data stack spans multiple clouds or includes tools outside the Microsoft ecosystem."
      - "Self-hosting is required for data residency, air-gapped environments, or cloud independence."
      - "Workflows must live in version control, pass code review, and deploy through CI/CD."
      - "You need infrastructure automation, not just data pipeline orchestration."
      - "You want orchestration costs tied to your infrastructure, not Azure capacity billing."
  competitor:
    title: Choose Microsoft Fabric When
    list:
      - "Your data stack is Azure-native: data lives in OneLake, reporting runs in Power BI, compute runs in Synapse."
      - "You want a single Microsoft subscription covering data engineering, warehousing, real-time analytics, and BI."
      - "Your team is standardized on Microsoft tooling and wants to avoid managing separate orchestration infrastructure."
      - "Native dbt jobs, Dataflow Gen 2 transformations, and Spark notebooks running on shared OneLake are central to your architecture."
      - "Business users need Power BI dashboards directly connected to the same data infrastructure engineers build."
    shadowColor: "#CCE4F6"
    bulletColor: "#0078D4"

commonQuestions:
  - question: How do I migrate data pipelines from Fabric Data Factory to Kestra?
    answer: "Export your Fabric Data Factory pipelines as JSON and map each activity to the equivalent Kestra plugin. Web activities become HTTP tasks; dbt activities use Kestra's native dbt plugin; Spark notebook runs use the Spark plugin; control flow logic (conditionals, loops) maps directly to Kestra's YAML constructs. Most teams migrate incrementally, starting with pipelines that pull from non-Azure sources or that need to orchestrate tools outside the Microsoft ecosystem, while leaving Azure-native transformations in Fabric until they are ready to consolidate."
  - question: Can Kestra replace Fabric's data warehouse and Power BI?
    answer: "Kestra is an orchestration platform, not an analytics platform. It replaces the Fabric Data Factory orchestration layer (pipelines, triggers, scheduling) but not the data warehouse or Power BI. If your team relies on Fabric's native Synapse warehouse or Power BI reports, those stay. Kestra orchestrates the pipelines that feed data into your existing warehouse and reporting tools, whether those tools are Microsoft's or anyone else's."
  - question: How does Kestra handle Azure-native tools like OneLake and Synapse?
    answer: "Kestra has native plugins for Azure Data Lake Storage, Azure Blob Storage, Azure SQL, and Azure Synapse. Pipelines that read from OneLake, run dbt models on Synapse, and write results back to Azure SQL work in Kestra without any special configuration. The difference from Fabric Data Factory is that Kestra treats Azure as one target among many, so the same YAML workflow can read from S3, transform in Databricks, and write to Azure SQL without platform-specific wiring."
  - question: How does pricing compare between Kestra and Microsoft Fabric?
    answer: "Microsoft Fabric uses capacity-based Azure pricing: you reserve compute and storage capacity and all workloads share that pool. Costs can be unpredictable as pipeline frequency or data volume grows. Kestra's open-source version is free to self-host; Kestra Cloud pricing is based on execution resources rather than reserved capacity. For teams running Kestra on existing infrastructure alongside Azure services, the orchestration layer adds minimal cost to what you are already paying for compute and storage."
  - question: Can Kestra and Microsoft Fabric run in parallel?
    answer: "Yes. Kestra can orchestrate Fabric workloads directly: triggering Fabric Data Factory pipeline runs via the Azure REST API, reading from OneLake, or calling Synapse SQL endpoints. Most teams run both during a transition, using Kestra for new pipelines and multi-cloud workflows while keeping Fabric for existing Azure-native transformations. Once the team is comfortable with Kestra's YAML model, the Fabric pipelines can migrate at whatever pace the data team decides."
  - question: Does Kestra support Apache Airflow-style DAGs the way Fabric does?
    answer: "Kestra is a distinct orchestration platform with its own YAML-based workflow model, not an Airflow replacement that runs Python DAGs. If your team is familiar with Airflow's Python DAG approach, Fabric's Apache Airflow integration (which runs actual Python DAGs on Azure) may feel more familiar during a transition. Kestra's YAML model is simpler to read and review than Python DAGs, and avoids Python dependency management, but it requires learning a different paradigm. Teams migrating from Airflow to Kestra typically find the YAML model faster to iterate on, even if the initial syntax feels different."
