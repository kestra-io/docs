platformStrengths:
  title: Kestra Is Built for How Engineering Teams Actually Work
  features:
    - title: Bring your own scripts
      description: "Bring your existing Python, SQL, Shell, Go, and R scripts. Define workflows in declarative YAML. No wrappers, no framework lock-in."
    - title: Minutes to first workflow
      description: "Build your first scheduled workflow in under 5 minutes with our <a href='/docs/quickstart'>Quickstart Guide</a>. No Node.js runtime to manage, no visual canvas required. Write YAML and execute."
    - title: Built for business-critical reliability
      description: "Kestra writes every execution step to a persistence layer. If a worker crashes mid-run, state is preserved — nothing is lost, and workflows can be replayed or resumed from the last completed task. n8n holds execution state in memory by default, which is fine for prototyping. For production workflows that can't afford to lose state, Kestra is designed for that."
    - title: Orchestrate anything
      description: "Data pipelines, integration workflows, document processing, infrastructure provisioning, and AI workloads. One platform with container-level isolation and RBAC per namespace."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "Data pipelines, infrastructure automation, or AI workloads at production scale."
      - "File-based and document processing pipelines — extract, parse, and push structured data into enterprise systems like ERPs or databases."
      - "Multi-language teams (Python, SQL, Bash, R, Go) that need orchestration beyond JavaScript."
      - "Workflows that go through pull requests, CI/CD, and code review."
      - "Multi-team environments with namespace isolation and compliance requirements."
      - "Business-critical workflows where losing execution state mid-run is not acceptable."
  competitor:
    title: Choose n8n When
    list:
      - "Point-and-click SaaS trigger automation where visual setup speed is the priority."
      - "Visual drag-and-drop workflow building is the team's preferred model."
      - "AI agent workflows, chatbots, or RAG pipelines are the primary use case."
      - "A lightweight, self-hosted automation tool for a single team."
    shadowColor: "#FF9F7A"
    bulletColor: "#FF6B3D"

commonQuestions:
  - question: How is Kestra different from n8n?
    answer: "Kestra is a code-first orchestration platform for data pipelines, integration workflows, infrastructure automation, and AI workloads. n8n is a visual-first automation tool for connecting apps and building AI agent workflows. Kestra uses declarative YAML, runs on a distributed architecture with namespace isolation, and deploys through CI/CD. n8n uses a drag-and-drop canvas, runs on Node.js, and builds workflows in the browser. n8n gets you from zero to a working prototype fast. Kestra carries those workflows into production across teams."
  - question: Can Kestra handle AI workflows like n8n?
    answer: "Yes, but differently. n8n has a visual AI agent builder with LangChain integration, 12 vector store integrations, MCP client and server nodes, and an evaluation node for testing agent outputs — great for prototyping chatbots and agent chains. Kestra orchestrates AI workloads the same way it orchestrates everything else: as steps in declarative pipelines with full state tracking, retries, and scheduling — built visually in the UI or in code. You can call any model API, run any ML framework, and package any environment in a Docker container. A single Kestra flow can handle data extraction, model training, evaluation, deployment, and monitoring as one end-to-end pipeline. If you need a visual agent builder, n8n excels. If you need production AI pipelines integrated with data and infrastructure workflows, Kestra is built for that."
  - question: Can Kestra handle integration workflows, not just data pipelines?
    answer: "Yes. Kestra treats integration workflows the same as any other pipeline: a sequence of tasks with retries, scheduling, error handling, and full audit trails. Common patterns include syncing data between systems, processing files from cloud storage before loading into a database, chaining API calls with transformation steps, and triggering downstream processes from webhooks or message queues. More complex workflows, like reading a document, extracting structured fields with a Python script, and pushing the result into an enterprise system, are equally straightforward. Kestra has 1,200+ plugins covering file systems, cloud storage, databases, messaging queues, and REST APIs. Where n8n excels at quick SaaS-to-SaaS trigger automations built visually, Kestra is better suited for multi-step integration pipelines that need production-grade reliability, version control, and auditability."
  - question: How does Kestra handle my scripts?
    answer: "Kestra is language-agnostic. Run Python, SQL, Go, and more, either inline in your YAML or from external files. Scripts execute in isolated Docker containers by default, with full control over dependencies. No decorators, no wrappers, no framework-specific syntax. Your code stays portable."
  - question: Does Kestra have a visual editor like n8n?
    answer: "Kestra has a built-in UI with a topology view, live execution monitoring, and a code editor with embedded documentation. But the primary authoring model is YAML, not a visual canvas. This is intentional: YAML workflows go through Git, pull requests, and CI/CD like any other code. For teams that need auditability and governance, this model scales better than browser-based editing."
  - question: How much time do I need to get started?
    answer: "Five minutes. Download the Docker Compose file, run docker compose up, and open the UI at localhost:8080. Pick a Blueprint, customize it, and execute. No Node.js runtime to configure, no database to provision separately. If you know YAML (or can read it), you can build workflows immediately."
  - question: What happens if a workflow crashes mid-execution?
    answer: "In Kestra, nothing is lost. Every execution step writes its state to a persistence layer as it runs. If a worker crashes or restarts, in-progress executions can be resumed or replayed from the last completed task. This is built into the architecture — not an add-on. n8n holds execution state in memory by default, so if the process crashes mid-flow, that state is gone. For quick automations and prototyping, this trade-off is usually fine. For workflows that are business-critical — long-running data pipelines, financial processes, or anything where a missed step has real consequences — Kestra's persistence model is the right foundation."
  - question: Is Kestra open-source like n8n?
    answer: "Kestra is Apache 2.0 licensed, fully open-source with no usage restrictions. n8n uses the Sustainable Use License, which is source-available but not open-source: it restricts competing use and requires a paid license for some commercial scenarios. Both offer enterprise editions with additional features."
