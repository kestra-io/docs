  mainTitle: Two Platforms, Two Scopes
  kestra:
    description: "Orchestrate data pipelines, infrastructure operations, business processes, and AI workflows in one unified platform. Event-driven at its core, with native triggers for S3, Kafka, webhooks, and database changes. 1200+ plugins cover the full data and infrastructure stack, all defined in YAML."
