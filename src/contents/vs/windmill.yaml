platformStrengths:
  title: Kestra Is Built for Teams Who Orchestrate the Full Data Stack
  features:
    - title: 1200+ data and infrastructure plugins, no code required
      description: "Kestra ships native plugin tasks for dbt, Airbyte, Spark, Snowflake, BigQuery, Kafka, Databricks, and 1200+ more. Drop one into a YAML workflow and it runs with no connection code to write or API docs to parse. Every integration is a pre-built task type, not custom code your team writes and maintains."
    - title: YAML any analyst can read and modify
      description: "A Kestra workflow is a YAML file that any team member can read and modify; ops teams can trigger runs from the UI without touching the implementation. Business users interact with workflows through Kestra Apps — no-code forms that trigger, monitor, and collect input without exposing the underlying YAML."
    - title: Event-driven triggers as first-class declarations
      description: "S3 file arrivals, Kafka message consumption, database row changes, and webhook callbacks are YAML trigger blocks sitting alongside the task list in the same file. Kestra's trigger system covers the reactive patterns data teams actually need without writing any polling code or managing external event listeners."

decisionGuide:
  mainTitle: Two Platforms Built for Different Teams
  kestra:
    title: Choose Kestra When
    list:
      - "You're orchestrating data pipelines that touch dbt, Airbyte, Snowflake, Spark, or Kafka and want pre-built tasks instead of custom code."
      - "Your team includes analysts and data engineers who need to read and modify workflows without a Python background."
      - "You need event-driven triggers for S3 arrivals, Kafka messages, or database changes as native YAML declarations."
      - "Enterprise RBAC, namespace isolation, audit logs, and SSO/SAML are required."
      - "You're orchestrating 100,000+ concurrent tasks and need a platform built for that scale."
  competitor:
    title: Choose Windmill When
    list:
      - "Your engineering team wants to write scripts in multiple languages and needs a shared platform to run and monitor them."
      - "You need to build internal apps and forms on top of automations, and the low-code UI builder is a genuine time-saver."
      - "Your workflows are developer-owned scripts where code is the right authoring medium, not YAML."
      - "You want a single all-in-one tool for scripts, flows, and internal UIs rather than a dedicated orchestration platform."
    shadowColor: "#DBEAFE"
    bulletColor: "#3B82F6"

commonQuestions:
  - question: Can Kestra replace Windmill for internal tooling?
    answer: "For workflow orchestration and data pipelines, yes. For building internal apps with drag-and-drop UI components, Windmill has a purpose-built low-code app builder that Kestra doesn't replicate. Kestra Apps let non-engineers trigger workflows and fill in parameters through a form UI, but it's not a general internal tool builder. If your use case is running data pipelines and infrastructure workflows, Kestra is the stronger fit; if you're primarily building internal UIs and scripts, Windmill's app builder is a genuine differentiator."
  - question: Does Kestra support the same languages as Windmill?
    answer: "Kestra runs scripts in any language inside isolated Docker containers: Python, TypeScript, Go, Bash, SQL, R, and more, with no SDK required. Windmill has native workers for Python, TypeScript, Go, PHP, Bash, SQL, Rust, and C#. The difference is that Kestra wraps script execution in a plugin system with pre-built task types for common integrations, so you don't write connection code for dbt, Airbyte, or Snowflake. Windmill scripts give you more flexibility at the cost of writing that code yourself."
  - question: How does Kestra's plugin library compare to Windmill's integrations?
    answer: "Kestra ships 1200+ native plugin tasks covering dbt, Airbyte, Spark, Snowflake, BigQuery, Redshift, Kafka, Databricks, AWS, GCP, Azure, and the full modern data stack. Each is a typed YAML task definition. Windmill has a community script hub with shared scripts, but integrations aren't pre-built plugin tasks you drop into a workflow. They're community-maintained scripts you copy into your workspace and adapt. For teams who need reliable, versioned integrations with production data systems, the plugin model is faster to start and easier to maintain."
  - question: How does migration from Windmill to Kestra work?
    answer: "Your existing Python, TypeScript, and Bash scripts move directly into Kestra Script tasks with no modification. Logic that was spread across multiple Windmill script steps gets reorganized into a single YAML workflow file, with task inputs and outputs handled by Kestra's output system. Teams typically migrate flow by flow, running both platforms in parallel until the Kestra version is validated in production."
  - question: Can Kestra and Windmill run in parallel?
    answer: "Yes. Kestra can trigger Windmill flows via HTTP webhook, and Windmill can call Kestra workflow executions through the Kestra API. Teams running both sometimes use Windmill for developer scripts and internal apps while using Kestra for data pipeline orchestration that requires the 1200+ plugin ecosystem."
  - question: How does Kestra handle multi-tenancy compared to Windmill?
    answer: "Kestra uses namespace isolation out-of-the-box: teams, environments, and projects get separate namespaces with scoped RBAC, secrets, and execution history. Windmill uses workspaces with role-based access. For enterprise deployments with strict tenant separation, Kestra's namespace model maps cleanly to team and environment boundaries without requiring separate deployments."
