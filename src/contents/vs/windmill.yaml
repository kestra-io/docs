title: "Kestra vs. Windmill: Workflow Orchestration at Scale, Not Just Developer Scripts"
description: "Compare Kestra vs Windmill: YAML-first orchestration with 1200+ native plugins vs a code-first developer platform for scripts, flows, and internal apps. See use cases, setup, and which architecture fits your team."
competitorName: Windmill
category: Data Orchestration
shortDescription: "Developer scripts and flows platform vs. YAML-first workflow orchestration with 1200+ plugins at scale."

brandColor:
  color: "#3B82F6"

intro:
  title: "Kestra vs. Windmill: Workflow Orchestration at Scale, Not Just Developer Scripts"
  description: "Windmill is a developer platform for writing scripts, building flows, and creating internal apps, all in code. Kestra is a workflow orchestration platform built around declarative YAML, 1200+ pre-built plugins, and first-class event-driven triggers. Both run workflows; they're built for different teams with different scope requirements."

philosophy:
  mainTitle: Two Platforms Built for Different Jobs
  kestra:
    title: "Declarative Orchestration: YAML Coordinates, Code Executes"
    description: "YAML describes what should run, when, and in what order. Business logic lives in your existing Python, SQL, Bash, or dbt scripts. No framework wrappers, no code refactoring required. Kestra handles scheduling, retries, dependencies, and observability as first-class YAML primitives, and scales from a single pipeline to 100,000 concurrent tasks."
    subCardText: '"How do we orchestrate data pipelines, infrastructure jobs, and business workflows in a format every engineer and analyst can read?"'
  competitor:
    title: Code-First Developer Platform
    description: "Windmill is an all-in-one platform for scripts, flows, and internal apps. Write steps in Python, TypeScript, Go, or Bash; connect them in a visual DAG editor; optionally build a low-code UI on top. Windmill is built for developer productivity and internal tooling as much as for workflow automation. The authoring model is code throughout."
    shadowColor: "#DBEAFE"
    subCardBg: "var(--ks-background-blue-light)"
    subCardText: '"How do we let our engineering team write scripts, build lightweight automations, and ship internal tools without a dedicated platform team?"'

businessValue:
  mainTitle: "Internal Developer Tooling vs. Enterprise Workflow Orchestration"
  kestra:
    title: Orchestration for Data and Engineering Teams
    list:
      - "Data pipelines, infrastructure automation, business processes, AI workflows"
      - "1200+ plugins: dbt, Airbyte, Spark, Snowflake, Kafka, Databricks, and more"
      - "Event-driven at core: file arrivals, Kafka, webhooks, database changes, schedules"
      - "YAML-first: any engineer can read, modify, and run a workflow"
      - "Enterprise RBAC with namespace isolation and SSO/SAML"
  competitor:
    title: Scripts, Flows, and Internal Apps
    list:
      - "Write scripts in Python, TypeScript, Go, Bash, SQL, PHP, Rust, or C#"
      - "Build flows as DAGs in a visual editor with OpenFlow format"
      - "Low-code app builder for internal tools with auto-generated UIs"
      - "Sub-20ms job overhead, designed for speed"
      - "Limited native data pipeline plugin library"
    shadowColor: "#DBEAFE"
    bulletColor: "#3B82F6"
  footerText: "Windmill is the right choice for developer teams who need a single platform for writing scripts, building lightweight flows, and shipping internal apps without a dedicated infrastructure team. Kestra is the right choice for data engineers, infrastructure teams, and enterprises who need YAML-first orchestration, 1200+ pre-built integrations, and the ability to scale from one pipeline to 100,000 concurrent tasks."

setupSpeed:
  title: Time to First Workflow
  subtitle: "Windmill offers both a cloud service (windmill.dev) and a self-hosted Docker deployment. This comparison uses their cloud path—sign up via SSO, write step code in the web IDE, and wire steps into a flow."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready (database and config included). Open the UI, pick a Blueprint, run it. No code to write before your first workflow executes."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: "~15"
      two: Minutes
    description: "Sign up via GitHub SSO, enter the web IDE, write your first script step, connect it into a flow, wire inputs and outputs between steps, and run. Each step is code you write; there are no pre-built plugin tasks to drop in for dbt, Airbyte, or Snowflake."
    shadowColor: "#DBEAFE"
    command: |
      # Cloud: sign up at windmill.dev (free tier available)
      # Then in the web IDE:

      # Step 1: Write a script step (Python or TypeScript)
      # Step 2: Create a flow, add the step
      # Step 3: Wire step inputs/outputs
      # Step 4: Add a schedule trigger
      # Step 5: Run and monitor

      # Self-hosted option:
      docker compose up -d
      # Then go through the same authoring steps...
    lang: sh

easeOfUse:
  title: Two Ways to Build a Scheduled Pipeline
  kestra:
    title: "Kestra: One file, one workflow"
    description: "YAML is readable on day 1. Our docs are embedded in the UI for easy reference, the <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes workflows for you, or start with our library of Blueprints. No code required to run a dbt model, trigger an Airbyte sync, or load data to Snowflake."
    code: |
      id: daily_etl
      namespace: data.production

      tasks:
        - id: extract
          type: io.kestra.plugin.scripts.python.Script
          script: |
            # Your existing extraction logic, unchanged
            result = {"records": 1000}

        - id: transform
          type: io.kestra.plugin.dbt.cli.DbtCLI
          commands:
            - dbt run --select staging

        - id: notify
          type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
          url: "{{ secret('SLACK_WEBHOOK') }}"
          messageText: "ETL complete: {{ outputs.extract.vars.result.records }} records processed"

      triggers:
        - id: daily
          type: io.kestra.plugin.core.trigger.Schedule
          cron: "0 0 * * *"
    lang: yaml
  competitor:
    title: "Windmill: Each step is a script, wired in the editor"
    description: "Windmill flows are built by writing individual script steps and wiring their inputs and outputs in the visual flow editor. Each integration with dbt, Slack, or an external system requires writing and maintaining the connection code yourself. The steps are readable to developers; the flow topology lives in the visual editor or the underlying OpenFlow JSON."
    shadowColor: "#DBEAFE"
    code: |
      # Step 1: extract.py (a Windmill script step)
      def main():
          # Your extraction logic
          return {"records": 1000}

      # Step 2: run_dbt.py (a separate script step)
      import subprocess
      def main():
          subprocess.run(["dbt", "run", "--select", "staging"], check=True)

      # Step 3: notify_slack.py (another script step)
      import httpx, os
      def main(records: int):
          httpx.post(os.environ["SLACK_WEBHOOK"],
                     json={"text": f"ETL complete: {records} records processed"})

      # Connect these steps in Windmill's visual flow editor
      # Add a cron schedule via the UI
    lang: python

