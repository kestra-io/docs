platformStrengths:
  title: Kestra Is Built for the Workflows That Power Your Data Stack
  features:
    - title: No modeling tool, no XML schema to learn
      description: "A Kestra workflow is a YAML file you open in any text editor, write tasks into, and commit to Git. There is no visual modeler to install, no schema to learn, and no gap between what you write and what runs. Engineers who know YAML can build and modify workflows without learning a new modeling standard."
    - title: Data pipeline tooling built in
      description: "Kestra ships with 1200+ pre-built plugins for dbt, Airbyte, Spark, Snowflake, BigQuery, Kafka, Databricks, and the full modern data stack. Each is a YAML task type, not a custom worker you write and maintain. Add any data integration to your workflow in minutes without writing glue code."
    - title: Scheduling and event triggers as first-class primitives
      description: "Cron schedules, S3 file arrivals, Kafka message consumption, webhook callbacks, and database row changes are YAML trigger blocks defined alongside the workflow. No external scheduler to configure or manage. Triggers, tasks, and retries live in one file, version-controlled with your code."

decisionGuide:
  mainTitle: Two Tools for Different Problems
  kestra:
    title: Choose Kestra When
    list:
      - "You're orchestrating data pipelines, ETL workflows, dbt models, or infrastructure automation."
      - "Your team wants to define workflows in YAML without learning BPMN or running a visual modeler."
      - "You need 1200+ pre-built data and infrastructure integrations without writing job workers."
      - "Setup time matters: first workflow in 5 minutes with Docker Compose, no BPMN modeling required."
      - "Non-engineers need to trigger workflows via self-service forms, not participate in process design."
  competitor:
    title: Choose Camunda When
    list:
      - "You're automating complex enterprise business processes with structured approval steps and human task assignment."
      - "Your organization requires BPMN 2.0 process portability, audit trails, and compliance with SOC2, ISO 27001, or TISAX."
      - "Business analysts and developers collaborate on process design, and a shared visual modeling language bridges that gap."
      - "Long-running case management workflows with dynamic branching and human decision points are core to your use case."
    shadowColor: "#FFE5D0"
    bulletColor: "#FC5D0D"

commonQuestions:
  - question: Can Kestra replace Camunda for business process management?
    answer: "For technical workflows, data pipelines, and infrastructure automation, yes. Kestra handles scheduling, event-driven triggers, retries, and multi-step dependencies in YAML. For use cases that require BPMN 2.0 process portability, structured human task queues, or compliance certifications like ISO 27001 and TISAX, Camunda is purpose-built. Where the two overlap is in automating processes that mix data pipeline steps with business logic; a pipeline that extracts, transforms, notifies a Slack channel, and waits for an approval before loading to production runs cleanly in Kestra without a separate modeling artifact."
  - question: Does Kestra support human-in-the-loop workflows?
    answer: "Yes. Kestra includes native task types for human approval steps, pausing execution and waiting for input before continuing. Business users can interact through Kestra Apps without writing code. Camunda's Tasklist is more fully featured for structured human task management, with assignment rules, priorities, and forms purpose-built for approval-heavy processes in regulated industries."
  - question: How does Kestra connect to the data tools my team already uses?
    answer: "Kestra ships with 1400+ plugins covering dbt, Airbyte, Spark, Snowflake, BigQuery, Kafka, Databricks, Redshift, PostgreSQL, and more—each a YAML task type that runs without any additional code. Camunda offers Connectors for common services, but the catalog is significantly smaller. For anything not covered by a pre-built connector, you write and deploy a job worker in Java, Node.js, or another supported SDK."
  - question: What does migration from Camunda to Kestra look like?
    answer: "Kestra workflows are YAML-native, so migration means translating BPMN service tasks into Kestra task definitions and replacing Camunda job workers with script tasks. Your existing Python, SQL, and Shell logic runs unchanged inside Kestra Script tasks. Teams typically run both platforms in parallel during transition, migrating process by process."
  - question: How does Kestra handle compliance and audit requirements?
    answer: "Kestra logs every workflow execution with full input, output, and timing detail. Enterprise deployments include audit logs for every action, namespace-level RBAC, SSO/SAML, and secrets management integration. Kestra holds SOC2 Type II certification. Camunda additionally carries ISO 27001 and TISAX certifications, which may be required in specific regulated verticals like automotive or defense."
  - question: Can Kestra and Camunda run in parallel?
    answer: "Yes. Kestra can trigger Camunda processes via its HTTP plugin or REST API task, and Camunda can call Kestra workflows through the Kestra API. Teams running both platforms commonly use Kestra for data pipeline orchestration and Camunda for business process management, connecting the two at handoff points via API calls."
