title: "Kestra vs. Broadcom Dollar Universe: Modern Orchestration vs. Legacy Workload Automation"
description: "Compare Kestra vs Broadcom Dollar Universe: declarative YAML workflow orchestration vs proprietary UPROC-based enterprise workload automation. See features, setup time, and use cases."
competitorName: Broadcom Dollar Universe
category: Infrastructure Automation
shortDescription: "Proprietary UPROC-based enterprise workload automation vs. modern declarative YAML orchestration."

brandColor:
  color: "#cc092f"

intro:
  title: "Kestra vs. Broadcom Dollar Universe: Modern Orchestration vs. Legacy Workload Automation"
  description: "Broadcom Dollar Universe has managed enterprise batch workloads in large organizations for decades, especially across European financial services, telecom, and manufacturing. Kestra is what organizations choose when they need event-driven orchestration, developer self-service, and workflows that live in Git rather than a proprietary GUI."

philosophy:
  mainTitle: Two Generations of Automation
  kestra:
    title: "Modern Orchestration: Declarative, Developer-Owned"
    description: "Open-source orchestration platform built on declarative YAML and an API-first architecture. Every workflow is a version-controlled file, deployable through CI/CD, and runnable by any team without waiting on a central operations group. React to events in real time or run on schedule in the same platform."
    subCardText: '"How do I let my teams automate their own workflows without creating a ticketing bottleneck?"'
  competitor:
    title: Centralized Enterprise Workload Scheduling
    description: "Enterprise workload automation platform organized around UPROCs (units of processing), Sessions, and Units. Jobs are defined and managed through a central GUI or CLI, deployed via agents on each target host, and operated by a dedicated automation team. A proven platform for large-scale overnight batch runs in regulated industries."
    shadowColor: "#FFE0E0"
    subCardBg: "var(--ks-background-red-light)"
    subCardText: '"How do I reliably run and monitor complex batch job chains across our server estate?"'

businessValue:
  mainTitle: "Batch Scheduling Manages What You Have.<br />Workflow Orchestration Builds What Comes Next."
  kestra:
    title: Business-critical Workflows
    list:
      - React to events as they happen, not on the next scheduled window
      - Developer self-service with namespace isolation and RBAC
      - Version-controlled workflows in Git, reviewed in pull requests
      - "Cross-functional: data pipelines + infrastructure + business processes"
      - No agent installation on target hosts
  competitor:
    title: Enterprise Batch Workload Management
    list:
      - Large-scale overnight batch job chains
      - Central automation team manages all UPROC definitions
      - Proprietary terminology (UPROC, SESS, UNIT) and tooling
      - Agent required on every target execution host
      - Enterprise-only licensing with high total cost of ownership
    shadowColor: "#FFE0E0"
    bulletColor: "#CC0000"
  footerText: "Broadcom Dollar Universe is a strong choice if your organization has a large, established batch workload estate managed by a trained central team, particularly in regulated European industries where Dollar Universe is already the standard. For organizations moving toward event-driven pipelines, GitOps deployment practices, or developer self-service automation, Kestra provides a faster modernization path without proprietary tooling lock-in."

setupSpeed:
  title: Time to First Workflow
  subtitle: "Broadcom Dollar Universe requires server installation, a supported database backend, license server configuration, agent deployment to every target host, and familiarization with its UPROC/Session/Unit terminology before you can define and run your first job."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready (database and config included). Open the UI, pick a Blueprint, run it. No agents to deploy, no proprietary terminology to learn."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: "~2"
      two: Days
    description: "Requires Dollar Universe server setup, database backend configuration, license server activation, agent installation and registration on each target host, and training on UPROC/Session/Unit concepts before the first job runs."
    shadowColor: "#FFE0E0"
    command: |
      # 1. Install Dollar Universe server (UNIXws) and configure database
      # 2. Activate license and configure license server

      # 3. Install and register agent on each target host
      ./du_agent_setup.sh --server du-server.corp:8080 --unit PROD_UNIX_01

      # 4. Define a UPROC (unit of processing) via CLI
      uspuni ADD UPROC=DAILY_ETL \
        UNIT=PROD_UNIX_01 \
        CMD="python /etl/daily_report.py" \
        SESS=BATCH_NIGHTLY \
        SCAL=WORKDAYS
    lang: sh

easeOfUse:
  title: Workflows Your Whole Team Can Read
  kestra:
    title: "Kestra: Version-Controlled Workflows Anyone Can Read"
    description: "YAML is readable on day 1. The <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes workflows from a prompt, or start from our library of Blueprints. Every change goes through a pull request. No proprietary CLI syntax, no central team dependency."
    code: |
      id: daily_etl
      namespace: finance

      triggers:
        - id: nightly
          type: io.kestra.plugin.core.trigger.Schedule
          cron: "0 22 * * 1-5"

      tasks:
        - id: run_etl
          type: io.kestra.plugin.scripts.python.Script
          script: |
            import pandas as pd
            df = pd.read_sql("SELECT * FROM transactions", con=db_engine)
            df.to_csv("/tmp/daily_report.csv")

        - id: notify
          type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
          url: "{{ secret('SLACK_WEBHOOK') }}"
          messageText: "Nightly ETL complete"
    lang: yaml
  competitor:
    title: "Broadcom Dollar Universe: UPROC Definitions in a Proprietary CLI"
    description: "Jobs are defined as UPROCs using Dollar Universe's own CLI (uspuni) or through the UniViewer GUI. There is no native Git integration. Changes go through the central automation team. UPROCs, Sessions, and Units are platform-specific concepts with no portable equivalent outside Dollar Universe."
    shadowColor: "#FFE0E0"
    code: |
      # Define UPROC via uspuni CLI
      uspuni ADD UPROC=DAILY_ETL \
        UNIT=PROD_UNIX_01 \
        SESS=BATCH_NIGHTLY \
        CMD="python /etl/daily_report.py" \
        SCAL=WORKDAYS \
        STARTTM=2200 \
        RETRY=3

      # Define successor UPROC for notification
      uspuni ADD UPROC=NOTIFY_SLACK \
        UNIT=PROD_UNIX_01 \
        SESS=BATCH_NIGHTLY \
        CMD="/scripts/notify_slack.sh 'Nightly ETL complete'" \
        PRED=DAILY_ETL \
        PREDC=OK
    lang: sh

