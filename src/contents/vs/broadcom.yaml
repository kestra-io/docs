platformStrengths:
  title: Kestra Is Built for How Modern Teams Work
  features:
    - title: Workflows in Git, not a proprietary GUI
      description: "Define workflows in YAML, commit to Git, review in pull requests, deploy through CI/CD. No UPROC to export, no change request to submit. Rollback is a git revert."
    - title: No agents, no host registration
      description: "Kestra executes tasks in isolated containers on its own workers. Add a new server or cloud environment without touching scheduler config or running an agent installer. Worker groups target namespaces, so routing production jobs to production infrastructure is a YAML field, not an agent configuration."
    - title: Every team owns their automation
      description: "Kestra's namespace isolation gives each team its own workspace with RBAC guardrails. A finance team and a data engineering team each manage their own workflows independently. The platform team sets policies without becoming the bottleneck for every job change."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "Your teams submit change requests to a central automation team for every job change. Self-service is the goal."
      - "You need event-driven triggers: file arrivals, webhook calls, API events, not just calendar-based batch windows."
      - "Workflows need to live in Git, go through pull request review, and deploy like the rest of your software."
      - "You're modernizing legacy batch workloads to modern data pipelines, dbt models, or cloud-native jobs."
      - "Open-source licensing and predictable pricing matter more than an existing enterprise support contract."
  competitor:
    title: Choose Broadcom Dollar Universe When
    list:
      - "Your organization runs large-scale batch workloads in a regulated European industry and Dollar Universe is already the certified standard."
      - "You have a trained central automation team managing thousands of UPROCs and changing platforms would be high-risk and disruptive."
      - "Cross-platform batch scheduling across mainframe, Unix, Linux, and Windows is a core requirement with existing certified connectors."
      - "Long-term Broadcom enterprise support contracts and compliance certifications are organizational requirements."
    shadowColor: "#FFE0E0"
    bulletColor: "#CC0000"

commonQuestions:
  - question: How do I migrate from Broadcom Dollar Universe to Kestra?
    answer: "Migration is incremental. Run Kestra alongside Dollar Universe: new workloads go to Kestra while existing UPROCs stay on Dollar Universe until teams are ready to move them. Translate each UPROC to a Kestra Script task, UPROC dependencies (PRED/PREDC) to task ordering, and Session/Unit groupings to Kestra namespaces. Most organizations migrate by team or by workload category over several months, with both platforms running in parallel throughout."
  - question: Does Kestra support the same scheduling and dependency features as Dollar Universe?
    answer: "Yes. Kestra supports cron-based scheduling, calendar-based triggers, file-arrival triggers, and explicit task dependencies within a flow. You can chain workflows using subflow tasks, pass outputs between steps, and configure retry policies per task. All of it is defined in YAML files that live in Git, rather than in a proprietary CLI or GUI managed by a central team."
  - question: Can Kestra run in the same on-premises environments Dollar Universe covers today?
    answer: "Yes. Kestra deploys on any infrastructure running Docker or Kubernetes, including on-premises data centers and air-gapped environments. For air-gapped deployments, Kestra supports fully offline installation with a private container registry. Deploy Kestra workers into specific server environments and assign them to namespaces: a workflow in the 'finance-prod' namespace runs only on finance production workers, with no agent installer required on the target hosts."
  - question: What about enterprise features like RBAC, audit logs, and compliance?
    answer: "Kestra Enterprise includes RBAC with namespace isolation, full execution audit logs for every task run, SSO via SAML and OIDC (compatible with Entra ID, Okta, and LDAP), and secrets management integration with HashiCorp Vault, AWS Secrets Manager, and Azure Key Vault. For regulated industries with SOC 2 Type II or GDPR requirements, Kestra Cloud is SOC 2 Type II certified and GDPR compliant."
  - question: How does Kestra handle the large job volumes Dollar Universe manages in production?
    answer: "Kestra scales horizontally by adding worker nodes. FILA runs 2.5 million monthly executions across 2,000+ workflows. Leroy Merlin manages 5,000+ workflows with 250+ active users. The architecture runs on Java with PostgreSQL or Kafka for state storage, and distributed execution handles high-concurrency workloads. For very large batch estates, Kestra Enterprise includes execution concurrency controls and worker group routing to prevent resource contention."
  - question: Is there a Dollar Universe migration guide or professional services support?
    answer: "Documentation, Blueprints, and community support cover the standard migration patterns from legacy schedulers, including parallel deployment and incremental cutover by team or workload type. For large-scale enterprise migrations, Kestra's professional services team can assist with namespace design, worker topology, and UPROC-to-flow translation. Contact the Kestra team to discuss your specific workload estate."
