platformStrengths:
  title: Kestra Is Built for How Engineering Teams Work
  features:
    - title: No Azure subscription required
      description: "Kestra runs anywhere Docker runs: AWS, GCP, Azure, on-premises, or a laptop. Multi-cloud teams get one orchestration layer without being tied to a single vendor's pricing, regional footprint, or subscription model. Your workflows deploy identically across environments."
    - title: YAML that engineers can own
      description: "Kestra workflows are YAML files from day one: they live in your repository, go through code review, and deploy through CI/CD the same way as application code. Every change is a readable diff and every deployment is traceable — no portal required."
    - title: Orchestrate beyond data movement
      description: "Kestra handles the full lifecycle: ingesting data, running transformations, triggering infrastructure provisioning, coordinating model training, waiting for approvals, and notifying downstream teams — all from a single YAML definition with shared observability and retry logic across every step."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "Your team works across multiple clouds or on-premises and needs one orchestration layer without Azure lock-in."
      - "Workflows go beyond data movement: infrastructure automation, AI workloads, and business processes need to run from the same platform."
      - "Engineers need to own their workflows through Git, pull requests, and CI/CD, not the Azure portal."
      - "Cost predictability matters. ADF's per-activity pricing compounds quickly at high execution volumes."
      - "Open source and air-gapped deployment are requirements."
  competitor:
    title: Choose Azure Data Factory When
    list:
      - "Your data estate is Azure-native and you want managed ETL with no infrastructure to operate."
      - "Deep out-of-the-box integration with Synapse, Azure Data Lake, or SQL Data Warehouse is a priority."
      - "Your data team is already invested in the Azure portal and prefers visual pipeline authoring."
      - "SSIS lift-and-shift is on your roadmap. ADF has a built-in SSIS Integration Runtime."
    shadowColor: "#0078D4"
    bulletColor: "#2B7EC1"

commonQuestions:
  - question: How is Kestra different from Azure Data Factory?
    answer: "Azure Data Factory is a managed ETL service for moving and transforming data within the Azure ecosystem. Kestra is an open-source workflow orchestration platform that runs on any cloud or on-premises, handles use cases beyond data movement (infrastructure, AI, business processes), and defines workflows in declarative YAML that lives in Git. ADF is Azure-managed with consumption-based pricing. Kestra is open source, self-hosted or managed, and not tied to one cloud provider."
  - question: Can Kestra connect to Azure services?
    answer: "Yes. Kestra has plugins for Azure Blob Storage, Azure Data Lake, Azure SQL Database, Azure Service Bus, and Azure Key Vault. Pipelines that run in ADF today can be rebuilt in Kestra with the same connectivity but without the Azure subscription dependency. Teams running hybrid architectures use Kestra to orchestrate across Azure, AWS, and on-premises from a single workflow definition."
  - question: How does Kestra handle version control compared to ADF?
    answer: "Kestra workflows are YAML files that live in your Git repository from day one, go through pull requests, and deploy through CI/CD. ADF pipelines are authored in the Azure portal. Getting them into version control requires connecting to Azure DevOps or GitHub, then exporting JSON definitions. Even with that integration, the JSON is verbose and hard to review. Kestra's YAML is designed to be read and modified by any engineer on the team."
  - question: How do the pricing models compare?
    answer: "Kestra's open-source edition is free: run it on your own infrastructure with 1200+ plugins and no per-execution fees. Enterprise features (RBAC, SSO, audit logs, multi-tenancy) are available on Kestra Enterprise and Kestra Cloud. ADF charges per activity run, per data integration unit (DIU) hour for data flows, and per pipeline execution. At high execution volumes those per-activity costs compound quickly, and teams running thousands of pipelines daily often find Kestra's self-hosted model significantly cheaper."
  - question: Can Kestra and ADF run side by side during a migration?
    answer: "Yes. A common approach is routing new workflows through Kestra while existing ADF pipelines continue running. Kestra can trigger on the same events that feed ADF today (Azure Blob Storage writes, Service Bus messages, schedules) and operate in parallel. Start with net-new orchestration in Kestra, migrate existing pipelines incrementally, and decommission ADF once the transition is complete."
  - question: Does Kestra support SSIS packages like ADF?
    answer: "Kestra does not have native SSIS package execution support. If SSIS lift-and-shift is a primary requirement and you want Azure-managed infrastructure, ADF's SSIS Integration Runtime is purpose-built for that transition. For teams that have moved past SSIS and need to orchestrate modern data stacks alongside infrastructure and AI workflows, Kestra handles all of it without requiring an Azure subscription."
