platformStrengths:
  title: What Kestra Brings to Engineering and Data Teams
  features:
    - title: Data pipelines as first-class workflows
      description: "1,200+ native plugins cover dbt, Airbyte, Spark, Snowflake, BigQuery, Databricks, and every major data warehouse, cloud provider, and message queue. Data engineers define ETL pipelines in the same declarative YAML they use for event-driven and business workflows, with DAG visualization and retry semantics for data-specific failures as standard. One platform, one operational model, for both data and business automation."
    - title: Self-hosted with complete data control
      description: "Kestra deploys on Docker or Kubernetes on any infrastructure, including air-gapped environments and on-premises clusters. Workflow definitions, execution logs, and secrets stay on your infrastructure. For teams in regulated industries where data residency is a hard requirement, self-hosted Kestra keeps every piece of execution inside the perimeter you control."
    - title: Workflows in Git, deployable like code
      description: "Every Kestra flow is a YAML file reviewed in a pull request, versioned in Git, and deployed through the same CI/CD pipeline as your application code. When an automation breaks, git blame and commit history tell you exactly what changed and when. Automation gets the same review, audit, and rollback process as any other production system."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "Your team needs data pipelines, ETL, or infrastructure automation alongside business process workflows."
      - "Data residency or compliance requires self-hosting, with execution staying on your own infrastructure."
      - "Workflows must live in version control, pass code review, and deploy through CI/CD."
      - "You want cost to scale with infrastructure, not with connector volume or enterprise licensing."
      - "Your engineers own the workflow layer and need observability, retries, and Git history."
  competitor:
    title: Choose Tray.ai When
    list:
      - "Your primary need is consolidating enterprise SaaS integrations across Salesforce, ServiceNow, Workday, and similar systems."
      - "You are deploying AI agents at scale and need built-in MCP governance, guardrails, and identity controls."
      - "Business and IT teams need to build and modify automations without engineering ownership."
      - "Enterprise compliance and a managed cloud platform matter more than self-hosting flexibility."
      - "You want a single platform for integration, AI agents, and API management under centralized governance."
    shadowColor: "#D0DCF0"
    bulletColor: "#1E3A8A"

commonQuestions:
  - question: How do I migrate from Tray.ai to Kestra?
    answer: "Map each Tray.ai workflow step to the equivalent Kestra plugin. HTTP connectors, schedule triggers, Slack and email notifications, and webhook-based flows translate directly. For Tray.ai's 700+ pre-built connectors, Kestra's 1,200+ plugin library covers the most common enterprise targets: Salesforce, AWS, GCP, Azure, databases, and data warehouses. For systems without a native plugin, the HTTP plugin handles any REST API. Most teams migrate incrementally, starting with data and infrastructure workflows while keeping Tray.ai for complex enterprise SaaS integrations during the transition."
  - question: Can Kestra handle the enterprise app integrations Tray.ai offers?
    answer: "Kestra's 1,200+ plugins cover the most common enterprise integration targets: Salesforce, AWS, GCP, Slack, databases, data warehouses, and more. For systems without a native plugin, the HTTP plugin handles any REST API and Script tasks can call any SDK or CLI tool. Tray.ai's 700+ pre-built connectors are optimized for deep SaaS integrations with minimal custom configuration. For teams whose critical integrations involve common enterprise platforms, Kestra's coverage is sufficient. For teams that rely on Tray.ai's specific pre-built enterprise connectors for Workday, SAP, or ServiceNow, those reduce integration time."
  - question: How does Tray.ai's AI agent capability compare to Kestra's approach?
    answer: "Tray.ai's Merlin Agent Builder is purpose-built for creating and governing AI agents, with native MCP server support, identity controls, and enterprise guardrails. Kestra orchestrates AI workflows as part of broader pipelines: calling LLM APIs, processing outputs, routing results, and triggering downstream systems, all in deterministic YAML with full observability. If your primary goal is deploying governed conversational or autonomous AI agents across enterprise systems, Tray.ai is designed for that. If your AI workloads are steps inside data pipelines or infrastructure workflows that need reliable orchestration, Kestra handles that natively."
  - question: How does Kestra handle compliance requirements that Tray.ai covers?
    answer: "Kestra supports RBAC with namespace isolation, multi-tenancy, audit logs for every execution, SSO/SAML, and secrets management integration with AWS Secrets Manager, Vault, and Azure Key Vault. It is SOC 2 Type II and GDPR compliant. For teams that need self-hosting, Kestra runs in air-gapped environments and on-premise Kubernetes clusters. Tray.ai offers equivalent enterprise compliance controls as a managed cloud service. The difference is that Kestra's self-hosted deployment keeps all data on your infrastructure, while Tray.ai's compliance controls operate within their cloud."
  - question: Can Kestra and Tray.ai run in parallel during a transition?
    answer: "The two platforms operate independently. Most teams migrate in phases: data engineering and infrastructure workflows move to Kestra first, while complex enterprise SaaS integrations stay in Tray.ai until they can be re-expressed in Kestra plugins or HTTP calls. Kestra can trigger Tray.ai workflows via webhook during the transition if cross-platform orchestration is needed. The clean separation point is usually the data layer: anything that touches a data warehouse, runs a transformation, or needs version-controlled deployment moves to Kestra; anything that synchronizes enterprise SaaS state moves later."
  - question: What does self-hosting Kestra look like compared to Tray.ai's cloud model?
    answer: "Kestra deploys on Docker or Kubernetes with a single Compose file for local development and Helm charts for production. The database and queue are bundled, so there are no external dependencies to provision beyond your infrastructure. Execution logs, workflow definitions, and secrets all stay on your infrastructure. Tray.ai is fully managed, so there is no infrastructure to operate, but all workflow execution flows through Tray.ai's cloud. For teams where data residency is non-negotiable, the self-hosting trade-off is clear: you operate more infrastructure in exchange for complete control over where your data goes."
