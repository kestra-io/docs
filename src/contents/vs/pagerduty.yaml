featureGrid:
  title: "Kestra vs. PagerDuty Process Automation at a Glance"
  tableData:
    - feature: Primary use case
      kestra: Full incident lifecycle orchestration (detect, diagnose, remediate, close)
      competitor: Self-service runbook catalog and job automation
    - feature: Workflow definition
      kestra: Declarative YAML (code-first, Git-native)
      competitor: UI-based job templates (Git requires Enterprise tier)
    - feature: Event-driven triggers
      kestra: PagerDuty alerts, webhooks, Kafka, schedules, file detection, flow triggers
      competitor: Webhooks and schedules (limited queue-based triggers)
    - feature: Multi-step orchestration
      kestra: Conditions, loops, parallelism, data passing, sub-flows
      competitor: Job chaining (limited conditionals and data passing)
    - feature: Approval gates
      kestra: Inline Pause tasks with dynamic forms and resume logic
      competitor: Manual job inputs (basic, no dynamic forms)
    - feature: IaC integration
      kestra: Native Terraform, Ansible, PowerShell, Python, Pulumi
      competitor: Ansible as standalone job step (no native Terraform/IaC)
    - feature: Observability
      kestra: Full execution logs, artifact storage, Gantt view, clear error messages
      competitor: Basic job output logs (limited structured observability)
    - feature: Air-gapped deployment
      kestra: "✓ Fully supported (on-prem, Kubernetes)"
      competitor: Partial (Runbook Automation Cloud requires connectivity)
    - feature: Version control
      kestra: Native (Git, CI/CD, Terraform provider)
      competitor: Enterprise tier only
    - feature: Multi-tenancy
      kestra: Native namespace isolation with per-namespace RBAC
      competitor: Project-based RBAC (no namespace isolation)
    - feature: Licensing model
      kestra: Flat instance + worker-based pricing
      competitor: Per-host pricing—costs compound as infrastructure scales

