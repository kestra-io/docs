commonQuestions:
  - question: "How does Kestra compare to PagerDuty Process Automation (formerly Rundeck)?"
    answer: "PagerDuty Process Automation is a runbook automation tool focused on giving operations teams click-to-run access to scripts and Ansible playbooks with SSH-based execution and RBAC. Kestra provides all of that—plus complex multi-step orchestration, event-driven triggers from PagerDuty alerts and Kafka, dynamic approval forms, and built-in IaC integration. Where PagerDuty PA chains jobs with limited logic, Kestra orchestrates entire incident workflows with conditions, parallelism, retries, and data passing between steps."
  - question: "Can Kestra trigger directly from PagerDuty alerts?"
    answer: "Yes. Kestra has a native PagerDuty plugin that can trigger workflows when incidents are created or escalated. This allows fully automated first-response flows: diagnose the issue, attempt automated remediation, and only page a human if automation fails—reducing alert fatigue and mean time to resolution."
  - question: "Why did Mercy Health replace Rundeck with Kestra?"
    answer: "Mercy Health's team experienced dropped jobs in Rundeck's HA configuration and had poor visibility into what failed and why. After migrating to Kestra, they gained full execution logs, approval gates for sensitive operations, and Git-native workflow management. Their incident automation pipeline—from detection to ITSM ticket closure—now runs as a single auditable YAML workflow reviewed in pull requests."
  - question: "Does Kestra support Ansible for ops automation?"
    answer: "Yes. Kestra has a native Ansible plugin that runs playbooks as workflow tasks. Unlike PagerDuty PA where Ansible is a standalone job, in Kestra you can chain Ansible execution with pre-flight checks, approval gates, post-run validation, and ITSM updates—all in one coordinated workflow with full execution context passed between steps."
  - question: "How does Kestra handle self-service ops for non-developers?"
    answer: "Kestra Apps provide dynamic, data-backed forms for self-service operations. Forms can be populated from APIs, databases, or CMDBs—giving operators dropdowns with live infrastructure data rather than static values. Approval gates are inline YAML tasks that pause execution for human review. This gives every team member safe self-service access to powerful automation without writing code."
  - question: "Is Kestra suitable for air-gapped and regulated environments?"
    answer: "Yes. Kestra was designed for compliance-first deployments. It runs fully on-prem with no external dependencies, supports internal Postgres and S3-compatible storage, integrates with AD/OIDC for SSO, and works with enterprise secrets managers like CyberArk and HashiCorp Vault. The Austrian Ministry of Defense runs Kestra fully air-gapped—chosen specifically for its audit capabilities and on-prem readiness."
