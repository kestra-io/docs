      - "Limited conditional logic and data passing between job steps"
      - "Version control only available on Enterprise tier"
      - "No native IaC integration—Terraform and complex pipelines require extra tooling"
      - "Per-host licensing costs compound as infrastructure scales"
    shadowColor: "#06AC38"
    bulletColor: "#10B981"
  footerText: "Teams like Mercy Health replaced Rundeck/PagerDuty PA after experiencing dropped jobs, HA issues, and the inability to build multi-step remediation flows. Kestra handled their entire incident-to-resolution lifecycle—including human approval gates and ITSM ticket closure—in a single YAML workflow that could be reviewed in pull requests."

setupSpeed:
  title: "Time to First Incident Automation Workflow"
  subtitle: "Kestra starts in minutes with Docker Compose. PagerDuty Process Automation (Rundeck) requires Java, database configuration, and node setup before running a single job."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, run it, open the UI, and pick an incident automation Blueprint. Your first workflow includes a webhook trigger, automatic diagnosis step, approval gate, and ITSM ticket update—all in readable YAML."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick an Incident Automation Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: Hours
      two: of setup
    description: "PagerDuty Process Automation (formerly Rundeck) requires Java, a relational database, and node/agent configuration before running a single job. The Enterprise tier adds version control—meaning basic GitOps requires an upgrade."
    shadowColor: "#06AC38"
    command: |
      # PagerDuty Process Automation (Rundeck)
      docker run -d -p 4440:4440 rundeck/rundeck:latest
      # Then configure: DB backend, node executor,
      # ACL policies, SSH credentials, project structure...
      # Version control (Git) requires Enterprise tier
    lang: sh

easeOfUse:
  title: "Declarative Orchestration vs. UI-First Job Templates"
  kestra:
    title: "Kestra: Readable, reviewable, deployable"
    description: "YAML workflows read like documentation. The <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes them for you. Every workflow goes through Git and CI/CD—no hidden state in a UI. Approvals, retries, PagerDuty alert triggers, and ITSM integration are first-class YAML constructs."
    code: |
      id: incident_auto_remediate
      namespace: ops.incident

      triggers:
        - id: pagerduty_alert
          type: io.kestra.plugin.pagerduty.triggers.Incident
          severity: [critical, high]

      tasks:
        - id: diagnose
          type: io.kestra.plugin.scripts.python.Script
          script: |
            import subprocess
            result = subprocess.run(["kubectl", "top", "pods"], capture_output=True, text=True)
            print(result.stdout)

        - id: approval_gate
          type: io.kestra.plugin.core.flow.Pause
          onResume:
            form:
              fields:
                - id: action
                  type: SELECT
                  values: [restart_pod, scale_up, escalate]

        - id: remediate
          type: io.kestra.plugin.kubernetes.PodCreate
          namespace: production
          spec:
            restartPolicy: Never

        - id: close_ticket
          type: io.kestra.plugin.servicenow.table.Update
          table: incident
          id: "{{ trigger.incidentId }}"
          data:
            state: resolved
    lang: yaml
  competitor:
    title: "Rundeck: UI-first, limited orchestration"
    description: "PagerDuty Process Automation job definitions live in the UI by default. Multi-step flows require chaining jobs or writing inline scripts. Complex conditional logic is awkward, data passing between steps is limited, and version control requires the Enterprise tier."
    shadowColor: "#06AC38"
    code: |
      # PagerDuty/Rundeck YAML job definition (UI-first)
      # Limited multi-step orchestration
      - defaultTab: nodes
        description: Restart failing pod
        executionEnabled: true
        id: restart-pod
        name: Restart Failing Pod
        nodeFilterEditable: false
        sequence:
          commands:
          - exec: kubectl rollout restart deployment/$DEPLOYMENT
          - exec: ./notify-slack.sh "$DEPLOYMENT restarted"
          # No conditional logic, no data passing,
          # no approval gates without extra configuration
        scheduleEnabled: true
    lang: yaml

