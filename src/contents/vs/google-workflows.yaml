title: "Kestra vs. Google Workflows: Full Orchestration vs. GCP Service Coordination"
description: "Compare Kestra vs Google Workflows: multi-cloud workflow orchestration with 1200+ plugins vs Google Cloud's serverless HTTP-based service orchestration. See features, setup time, and use cases."
competitorName: Google Workflows
category: Data Orchestration
shortDescription: "GCP serverless HTTP service coordination vs. multi-cloud orchestration with 1200+ plugins."
seeHowTitle: "Orchestrate Beyond GCP Service Coordination"
seeHowBody: "See how Kestra runs code directly, connects to {totalPlugins}+ plugins, and works across every cloud — without Cloud Functions."

brandColor:
  color: "#4285f4"
  gradient: "linear-gradient(90deg, #4285f4, #669df6, #aecbfa)"

intro:
  title: "Kestra vs. Google Workflows: Full Orchestration vs. GCP Service Coordination"
  description: "Google Workflows is a clean, serverless way to coordinate Google Cloud services through HTTP calls. Kestra is what teams reach for when they need to run code directly, orchestrate across clouds, or build data pipelines that go beyond chaining API requests."

philosophy:
  mainTitle: Two Tools, Two Definitions of "Workflow"
  kestra:
    title: "Universal Orchestration: Code, Data, and Events"
    description: "Open-source platform that runs code directly in isolated containers, orchestrates data pipelines, and reacts to events from any source. Define workflows in declarative YAML, bring scripts in any language, and connect to 1200+ plugins across every major cloud and data tool."
    subCardText: '"How do I orchestrate my data pipelines and infrastructure without locking into a single cloud?"'
  competitor:
    title: GCP Service Coordination via HTTP
    description: "Serverless Google Cloud service for orchestrating HTTP endpoints and GCP APIs. Workflows chains calls to Cloud Functions, Cloud Run services, and GCP APIs using a proprietary YAML/JSON syntax. Code runs in the services being called, not in Workflows itself."
    shadowColor: "#E8F0FE"
    subCardBg: "var(--ks-background-blue-light)"
    subCardText: '"How do I coordinate my Cloud Functions and GCP services without managing infrastructure?"'

businessValue:
  mainTitle: "GCP Coordination Connects Your Cloud Services.<br />Workflow Orchestration Automates Your Business."
  kestra:
    title: Business-critical Workflows
    list:
      - Run Python, SQL, Bash, and R directly without wrapping in Cloud Functions
      - Orchestrate across AWS, Azure, GCP, and on-premises in one platform
      - 1200+ plugins covering databases, data warehouses, messaging, and more
      - Developer self-service with namespace isolation and RBAC
      - Event-driven triggers from APIs, message queues, file arrivals, and webhooks
  competitor:
    title: GCP Service Orchestration
    list:
      - Chain HTTP calls to Cloud Functions and Cloud Run services
      - GCP-native scope only
      - Proprietary Workflows DSL requires its own learning curve
      - No direct code execution (logic must live in external services)
      - Pricing per workflow step execution
    shadowColor: "#E8F0FE"
    bulletColor: "#4285F4"
  footerText: "Google Workflows is the right choice if you're already running everything on GCP, your logic lives in Cloud Functions or Cloud Run, and you need lightweight HTTP-based coordination without managing any infrastructure. For teams that run code directly, work across clouds, or need a data pipeline tool with a rich plugin ecosystem, Kestra covers more ground without the GCP dependency."

setupSpeed:
  title: Time to First Workflow
  subtitle: "Google Workflows requires a GCP project with billing enabled, enabling the Workflows API, creating a service account with appropriate IAM roles, and deploying the Cloud Functions or Cloud Run services your workflow will call before the workflow itself can do meaningful work."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready (database and config included). Open the UI, pick a Blueprint, run it. No cloud account required, no IAM to configure."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: "~30"
      two: Minutes
    description: "Requires a GCP project with billing, enabling the Workflows API, creating a service account with IAM bindings, and deploying the Cloud Functions or Cloud Run services your workflow will invoke."
    shadowColor: "#E8F0FE"
    command: |
      # 1. Enable Workflows API
      gcloud services enable workflows.googleapis.com

      # 2. Create service account and grant IAM roles
      gcloud iam service-accounts create workflows-sa
      gcloud projects add-iam-policy-binding $PROJECT_ID \
        --member="serviceAccount:workflows-sa@$PROJECT_ID.iam.gserviceaccount.com" \
        --role="roles/workflows.invoker"

      # 3. Deploy your logic as a Cloud Function or Cloud Run service
      # 4. Write the workflow YAML and deploy
      gcloud workflows deploy my-workflow \
        --source=workflow.yaml \
        --service-account=workflows-sa@$PROJECT_ID.iam.gserviceaccount.com
    lang: sh

easeOfUse:
  title: Workflows Your Whole Team Can Read
  kestra:
    title: "Kestra: Run Code Directly, No Wrappers Required"
    description: "Write Python, SQL, or Bash inline in your YAML. The <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> generates workflows from a prompt, or start from our library of Blueprints. No Cloud Functions to deploy, no service accounts to wire up per task."
    code: |
      id: daily_etl
      namespace: analytics

      triggers:
        - id: daily
          type: io.kestra.plugin.core.trigger.Schedule
          cron: "0 6 * * *"

      tasks:
        - id: run_etl
          type: io.kestra.plugin.scripts.python.Script
          script: |
            import pandas as pd
            from google.cloud import bigquery
            client = bigquery.Client()
            df = client.query("SELECT * FROM dataset.orders").to_dataframe()
            df.to_csv("/tmp/daily_report.csv")

        - id: notify
          type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
          url: "{{ secret('SLACK_WEBHOOK') }}"
          messageText: "Daily ETL complete"
    lang: yaml
  competitor:
    title: "Google Workflows: HTTP Calls to Services That Hold Your Logic"
    description: "Google Workflows does not run code. Each task calls an HTTP endpoint (Cloud Function or Cloud Run service) that you deploy and maintain separately. The orchestration YAML wires together those calls; the business logic lives elsewhere."
    shadowColor: "#E8F0FE"
    code: |
      main:
        steps:
          - run_etl:
              call: http.post
              args:
                url: https://us-central1-myproject.cloudfunctions.net/run-etl
                auth:
                  type: OIDC
              result: etl_result
          - check_etl:
              switch:
                - condition: ${etl_result.code == 200}
                  next: notify
                - condition: true
                  next: fail_step
          - notify:
              call: http.post
              args:
                url: https://us-central1-myproject.cloudfunctions.net/notify-slack
                auth:
                  type: OIDC
                body:
                  message: "Daily ETL complete"
              result: notify_result
          - fail_step:
              raise: ${etl_result}
    lang: yaml

visualPreview:
  mainTitle: One Platform for Your Entire Technology Stack
  kestra:
