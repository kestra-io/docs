platformStrengths:
  title: Kestra Is Built for What Engineering Teams Actually Orchestrate
  features:
    - title: Code runs here, not somewhere else
      description: "Kestra executes Python, SQL, Bash, and R directly in isolated containers. No Cloud Functions to deploy, no Cloud Run services to maintain. Write logic inline in your YAML or reference external scripts; Kestra handles the execution environment."
    - title: 1200+ plugins, not just HTTP
      description: "Connect to BigQuery, Snowflake, dbt, Airbyte, Kafka, S3, PostgreSQL, and 1200+ other tools with purpose-built plugins. Each plugin handles authentication, error handling, and output parsing. An HTTP call can reach any API, but a plugin understands the API."
    - title: Not tied to one cloud
      description: "Run workflows across AWS, Azure, GCP, and on-premises in a single platform. Deploy Kestra on GCP if that is your primary cloud, and still orchestrate workloads in your data center or another provider. Google Workflows cannot leave GCP."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "You need to run code directly (Python scripts, SQL queries, Bash jobs) without deploying and maintaining Cloud Functions for each task."
      - "Your workflows span more than one cloud, or include on-premises systems that Google Workflows cannot reach."
      - "You're building data pipelines that need native connections to databases, data warehouses, or tools in the modern data stack."
      - "Non-engineers need to trigger and monitor workflows without writing Workflows DSL or managing GCP IAM."
      - "Open source and self-hosted deployment matter for compliance or cost reasons."
  competitor:
    title: Choose Google Workflows When
    list:
      - "Everything you orchestrate is already on GCP and lives in Cloud Functions or Cloud Run services."
      - "You need zero infrastructure to manage and are comfortable with per-step GCP pricing."
      - "Your use case is lightweight HTTP-based coordination between GCP services, not data pipeline orchestration."
      - "Deep GCP-native integrations (Cloud Tasks, Pub/Sub, Eventarc) are central to how your system is designed."
    shadowColor: "#E8F0FE"
    bulletColor: "#4285F4"

commonQuestions:
  - question: How do I migrate from Google Workflows to Kestra?
    answer: "Translate each Workflows step to a Kestra task. HTTP call steps that invoke Cloud Functions can often become Script tasks in Kestra, moving the logic directly into the workflow definition and eliminating the Cloud Function entirely. Steps that call GCP APIs can use Kestra's GCP plugins instead of raw HTTP. Run both platforms in parallel during transition: existing Workflows handle current jobs while new ones go to Kestra."
  - question: Can Kestra still use Google Cloud services?
    answer: "Yes. Kestra has native plugins for BigQuery, Cloud Storage, Pub/Sub, Cloud SQL, Dataflow, and other GCP services. You can also deploy Kestra on GCP using GKE or Cloud Run for the server, and Cloud SQL (PostgreSQL) for state. The difference is that Kestra is not limited to GCP: a single workflow can query BigQuery, write to S3, and trigger a job in Azure without leaving the platform."
  - question: Does Kestra run without a GCP account?
    answer: "Yes. Kestra runs on any infrastructure with Docker or Kubernetes. Two commands and you have a working local instance. For production, deploy to any cloud, your own data center, or Kestra Cloud. If GCP is your primary platform, Kestra deploys there just as easily on GKE or Cloud Run, using Cloud SQL as the state backend."
  - question: How does Kestra handle the equivalent of Google Workflows' error handling and retries?
    answer: "Kestra supports task-level retry policies (fixed, exponential backoff, configurable attempt count), error handlers that run on task failure, and flow-level error tasks for cleanup and alerting. You define these inline in the YAML alongside the task they protect. Google Workflows handles retries through try/except blocks in its DSL syntax; Kestra's approach keeps retry logic declarative and colocated with the task."
  - question: What about Google Workflows' pricing model?
    answer: "Google Workflows charges per workflow step execution: $0.01 per 1,000 steps for internal steps and $0.025 per 1,000 steps for external HTTP calls. For workflows with many steps running frequently, costs accumulate. Kestra open source is free to self-host with no per-step fees. Kestra Enterprise and Kestra Cloud use a subscription model. Calculate your expected step volume against the per-step rate before choosing."
  - question: Can Kestra handle the same lightweight service coordination use cases as Google Workflows?
    answer: "Yes. Kestra's HTTP task calls any external endpoint with configurable auth, headers, body, and retry logic. If your current Google Workflows definition is primarily chaining HTTP calls, the equivalent Kestra flow is straightforward to write. You can also run those HTTP calls alongside direct code execution, database queries, and file operations in the same workflow, without deploying separate Cloud Functions for each piece of logic."
