title: "Chef vs Kestra for Infrastructure Automation"
description: "Compare Kestra vs Chef Enterprise Automation Stack (Progress Software): event-driven workflow orchestration vs. agent-based configuration management. See features, setup, and when each tool fits."
competitorName: Chef
category: Infrastructure Automation
shortDescription: "Agent-based Ruby configuration management vs. event-driven workflow orchestration in declarative YAML."
seeHowTitle: "From Configuration Management to Workflow Orchestration"
seeHowBody: "See how Kestra can orchestrate your infrastructure automation—including Chef—in declarative YAML workflows."

brandColor:
  color: "#5ce500"

intro:
  title: "Kestra vs. Chef: Workflow Orchestration vs. Configuration Automation"
  description: "Chef manages infrastructure state through Ruby cookbooks running on every node. Kestra orchestrates workflows across tools, teams, and systems in declarative YAML. One converges servers; the other coordinates everything around them."

philosophy:
  mainTitle: "Configuration Convergence vs. Workflow Orchestration"
  kestra:
    title: "Event-Driven Workflow Orchestration"
    description: "Declarative YAML workflows versioned in Git, executed in isolated containers, triggered by real-time events. Orchestrate infrastructure provisioning, data pipelines, business processes, and AI workflows from a single platform. Any engineer can build and ship workflows without learning a DSL."
    subCardText: '"How do we orchestrate multi-step operations across infrastructure, data, and business systems in one platform?"'
  competitor:
    title: "Agent-Based Configuration Management"
    description: "Chef Enterprise Automation Stack (now Progress Software) manages infrastructure through Ruby-based cookbooks and recipes. Chef Infra converges nodes to desired state via agents (chef-client) running on every managed host. Chef InSpec validates compliance, Chef Habitat packages applications, and Chef Automate provides visibility."
    shadowColor: "#5ce500"
    subCardBg: "var(--ks-background-green-light)"
    subCardText: '"How do we ensure every server converges to the correct configuration state automatically?"'

businessValue:
  mainTitle: "Orchestrate Operations vs. Converge Infrastructure"
  kestra:
    title: "Cross-Domain Orchestration"
    list:
      - "Data pipelines, infrastructure automation, business processes, and AI workflows in one platform"
      - "Event-driven triggers: webhooks, S3 uploads, Kafka messages, database changes, API events"
      - "Declarative YAML readable by any engineer on day one"
      - "Open source with 1200+ plugins, transparent pricing, and no per-node licensing"
      - "Self-service for non-engineers via Kestra Apps with approval gates"
  competitor:
    title: "Infrastructure Configuration Management"
    list:
      - "Desired-state configuration management for servers and infrastructure"
      - "Compliance as code via Chef InSpec for audit and security validation"
      - "Application lifecycle management via Chef Habitat"
      - "Chef Supermarket community cookbooks for common configurations"
      - "Per-node licensing model scales with fleet size"
    shadowColor: "#5ce500"
    bulletColor: "#5ce500"
  footerText: "Chef is the right choice when your primary need is converging servers to a desired configuration state and enforcing compliance across a fleet. Kestra is the right choice when you need to orchestrate multi-step workflows that span provisioning, configuration, data processing, approvals, and notifications—and when those workflows need to react to events rather than run on periodic convergence intervals."

setupSpeed:
  title: Time to First Workflow
  subtitle: "Chef requires installing Chef Infra Server (or using Chef SaaS), bootstrapping nodes with chef-client, writing Ruby cookbooks, and uploading them to the server. Kestra's single Docker Compose command stands up everything in a format that's already production-shaped."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready (database and config included). Open the UI, pick a Blueprint, run it."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: "Hours to"
      two: Days
    description: "Production deployment requires Chef Infra Server (or Chef SaaS), bootstrapping every managed node with chef-client, writing or sourcing Ruby cookbooks, and configuring run lists. Chef Automate adds another component for visibility and compliance dashboards. Local development is possible with Test Kitchen, but production infrastructure takes significant setup."
    shadowColor: "#5ce500"
    command: |
      # 1. Install Chef Workstation (local dev tools)
      # 2. Deploy Chef Infra Server (or use Chef SaaS)
      # 3. Bootstrap nodes with chef-client
      knife bootstrap node1.example.com \
        --ssh-user deploy --sudo \
        --run-list "recipe[base],recipe[nginx]"

      # 4. Write/customize Ruby cookbooks
      # 5. Upload cookbooks to Chef Infra Server
      knife cookbook upload my_cookbook

      # 6. (Optional) Install Chef Automate for dashboards
      # 7. (Optional) Configure Chef InSpec compliance profiles
    lang: sh

easeOfUse:
  title: "Declarative YAML vs. Ruby DSL Cookbooks"
  kestra:
    title: "Kestra: Any engineer, any language"
    description: "YAML is readable on day 1. Our docs are embedded in the UI for easy reference, the <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes workflows for you, or start with our library of Blueprints. Engineers deploy through Git, same as application code."
    code: |
      id: server_setup
      namespace: infra.config

      inputs:
        - id: hostname
          type: STRING
        - id: environment
          type: SELECT
          values: [dev, staging, prod]
        - id: packages
          type: STRING
          defaults: "nginx,prometheus-node-exporter,rsyslog"

      tasks:
        - id: provision
          type: io.kestra.plugin.terraform.cli.TerraformCLI
          commands:
            - terraform apply -auto-approve
          env:
            TF_VAR_hostname: "{{ inputs.hostname }}"

        - id: install_packages
          type: io.kestra.plugin.ansible.cli.AnsibleCLI
          commands:
            - ansible-playbook packages.yml
              -i "{{ outputs.provision.vars.ip }},"
              -e "packages={{ inputs.packages }}"

        - id: validate_compliance
          type: io.kestra.plugin.scripts.shell.Commands
          commands:
            - inspec exec compliance-profile
              -t ssh://{{ outputs.provision.vars.ip }}

        - id: notify
          type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
          url: "{{ secret('SLACK_WEBHOOK') }}"
          payload: |
            {"text": "{{ inputs.hostname }} configured in {{ inputs.environment }}"}
    lang: yaml
  competitor:
    title: "Chef: Ruby cookbooks for desired state"
    description: "Chef uses a Ruby DSL to define cookbooks and recipes that describe the desired state of a node. Recipes are executed by chef-client on each managed host during convergence runs. Writing and testing cookbooks requires familiarity with Ruby, Chef resource types, and the cookbook dependency ecosystem."
    shadowColor: "#5ce500"
    code: |
      # cookbooks/webserver/recipes/default.rb

      package %w[nginx prometheus-node-exporter rsyslog] do
        action :install
      end

      template '/etc/nginx/nginx.conf' do
        source 'nginx.conf.erb'
        owner  'root'
        group  'root'
        mode   '0644'
        variables(
          server_name: node['webserver']['hostname'],
          environment: node['webserver']['environment']
        )
        notifies :restart, 'service[nginx]'
      end

      service 'nginx' do
        action [:enable, :start]
      end

      # cookbooks/webserver/metadata.rb
      # name 'webserver'
      # version '1.0.0'
      # depends 'nginx', '~> 12.0'

      # Compliance validation (separate InSpec profile)
      # inspec exec compliance-profile -t ssh://target
    lang: ruby

