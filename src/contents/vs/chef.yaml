commonQuestions:
  - question: "Is Kestra a replacement for Chef?"
    answer: "They solve different problems. Chef is a configuration management tool that converges servers to a desired state. Kestra is a workflow orchestration platform that coordinates multi-step operations across tools and systems. Many teams use Kestra as the orchestration layer that calls Chef or InSpec as tasks within larger workflows—combining provisioning, configuration, compliance checks, approvals, and notifications in one auditable pipeline."
  - question: "Can Kestra run Chef InSpec profiles as part of a workflow?"
    answer: "Yes. Kestra's Script and Shell tasks can execute InSpec profiles against target hosts as one step in a multi-step workflow. This lets you chain InSpec compliance checks with provisioning, remediation, notification, and ticket updates—all in one YAML workflow with full audit trails."
  - question: "Chef uses agents on every node. How does Kestra execute tasks?"
    answer: "Kestra runs tasks in isolated Docker containers. There are no agents to install or maintain on target hosts. For operations that need to reach remote servers, Kestra tasks can SSH into hosts, call APIs, or invoke tools like Ansible and Terraform that handle remote execution. This means zero agent footprint and no convergence interval overhead."
  - question: "How does Kestra handle configuration management without a DSL like Chef?"
    answer: "Kestra is not a configuration management tool—it orchestrates workflows. For configuration management tasks within a Kestra workflow, you can call Ansible playbooks, Terraform modules, shell scripts, or even Chef cookbooks via the Script plugin. Kestra coordinates the when and how of running these tools, while the tools themselves handle the what."
  - question: "Chef converges every 30 minutes. How does Kestra trigger operations?"
    answer: "Kestra is event-driven at its core. Workflows trigger on webhooks, S3 uploads, Kafka messages, database changes, cron schedules, API events, or manual execution. This means operations run when something actually happens, not on a fixed convergence interval. You can also schedule workflows on any cron expression if periodic execution is needed."
  - question: "How does Kestra's pricing compare to Chef?"
    answer: "Kestra's open-source edition is free with 1200+ plugins and unlimited workflows. Enterprise features (RBAC, SSO, audit logs, multi-tenancy) are available on Kestra Enterprise and Kestra Cloud without per-node metering. Chef Enterprise Automation Stack uses per-node licensing through Progress Software, where costs scale with the number of managed nodes."
  - question: "Can I migrate from Chef to Kestra?"
    answer: "The tools serve different purposes, so migration is more about shifting your automation strategy than a direct swap. Shell scripts and compliance profiles work as-is in Kestra tasks. For configuration management, teams typically adopt Ansible or Terraform within Kestra workflows as a replacement for Chef cookbooks. Start by building new orchestration workflows in Kestra while existing Chef infrastructure continues running, then evaluate which Chef workloads can move to containerized Kestra tasks."
  - question: "Does Kestra support compliance and audit requirements like Chef InSpec?"
    answer: "Kestra provides full audit trails for every workflow execution, RBAC with namespace isolation, SSO/SAML integration, and secrets management via HashiCorp Vault, AWS Secrets Manager, and Azure Key Vault. For compliance-as-code validation, you can run InSpec profiles as tasks within Kestra workflows. The combination gives you both the compliance checks (InSpec) and the orchestration audit trail (Kestra)."
  - question: "Chef Habitat handles application packaging. What is the Kestra equivalent?"
    answer: "Kestra is not an application packaging tool. For application lifecycle automation, Kestra orchestrates CI/CD pipelines, container deployments, and release workflows using tasks for Docker, Kubernetes, Terraform, and cloud provider APIs. If your team uses Habitat for application packaging, Kestra can orchestrate the build, deploy, and promotion steps around it."
  - question: "We have hundreds of Chef cookbooks. Is incremental adoption realistic?"
    answer: "Yes. Kestra and Chef can run side by side. Start by building new orchestration workflows in Kestra—operations that involve multiple tools, approval gates, or event-driven triggers. Existing Chef cookbooks continue converging nodes as before. Over time, you can wrap Chef operations inside Kestra workflows to add orchestration, or gradually replace cookbook-managed tasks with containerized Kestra tasks as your team evolves its automation strategy."
