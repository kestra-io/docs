platformStrengths:
  title: Kestra Is Built for Engineering Teams, Not Just Business Users
  features:
    - title: Workflows in Git, not locked in the cloud
      description: "Every Kestra flow is a YAML file that lives in your repository, deploys through CI/CD, and gets reviewed like any other code change. Workato recipes are stored in Workato's cloud. Moving them between environments or auditing change history requires manual export and re-import."
    - title: Data pipelines as first-class workflows
      description: "Kestra ships native plugins for dbt, Airbyte, Spark, Snowflake, BigQuery, Databricks, and 1,200+ more. Engineers define ETL pipelines alongside business workflows in the same declarative YAML, with DAG visualization and retry semantics for data-specific failures. Workato's data pipeline recipes can move data between systems but are not built for compute-intensive transformations or long-running analytical workloads."
    - title: No per-recipe cost ceiling
      description: "Per-recipe pricing makes cost projection difficult as automation scales. Kestra runs on your infrastructure with no such ceiling: costs scale with infrastructure, not workflow count. Teams that have replaced iPaaS platforms with Kestra have reported integration cost reductions of 90% or more, including one team that cut integration spend to roughly 10% of their previous iPaaS bill."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "Your team needs data pipelines, ETL, or infrastructure automation alongside business workflows."
      - "Workflows must live in version control, pass code review, and deploy through CI/CD."
      - "Self-hosting is required for data residency, compliance, or cost predictability."
      - "You want cost to scale with infrastructure, not with the number of recipes you build."
      - "Non-engineers need to trigger and monitor workflows, not build them from scratch."
  competitor:
    title: Choose Workato When
    list:
      - "Your primary use case is connecting enterprise SaaS apps: Salesforce, Workday, ServiceNow, SAP."
      - "Business and IT teams need to build and maintain automations without engineering involvement."
      - "You need a large pre-built connector library with minimal custom integration work."
      - "Workflow governance is handled through Workato's platform rather than Git and CI/CD."
      - "You want a recognized enterprise iPaaS with Gartner Magic Quadrant validation and dedicated enterprise support."
    shadowColor: "#D1E9FF"
    bulletColor: "#0055B3"

commonQuestions:
  - question: How do I migrate from Workato to Kestra?
    answer: "Export your Workato recipes and map each trigger and action to the equivalent Kestra plugin. Scheduled triggers, webhooks, and HTTP actions translate directly. For Workato's pre-built SaaS connectors, Kestra's 1,200+ plugin library covers the most common targets including Salesforce, Slack, databases, and cloud storage. For connectors without a native Kestra plugin, the HTTP plugin handles any REST API. Most teams migrate incrementally, starting with data and infrastructure workflows while keeping Workato for complex SaaS-to-SaaS integrations."
  - question: Can Kestra automate business processes the way Workato does?
    answer: "Yes. Kestra handles business process automation through event triggers (webhooks, message queues, file arrivals), conditional logic, parallel branches, and human-in-the-loop steps via Kestra Apps. Kestra workflows are built in YAML by engineers, not visually by business users. If your business teams need to build and modify automations independently without writing YAML, Workato's visual builder gives them more direct control. If your engineering team owns the automation layer and business users only need to trigger and monitor, Kestra lets engineers apply the same review, test, and deploy practices to automation as to any other code."
  - question: Does Kestra have the enterprise connectors Workato has?
    answer: "Kestra's 1,200+ plugins cover the most common enterprise integration targets: AWS, GCP, Azure, Salesforce, Slack, databases, data warehouses, dbt, Airbyte, and more. For systems without a native plugin, the HTTP plugin handles any REST API and Script tasks can call any SDK or CLI tool. Workato's connector library is broader for niche SaaS applications, particularly in HR, finance, and ERP. For teams depending on deep Workday or SAP pre-built actions, Workato reduces integration time. For teams whose critical integrations involve common platforms, Kestra's plugin coverage is sufficient."
  - question: How does version control work in Workato vs Kestra?
    answer: "Kestra workflows are YAML files stored in Git. Every change is a commit, deployments are tracked, and rollbacks work like any other code change. Workato recipes are stored in Workato's cloud and can be exported as JSON for manual version control, with Git integration available on higher-tier plans. For teams with strict change management requirements or engineering workflows that go through code review, Kestra's Git-native approach removes the manual export step and keeps automation in the same workflow as application code."
  - question: How does pricing compare between Kestra and Workato?
    answer: "Kestra's open-source version is free to self-host; Kestra Cloud pricing is based on execution usage. Workato uses quote-based pricing tied to recipe volume and connector usage, which becomes difficult to predict as automation scales. Teams that have replaced iPaaS platforms with Kestra have reported integration cost reductions exceeding 90%. The trade-off is that Kestra requires infrastructure to operate, while Workato is fully managed with enterprise support included."
  - question: Can non-technical users use Kestra the way they use Workato?
    answer: "Kestra Apps let non-technical users trigger, monitor, and interact with workflows through a no-code interface without touching YAML or accessing the engineering UI. Business users in Kestra consume workflows built by engineers; they don't build them independently. Workato's visual recipe builder lets business teams create and modify automations without any engineering involvement. If self-service workflow creation for non-technical users is a primary requirement, Workato's model gives them more autonomy. If the engineering team owns the automation layer, Kestra Apps give those users a no-code interface to trigger and monitor without crossing into the engineering layer."
