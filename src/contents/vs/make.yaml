      - value: "+5000"
        name: Workflows created
    storyLink: /use-cases/stories/14-datamesh-at-scale-increased-its-data-production-by-900percent

platformStrengths:
  title: Kestra Is Built for Production Workloads, Not Just App Connections
  features:
    - title: No execution time ceiling
      description: "Make caps all scenario executions at 40 minutes, even on Enterprise. For dbt runs against large models, Spark jobs, file exports, or any compute-intensive data workload, that ceiling is a hard architectural constraint. Kestra flows run for as long as the task requires, from seconds to hours, with no platform-imposed limit."
    - title: Data pipelines run natively
      description: "Native plugins for dbt, Airbyte, Spark, Snowflake, BigQuery, Databricks, and 1,200+ more let data engineers define ETL pipelines in the same YAML they use for event-driven automations. Make can call a dbt Cloud API endpoint via its HTTP module, but there are no native data plugins, no DAG visualization, and no retry semantics for transformation failures."
    - title: Workflows in Git, not the browser
      description: "Every Kestra flow is a YAML file stored in your repository, deployed through CI/CD, and rolled back like any code change. Make scenarios live in Make's cloud. There is no native version control and no way to review a scenario change in a pull request before it goes live."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "Your workflows involve data pipelines, ETL, or infrastructure automation that runs longer than 40 minutes."
      - "Execution volume exceeds what per-operation credit billing can sustain at reasonable cost."
      - "Workflows must live in version control, pass code review, and deploy through CI/CD."
      - "Self-hosting is required for data residency, compliance, or full infrastructure control."
      - "Non-engineers need to trigger and monitor workflows through Kestra Apps, not build scenarios."
  competitor:
    title: Choose Make When
    list:
      - "Your automations connect multiple apps with complex routing, filtering, and data transformation, all under 40 minutes."
      - "Non-technical users need to build and modify scenarios without any engineering involvement."
      - "You need a visual representation of your automation logic to share with non-engineers."
      - "Operation volumes fit within a credit plan at predictable cost."
      - "Your use case is app-to-app integration, not data pipeline execution or infrastructure provisioning."
    shadowColor: "#EDE0FF"
    bulletColor: "#7B2FBE"

commonQuestions:
  - question: How do I migrate from Make to Kestra?
    answer: "Map each Make module to the equivalent Kestra plugin. Schedule triggers, HTTP modules, and Slack/email notifications translate directly. For Make's pre-built app connectors, Kestra's 1,200+ plugin library covers the most common targets. For anything without a native plugin, the HTTP plugin handles any REST API. Most teams migrate incrementally, starting with scenarios that are hitting Make's 40-minute execution limit or that involve data workloads better suited to a dedicated orchestration platform."
  - question: Can Kestra handle complex multi-step automation the way Make does?
    answer: "Yes. Kestra supports multi-step flows with conditional branching, parallel task execution, iterators, error handling, and subflows as first-class YAML constructs. Make's visual strength is that non-engineers can build complex routing and filtering logic without code. In Kestra, engineers write that logic in YAML, which makes it version-controllable and reviewable but requires technical ownership. If the primary requirement is non-technical users building complex automation independently, Make's visual builder has an advantage."
  - question: What is Make's 40-minute execution limit and how does it affect data workflows?
    answer: "Every Make scenario has a hard 40-minute maximum execution time across all paid plans. For simple app-to-app automation, this is not a constraint. For data workflows that run dbt models against large datasets, execute Spark jobs, or process large file exports, 40 minutes is often not enough. Kestra has no platform-imposed execution time limit, so long-running analytical workloads complete without being cut off."
  - question: How does operation-credit pricing in Make compare to Kestra's model?
    answer: "Make counts each module execution as one operation against your monthly credit quota. A scenario with five modules running hourly consumes 3,600 operations per day across a 30-day month. Free-tier users get 1,000 operations/month total; Core plan users get 10,000. Kestra's open-source version is free to self-host with no operation counting. Kestra Cloud pricing is based on execution resources rather than per-operation counting, which makes cost more predictable as workflow complexity and frequency grow."
  - question: Does Kestra have version control that Make doesn't?
    answer: "Kestra flows are YAML files in Git, so every change is a commit, every deployment is tracked, and rollbacks are a git revert away. Make scenarios are stored in Make's cloud. You can export a scenario as a JSON blueprint for manual backup, but there is no native Git integration, no pull request review process, and no structured way to compare what changed between two versions of a scenario."
  - question: Can Kestra and Make run in parallel during a transition?
    answer: "The two tools operate independently and do not conflict. Most teams use Make for existing app-to-app scenarios while moving data and infrastructure workflows to Kestra first. Kestra can also trigger Make scenarios via webhook if you need cross-platform orchestration during a transition period. Once the team is comfortable with Kestra's YAML model, the remaining Make scenarios can follow."
