title: "Kestra vs. Make: Universal Orchestration vs. Visual Scenario Automation"
description: "Compare Kestra vs Make: Open-source workflow orchestration for engineering teams vs. visual no-code automation for business teams. See features, execution limits, pricing, and use cases."
competitorName: Make
category: No-Code Automation
shortDescription: "Visual no-code scenario builder with operation credits and a 40-minute execution limit vs. production-grade orchestration with no ceiling."

brandColor:
  color: "#7B2FBE"
  gradient: "linear-gradient(90deg, #7B2FBE, #A855F7, #6D28D9)"

intro:
  title: "Kestra vs. Make: Universal Orchestration vs. Visual Scenario Automation"
  description: "Make (formerly Integromat) is a visual automation platform built around a flowchart-style scenario builder with 3,000+ app integrations and a free tier. Kestra is a workflow orchestration platform for engineering and data teams that need data pipelines, infrastructure automation, and production workflows running without operation-credit limits or 40-minute execution ceilings."

philosophy:
  mainTitle: Two Platforms, Two Automation Models
  kestra:
    title: "Engineering-Grade Orchestration for Any Workflow"
    description: "Declarative YAML orchestration platform for engineering and data teams. Define data pipelines, infrastructure automation, and business workflows in version-controlled YAML. Any event, any language, self-hosted or on Kestra Cloud, with no operation-credit billing and no execution time ceiling."
    subCardText: '"How do I build production workflows my engineering team can version, test, and operate without hitting execution ceilings?"'
  competitor:
    title: Visual Scenario Automation for Business Teams
    description: "No-code visual automation platform built around a flowchart interface. Drag-and-drop modules connect 3,000+ apps into multi-step scenarios. A free tier and low entry price make it accessible to teams that need complex multi-app automation without writing code."
    shadowColor: "#EDE0FF"
    subCardBg: "var(--ks-background-purple-light)"
    subCardText: '"How do I build a complex multi-step automation between our apps visually, without engineering help?"'

businessValue:
  mainTitle: "Scenario Automation Connects Apps.<br />Orchestration Runs Your Business."
  kestra:
    title: Production-Grade Workflow Orchestration
    list:
      - Automate data pipelines, infrastructure, and business processes in one platform
      - Self-hosted or cloud, with full data residency control
      - GitOps-native: version control, CI/CD, and Terraform for all workflows
      - RBAC, audit logs, and multi-tenancy for enterprise compliance
      - Handles 100,000+ concurrent tasks with no per-operation billing ceiling
  competitor:
    title: Visual No-Code Scenario Automation
    list:
      - 3,000+ pre-built app integrations in a visual flowchart builder
      - Free tier limited to 1,000 operations/month and 2 active scenarios
      - Paid plans start at $9/month with 10,000 operations and 1-minute scheduling
      - Maximum scenario execution time of 40 minutes on all plans
      - Cloud-first with limited on-premises agent support for Enterprise
    shadowColor: "#EDE0FF"
    bulletColor: "#7B2FBE"
  footerText: "For teams that need to automate complex multi-step app workflows visually without writing code, Make's flowchart builder is more capable than simpler two-step tools. When workflows involve data pipelines, long-running computations, infrastructure automation, or volumes beyond operation-credit quotas, Kestra is built for that scope."

setupSpeed:
  title: Time to First Workflow
  subtitle: "Make is cloud-first SaaS, so there is no infrastructure to configure. Scenarios are built entirely in the browser. The free tier limits active scenarios to two and scheduling to 15-minute intervals, which constrains how much you can test before needing a paid plan."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready (database and config included). Open the UI, pick a Blueprint, run it. No cloud account required, no operation credits, no scenario limits."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: "~15"
      two: Minutes
    description: "Sign up at make.com, create a scenario, add modules for your trigger app and action apps, connect each via OAuth, and configure the data mappings. Free tier allows 2 active scenarios with 15-minute minimum scheduling intervals."
    shadowColor: "#EDE0FF"
    command: |
      # Sign up at make.com
      # Create a scenario, add modules:

      [Trigger] Schedule
        Every day at 8:00 AM

      [Module] HTTP - Make a request
        URL: https://cloud.getdbt.com/api/v2/.../run/
        Method: POST
        Headers: Authorization: Token {{dbt_token}}

      [Module] Slack - Create a message
        Channel: #data-team
        Text: "Daily report ready"

      # Free tier: 2 ops/run, ~62 ops/month.
      # Max execution time: 40 min on all paid plans.
    lang: yaml

easeOfUse:
  title: Version-Controlled Workflows vs. Visual Scenario Builder
  kestra:
    title: "Kestra: Readable by Your Whole Team"
    description: "YAML is readable on day 1. Our docs are embedded in the UI for easy reference, the <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes workflows for you, or start with our library of Blueprints. Workflows live in Git and deploy through your existing CI/CD pipeline."
    code: |
      id: daily_report
      namespace: analytics

      triggers:
        - id: daily
          type: io.kestra.plugin.core.trigger.Schedule
          cron: "0 8 * * *"

      tasks:
        - id: run_dbt
          type: io.kestra.plugin.dbt.cli.DbtCLI
          commands:
            - dbt run --select reporting

        - id: notify
          type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
          url: "{{ secret('SLACK_WEBHOOK') }}"
          messageText: "Daily report ready"
    lang: yaml
  competitor:
    title: "Make: Flowchart scenarios for visual builders"
    description: "Make scenarios are built by connecting modules in a visual flowchart. Each module represents an app action or data transform. Scenarios support iterators, routers, aggregators, and filters for complex logic. All configuration happens in the browser with no local files."
    shadowColor: "#EDE0FF"
    code: |
      # Make scenario (built visually in-browser)
      # Conceptual structure:

      [Schedule trigger]
        Every day at 8:00 AM

      [HTTP module] Make an API call
        URL: https://cloud.getdbt.com/api/v2/.../run/
        Method: POST
        Headers:
          Authorization: "Token {{dbt_token}}"
        Body: {"cause": "Make scheduled run"}

      [Slack module] Create a message
        Channel: "#data-team"
        Message: "Daily report ready"

      # 2 operations per run. Scenario stored in Make cloud.
      # No local files. No native Git integration.
    lang: yaml

visualPreview:
  mainTitle: One Platform for Your Entire Technology Stack
  kestra:
    description: "Orchestrate data pipelines, infrastructure provisioning, business processes, and event-driven automations in one platform. No operation-credit ceiling, no execution time limit. Self-host with full control or use Kestra Cloud."
  competitor:
    description: "Build complex multi-step automations visually across 3,000+ apps. More capable than two-step tools for routing, filtering, and data transformation. Not designed for data pipeline workloads, long-running computations over 40 minutes, or infrastructure automation."
    shadowColor: "#EDE0FF"

