platformStrengths:
  title: Kestra Is Built for How Engineering Teams Work
  features:
    - title: Orchestrate beyond the warehouse
      description: "Kestra handles the full pipeline from source ingestion through warehouse transformations to downstream delivery. Trigger infrastructure changes after a load completes, coordinate downstream teams, and send results to external services — all from one YAML file. Snowflake queries become one step in a workflow that spans every system your team operates."
    - title: Workflows your team can review in Git
      description: "Kestra workflows are YAML files from day one: they go through pull requests, get reviewed alongside application code, and deploy through the same CI/CD pipeline your team already runs. Git sync, a Terraform provider, and native CI/CD hooks give your team a single standard for how workflows are versioned, reviewed, and shipped."
    - title: Language-agnostic execution
      description: "Kestra is language-agnostic: run Python, Bash, R, SQL, Node.js, or any containerized workload. Tasks execute in isolated containers on your own infrastructure, with no dependency on a specific cloud platform's runtime. Bring existing scripts and orchestrate them without rewriting or wrapping anything."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "Workflows span systems beyond Snowflake: source ingestion, infrastructure automation, downstream APIs, and business processes need to run from the same platform."
      - "Engineers need to own workflows through Git, pull requests, and CI/CD, not CREATE TASK DDL inside the warehouse."
      - "Your team works across clouds or on-premises and needs orchestration without a Snowflake account dependency."
      - "Cost predictability matters. Snowflake credit consumption compounds across high-frequency task schedules."
      - "Open source and air-gapped deployment are requirements."
  competitor:
    title: Choose Snowflake Tasks When
    list:
      - "Every step in your workflow is a SQL transformation or stored procedure that runs entirely inside Snowflake."
      - "You want scheduling with no external orchestrator to provision or operate."
      - "Your team is already deep in Snowflake and wants task coordination that requires zero context switching."
      - "Simple task trees with Snowflake Streams for change-data-capture triggering cover your use cases."
    shadowColor: "#29B5E8"
    bulletColor: "#1A8FB5"

commonQuestions:
  - question: How do I migrate from Snowflake Tasks to Kestra?
    answer: "Export your existing CREATE TASK definitions and rebuild the scheduling logic as a Kestra YAML workflow, with each stored procedure call becoming a Kestra task. The SQL itself stays in Snowflake; Kestra replaces the scheduling and dependency management layer. Start with net-new cross-system workflows in Kestra while leaving existing task trees running, then port SQL-only task trees incrementally. Because Kestra can react to the same schedules and Snowflake Stream events that currently drive your tasks, the transition can happen gradually with no hard cutover."
  - question: Can Kestra run Snowflake queries and stored procedures?
    answer: "Yes. Kestra has plugins for Snowflake that run queries, execute stored procedures, upload files via Snowflake's PUT command, and monitor execution status. Those Snowflake steps sit inside a larger workflow that also pulls from upstream sources, triggers downstream systems, runs infrastructure automation, and notifies teams, all wired together in one YAML file rather than spread across SQL objects inside the warehouse."
  - question: How does Kestra handle version control compared to Snowflake Tasks?
    answer: "Kestra workflows are YAML files in your Git repository from day one. They go through pull requests and deploy through CI/CD. Snowflake Tasks are DDL objects that live inside the warehouse. Getting them into version control requires manually exporting CREATE TASK statements and storing them as SQL files separately, with no standard format and no native CI/CD integration. The result is that task definitions often drift from what's actually running inside Snowflake."
  - question: How do the pricing models compare?
    answer: "Kestra's open-source edition is free: run it on your own infrastructure with 1400+ plugins and no per-execution fees. Enterprise features (RBAC, SSO, audit logs, multi-tenancy) are available on Kestra Enterprise and Kestra Cloud. Snowflake Tasks consume Snowflake credits each time a task runs against a virtual warehouse. For high-frequency schedules or complex task trees with many child tasks, credit consumption adds up quickly and compounds with your existing Snowflake spend."
  - question: Can Kestra and Snowflake Tasks run side by side?
    answer: "Yes. Leave existing Snowflake Tasks in place and route new cross-system workflows through Kestra. Kestra can react to the same schedules and stream events that feed Snowflake Tasks today and operate alongside them. Start with net-new orchestration in Kestra, migrate incrementally, and keep Snowflake Tasks for the SQL-only task trees that are already stable."
  - question: What about dbt with Snowflake?
    answer: "Kestra has a dbt plugin that runs dbt commands against any supported warehouse, including Snowflake. Route the full pipeline through Kestra: ingest raw data from source systems, load it into Snowflake, trigger dbt for transformations, run data quality checks, and notify downstream consumers. Snowflake Tasks can call dbt via Snowpark stored procedures, but coordinating external systems and multi-step pipelines requires building custom logic inside the warehouse, logic that then lives outside your normal code review process."
