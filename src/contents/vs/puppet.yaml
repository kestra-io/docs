platformStrengths:
  title: Kestra Is Built for How Modern Teams Work
  features:
    - title: Orchestration, not just configuration
      description: "Puppet manages what a node looks like. Kestra orchestrates what happens across systems. Provision infrastructure, run data pipelines, trigger business processes, and coordinate AI workflows in a single DAG. Multi-step workflows with dependencies, retries, error handling, and conditional branching are first-class concepts."
    - title: No agents, no DSL to learn
      description: "Puppet requires an agent on every managed node and a custom DSL to define configurations. Kestra runs tasks in isolated Docker containers with no agents to install or maintain. Workflows are written in standard YAML that any engineer can read and modify on day one, with any scripting language supported inside tasks."
    - title: Event-driven beyond periodic runs
      description: "Puppet agents pull configurations on a fixed interval (default 30 minutes). Kestra reacts to events in real time: webhooks, S3 uploads, Kafka messages, database changes, and API events are first-class YAML triggers. Combine scheduled, event-driven, and manual workflows in one platform."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "You need to orchestrate multi-step workflows across systems, not just enforce node state."
      - "You want event-driven automation that reacts to real-time events, not just periodic convergence."
      - "Any engineer should be able to build workflows in standard YAML without learning a custom DSL."
      - "You need to coordinate data pipelines, business processes, AI workflows, and infrastructure operations in one platform."
      - "Non-engineers need to trigger and monitor workflows through a self-service interface."
  competitor:
    title: Choose Puppet When
    list:
      - "You need to enforce desired state across thousands of nodes with automatic drift remediation."
      - "Compliance and audit enforcement is a primary requirement for your infrastructure."
      - "You manage a large fleet of servers and need consistent package, file, and service configuration."
      - "Your team is already invested in the Puppet ecosystem with existing modules and Hiera data."
