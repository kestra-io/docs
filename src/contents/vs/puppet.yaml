title: "Puppet vs Kestra for Infrastructure Automation"
description: "Compare Kestra vs Puppet by Perforce: Open-source workflow orchestration in YAML vs. agent-based configuration management with Puppet DSL. See features, setup, and when to use each tool."
competitorName: Puppet
category: Infrastructure Automation
shortDescription: "Agent-based configuration management with DSL vs. declarative workflow orchestration in YAML."

brandColor:
  color: "#4c00ff"

intro:
  title: "Kestra vs. Puppet: Workflow Orchestration vs. Configuration Management"
  description: "Puppet enforces desired state on infrastructure through agents and a custom DSL. Kestra orchestrates workflows across data, infrastructure, business processes, and AI in declarative YAML. Different problems, different tools."

philosophy:
  mainTitle: Orchestration vs. Configuration Management
  kestra:
    title: "Workflow Orchestration Platform"
    description: "Declarative YAML workflows versioned in Git, executed in isolated containers, deployed through CI/CD. Orchestrate data pipelines, infrastructure operations, business processes, and AI workflows from a single platform. Event-driven at its core, with any engineer able to build and ship workflows without learning a custom DSL."
    subCardText: '"How do we orchestrate workflows across teams, systems, and cloud providers without building custom glue code?"'
  competitor:
    title: Infrastructure Configuration Management
    description: "Agent-based platform that enforces desired state on managed nodes using Puppet DSL manifests. A Puppet Agent runs on every managed node, periodically pulling configurations from a Puppet Server and converging the node to the declared state. Strong at configuration drift detection and compliance enforcement."
    shadowColor: "#4c00ff"
    subCardBg: "var(--ks-background-purple-light)"
    subCardText: '"How do we ensure every server in our fleet is configured exactly the way we declared, and stays that way?"'

businessValue:
  mainTitle: "Orchestrating Workflows vs. Managing Node State"
  kestra:
    title: Cross-Domain Workflow Orchestration
    list:
      - "Data pipelines, infrastructure automation, business processes, and AI workflows in one platform"
      - "Event-driven triggers for webhooks, S3, Kafka, database changes, and API events"
      - "Any language: Python, SQL, R, Bash, Go, Node.js, and more"
      - "Open source with 1200+ plugins, transparent pricing, and a thriving community of contributors"
      - "Self-service for non-engineers via Kestra Apps"
  competitor:
    title: Infrastructure State Enforcement
    list:
      - "Declarative configuration management for servers, packages, files, and services"
      - "Agent-based convergence loop enforces desired state every 30 minutes by default"
      - "Puppet Forge ecosystem with thousands of community and supported modules"
      - "Compliance enforcement and audit reporting for regulated environments"
      - "Configuration drift detection and automatic remediation"
    shadowColor: "#4c00ff"
    bulletColor: "#4c00ff"
  footerText: "Puppet excels at ensuring infrastructure stays in a declared state through continuous enforcement. Kestra is purpose-built for orchestrating multi-step workflows that span systems, teams, and domains. Many organizations use both: Puppet to manage node configuration, and Kestra to orchestrate the broader workflows that coordinate provisioning, deployment, data pipelines, and business processes."

setupSpeed:
  title: Time to First Workflow
  subtitle: "Puppet Enterprise requires deploying a Puppet Server, installing Puppet Agents on every managed node, writing manifests in Puppet DSL, and configuring classification rules. Kestra's single Docker Compose command gives you a production-shaped environment in minutes."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready (database and config included). Open the UI, pick a Blueprint, run it."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: "Hours to"
      two: Days
    description: "Puppet Enterprise requires installing the Puppet Server (or PE monolithic install), deploying Puppet Agents on each managed node, writing Puppet DSL manifests, configuring node classification, and waiting for the first agent run to converge. The learning curve for Puppet DSL adds additional time before teams are productive."
    shadowColor: "#4c00ff"
    command: |
      # 1. Download and install Puppet Enterprise (monolithic)
      curl -JLO https://pm.puppet.com/puppet-enterprise/latest/download
      tar -xf puppet-enterprise-*.tar.gz
      sudo ./puppet-enterprise-installer

      # 2. Install Puppet Agent on each managed node
      curl -k https://puppet-server:8140/packages/current/install.bash | sudo bash

      # 3. Sign agent certificate on Puppet Server
      puppetserver ca sign --certname node01.example.com

      # 4. Write manifests in Puppet DSL
      # 5. Classify nodes (Console or Hiera)
      # 6. Wait for agent run (default: every 30 minutes)
      puppet agent -t   # or wait for scheduled run
    lang: sh

easeOfUse:
  title: Standard YAML vs. Custom DSL
  kestra:
    title: "Kestra: Any engineer, any language"
    description: "YAML is readable on day 1. Our docs are embedded in the UI for easy reference, the <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes workflows for you, or start with our library of Blueprints. Engineers deploy through Git, same as application code."
    code: |
      id: server_provision
      namespace: infra.ops

      inputs:
        - id: hostname
          type: STRING
        - id: environment
          type: SELECT
          values: [dev, staging, prod]
        - id: role
          type: SELECT
          values: [webserver, database, worker]

      tasks:
        - id: provision
          type: io.kestra.plugin.terraform.cli.TerraformCLI
          commands:
            - terraform apply -auto-approve
          env:
            TF_VAR_hostname: "{{ inputs.hostname }}"
            TF_VAR_env: "{{ inputs.environment }}"

        - id: configure
          type: io.kestra.plugin.ansible.cli.AnsibleCLI
          commands:
            - ansible-playbook site.yml
              -i "{{ outputs.provision.vars.ip }},"
              -e "role={{ inputs.role }}"

        - id: validate
          type: io.kestra.plugin.scripts.shell.Commands
          commands:
            - curl -sf http://{{ outputs.provision.vars.ip }}/health

        - id: notify
          type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
          url: "{{ secret('SLACK_WEBHOOK') }}"
          payload: |
            {"text": "{{ inputs.hostname }} provisioned as {{ inputs.role }} in {{ inputs.environment }}"}
    lang: yaml
  competitor:
    title: "Puppet: DSL manifests for desired state"
    description: "Puppet uses its own declarative DSL to define the desired state of infrastructure. Manifests describe resources (packages, files, services) and their relationships. The DSL is powerful for configuration management but requires learning Puppet-specific syntax, resource types, and concepts like classes, modules, and Hiera data lookups."
    shadowColor: "#4c00ff"
    code: |
      # site.pp - Puppet manifest for webserver role
      node 'web01.example.com' {
        include role::webserver
      }

      # modules/role/manifests/webserver.pp
      class role::webserver {
        include profile::base
        include profile::nginx
        include profile::monitoring
      }

      # modules/profile/manifests/nginx.pp
      class profile::nginx (
        String $docroot = '/var/www/html',
        Integer $port   = 80,
      ) {
        package { 'nginx':
          ensure => installed,
        }

        file { '/etc/nginx/nginx.conf':
          ensure  => file,
          content => template('profile/nginx.conf.erb'),
          notify  => Service['nginx'],
        }

        file { $docroot:
          ensure => directory,
          owner  => 'www-data',
        }

        service { 'nginx':
          ensure    => running,
          enable    => true,
          subscribe => File['/etc/nginx/nginx.conf'],
        }
      }
    lang: ruby

