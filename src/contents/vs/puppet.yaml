    shadowColor: "#4c00ff"
    bulletColor: "#4c00ff"

commonQuestions:
  - question: Is Kestra a replacement for Puppet?
    answer: "Not directly. They solve different problems. Puppet is a configuration management tool that enforces desired state on infrastructure nodes. Kestra is a workflow orchestration platform that coordinates multi-step processes across systems. Many organizations use both: Puppet to ensure servers are configured correctly, and Kestra to orchestrate the workflows that span provisioning, deployment, data pipelines, and business processes."
  - question: Can Kestra manage server configuration like Puppet does?
    answer: "Kestra is not a configuration management tool and does not run agents on managed nodes. However, Kestra can orchestrate configuration management tools as tasks within a workflow. You can call Ansible playbooks, Terraform plans, or even trigger Puppet runs as steps in a Kestra workflow, coordinating them alongside data pipelines, notifications, and approval gates."
  - question: We use Puppet for infrastructure. Why would we add Kestra?
    answer: "Puppet manages what your infrastructure looks like. Kestra orchestrates what happens across your infrastructure and beyond. If you need to coordinate multi-step processes, like provisioning a server with Terraform, configuring it with Puppet, deploying an application, running integration tests, and notifying stakeholders, that is orchestration, and that is what Kestra is built for."
  - question: How does Kestra's YAML compare to Puppet DSL?
    answer: "Puppet DSL is a Ruby-based declarative language purpose-built for describing infrastructure state: packages, files, services, and their relationships. It is powerful for configuration management but requires learning Puppet-specific syntax. Kestra uses standard YAML to define workflow steps, triggers, and inputs. Any engineer who can read YAML can understand and modify a Kestra workflow on day one, and tasks can use any programming language."
  - question: Does Kestra support drift detection like Puppet?
    answer: "Puppet's agent-based model continuously enforces desired state and detects configuration drift automatically. This is a core strength of Puppet that Kestra does not replicate. Kestra can schedule periodic validation workflows that check infrastructure state and trigger remediation, but it does not run agents on nodes. For continuous drift detection and remediation, Puppet is the right tool."
  - question: Can Kestra trigger Puppet runs as part of a workflow?
    answer: "Yes. Kestra can invoke Puppet via the Puppet Orchestrator API or by running shell commands that trigger puppet agent runs on specific nodes. This lets you use Kestra as the orchestration layer that coordinates when and why Puppet runs happen, while Puppet handles the actual configuration enforcement on each node."
  - question: How does pricing compare between Kestra and Puppet Enterprise?
    answer: "Kestra's open-source edition is free with 1200+ plugins and unlimited workflows. Enterprise features (RBAC, SSO, audit logs, multi-tenancy) are available on Kestra Enterprise and Kestra Cloud. Puppet offers open source Puppet (free) and Puppet Enterprise (commercial, per-node licensing). Puppet Enterprise pricing scales with the number of managed nodes."
  - question: Puppet has Puppet Forge. What is Kestra's equivalent?
    answer: "Puppet Forge is a module repository with thousands of infrastructure-focused modules for managing packages, services, and configurations. Kestra has 1200+ open-source plugins covering cloud providers (AWS, Azure, GCP), databases (Snowflake, BigQuery, Postgres), message queues (Kafka, RabbitMQ), CI/CD tools, AI services, and more. The ecosystems serve different purposes: Forge modules describe infrastructure state, while Kestra plugins enable workflow tasks."
  - question: We are considering replacing Puppet with Ansible. Should we look at Kestra instead?
    answer: "Ansible and Kestra serve different purposes. Ansible is a configuration management and provisioning tool (like Puppet, but agentless). Kestra is an orchestration platform. If you need to replace Puppet's configuration management capabilities, Ansible is a closer replacement. If you need to orchestrate workflows that coordinate Ansible, Terraform, data pipelines, and business processes, Kestra is the right layer above those tools."
  - question: Does Kestra require agents like Puppet does?
    answer: "No. Puppet requires a Puppet Agent running on every managed node, pulling configurations from a Puppet Server. Kestra runs tasks in isolated Docker containers with no agents to install on target systems. This means no agent maintenance, no certificate management, and no port requirements on managed hosts. Kestra communicates with external systems through APIs, plugins, and container-based script execution."
  - question: Can Kestra and Puppet work together?
    answer: "Yes, and this is a common pattern. Puppet manages the desired state of your infrastructure (packages, files, services, compliance). Kestra orchestrates the broader workflows that involve Puppet alongside other tools. For example, a Kestra workflow might provision infrastructure with Terraform, trigger a Puppet run to configure the node, deploy an application, run smoke tests, and send a Slack notification, all as steps in a single orchestrated pipeline."
