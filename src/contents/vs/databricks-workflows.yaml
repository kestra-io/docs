platformStrengths:
  title: Kestra Is Built for How Engineering Teams Work
  features:
    - title: Orchestrate beyond the lakehouse
      description: "Kestra handles the full pipeline from data ingestion through infrastructure changes and downstream notifications. Trigger Terraform runs after a data load, coordinate cross-team approvals, run dbt on any warehouse, and notify downstream services — all in one YAML file. Every system your team operates becomes one step in a unified workflow."
    - title: YAML that engineers can own
      description: "Kestra workflows are YAML files from day one: they live in your repo, go through code review, and deploy through CI/CD the same way as application code. Git sync, a Terraform provider, and native CI/CD hooks mean workflow deployment follows the same process as every other piece of infrastructure your team ships."
    - title: Multi-cloud without the Databricks dependency
      description: "Kestra runs on any infrastructure: Docker, Kubernetes, AWS, Azure, GCP, or on-premises. Trigger Spark jobs when you need distributed compute, and run everything else on your own infrastructure without per-execution overhead. One orchestrator connects every system regardless of where it runs."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "Workflows span systems beyond Databricks: infrastructure, external APIs, non-Spark workloads, and business processes need to run from the same platform."
      - "Engineers need to own workflows through Git, pull requests, and CI/CD, not the Databricks UI."
      - "Your team works across clouds or on-premises and needs orchestration without a Databricks dependency."
      - "Cost predictability matters. Databricks job compute DBU spend compounds across high-frequency schedules."
      - "Open source and air-gapped deployment are requirements."
  competitor:
    title: Choose Databricks Workflows When
    list:
      - "Your entire data workload runs inside Databricks and you want native scheduling with no external orchestrator to operate."
      - "Delta Live Tables pipelines, Unity Catalog, and Databricks-native features are central to your architecture."
      - "Your team is already deep in the Databricks ecosystem and wants orchestration that requires no context switching."
      - "Spark-native compute for every task is a hard requirement."
    shadowColor: "#FF3621"
    bulletColor: "#CC2C1A"

commonQuestions:
  - question: How do I migrate from Databricks Workflows to Kestra?
    answer: "Map your existing Databricks jobs to Kestra workflows. Each notebook or Python script task stays on Databricks; Kestra takes over the orchestration layer in YAML, triggering those same jobs via the Databricks plugin. Start with net-new pipelines to build familiarity, then port existing jobs incrementally. The transition doesn't require a cutover: Kestra and Databricks Workflows can run in parallel for as long as needed."
  - question: Can Kestra run Databricks jobs?
    answer: "Yes. Kestra has a Databricks plugin that triggers job runs, submits new cluster jobs, runs notebooks, and monitors execution status. Route the full pipeline through Kestra: extract from source systems, trigger the Databricks job for Spark-based transformation, run dbt models downstream, and notify teams on completion, all coordinated from one YAML file."
  - question: How does Kestra handle version control compared to Databricks Workflows?
    answer: "Kestra workflows are YAML files that live in your Git repository from day one. They go through pull requests and deploy through CI/CD. Databricks Workflows are built in the UI or defined as JSON via the REST API. Getting them into version control requires Databricks Repos or manually exporting and committing JSON definitions. Even with that integration, the JSON embeds cluster configuration inline, making it verbose and hard to review in a diff."
  - question: How do the pricing models compare?
    answer: "Kestra's open-source edition is free: run it on your own infrastructure with 1200+ plugins and no per-execution fees. Enterprise features (RBAC, SSO, audit logs, multi-tenancy) are available on Kestra Enterprise and Kestra Cloud. Databricks Workflows charges Databricks Units (DBUs) for job compute, on top of your underlying cloud compute costs. Teams running high-frequency schedules across many jobs often find those DBU costs significant, particularly when many tasks don't require Spark and could run on cheaper infrastructure."
  - question: Can Kestra and Databricks Workflows run side by side?
    answer: "Yes. Route new workflows through Kestra while existing Databricks jobs continue running. Kestra can trigger those jobs, react to their completion, and chain additional steps outside the lakehouse. Start with net-new orchestration in Kestra, migrate jobs incrementally, and keep Databricks Workflows for the notebook and DLT pipelines that are already stable."
  - question: Can Kestra handle the same data pipeline use cases as Databricks Workflows?
    answer: "Yes. Kestra orchestrates ETL/ELT pipelines, dbt models, data quality checks, and warehouse operations. Teams running Databricks for Spark compute can keep those jobs exactly as they are and use Kestra to coordinate the pipeline around them. The Databricks plugin triggers jobs, waits for completion, and passes outputs to downstream tasks, including DLT pipeline updates. What you gain is the ability to connect those Spark jobs to the systems before and after them without building custom glue code."
