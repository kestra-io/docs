title: "Kestra vs. Databricks Workflows: Universal Orchestration vs. Lakehouse-Native Jobs"
description: "Compare Kestra vs Databricks Workflows: Open-source, multi-cloud workflow orchestration in YAML vs. Databricks-native job orchestration. See features, pricing, setup, and use cases."
competitorName: Databricks Workflows
category: Data Orchestration
shortDescription: "Databricks-native lakehouse job scheduling vs. universal YAML orchestration for any cloud and stack."

brandColor:
  color: "#FF3621"

intro:
  title: "Kestra vs. Databricks Workflows: Universal Orchestration vs. Lakehouse-Native Jobs"
  description: "Databricks Workflows is the job orchestration layer built into the Databricks lakehouse. Kestra is open-source workflow orchestration for any cloud, any language, and use cases beyond data transformation. One is built to coordinate jobs inside Databricks. The other orchestrates everything your engineering team ships."

philosophy:
  mainTitle: Lakehouse Job Scheduling vs. Universal Orchestration
  kestra:
    title: "Open-Source Orchestration for Any Stack"
    description: "Declarative YAML workflows versioned in Git, executed in isolated containers, deployed through CI/CD. Orchestrate data pipelines, infrastructure operations, AI workloads, and business processes across AWS, Azure, GCP, or on-premises without vendor lock-in."
    subCardText: '"How do I orchestrate workflows across every part of my stack without tying everything to one platform?"'
  competitor:
    title: Databricks-Native Job Orchestration
    description: "Multi-task job scheduling built into the Databricks workspace. Chain notebooks, Python scripts, JARs, SQL tasks, and Delta Live Tables pipelines with dependency management and retry logic. Pricing runs on Databricks job compute clusters."
    shadowColor: "#FF3621"
    subCardBg: "var(--ks-background-blue-light)"
    subCardText: '"How do I coordinate my Databricks notebooks and pipelines without leaving the lakehouse?"'

businessValue:
  mainTitle: "Lakehouse Jobs Handle What's Inside Databricks.<br />Universal Orchestration Runs Your Business."
  kestra:
    title: Universal Workflow Orchestration
    list:
      - "Data pipelines, infrastructure automation, AI workloads, and business processes"
      - "Multi-cloud and on-premises: AWS, Azure, GCP, or hybrid"
      - "YAML-first: Git-native, CI/CD-ready, reviewable by any engineer"
      - "Open source with 26k+ GitHub stars and 1200+ plugins"
      - "Self-service for non-engineers via Kestra Apps"
  competitor:
    title: Databricks-Native Job Coordination
    list:
      - "Notebooks, Python scripts, JARs, SQL tasks, and Delta Live Tables pipelines"
      - "Databricks-only: jobs run on Databricks compute in your cloud account"
      - "UI-based job builder or JSON job definitions via the Databricks REST API"
      - "Consumption-based pricing on Databricks job compute clusters"
      - "No open-source version"
    shadowColor: "#FF3621"
    bulletColor: "#CC2C1A"
  footerText: "Databricks Workflows is the right choice if your entire data workload runs inside Databricks and you want scheduling that lives natively in your lakehouse. Use Kestra when your workflows span systems beyond Databricks, need to coordinate infrastructure and business processes alongside data jobs, and must live in Git with engineers deploying through CI/CD rather than the Databricks UI."

setupSpeed:
  title: Time to First Workflow
  subtitle: "Databricks Workflows runs on Databricks' cloud platform (AWS, Azure, or GCP)—there is no local install option. This comparison reflects what's required to provision a workspace, configure compute, and define your first job."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready. Database and config included. Open the UI, pick a Blueprint, run it. No cloud account, no cluster provisioning, no workspace setup."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: Hours to
      two: Days
    description: "Requires a Databricks workspace, a cloud account with compute permissions, cluster configuration, and either navigating the Jobs UI or writing JSON job definitions via the REST API. Teams also need to package notebooks and scripts into the Databricks environment before scheduling them."
    shadowColor: "#FF3621"
    command: |
      # 1. Provision Databricks workspace (AWS, Azure, or GCP)
      # 2. Configure cloud IAM and storage permissions
      # 3. Create or select a job cluster (instance type, DBR version)
      # 4. Upload notebooks or Python scripts to DBFS or repos
      # 5. Define job tasks and dependencies in the UI or via API:

      curl -X POST https://<workspace>/api/2.1/jobs/create \
        -H "Authorization: Bearer $DATABRICKS_TOKEN" \
        -d '{
          "name": "daily_etl",
          "tasks": [{ "task_key": "ingest", "notebook_task": {...} }]
        }'
    lang: sh

easeOfUse:
  title: Workflows Engineers Can Own End to End
  kestra:
    title: "Kestra: YAML that lives in Git"
    description: "YAML is readable on day 1. Our docs are embedded in the UI for easy reference, the <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes workflows for you, or start with our library of Blueprints. Every workflow is a file in your repository, reviewed in pull requests, deployed the same way as application code."
    code: |
      id: daily_etl
      namespace: data.lakehouse

      triggers:
        - id: daily
          type: io.kestra.plugin.core.trigger.Schedule
          cron: "0 6 * * *"

      tasks:
        - id: run_spark_job
          type: io.kestra.plugin.databricks.job.CreateRun
          authentication:
            token: "{{ secret('DATABRICKS_TOKEN') }}"
            host: "{{ secret('DATABRICKS_HOST') }}"
          jobId: 12345

        - id: run_dbt
          type: io.kestra.plugin.dbt.cli.DbtCLI
          commands:
            - dbt run --select marts

        - id: notify
          type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
          url: "{{ secret('SLACK_WEBHOOK') }}"
          messageText: "Daily ETL complete"
    lang: yaml
  competitor:
    title: "Databricks Workflows: JSON job definitions or UI-built configs"
    description: "Workflows are defined in the Databricks UI or as JSON via the Jobs REST API. Version control requires manually committing JSON exports or using the Databricks Repos integration. The JSON schema is verbose and Databricks-specific, with cluster configuration embedded in every job definition."
    shadowColor: "#FF3621"
    code: |
      {
        "name": "daily_etl",
        "job_clusters": [{
          "job_cluster_key": "etl_cluster",
          "new_cluster": {
            "spark_version": "13.3.x-scala2.12",
            "node_type_id": "i3.xlarge",
            "num_workers": 2
          }
        }],
        "tasks": [
          {
            "task_key": "ingest",
            "job_cluster_key": "etl_cluster",
            "notebook_task": { "notebook_path": "/pipelines/ingest" }
          },
          {
            "task_key": "transform",
            "depends_on": [{ "task_key": "ingest" }],
            "job_cluster_key": "etl_cluster",
            "notebook_task": { "notebook_path": "/pipelines/transform" }
          }
        ],
        "schedule": { "quartz_cron_expression": "0 0 6 * * ?" }
      }
    lang: json

visualPreview:
  mainTitle: One Platform for Your Entire Technology Stack
  kestra:
    description: "Orchestrate data pipelines, infrastructure operations, AI workloads, and business processes across any cloud or on-premises environment. Event-driven at its core, with native triggers for S3, webhooks, Kafka, database changes, and API events. Run Databricks jobs as one step in a broader workflow."
  competitor:
    description: "Jobs follow a task graph model: define tasks (notebooks, scripts, SQL, DLT pipelines), set dependencies, attach compute, and schedule or trigger by file arrival. All execution happens on Databricks clusters. Monitoring and logs are in the Databricks workspace UI."
