    bulletColor: "#3EAA5F"

commonQuestions:
  - question: How do I migrate from Pipedream to Kestra?
    answer: "Extract the business logic from your Pipedream JavaScript steps and run it directly as Script tasks in Kestra. Python and Shell scripts work as-is in isolated containers. Replace Pipedream's pre-built app actions with Kestra's plugin library, which covers Slack, HTTP, databases, cloud storage, and more. Define triggers (schedules, webhooks, file arrivals) in YAML, and you have the same workflow running with full version control and your choice of deployment target."
  - question: Can Kestra handle webhook-driven automation like Pipedream?
    answer: "Yes. Kestra has native webhook triggers that start workflows on HTTP events, plus event-driven triggers for Kafka, S3, database changes, and API polling. You can build the same webhook-to-action automations Pipedream is known for, with the added ability to chain those events into complex multi-step pipelines involving data transformation, infrastructure changes, or cross-team notifications."
  - question: How does Kestra handle the 2,700+ app integrations Pipedream offers?
    answer: "Kestra's 1,400+ plugins cover the most common integration targets: AWS, GCP, Azure, Slack, databases, data warehouses, dbt, Airbyte, and more. For apps not covered by a plugin, the HTTP plugin handles REST API calls to any endpoint, and Script tasks run arbitrary code in any language. Pipedream's pre-built actions reduce setup time for simple integrations. Kestra's approach gives you more control for workflows that go beyond API glue."
  - question: What are the risks of Pipedream being acquired by Workday?
    answer: "Pipedream was acquired by Workday in 2024. Platform acquisitions often bring pricing changes or product deprecations that don't fit the acquirer's roadmap. If you are building critical automation on Pipedream, start evaluating migration before that decision is made for you. Kestra's Apache 2.0 license means you can fork it, host it, and keep running it regardless of who owns Pipedream next year."
  - question: Does Kestra require more setup than Pipedream?
    answer: "Kestra takes about 5 minutes to run locally with Docker. Pipedream requires no infrastructure but binds you to their cloud. Kestra gives you self-hosting, Git sync, and full workflow portability. Pipedream gives you a faster start with managed infrastructure but no option to move off their platform. For teams that need GitOps, Terraform integration, and the ability to self-host, that's a straightforward trade."
  - question: Can non-engineers use Kestra the way they use Pipedream's visual builder?
    answer: "Yes. Kestra Apps let non-technical users trigger, monitor, and interact with workflows through a no-code interface without writing YAML or accessing the engineering UI. Kestra also has a visual flow editor that updates the DAG in real time as you type. RBAC and namespace isolation keep engineering and business-user workflows from stepping on each other."
