commonQuestions:
  - question: How hard is it to migrate from Stonebranch UAC to Kestra?
    answer: "Kestra doesn't require you to rewrite your business logic. Shell scripts, Python code, SQL queries, and file transfer operations work as-is in Kestra's Script and plugin tasks. The migration is mostly about translating Stonebranch task definitions into Kestra's YAML format and replacing agent-based execution with containerized tasks. Most teams start new workflows in Kestra and migrate existing jobs incrementally."
  - question: We have thousands of Stonebranch jobs. Is incremental migration realistic?
    answer: "Yes. Kestra and Stonebranch UAC can run side by side. Start by building new workflows in Kestra while existing Stonebranch jobs continue running. Migrate jobs in batches, starting with the simplest ones. Kestra's webhook and API triggers can bridge the two systems during the transition, letting Stonebranch trigger Kestra workflows or vice versa."
  - question: Stonebranch has native mainframe support. Does Kestra?
    answer: "Kestra is not designed for mainframe job scheduling. If you have significant z/OS or AS/400 workloads, Stonebranch or a dedicated mainframe scheduler is the right tool for that layer. However, many organizations use Kestra for everything except mainframe, reducing their Stonebranch footprint and licensing costs to only where it's truly needed."
  - question: How does Kestra's pricing compare to Stonebranch UAC?
    answer: "Kestra's open-source edition is free with 1400+ plugins and unlimited event-driven workflows. Enterprise features (RBAC, SSO, audit logs, multi-tenancy) are available on Kestra Enterprise and Kestra Cloud without per-agent metering. Stonebranch UAC uses proprietary licensing with capacity-based pricing that includes per-agent costs, scaling with the number of target hosts in your infrastructure."
  - question: Does Kestra support the same integrations as Stonebranch?
    answer: "Kestra's 1200+ plugin library covers cloud providers (AWS, Azure, GCP), data warehouses (Snowflake, BigQuery, Databricks), databases, message queues (Kafka, RabbitMQ, Pulsar), and CI/CD tools. Stonebranch has native Universal Connectors for SAP, PeopleSoft, mainframe systems, and managed file transfer that Kestra doesn't replicate directly. For cloud-native and data platform integrations, both tools cover similar ground."
  - question: Stonebranch offers a Self-Service Portal. How does Kestra compare?
    answer: "Stonebranch's Self-Service Portal allows business users to trigger predefined jobs and view their status without accessing the full UAC interface. Kestra Apps provide similar self-service capability but go further: any workflow can be exposed as a form-based application with custom inputs, approvals, and outputs. Non-engineers can trigger, monitor, and interact with workflows without any training on the underlying orchestration platform."
  - question: How does Kestra handle file transfers compared to Stonebranch's MFT?
    answer: "Kestra handles file transfers through plugins for S3, GCS, Azure Blob, SFTP, and HTTP. For organizations that need enterprise MFT features like AS2 protocol support, PGP encryption, FTP over SSL with compliance audit trails, and guaranteed delivery, Stonebranch's native MFT module is purpose-built for that. Many teams keep Stonebranch for regulated file transfers while using Kestra for everything else."
  - question: Stonebranch supports event-driven triggers. How is Kestra different?
    answer: "Stonebranch supports event-driven triggers for file arrivals, emails, database changes, and system events through its Universal Controller. Kestra was event-driven from the start with a broader trigger ecosystem: webhooks, S3 and GCS uploads, Kafka and Pulsar messages, database changes, API events, and custom event sources are all first-class YAML triggers. Unlimited event-driven workflows are available in the open-source version, with no execution caps or overage fees."
  - question: How does Kestra's architecture compare to Stonebranch's agent-based model?
    answer: "Stonebranch deploys Universal Agents on every target host. Agents communicate with the Universal Controller for job scheduling and execution. This means installing, updating, and maintaining agent software across your infrastructure. Kestra uses Docker containers for task execution with no agents to deploy or maintain. Tasks run in ephemeral containers that are pulled, executed, and cleaned up automatically."
  - question: Can Kestra handle SAP job scheduling like Stonebranch?
    answer: "Stonebranch has native SAP connectors for BW process chains, ABAP job scheduling, and PI interface monitoring. Kestra can interact with SAP through its HTTP, scripting, and CLI plugins, but it doesn't have native SAP task types. If SAP job scheduling is a core requirement, Stonebranch's native integration is more mature. Many organizations use Kestra alongside their SAP automation layer for non-SAP workloads."
  - question: We use Stonebranch for compliance and audit trails. What does Kestra offer?
    answer: "Kestra provides full execution audit logs, namespace-level RBAC, SSO/SAML integration, and secrets management with AWS Secrets Manager, HashiCorp Vault, and Azure Key Vault. Every workflow execution is logged with inputs, outputs, task durations, and who triggered it. Stonebranch offers similar audit capabilities through its Universal Controller, but Kestra's audit data is accessible via API and can be exported to your SIEM or compliance tooling."
  - question: Can we replace Stonebranch UAC with IaC tools like Ansible or Terraform instead of an orchestrator like Kestra?
    answer: "Teams sometimes reach for config management or IaC tools as a Stonebranch replacement because they're already in the stack. These tools excel at provisioning and deployment, but they lack workflow orchestration fundamentals: event-driven triggers, DAG-based dependency management, retries with backoff, real-time execution monitoring, and cross-job observability. The result is usually cron jobs wrapped around playbooks with no visibility into failures. Kestra is purpose-built for orchestration and can call Ansible playbooks or Terraform plans as tasks within a workflow."
