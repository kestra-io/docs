title: "Stonebranch UAC vs Kestra for Enterprise Workload Automation"
description: "Compare Kestra vs Stonebranch Universal Automation Center: Open-source, developer-first orchestration in YAML vs. proprietary enterprise workload automation with agent-based architecture. See features, setup, and migration path."
competitorName: Stonebranch
category: Infrastructure Automation
shortDescription: "Proprietary agent-based workload automation vs. open-source, developer-first orchestration."
seeHowTitle: "Getting Started with Declarative Orchestration"
seeHowBody: "See how Kestra can simplify your workflows—and scale beyond legacy workload automation."

brandColor:
  color: "#156de0"

intro:
  title: "Kestra vs. Stonebranch UAC: Open Orchestration vs. Enterprise Workload Automation"
  description: "Stonebranch Universal Automation Center centralizes workload automation behind agents and a Universal Controller. Kestra lets any engineer build and ship workflows in YAML. No agents, no proprietary licensing, no vendor lock-in."

philosophy:
  mainTitle: Two Approaches to Automation
  kestra:
    title: "Developer Self-Service Orchestration"
    description: "Declarative YAML workflows versioned in Git, executed in isolated containers, deployed through CI/CD. Existing scripts, ETL jobs, and file transfers run as-is. Any engineer can build and ship workflows without filing a ticket or installing an agent."
    subCardText: '"How do we let every team build and ship workflows without a central automation team or agents on every host?"'
  competitor:
    title: Enterprise Workload Automation
    description: "Universal Automation Center combines a Universal Controller for centralized scheduling with Universal Agents deployed across target systems. Jobs are defined through the UAC web interface, scheduled by the Controller, and executed by agents on each host. Changes flow through the operations team."
    shadowColor: "#156de0"
    subCardBg: "var(--ks-background-blue-light)"
    subCardText: '"How do we schedule and automate workloads across our hybrid IT environment from a single control point?"'

businessValue:
  mainTitle: "Developer Self-Service vs. Agent-Based Operations"
  kestra:
    title: Self-Service Automation
    list:
      - "Data pipelines, infrastructure automation, business processes, and AI workflows"
      - "Any engineer ships workflows in YAML through Git and CI/CD"
      - "Event-driven at core: react to real events, not just cron schedules"
      - "Open source with 1400+ plugins, no per-job licensing, and a thriving community of contributors"
      - "Self-service for non-engineers via Kestra Apps"
  competitor:
    title: Centralized Workload Automation
    list:
      - "Cross-platform job scheduling across mainframe, SAP, and distributed systems"
      - "Central operations team defines and manages jobs through the Universal Controller"
      - "Event-driven triggers for file arrivals, emails, and system events"
      - "Proprietary licensing with per-agent and capacity-based pricing"
      - "Managed file transfer with SFTP, FTP/SSL, and PGP encryption"
    shadowColor: "#156de0"
    bulletColor: "#156de0"
  footerText: "Stonebranch UAC fits organizations with heavy mainframe and SAP workloads managed by a centralized ops team. Kestra is the right choice if you want developers to own their own workflows, need a lightweight event-driven platform without agents on every host, or want open-source transparency without proprietary lock-in."

setupSpeed:
  title: Time to First Workflow
  subtitle: "Stonebranch UAC requires deploying the Universal Controller, configuring a database backend, and installing Universal Agents on each target host before any job can execute. Kestra's single Docker Compose command stands up everything in a format that's already production-shaped."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready (database and config included). Open the UI, pick a Blueprint, run it."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: "Days to"
      two: Weeks
    description: "Production deployment requires installing the Universal Controller (scheduling engine), configuring the backend database, and deploying Universal Agents on every target host. Network connectivity, firewall rules, and security certificates must be configured between each agent and the controller. Trial downloads are gated behind a sales contact form."
    shadowColor: "#156de0"
    command: |
      # 1. Request trial access through Stonebranch sales
      # 2. Install Universal Controller (scheduling engine)
      # 3. Configure backend database (Oracle, SQL Server, or PostgreSQL)
      # 4. Install Universal Agent on each target host
      # 5. Configure agent-controller connectivity and certificates
      # 6. Set up security policies, user roles, and credentials
      # 7. Define jobs through the UAC web interface
    lang: sh

easeOfUse:
  title: YAML Anyone Can Read vs. GUI Behind an Ops Team
  kestra:
    title: "Kestra: Any engineer, any language"
    description: "YAML is readable on day 1. Our docs are embedded in the UI for easy reference, the <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes workflows for you, or start with our library of Blueprints. Engineers deploy through Git, same as application code."
    code: |
      id: server_provision
      namespace: infra.ops

      inputs:
        - id: vm_name
          type: STRING
        - id: environment
          type: SELECT
          values: [dev, staging, prod]

      tasks:
        - id: request_approval
          type: io.kestra.plugin.core.flow.Pause
          onResume:
            - id: approved_by
              type: STRING

        - id: provision
          type: io.kestra.plugin.terraform.cli.TerraformCLI
          commands:
            - terraform apply -auto-approve
          env:
            TF_VAR_vm_name: "{{ inputs.vm_name }}"
            TF_VAR_env: "{{ inputs.environment }}"

        - id: configure
          type: io.kestra.plugin.ansible.cli.AnsibleCLI
          commands:
            - ansible-playbook configure.yml
              -i "{{ outputs.provision.vars.ip }}"

        - id: notify
          type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
          url: "{{ secret('SLACK_WEBHOOK') }}"
          payload: |
            {"text": "Server {{ inputs.vm_name }} provisioned in {{ inputs.environment }}"}
    lang: yaml
  competitor:
    title: "Stonebranch: GUI-driven task definitions"
    description: "Jobs are primarily defined through the UAC web interface with form-based task creation. Universal Tasks and Universal Templates allow reuse, but orchestration logic is configured through the GUI and stored in the controller database. Exporting jobs for version control requires additional tooling."
    shadowColor: "#156de0"
    code: |
      {
        "type": "taskWindows",
        "name": "ServerProvision",
        "agent": "prod-agent-01",
        "credentials": "infra_svc_account",
        "command": "terraform apply -auto-approve",
        "actions": [
          {
            "exitCodes": "0",
            "status": "Success",
            "description": "Provision completed"
          },
          {
            "exitCodes": "1-99",
            "status": "Fail",
            "notifyActions": {
              "notifyEmails": "ops-team@company.com"
            }
          }
        ],
        "dependencies": [
          {
            "task": "ApprovalGate",
            "condition": "Success"
          }
        ]
      }
    lang: json

