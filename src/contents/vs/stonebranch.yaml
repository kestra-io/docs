      description: "Stonebranch requires installing and maintaining Universal Agents on every target host, with changes routed through a central operations team. Kestra runs tasks in isolated Docker containers. Engineers deploy through Git and CI/CD, the same way they deploy application code."
    - title: Open source, transparent pricing
      description: "Kestra's open-source core is free with 1400+ plugins. Enterprise features (RBAC, SSO, audit logs) are available without per-agent metering. Stonebranch's proprietary licensing uses capacity-based pricing with per-agent costs that scale with your infrastructure footprint."
