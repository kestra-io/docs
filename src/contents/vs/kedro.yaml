title: "Kestra vs. Kedro: Workflow Orchestration vs. ML Pipeline Framework"
description: "Compare Kestra vs Kedro: Universal workflow orchestration in any language with YAML vs a Python framework for reproducible data science code. See features, setup time, and use cases."
competitorName: Kedro
category: "Data Orchestration"
shortDescription: "Python framework for ML pipelines vs. declarative YAML orchestration for any language, any team."
brandColor:
  color: "#FFC800"

intro:
  title: "Kestra vs. Kedro: Workflow Orchestration vs. ML Pipeline Framework"
  description: "Kedro is a Python framework that applies software engineering best practices to data science and ML code: project structure, data catalog management, and modular pipeline construction. Kestra is workflow orchestration for any stack, any language, and any team. One helps data scientists write better code. The other schedules, triggers, and monitors everything your engineering organization ships."

philosophy:
  mainTitle: Two Philosophies, Two Different Problems
  kestra:
    title: "Universal Orchestration: Any Language, Any Team"
    description: "Declarative YAML workflows triggered by schedules, events, or APIs, executed in isolated containers, deployed through CI/CD. Orchestrate data pipelines, infrastructure operations, AI workloads, and business processes across any stack without locking your team into a single language or framework."
    subCardText: '"How do I schedule, trigger, and monitor workflows across every system my team owns?"'
  competitor:
    title: Python Framework for Reproducible Data Science
    description: "A development framework that brings software engineering discipline to data science projects. Define pipelines as graphs of pure Python functions, manage datasets through a declarative catalog, and structure projects consistently across teams. Kedro itself is not an orchestrator: it integrates with Airflow, Kubeflow, and other schedulers to run in production."
    shadowColor: "#FFC800"
    subCardBg: "var(--ks-background-yellow-light)"
    subCardText: '"How do I structure my data science code so it is reproducible and maintainable?"'

businessValue:
  mainTitle: "Code Structure and Orchestration Solve Different Problems"
  kestra:
    title: Production Workflow Orchestration
    list:
      - "Schedule, trigger, and monitor workflows across data pipelines, infrastructure jobs, and business processes from one place"
      - "Event-driven: react to S3 file arrivals, database changes, Kafka messages, and webhooks in real time"
      - "Multi-language: run Python, SQL, Bash, R, or Node.js without wrapping anything in a framework"
      - "Open source with 26k+ GitHub stars and 1300+ plugins"
      - "Self-service for non-engineers via Kestra Apps; enterprise RBAC and audit logs when needed"

  competitor:
    title: ML Pipeline Framework
    list:
      - "Structure data science code as modular, testable Python functions"
      - "Data catalog for managing dataset versioning and I/O across environments"
      - "Pipeline visualization via Kedro-Viz for code lineage and dependency graphs"
      - "No built-in scheduler or trigger system: requires a separate orchestrator for production"
      - "Python-only: tasks are pure Python functions connected through dataset dependencies"
    shadowColor: "#FFC800"
    bulletColor: "#D4A000"
  footerText: "Kedro is the right choice when your goal is improving how a Python data science team writes, structures, and tests code. Its project templates, data catalog, and pipeline abstractions enforce consistency across large teams working on ML workflows. Use Kestra when you need production orchestration: scheduling runs, reacting to events, monitoring executions, coordinating systems beyond Python, and giving non-engineering teams visibility and control over automated workflows."

setupSpeed:
  title: Time to First Workflow
  subtitle: "Kedro is a development framework, not a scheduler. Getting a Kedro pipeline running on a schedule requires installing Kedro, structuring your project using Kedro's conventions, and then wiring it to a separate orchestration system (Airflow, Kubeflow, Prefect, or similar). Kestra handles the full stack in one install: scheduling, triggering, and monitoring included."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready. Database and config included. Open the UI, pick a Blueprint, run it. No Python environment to configure, no project templates to scaffold, no separate scheduler to wire up."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: Hours to
      two: Days
    description: "Kedro requires scaffolding a project with its CLI, learning the data catalog YAML format, structuring nodes and pipelines in Python, and then connecting to a separate orchestration layer for production scheduling. The framework is powerful but has a meaningful learning curve before your first scheduled run."
    shadowColor: "#FFC800"
    command: |
      pip install kedro
      kedro new --name my_pipeline

      # Structure project:
      # conf/base/catalog.yml  (declare datasets)
      # src/my_pipeline/nodes.py  (write Python functions)
      # src/my_pipeline/pipeline.py  (connect nodes)

      # Run locally:
      kedro run

      # For production scheduling: wire to Airflow, Kubeflow,
      # or another orchestrator separately
    lang: sh

easeOfUse:
  title: Workflow Definition That Any Engineer Can Read
  kestra:
    title: "Kestra: YAML that your whole team can own"
    description: "YAML is readable on day 1. The <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes workflows for you, docs are embedded in the UI, and the <a href='/blueprints' target='_blank'>Blueprints library</a> has 200+ production-ready templates to start from. No framework concepts to learn before shipping your first scheduled pipeline."
    code: |
      id: daily_ml_pipeline
      namespace: data.ml

      triggers:
        - id: daily
          type: io.kestra.plugin.core.trigger.Schedule
          cron: "0 6 * * *"

      tasks:
        - id: feature_engineering
          type: io.kestra.plugin.scripts.python.Script
          containerImage: python:3.11-slim
          script: |
            import pandas as pd
            df = pd.read_parquet("s3://my-bucket/raw/features.parquet")
            df_processed = df.fillna(0).dropna()
            df_processed.to_parquet("/tmp/features_processed.parquet")

        - id: train_model
          type: io.kestra.plugin.scripts.python.Script
          containerImage: python:3.11-slim
          script: |
            from sklearn.ensemble import RandomForestClassifier
            import pandas as pd, joblib
            df = pd.read_parquet("/tmp/features_processed.parquet")
            X, y = df.drop("label", axis=1), df["label"]
            model = RandomForestClassifier()
            model.fit(X, y)
            joblib.dump(model, "/tmp/model.pkl")

        - id: notify
          type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
          url: "{{ secret('SLACK_WEBHOOK') }}"
          messageText: "Daily ML training complete"
    lang: yaml
  competitor:
    title: "Kedro: Pure Python with framework conventions"
    description: "Kedro pipelines are built from pure Python functions connected through a data catalog. The node-and-catalog pattern enforces clean I/O contracts between steps, but requires learning Kedro's project structure and catalog YAML format before writing your first pipeline. Scheduling is handled outside Kedro."
    shadowColor: "#FFC800"
    code: |
      # conf/base/catalog.yml
      raw_features:
        type: pandas.ParquetDataset
        filepath: s3://my-bucket/raw/features.parquet

      processed_features:
        type: pandas.ParquetDataset
        filepath: data/02_intermediate/features_processed.parquet

      trained_model:
        type: pickle.PickleDataset
        filepath: data/06_models/model.pkl

      # src/my_pipeline/nodes.py
      from sklearn.ensemble import RandomForestClassifier
      import pandas as pd, joblib

      def feature_engineering(raw_features: pd.DataFrame) -> pd.DataFrame:
          return raw_features.fillna(0).dropna()

      def train_model(processed_features: pd.DataFrame):
          X = processed_features.drop("label", axis=1)
          y = processed_features["label"]
          model = RandomForestClassifier()
          model.fit(X, y)
          return model

      # src/my_pipeline/pipeline.py
      from kedro.pipeline import Pipeline, node, pipeline
      from .nodes import feature_engineering, train_model

      def create_pipeline(**kwargs) -> Pipeline:
          return pipeline([
              node(feature_engineering,
                   inputs="raw_features",
                   outputs="processed_features",
                   name="feature_engineering_node"),
              node(train_model,
                   inputs="processed_features",
                   outputs="trained_model",
                   name="train_model_node"),
          ])
    lang: python

