platformStrengths:
  title: Kestra Is Built for How Engineering Teams Work
  features:
    - title: Orchestration without a framework tax
      description: "Before you can run a single Kedro pipeline on a schedule, you need a scaffolded project, a populated catalog.yml, nodes written to Kedro's function signature conventions, and a wired-up orchestrator. That investment pays off for large Python teams building long-lived ML projects. For teams who already have working Python scripts, SQL transforms, or shell jobs, Kestra lets you orchestrate those scripts directly in YAML without refactoring them into a framework. Your existing code runs as-is inside an isolated container."
    - title: Schedule, trigger, and monitor from one place
      description: "Kedro is a development-time tool. It does not schedule runs, send alerts on failures, provide real-time execution logs, or retry failed tasks. You need to wire Kedro to Airflow, Kubeflow, or another orchestrator to get those capabilities in production. Kestra handles all of it natively: cron schedules, event triggers, retry policies, real-time Gantt charts, and Slack or PagerDuty alerts on failure. One system instead of two."
    - title: One platform beyond data pipelines
      description: "Kedro is scoped to data science and ML workflows in Python. When a training run finishes and the next step is a Terraform apply, a Slack alert to a product team, or a trigger into a non-Python system, Kedro hands off to whatever orchestrator sits above it. In Kestra, that full sequence lives in one YAML file: the Kedro run, the Terraform step, the Slack notification, the approval gate before deployment."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "You need a scheduler, event triggers, and execution monitoring in production without operating a second system alongside your framework."
      - "Your team works across languages: Python, SQL, Bash, R, and Node.js all need to participate in the same pipelines."
      - "Workflows span beyond data science: infrastructure automation, business process coordination, and cross-team approvals live alongside your ML pipelines."
      - "Non-engineering stakeholders need visibility and control over automated workflows without writing code."
      - "You want Git-native workflow definitions that deploy through CI/CD and live in your existing repository."
  competitor:
    title: Choose Kedro When
    list:
      - "Your primary goal is improving code quality and reproducibility for a Python data science or ML team."
      - "You want enforced project structure and data catalog conventions across a large team working on many experiments."
      - "Pipeline visualization and data lineage at the code level (not the execution level) are important for your ML practice."
      - "You are already running Airflow or Kubeflow and want a framework layer on top to standardize how pipelines are written."
      - "Your workflows are exclusively Python and you want the node-and-catalog pattern for clean I/O contracts between steps."
    shadowColor: "#FFC800"
    bulletColor: "#D4A000"

commonQuestions:
  - question: Can I use Kedro and Kestra together?
    answer: "Kedro and Kestra occupy different layers of the stack, and combining them is a common pattern. Kedro handles code structure: defining nodes, managing the data catalog, and enforcing project conventions for your Python data science work. Kestra handles the orchestration layer: scheduling Kedro pipeline runs, reacting to upstream events, chaining non-Python steps around Kedro, and monitoring execution in production. Run kedro run as a Script task in Kestra and you get the structure benefits of Kedro with the production operations of Kestra."
  - question: Does Kestra replace what Kedro does?
    answer: "Kestra replaces the orchestration layer above Kedro, not Kedro itself. Kedro handles code organization, data catalog management, and reproducibility for your Python data science work. Kestra handles scheduling, event triggers, execution monitoring, and coordinating systems outside Python. If your team values Kedro's project conventions and catalog abstractions, keep them. Kestra takes over at the point where Kedro hands off to an orchestrator."
  - question: How does Kestra handle ML pipeline use cases without Kedro's data catalog?
    answer: "Kestra pipelines pass outputs between tasks using its internal key-value store or by writing to cloud storage (S3, GCS, Azure Blob) between steps. Each task runs in an isolated container with explicit inputs and outputs, so data dependencies are clear in the YAML definition. For teams that need a richer dataset versioning and cataloging system, Kestra integrates with tools like MLflow, Delta Lake, or custom data catalogs through its 1300+ plugins."
  - question: Is Kedro a workflow orchestrator?
    answer: "Kedro's own documentation is explicit: it is not an orchestrator. The framework provides pipeline definitions, data catalog management, and project structure for Python code. To run those pipelines on a schedule or in response to events, you need a separate orchestrator such as Airflow, Kubeflow, Prefect, or Kestra. Kedro ships plugins for several of these to translate its pipeline definitions into the orchestrator's task format."
  - question: How long does it take to get started with Kestra compared to Kedro?
    answer: "Kestra runs in two commands with Docker Compose and has a UI at localhost:8080 where you can pick a Blueprint and run a workflow in about 5 minutes. Kedro requires installing the package, scaffolding a project with the CLI, learning the catalog YAML format, writing nodes and pipeline definitions in Python, and then connecting to a scheduler for production. Kedro's investment pays off for teams building structured, long-lived ML projects with strict reproducibility requirements. Kestra is running and scheduling your first workflow before that scaffolding is done."
  - question: Can Kestra orchestrate Kedro pipelines in production?
    answer: "Yes. Run kedro run as a Script task inside a Kestra workflow. Schedule it with a cron trigger, react to upstream data arriving in S3, chain downstream dbt models or notification steps after it completes, and get real-time execution logs and alerts through Kestra. The Kedro pipeline stays exactly as written; Kestra wraps it with the production scheduling, monitoring, and coordination layer."
