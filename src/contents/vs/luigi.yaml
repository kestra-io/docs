      description: "Bring your Python scripts, SQL queries, Bash commands, and R notebooks. Kestra orchestrates all of them in YAML. The orchestration definition is configuration; the business logic is yours, untouched."
    - title: Event-driven from the start
      description: "Native triggers for S3 file arrivals, Kafka messages, webhooks, and database changes mean your workflows react to real business events the moment they happen, not on the next scheduled window."
    - title: Observability without extra tooling
      description: "Built-in execution logs, real-time metrics, Gantt charts, and distributed tracing come with Kestra out of the box. Your team gets full visibility into every execution without bolting on a separate observability stack."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "Your pipelines span Python, SQL, Bash, and dbt, and you want orchestration that doesn't force all logic through Python classes."
      - "You need event-driven workflows that react to file arrivals, Kafka messages, or webhook events in real time, not just scheduled cron windows."
      - "Your team includes data analysts, DevOps engineers, or non-Python contributors who need to read, trigger, or modify workflows."
      - "You want to orchestrate data pipelines, infrastructure automation, and business processes from one platform without adding more tools."
      - "You need built-in RBAC, namespace isolation, audit logs, and multi-tenancy for teams operating at enterprise scale."
  competitor:
    title: Choose Luigi When
    list:
      - "Your workload is entirely batch-based with clear, static dependency trees defined in Python."
      - "Your team is experienced Python engineers who prefer expressing pipeline logic as code over YAML configuration."
      - "Your pipelines are already built in Luigi and the migration cost outweighs the gaps in observability and event-driven support."
      - "You need a lightweight, minimal Python library with no infrastructure requirements beyond a Python environment."
    shadowColor: "#D4EDDA"
    bulletColor: "#28A745"

commonQuestions:
  - question: How do I migrate from Luigi to Kestra?
    answer: "Luigi tasks are Python functions with output() and run() methods. Migrating to Kestra means extracting that business logic and running it directly as a Script task without modification. Your Python scripts work as-is in a Kestra flow. The dependency chain you defined in requires() becomes a task sequence in YAML. Most teams migrate incrementally, moving new pipelines to Kestra while letting existing Luigi jobs run until they come up for maintenance."
  - question: Can Kestra handle the same dependency resolution Luigi provides?
    answer: "Sequential and parallel dependencies are first-class in Kestra YAML. Tasks in sequence run in order; tasks in a parallel block run concurrently. Conditional branching, dynamic task generation with ForEach, and subflows handle complex graphs without orchestration code. The main difference from Luigi: Kestra tracks dependency state through execution history rather than checking whether output files exist on a filesystem. That means dependency resolution works the same way whether your tasks write to HDFS, S3, a database, or nothing at all."
  - question: Luigi only requires Python and pip. Is Kestra much heavier to run?
    answer: "Kestra runs as a single Docker Compose stack with a database (PostgreSQL or MySQL) and the Kestra server. The two-command setup takes under 5 minutes and gives you the UI, scheduler, executor, and observability in one place. For production, Kestra scales horizontally on Kubernetes. Luigi is lighter to install initially, but production Luigi deployments typically need an external scheduler (cron), a process manager, and separate logging infrastructure. The total operational footprint ends up comparable."
  - question: Does Kestra support Luigi's output-based task deduplication?
    answer: "Kestra tracks execution state rather than filesystem outputs. Each flow execution is versioned and logged, so you can replay, cancel, or rerun specific tasks without re-executing the full pipeline. For pipelines that previously relied on Luigi's output existence checks to avoid duplicate work, Kestra's execution history and conditional triggers serve the same purpose. You can also use Kestra's KV Store or outputs to pass data between tasks and short-circuit execution when upstream conditions are already met."
  - question: What happens to my HDFS and Spark jobs that Luigi orchestrates today?
    answer: "Kestra has native plugins for Spark (submit jobs, monitor runs), HDFS (read, write, move files), Hive, and the broader Hadoop ecosystem. Your existing Spark and HDFS logic can run as Script tasks or dedicated plugin tasks in a Kestra flow. The orchestration definition moves to YAML; the underlying job code stays unchanged. Teams running Hadoop-era pipelines typically migrate task by task, since there is no coupling between pipeline steps in Kestra the way Luigi's requires() chain creates."
  - question: Spotify built Luigi but has since moved on. What does that signal?
    answer: "Spotify published a detailed post in 2022 explaining why they moved. The core issues were fragmented versioning across 1,000+ repositories (making platform-wide fixes impractical), no execution visibility until tasks completed (which wasted cluster resources on polling), and the overhead of maintaining two pipeline frameworks at once. Kestra addresses all three: centralized execution state, real-time DAG visibility before and during runs, and a single platform that covers the full range of workflow types."
