platformStrengths:
  title: Kestra Is Built for the Workflows That Run Your Business
  features:
    - title: Data pipeline tooling out of the box
      description: "Kestra ships with native plugins for dbt, Airbyte, Spark, Snowflake, BigQuery, Kafka, Databricks, and 1200+ more. Run a dbt model, trigger an Airbyte sync, or load to Snowflake in a YAML task with no extra SDK to install. Every integration is a pre-built task type, not custom code your team writes and maintains."
    - title: Workflows non-engineers can participate in
      description: "A Kestra workflow is a YAML file that any team member can read and understand. Kestra Apps let business users trigger workflows, fill in parameters, and monitor results without engineering involvement. RBAC and namespace isolation keep business-user workflows separate from engineering infrastructure without restricting access to either."
    - title: Scheduling and event triggers as first-class primitives
      description: "Kestra's trigger system covers cron schedules, file arrivals in S3 or GCS, Kafka message consumption, webhook callbacks, and database row changes, all defined in YAML alongside the workflow. Triggers, tasks, and retry logic live in one file with no separate scheduling API or external coordinator required."

decisionGuide:
  mainTitle: Two Tools for Different Problems
  kestra:
    title: Choose Kestra When
    list:
      - "You're orchestrating data pipelines, ETL workflows, dbt models, or infrastructure automation."
      - "Your team includes data engineers, analysts, and ops who shouldn't need to learn an SDK to modify a workflow."
      - "You want scheduling, event triggers, and monitoring defined declaratively alongside the workflow logic."
      - "Non-engineers need to trigger or monitor workflows without writing code."
      - "You need 1200+ pre-built integrations without writing and maintaining custom Activities."
  competitor:
    title: Choose Temporal When
    list:
      - "You're building long-running, stateful workflows (days to weeks) that must survive infrastructure failures."
      - "Your team is building distributed systems and needs saga patterns, compensating transactions, or exact-once execution guarantees."
      - "Workflows are core application logic owned by engineers, written and tested in Go, Java, Python, or TypeScript."
      - "You need deterministic replay for debugging complex distributed failures."
    shadowColor: "#E8E4FD"
    bulletColor: "#7A5AF8"

commonQuestions:
  - question: Can Kestra replace Temporal for long-running workflows?
    answer: "For most data and infrastructure workflows, yes. Kestra handles retries, timeouts, failure handling, and multi-step dependencies across any duration in YAML. For workflows that need deterministic replay, exact-once distributed state persistence, or compensation patterns built into application code, Temporal is purpose-built for those requirements. The distinction is between orchestrating external scripts and tools (Kestra's strength) versus building durable stateful logic inside application code (Temporal's strength)."
  - question: Does Kestra support the same languages as Temporal's SDKs?
    answer: "Kestra runs tasks in any language without an SDK. Python scripts, Go binaries, Bash commands, SQL queries, and R notebooks execute in isolated containers with no framework wrappers. Temporal's SDKs (Go, Java, Python, TypeScript, Ruby, C#, PHP) are required to author workflow and activity logic. Kestra's approach keeps your business logic portable; Temporal's approach gives you deeper durability guarantees inside the workflow execution model."
  - question: How does Kestra handle failures and retries?
    answer: "Kestra supports per-task retry policies with configurable attempt counts, backoff strategies, and retry conditions, all declared in YAML. Failed tasks can be restarted from the point of failure without re-running upstream tasks. For multi-step workflows, Kestra tracks execution state across restarts. Temporal's durability model goes further: it persists the full workflow history and replays it deterministically, which is stronger for workflows with complex branching state."
  - question: Does Kestra have data pipeline integrations that Temporal lacks?
    answer: "Yes. Kestra ships with 1200+ plugins covering dbt, Airbyte, Spark, Snowflake, BigQuery, Kafka, Databricks, and the full modern data stack. These are YAML task types, not code you write. Temporal has no native data pipeline plugins; integrating with data tools requires writing and maintaining custom Activities in your SDK language."
  - question: Can Kestra and Temporal coexist in the same stack?
    answer: "Yes, and it's a reasonable pattern. Teams use Kestra to orchestrate data pipelines, infrastructure jobs, and business processes in YAML, while Temporal handles the application-layer workflows that need durable stateful execution. Kestra can trigger Temporal workflows via HTTP or SDK calls from a Script task, so the two platforms compose cleanly."
  - question: How does Kestra handle scheduling compared to Temporal?
    answer: "Kestra schedules are YAML triggers defined alongside the workflow: cron expressions, file arrival events, Kafka message consumption, webhook callbacks. They're visible in the UI, versioned with the workflow, and editable without deploying code. Temporal's Schedules are managed via a separate API and are decoupled from the workflow definition, which means modifying a schedule is a separate operation from modifying the workflow itself."
