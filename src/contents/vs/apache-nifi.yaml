platformStrengths:
  title: Kestra Is Built for How Modern Teams Work
  features:
    - title: Git-native from day one
      description: "Kestra workflows are YAML files that live in your Git repository from day one. Commit them, review them in pull requests, and deploy through CI/CD — the same process as application code. Every change is a readable diff and every deployment is traceable."
    - title: Bring your own scripts, any language
      description: "Kestra runs Python, Bash, SQL, Go, R, and Node.js in isolated Docker containers. Your existing scripts work without modification — no wrappers, no rewrites, no language constraints. Each task gets its own container so dependencies never conflict."
    - title: Orchestrate beyond data movement
      description: "One YAML workflow can ingest data, run a dbt model, provision a cloud resource, and notify a team — with retry logic and audit logs across every step. Kestra coordinates the full lifecycle: data pipelines, infrastructure updates, model training, approvals, and downstream notifications in a single unified definition."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "You need to orchestrate workflows that combine data pipelines with infrastructure, AI, or business logic."
      - "Your team works in multiple languages and needs orchestration that does not require Java expertise."
      - "Workflows need to live in Git, go through pull requests, and deploy via CI/CD."
      - "Event-driven triggers (webhooks, Kafka, S3, database changes) are core to your architecture."
      - "Non-engineers need to trigger and monitor workflows through a self-service interface."
  competitor:
    title: Choose Apache NiFi When
    list:
      - "Packet-level data provenance is a compliance or audit requirement — you need to track exactly where every record came from, what transformed it, and where it went through the flow."
      - "Edge-to-cloud data collection is central to your architecture. NiFi's MiNiFi agent runs on edge devices and streams data back to a central NiFi instance."
      - "Non-engineering teams need to build and manage data flows visually without writing code or YAML."
      - "Your workload is continuous, high-throughput data streaming that benefits from NiFi's built-in back-pressure and priority queuing at the processor level."
    shadowColor: "#1A9FB9"
    bulletColor: "#0EACCC"

commonQuestions:
  - question: How is Kestra different from Apache NiFi?
    answer: "NiFi is a data flow platform: it routes and transforms data in real time using a visual canvas of connected processors. Kestra is a workflow orchestration platform: it coordinates tasks across data pipelines, infrastructure, AI workloads, and business processes using declarative YAML. NiFi moves data between systems. Kestra orchestrates the workflows that use that data."
  - question: Can Kestra replace NiFi for data ingestion?
    answer: "For scheduled batch ingestion and event-triggered pipelines, yes. Kestra handles data movement via plugins for S3, Azure Blob, GCS, Kafka, databases, and HTTP APIs. Where NiFi has a clear advantage is real-time streaming data flows and per-record data provenance. If your ingestion problem is primarily batch or event-triggered, Kestra covers it. If you need to route continuous data streams with millisecond latency and packet-level lineage, NiFi is purpose-built for that."
  - question: How does Kestra handle version control compared to NiFi?
    answer: "Kestra workflows are YAML files. They live in your Git repository from the start, go through pull requests, and deploy through CI/CD. Every change is a commit with a diff you can read. NiFi flows are stored on the visual canvas and require NiFi Registry for version control. The exported format is JSON, which is reviewable but verbose and harder to diff than YAML. Kestra's approach matches how engineering teams already manage application code."
  - question: FILA evaluated NiFi before choosing Kestra. What drove the decision?
    answer: "FILA needed a platform that could scale with their global expansion and handle complex multi-step workflows involving databases, file transfers, and API calls across multiple continents. The decision came down to architecture and plugin breadth. Kestra's event-driven model, wide plugin ecosystem, and ability to orchestrate complex ERP workflows across external systems fit their requirements better than combining Airflow and NiFi."
  - question: Can Kestra and NiFi work together?
    answer: "Yes. A common pattern is using NiFi for continuous data collection and routing (especially from edge sources or streaming feeds) with Kestra handling downstream orchestration: transformations, warehouse loads, data quality checks, and notifications. Kestra can trigger on data arriving in a landing zone, pick up where NiFi left off, and coordinate the rest of the pipeline."
  - question: How does Kestra handle streaming data compared to NiFi?
    answer: "NiFi was purpose-built for streaming: it processes individual FlowFiles in real time with configurable back-pressure and priority queuing. Kestra handles event-driven workflows through Kafka and Pulsar triggers, S3 event triggers, and webhook endpoints, and is better suited for orchestrating what happens after data arrives than for continuous stream processing. For high-throughput streaming with per-record transformations, NiFi wins. For coordinating the workflows that consume that data, Kestra is the right layer."