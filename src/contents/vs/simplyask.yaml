platformStrengths:
  title: Kestra Is Built for Engineering Teams, Not Just Operations
  features:
    - title: Code as infrastructure, not just automation
      description: "Kestra workflows live in Git, deploy via Terraform, and move through the same CI/CD pipeline as application code. Every change is tracked, reviewed, and auditable. SimplyAsk workflows live in a proprietary SaaS canvas with no Git integration, no code review, and no path for environment promotion from dev to staging to prod."
    - title: Native infrastructure execution
      description: "Kestra runs Terraform plans, Ansible playbooks, Bash scripts, and containerized tasks natively. Tasks execute in isolated containers, so any existing script runs without wrapping or refactoring. SimplyAsk Flow can call a REST API, but it cannot execute shell commands, run containers, or integrate with IaC tooling without building an API layer in between."
    - title: Open source with no vendor lock-in
      description: "Kestra is open source under Apache 2.0. You can inspect the codebase, deploy it anywhere, run it in air-gapped environments, and avoid dependency on a single SaaS vendor. SimplyAsk is closed-source proprietary software from a 120-person company. For teams making long-term infrastructure investments, that's a different risk profile than a project with 26k+ GitHub stars and a public codebase."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "Your team runs Terraform, Ansible, Bash scripts, or containerized tasks as part of a workflow."
      - "Workflows should live in version control and deploy through CI/CD like any other infrastructure."
      - "You need self-hosting that works in Docker, Kubernetes, or air-gapped environments."
      - "Your engineers author the workflows. YAML and Git are the standard, not a visual canvas."
      - "You need data pipelines, ETL, or infrastructure automation alongside event-driven triggers."
  competitor:
    title: Choose SimplyAsk When
    list:
      - "Your primary use case is telco business process automation: order management, service provisioning, customer ops."
      - "Your team is operations analysts or customer service managers who need to build workflows without engineering support."
      - "You want a bundled suite covering chat agents, service ticketing, and workflow automation in one SaaS package."
      - "No-code matters more than GitOps. Your team will not write or review YAML."
      - "You're in telecom, manufacturing, or local government and want out-of-the-box workflow templates for those verticals."
    shadowColor: "#DBEAFE"
    bulletColor: "#2563EB"

commonQuestions:
  - question: Can Kestra replace SimplyAsk for business process automation?
    answer: "Kestra handles data pipelines, infrastructure workflows, and API-driven business processes well. For telecom-specific OSS/BSS workflows (customer provisioning, order fulfillment, service ticket routing), SimplyAsk ships out-of-the-box templates built for those flows. If your automation is infrastructure-centric or requires running scripts and containerized tasks, Kestra is the right fit. If your team is operations analysts automating telco business processes without writing code, SimplyAsk was built for that use case."
  - question: How do I migrate workflows from SimplyAsk to Kestra?
    answer: "SimplyAsk workflows are built visually in the Flow canvas and stored in a proprietary format. In Kestra, you replicate each workflow in declarative YAML, replacing SimplyAsk's canvas steps with the equivalent Kestra plugins (HTTP requests, script execution, Slack notifications, and more). The trigger model maps directly: schedules, webhooks, and API calls all work in Kestra. Most teams migrate incrementally, starting with workflows that require infrastructure execution or Git-native deployment, since those aren't possible in SimplyAsk."
  - question: Does Kestra support the same integrations as SimplyAsk Symphona?
    answer: "Kestra has 1,200+ plugins covering cloud providers, databases, data warehouses, messaging systems, and APIs. SimplyAsk Flow integrates via REST API, SFTP, database connectors, and native connections to its own Symphona products (Converse, Serve, Resolve). For standard API integrations, both tools cover similar ground. Kestra's plugin library goes deeper on data and infrastructure tooling (Spark, dbt, Terraform, Kubernetes), while SimplyAsk has tighter integration with its bundled business ops suite."
  - question: Can Kestra be self-hosted or run in air-gapped environments?
    answer: "Yes. Kestra is open source and supports fully self-hosted deployment via Docker or Kubernetes, including air-gapped environments with no outbound internet access. SimplyAsk Symphona is a SaaS platform with no self-hosted option. For engineering firms operating in regulated industries or managing on-premises infrastructure, that's not a configuration trade-off; it's a hard blocker."
  - question: Can Kestra support non-technical users the way SimplyAsk's no-code canvas does?
    answer: "SimplyAsk's canvas is designed so operations analysts can build and modify workflows without any engineering support. In Kestra, engineers define workflows in YAML, and Kestra Apps provide a clean UI for non-engineers to trigger, monitor, and interact with those workflows. Business logic stays in version control; execution stays self-service. If you need business analysts to author workflows from scratch without engineers, SimplyAsk's canvas is built for that model."
  - question: How does Kestra handle event-driven triggers compared to SimplyAsk?
    answer: "Kestra is event-driven at its core. It triggers natively on webhooks, message queues (Kafka, Pulsar), file arrivals (S3, GCS, SFTP), database changes, and scheduled intervals, all defined in YAML alongside the rest of the workflow. SimplyAsk Flow triggers via schedule, manual kick-off, REST API call, or inbound email. For infrastructure automation (reacting to a failed deployment, a cloud cost threshold, or a Kubernetes pod restart), Kestra's event model covers those signals natively. SimplyAsk's trigger model was designed for business operations volume, not infrastructure event handling."
