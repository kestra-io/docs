featureGrid:
  title: "Kestra vs. Ansible Automation Platform at a Glance"
  tableData:
    - feature: Primary use case
      kestra: Cross-tool IT orchestration (Ansible + Terraform + APIs + scripts)
      competitor: Centralized Ansible playbook execution and management
    - feature: Workflow definition
      kestra: Declarative YAML (code-first, Git-native)
      competitor: Job Templates + Workflow Templates (UI-first, exportable JSON)
    - feature: Cross-tool orchestration
      kestra: Native—Ansible, Terraform, PowerShell, Python, APIs in one flow
      competitor: Ansible-centric—external tools require custom scripting
    - feature: Multi-step logic
      kestra: Full DAG with conditions, parallelism, retries, error branches
      competitor: Linear Workflow Templates with basic success/failure branching
    - feature: Self-service Apps
      kestra: Built-in dynamic forms with API-backed fields and approval gates
      competitor: Surveys (basic form variables on job templates)
    - feature: Event-driven triggers
      kestra: Webhooks, schedules, file detection, queues, flow triggers (built-in)
      competitor: Event-Driven Ansible (EDA)—separate component, Ansible-specific
    - feature: Secrets management
      kestra: Built-in + CyberArk, HashiCorp Vault, AWS Secrets Manager
      competitor: Credential Manager + HashiCorp Vault integration
    - feature: Observability
      kestra: Full execution logs, artifacts, audit trail per step
      competitor: Job output logs, activity stream, per-job stdout
    - feature: Air-gapped deployment
      kestra: "✓ Supported (on-prem, Kubernetes, disconnected)"
      competitor: Supported (RHEL required, Private Automation Hub for offline content)
    - feature: Licensing
      kestra: Flat instance + worker-based pricing
      competitor: Per-managed-node subscription (Red Hat)
    - feature: Language support
      kestra: "Python, Bash, Go, SQL, Ansible, PowerShell, R, and more"
      competitor: "Ansible (YAML playbooks) + Script/Command modules"
    - feature: Open source
      kestra: Apache 2.0
      competitor: "AAP is subscription-only; Ansible Engine is GPL"

