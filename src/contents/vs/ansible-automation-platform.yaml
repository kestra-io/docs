    bulletColor: "#EE0000"

commonQuestions:
  - question: "Is Kestra a replacement for Ansible Automation Platform?"
    answer: "Not necessarily. Many teams use Kestra as the orchestration layer above AAP—Kestra manages the multi-step workflow while AAP executes the Ansible playbooks. However, if your primary need is running Ansible playbooks with RBAC and inventory management, AAP covers that well. Kestra becomes the better choice when workflows need to span multiple tools, require complex approval logic, or need to integrate deeply with Terraform, ServiceNow, or cloud APIs."
  - question: "Can I use my existing Ansible playbooks with Kestra?"
    answer: "Yes. Kestra's Ansible plugin runs any existing playbook with the same parameters, inventory, and vault secrets you use today. You don't need to rewrite anything. Kestra adds orchestration on top: chain the playbook run with pre-approval steps, Terraform provisioning, post-execution verification, and ITSM ticket closure—all in one YAML workflow."
  - question: "How does Kestra compare to AWX (the open-source version of AAP)?"
    answer: "AWX is the upstream open-source project for Ansible Automation Platform—it provides Controller UI, job templates, and workflow templates without a subscription. Kestra differs fundamentally in scope: where AWX manages Ansible execution, Kestra orchestrates cross-tool workflows. AWX is Ansible-centric by design; Kestra is language- and tool-agnostic. If you outgrow AWX's Ansible-only model, Kestra is a natural next step."
  - question: "Does Kestra support Event-Driven Ansible (EDA) style automation?"
    answer: "Yes, and without requiring a separate component. Kestra has built-in event-driven triggers—webhooks, message queues (Kafka, SQS, Pub/Sub), file detection, and polling triggers—that can kick off any workflow, including ones that run Ansible playbooks. EDA in AAP is Ansible-specific; Kestra's event system works across all tools in a workflow."
  - question: "How does Kestra handle Ansible secrets and inventory?"
    answer: "Kestra integrates with enterprise secrets managers (CyberArk, HashiCorp Vault, AWS Secrets Manager, Azure Key Vault) to inject credentials at runtime. Inventory can be passed as inputs, read from files, or fetched from an API as a workflow step. You maintain your existing inventory management and simply reference secrets via Kestra's secrets manager integration in the workflow YAML."
  - question: "Is Kestra suitable for large-scale Ansible fleet management?"
    answer: "Kestra scales horizontally with worker groups, allowing you to run Ansible against different network segments, data centers, or cloud regions using dedicated workers. For pure Ansible fleet management at massive scale, AAP's Controller with execution environments is well-optimized. For workflows that combine Ansible with other tools—which most enterprise automation requires—Kestra's architecture handles both the orchestration and execution at scale."
