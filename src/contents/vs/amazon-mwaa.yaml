title: "Kestra vs. Amazon MWAA: Orchestrate Without the AWS Lock-In"
description: "Compare Kestra vs Amazon MWAA: YAML-first universal orchestration vs managed Apache Airflow on AWS. See setup complexity, workflow scope, and what changes when you're not bound to an AWS VPC."
competitorName: Amazon MWAA
category: Data Orchestration
shortDescription: "AWS-managed Apache Airflow vs. open-source, multi-cloud YAML orchestration without vendor lock-in."
seeHowTitle: "Getting Started with Declarative Orchestration"
seeHowBody: "See how Kestra can simplify your data pipelines—and run them on any cloud without the AWS lock-in."

brandColor:
  color: "#FF9900"

intro:
  title: "Kestra vs. Amazon MWAA: Orchestrate Without the AWS Lock-In"
  description: "Amazon MWAA brings managed Airflow to AWS-native teams who want to stop running Airflow themselves. Kestra takes a different approach: declarative YAML orchestration that runs in any language on any cloud, covering data pipelines, infrastructure automation, and business processes, without requiring a VPC, S3 bucket, or IAM role before your first workflow runs."

philosophy:
  mainTitle: Two Architectures, Two Tradeoffs
  kestra:
    title: "Universal Orchestration: Any Cloud, Any Language"
    description: "Declarative YAML orchestration that runs on Docker, Kubernetes, or any cloud, in any language: Python, SQL, Bash, R, Go, Node.js. No vendor dependency in the architecture. Workflows define what should run, not how to wire up cloud infrastructure around them."
    subCardText: '"How do we orchestrate data, infrastructure, and business workflows without committing to a single cloud vendor?"'
  competitor:
    title: Managed Airflow on AWS
    description: "Apache Airflow, fully managed inside your AWS account. MWAA handles scheduler maintenance, worker scaling, and Airflow upgrades. DAGs are stored in S3, workers run in your VPC, and access is controlled through IAM. The AWS integration runs deep, and so does the dependency."
    shadowColor: "#FFE5B4"
    subCardBg: "var(--ks-background-yellow-light)"
    subCardText: '"How do we run Airflow without managing Airflow infrastructure, while staying inside AWS?"'

businessValue:
  mainTitle: "AWS-Bound Pipeline Scheduling vs. Cloud-Agnostic Workflow Orchestration"
  kestra:
    title: Universal Workflows, Any Cloud
    list:
      - "Data pipelines, infrastructure automation, business processes, AI workflows"
      - "Multi-language: Python, SQL, Bash, Go, Node.js, R"
      - "Event-driven at core: respond to file arrivals, Kafka, webhooks, database changes"
      - "Self-service for non-engineers via Kestra Apps"
      - "Runs on AWS, GCP, Azure, on-prem, or your laptop"
  competitor:
    title: Managed Airflow Inside AWS
    list:
      - "Apache Airflow, managed by AWS inside your VPC"
      - "Python DAGs stored in S3, workers in your VPC"
      - "Deep AWS integration: CloudWatch, S3 events, IAM"
      - "Data engineering scope"
      - "AWS-only deployment"
    shadowColor: "#FFE5B4"
    bulletColor: "#FF9900"
  footerText: "MWAA is a strong choice if your team is fully invested in Airflow and all your data lives in AWS. Kestra is the right choice if you need multi-language workflows that run beyond Python DAGs, orchestration that spans cloud providers, or a 5-minute setup path that doesn't require provisioning a VPC first."

setupSpeed:
  title: Time to First Workflow
  subtitle: "MWAA is Amazon's fully managed Airflow service—there is no local or self-hosted install option. This comparison reflects what's required to provision an MWAA environment: an S3 bucket with versioning enabled, a VPC with security groups, an IAM execution role, and environment provisioning that takes 20–30 minutes on its own."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready (database and config included). Open the UI, pick a Blueprint, run it. No cloud account, no VPC, no S3 bucket, no IAM role."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: "~2-4"
      two: Hours
    description: "Create an S3 bucket with versioning enabled, configure a VPC with security groups, create an IAM execution role, provision the MWAA environment (20-30 min), then upload your DAG files to S3 and wait for the scheduler to pick them up."
    shadowColor: "#FFE5B4"
    command: |
      # Step 1: Create S3 bucket with versioning
      aws s3api create-bucket --bucket my-mwaa-dags --region us-east-1
      aws s3api put-bucket-versioning \
        --bucket my-mwaa-dags \
        --versioning-configuration Status=Enabled

      # Step 2: Configure VPC, security groups, IAM role...
      # Step 3: Create MWAA environment (20-30 min to provision)
      # Step 4: Upload DAGs to S3
      aws s3 cp dags/ s3://my-mwaa-dags/dags/ --recursive

      # Now write your DAGs in Python...
    lang: sh

easeOfUse:
  title: Workflows Your Whole Team Can Read
  kestra:
    title: "Kestra: Readable by your whole team"
    description: "YAML is readable on day 1. Our docs are embedded in the UI for easy reference, the <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes workflows for you, or start with our library of Blueprints. No Python knowledge required to understand or modify a workflow."
    code: |
      id: daily_etl
      namespace: data.production

      tasks:
        - id: extract
          type: io.kestra.plugin.scripts.python.Script
          script: |
            # Paste your existing extraction logic here
            result = {"records": 1000}

        - id: transform
          type: io.kestra.plugin.dbt.cli.DbtCLI
          commands:
            - dbt run --select staging

        - id: notify
          type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
          url: "{{ secret('SLACK_WEBHOOK') }}"
          messageText: "ETL complete: {{ outputs.extract.vars.result.records }} records processed"

      triggers:
        - id: daily
          type: io.kestra.plugin.core.trigger.Schedule
          cron: "0 0 * * *"
    lang: yaml
  competitor:
    title: "Amazon MWAA: Python DAGs in S3, Airflow in your VPC"
    description: "DAG files are Python scripts stored in S3. To update a workflow, push a new file to S3 and wait for the scheduler to detect the change. Operators, dependencies, and scheduling are all Python. Non-Python contributors can view runs in the Airflow UI but cannot author or modify workflows."
    shadowColor: "#FFE5B4"
    code: |
      from airflow import DAG
      from airflow.operators.python import PythonOperator
      from airflow.operators.bash import BashOperator
      from airflow.providers.slack.operators.slack_webhook import SlackWebhookOperator
      from datetime import datetime

      def extract_data(**context):
          # extraction logic
          return {"records": 1000}

      with DAG('daily_etl', start_date=datetime(2024, 1, 1), schedule='@daily') as dag:
          extract = PythonOperator(
              task_id='extract',
              python_callable=extract_data,
          )
          transform = BashOperator(
              task_id='transform',
              bash_command='dbt run --select staging',
          )
          notify = SlackWebhookOperator(
              task_id='notify',
              slack_webhook_conn_id='slack_default',
              message='ETL complete',
          )
          extract >> transform >> notify
    lang: python

