commonQuestions:
  - question: How do I migrate from MWAA to Kestra?
    answer: "Kestra doesn't require you to refactor your business logic. Extract Python code from your Airflow DAG files and run it directly as a Script task in Kestra. SQL queries and Shell commands work as-is. Define orchestration in YAML. Most teams migrate incrementally, using Kestra's HTTP trigger to call remaining MWAA DAGs during transition, so there's no hard cutover. For a detailed breakdown of both upgrade and migration paths, see our <a href='/resources/airflow-2-eol-whitepaper'>Airflow 2 EOL guide</a>."
  - question: Does Kestra integrate with AWS services?
    answer: "Yes. Kestra has native plugins for S3, SQS, SNS, DynamoDB, Glue, Redshift, Lambda, and more. The S3 trigger lets Kestra react to file arrivals natively, without polling. AWS credentials are managed through Kestra's secrets management, and Kestra deployments on AWS typically run on EKS or ECS with the same IAM-based access patterns your team already uses."
  - question: What happens to my Airflow version on MWAA when Airflow 3 ships?
    answer: "MWAA's supported Airflow versions lag behind the open-source releases. Airflow 3 support on MWAA typically arrives months after the upstream release, and upgrading requires AWS to certify the version first. Kestra upgrades run on your schedule: pull a new image, test in staging, and ship when your team is ready."
  - question: Does Kestra support the same data pipeline use cases as MWAA?
    answer: "Yes. Kestra orchestrates ETL and ELT pipelines, dbt models, data quality checks, warehouse operations, and file transfers. With 1400+ plugins, it covers the same AWS integrations available through Airflow providers: S3, Glue, Redshift, Athena, and more. The difference is YAML task definitions instead of Python operator classes."
  - question: Can Kestra and MWAA run in parallel during migration?
    answer: "Yes. Teams commonly run both during transition. Kestra can trigger MWAA DAGs via the Airflow REST API, so you migrate incrementally: start new workflows in Kestra, move existing pipelines over on your timeline, and keep MWAA running until you're ready to switch off."
  - question: How does Kestra handle multi-tenancy compared to MWAA?
    answer: "Kestra uses namespace isolation out-of-the-box. Teams, environments, and projects get separate namespaces with scoped RBAC, secrets, and execution history. MWAA's access control is IAM-based; strong team isolation typically requires separate MWAA environments, each with its own VPC and cost. Kestra handles this within a single deployment."
