platformStrengths:
  title: Kestra Is Built for How Modern Engineering Teams Work
  features:
    - title: No cloud vendor lock-in
      description: "Kestra runs on AWS, Azure, GCP, on-premises, or any combination. Workflows are portable YAML, not tied to a proprietary state machine format or a single cloud's IAM model. Move environments, add clouds, or go multi-cloud without rewriting orchestration logic."
    - title: Bring your existing scripts
      description: "Run Python, SQL, Bash, and R directly in Kestra without Lambda wrappers or deployment packages. Scripts execute in isolated containers with full dependency control. Your existing code works as-is. No framework wrappers, no IAM execution role per function."
    - title: Minutes to first workflow
      description: "Two commands and you're running workflows locally. No AWS account, no IAM configuration, no ASL syntax to learn. When you're ready for production, deploy to Kubernetes or Kestra Cloud with the same YAML you developed locally."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "Your workflows span multiple clouds or include on-premises systems. AWS Step Functions cannot orchestrate outside of AWS."
      - "Your team works in Python, SQL, Bash, or R and you don't want to wrap every script in a Lambda function with its own deployment package."
      - "You need workflow orchestration beyond AWS: data pipelines, business processes, infrastructure automation across your whole stack."
      - "Predictable pricing matters. Per-state-transition costs compound quickly for high-frequency or long-running workflows."
      - "Non-engineers need to trigger and monitor workflows without writing ASL or Lambda code."
  competitor:
    title: Choose AWS Step Functions When
    list:
      - "Your workflows are entirely within AWS and you want zero infrastructure to manage."
      - "You're already deeply invested in Lambda and need reliable coordination between functions with native AWS retries and error handling."
      - "Native AWS service integrations (SageMaker, Bedrock, ECS, Glue, DynamoDB) are at the center of your use case."
      - "AWS-native audit trails, CloudWatch integration, and IAM-based access control are compliance requirements."
    shadowColor: "#FFE8C0"
    bulletColor: "#FF9900"

commonQuestions:
  - question: How do I migrate from AWS Step Functions to Kestra?
    answer: "The migration path is straightforward because Kestra runs your existing code without wrappers. Extract business logic from your Lambda functions and run it directly as Script tasks in Kestra. Translate your ASL state machine definitions to YAML flows: states become tasks, transitions become task ordering, Catch blocks become error handling. Most teams run both platforms in parallel during migration, shifting workflows incrementally as they gain confidence."
  - question: Does Kestra work with AWS services?
    answer: "Yes. Kestra has native plugins for S3, SQS, SNS, Lambda, Glue, DynamoDB, Redshift, Athena, and more. Trigger workflows from S3 file arrivals or SQS messages, read and write to any AWS service, and run code in ECS containers. The difference is that Kestra is not limited to AWS—you can mix AWS tasks with Azure, GCP, or on-premises operations in the same workflow."
  - question: Can Kestra replace Lambda functions, or do I still need them?
    answer: "Kestra runs your code directly in isolated containers, so you don't need Lambda wrappers for orchestration. Write Python, Bash, SQL, or any language inline in your YAML or reference external scripts. Install any dependencies. For AWS patterns that genuinely need Lambda (responding to direct API Gateway invocations, for example), you can still call Lambda from a Kestra task, but orchestration logic moves to Kestra."
  - question: How does Kestra's pricing compare to AWS Step Functions?
    answer: "AWS Step Functions charges per state transition: $0.025 per 1,000 transitions for Standard workflows. Costs compound quickly for workflows with many states or high execution frequency. Kestra open source is free to self-host with no per-execution fees. Kestra Enterprise and Kestra Cloud use a subscription model. Run your own numbers: at $0.025 per 1,000 transitions, a workflow with 20 states running 10,000 times a day costs roughly $1,500/month in Step Functions alone."
  - question: Can I run Kestra on AWS?
    answer: "Yes. Deploy Kestra on AWS using EKS, ECS, or EC2 with Docker Compose. Kestra integrates natively with RDS (PostgreSQL) for state storage, S3 for internal storage, and your existing VPC and IAM configuration. Your workflows stay inside your VPC, use your existing IAM roles, and never send execution data to a third-party SaaS."
  - question: What about AWS Step Functions' visual workflow editor?
    answer: "Both platforms offer visual workflow views. Kestra renders a live DAG topology as you type YAML, with real-time updates before you deploy. AWS Step Functions has Workflow Studio with drag-and-drop. Kestra's source of truth is YAML you can diff and review in pull requests. Step Functions' visual editor generates ASL JSON (a 50-line nested object for a three-step workflow), which is hard to review meaningfully in a pull request."
