platformStrengths:
  title: Kestra Is Built for Production-Scale Automation
  features:
    - title: Execution without billing ceilings
      description: "Kestra runs on your infrastructure with no per-task billing. A workflow that runs 10,000 times a day costs the same to execute as one that runs once, because the cost model is tied to infrastructure, not execution count. Teams migrating from usage-based platforms often find that their automation cost drops substantially once execution volume stops driving the bill."
    - title: Data pipelines run alongside everything else
      description: "Native plugins for dbt, Airbyte, Spark, Snowflake, BigQuery, Databricks, and 1,200+ more let data engineers define ETL pipelines in the same YAML they use for event-driven workflows and infrastructure automation. DAG visualization, per-task retry semantics, and built-in observability make data workloads first-class, not an afterthought handled through a generic HTTP call."
    - title: Workflows in Git, owned by your team
      description: "Every Kestra flow is a YAML file that lives in your repository, deploys through CI/CD, and rolls back like any other code change. Reviewing what a workflow does, comparing versions, and auditing what ran on a specific date are standard git operations. Automation lives in the same source of truth as the rest of your infrastructure."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "Your workflows involve data pipelines, ETL, or infrastructure automation beyond app-to-app connections."
      - "Execution volume makes per-task billing impractical: hundreds of workflows running daily."
      - "Workflows must live in version control, pass code review, and deploy through CI/CD."
      - "Self-hosting is required for data residency, compliance, or cost predictability."
      - "Your team needs multi-step logic, parallel branches, and error handling without paying for a higher plan tier."
  competitor:
    title: Choose Zapier When
    list:
      - "Your automation needs are simple: connect two apps, trigger on an event, take an action."
      - "Non-technical users need to build and maintain automations independently, without engineering help."
      - "You need a specific app integration from the 7,000+ library with no custom development."
      - "Low execution volume fits within a task quota without hitting billing ceilings."
      - "You want the fastest possible path from idea to working automation with no setup required."
    shadowColor: "#FFE0D0"
    bulletColor: "#FF4A00"

commonQuestions:
  - question: How do I migrate from Zapier to Kestra?
    answer: "Map each Zap trigger and action to the equivalent Kestra plugin. Scheduled Zaps become Schedule triggers; webhook Zaps become Webhook triggers; HTTP actions use the HTTP plugin. For Zapier's pre-built app connectors, Kestra's 1,200+ plugin library covers Slack, Gmail, databases, cloud storage, Salesforce, and most common targets. For anything not in the plugin library, the HTTP plugin handles any REST API. Most teams migrate incrementally, starting with Zaps that have grown beyond their task quota or that need multi-step logic unavailable on lower Zapier plans."
  - question: Can Kestra handle simple app-to-app automation like Zapier does?
    answer: "Yes. Kestra supports webhook triggers, HTTP actions, Slack notifications, email sending, and connections to virtually any API through its plugin library. The difference is that Kestra workflows are written in YAML rather than built visually. For a non-technical user who needs to connect Gmail to Slack with no engineering support, Zapier's visual builder is faster. For an engineering or data team that already works in YAML and Git, Kestra's approach fits naturally into existing workflows without adding a separate tool to manage."
  - question: What happens when I hit Zapier's task limits?
    answer: "Zapier automatically switches to pay-per-task billing at 1.25x the base task rate once you exceed your monthly quota. For teams with growing automation needs, this creates unpredictable costs. Upgrading to higher Zapier plans increases the task quota but does not eliminate per-task pricing. Kestra runs on your infrastructure with no task-based billing: a workflow that executes a thousand times costs the same to run as one that executes ten times."
  - question: How does pricing compare between Kestra and Zapier at scale?
    answer: "Zapier's paid plans include a monthly task quota and bill per additional task beyond it. At higher volumes, that adds up quickly. Kestra's open-source version is free to self-host; Kestra Cloud pricing is based on execution resources rather than per-task counting. For teams running dozens of scheduled workflows daily, the infrastructure cost of running Kestra typically comes out below Zapier's task-based pricing."
  - question: Does Kestra support multi-step workflows with conditional logic?
    answer: "Yes, without requiring a paid plan upgrade. Kestra supports conditional branching, parallel task execution, loops, subflows, error handling, and retry logic as first-class YAML constructs available in the open-source version. Zapier's Paths feature (conditional routing) and multi-step Zaps both require a paid plan. On Zapier's free tier, automations are limited to two-step trigger-plus-action sequences."
  - question: Can non-technical users use Kestra the way they use Zapier?
    answer: "Kestra Apps let non-technical users trigger, monitor, and interact with workflows through a no-code interface without touching YAML or accessing the engineering UI. Kestra's business users consume workflows built by engineers; they don't create them independently. Zapier's visual builder lets a non-technical user build an entire automation themselves in minutes. If the primary requirement is self-service automation creation for non-technical users with no engineering involvement, Zapier's builder has a lower floor. Kestra Apps work best when engineering owns the workflow layer and business users need a no-code interface to trigger and monitor without crossing into the engineering UI."
