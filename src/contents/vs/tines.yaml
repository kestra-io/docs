title: "Kestra vs. Tines: Universal Orchestration vs. Security Automation"
description: "Compare Kestra vs Tines: Open-source workflow orchestration for engineering teams vs. no-code security and IT automation. See features, deployment options, and use cases."
competitorName: Tines
category: Business Automation
shortDescription: "No-code security and IT automation vs. open-source YAML orchestration for engineering teams at scale."

brandColor:
  color: "#6B4FBB"

intro:
  title: "Kestra vs. Tines: Universal Orchestration vs. Security Automation"
  description: "Tines is a no-code workflow platform built for security and IT operations teams. It excels at SOC automation, incident response, and alert triage. Kestra is a general-purpose orchestration platform for engineering teams that need data pipelines, infrastructure automation, and business processes at production scale."

philosophy:
  mainTitle: Two Platforms, Two Audiences
  kestra:
    title: "Engineering-Grade Orchestration for Any Workflow"
    description: "Declarative YAML orchestration platform for engineering teams. Define data pipelines, infrastructure automation, and business workflows in version-controlled YAML. Any language, self-hosted or on Kestra Cloud, with GitOps and full audit trails."
    subCardText: '"How do I build production workflows my engineering team can version, deploy, and operate?"'
  competitor:
    title: Security and IT Workflow Automation
    description: "No-code visual workflow platform purpose-built for security operations and IT teams. Drag-and-drop story builder lets analysts automate threat response, alert triage, and IT incident handling without writing code."
    shadowColor: "#EDE9F5"
    subCardBg: "var(--ks-background-purple-light)"
    subCardText: '"How do I automate our SOC playbooks without needing an engineer?"'

businessValue:
  mainTitle: "Playbook Automation Protects Teams.<br />Workflow Orchestration Runs Your Business."
  kestra:
    title: Production-Grade Workflow Orchestration
    list:
      - Automate data pipelines, infrastructure, and business processes in one platform
      - Self-hosted or cloud, with full data residency control
      - GitOps-native version control, CI/CD, and Terraform for all workflows
      - RBAC, audit logs, and multi-tenancy for enterprise compliance
      - Handles 100,000+ concurrent tasks across any language or tool
  competitor:
    title: Security and IT Playbook Automation
    list:
      - No-code visual builder for security analysts and IT operators
      - 1,000+ pre-built security and IT integrations
      - Community tier limited to 3 workflows and 1,000 story runs per month
      - Cloud-first SaaS (self-hosting requires vendor coordination)
      - $125M Series C raised in 2025, unicorn valuation
    shadowColor: "#EDE9F5"
    bulletColor: "#5E4D9A"
  footerText: "For security and IT teams automating SOC playbooks and incident response without writing code, Tines is the right tool. When you need data pipelines, infrastructure provisioning, cross-functional business workflows, or engineering-grade GitOps, Kestra is built for that scope."

setupSpeed:
  title: Time to First Workflow
  subtitle: "Tines offers both a managed cloud service and a self-hosted deployment. This comparison uses their cloud onboarding path—sign up at tines.com and build in the visual editor—which is their recommended getting-started experience."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready (database and config included). Open the UI, pick a Blueprint, run it. No vendor coordination, no infrastructure prerequisites beyond Docker."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: "~30"
      two: Minutes
    description: "Sign up for Tines Cloud and build your first story in the visual editor. Self-hosting requires a Linux server with Docker, PostgreSQL 14+, Redis 7.x, 8 GB RAM, and access granted by your Tines account team."
    shadowColor: "#EDE9F5"
    command: |
      # Cloud: sign up at tines.com, build visually
      # Self-hosted: coordinate with Tines account team,
      # then provision infrastructure:

      # Requirements: Linux, Docker, PostgreSQL 14+, Redis 7.x
      # Minimum: 8 GB RAM, 60 GB HDD, 2 CPUs
      docker pull tines/rails:latest
      docker pull tines/worker:latest
    lang: sh

easeOfUse:
  title: Built for Engineers vs. Built for Analysts
  kestra:
    title: "Kestra: Readable by your whole team"
    description: "YAML is readable on day 1. Our docs are embedded in the UI for easy reference, the <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes workflows for you, or start with our library of Blueprints. No special training required."
    code: |
      id: daily_report
      namespace: analytics

      triggers:
        - id: daily
          type: io.kestra.plugin.core.trigger.Schedule
          cron: "0 8 * * *"

      tasks:
        - id: run_dbt
          type: io.kestra.plugin.dbt.cli.DbtCLI
          commands:
            - dbt run --select reporting

        - id: notify
          type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
          url: "{{ secret('SLACK_WEBHOOK') }}"
          messageText: "Daily report ready"
    lang: yaml
  competitor:
    title: "Tines: Visual stories, no code required"
    description: "Tines workflows (called Stories) are built by dragging actions onto a canvas. No code required for most integrations. Complex logic uses inline expressions and templates. Exported stories are JSON."
    shadowColor: "#EDE9F5"
    code: |
      {
        "name": "Daily Report",
        "agents": [
          {
            "type": "Agents::TriggerAgent",
            "name": "Daily Schedule",
            "schedule": [{"cron": "0 8 * * *", "timezone": "UTC"}]
          },
          {
            "type": "Agents::HTTPRequestAgent",
            "name": "Run dbt via API",
            "options": {
              "url": "{{.CREDENTIAL.dbt_api_url}}",
              "method": "POST",
              "headers": {
                "Authorization": "Bearer {{.CREDENTIAL.dbt_token}}"
              }
            }
          },
          {
            "type": "Agents::SlackAgent",
            "name": "Notify",
            "options": { "message": "Daily report ready" }
          }
        ]
      }
    lang: json

