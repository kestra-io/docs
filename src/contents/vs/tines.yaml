platformStrengths:
  title: Kestra Is Built for Engineering Teams, Not Just Operations
  features:
    - title: Code as infrastructure, not just automation
      description: "Kestra workflows live in Git, deploy via Terraform, and go through the same CI/CD pipeline as application code. Every change is tracked, reviewed, and auditable. No manual canvas exports, no copy-paste to move a workflow between environments."
    - title: Data pipelines and infrastructure in one platform
      description: "dbt models, Spark jobs, Kubernetes deployments, and custom scripts all run from the same declarative YAML. Kestra handles compute-intensive workloads that run for minutes or hours, across data pipelines, infrastructure automation, and business processes in one platform."
    - title: Language-agnostic execution at scale
      description: "Run tasks in Python, SQL, R, Bash, or any language in isolated containers. No wrappers, no decorators, no framework-specific syntax. Bring your existing scripts and orchestrate them without rewriting anything."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "Your team needs data pipelines, ETL, or infrastructure automation alongside event-driven workflows."
      - "Workflows should live in version control and deploy through CI/CD like any other infrastructure."
      - "Your engineers write the workflows. You want YAML and Git, not a visual canvas."
      - "You need self-hosting that doesn't require vendor coordination or a dedicated account team."
      - "Non-engineers need to trigger and monitor workflows through Kestra Apps, not build them."
  competitor:
    title: Choose Tines When
    list:
      - "Your primary use case is SOC automation: alert triage, incident response, threat enrichment."
      - "Your team is security analysts or IT operators who need to build workflows without engineering support."
      - "You want pre-built playbook templates for SIEM, EDR, and threat intelligence tools."
      - "No-code matters more than GitOps. Your team won't write or review YAML."
      - "You're already invested in the Tines ecosystem and security-specific integrations."
    shadowColor: "#EDE9F5"
    bulletColor: "#5E4D9A"

commonQuestions:
  - question: How do I migrate from Tines to Kestra?
    answer: "Tines Stories are built visually and exported as JSON. In Kestra, you replicate the same flow in declarative YAML, replacing each Tines action with the equivalent Kestra plugin (HTTP requests, script execution, Slack notifications, and more). The API calls, data transforms, and notification steps map directly to Kestra plugins. Most teams migrate incrementally, running Kestra for new workflows while keeping Tines for existing security playbooks during the transition."
  - question: Can Kestra handle security workflows like Tines does?
    answer: "Yes. Kestra handles webhook-triggered incident response, API enrichment, alert routing, and Slack or PagerDuty notifications natively. The difference is that Kestra workflows are defined in YAML and require an engineer to build them. There's no visual drag-and-drop builder for security analysts. If your security team needs to build and modify workflows independently without engineering involvement, Tines is better suited for that workflow."
  - question: Does Kestra integrate with security tools like SIEMs and EDRs?
    answer: "Kestra's HTTP plugin can call any REST API, and Script tasks run Python or Bash against any SDK or CLI tool. So integrations with tools like Splunk, CrowdStrike, Okta, and PagerDuty are possible, but you write the integration logic rather than selecting a pre-built connector. Tines ships with 1,000+ security-specific connectors out of the box. If your primary need is rapid connection to security tooling without custom code, that library gives Tines an edge."
  - question: What's the difference between Tines Stories and Kestra Flows?
    answer: "Tines Stories are built in a visual canvas, stored as JSON, and designed for operators who don't write code. Kestra Flows are written in YAML, stored in Git, and designed for engineers who want their workflows to follow software development practices. Both support triggers, conditional logic, and external API calls. Tines optimizes for speed of building; Kestra optimizes for maintainability and auditability over time."
  - question: Can Kestra and Tines run in parallel?
    answer: "Yes. Many teams use both: Tines for security playbooks built by analysts, Kestra for data pipelines and infrastructure workflows built by engineers. The two tools don't overlap functionally enough to cause conflicts. You can run them in parallel indefinitely, or use Kestra as the central orchestrator that calls Tines via webhook when a security workflow needs to be triggered."
  - question: How does Kestra handle event-driven triggers like Tines does?
    answer: "Kestra is event-driven at its core. It supports webhook triggers, scheduled triggers, file arrival triggers (S3, GCS, SFTP), Kafka and Pulsar message queue triggers, database change triggers, and API polling. These are all native capabilities defined in YAML alongside the rest of the workflow. Tines' trigger model is similar but designed around the security operations use case, with tighter integration into SIEM and EDR event streams."
