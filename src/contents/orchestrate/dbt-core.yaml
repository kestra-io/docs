title: "Orchestrate dbt Core with Kestra: scheduling, retries, and full-pipeline visibility"
description: "dbt Core transforms your data. Kestra orchestrates the run. Wrap every dbt execution with event-driven scheduling, approval gates, retries, and end-to-end visibility, without touching your dbt models or profiles."

tool:
  name: "dbt Core"
  pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
  color: "#FF694A"

hero:
  title: "Your dbt Core runs, fully orchestrated."
  description: "dbt Core is a CLI. It has no scheduler, no event triggers, no cross-tool coordination. Kestra wraps every run with event-driven scheduling, automatic retries, and end-to-end visibility across everything that runs before and after dbt."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

pipeline:
  title: "dbt Core transforms your data. Kestra orchestrates the run."
  lead: "Kestra wraps every dbt execution with scheduling, approval gates, retries, and notifications, without touching your dbt models or profiles."
  footer: "Each stage is a declarative YAML task. Swap the trigger, the dbt command, or the downstream system without rewriting the whole pipeline."
  stages:
    - id: trigger
      label: "TRIGGER"
      items:
        - "cron / schedule"
        - "API / webhook"
        - "self-service form"
        - "upstream sync complete"
        - "file or queue event"
    - id: prepare
      label: "PREPARE"
      items:
        - "dbt deps"
        - "dbt compile"
        - "select models"
        - "test on subset"
        - "fail fast on errors"
    - id: gate
      label: "GATE"
      items:
        - "pause for review"
        - "named approver"
        - "timestamp logged"
        - "reject and stop"
        - "timeout policy"
    - id: execute
      label: "EXECUTE"
      items:
        - "dbt run / build"
        - "stream logs to Kestra"
        - "retry failed step"
        - "capture outputs"
        - "multi-environment"
    - id: chain
      label: "CHAIN"
      items:
        - "trigger downstream flow"
        - "pass outputs forward"
        - "run in parallel"
        - "update other systems"
        - "call any API"
    - id: notify
      label: "NOTIFY"
      items:
        - "Slack / Teams"
        - "email"
        - "PagerDuty"
        - "audit log"
        - "webhook"

pillars:
  title: "Three things Kestra adds to every dbt Core run."
  subtitle: "dbt Core solves transformation. Kestra solves everything around it: when it runs, what triggers it, what happens next, and who ran what and when."
  items:
    - icon: "mdi:source-branch"
      title: "Orchestration"
      description: "dbt Core is a single step. It has no scheduler, no event triggers, and no awareness of the pipeline around it. Kestra treats dbt as one node in a flow: it retries only the failed step, passes outputs forward, and halts downstream tools until the data is confirmed ready."
    - icon: "mdi:account-clock-outline"
      title: "Execution attribution"
      description: "A model output changes. A test starts failing. A downstream dashboard shifts. With cron or GitHub Actions there is no easy answer to who ran what, against which data state. Kestra logs every execution with a trigger source, a timestamp, and the full test result. The record exists before you need it."
    - icon: "mdi:eye-outline"
      title: "Visibility"
      description: "When <code>dbt test</code> fails in CI, finding out which model failed and why means digging through log output. Kestra captures every model's output, test result, and failure in a single execution view: timestamped, attributed, and searchable without log archaeology."

useCases:
  title: "How teams use dbt Core and Kestra"
  subtitle: "Patterns data engineering teams run in production. Pick one, copy the YAML, ship it through CI."
  items:
    - badge: "Scheduled"
      badgeIcon: "mdi:clock-outline"
      title: "Scheduled dbt run with alerting"
      description: "Run <code>dbt run</code> and <code>dbt test</code> on a cron schedule. If any model or test fails, Kestra captures the failure context per model and routes it to Slack with the exact test name and assertion that failed. No one manually digs through CI logs to understand what broke."
      flow:
        - node: "cron trigger"
          label: "on schedule"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "dbt run"
          label: "all models"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "dbt test"
          label: "validate output"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "alert"
          label: "Slack / email"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Cron + interval schedules"
          description: "Native scheduler with cron, fixed intervals, or condition-based triggers."
        - title: "Per-model failure context"
          description: "Slack / email routing with the failing test name and assertion attached."
        - title: "Direct link to failed runs"
          description: "Click straight to the failing model's execution view, no log archaeology."
          wide: true
    - badge: "Governance"
      badgeIcon: "mdi:shield-check-outline"
      title: "Approval gate before production"
      description: "Run dbt against a staging target first. Pass the output to a named reviewer. Only promote to the production target after explicit approval. Full audit trail of who approved what and when. Stops the pipeline before the production run if staging tests fail."
      flow:
        - node: "dbt run (staging)"
          label: "staging target"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "dbt test"
          label: "validate"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "pause / review"
          label: "human approves"
          gate: true
          pluginClass: "io.kestra.plugin.core.flow.Pause"
        - node: "dbt run (prod)"
          label: "production target"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "audit log"
          label: "who + when"
          pluginClass: "io.kestra.plugin.core.log.Log"
      items:
        - title: "Native pause + resume"
          description: "Built-in Pause task suspends execution until a reviewer approves."
        - title: "Reviewer + timestamp logged"
          description: "Identity and approval moment stored in execution history automatically."
        - title: "Stop on staging failure"
          description: "Pipeline halts before the production run if any staging test fails."
        - title: "Full audit trail"
          description: "Every promotion linked to a reviewer and a moment in time, replayable."
    - badge: "Full pipeline"
      badgeIcon: "mdi:pipe-disconnected"
      title: "Full modern data stack pipeline"
      description: "Ingest raw data with Airbyte, transform it with dbt, then sync results downstream with Hightouch. All three run as steps in a single Kestra flow. If dbt fails, Kestra retries only the dbt step without re-running the Airbyte sync. This is the exact pattern Gorgias runs in production."
      flow:
        - node: "trigger"
          label: "on schedule"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "airbyte sync"
          label: "ingest raw"
          pluginClass: "io.kestra.plugin.airbyte.connections.Sync"
        - node: "dbt run"
          label: "transform"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "dbt test"
          label: "validate"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "hightouch sync"
          label: "reverse ETL"
          pluginClass: "io.kestra.plugin.core.http.Request"
      items:
        - title: "Step-level retries"
          description: "Retry only the failed step, no re-running of the ingestion."
        - title: "Outputs flow forward"
          description: "Pass artifacts and metadata between Airbyte, dbt, and Hightouch."
        - title: "Shared execution context"
          description: "One execution ID across all three tools — one place to debug."
        - title: "Single audit history"
          description: "Search every run by date, status, or trigger source from one UI."
    - badge: "Event-driven"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Event-triggered dbt run"
      description: "Trigger dbt when a new file lands in S3, when an Airbyte sync completes, or when an API webhook fires. No cron job, no polling script. Kestra fires the dbt pipeline the moment the data is ready, using native event triggers."
      flow:
        - node: "S3 event"
          label: "file arrival"
          pluginClass: "io.kestra.plugin.aws.s3.Trigger"
        - node: "dbt run"
          label: "on trigger"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "dbt test"
          label: "validate"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "notify"
          label: "on complete"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "S3 / Kafka native triggers"
          description: "File arrivals and message events as first-class triggers."
        - title: "Webhook + API triggers"
          description: "Fire dbt from any HTTP call, no glue service required."
        - title: "Database change triggers"
          description: "React to row inserts, updates, or schema changes."
        - title: "Push-based, not polling"
          description: "Workflows start the moment data is ready, not on the next interval."
    - badge: "Operations"
      badgeIcon: "mdi:tune-vertical"
      title: "Selective model refresh"
      description: "Run only the dbt models that need refreshing (by tag, path, or selector) rather than a full project rebuild. Pass the model selector as a flow input, so the same flow handles both nightly full runs and on-demand targeted refreshes triggered by specific upstream changes."
      flow:
        - node: "trigger"
          label: "on event or input"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "dbt run --select"
          label: "model selector"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "dbt test --select"
          label: "targeted tests"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "notify"
          label: "on complete"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Flow inputs"
          description: "Pass model selectors and target names as flow parameters at run time."
        - title: "Same flow, two schedules"
          description: "Nightly full builds and on-demand targeted refreshes share one YAML."
        - title: "Tag / path / selector"
          description: "Use any dbt selector syntax — Kestra forwards it unchanged."
          wide: true

