faq:
  - question: "What's the difference between dbt Cloud and Kestra?"
    answer: "dbt Cloud handles hosting, scheduling, and the job runner for dbt itself, plus managed lineage and a catalog. Kestra sits above that operational layer. It schedules when runs happen, adds approval gates, chains dbt with Airbyte, Spark, Hightouch, or any other tool, and gives you a shared execution history across your full data stack. dbt Cloud is dbt-only by design. Kestra orchestrates the whole pipeline, and works alongside dbt Cloud if you're already using it for lineage or the managed IDE."
  - question: "What does Kestra add to a dbt Core setup?"
    answer: "dbt Core is a CLI. It transforms data when you tell it to, but it has no scheduler, no event triggers, no approval gates, and no shared visibility layer. Kestra provides all of those. Every dbt run becomes a workflow step: triggered on schedule or by events, monitored in a single UI, retried on failure, and auditable across your full team."
  - question: "Can Kestra schedule dbt Core runs automatically?"
    answer: "Kestra has a native scheduler that supports cron expressions, interval-based triggers, and event-based triggers. Run <code>dbt build</code> every night, on Airbyte sync completion, or when a webhook fires, without any external scheduling tool or cron job on a server you have to maintain."
  - question: "Can Kestra chain dbt with Airbyte, Spark, and Hightouch in a single flow?"
    answer: "Each tool runs as a task inside a single Kestra flow. Airbyte loads raw data, dbt transforms it, Hightouch syncs the results, all as sequential steps with shared execution context. If dbt fails, Kestra retries only the dbt step without re-running the Airbyte sync. This is the exact pattern Gorgias runs in production."
  - question: "How does Kestra handle dbt test failures?"
    answer: "Kestra captures the full output of <code>dbt test</code> including which model failed, which test, and what the assertion was. You can configure the workflow to alert on failure (Slack, email, webhook), block downstream steps until the issue is resolved, or route the alert to different channels by model tag or owner. All configurable in YAML without custom code."
  - question: "How does the approval gate work before a production dbt run?"
    answer: "Kestra's Pause task suspends workflow execution after staging tests pass. The execution is surfaced in the Kestra UI with the test results visible. A named reviewer logs in, confirms the output, and explicitly resumes the flow. Only then does the production <code>dbt run</code> proceed. The approval is logged with a timestamp and reviewer identity."
  - question: "Does Kestra work with dbt Cloud as well as dbt Core?"
    answer: "Kestra supports both. The dbt Cloud plugin triggers dbt Cloud jobs via the API and waits for completion, giving you the same scheduling, chaining, and approval gate capabilities. Most teams using dbt Core switch to Kestra as their orchestrator; teams already on dbt Cloud can also use Kestra to orchestrate the broader stack around it."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on your own infrastructure (Docker or Kubernetes), a managed cloud version, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted gives complete control over where your data and workflow execution live, with no external dependency on Kestra's infrastructure."

