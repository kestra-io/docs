blueprints:
  title: "Blueprints for dbt Core orchestration."
  lead: "Production-ready workflows. Copy the YAML, wire it to your stack."
  items:
    - name: "Scheduled run with alerting"
      title: "Scheduled run with alerting"
      description: "Runs <code>dbt run</code> then <code>dbt test</code> every morning at 5 AM. Any failure routes immediately to Slack with a link to the full execution, showing which task failed and the complete output. The team knows before they sit down for standup."
      href: "/blueprints"
      plugins:
        - "io.kestra.plugin.dbt.cli.DbtCLI"
        - "io.kestra.plugin.core.trigger.Schedule"
        - "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      code: |
        id: dbt-scheduled-run
        namespace: company.data.dbt

        triggers:
          - id: nightly
            type: io.kestra.plugin.core.trigger.Schedule
            cron: "0 5 * * *"

        tasks:
          - id: dbt_run
            type: io.kestra.plugin.dbt.cli.DbtCLI
            commands:
              - dbt run --target production
            projectDir: "{{ secret('DBT_PROJECT_DIR') }}"
            profiles: "{{ secret('DBT_PROFILES_YML') }}"

          - id: dbt_test
            type: io.kestra.plugin.dbt.cli.DbtCLI
            commands:
              - dbt test --target production
            projectDir: "{{ secret('DBT_PROJECT_DIR') }}"
            profiles: "{{ secret('DBT_PROFILES_YML') }}"

        errors:
          - id: alert_on_failure
            type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
            url: "{{ secret('SLACK_WEBHOOK') }}"
            payload: |
              {
                "text": ":warning: dbt run failed in *{{ flow.namespace }}*. <{{ execution.url }}|View execution>"
              }
    - name: "Production run with approval gate"
      title: "Production run with approval gate"
      description: "Staging runs and tests first. The flow pauses for human review before promoting to production. Promotion proceeds only after explicit approval. The reviewer's identity and timestamp are logged automatically in the execution history."
      href: "/blueprints"
      plugins:
        - "io.kestra.plugin.dbt.cli.DbtCLI"
        - "io.kestra.plugin.core.flow.Pause"
        - "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      code: |
        id: dbt-run-with-approval
        namespace: company.data.dbt

        inputs:
          - id: target
            type: STRING
            displayName: dbt target
            defaults: production

        tasks:
          - id: dbt_staging_run
            type: io.kestra.plugin.dbt.cli.DbtCLI
            commands:
              - dbt run --target staging
            projectDir: "{{ secret('DBT_PROJECT_DIR') }}"
            profiles: "{{ secret('DBT_PROFILES_YML') }}"

          - id: dbt_staging_test
            type: io.kestra.plugin.dbt.cli.DbtCLI
            commands:
              - dbt test --target staging
            projectDir: "{{ secret('DBT_PROJECT_DIR') }}"
            profiles: "{{ secret('DBT_PROFILES_YML') }}"

          - id: await_approval
            type: io.kestra.plugin.core.flow.Pause
            description: |
              Staging tests passed. Review before promoting to production.
              Target: {{ inputs.target }}

          - id: dbt_prod_run
            type: io.kestra.plugin.dbt.cli.DbtCLI
            commands:
              - dbt run --target {{ inputs.target }}
            projectDir: "{{ secret('DBT_PROJECT_DIR') }}"
            profiles: "{{ secret('DBT_PROFILES_YML') }}"

          - id: notify
            type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
            url: "{{ secret('SLACK_WEBHOOK') }}"
            payload: |
              {
                "text": ":white_check_mark: dbt production run complete. <{{ execution.url }}|View execution>"
              }
    - name: "Full data stack pipeline"
      title: "Full data stack pipeline"
      description: "Airbyte ingests raw data, dbt builds all models and runs tests, Hightouch syncs the results downstream. All three steps run in a single flow. If dbt fails, Kestra retries it without re-running the Airbyte sync. This is the pattern Gorgias runs in production."
      href: "/blueprints"
      plugins:
        - "io.kestra.plugin.airbyte.connections.Sync"
        - "io.kestra.plugin.dbt.cli.DbtCLI"
        - "io.kestra.plugin.core.trigger.Schedule"
        - "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      code: |
        id: modern-data-stack-pipeline
        namespace: company.data.platform

        triggers:
          - id: daily
            type: io.kestra.plugin.core.trigger.Schedule
            cron: "0 4 * * *"

        tasks:
          - id: airbyte_sync
            type: io.kestra.plugin.airbyte.connections.Sync
            connectionId: "{{ secret('AIRBYTE_CONNECTION_ID') }}"
            url: "{{ secret('AIRBYTE_URL') }}"

          - id: dbt_build
            type: io.kestra.plugin.dbt.cli.DbtCLI
            commands:
              - dbt build --target production
            projectDir: "{{ secret('DBT_PROJECT_DIR') }}"
            profiles: "{{ secret('DBT_PROFILES_YML') }}"
            retry:
              type: constant
              interval: PT5M
              maxAttempt: 2

          - id: hightouch_sync
            type: io.kestra.plugin.scripts.shell.Commands
            commands:
              - >-
                curl -X POST
                "https://api.hightouch.io/api/v1/syncs/{{ secret('HIGHTOUCH_SYNC_ID') }}/trigger"
                -H "Authorization: Bearer {{ secret('HIGHTOUCH_TOKEN') }}"

          - id: notify
            type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
            url: "{{ secret('SLACK_WEBHOOK') }}"
            payload: |
              {
                "text": ":chart_with_upwards_trend: Pipeline complete: Airbyte ingested, dbt built, Hightouch synced."
              }

