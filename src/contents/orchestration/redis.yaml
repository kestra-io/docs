title: "Orchestrate Redis with Kestra: real-time list triggers, semantic caching, and key lifecycle automation"
description: "Consume a Redis list as a real-time trigger, warm and invalidate caches on a schedule, build a semantic LLM cache, and coordinate Redis with databases and APIs from one execution history."

tool:
  name: "Redis"
  pluginClass: "io.kestra.plugin.redis.string.Set"
  color: "#FF4438"

hero:
  title: "Give Redis a scheduler, triggers, and a DAG."
  description: "Redis is a fast data store and event bus, not a workflow engine. Kestra adds the layer it lacks: schedule cache warming and invalidation, consume a Redis list as a real-time trigger, and coordinate Redis with your databases, APIs, and LLMs, all with retries and one execution history."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Redis stores, queues, and publishes data at millisecond latency, but it has no scheduler, no DAG, and no retry or replay layer. Kestra supplies all of it: it warms and invalidates caches on a <code>Schedule</code>, turns each item on a Redis list into a governed execution with <code>RealtimeTrigger</code>, and coordinates Redis with <a href='/orchestration/postgres'>Postgres</a>, APIs, and LLMs in one flow. Redis stays the fast layer; Kestra makes it part of a pipeline."

pillars:
  title: "A workflow engine on top of Redis."
  subtitle: "Redis runs the cache, the lists, and the pub/sub. Kestra runs the steps around the key: what triggers the flow, what feeds it, what runs next, and how Redis stays in sync with everything else."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "A real-time trigger on a Redis list"
      description: "Redis pub/sub and lists move messages fast, but cannot run a multi-step, multi-system pipeline per message. <code>io.kestra.plugin.redis.list.RealtimeTrigger</code> pops each item off a list and starts one execution per event, so a message becomes a governed run that fans out to <a href='/orchestration/postgres'>Postgres</a>, an API, or a notification, with retries and history."
    - icon: "mdi:database-refresh-outline"
      title: "Scheduled cache warming and invalidation"
      description: "Redis has TTL, but no cron, no dependency ordering, and no alert on failure. Kestra runs <code>io.kestra.plugin.redis.string.Set</code> and <code>json.Set</code> on a <code>Schedule</code> to warm a cache from the source of truth, and <code>Delete</code> or <code>Ttl</code> to invalidate it, with retries and a logged run the moment a warm fails."
    - icon: "mdi:robot-outline"
      title: "Semantic LLM cache to cut API cost"
      description: "Calling an LLM for a question you already answered is wasted spend. Kestra hashes the prompt, checks Redis with <code>string.Get</code>, and only calls the model on a true miss behind an <code>If</code> branch, writing the answer back with <code>string.Set</code>. Repeated questions return instantly from Redis instead of hitting the API again."
    - icon: "mdi:swap-horizontal"
      title: "Keep Redis and the database in sync"
      description: "A cache is only useful when it matches the system of record. Kestra reads fresh rows from <a href='/orchestration/postgres'>Postgres</a> or another database, writes them to Redis as keys, and shares key-value state across flows, so the cache and the source stay consistent without hand-written sync scripts."
    - icon: "mdi:format-list-bulleted"
      title: "Parallel bulk key operations"
      description: "Loading thousands of keys one request at a time is slow. Kestra fans a JSON payload out with <code>ForEach</code> and writes each entry to Redis in parallel with <code>string.Set</code>, so a bulk seed or refresh finishes in one short, observable run instead of a serial loop you have to babysit."
    - icon: "mdi:bridge"
      title: "Bridge Redis with messaging and AI"
      description: "Redis rarely works alone; it sits beside <a href='/orchestration/kafka'>Kafka</a>, AMQP, and model APIs. Kestra wires those together in one flow, consuming a Redis list and producing to a message broker, or caching embeddings between an LLM and a vector store, so Redis becomes one node in a real-time pipeline, not an island."

useCases:
  title: "How teams use Redis and Kestra"
  subtitle: "Patterns platform and data engineering teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Real-time"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Drain a Redis list into a database in real time"
      description: "An upstream service pushes events onto a Redis list. The <code>RealtimeTrigger</code> pops each item the instant it lands and starts one execution that writes the record into a database, then confirms in <a href='/orchestration/slack'>Slack</a>. Streaming ingestion with no polling and one run per event."
      flow:
        - node: "redis trigger"
          label: "LPOP per item"
          pluginClass: "io.kestra.plugin.redis.list.RealtimeTrigger"
        - node: "db write"
          label: "insert record"
          pluginClass: "io.kestra.plugin.cassandra.Query"
        - node: "slack"
          label: "on insert"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "One execution per event"
          description: "Each item popped off the list starts its own governed run with the payload."
        - title: "No polling lag"
          description: "<code>RealtimeTrigger</code> consumes the list continuously, not on a cron tick."
        - title: "Any database target"
          description: "Swap the Cassandra task for <a href='/orchestration/postgres'>Postgres</a> or another store."
          wide: true
    - badge: "LLM cache"
      badgeIcon: "mdi:robot-outline"
      title: "Cache LLM answers to cut API cost"
      description: "FAQ-style questions hit the same answers repeatedly. Kestra normalizes and hashes the prompt, checks Redis with <code>string.Get</code>, and only calls the model on a true miss behind an <code>If</code>, writing the result back with <code>string.Set</code>. Repeated questions return instantly instead of re-billing the API."
      flow:
        - node: "hash key"
          label: "normalize prompt"
          pluginClass: "io.kestra.plugin.scripts.python.Script"
        - node: "redis get"
          label: "lookup"
          pluginClass: "io.kestra.plugin.redis.string.Get"
        - node: "cache miss?"
          label: "branch"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "llm call"
          label: "on miss only"
          pluginClass: "io.kestra.plugin.openai.ChatCompletion"
        - node: "redis set"
          label: "store answer"
          pluginClass: "io.kestra.plugin.redis.string.Set"
      items:
        - title: "Pay once per answer"
          description: "The model is called only on a genuine cache miss, not on every repeat."
        - title: "Deterministic keys"
          description: "Normalizing and hashing the prompt maps equivalent questions to one key."
        - title: "Instant on a hit"
          description: "A cached answer returns straight from Redis with no API round trip."
          wide: true
    - badge: "Bulk writes"
      badgeIcon: "mdi:format-list-bulleted"
      title: "Write thousands of keys in parallel from JSON"
      description: "Seeding or refreshing a cache one key at a time is slow. Kestra takes a JSON payload, fans it out with <code>ForEach</code>, and writes each entry to Redis in parallel with <code>string.Set</code>, finishing a bulk load in one short run and pinging Discord when it completes."
      flow:
        - node: "for each"
          label: "split payload"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "redis set"
          label: "write key"
          pluginClass: "io.kestra.plugin.redis.string.Set"
        - node: "discord"
          label: "on complete"
          pluginClass: "io.kestra.plugin.discord.DiscordIncomingWebhook"
      items:
        - title: "Parallel, not serial"
          description: "<code>ForEach</code> writes keys concurrently instead of looping one request at a time."
        - title: "Bulk seed or refresh"
          description: "Load a full key set from a single JSON input in one observable run."
        - title: "NX and TTL options"
          description: "<code>Set</code> options like <code>mustNotExist</code> and TTL control overwrite and expiry."
          wide: true
    - badge: "Cache warm"
      badgeIcon: "mdi:database-refresh-outline"
      title: "Warm and invalidate a cache on a schedule"
      description: "A cache drifts from the database unless something refreshes it. On a <code>Schedule</code>, Kestra reads the latest rows from <a href='/orchestration/postgres'>Postgres</a>, writes them to Redis with <code>json.Set</code>, and clears stale entries with <code>Delete</code>, so reads stay fast and current without a hand-written cron script."
      flow:
        - node: "schedule"
          label: "every 15 min"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "query source"
          label: "fresh rows"
          pluginClass: "io.kestra.plugin.jdbc.postgresql.Query"
        - node: "redis set"
          label: "warm cache"
          pluginClass: "io.kestra.plugin.redis.json.Set"
        - node: "redis delete"
          label: "invalidate stale"
          pluginClass: "io.kestra.plugin.redis.json.Delete"
      items:
        - title: "Cache matches the source"
          description: "Each run refreshes Redis from the system of record so reads stay current."
        - title: "Invalidate on schedule"
          description: "<code>Delete</code> clears stale keys as part of the same warming run."
        - title: "Alert on a failed warm"
          description: "A failed refresh logs and notifies, instead of silently serving stale data."
          wide: true
    - badge: "Shared state"
      badgeIcon: "mdi:share-variant-outline"
      title: "Share key-value state across flows"
      description: "Flows often need a small piece of shared state: a cursor, a feature flag, a last-run marker. Kestra writes a JSON value to Redis with <code>string.Set</code> and reads it back later with <code>string.Get</code>, giving separate flows a fast, central place to coordinate without a database."
      flow:
        - node: "redis set"
          label: "write state"
          pluginClass: "io.kestra.plugin.redis.string.Set"
        - node: "redis get"
          label: "read elsewhere"
          pluginClass: "io.kestra.plugin.redis.string.Get"
      items:
        - title: "JSON values"
          description: "<code>serdeType: JSON</code> stores and retrieves structured objects, not just strings."
        - title: "Coordinate across flows"
          description: "One flow writes a cursor or flag; another reads it on its next run."
        - title: "Faster than a database"
          description: "Shared state lives in memory, so reads and writes return in milliseconds."
          wide: true

