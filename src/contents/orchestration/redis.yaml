faq:
  - question: "Why orchestrate Redis with Kestra if Redis is already fast?"
    answer: "Redis is a fast data store, queue, and pub/sub bus, but it is not a workflow engine. It has no scheduler, no DAG, no retries, no backfills, and no execution history. Kestra adds that layer: it warms caches on a <code>Schedule</code>, consumes a Redis list as a real-time trigger, coordinates Redis with <a href='/orchestration/postgres'>Postgres</a>, APIs, and LLMs in one flow, and logs every run. Redis stays the millisecond-latency layer; Kestra makes it part of an observable pipeline."
  - question: "How does Kestra trigger a flow from a Redis list?"
    answer: "Use <code>io.kestra.plugin.redis.list.RealtimeTrigger</code>. It continuously pops items off a Redis list with LPOP and starts one execution per item, with the popped value available as <code>{{ trigger.value }}</code>. Each event becomes a governed run that can write to a database, call an API, or notify a channel, with per-task retries and full history, all with no polling interval to tune."
  - question: "How do I build a semantic LLM cache with Redis?"
    answer: "Normalize and hash the user's question in a script step to get a deterministic key, check Redis with <code>io.kestra.plugin.redis.string.Get</code>, and branch on the result with <code>io.kestra.plugin.core.flow.If</code>. On a miss, call the model (for example <code>io.kestra.plugin.openai.ChatCompletion</code>) and write the answer back with <code>string.Set</code>. Repeated questions then return straight from Redis, cutting both cost and latency."
  - question: "Can Kestra warm and invalidate a Redis cache on a schedule?"
    answer: "Yes. A <code>Schedule</code> trigger runs the flow on an interval; a query task reads the latest rows from the source of truth; <code>io.kestra.plugin.redis.string.Set</code> or <code>json.Set</code> writes them to Redis; and <code>Delete</code> or <code>Ttl</code> invalidates stale keys. Because it is a flow, a failed warm retries and alerts instead of silently leaving the cache to drift from the database."
  - question: "How does Kestra write many Redis keys at once?"
    answer: "Pass a JSON payload to a <code>io.kestra.plugin.core.flow.ForEach</code> task and write each entry with <code>io.kestra.plugin.redis.string.Set</code> in parallel. <code>Set</code> options such as <code>mustNotExist</code> (NX), <code>mustExist</code> (XX), and TTL control overwrite behavior and expiry, so a bulk seed or refresh runs as one short, observable execution instead of a serial loop."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted keeps your Redis connection strings and the data you cache entirely within your own infrastructure."

