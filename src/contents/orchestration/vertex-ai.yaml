faq:
  - question: "Why orchestrate Vertex AI with Kestra instead of calling it directly?"
    answer: "A direct SDK call has no scheduler, no retry on a quota error, no batch fan-out, and no cost guardrail. Kestra triggers <code>io.kestra.plugin.gcp.vertexai.ChatCompletion</code> on a schedule or event, wraps it with retry and timeout, fans a batch out under a concurrency limit, and branches on the emitted token-count metric to cap cost. The model call becomes one governed, retryable, observable step in a larger pipeline."
  - question: "How does Kestra batch-enrich rows without hitting Vertex AI quotas?"
    answer: "Read the rows from <a href='/orchestration/bigquery'>BigQuery</a>, then loop them with <code>io.kestra.plugin.core.flow.ForEach</code> and set <code>concurrencyLimit</code> to cap how many model calls run at once. That concurrency cap is your rate control: raise it for throughput, lower it to stay under Vertex AI quotas. Each call writes its result back, and the whole batch runs on a schedule with retries."
  - question: "Can Kestra run RAG ingestion with Gemini embeddings?"
    answer: "Yes. <code>io.kestra.plugin.ai.rag.IngestDocument</code> chunks documents and embeds them with a Gemini embedding model into a vector store, on a schedule. Pull the source documents from <a href='/orchestration/gcs'>GCS</a> first, then ingest. Vertex AI serves the same Gemini model family, so you can use a Vertex service account for IAM-governed, region-pinned access in production."
  - question: "How do I cap LLM cost in a Kestra flow?"
    answer: "Vertex AI tasks emit <code>prompt.token.count</code>, <code>candidate.token.count</code>, and <code>total.token.count</code> as metrics. Branch on the total with <code>io.kestra.plugin.core.flow.If</code> to halt a batch when it crosses a threshold. The guardrail is an automated condition in the flow, not a human watching a dashboard, so spend is bounded by the pipeline itself."
  - question: "What's the difference between the Vertex AI and Gemini plugins?"
    answer: "<code>io.kestra.plugin.gcp.vertexai.*</code> calls Vertex AI endpoints with GCP service accounts, regions, and projects, the enterprise, IAM-governed surface. <code>io.kestra.plugin.gemini.*</code> calls the Gemini API with a simple API key. Both target Gemini models; choose Vertex AI when you need GCP governance and region pinning, and the Gemini plugin for lighter, key-based access."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted keeps your Vertex AI credentials and the data you send to the model entirely within your own infrastructure."

