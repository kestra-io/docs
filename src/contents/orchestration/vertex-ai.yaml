faq:
  - question: "What's the difference between Vertex AI Pipelines and Kestra?"
    answer: "Vertex AI Pipelines chains ML steps using Kubeflow Pipelines components and runs entirely inside GCP. It has no view of the BigQuery export that prepared the data or the human approval step before deployment. Kestra runs above it: triggers <code>io.kestra.plugin.gcp.vertexai.CustomJob</code> when upstream data confirms ready, sequences BigQuery prep before training, pauses for human approval before deployment, and gives one execution history across every GCP service in the pipeline."
  - question: "Can Kestra trigger a Vertex AI training job when a file lands in GCS?"
    answer: "Yes. The <code>io.kestra.plugin.gcp.gcs.Trigger</code> watches a GCS prefix and starts the flow the moment a matching file appears. Kestra can then run BigQuery data prep before submitting the training job, so training always starts on complete, freshly prepared input."
  - question: "How does Kestra add a human approval gate to a Vertex AI deployment?"
    answer: "The <code>io.kestra.plugin.core.flow.Pause</code> task halts the flow after training or evaluation completes. The model metrics and evaluation outputs are visible in the Kestra UI. A reviewer approves or rejects from the UI, and the flow continues to deployment or branches to a failure notification. Who approved and when is logged in the execution record."
  - question: "Can Kestra conditionally deploy a model only if evaluation metrics pass?"
    answer: "Yes. After training, run an evaluation step that outputs the model metrics, then use <code>io.kestra.plugin.core.flow.If</code> to branch on the metric value. Models that pass deploy; models that fail route to a Slack alert. The deployment step retries independently if it fails, without re-running the training job."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers fully self-hosted deployment on Docker or Kubernetes, a managed cloud version, and air-gapped options for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted keeps your pipeline execution and GCP credentials inside your own network."

