title: "Orchestrate Vertex AI with Kestra: event-driven training, MLOps pipelines, and model lifecycle automation"
description: "Trigger Vertex AI custom training jobs when new data lands in GCS, chain training with data prep and conditional deployment, run scheduled batch inference, and trace every ML step across GCP services from one place."

tool:
  name: "Vertex AI"
  pluginClass: "io.kestra.plugin.gcp.vertexai.CustomJob"
  color: "#4285F4"

hero:
  title: "Run Vertex AI training and inference when data is ready."
  description: "Vertex AI handles model training, deployment, and serving on GCP. Kestra decides when each job starts, what data feeds it, and what happens after training completes. Automate the full ML lifecycle in one declarative flow."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Vertex AI Pipelines can chain ML steps inside the GCP ecosystem. Kestra runs above it: triggers <code>io.kestra.plugin.gcp.vertexai.CustomJob</code> the moment new training data lands in GCS, sequences BigQuery data prep before the job starts, validates the trained model before conditional deployment, and gives one execution history across every GCP service in the pipeline. A deployment failure retries the deploy step only, without re-running the expensive training job."

pillars:
  title: "Above the Vertex AI job scheduler."
  subtitle: "Vertex AI handles model training, serving, and the ML runtime. Kestra handles when jobs trigger, what data feeds them, who approves deployments, and where the cross-service audit trail lives."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "Event-driven training, not time-based"
      description: "Scheduling a training job on a cron cadence means it may run on incomplete data. Kestra triggers <code>io.kestra.plugin.gcp.vertexai.CustomJob</code> the moment new training data lands in GCS, a BigQuery export completes, or an upstream pipeline confirms. Training always runs on fresh, complete input."
    - icon: "mdi:pipe-disconnected"
      title: "Full MLOps pipeline in one flow"
      description: "A production ML pipeline spans BigQuery data prep, Vertex AI training, model evaluation, and conditional deployment. Kestra chains these as ordered tasks in one flow. A deployment failure retries the deploy step only, without re-running the training job, and the full sequence shares one execution ID."
    - icon: "mdi:account-check-outline"
      title: "Human approval before model deployment"
      description: "Automatically deploying a newly trained model to production without review is risky. Kestra pauses the flow with <code>io.kestra.plugin.core.flow.Pause</code> after training completes, surfaces the model metrics in the Kestra UI, and waits for a human to approve or reject before the deployment step runs."
    - icon: "mdi:clock-outline"
      title: "Scheduled batch prediction jobs"
      description: "Batch prediction runs on a schedule: fetch the input dataset from BigQuery, trigger a Vertex AI batch prediction job, wait for completion, and write the outputs back. Kestra chains these steps with per-step retries so a BigQuery write failure retries the write without re-running the prediction job."
    - icon: "mdi:multimodal"
      title: "Multimodal completion in pipelines"
      description: "Vertex AI supports text, image, video, and audio processing through <code>io.kestra.plugin.gcp.vertexai.MultimodalCompletion</code>. Kestra chains multimodal processing steps with upstream media ingestion and downstream annotation storage in one flow, triggered on GCS file arrival or a schedule."
    - icon: "mdi:eye-outline"
      title: "Cross-service ML execution history"
      description: "When a model performs poorly, the question is what training data it saw, what BigQuery prep ran, and how the deployment was triggered. Kestra logs every step, from the GCS trigger through training to deployment, in one execution record with timestamps and service outputs."

