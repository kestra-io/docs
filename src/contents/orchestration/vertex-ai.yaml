title: "Orchestrate Vertex AI with Kestra: scheduled batch enrichment, RAG ingestion, and event classification"
description: "Run Gemini models on Vertex AI as governed pipeline steps: batch-enrich warehouse rows with rate control, keep a RAG index fresh, classify events inline, and cap cost with automated guardrails."

tool:
  name: "Vertex AI"
  pluginClass: "io.kestra.plugin.gcp.vertexai.ChatCompletion"
  color: "#4285F4"

hero:
  title: "Make Vertex AI one step in a real pipeline."
  description: "Vertex AI serves the Gemini models. Kestra runs everything around the call: schedule it, retry it, rate-limit a batch, branch on the result, and chain it with your warehouse and storage, so model inference is a governed step with one execution history, not a notebook script."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "A raw Vertex AI call has no scheduler, no retry on a 429, no batch fan-out, and no cost guardrail. Kestra adds all of it: it batch-enriches <a href='/orchestration/bigquery'>BigQuery</a> rows under a concurrency limit, keeps a RAG index fresh from <a href='/orchestration/gcs'>GCS</a> documents with Gemini embeddings, classifies <a href='/orchestration/pubsub'>Pub/Sub</a> events inline, and caps spend with an automated <code>If</code> on the token-count metric. The model call becomes one observable, retryable step."

pillars:
  title: "Production scaffolding for model inference."
  subtitle: "Vertex AI runs the models, the regions, and the IAM. Kestra runs the steps around the call: what triggers it, how a batch is rate-limited, what it is chained with, and how cost is capped."
  items:
    - icon: "mdi:clock-outline"
      title: "Scheduling, retries, and rate limits"
      description: "A raw SDK call has no cron, no backoff on a 429, and no per-step retry. Kestra triggers <code>io.kestra.plugin.gcp.vertexai.ChatCompletion</code> on a <code>Schedule</code> or an event and wraps it with <code>retry</code> and <code>timeout</code>, so transient quota errors recover automatically instead of failing the run."
    - icon: "mdi:format-list-numbered"
      title: "Batch enrichment with rate control"
      description: "Enriching thousands of rows means looping model calls without tripping quotas. Kestra reads rows from <a href='/orchestration/bigquery'>BigQuery</a>, fans them out with <code>ForEach</code> whose <code>concurrencyLimit</code> caps the request rate, calls Vertex AI per row, and writes the result back, all as one scheduled, retryable batch."
    - icon: "mdi:book-search-outline"
      title: "RAG ingestion kept fresh"
      description: "A retrieval index goes stale unless something rebuilds it. Kestra ingests documents on a <code>Schedule</code>, chunks them, embeds them with a Gemini model via <code>io.kestra.plugin.ai.rag.IngestDocument</code>, and writes the vectors to a store, so a RAG app always retrieves grounded, current context."
    - icon: "mdi:cash-multiple"
      title: "Cost guardrails, enforced automatically"
      description: "LLM spend runs away quietly inside a loop. Vertex AI tasks emit <code>total.token.count</code> as a metric, and Kestra branches on it with an automated <code>If</code> to stop a batch when a threshold is crossed. The guardrail is code, not a person watching a dashboard."
    - icon: "mdi:lightning-bolt-outline"
      title: "Inline classification and routing"
      description: "Some pipelines need a model decision per event. Kestra classifies a <a href='/orchestration/pubsub'>Pub/Sub</a> message with Vertex AI, then routes on the label with an automated <code>If</code>, escalating high-priority events and logging the rest, in milliseconds, with no human gate on routine routing."
    - icon: "mdi:pipe-disconnected"
      title: "Chained with the whole stack"
      description: "Vertex AI does not own the warehouse rows it reads, the <a href='/orchestration/gcs'>GCS</a> documents it embeds, or the <a href='/orchestration/dbt-core'>dbt</a> models downstream. Kestra runs the read, the model call, and the write-back as steps in one flow, so inference plugs into the data stack instead of sitting in a separate notebook."

useCases:
  title: "How teams use Vertex AI and Kestra"
  subtitle: "Patterns AI and data engineering teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Batch enrich"
      badgeIcon: "mdi:format-list-numbered"
      title: "Enrich BigQuery rows with Vertex AI on a schedule"
      description: "Rows need an LLM-generated label or summary. Kestra selects the unenriched rows from <a href='/orchestration/bigquery'>BigQuery</a>, fans them out with a <code>ForEach</code> whose concurrency caps the request rate, calls a Gemini model per row, and writes the result back. Email confirms the batch."
      flow:
        - node: "bigquery query"
          label: "select rows"
          pluginClass: "io.kestra.plugin.gcp.bigquery.Query"
        - node: "for each"
          label: "rate-limited"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "vertex ai"
          label: "enrich row"
          pluginClass: "io.kestra.plugin.gcp.vertexai.ChatCompletion"
        - node: "email"
          label: "on complete"
          pluginClass: "io.kestra.plugin.email.MailSend"
      items:
        - title: "Concurrency is rate control"
          description: "<code>concurrencyLimit</code> caps in-flight calls so the batch stays under quota."
        - title: "Write back in place"
          description: "Each enriched value updates its row, so the table fills in incrementally."
        - title: "Scheduled, not manual"
          description: "A <code>Schedule</code> runs the batch nightly with retries, not a notebook."
          wide: true
    - badge: "RAG"
      badgeIcon: "mdi:book-search-outline"
      title: "Keep a RAG index fresh from GCS documents"
      description: "A retrieval index must track the latest source content. Kestra pulls documents from <a href='/orchestration/gcs'>GCS</a>, chunks them, and embeds them with a Gemini model into a vector store on a schedule, so a RAG application always retrieves current, grounded context. Slack confirms each reindex."
      flow:
        - node: "schedule"
          label: "nightly"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "gcs downloads"
          label: "pull docs"
          pluginClass: "io.kestra.plugin.gcp.gcs.Downloads"
        - node: "ingest + embed"
          label: "Gemini embeddings"
          pluginClass: "io.kestra.plugin.ai.rag.IngestDocument"
        - node: "slack"
          label: "on reindex"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Embeddings on a cadence"
          description: "Rebuilding nightly means retrieval reflects the latest documents."
        - title: "Swap the vector store"
          description: "Use the KV store for a demo, Qdrant or PGVector to scale."
        - title: "Gemini family"
          description: "Vertex AI serves the same Gemini models used for the embeddings."
          wide: true
    - badge: "Classify"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Classify and route events in real time"
      description: "Events need a model decision the moment they arrive. The <a href='/orchestration/pubsub'>Pub/Sub</a> <code>RealtimeTrigger</code> starts a run per event, Vertex AI assigns a label, and an automated <code>If</code> escalates the high-priority ones to an audit table and Discord. No human gate on routine routing."
      flow:
        - node: "pubsub trigger"
          label: "per event"
          pluginClass: "io.kestra.plugin.gcp.pubsub.RealtimeTrigger"
        - node: "vertex ai"
          label: "classify"
          pluginClass: "io.kestra.plugin.gcp.vertexai.ChatCompletion"
        - node: "guardrail"
          label: "route on label"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "discord"
          label: "escalate"
          pluginClass: "io.kestra.plugin.discord.DiscordIncomingWebhook"
      items:
        - title: "Decision per event"
          description: "Each message is classified and routed in its own governed run."
        - title: "Automated guardrail"
          description: "An <code>If</code> on the label routes, never a human <code>Pause</code>."
        - title: "Deterministic labels"
          description: "A tight prompt forces a single-token label the branch can trust."
          wide: true
    - badge: "Cost control"
      badgeIcon: "mdi:cash-multiple"
      title: "Cap LLM cost before a batch overruns"
      description: "A large enrichment batch can burn budget unnoticed. Kestra reads the batch from <a href='/orchestration/bigquery'>BigQuery</a>, calls Vertex AI under a concurrency limit, and an automated <code>If</code> on the emitted <code>total.token.count</code> metric halts the run when spend crosses a threshold. Email reports the cap."
      flow:
        - node: "bigquery query"
          label: "select batch"
          pluginClass: "io.kestra.plugin.gcp.bigquery.Query"
        - node: "for each"
          label: "rate-limited"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "vertex ai"
          label: "enrich"
          pluginClass: "io.kestra.plugin.gcp.vertexai.ChatCompletion"
        - node: "cost gate"
          label: "halt on threshold"
          pluginClass: "io.kestra.plugin.core.flow.If"
      items:
        - title: "Token count as a metric"
          description: "Vertex AI tasks emit <code>total.token.count</code> for the guardrail to read."
        - title: "Automated stop"
          description: "An <code>If</code> halts the batch when cost crosses the threshold."
        - title: "No surprise bills"
          description: "Spend is bounded by the flow, not discovered on the invoice."
          wide: true
    - badge: "Training"
      badgeIcon: "mdi:school-outline"
      title: "Run a Vertex AI custom training job as a step"
      description: "Model training belongs in the pipeline, not a separate console. Kestra uploads the training data to <a href='/orchestration/gcs'>GCS</a>, runs <code>CustomJob</code> to train on Vertex AI while streaming logs and waiting for completion, then loads the results into <a href='/orchestration/bigquery'>BigQuery</a>. Slack confirms."
      flow:
        - node: "gcs upload"
          label: "training data"
          pluginClass: "io.kestra.plugin.gcp.gcs.Upload"
        - node: "custom job"
          label: "train + wait"
          pluginClass: "io.kestra.plugin.gcp.vertexai.CustomJob"
        - node: "bigquery load"
          label: "load results"
          pluginClass: "io.kestra.plugin.gcp.bigquery.Load"
        - node: "slack"
          label: "on complete"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Training in the DAG"
          description: "<code>CustomJob</code> streams logs and waits, so downstream steps run after it."
        - title: "Data in, results out"
          description: "GCS staging and a BigQuery load bracket the training step."
        - title: "Retried and logged"
          description: "A failed job retries and lands in execution history like any task."
          wide: true

