faq:
  - question: "Does Kestra replace Jenkins?"
    answer: "No. Kestra sits above Jenkins instead of replacing it. The <code>io.kestra.plugin.jenkins.JobBuild</code> task triggers a Jenkins job, and <code>io.kestra.plugin.jenkins.JobInfo</code> fetches its status. Your existing Jenkinsfiles, agents, and plugins keep running. Kestra runs the orchestration layer: when each Jenkins job triggers, what runs alongside it (<a href='/orchestration/terraform'>Terraform</a>, <a href='/orchestration/ansible'>Ansible</a>, <a href='/orchestration/argocd'>Argo CD</a>), where the approval gates live, and the unified run history across every tool."
  - question: "What does Kestra add to a Jenkins setup?"
    answer: "Three things Jenkins's native scheduler does not solve well: event-driven triggers beyond cron and GitHub (webhooks, S3, Kafka, schedules, database changes); cross-tool chains where Jenkins is one step among several; and a Pause-with-notification gate between stages that logs the reviewer's identity and timestamp. Plus self-service via Kestra Apps, where a typed form fires a Jenkins job and the trigger user lands in execution history."
  - question: "Can Kestra trigger a Jenkins job when a file lands in S3 or a Kafka message arrives?"
    answer: "Yes. Kestra has 50+ native triggers (<a href='/orchestration/aws'>S3 ObjectCreated</a>, Kafka consumer, webhook, schedule, file arrival, database change, more). The trigger fires the flow with the event payload in <code>trigger.body</code>. The <code>JobBuild</code> task reads parameters from the payload and enqueues the Jenkins job. No custom webhook receiver, no polling loop."
  - question: "How does Kestra Pause differ from Jenkins input{}?"
    answer: "Jenkins <code>input{}</code> blocks the build mid-pipeline until someone clicks in the Jenkins UI. There is no first-class notification, no reviewer attribution, and a timed-out input fails the build. Kestra's <code>Pause</code> task suspends the flow; a notification task fires right before (Slack, Teams Adaptive Card, PagerDuty, Email); the reviewer's identity and timestamp are stored in execution history on resume; and a timeout closes the Pause cleanly without failing the surrounding flow."
  - question: "Can Kestra and Jenkins run side-by-side during a migration?"
    answer: "Yes. The typical migration path is incremental: existing Jenkins jobs keep firing through <code>JobBuild</code> while new logic moves into Kestra-native tasks (Python, shell, Docker, Kubernetes runners). The flow becomes the orchestration layer that calls Jenkins for legacy jobs and runs new Kestra-native steps directly. Migrating one job at a time means no big-bang rewrite and no parallel-team coordination tax."
  - question: "Can one flow trigger many Jenkins jobs in parallel?"
    answer: "Yes. A <code>ForEach</code> with <code>concurrencyLimit</code> caps the parallelism. Each iteration calls <code>JobBuild</code> with per-iteration parameters and <code>JobInfo</code> for status. <code>allowFailure</code> on the inner task isolates failures, so one bad job does not halt the wave. A targeted <a href='/orchestration/slack'>Slack</a> alert routes to the owner of the failing job rather than spamming the whole channel."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted gives complete control over where your pipeline execution and credentials live, which matters when the Jenkins instances being orchestrated are inside a regulated network."

