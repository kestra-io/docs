title: "Orchestrate Jenkins with Kestra: trigger jobs from any event, chain with Terraform and Ansible, gate deploys behind approval"
description: "Trigger Jenkins jobs from webhooks or schedules, chain them with Terraform, Ansible, and Argo CD in one flow, add Pause-with-notification gates between build and deploy, and trace every step from one execution view."

tool:
  name: "Jenkins"
  pluginClass: "io.kestra.plugin.jenkins.JobBuild"
  color: "#D33833"

hero:
  title: "Run Jenkins jobs as steps in a bigger flow."
  description: "Jenkins runs your CI in isolation. Kestra runs Jenkins jobs as steps alongside Terraform, Ansible, and Argo CD, adds approval gates between stages, triggers from any event, and gives you one execution history across every tool in the stack."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Jenkins is the CI workhorse most enterprises still run. Kestra sits above it instead of replacing it. It triggers Jenkins jobs from webhooks, schedules, or any HTTP signal; chains them with <a href='/orchestration/terraform'>Terraform</a>, <a href='/orchestration/ansible'>Ansible</a>, and <a href='/orchestration/argocd'>Argo CD</a> in one flow; adds Pause-with-notification gates between stages that Jenkins input{} cannot match; and gives you one execution view across every tool."

pillars:
  title: "Above the Jenkins build queue."
  subtitle: "Jenkins solves the build, the agent, and the workspace. Kestra solves the steps that have to run around the job: what triggers it, what runs alongside it, who approves what comes next, and where the audit trail lives."
  items:
    - icon: "mdi:pipe-disconnected"
      title: "Jenkins jobs as steps in a bigger flow"
      description: "Jenkins runs your build in isolation. It has no native way to chain with the Terraform that provisioned the agent, the Ansible that configured the host, or the Argo CD that ships the result. Kestra runs all four as tasks in one flow. <code>io.kestra.plugin.jenkins.JobBuild</code> enqueues the Jenkins job; the next task only runs after <code>io.kestra.plugin.jenkins.JobInfo</code> confirms success. Outputs flow forward and the whole chain shares one execution ID."
    - icon: "mdi:file-code-outline"
      title: "Declarative YAML, not Groovy"
      description: "A Jenkinsfile is Groovy DSL plus shell. Every pipeline change needs someone fluent in both. Kestra flows are plain YAML with typed inputs, a documented schema, and the same syntax across every namespace. The contributor doesn't have to learn Groovy to add a stage, swap a runner, or wire a notification."
    - icon: "mdi:pause-circle-outline"
      title: "Native pause and resume with notifications"
      description: "Jenkins <code>input{}</code> stops the build mid-pipeline and waits for a click in the Jenkins UI. There's no first-class notification, no reviewer attribution, no timeout that doesn't fail the build. Kestra's <code>Pause</code> task suspends the flow, fires a notification (Slack, Teams, PagerDuty, Email) right before pausing, logs the reviewer's identity and timestamp on resume, and survives operator-set timeouts cleanly."
    - icon: "mdi:lightning-bolt-outline"
      title: "Event-driven triggers beyond GitHub"
      description: "Jenkins ships with a cron timer and a GitHub webhook plugin. Anything else (Kafka, S3, a Snowflake task, a ServiceNow change, a custom HTTP source) needs a hand-rolled connector. Kestra has 50+ native triggers: <a href='/orchestration/git'>Git</a>, <a href='/orchestration/aws'>S3</a>, Kafka, webhooks, schedules, file arrival, database changes. The Jenkins job fires on the event that actually matters to the business."
    - icon: "mdi:eye-outline"
      title: "Run history that spans tools, not just Jenkins"
      description: "Jenkins's build history shows builds. It has no record of the Terraform run that created the AWS resources, the Ansible playbook that configured them, or the Argo CD sync that deployed the result. Kestra logs every step across every tool with a trigger source, a timestamp, retry counts, and a direct link to the failing task. One place to debug the full pipeline."
    - icon: "mdi:account-cog-outline"
      title: "Self-service via Kestra Apps"
      description: "Jenkins parameterized builds give a small form on the build page. They don't give QA a button to fire a smoke test, or release managers a typed form to promote a tag with the approver logged. Kestra Apps wraps any flow in a typed form. Non-engineers fire the Jenkins job they need without touching Jenkins or YAML, and every trigger lands in execution history with the user's identity."

useCases:
  title: "How teams use Jenkins and Kestra"
  subtitle: "Patterns platform and DevOps teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Event-driven"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Trigger Jenkins jobs from any event, not just cron"
      description: "A webhook (or S3 file arrival, or Kafka message, or schedule) fires the flow. Kestra calls <code>JobBuild</code> with parameters from the trigger body, polls <code>JobInfo</code> until the build reaches a terminal status, and branches on the result. The Jenkins job runs on the event that matters, not on the next cron tick."
      flow:
        - node: "webhook"
          label: "any HTTP signal"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "JobBuild"
          label: "enqueue with params"
          pluginClass: "io.kestra.plugin.jenkins.JobBuild"
        - node: "JobInfo"
          label: "poll until terminal"
          pluginClass: "io.kestra.plugin.jenkins.JobInfo"
        - node: "branch"
          label: "on result"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "notify"
          label: "Slack on outcome"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Parameters from trigger body"
          description: "<code>JobBuild.parameters</code> reads <code>trigger.body</code> at run time."
        - title: "Polling without manual scripts"
          description: "<code>JobInfo</code> handles the status check loop; no custom shell."
        - title: "Branch on Jenkins result"
          description: "An <code>If</code> task routes success and failure to different downstream paths."
          wide: true
    - badge: "Cross-stack"
      badgeIcon: "mdi:pipe-disconnected"
      title: "Chain Jenkins with Terraform, Ansible, and Argo CD"
      description: "<a href='/orchestration/terraform'>Terraform</a> provisions the AWS resources, <a href='/orchestration/ansible'>Ansible</a> configures the hosts, Jenkins runs the test suite via <code>JobBuild</code>, and <a href='/orchestration/argocd'>Argo CD</a> syncs the deploy. All four run as sequential tasks in one Kestra flow with outputs flowing forward."
      flow:
        - node: "Terraform"
          label: "provision"
          pluginClass: "io.kestra.plugin.terraform.cli.TerraformCLI"
        - node: "Ansible"
          label: "configure"
          pluginClass: "io.kestra.plugin.ansible.cli.AnsibleCLI"
        - node: "Jenkins"
          label: "test"
          pluginClass: "io.kestra.plugin.jenkins.JobBuild"
        - node: "Argo CD"
          label: "sync"
          pluginClass: "io.kestra.plugin.argocd.apps.Sync"
        - node: "notify"
          label: "Slack on done"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "One execution ID across all four tools"
          description: "Terraform run ID, Ansible recap, Jenkins build number, Argo CD sync ID all in one view."
        - title: "Step retries do not cascade"
          description: "An Ansible retry never re-runs Terraform; a Jenkins retry never re-runs Ansible."
        - title: "Outputs flow forward between steps"
          description: "<code>outputs.terraform.outputs</code> feeds the Ansible inventory; Jenkins parameters read it."
          wide: true
    - badge: "Governance"
      badgeIcon: "mdi:shield-check-outline"
      title: "Approval gate between Jenkins build and Jenkins deploy"
      description: "<code>JobBuild</code> fires the build job and <code>JobInfo</code> confirms success. Kestra posts the build number and artifact link to Microsoft Teams as an Adaptive Card, then pauses. A named reviewer approves in the Kestra UI; only then does the deploy <code>JobBuild</code> fire. Reviewer identity and timestamp are logged automatically."
      flow:
        - node: "build job"
          label: "JobBuild"
          pluginClass: "io.kestra.plugin.jenkins.JobBuild"
        - node: "teams"
          label: "approval needed"
          pluginClass: "io.kestra.plugin.microsoft365.teams.TeamsIncomingWebhook"
        - node: "pause / review"
          label: "human approves"
          gate: true
          pluginClass: "io.kestra.plugin.core.flow.Pause"
        - node: "deploy job"
          label: "JobBuild"
          pluginClass: "io.kestra.plugin.jenkins.JobBuild"
        - node: "slack"
          label: "audit log"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Notification before the Pause"
          description: "Reviewers are paged the moment the build finishes; the <code>Pause</code> is not a silent wait."
        - title: "Reviewer + timestamp logged"
          description: "Identity and approval moment stored in execution history automatically."
        - title: "Two job names, one flow"
          description: "Build and deploy job paths are typed inputs; one flow drives both stages."
        - title: "First-class audit trail"
          description: "Every production deploy is linked to a reviewer, a build number, and a moment in time."
    - badge: "Parallel"
      badgeIcon: "mdi:source-branch"
      title: "Run multiple Jenkins jobs in parallel with per-job isolation"
      description: "A release fires twelve Jenkins jobs across regions or services. Kestra fans them out via <code>ForEach</code> with <code>concurrencyLimit</code>, calls <code>JobBuild</code> per job, and isolates failures with <code>allowFailure</code>. A targeted <a href='/orchestration/slack'>Slack</a> alert pages the owner of the failing job."
      flow:
        - node: "trigger"
          label: "release event"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "ForEach jobs"
          label: "fan out"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "JobBuild"
          label: "per job, parallel"
          pluginClass: "io.kestra.plugin.jenkins.JobBuild"
        - node: "JobInfo"
          label: "per-job status"
          pluginClass: "io.kestra.plugin.jenkins.JobInfo"
        - node: "slack"
          label: "owner ping"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Bounded parallelism"
          description: "<code>concurrencyLimit</code> caps how many jobs hit the Jenkins controller at once."
        - title: "Per-job failure isolation"
          description: "<code>allowFailure</code> on the inner task keeps one bad job from halting the wave."
        - title: "Owner-aware alerts"
          description: "Slack channels routed by job name; the right team gets paged for the right failure."
          wide: true
    - badge: "Migration"
      badgeIcon: "mdi:swap-horizontal"
      title: "Modernize Jenkins incrementally, both run side-by-side"
      description: "Legacy Jenkins jobs keep running through <code>JobBuild</code> while new logic moves into Kestra flows. The Kestra flow becomes the orchestration layer: it calls the Jenkins jobs that are still useful, runs the new Kestra-native steps directly, and presents one execution history. No big-bang rewrite, no parallel-team coordination tax."
      flow:
        - node: "trigger"
          label: "webhook or schedule"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "legacy Jenkins"
          label: "JobBuild"
          pluginClass: "io.kestra.plugin.jenkins.JobBuild"
        - node: "Kestra-native step"
          label: "new logic"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "branch"
          label: "result handling"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "slack"
          label: "summary"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "No big-bang rewrite"
          description: "Migrate one job at a time; the rest keep firing from Kestra."
        - title: "One execution view during the transition"
          description: "Jenkins runs and Kestra-native steps share one execution ID and one history."
        - title: "Decommission Jenkins gradually"
          description: "Retire a Jenkins job by deleting its <code>JobBuild</code> task once the Kestra step is proven."
          wide: true

