    - badge: "Cross-tool"
      badgeIcon: "mdi:pipe-disconnected"
      title: "Provision, then open an MR with the result"
      description: "Kestra runs a <a href='/orchestration/terraform'>Terraform</a> plan, captures the output, and opens a GitLab MR containing the plan for review. Infrastructure changes get the same MR-based review as code, driven from one flow."
      flow:
        - node: "terraform plan"
