title: "Orchestrate GitLab with Kestra: auto-filed issues, automated merge requests, and CI triggers"
description: "Open GitLab issues on failure, raise merge requests from automation, trigger and poll GitLab CI pipelines, and tie GitLab into a cross-tool workflow from one place."

tool:
  name: "GitLab"
  pluginClass: "io.kestra.plugin.gitlab.issues.Create"
  color: "#fc6d26"

hero:
  title: "Wire GitLab into your automation, both ways."
  description: "GitLab tracks the work and runs the CI. Kestra connects it to everything else: file an issue the moment a pipeline fails, raise a merge request when an automated change is ready, trigger GitLab CI on an upstream event, and keep one execution history across the whole chain."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "GitLab is the system of record for code, issues, and CI. Kestra connects it to the rest of the stack: the <code>issues.Create</code> and <code>mergerequests.Create</code> tasks file issues and raise MRs from any workflow, and a CI pipeline can be triggered and polled over the GitLab REST API. File an incident issue on failure, open an MR for a generated change, or fire a pipeline when <a href='/orchestration/terraform'>Terraform</a> or <a href='/orchestration/dbt-core'>dbt</a> finishes, all in one audited flow."

pillars:
  title: "Around the GitLab project, not inside it."
  subtitle: "GitLab owns the repo, the issues, and the CI runner. Kestra owns the automation around them: what files an issue, what opens an MR, what triggers a pipeline, and where the cross-tool audit trail lives."
  items:
    - icon: "mdi:alert-circle-outline"
      title: "File issues automatically on failure"
      description: "When any flow fails, an <code>errors</code> handler running <code>io.kestra.plugin.gitlab.issues.Create</code> opens a GitLab issue with the execution link, the failing task, and labels. The incident lands in the team's existing tracker without a human relaying it from a <a href='/orchestration/slack'>Slack</a> alert."
    - icon: "mdi:source-pull"
      title: "Raise merge requests from automation"
      description: "When a flow produces a change, a dependency bump, a regenerated config, a data-driven update, <code>mergerequests.Create</code> opens an MR from a source branch for human review. The automation proposes; a person still approves and merges, so generated changes never skip review."
    - icon: "mdi:rocket-launch-outline"
      title: "Trigger and poll GitLab CI pipelines"
      description: "The plugin covers issues and MRs; GitLab CI is driven over the REST API with <code>io.kestra.plugin.core.http.Request</code>. A flow POSTs to the pipeline trigger endpoint when an upstream step confirms, then polls pipeline status until terminal, so CI fires on the event that matters rather than only on a push."
    - icon: "mdi:magnify"
      title: "Search and triage issues programmatically"
      description: "<code>issues.Search</code> queries a project's issues by state and labels. A scheduled flow can pull open issues, summarize stale or unassigned ones, and post a triage digest to <a href='/orchestration/slack'>Slack</a>, turning a manual board review into an automated routine."
    - icon: "mdi:pipe-disconnected"
      title: "GitLab as one step in a cross-tool chain"
      description: "GitLab actions rarely stand alone. Kestra runs <a href='/orchestration/terraform'>Terraform</a>, then opens an MR with the plan; or runs a <a href='/orchestration/dbt-core'>dbt</a> build, then files an issue if tests fail. GitLab is one step in a flow that spans the whole toolchain, with one execution ID."
    - icon: "mdi:server-network"
      title: "Self-hosted GitLab, first class"
      description: "Both tasks accept a custom <code>url</code> and <code>apiPath</code>, so self-managed GitLab behind a corporate network works exactly like GitLab.com. Kestra running inside the same network reaches the private instance without exposing it, which matters for regulated teams."

