faq:
  - question: "Does the Kestra GitLab plugin run CI pipelines?"
    answer: "The plugin's native tasks cover issues (<code>issues.Create</code>, <code>issues.Search</code>) and merge requests (<code>mergerequests.Create</code>). GitLab CI pipelines are triggered over the GitLab REST API with <code>io.kestra.plugin.core.http.Request</code>: POST to the pipeline trigger endpoint, then poll pipeline status until terminal. This is the same pattern Kestra uses to drive any CI system that exposes a trigger API."
  - question: "How does Kestra open a GitLab issue when a flow fails?"
    answer: "Add an <code>errors</code> block with <code>io.kestra.plugin.gitlab.issues.Create</code>. When the monitored task fails, Kestra opens an issue in the target project with a title, description, and labels, including the execution link and the failing task. The incident lands in the team's GitLab tracker without anyone relaying it from a <a href='/orchestration/slack'>Slack</a> alert."
  - question: "Can Kestra raise a merge request automatically?"
    answer: "Yes. <code>io.kestra.plugin.gitlab.mergerequests.Create</code> opens an MR from a source branch to a target branch with a title and description. A common pattern generates a change (a dependency bump, a regenerated config) on a branch, pushes it with the <a href='/orchestration/git'>Git</a> plugin, then opens the MR for human review. The automation proposes; a person approves and merges."
  - question: "Does it work with self-managed GitLab?"
    answer: "Yes. Both tasks accept a custom <code>url</code> and <code>apiPath</code>, so a self-hosted GitLab instance behind a corporate network works exactly like GitLab.com. With Kestra running inside the same network, it reaches the private instance without exposing it, which matters for regulated environments."
  - question: "How is this different from just using GitLab CI?"
    answer: "GitLab CI runs jobs triggered by Git events inside GitLab. Kestra orchestrates across tools: it triggers on webhooks, <a href='/orchestration/aws'>S3</a> arrivals, Kafka, or schedules, chains GitLab actions with <a href='/orchestration/terraform'>Terraform</a> and <a href='/orchestration/dbt-core'>dbt</a>, adds approval gates with the reviewer logged, and gives one execution history across every tool. It complements GitLab CI rather than replacing it, much like the <a href='/orchestration/jenkins'>Jenkins</a> and <a href='/orchestration/github-actions'>GitHub Actions</a> integrations."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers, and self-hosting keeps it inside the same network as a self-managed GitLab instance."

