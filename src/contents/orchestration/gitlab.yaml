      title: "Open a GitLab issue when a pipeline fails"
      description: "A monitored flow runs on a schedule. On failure, the <code>errors</code> handler opens a GitLab issue with the execution link and the failing task, and pings <a href='/orchestration/slack'>Slack</a>. The incident lands in the team's tracker without manual relay."
      flow:
        - node: "scheduled job"
          label: "monitored work"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "the pipeline"
          label: "runs"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "gitlab issue"
          label: "on failure"
          pluginClass: "io.kestra.plugin.gitlab.issues.Create"
        - node: "notify"
