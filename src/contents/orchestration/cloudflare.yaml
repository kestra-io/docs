faq:
  - question: "Does Kestra replace Cloudflare?"
    answer: "No. Cloudflare still serves your DNS, runs your edge cache, executes your Workers, and enforces your WAF rules. Kestra calls the Cloudflare API through the io.kestra.plugin.cloudflare plugin to drive changes as part of broader workflows: DNS updates triggered by Terraform output, cache purges triggered by Argo CD Healthy events, WAF rule lifecycle driven by alerts, KV writes driven by data pipelines. The edge stays where it is."
  - question: "How does Kestra authenticate to Cloudflare?"
    answer: "Use a Cloudflare API token, not the Global API Key. Create a token in the Cloudflare dashboard scoped to the minimum permissions: Zone:DNS:Edit for record changes, Zone:Cache Purge:Purge for purges, Account:Workers Scripts:Edit for Worker deploys, and so on. Store the token in Kestra's secrets backend and reference via pluginDefaults on io.kestra.plugin.cloudflare so every task picks it up."
  - question: "What's the difference between dns.records.Upsert and dns.records.Create?"
    answer: "Create always creates a new record and fails if the matching name+type already exists. Upsert creates if missing or patches the first match by name+type if it exists. Use Upsert when the same flow may run for both new and existing records (e.g. driven by Terraform output where you do not know if the A record was set up previously). Use Create when you want the failure mode to flag duplicate creation."
  - question: "Can Kestra deploy Cloudflare Worker scripts?"
    answer: "Yes. workers.scripts.Deploy uploads or replaces a Worker by name using an idempotent PUT, so redeploying the same scriptName updates the existing script. Pair with git.Clone to pull the worker code from a Git repo at flow runtime, scripts.python or scripts.javascript to build the bundle, then workers.scripts.Deploy to ship it. workers.scripts.Delete removes a script (set force: true if the script is still referenced by routes)."
  - question: "How does the WAF auto-expire pattern work?"
    answer: "Two flows. The first creates the rule with waf.accessrules.Create (mode: block) and stores the returned rule ID along with the incident ID. The second flow runs on a Schedule (say every 5 minutes), calls waf.accessrules.List, filters for rules tagged with the incident ID and older than the desired TTL, and calls waf.accessrules.Delete on each. Auto-expire without writing your own expiry loop."
  - question: "Can the same flow update DNS records across multiple zones?"
    answer: "Yes. zones.List returns every zone on the account. A ForEach over the result iterates per zone, with the zone ID available as the loop variable. Per-zone tasks (dns.records.Batch, cache.Purge, waf.accessrules.List) reference it dynamically. Multi-tenant SaaS shops with hundreds of customer zones run reconciliation flows that span the whole account in one execution."
  - question: "Is the Cloudflare plugin Enterprise-only?"
    answer: "No. The io.kestra.plugin.cloudflare plugin ships in the open-source edition with every task: dns.records.*, cache.Purge, waf.accessrules.*, compute.kv.*, compute.namespaces.Create, workers.scripts.*, workers.dynamic.Run, zones.*. Kestra Enterprise adds Apps for self-service (engineers add a DNS record via a typed form), namespace-scoped RBAC, audit logs, and SSO."
  - question: "Can Kestra orchestrate Cloudflare in an air-gapped environment?"
    answer: "Cloudflare is a SaaS edge, so the API itself is internet-reachable. Kestra workers that call the API need outbound network to api.cloudflare.com. The Kestra control plane and the workers themselves can still run inside an air-gapped network with outbound HTTPS allow-listed to api.cloudflare.com. See <a href='/infra-automation'>Kestra for infrastructure automation</a> for the broader self-hosted picture."

