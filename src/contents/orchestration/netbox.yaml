title: "Orchestrate NetBox with Kestra: inventory-driven flows, IPAM, drift sync"
description: "Drive Ansible flows from NetBox device and site lists. Auto-allocate IPs from prefixes on VM provision. Reconcile scan reality with declared inventory weekly."

tool:
  name: "NetBox"
  pluginClass: "io.kestra.plugin.ee.netbox.device.List"
  color: "#00A99D"

hero:
  title: "Let NetBox decide what runs where."
  description: "List devices from NetBox by site, role, or tag and run Ansible against them. Auto-allocate IPs from a prefix when a new VM provisions. Reconcile network scan reality with declared inventory weekly. Manage device and contact assignment lifecycle as flow steps, with NetBox as the source of truth."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Make NetBox the inventory source of truth for every flow with an orchestration engine that lists devices by site/role/tag, allocates IPs from prefixes on VM provision, handles drift reconciliation between scan reality and declared inventory, and chains NetBox with <a href='/orchestration/ansible'>Ansible</a>, <a href='/orchestration/proxmox'>Proxmox</a>, and <a href='/orchestration/servicenow'>ServiceNow</a>. Drop the static hosts file; cut drift detection from quarterly to weekly."

pillars:
  title: "Around every device, every prefix, every site."
  subtitle: "NetBox holds the inventory. Kestra reads it to drive automation, writes back to keep it current, and reconciles it against reality on a schedule. The static Ansible inventory file, the IP spreadsheet, and the who-has-which-rack tribal knowledge all go away. NetBox is the source of truth, flows are the consumers."
  items:
    - icon: "mdi:server-network"
      title: "Device lists feed the ForEach, no static inventory file"
      description: "device.List fetches devices from NetBox with filters on site, role, tag, status, and custom fields. fetchType STORE writes large results to internal storage for thousand-device fleets, FETCH keeps small results in memory. A ForEach iterates the result and runs Ansible, Terraform, or any plugin task per device using the device's primary IP from NetBox. The static inventory file disappears, NetBox is the inventory."
    - icon: "mdi:ip-network-outline"
      title: "IPAM allocates from a prefix on demand"
      description: "ipam.AssignIpAddress creates an IP address and assigns it to a device or VM interface. Provide an explicit address, or a prefixId to let NetBox allocate the next available from the prefix. Tags and custom fields stamp the allocation with the requesting flow's execution ID for audit. The static spreadsheet of who-has-which-IP disappears, NetBox tracks every allocation."
    - icon: "mdi:plus-network-outline"
      title: "Device records created and patched alongside reality"
      description: "device.Create posts a new device with type, role, site slugs, optional rack, position, face, status, tags, and custom fields. device.Update applies PATCH by default (partialUpdate true), or PUT when disabled. The flow that provisions a VM in Proxmox or vSphere also registers it in NetBox. The flow that decommissions removes it. Reality and the declared inventory stay aligned automatically."
    - icon: "mdi:office-building-marker-outline"
      title: "Site enumeration drives per-site flows"
      description: "site.List enumerates every site in NetBox with optional filters. A ForEach over the result runs per-site flows: backup verification per DC, patch waves per region, audit reports per facility. Adding a new site is a NetBox edit, not a flow refactor or a CI variable update."
    - icon: "mdi:account-multiple-outline"
      title: "Contact assignment automation"
      description: "contactassignment.Create posts a contact assignment linking a contact and role to a resource object (device, site, VM, circuit, IP) by content type and object ID. Priority accepts primary, secondary, tertiary, or inactive. Use to keep on-call ownership in sync with the rotation, auto-assign vendor contacts to new circuits, or attach a billing owner to every device on provision."
    - icon: "mdi:compare-horizontal"
      title: "Drift reconciliation between reality and declaration"
      description: "A weekly reconciliation flow runs a network scan (LLDP discovery, SNMP, or hypervisor API), pulls NetBox state via device.List, and diffs the two. Devices in reality but not NetBox auto-create with a review-needed tag. Devices in NetBox but missing from reality open a GitHub issue for the responsible team. The inventory stays trustworthy without manual audits."

useCases:
  title: "How network teams use NetBox and Kestra"
  subtitle: "Patterns network and platform teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Inventory-driven"
      badgeIcon: "mdi:server-network"
      title: "Run Ansible against every edge router in DC-2"
      description: "device.List filters by role: edge-router, status: active, site: dc-2. A ForEach iterates the result and runs an Ansible playbook against each device, addressing it by the primary IP from NetBox. Per-device results are captured via the Kestra Ansible callback. A single rollup posts to Slack with success counts, failure details, and links to the per-device executions. The static Ansible inventory file goes away."
      flow:
        - node: "monthly maintenance"
          label: "schedule"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "device list"
          label: "filtered by role + site"
          pluginClass: "io.kestra.plugin.ee.netbox.device.List"
        - node: "ForEach device"
          label: "per host"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "ansible playbook"
          label: "addressed by primary IP"
          pluginClass: "io.kestra.plugin.ansible.cli.AnsibleCLI"
        - node: "aggregate"
          label: "per-device results"
          pluginClass: "io.kestra.plugin.core.flow.Subflow"
        - node: "notify"
          label: "Slack rollup"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Inventory lives in NetBox, not in a YAML file"
          description: "Adding a device is a NetBox edit. The next flow run picks it up automatically. No PR to the inventory file, no merge conflicts."
        - title: "Filter granularity matches your operational shape"
          description: "Filter by role, site, status, tag, or a custom field. The same flow definition handles a 4-device set or a 400-device set, scoped by the device.List filter."
        - title: "Per-device retries inside the ForEach"
          description: "If one device hits a transient SSH failure, only that ForEach iteration retries. The other devices keep moving."
        - title: "Rollup shows what worked, what did not, where"
          description: "The Slack message links to per-device executions and lists by site or role which devices need follow-up."
          wide: true
    - badge: "IPAM"
      badgeIcon: "mdi:ip-network-outline"
      title: "Allocate an IP from a prefix when a new VM provisions"
      description: "A Proxmox or vSphere VM creation flow needs an IP for the new guest. The flow calls ipam.AssignIpAddress with a prefixId for the target subnet; NetBox allocates the next available IP and tags the allocation with the requesting execution ID. The flow configures the VM's network with the allocated IP. device.Create registers the VM in NetBox with the IP record linked. No spreadsheet, no Slack ping for an IP."
      flow:
        - node: "vm request"
          label: "form or webhook"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "create vm"
          label: "Proxmox or vSphere"
          pluginClass: "io.kestra.plugin.proxmox.vm.Create"
        - node: "allocate ip"
          label: "from prefix"
          pluginClass: "io.kestra.plugin.ee.netbox.ipam.AssignIpAddress"
        - node: "configure network"
          label: "assign IP to guest"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "register device"
          label: "device.Create"
          pluginClass: "io.kestra.plugin.ee.netbox.device.Create"
        - node: "assign owner"
          label: "contactassignment.Create"
          pluginClass: "io.kestra.plugin.ee.netbox.contactassignment.Create"
      items:
        - title: "Prefix-based allocation, no manual picking"
          description: "Pass a prefixId, NetBox returns the next available IP from that subnet. The flow does not need to know which IPs are taken."
        - title: "Allocation tagged with execution ID"
          description: "The IP record's tags include the Kestra execution ID, so an audit later answers exactly which flow run claimed which IP."
        - title: "Device registration and owner assignment chained"
          description: "The same flow that allocates the IP also registers the device and assigns the billing or on-call owner via contactassignment.Create."
          wide: true
    - badge: "Operations"
      badgeIcon: "mdi:office-building-marker-outline"
      title: "Site-by-site patch wave with per-site Slack rollup"
      description: "Monthly patch wave. site.List returns every active site (filtered by tenant, region, or tag). Per site, device.List filters by role and status. A nested ForEach runs the patching subflow per device with site context, snapshot before patch, health probe after. Per-site rollup posts to that site's Slack channel. One flow handles dozens of sites and thousands of devices."
      flow:
        - node: "monthly window"
          label: "schedule"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "list sites"
          label: "active only"
          pluginClass: "io.kestra.plugin.ee.netbox.site.List"
        - node: "ForEach site"
          label: "with concurrency"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "list devices"
          label: "per site, by role"
          pluginClass: "io.kestra.plugin.ee.netbox.device.List"
        - node: "patch subflow"
          label: "snapshot + patch + verify"
          pluginClass: "io.kestra.plugin.core.flow.Subflow"
        - node: "per-site rollup"
          label: "site-specific Slack"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Site cardinality drives the outer loop"
          description: "Adding a site to NetBox extends the flow's coverage automatically. No flow edit, no schedule update."
        - title: "Per-site Slack channel from NetBox metadata"
          description: "Each site's Slack webhook is stored as a NetBox custom field. The flow reads it per iteration and posts to the right channel."
        - title: "Concurrency control caps blast radius"
          description: "ForEach concurrencyLimit ensures only N sites are patched at once, so a region-wide failure does not roll across the world."
          wide: true
    - badge: "Audit"
      badgeIcon: "mdi:compare-horizontal"
      title: "Weekly reconciliation: scan reality, diff NetBox, alert on drift"
      description: "Weekly flow. A network scan (LLDP discovery, SNMP poll, or hypervisor API) returns the actual device list. device.List returns the NetBox declared list. A diff task computes additions (devices in reality but not NetBox) and deletions (devices in NetBox but missing from the scan). Additions auto-create with a review-needed tag for the network team to confirm. Deletions open a GitHub issue against the responsible team's repo."
      flow:
        - node: "weekly schedule"
          label: "cron"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "scan reality"
          label: "LLDP / SNMP / hypervisor"
          pluginClass: "io.kestra.plugin.scripts.python.Script"
        - node: "netbox state"
          label: "device.List"
          pluginClass: "io.kestra.plugin.ee.netbox.device.List"
        - node: "diff"
          label: "additions, deletions"
          pluginClass: "io.kestra.plugin.scripts.python.Script"
        - node: "auto-create new"
          label: "with review tag"
          pluginClass: "io.kestra.plugin.ee.netbox.device.Create"
        - node: "issue for missing"
          label: "GitHub"
          pluginClass: "io.kestra.plugin.github.issues.Create"
        - node: "report"
          label: "Slack summary"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Drift surfaces before it bites"
          description: "Stale inventory is the number one cause of automation failures. Weekly reconciliation catches it inside a week."
        - title: "Additions get a review-needed tag"
          description: "Auto-created devices are not silently trusted. A review tag flags them for the network team's next standup."
        - title: "Deletions open a GitHub issue"
          description: "A device missing from the scan is a real incident: hardware failure, decommission, or misconfigured scan. The issue routes to the team that owns it."
          wide: true

