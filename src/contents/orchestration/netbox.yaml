faq:
  - question: "Why drive automation from NetBox instead of a static inventory file?"
    answer: "A static Ansible inventory file or a per-team CSV is the number one cause of automation failures: it gets stale, it gets edited inconsistently, it lives in a repo that no one updates. NetBox is built to be the source of truth for inventory, with relationships between devices, sites, racks, prefixes, IPs, and contacts. Driving flows from NetBox means adding a device to inventory is one place (NetBox), and every automation that touches that device picks it up automatically on the next run."
  - question: "Is the NetBox plugin available in the open-source edition?"
    answer: "No. The io.kestra.plugin.ee.netbox plugin is part of Kestra Enterprise. The open-source edition includes nearly every other Kestra plugin (1300+), and you can call the NetBox REST API from the OSS edition via io.kestra.plugin.core.http.Request, but you lose the typed task shape (device.List with filters, ipam.AssignIpAddress with prefix allocation, etc.) and end up writing more YAML to handle pagination and response parsing."
  - question: "How does Kestra authenticate to NetBox?"
    answer: "NetBox API tokens. Create a token in the NetBox UI under Admin > API Tokens, scoped to a service user with the minimum required permissions: dcim.view_device for listing, dcim.add_device for creating, ipam.add_ipaddress for allocation, and so on. Store the URL and token in Kestra's secrets backend and reference via pluginDefaults on io.kestra.plugin.ee.netbox so every task picks them up without repeating credentials."
  - question: "Can the plugin use NetBox custom fields?"
    answer: "Yes. device.List filters accept custom field queries via the standard NetBox query parameter syntax. device.Create and device.Update accept a customFields object with the field slugs as keys. Use custom fields for the Slack channel webhook per site, the on-call rotation per device, the cost center per rack, or anything else your team has modeled in NetBox."
  - question: "How does the IPAM allocate-from-prefix work?"
    answer: "ipam.AssignIpAddress accepts either an explicit address (e.g. 10.0.1.42) or a prefixId. When prefixId is provided, NetBox allocates the next available IP from that prefix and returns the assigned address in the task output. Use tags and custom fields on the allocation to track the requesting flow's execution ID, the target device, or any other audit metadata. The flow does not need to know which IPs are taken."
  - question: "How does drift reconciliation work in practice?"
    answer: "A scheduled flow runs a network scan (LLDP discovery, SNMP poll, vCenter API, Proxmox API, or a cloud provider API), reads the corresponding NetBox state via device.List, and diffs the two by device name or serial number. Devices in reality but missing from NetBox auto-create via device.Create with a review-needed tag for the network team to confirm. Devices in NetBox but missing from the scan open a GitHub issue against the team that owns them. The inventory stays trustworthy without manual audits."
  - question: "Can Kestra run in an air-gapped environment alongside an air-gapped NetBox?"
    answer: "Yes. Kestra ships self-hosted on Docker or Kubernetes and runs fully air-gapped. The NetBox plugin reaches NetBox over HTTPS, so the only network requirement is that the Kestra workers can reach the NetBox URL inside your network. Use the trusted CA properties on Kestra's HTTP tasks if your NetBox uses an internal CA. See <a href='/infra-automation'>Kestra for infrastructure automation</a> for the broader self-hosted picture across NetBox, Ansible, Proxmox, and the rest of the stack."
  - question: "Where does NetBox fit alongside Ansible and Terraform?"
    answer: "NetBox is the inventory source of truth. Ansible configures the devices NetBox knows about. Terraform provisions the underlying infrastructure those devices live on. Kestra chains them: device.List feeds the Ansible ForEach, ipam.AssignIpAddress assigns IPs that Terraform's network resources will reference, and device.Create writes back the provisioned resources to NetBox. One execution history across inventory, provisioning, and configuration."

