faq:
  - question: "Does Kestra replace Step Functions?"
    answer: "Step Functions is great for AWS-native state machines that live entirely inside AWS, especially with deep integration into Lambda and Map states for parallel processing. Kestra is a general-purpose orchestrator that calls the AWS API as one of 1300+ plugins. Use Step Functions when every step is AWS and you want the ASL state machine. Use Kestra when the flow spans AWS plus non-AWS tools (dbt, Snowflake, Slack, GitHub, ServiceNow), needs approval gates from your team UI, and benefits from portable YAML over AWS-only ASL."
  - question: "How does Kestra authenticate to AWS?"
    answer: "Standard AWS auth chain. Static credentials (accessKeyId, secretAccessKey) for local dev. Instance role for Kestra workers running on EC2 or ECS. IRSA (IAM Roles for Service Accounts) when Kestra runs on EKS. For cross-account ops, every task accepts stsRoleArn, stsRoleSessionName, and stsRoleExternalId to assume a role per task. Secrets go through Kestra's secrets backend; nothing AWS-credential-shaped lives in flow YAML."
  - question: "How does the S3 trigger handle high-throughput buckets?"
    answer: "s3.Trigger polls on a configured interval (default conservative). For high-throughput buckets, use a shorter interval (PT10S) and tight prefix/regex filters so the trigger only sees files it should fire on. Set action: MOVE or action: DELETE on processed files to keep the next poll cheap. For very high throughput, fan out at the S3 layer via prefix-sharded buckets, each with its own trigger flow. State is maintained per trigger to prevent reprocessing."
  - question: "Can Kestra orchestrate EMR clusters that need GPU nodes?"
    answer: "Yes. emr.CreateClusterAndSubmitSteps accepts custom instance types including GPU instance families (g5, p4d, p5). Define the cluster with the GPU pool, submit Spark/Hadoop steps that target it, and the cluster auto-terminates when keepJobFlowAliveWhenNoSteps is false (default). For Pod-native GPU workloads, pair with the <a href='/orchestration/kubernetes'>Kubernetes plugin</a> and EMR-on-EKS to run Spark on a long-lived EKS cluster's GPU nodes."
  - question: "Can the same flow operate across multiple AWS accounts?"
    answer: "Yes. Every AWS task accepts stsRoleArn for cross-account assume-role. The pattern: iterate a list of (account_alias, role_arn) tuples with ForEach, set stsRoleArn dynamically per iteration. One flow walks dev, staging, prod accounts in sequence. Approval gates between environment groups (non-prod, then prod) use the same Pause + resume mechanism. No federation infrastructure required beyond the trust relationships on the assumed roles."
  - question: "What about EventBridge: is it still useful with Kestra?"
    answer: "Yes, for fanning OUT to consumers. eventbridge.PutEvents publishes events to a custom bus when a flow step completes. Downstream consumers (other Lambdas, third-party SaaS, on-call systems) pick them up. The flow no longer DEPENDS on EventBridge rules for its own routing, but EventBridge as a publish target keeps your existing fanout patterns intact. Decouple the orchestration from the notification fanout."
  - question: "Is the AWS plugin Enterprise-only?"
    answer: "No. The io.kestra.plugin.aws plugin ships in the open-source edition with 46 tasks: s3.*, lambda.Invoke, glue.*, emr.*, athena.Query, dynamodb.*, sqs.*, sns.Publish, eventbridge.PutEvents, cloudwatch.*, ecr.GetAuthToken, auth.EksToken, cloudformation.*, cli.AwsCLI, plus 6 triggers (s3, sqs, kinesis, cloudwatch). Kestra Enterprise adds Apps, namespace-scoped RBAC, audit logs, worker isolation, SSO, and the AWS Batch task runner that runs flow tasks as AWS Batch jobs."
  - question: "Can Kestra run in an air-gapped AWS account or VPC?"
    answer: "Yes. Kestra ships self-hosted on Docker, ECS, or EKS, runs fully inside a private VPC, and uses VPC endpoints for AWS API access. The OSS edition runs air-gapped with no external dependency beyond your AWS API endpoints. See <a href='/infra-automation'>Kestra for infrastructure automation</a> for the broader self-hosted picture across AWS, Kubernetes, Terraform, and Cloudflare."

