title: "Orchestrate Hightouch with Kestra: event-driven reverse-ETL across your data stack"
description: "Run the Airbyte to dbt to Hightouch chain in one flow, gate activation on dbt tests, fan out to multiple destinations, and audit every row push from one place."

tool:
  name: "Hightouch"
  pluginClass: "io.kestra.plugin.hightouch.Sync"
  color: "#d1f05d"

hero:
  title: "Run Hightouch syncs only when the data is right."
  description: "Reverse-ETL fails when bad rows ship. Kestra chains Airbyte, dbt build, dbt test, and the Hightouch sync. A failing test halts the chain before any row touches Salesforce, and row counts post to the approval channel before production fires."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Reverse-ETL has one failure mode that matters: pushing bad data to the CRM. Kestra wraps Hightouch with the steps that make activation safe. It runs Airbyte ingest with retries that don't cascade, builds and tests dbt models as a hard gate before any sync (see <a href='/orchestration/dbt-core'>dbt Core</a> or <a href='/orchestration/dbt-cloud'>dbt Cloud</a>), fans out to Salesforce, HubSpot, and Iterable in parallel with per-destination isolation, and pauses for human approval with row counts surfaced."

pillars:
  title: "Above the Hightouch sync scheduler."
  subtitle: "Hightouch solves the destination wiring and field mappings. Kestra solves the steps that have to run around the sync to make activation safe."
  items:
    - icon: "mdi:test-tube"
      title: "dbt tests as a hard gate before activation"
      description: "Hightouch's scheduler does not know whether the model it is about to read passed its tests. If a <code>dbt test</code> regresses overnight, the next sync activates bad rows to Salesforce or HubSpot. Kestra runs <code>dbt test</code> as a separate task between build and sync. A failure halts the chain, pages the on-call, and the Hightouch sync never fires. The classic reverse-ETL anti-pattern of shipping silently broken data disappears."
    - icon: "mdi:pipe-disconnected"
      title: "One flow for ingest, transform, activate"
      description: "Hightouch's run history stops at the destination boundary. It has no record of the Airbyte connection that produced the warehouse data or the dbt build that shaped the activation mart. Kestra runs Airbyte, <a href='/orchestration/dbt-core'>dbt</a>, and Hightouch as steps in one flow. Step retries do not cascade: a dbt retry never re-runs Airbyte, a Hightouch retry never re-runs dbt, and run IDs from each step flow forward for traceability."
    - icon: "mdi:eye-outline"
      title: "Approval gate with row counts surfaced"
      description: "Promoting a sync from staging to production with no human review burns trust the first time a definition change ships ten thousand wrong rows. Kestra runs the staging sync first, posts the row counts to a notification channel (<a href='/orchestration/slack'>Slack</a>, Microsoft Teams, or any webhook target), and pauses for a named reviewer. Only after explicit approval in the Kestra UI does the production sync fire. Reviewer identity and timestamp are stored in execution history."
    - icon: "mdi:lightning-bolt-outline"
      title: "Event-driven syncs, not cron buffers"
      description: "Hightouch's built-in scheduler fires on a cron interval. If dbt runs long or a Fivetran sync slips, the next tick activates stale rows. Kestra triggers the Hightouch sync the moment the upstream task confirms success, whether that's a <code>dbt build</code>, a webhook from Fivetran, a Snowflake task event, or any HTTP signal. The cron padding that builds on stale data goes away."
    - icon: "mdi:source-branch"
      title: "Per-destination failure isolation in fan-out"
      description: "One activation mart powers Salesforce, HubSpot, Iterable, and Braze through separate Hightouch syncs. With one scheduler, a Salesforce API outage takes down the whole batch. With Kestra, <code>allowFailure</code> on each task isolates the failure: HubSpot keeps shipping, and the right owner gets paged for the right destination."
    - icon: "mdi:account-cog-outline"
      title: "Self-service triggers for marketing and ops"
      description: "Hightouch's UI is built for sync configuration. It does not give marketing a form to fire a one-off Iterable resync after a campaign launch, or ops a button to backfill HubSpot after a data correction. Kestra Apps wraps any flow in a typed form. Non-engineers fire the sync they need, and every trigger lands in execution history with the user's identity."

useCases:
  title: "How teams use Hightouch and Kestra"
  subtitle: "Patterns reverse-ETL teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Canonical chain"
      badgeIcon: "mdi:pipe-disconnected"
      title: "Airbyte to dbt to Hightouch in one flow"
      description: "Airbyte syncs, then <a href='/orchestration/dbt-core'>dbt</a> builds the activation marts on BigQuery (or Snowflake, Postgres, Redshift), then Hightouch fires. <a href='/orchestration/slack'>Slack</a> confirms with the Hightouch run ID. Step retries stay local: a dbt failure never re-runs Airbyte."
      flow:
        - node: "schedule or event"
          label: "trigger"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "airbyte sync"
          label: "ingest"
          pluginClass: "io.kestra.plugin.airbyte.connections.Sync"
        - node: "dbt build"
          label: "transform"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "hightouch sync"
          label: "activate"
          pluginClass: "io.kestra.plugin.hightouch.Sync"
        - node: "slack"
          label: "Hightouch run ID"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Step retries do not cascade"
          description: "A dbt retry never re-runs the Airbyte ingest, and a Hightouch retry never re-runs dbt."
        - title: "Run IDs flow forward"
          description: "Airbyte job ID, dbt results, and the Hightouch run ID land in one execution view."
        - title: "Swap warehouses by container image"
          description: "Swap the dbt image for <code>dbt-snowflake</code>, <code>dbt-postgres</code>, or <code>dbt-redshift</code>."
          wide: true
    - badge: "Quality gate"
      badgeIcon: "mdi:test-tube"
      title: "Halt activation when dbt tests fail"
      description: "Data quality checks gate the activation. Kestra runs <code>dbt build</code>, then <code>dbt test</code> as a separate task. A test failure halts the chain and pages PagerDuty so the on-call can fix the regression before any row touches HubSpot or Salesforce. On pass, Hightouch fires and <a href='/orchestration/slack'>Slack</a> confirms."
      flow:
        - node: "dbt build"
          label: "build the marts"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "dbt test"
          label: "quality gate"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "hightouch sync"
          label: "activate only on pass"
          pluginClass: "io.kestra.plugin.hightouch.Sync"
        - node: "pagerduty"
          label: "page on test fail"
          pluginClass: "io.kestra.plugin.pagerduty.PagerDutyAlert"
      items:
        - title: "Hard halt before sync"
          description: "Hightouch never fires when <code>dbt test</code> fails. Bad rows do not reach the CRM."
        - title: "PagerDuty for the on-call"
          description: "Quality regressions page the rotation, not just log to <a href='/orchestration/slack'>Slack</a>."
        - title: "Elementary or great_expectations work too"
          description: "Swap <code>dbt test</code> for any quality framework. The gate is task-level, not tool-specific."
          wide: true
    - badge: "Multi-destination"
      badgeIcon: "mdi:source-branch"
      title: "Fan out to Salesforce, HubSpot, and Iterable in parallel"
      description: "One activation mart, many destinations. Kestra fans the dbt output to multiple Hightouch syncs in parallel: Salesforce for sales ops, HubSpot for marketing, Iterable for lifecycle messaging. Failures are isolated per destination, and the failing sync's owner is paged directly."
      flow:
        - node: "dbt build"
          label: "build the mart"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "salesforce sync"
          label: "sales ops"
          pluginClass: "io.kestra.plugin.hightouch.Sync"
        - node: "hubspot sync"
          label: "marketing"
          pluginClass: "io.kestra.plugin.hightouch.Sync"
        - node: "iterable sync"
          label: "lifecycle"
          pluginClass: "io.kestra.plugin.hightouch.Sync"
        - node: "slack per dest"
          label: "targeted alert"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Parallel or sequential"
          description: "Parallel for speed, or sequential with <code>allowFailure</code> when downstream depends on upstream."
        - title: "Per-destination owner pings"
          description: "Salesforce failure pages sales ops, HubSpot failure pages marketing. Not the whole data team."
        - title: "Row counts per destination"
          description: "Hightouch outputs the run ID and metrics per sync. Kestra surfaces them in one execution view."
          wide: true
    - badge: "Governance"
      badgeIcon: "mdi:shield-check-outline"
      title: "Staging-to-prod with row counts at the gate"
      description: "Kestra runs the staging Hightouch sync, posts row counts to Microsoft Teams as an Adaptive Card, then pauses. The reviewer reads the added, removed, and changed counts in the <code>Pause</code> description and resumes in the Kestra UI. Only then does the production sync fire. Identity and timestamp logged automatically."
      flow:
        - node: "staging sync"
          label: "test destination"
          pluginClass: "io.kestra.plugin.hightouch.Sync"
        - node: "teams"
          label: "approval needed"
          pluginClass: "io.kestra.plugin.microsoft365.teams.TeamsIncomingWebhook"
        - node: "pause / review"
          label: "human approves"
          gate: true
          pluginClass: "io.kestra.plugin.core.flow.Pause"
        - node: "production sync"
          label: "live destination"
          pluginClass: "io.kestra.plugin.hightouch.Sync"
        - node: "slack complete"
          label: "audit log"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Notification before the Pause"
          description: "Reviewers are paged the moment staging finishes. The <code>Pause</code> is not a silent wait."
        - title: "Row counts in the Pause description"
          description: "Templated from <code>outputs.run_staging.runId</code> and the Hightouch run metrics."
        - title: "Reviewer + timestamp logged"
          description: "Identity and approval moment stored in execution history automatically."
        - title: "Two sync IDs, one flow"
          description: "Same flow drives both environments. Staging and production sync IDs are typed inputs."
    - badge: "Operations"
      badgeIcon: "mdi:tune-vertical"
      title: "Throttled full resync after a schema change"
      description: "Schema changes force a full reload, but Salesforce caps the data loader at 5,000 records per call and HubSpot at 100 per batch. Kestra fans the syncs in waves with delays between, sets <code>fullResynchronization</code> to <code>true</code> from a typed input, and surfaces per-destination metrics without tripping limits."
      flow:
        - node: "manual input"
          label: "full=true"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "wave 1"
          label: "Salesforce + HubSpot"
          pluginClass: "io.kestra.plugin.hightouch.Sync"
        - node: "wait"
          label: "respect rate limits"
          pluginClass: "io.kestra.plugin.core.flow.Sleep"
        - node: "wave 2"
          label: "Iterable + Braze"
          pluginClass: "io.kestra.plugin.hightouch.Sync"
        - node: "slack report"
          label: "per-sync metrics"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "fullResynchronization from input"
          description: "Typed flow input flips the <code>Sync</code> task between incremental and full reload with no code change."
        - title: "Throttling via Sleep between waves"
          description: "Built-in <code>Sleep</code> task delays the next wave so the destination API does not throttle."
        - title: "Self-service via Kestra Apps"
          description: "Non-engineers trigger a full resync through a form without touching YAML."
          wide: true

