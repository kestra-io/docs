faq:
  - question: "What's the difference between Hightouch's built-in scheduler and Kestra?"
    answer: "Hightouch's scheduler fires syncs on a cron interval, or after a Hightouch-internal model build. It was designed for Hightouch-only scheduling and has no visibility into what produced the warehouse model it is about to read. Kestra sits above that: it runs Airbyte ingest, <a href='/orchestration/dbt-core'>dbt</a> build, <code>dbt test</code>, and the Hightouch sync as steps in one flow. It halts on a failing test before any row touches the destination, and gates production behind a human <code>Pause</code>. Kestra works with Hightouch, not instead of it."
  - question: "Can Kestra trigger a Hightouch sync the moment dbt finishes?"
    answer: "Yes. The <a href='/orchestration/dbt-core'>dbt CLI</a> task and the <code>io.kestra.plugin.hightouch.Sync</code> task run sequentially in the same flow. Kestra polls Hightouch every second until terminal status (<code>wait: true</code> is the default). The next task only starts after the sync confirms, so there is no cron buffer between dbt and Hightouch and no chance of activating stale rows."
  - question: "How do I stop Hightouch from syncing when dbt tests fail?"
    answer: "Run <code>dbt test</code> as a separate task between <code>dbt run</code> and the Hightouch sync. If any test fails, Kestra halts the flow before the Hightouch task starts, and the errors handler fires (the dbt-test-gate blueprint uses PagerDuty). Hightouch never runs against failing data."
  - question: "How does the approval gate work before a production Hightouch sync?"
    answer: "Kestra runs the staging Hightouch sync first, posts the staging run ID and row counts to a notification channel (the blueprint uses Microsoft Teams Adaptive Cards), and pauses. A named reviewer reads the row counts in the <code>Pause</code> description and resumes the flow in the Kestra UI. Only then does the production sync fire. The reviewer identity and timestamp are stored in execution history automatically."
  - question: "Can one flow fan out to Salesforce, HubSpot, and Iterable in parallel?"
    answer: "Each Hightouch sync ID runs as a separate <code>Sync</code> task. They can run in parallel for speed or sequentially for dependency control. <code>allowFailure</code> on each task isolates failures, so a Salesforce auth issue does not block the HubSpot sync. Per-destination metrics surface in the execution view, and a targeted <a href='/orchestration/slack'>Slack</a> alert routes to the right owner."
  - question: "Does the Hightouch Sync task support fullResynchronization?"
    answer: "Yes. Set <code>fullResynchronization: true</code> on the <code>Sync</code> task, or parameterize it from a typed flow input. The default is incremental. For large rebuilds after a schema change, run syncs in waves with a <code>Sleep</code> task between to respect destination API rate limits like Salesforce's 5,000-record cap per data loader call."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted gives complete control over where your pipeline execution and credentials live, which matters when the data being activated is customer PII."

