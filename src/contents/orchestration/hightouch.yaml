blueprints:
  title: "Blueprints for Hightouch orchestration."
  lead: "Production-ready flows. Copy the YAML, wire it to your stack."
  items:
    - name: "Airbyte to dbt to Hightouch chain"
      blueprintId: "hightouch-airbyte-dbt-activation"
      title: "Airbyte to dbt to Hightouch with Slack confirmation"
      description: "Airbyte ingests, <code>dbt build</code> runs models and tests inline, Hightouch activates, <a href='/orchestration/slack'>Slack</a> confirms with the run ID. Step retries stay local: a dbt failure never re-runs Airbyte. The errors handler posts a Slack alert on any failure."
      href: "/blueprints"
      flowDiagram:
        source:
          label: "Schedule or webhook"
          sublabel: "cron or upstream event"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        workflow:
          label: "Ingest, transform, activate"
          sublabel: "step-local retries"
        tools:
          - label: "Airbyte sync"
            pluginClass: "io.kestra.plugin.airbyte.connections.Sync"
          - label: "dbt build"
            pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
          - label: "Hightouch sync"
            pluginClass: "io.kestra.plugin.hightouch.Sync"
          - label: "Slack notify"
            pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
        outcome:
          label: "Destination updated"
          sublabel: "one execution ID"
          icon: "mdi:pipe-disconnected"
      plugins:
        - "io.kestra.plugin.airbyte.connections.Sync"
        - "io.kestra.plugin.dbt.cli.DbtCLI"
        - "io.kestra.plugin.hightouch.Sync"
        - "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      code: |
        id: hightouch-airbyte-dbt-activation
        namespace: company.team

        inputs:
          - id: airbyte_connection_id
            type: STRING
          - id: hightouch_sync_id
            type: INT

        tasks:
          - id: airbyte_sync
            type: io.kestra.plugin.airbyte.connections.Sync
            connectionId: "{{ inputs.airbyte_connection_id }}"
            wait: true

          - id: dbt_build
            type: io.kestra.plugin.dbt.cli.DbtCLI
            commands:
              - dbt deps
              - dbt build

          - id: hightouch_sync
            type: io.kestra.plugin.hightouch.Sync
            token: "{{ secret('HIGHTOUCH_API_TOKEN') }}"
            syncId: "{{ inputs.hightouch_sync_id }}"
            wait: true

          - id: notify
            type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
            url: "{{ secret('SLACK_WEBHOOK_URL') }}"
            payload: |
              {
                "text": "Activation complete. Hightouch run {{ outputs.hightouch_sync.runId }} (execution {{ execution.id }})."
              }

        pluginDefaults:
          - type: io.kestra.plugin.airbyte.connections.Sync
            values:
              url: "{{ secret('AIRBYTE_URL') }}"
              token: "{{ secret('AIRBYTE_TOKEN') }}"
          - type: io.kestra.plugin.dbt.cli.DbtCLI
            values:
              taskRunner:
                type: io.kestra.plugin.scripts.runner.docker.Docker
              containerImage: ghcr.io/kestra-io/dbt-bigquery:latest
              namespaceFiles:
                enabled: true

        errors:
          - id: alert_on_failure
            type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
            url: "{{ secret('SLACK_WEBHOOK_URL') }}"
            payload: |
              {
                "text": "Activation chain failed in {{ flow.namespace }}.{{ flow.id }} (execution {{ execution.id }})."
              }
    - name: "dbt test gate before activation"
      blueprintId: "hightouch-dbt-test-gate"
      title: "dbt test gate before Hightouch activation"
      description: "Build dbt, run <code>dbt test</code> as a separate task, activate Hightouch only on pass. A failure halts the flow and pages PagerDuty; Hightouch never fires, so bad rows do not reach the CRM. On pass, <a href='/orchestration/slack'>Slack</a> confirms with the run ID."
      href: "/blueprints"
      flowDiagram:
        source:
          label: "Build trigger"
          sublabel: "manual or scheduled"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        workflow:
          label: "Build, test, activate"
          sublabel: "test failure halts chain"
        tools:
          - label: "dbt run"
            pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
          - label: "dbt test"
            pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
          - label: "Hightouch sync"
            pluginClass: "io.kestra.plugin.hightouch.Sync"
          - label: "PagerDuty page"
            pluginClass: "io.kestra.plugin.pagerduty.PagerDutyAlert"
        outcome:
          label: "Only validated rows ship"
          sublabel: "or chain halts"
          icon: "mdi:test-tube"
      plugins:
        - "io.kestra.plugin.dbt.cli.DbtCLI"
        - "io.kestra.plugin.hightouch.Sync"
        - "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
        - "io.kestra.plugin.pagerduty.PagerDutyAlert"
      code: |
        id: hightouch-dbt-test-gate
        namespace: company.team

        inputs:
          - id: hightouch_sync_id
            type: INT

        tasks:
          - id: dbt_run
            type: io.kestra.plugin.dbt.cli.DbtCLI
            commands:
              - dbt deps
              - dbt run

          - id: dbt_test
            type: io.kestra.plugin.dbt.cli.DbtCLI
            commands:
              - dbt test

          - id: hightouch_sync
            type: io.kestra.plugin.hightouch.Sync
            token: "{{ secret('HIGHTOUCH_API_TOKEN') }}"
            syncId: "{{ inputs.hightouch_sync_id }}"
            wait: true

          - id: notify_success
            type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
            url: "{{ secret('SLACK_WEBHOOK_URL') }}"
            payload: |
              {
                "text": "dbt tests passed, Hightouch run {{ outputs.hightouch_sync.runId }} synced (execution {{ execution.id }})."
              }

        pluginDefaults:
          - type: io.kestra.plugin.dbt.cli.DbtCLI
            values:
              taskRunner:
                type: io.kestra.plugin.scripts.runner.docker.Docker
              containerImage: ghcr.io/kestra-io/dbt-bigquery:latest
              namespaceFiles:
                enabled: true

        errors:
          - id: page_on_quality_failure
            type: io.kestra.plugin.pagerduty.PagerDutyAlert
            url: https://events.pagerduty.com/v2/enqueue
            payload: |
              {
                "routing_key": "{{ secret('PAGERDUTY_ROUTING_KEY') }}",
                "event_action": "trigger",
                "payload": {
                  "summary": "Reverse-ETL halted: dbt tests failed before Hightouch activation (execution {{ execution.id }})",
                  "source": "kestra",
                  "severity": "warning"
                }
              }
    - name: "Staging-to-prod approval"
      blueprintId: "hightouch-staging-to-prod-approval"
      title: "Staging-to-prod promotion with Teams approval"
      description: "Staging Hightouch sync runs first. Kestra posts an Adaptive Card to Microsoft Teams with the run ID, pauses for review, then fires the production sync. Reviewer identity and timestamp are logged automatically; <a href='/orchestration/slack'>Slack</a> confirms when production completes."
      href: "/blueprints"
      flowDiagram:
        source:
          label: "Promotion trigger"
          sublabel: "manual or webhook"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        workflow:
          label: "Staging, gate, prod"
          sublabel: "named reviewer logged"
        tools:
          - label: "Staging sync"
            pluginClass: "io.kestra.plugin.hightouch.Sync"
          - label: "Teams approval"
            pluginClass: "io.kestra.plugin.microsoft365.teams.TeamsIncomingWebhook"
          - label: "Pause"
            pluginClass: "io.kestra.plugin.core.flow.Pause"
          - label: "Production sync"
            pluginClass: "io.kestra.plugin.hightouch.Sync"
          - label: "Slack confirm"
            pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
        outcome:
          label: "Prod sync audited"
          sublabel: "approver + timestamp"
          icon: "mdi:shield-check-outline"
      plugins:
        - "io.kestra.plugin.hightouch.Sync"
        - "io.kestra.plugin.microsoft365.teams.TeamsIncomingWebhook"
        - "io.kestra.plugin.core.flow.Pause"
        - "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      code: |
        id: hightouch-staging-to-prod-approval
        namespace: company.team

        inputs:
          - id: staging_sync_id
            type: INT
          - id: production_sync_id
            type: INT
          - id: approval_timeout
            type: DURATION
            defaults: PT4H

        tasks:
          - id: run_staging
            type: io.kestra.plugin.hightouch.Sync
            token: "{{ secret('HIGHTOUCH_API_TOKEN') }}"
            syncId: "{{ inputs.staging_sync_id }}"
            wait: true

          - id: notify_approval
            type: io.kestra.plugin.microsoft365.teams.TeamsIncomingWebhook
            url: "{{ secret('TEAMS_WEBHOOK_URL') }}"
            payload: |
              {
                "type": "message",
                "attachments": [
                  {
                    "contentType": "application/vnd.microsoft.card.adaptive",
                    "content": {
                      "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                      "type": "AdaptiveCard",
                      "version": "1.4",
                      "body": [
                        {
                          "type": "TextBlock",
                          "size": "Large",
                          "weight": "Bolder",
                          "text": "Hightouch sync awaiting approval"
                        },
                        {
                          "type": "TextBlock",
                          "text": "Staging Hightouch run {{ outputs.run_staging.runId }} complete. Review row counts before promoting to production (execution {{ execution.id }}).",
                          "wrap": true
                        }
                      ]
                    }
                  }
                ]
              }

          - id: approve_production
            type: io.kestra.plugin.core.flow.Pause
            pauseDuration: "{{ inputs.approval_timeout }}"

          - id: run_production
            type: io.kestra.plugin.hightouch.Sync
            token: "{{ secret('HIGHTOUCH_API_TOKEN') }}"
            syncId: "{{ inputs.production_sync_id }}"
            wait: true

          - id: notify_complete
            type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
            url: "{{ secret('SLACK_WEBHOOK_URL') }}"
            payload: |
              {
                "text": "Hightouch production sync complete after approval. Run {{ outputs.run_production.runId }} (execution {{ execution.id }})."
              }

comparison:
  title: "Kestra vs the orchestration alternatives Hightouch teams evaluate"
  subtitle: "When Hightouch's built-in scheduler is not enough, and a generic orchestrator costs you Python glue, here is how Kestra compares."
  competitors:
    - name: "Prefect"
      logoAsset: "prefect"
    - name: "Airflow"
      logoAsset: "airflow"
    - name: "GitHub Actions"
      pluginClass: "io.kestra.plugin.github.actions.RunWorkflow"
  rows:
    - feature: "Trigger Hightouch on upstream completion"
      kestra: "✓ Native event triggers"
      values:
        - "Event polling, Python code required"
        - "Sensor-based polling"
        - "Cron or Git events only"
    - feature: "dbt test as a gate before Hightouch sync"
      kestra: "✓ Native task ordering"
      values:
        - "Python flow logic required"
        - "Operator chain"
        - "Step ordering, no native dbt operator"
    - feature: "Approval gate before customer-facing sync"
      kestra: "✓ Native pause + resume"
      values:
        - "Available in Prefect 2.x+"
        - "Custom sensor workaround"
        - "Environment approvals (deploy only)"
    - feature: "Per-destination failure isolation in fan-out"
      kestra: "✓ allowFailure + per-task error handlers"
      values:
        - "Task-level retry"
