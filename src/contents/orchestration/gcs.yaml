title: "Orchestrate Google Cloud Storage with Kestra: event-driven loads, lakehouse pipelines, and governed object workflows"
description: "Fire a flow when objects land in GCS, load them into BigQuery, run partition-aware refreshes, curate raw drops with Python, and archive processed files, all from one execution history."

tool:
  name: "GCS"
  pluginClass: "io.kestra.plugin.gcp.gcs.Upload"
  color: "#4285F4"

hero:
  title: "Make GCS the trigger, not just the bucket."
  description: "GCS holds the objects. Kestra decides what happens when they land: load new files into BigQuery on arrival, run partition-aware refreshes, curate raw drops with Python, and archive processed files, all with retries and one execution history."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Cloud Scheduler and GCS notifications give you the event, but not the pipeline. Kestra makes the bucket a trigger and chains the rest: it loads new objects into <a href='/orchestration/bigquery'>BigQuery</a> the moment they land, curates raw drops with Python and <a href='/orchestration/duckdb'>DuckDB</a>, refreshes only the partitions that changed, and archives processed files so they never re-fire, with retries and lineage that wiring Cloud Functions and Pub/Sub by hand cannot match."

pillars:
  title: "Above the bucket and Cloud Scheduler."
  subtitle: "GCS runs the storage, the durability, and the object events. Kestra runs the steps around the object: what fires on arrival, what loads it, what cleans it, and where the cross-tool audit trail lives."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "Event-driven on object arrival"
      description: "Stitching GCS notifications to Pub/Sub to a Cloud Function is a lot of moving parts for what should be one step. <code>io.kestra.plugin.gcp.gcs.Trigger</code> polls a prefix, fires when new objects match, and downloads them, so a file landing starts a full pipeline. Set <code>action: MOVE</code> or <code>DELETE</code> so processed files never re-trigger."
    - icon: "mdi:database-import-outline"
      title: "Load to BigQuery end to end"
      description: "Loading means detect the file, load it, validate, and archive. Kestra runs <code>io.kestra.plugin.gcp.bigquery.LoadFromGcs</code> straight from a <code>gs://</code> path, or <code>bigquery.Load</code> from internal storage, then a row check, then an archive move, as ordered steps with per-step retries. A failed load retries without re-detecting the file."
    - icon: "mdi:table-sync"
      title: "Partition-aware incremental refresh"
      description: "Reloading a whole table to absorb a day of late data is slow and expensive. Kestra loops a rolling window with <code>ForEach</code> and loads each day's GCS files into the matching BigQuery partition with <code>WRITE_TRUNCATE</code>, so cost tracks the delta and a rerun safely replaces just its own partitions."
    - icon: "mdi:broom"
      title: "Curate raw drops into clean tables"
      description: "Raw files rarely match the target schema. Kestra downloads an object, transforms it in a Python or <a href='/orchestration/duckdb'>DuckDB</a> container (normalize columns, dedup, reshape), then loads the curated result into <a href='/orchestration/bigquery'>BigQuery</a>. Business logic stays in code, orchestration stays in YAML, and the messy raw stays out of the warehouse."
    - icon: "mdi:pipe-disconnected"
      title: "One flow across the lakehouse"
      description: "GCS has no view of the warehouse load or the <a href='/orchestration/dbt-core'>dbt</a> models downstream. Kestra runs the object trigger, the BigQuery load, the dbt transform, and the notification as steps in one flow. Run IDs flow forward and the whole chain shares one execution ID, so you debug ingestion and transform from one screen."
    - icon: "mdi:file-cog-outline"
      title: "Compose, stage, and govern objects"
      description: "Object work is more than upload. Kestra runs <code>List</code>, <code>Compose</code> (concatenate parts into one object), <code>Copy</code>, and <code>Delete</code> as tasks, so daily partner exports get assembled and staged on a schedule. Every run lands in execution history with the user and timestamp, so object operations are audited, not ad hoc."

useCases:
  title: "How teams use GCS and Kestra"
  subtitle: "Patterns data platform teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Event-driven"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Load a file the moment it lands, then archive it"
      description: "A file drops into a landing prefix. The GCS <code>Trigger</code> fires, Kestra loads it into <a href='/orchestration/bigquery'>BigQuery</a>, and the trigger moves the object to an archive prefix so it never fires twice. Slack confirms the batch with the file count."
      flow:
        - node: "gcs trigger"
          label: "new object"
          pluginClass: "io.kestra.plugin.gcp.gcs.Trigger"
        - node: "bigquery load"
          label: "load file"
          pluginClass: "io.kestra.plugin.gcp.bigquery.Load"
        - node: "archive"
          label: "move object"
          pluginClass: "io.kestra.plugin.gcp.gcs.Copy"
        - node: "slack"
          label: "file count"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Polling trigger with archive"
          description: "<code>action: MOVE</code> archives each processed object so it never re-triggers."
        - title: "Raw-first loading"
          description: "Autodetect lands the file as-is; parse and model it downstream."
        - title: "Retry the load alone"
          description: "A failed load retries without re-detecting the object."
          wide: true
    - badge: "Incremental"
      badgeIcon: "mdi:table-sync"
      title: "Refresh only the partitions that changed"
      description: "Late data arrives for the last few days. Kestra loops a rolling window with <code>ForEach</code> and loads each day's GCS files into the matching BigQuery partition with <code>WRITE_TRUNCATE</code>, so each partition is atomically replaced and cost tracks the delta, not the whole table."
      flow:
        - node: "schedule"
          label: "daily"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "for each day"
          label: "rolling window"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "load partition"
          label: "WRITE_TRUNCATE"
          pluginClass: "io.kestra.plugin.gcp.bigquery.LoadFromGcs"
        - node: "telegram"
          label: "on complete"
          pluginClass: "io.kestra.plugin.telegram.TelegramSend"
      items:
        - title: "Cost tracks the delta"
          description: "Each load is scoped to one day's files, so it never rescans history."
        - title: "Reruns are safe"
          description: "<code>WRITE_TRUNCATE</code> on a partition decorator replaces exactly one partition."
        - title: "Tune the window"
          description: "Widen or narrow the day window to trade freshness for cost."
          wide: true
    - badge: "Curate"
      badgeIcon: "mdi:broom"
      title: "Clean raw GCS files into a warehouse table"
      description: "Raw drops need normalizing before they are useful. Kestra downloads the file, transforms it with Python and pandas in a container, then loads the curated result into <a href='/orchestration/bigquery'>BigQuery</a> with <code>WRITE_TRUNCATE</code>. Discord confirms, and the messy raw never reaches the warehouse."
      flow:
        - node: "gcs download"
          label: "pull raw"
          pluginClass: "io.kestra.plugin.gcp.gcs.Download"
        - node: "python"
          label: "clean + reshape"
          pluginClass: "io.kestra.plugin.scripts.python.Script"
        - node: "bigquery load"
          label: "load curated"
          pluginClass: "io.kestra.plugin.gcp.bigquery.Load"
        - node: "discord"
          label: "on complete"
          pluginClass: "io.kestra.plugin.discord.DiscordIncomingWebhook"
      items:
        - title: "Logic in code, flow in YAML"
          description: "The transform runs in a pinned container; orchestration stays declarative."
        - title: "Swap the engine"
          description: "Use Polars or <a href='/orchestration/duckdb'>DuckDB</a> in place of pandas with no flow change."
        - title: "Reproducible runs"
          description: "Each step runs in a container, so the curation is the same anywhere."
          wide: true
    - badge: "Export"
      badgeIcon: "mdi:export"
      title: "Export BigQuery to a GCS data lake"
      description: "Downstream consumers want files, not warehouse access. Kestra runs a <a href='/orchestration/bigquery'>BigQuery</a> query to build the dataset, then <code>ExtractToGcs</code> writes it to a date-partitioned GCS path as CSV, JSON, or Avro, on a schedule, so partners and lakes always have the latest export."
      flow:
        - node: "schedule"
          label: "daily"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "bigquery query"
          label: "build dataset"
          pluginClass: "io.kestra.plugin.gcp.bigquery.Query"
        - node: "extract to gcs"
          label: "partitioned file"
          pluginClass: "io.kestra.plugin.gcp.bigquery.ExtractToGcs"
        - node: "teams"
          label: "on complete"
          pluginClass: "io.kestra.plugin.microsoft365.teams.TeamsIncomingWebhook"
      items:
        - title: "Files, not warehouse grants"
          description: "Partners read a GCS object instead of getting BigQuery access."
        - title: "Partitioned by date"
          description: "Each run writes a dated path so history stays intact."
        - title: "Pick the format"
          description: "Export CSV, JSON, or Avro with compression in one task."
          wide: true
    - badge: "Assemble"
      badgeIcon: "mdi:file-cog-outline"
      title: "Compose daily parts into one delivery object"
      description: "A day's data lands as many part files. Kestra lists the day's objects, composes them into a single object with <code>Compose</code>, uploads the assembled file with delivery metadata, and emails the recipient, so partner hand-offs are one clean object, not a scatter of parts."
      flow:
        - node: "gcs list"
          label: "find parts"
          pluginClass: "io.kestra.plugin.gcp.gcs.List"
        - node: "gcs compose"
          label: "concatenate"
          pluginClass: "io.kestra.plugin.gcp.gcs.Compose"
        - node: "gcs upload"
          label: "stage final"
          pluginClass: "io.kestra.plugin.gcp.gcs.Upload"
        - node: "email"
          label: "notify recipient"
          pluginClass: "io.kestra.plugin.email.MailSend"
      items:
        - title: "One object, not many parts"
          description: "<code>Compose</code> concatenates up to 32 objects into a single delivery file."
        - title: "Delivery metadata"
          description: "Set content type and cache headers on the staged object."
        - title: "Audited assembly"
          description: "Every assembly run lands in execution history with the user and time."
          wide: true

