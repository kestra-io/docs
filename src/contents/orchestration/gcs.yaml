faq:
  - question: "Can Kestra trigger a flow when a file lands in GCS?"
    answer: "Yes. <code>io.kestra.plugin.gcp.gcs.Trigger</code> polls a <code>gs://</code> prefix on an interval, fires when objects matching its pattern appear, and downloads them to internal storage. Set <code>action: MOVE</code> or <code>DELETE</code> so processed objects do not re-trigger, and <code>on: CREATE</code> or <code>CREATE_OR_UPDATE</code> to control what counts as new. There is no separate Pub/Sub topic or Cloud Function to wire up."
  - question: "How does Kestra load GCS files into BigQuery?"
    answer: "Two ways. <code>io.kestra.plugin.gcp.bigquery.LoadFromGcs</code> loads directly from one or more <code>gs://</code> URIs, ideal for partition-decorator loads with <code>WRITE_TRUNCATE</code>. <code>io.kestra.plugin.gcp.bigquery.Load</code> loads a file already in Kestra internal storage, for example one a GCS Trigger downloaded. Both autodetect the schema and create the table if needed."
  - question: "How do I refresh only the partitions that changed?"
    answer: "Loop a small rolling window of days with <code>io.kestra.plugin.core.flow.ForEach</code> and, for each day, run <code>LoadFromGcs</code> against that day's GCS path into the matching BigQuery partition (<code>table$YYYYMMDD</code>) with <code>WRITE_TRUNCATE</code>. Each partition is atomically replaced, cost tracks the delta, and a rerun is safe because each load truncates only its own partition."
  - question: "Can Kestra curate raw GCS files before loading?"
    answer: "Yes. Download the object with <code>io.kestra.plugin.gcp.gcs.Download</code>, transform it in a Python, Polars, or <a href='/orchestration/duckdb'>DuckDB</a> container (normalize columns, dedup, reshape), then load the curated file into <a href='/orchestration/bigquery'>BigQuery</a>. Business logic stays in code while orchestration stays in declarative YAML, and the raw file never lands in the warehouse."
  - question: "Is Kestra a replacement for Cloud Composer?"
    answer: "Kestra covers the same orchestration role without Python DAGs or a GCP-only runtime. It triggers on GCS objects natively, chains GCS with <a href='/orchestration/bigquery'>BigQuery</a>, <a href='/orchestration/dbt-core'>dbt</a>, and tools outside GCP, and runs self-hosted, managed, or air-gapped. Teams that hit Composer's scaling limits or want declarative YAML and a non-GCP-locked control plane move the GCS-centric pipelines to Kestra."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted keeps your service account credentials and the data in your buckets entirely within your own infrastructure."

