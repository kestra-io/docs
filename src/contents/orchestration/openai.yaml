faq:
  - question: "What does Kestra add to an OpenAI workflow?"
    answer: "OpenAI provides the models and the API. Kestra wraps API calls in observable, automated pipelines: triggers <code>io.kestra.plugin.openai.ChatCompletion</code> on schedules or events, retries rate limits at the task level without re-running data prep, pauses for human approval before publishing, and logs every prompt, model, and token count in one searchable execution record."
  - question: "How does Kestra handle OpenAI rate limit errors?"
    answer: "Set a retry count and exponential backoff on the <code>openai.ChatCompletion</code> task. When the API returns a rate limit error, Kestra retries that task only. The data preparation step is not re-executed, so retries are fast and do not waste prep compute. For batch fan-outs, each item has its own retry so a rate-limited item retries in isolation."
  - question: "Can Kestra pause a flow for a human to review AI output before it goes to production?"
    answer: "Yes. The <code>io.kestra.plugin.core.flow.Pause</code> task halts execution and surfaces the current state in the Kestra UI. A reviewer inspects the OpenAI output, approves or rejects from the UI, and the flow continues or branches accordingly. Who approved and when is recorded in the execution history."
  - question: "What is the difference between openai.ChatCompletion and openai.Responses?"
    answer: "<code>io.kestra.plugin.openai.ChatCompletion</code> uses the Chat Completions API for standard multi-turn completions. <code>io.kestra.plugin.openai.Responses</code> uses the newer OpenAI Responses API, which supports structured outputs and stateful interactions. Both are available as Kestra tasks and both log their full inputs and outputs to the execution record."
  - question: "Can Kestra trigger an OpenAI call when a new record arrives via webhook?"
    answer: "Yes. The <code>io.kestra.plugin.core.trigger.Webhook</code> trigger starts a flow on any HTTP POST. The webhook payload is available as a named variable in the <code>openai.ChatCompletion</code> task, so the record content can be passed directly to the prompt at run time. No polling or custom receiver required."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers fully self-hosted deployment on Docker or Kubernetes, a managed cloud version, and air-gapped options for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted keeps your pipeline execution, prompts, and OpenAI API keys inside your own network."

