title: "Orchestrate OpenAI with Kestra: scheduled AI workflows, batch processing, and production LLM pipelines"
description: "Trigger OpenAI API calls on any event, chain AI steps with data prep and downstream storage, handle retries on rate limits, and trace every prompt, model, and token count in one execution history."

tool:
  name: "OpenAI"
  pluginClass: "io.kestra.plugin.openai.ChatCompletion"
  color: "#10A37F"

hero:
  title: "Put OpenAI into automated, auditable pipelines."
  description: "OpenAI runs the models. Kestra decides when each call fires, what data feeds it, and where the output goes. Schedule batch runs, trigger on data arrival, and trace every prompt and response in one execution history."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "OpenAI provides the models and the API. Kestra runs the workflow around them: schedules batch prompt runs, triggers <code>io.kestra.plugin.openai.ChatCompletion</code> on upstream events, retries on transient rate limit errors without re-running the data prep, gates outputs through a validation step before they reach production, and gives one timestamped execution record per run with the prompt, model, token count, and what happened downstream."

pillars:
  title: "Above the OpenAI API layer."
  subtitle: "OpenAI handles the models and the inference infrastructure. Kestra handles when calls run, what data feeds them, who reviews the output, and where the full audit trail lives."
  items:
    - icon: "mdi:clock-outline"
      title: "Scheduled AI batch runs"
      description: "Running OpenAI calls in a script has no scheduling, no per-call retry on rate limits, and no execution history. Kestra wraps them: a <code>Schedule</code> trigger fires the flow, <code>openai.ChatCompletion</code> runs the call, and every prompt, model, and token count lands in a searchable execution record."
    - icon: "mdi:lightning-bolt-outline"
      title: "Trigger on data arrival"
      description: "New records should not wait for the next cron tick to be enriched. Kestra triggers the AI enrichment step the moment a new record arrives via webhook, a file lands in S3, or an upstream database query returns rows. The model runs on fresh data immediately."
    - icon: "mdi:refresh"
      title: "Retry rate limits at the task level"
      description: "A rate limit error on a script retries the entire script from the top, including any expensive data prep. Kestra retries at the task level: data preparation is a separate task from the OpenAI call, so a rate limit error retries only the model call without re-fetching or reprocessing the input."
    - icon: "mdi:account-check-outline"
      title: "Human approval before AI output goes live"
      description: "AI-generated content going to production without review is a risk. Kestra pauses a flow after the OpenAI step with <code>io.kestra.plugin.core.flow.Pause</code>, surfaces the generated output in the Kestra UI for review, and only publishes or writes the result after explicit human approval. Who approved and when is logged."
    - icon: "mdi:shield-check-outline"
      title: "Output validation before downstream writes"
      description: "Malformed or low-quality model outputs should not reach production databases. Kestra routes the model response through a validation step after the OpenAI call. Outputs that fail a format or quality check halt the flow and alert the team before anything is written downstream."
    - icon: "mdi:eye-outline"
      title: "Prompt and token count visibility"
      description: "When an AI output looks wrong, the question is what prompt ran, which model responded, what the token count was, and what happened next. Kestra logs the OpenAI task inputs and outputs next to every other pipeline step in one execution record, with no need to dig through application logs."

useCases:
  title: "How teams use OpenAI and Kestra"
  subtitle: "Patterns AI engineering teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Batch enrichment"
      badgeIcon: "mdi:format-list-bulleted"
      title: "Scheduled batch AI enrichment with per-item retry"
      description: "A daily schedule fetches a dataset, fans records out via <code>ForEach</code>, runs <code>openai.ChatCompletion</code> per item with a concurrency limit, and writes results to the database. Rate-limited items retry in isolation without touching completed ones."
      flow:
        - node: "schedule"
          label: "daily trigger"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "fetch records"
          label: "pull batch"
          pluginClass: "io.kestra.plugin.jdbc.duckdb.Query"
        - node: "for each"
          label: "fan out"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "openai completion"
          label: "enrich per item"
          pluginClass: "io.kestra.plugin.openai.ChatCompletion"
      items:
        - title: "Per-item retry"
          description: "A rate limit error retries that item only, not the whole batch."
        - title: "Bounded concurrency"
          description: "<code>concurrencyLimit</code> caps parallel API calls to stay under rate limits."
        - title: "Prompt and token count per item"
          description: "Model, tokens, and response land in execution outputs for every item."
          wide: true
    - badge: "Event-driven"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Trigger AI enrichment when a new record arrives"
      description: "A webhook fires on a new record. Kestra runs <code>openai.ChatCompletion</code> to enrich it, validates the output, and writes the result to the database. A failed database write retries without re-calling the OpenAI API."
      flow:
        - node: "webhook"
          label: "new record"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "openai completion"
          label: "enrich record"
          pluginClass: "io.kestra.plugin.openai.ChatCompletion"
        - node: "validate"
          label: "check output"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "write result"
          label: "store enriched"
          pluginClass: "io.kestra.plugin.jdbc.duckdb.Query"
      items:
        - title: "Write retries in isolation"
          description: "A database write failure retries without re-calling OpenAI."
        - title: "Record ID from webhook"
          description: "The webhook payload passes the record ID to the enrichment task."
        - title: "Output validated before write"
          description: "A malformed completion halts before reaching the database."
          wide: true
    - badge: "Human in the loop"
      badgeIcon: "mdi:account-check-outline"
      title: "Generate content and pause for review before publishing"
      description: "OpenAI generates a draft. Kestra pauses the flow with <code>Pause</code> and surfaces the draft in the Kestra UI. On approval, the flow publishes. On rejection, it routes to a revision or discard step. Who approved and when is logged."
      flow:
        - node: "openai completion"
          label: "generate draft"
          pluginClass: "io.kestra.plugin.openai.ChatCompletion"
        - node: "pause"
          label: "await review"
          pluginClass: "io.kestra.plugin.core.flow.Pause"
        - node: "branch"
          label: "approve or reject"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "publish"
          label: "on approval"
          pluginClass: "io.kestra.plugin.core.http.Request"
      items:
        - title: "Pause with configurable timeout"
          description: "The flow waits up to the configured duration before auto-escalating."
        - title: "Draft visible in Kestra UI"
          description: "The reviewer sees the full draft and prompt context in one view."
        - title: "Auditable approval record"
          description: "Who approved and when is logged in the execution history."
          wide: true
    - badge: "Responses API"
      badgeIcon: "mdi:api"
      title: "Structured output pipeline with the Responses API"
      description: "The <code>io.kestra.plugin.openai.Responses</code> task uses the OpenAI Responses API for structured, stateful completions. Kestra chains a data fetch, the Responses task, and a downstream write with per-step retry and a validation gate on the structured output."
      flow:
        - node: "schedule"
          label: "trigger"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "fetch input"
          label: "get context"
          pluginClass: "io.kestra.plugin.core.http.Request"
        - node: "openai responses"
          label: "structured output"
          pluginClass: "io.kestra.plugin.openai.Responses"
        - node: "validate + write"
          label: "check and store"
          pluginClass: "io.kestra.plugin.core.flow.If"
      items:
        - title: "Structured output logged"
          description: "The full Responses API output lands in the execution record."
        - title: "Validate schema on output"
          description: "An <code>If</code> check confirms the structured response before writing."
        - title: "Retry call in isolation"
          description: "A rate limit error retries the Responses task without re-fetching input."
          wide: true

