title: "Orchestrate Snowflake with Kestra: event-driven loads, ELT around the warehouse, and governed queries"
description: "Load files to Snowflake stages, run COPY and incremental MERGE upserts on every event, chain with ingestion and dbt, and trace every query across the data stack from one place."

tool:
  name: "Snowflake"
  pluginClass: "io.kestra.plugin.jdbc.snowflake.Query"
  color: "#29b5e8"

hero:
  title: "Drive Snowflake from events, not cron tasks."
  description: "Snowflake runs the SQL. Kestra decides when it runs, what feeds it, and what runs next. Load stages on file arrival, run idempotent MERGE upserts as transactions, chain with dbt and ingestion, and trace every statement in one execution history."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Snowflake Tasks and Streams cover scheduling inside the warehouse. Kestra covers everything around it: it loads files to a stage and runs COPY the moment they land, chains Snowflake with <a href='/orchestration/airbyte'>Airbyte</a> ingestion and <a href='/orchestration/dbt-core'>dbt</a> transforms in one flow, and runs incremental MERGE upserts as transactions so a partial load never lands. A transient dbt retry never re-runs the load, and every query is tagged back to the run that issued it."

pillars:
  title: "Above the Snowflake task scheduler."
  subtitle: "Snowflake runs the SQL, the warehouse, and the stage. Kestra runs the steps around the query: what triggers it, what feeds it, who approves it, and where the cross-tool audit trail lives."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "Event-driven queries, not warehouse cron"
      description: "Snowflake Tasks fire on a cron schedule. If the upstream load slips, the task runs on stale data. Kestra triggers <code>io.kestra.plugin.jdbc.snowflake.Query</code> the moment the upstream step confirms, whether that is an <a href='/orchestration/airbyte'>Airbyte</a> sync, a file landing in S3, or a webhook. The <code>Trigger</code> task can also poll Snowflake and start a flow when a query returns rows."
    - icon: "mdi:tray-arrow-up"
      title: "Stage loading orchestrated end to end"
      description: "Loading data means PUT a file to a stage, then COPY INTO a table, then validate. Kestra runs <code>Upload</code> to push a file from internal storage to a Snowflake stage, then <code>Query</code> to run the COPY, then a row-count check, as ordered steps with per-step retries. A failed COPY retries without re-uploading the file."
    - icon: "mdi:pipe-disconnected"
      title: "Full ELT in one flow"
      description: "Snowflake has no view of the connector that fed it or the <a href='/orchestration/dbt-core'>dbt</a> models that read it. Kestra runs ingestion, the Snowflake load, the transform, and the <a href='/orchestration/hightouch'>Hightouch</a> activation as steps in one flow. Run IDs and the Snowflake query ID flow forward, and the whole chain shares one execution ID."
    - icon: "mdi:swap-horizontal"
      title: "Transactional multi-statement loads"
      description: "An incremental load is rarely one statement: stage the file, MERGE into the target, dedup, update a watermark. <code>io.kestra.plugin.jdbc.snowflake.Queries</code> runs them as one transaction (enabled by default), so a failure rolls back and a partial load never lands. The next run picks up cleanly from the last committed watermark."
    - icon: "mdi:cash-multiple"
      title: "Cost-aware warehouse control"
      description: "Idle warehouses burn credits. Kestra can resume a warehouse with a query, run the workload, and suspend it again in the same flow, so compute is only on for the job. Query tags set per run tie Snowflake's query history and credit usage back to the exact Kestra execution that issued each statement."
    - icon: "mdi:account-cog-outline"
      title: "Self-service queries for analysts"
      description: "Analysts should not need warehouse access to run a parameterized export. Kestra Apps wraps a <code>Query</code> flow in a typed form: pick the date range, run the query, get the result file. Every run lands in execution history with the requesting user, so self-service does not mean unaudited."

useCases:
  title: "How teams use Snowflake and Kestra"
  subtitle: "Patterns data platform teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Full ELT"
      badgeIcon: "mdi:pipe-disconnected"
      title: "Ingest to Snowflake to dbt in one flow"
      description: "<a href='/orchestration/airbyte'>Airbyte</a> syncs raw data into Snowflake, Kestra waits for it, then runs the Snowflake load and triggers <a href='/orchestration/dbt-core'>dbt</a> against the warehouse. <a href='/orchestration/slack'>Slack</a> confirms. A dbt retry never re-runs the Airbyte sync."
      flow:
        - node: "airbyte sync"
          label: "ingest"
          pluginClass: "io.kestra.plugin.airbyte.connections.Sync"
        - node: "snowflake load"
          label: "COPY INTO"
          pluginClass: "io.kestra.plugin.jdbc.snowflake.Query"
        - node: "dbt build"
          label: "transform"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "slack"
          label: "on complete"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Step retries stay local"
          description: "A dbt retry never re-runs Airbyte; a load retry never re-runs ingestion."
        - title: "Query ID flows forward"
          description: "The Snowflake query ID lands in outputs for downstream traceability."
        - title: "One execution ID across the stack"
          description: "Debug ingestion, load, and transform from one screen, not three."
          wide: true
    - badge: "Stage load"
      badgeIcon: "mdi:tray-arrow-up"
      title: "Load files to a stage on arrival"
      description: "A file lands in object storage. Kestra uploads it to a Snowflake stage with <code>Upload</code>, runs <code>Query</code> for the COPY INTO, then checks the loaded row count. A failed COPY retries without re-uploading the file."
      flow:
        - node: "file trigger"
          label: "S3 arrival"
          pluginClass: "io.kestra.plugin.aws.s3.Trigger"
        - node: "snowflake upload"
          label: "PUT to stage"
          pluginClass: "io.kestra.plugin.jdbc.snowflake.Upload"
        - node: "snowflake query"
          label: "COPY INTO"
          pluginClass: "io.kestra.plugin.jdbc.snowflake.Query"
        - node: "row check"
          label: "validate"
          pluginClass: "io.kestra.plugin.core.flow.If"
      items:
        - title: "Stage then COPY, ordered"
          description: "<code>Upload</code> pushes the file; <code>Query</code> runs the COPY only after it lands."
        - title: "Validate before downstream"
          description: "An <code>If</code> task branches on the loaded row count before anything reads the table."
        - title: "Retry the COPY in isolation"
          description: "A COPY failure retries without re-staging the file."
          wide: true
    - badge: "Event-driven"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Start a flow when a Snowflake query returns rows"
      description: "Some pipelines react to data, not clocks. The Snowflake <code>Trigger</code> polls the warehouse on an interval and starts a flow when a sentinel query returns rows, then marks them processed with afterSQL so the same rows do not fire twice."
      flow:
        - node: "snowflake trigger"
          label: "query returns rows"
          pluginClass: "io.kestra.plugin.jdbc.snowflake.Trigger"
        - node: "process"
          label: "downstream work"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "notify"
          label: "Slack on done"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Poll-based data trigger"
          description: "Fires on rows returned, not on the next cron tick."
        - title: "afterSQL marks processed"
          description: "Sentinel rows are flagged so they do not re-trigger."
        - title: "Fan out per row"
          description: "A <code>ForEach</code> processes each returned row independently."
          wide: true
    - badge: "Incremental"
      badgeIcon: "mdi:table-sync"
      title: "Incremental MERGE upsert with dedup"
      description: "The daily pattern: COPY new rows into a staging table, then MERGE into the target with dedup and a watermark update, all as one transaction with <code>Queries</code>. A failed MERGE rolls back, so the target never holds a half-applied batch."
      flow:
        - node: "stage load"
          label: "COPY new rows"
          pluginClass: "io.kestra.plugin.jdbc.snowflake.Query"
        - node: "merge"
          label: "upsert + dedup"
          pluginClass: "io.kestra.plugin.jdbc.snowflake.Queries"
        - node: "row check"
          label: "validate"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "notify"
          label: "on complete"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "One transaction, all or nothing"
          description: "<code>Queries</code> wraps the MERGE and watermark update; a failure rolls back."
        - title: "Idempotent reruns"
          description: "The watermark means a rerun resumes from the last committed batch."
        - title: "Dedup in the MERGE"
          description: "Late or duplicate rows collapse on the merge key, not downstream."
          wide: true
    - badge: "Operations"
      badgeIcon: "mdi:cash-multiple"
      title: "Resume, run, suspend for cost control"
      description: "Kestra resumes a warehouse, runs the batch, and suspends it again in one flow, so compute is only billed for the job. A query tag set per run ties Snowflake credit usage back to the exact execution, and a scheduled flow can report daily spend to <a href='/orchestration/slack'>Slack</a>."
      flow:
        - node: "schedule"
          label: "nightly batch"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "resume wh"
          label: "ALTER WAREHOUSE"
          pluginClass: "io.kestra.plugin.jdbc.snowflake.Query"
        - node: "run batch"
          label: "the workload"
          pluginClass: "io.kestra.plugin.jdbc.snowflake.Queries"
        - node: "suspend wh"
          label: "ALTER WAREHOUSE"
          pluginClass: "io.kestra.plugin.jdbc.snowflake.Query"
      items:
        - title: "Compute on only for the job"
          description: "Resume and suspend bracket the workload in the same flow."
        - title: "Query tags per run"
          description: "Snowflake credit usage ties back to the issuing execution."
        - title: "Multi-statement batches"
          description: "<code>Queries</code> runs several statements in one transactional task."
          wide: true

