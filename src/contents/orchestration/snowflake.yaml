faq:
  - question: "What's the difference between Snowflake Tasks and Kestra?"
    answer: "Snowflake Tasks and Streams schedule SQL inside the warehouse on a cron cadence and react to in-table change streams. They have no view of the <a href='/orchestration/airbyte'>Airbyte</a> sync that loaded the data or the <a href='/orchestration/dbt-core'>dbt</a> models downstream. Kestra runs above the warehouse: it triggers <code>io.kestra.plugin.jdbc.snowflake.Query</code> when the upstream step confirms, chains Snowflake with ingestion and transformation, runs incremental MERGE upserts as transactions, and gives one execution history across every tool. Kestra works with Snowflake, not instead of it."
  - question: "How does Kestra load a file into Snowflake?"
    answer: "Two ordered tasks: <code>io.kestra.plugin.jdbc.snowflake.Upload</code> pushes a file from Kestra internal storage to a Snowflake stage, then <code>io.kestra.plugin.jdbc.snowflake.Query</code> runs the COPY INTO statement. Because they are separate tasks, a failed COPY retries without re-uploading the file, and a row-count check can gate anything downstream."
  - question: "Can Kestra trigger a flow when a Snowflake query returns rows?"
    answer: "Yes. The <code>io.kestra.plugin.jdbc.snowflake.Trigger</code> polls Snowflake on an interval (default 60 seconds), runs a sentinel query, and starts a flow execution when it returns one or more rows. Use afterSQL to mark rows processed so the same rows do not fire the trigger twice."
  - question: "How does Kestra run an incremental load without partial writes?"
    answer: "Use <code>io.kestra.plugin.jdbc.snowflake.Queries</code> to run the staging COPY, the MERGE into the target, and the watermark update as one transaction (enabled by default). If any statement fails, the whole transaction rolls back, so the target never holds a half-applied batch. Because the watermark only advances on commit, a rerun resumes cleanly from the last committed point."
  - question: "Can Kestra control warehouse cost?"
    answer: "Yes. A flow can run ALTER WAREHOUSE RESUME, execute the workload, and ALTER WAREHOUSE SUSPEND in sequence, so compute is only billed while the job runs. Setting a query tag per run ties Snowflake credit usage in QUERY_HISTORY back to the exact Kestra execution that issued each statement."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted gives complete control over where your pipeline execution and warehouse credentials live."

