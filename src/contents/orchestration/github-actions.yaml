      kestra: "✓ repositories.Search + ForEach + actions.RunWorkflow"
      values:
        - "Manual per-repo dispatch"
        - "Custom for-loop in your listener"
        - "Cannot span repositories"
    - feature: "Open issues, comment on PRs from the flow"
      kestra: "✓ issues.Create, issues.Comment, pulls.Create as flow tasks"
      values:
        - "Action steps inside the workflow only"
        - "Custom code"
        - "Inside the workflow only"
    - feature: "Approval gate before dispatch (not inside workflow)"
      kestra: "✓ Pause + resume, named reviewer logged"
      values:
        - "GitHub Environments protect inside the workflow"
        - "Custom approval UI"
        - "GitHub Environments inside the called workflow"
    - feature: "Chain Actions output with non-GitHub tasks"
      kestra: "✓ Outputs flow into Terraform, dbt, ServiceNow, Slack tasks"
