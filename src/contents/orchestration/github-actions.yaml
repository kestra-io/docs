        - "Whatever you write"
        - "GitHub ecosystem only"

faq:
  - question: "Does Kestra replace GitHub Actions?"
    answer: "No. GitHub Actions still runs the workflow inside the runner, with the matrix, the marketplace actions, and the secrets. Kestra calls the GitHub API through the io.kestra.plugin.github plugin to fire workflow_dispatch from events GitHub Actions cannot trigger on, to manage issues and PRs from flows, and to chain the workflow output with non-GitHub tasks. The workflow YAML stays where it is."
  - question: "How does Kestra dispatch a GitHub Actions workflow?"
    answer: "The actions.RunWorkflow task calls the GitHub REST API to send a workflow_dispatch event. You pass the repo, the workflow file (or ID), the ref (branch or tag), and a map of typed inputs that the workflow declares under on.workflow_dispatch.inputs. The workflow run starts in the target repo as if a maintainer clicked Run workflow in the UI, except the trigger source is the Kestra flow and the inputs come from the upstream context."
  - question: "How does Kestra know when the workflow finished?"
    answer: "Two options. Option A, recommended: configure the workflow's final step to POST back to a Kestra Webhook trigger. The Pause task in the dispatching flow listens for the matching run ID and resumes. Option B: poll the Actions runs API from a follow-up http.Request task with a retry block. Option A is preferred because it is event-driven and consumes no API quota while waiting."
  - question: "Can a flow open a GitHub issue or comment on a PR when something fails?"
    answer: "Yes, that is a common pattern. Put issues.Create in the errors branch of a flow. The body templating gives you the failing task, the execution URL, the namespace, and any output values you want to surface. issues.Comment lets the flow post back to an existing issue or PR (use pulls.Search first to find the most recent PR touching the affected code). pulls.Create raises a PR for auto-generated config changes."
  - question: "Can Kestra dispatch the same workflow to many repos at once?"
    answer: "Yes. repositories.Search returns matching repos for an org + topic + language + name pattern query. A ForEach iterates over the result list. Per repo, actions.RunWorkflow fires the same workflow file with the same or different inputs. GitHub Actions matrices stay inside one workflow run in one repo. The Kestra pattern crosses repositories and aggregates results in one place."
  - question: "How does Kestra authenticate to GitHub?"
    answer: "Three options, depending on your security posture. Personal access token (oauthToken) is the simplest for org-internal flows. GitHub App installation token (appInstallationToken) is recommended for production with fine-grained repo-scoped access. GitHub App JWT (jwtToken) authenticates as the App itself for org-level operations. Tokens go through Kestra's secrets backend and never appear in logs."
  - question: "Where does the approval gate sit, in the workflow or before it?"
    answer: "Before it. GitHub Environments protect deployment jobs inside a workflow run, after the runner has already started. Kestra's Pause task sits before actions.RunWorkflow, so the dispatch itself does not fire until a named reviewer resumes. Pre-flight checks (Trivy, Cosign, staging test summary) surface in the Kestra UI for the reviewer to inspect, and the reviewer identity is recorded against the execution."
  - question: "Is the GitHub plugin Enterprise-only?"
    answer: "No. The io.kestra.plugin.github plugin ships in the open-source edition with all the tasks: actions.RunWorkflow, issues.Create, issues.Comment, pulls.Create, repositories.Search, commits.Search, code.Search, and more. Kestra Enterprise adds Apps for self-service forms (engineers trigger dispatch through a typed form), namespace-scoped RBAC, audit logs, worker isolation, and SSO."
  - question: "Can Kestra run alongside GitHub Enterprise Server (self-hosted GitHub)?"
    answer: "Yes. Set the endpoint property on the github plugin tasks to your GHE base URL (https://ghe.example.com/api/v3) and Kestra reaches your private GitHub. Kestra itself ships self-hosted on Docker or Kubernetes, air-gapped if needed. See <a href='/infra-automation'>Kestra for infrastructure automation</a> for the broader picture across GitHub, GitLab, Terraform, and the rest of the stack."

