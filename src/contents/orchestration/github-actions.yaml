title: "Orchestrate GitHub Actions with Kestra: dispatch workflows, chain non-GitHub tools"
description: "Dispatch GitHub Actions workflows from cron, S3, Kafka, or any HTTP signal. Chain Actions output with non-GitHub tools, gate deploys, auto-manage issues and PRs."

tool:
  name: "GitHub Actions"
  pluginClass: "io.kestra.plugin.github.actions.RunWorkflow"
  color: "#2088FF"

hero:
  title: "Fire GitHub Actions on data, not commits."
  description: "Dispatch a workflow_dispatch from cron, S3 events, Kafka messages, dbt completions, or any HTTP signal. Pass typed inputs, listen for the workflow_run webhook back, auto-open issues on flow failure, and chain Actions output with Terraform, dbt, or ServiceNow in one execution history."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

pillars:
  title: "Above the runner, around the workflow."
  subtitle: "GitHub Actions runs the job inside the runner. Kestra wraps everything around it: when a workflow_dispatch fires, what runs before, who approves the prod deploy, and where the cross-tool audit trail lives once the runner exits. The workflow YAML, the matrix, and the action marketplace stay where they are."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "workflow_dispatch from triggers GitHub Actions cannot use"
      description: "GitHub Actions fires on push, pull_request, schedule, or the workflow_dispatch UI. Kestra fires it on a Kafka message, an S3 file landing, a dbt Cloud job completing, a Fivetran sync, a Pylon ticket, or any HTTP webhook. The actions.RunWorkflow task sends the dispatch with a typed inputs payload, and the workflow YAML stays in the repo where it belongs."
    - icon: "mdi:source-branch-sync"
      title: "Workflow output flows forward to non-GitHub tasks"
      description: "The runner finishes, GitHub sends the workflow_run webhook back to Kestra's Webhook trigger, and the next flow step starts. Outputs from the Actions run, the test artifact, the built image digest, the deployment URL, become inputs to a Terraform apply, a dbt build, a ServiceNow ticket update, or a Slack release note. One execution ID across the chain."
    - icon: "mdi:message-outline"
      title: "Open issues, comment on PRs, raise PRs as flow steps"
      description: "issues.Create opens an issue against the right repo when a critical upstream flow fails, with the execution URL and the failing step in the body. issues.Comment posts test results back to the PR that triggered the original run. pulls.Create raises a PR for auto-generated config changes (rotated secrets, new env values, dependabot-style updates) and waits for review."
    - icon: "mdi:magnify"
      title: "Search-driven dispatch across the whole org"
      description: "repositories.Search returns every repo matching an org + topic + language filter. code.Search finds every file with a pattern. A ForEach iterates over the result and dispatches the same workflow per repo. GitHub Actions matrices cannot span repositories, so security scans, dependency bumps, or compliance checks across 200 repos become one flow definition."
    - icon: "mdi:gate-arrow-right"
      title: "Approval gate before the prod deploy workflow fires"
      description: "GitHub Environments offer protection rules per environment, but they live inside one workflow definition. Kestra's Pause task gates the dispatch itself: the flow runs pre-flight checks (Trivy scan, Cosign verify, staging tests), surfaces a summary in the Kestra UI with the candidate revision, and pauses. A named reviewer resumes and only then does actions.RunWorkflow fire the prod workflow."
    - icon: "mdi:eye-outline"
      title: "One execution context across Actions, Terraform, dbt, ServiceNow"
      description: "The GitHub Actions tab shows runs in isolation. Kestra shows the whole story: what upstream event fired the workflow, who approved each gate, what the Actions runner produced, what ran after, and which step in the broader pipeline failed. The execution history pages link directly to the Actions run, the Terraform plan, and the ServiceNow ticket created downstream."

useCases:
  title: "How GitHub Actions teams use Kestra around the runner"
  subtitle: "Patterns engineering teams ship in production. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Event-driven"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Dispatch the deploy workflow when dbt finishes, not when a commit lands"
      description: "A dbt Cloud job completes. Kestra picks up the completion via webhook, runs a quick freshness check on the new tables, then fires actions.RunWorkflow against deploy.yml with the new revision as a workflow_dispatch input. GitHub Actions builds, deploys, and sends its workflow_run webhook back. Slack confirms with the deploy URL. The commit that triggered everything is two upstream steps away from the runner."
      flow:
        - node: "dbt completes"
          label: "webhook"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "freshness check"
          label: "validate tables"
          pluginClass: "io.kestra.plugin.core.http.Request"
        - node: "dispatch workflow"
          label: "deploy.yml"
          pluginClass: "io.kestra.plugin.github.actions.RunWorkflow"
        - node: "wait for completion"
          label: "workflow_run webhook"
          pluginClass: "io.kestra.plugin.core.flow.Pause"
        - node: "notify"
          label: "Slack with deploy URL"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Dispatch fires the moment upstream is ready"
          description: "No git poll, no committed trigger file, no waiting on the next cron. dbt finishes at 11:47, the deploy starts at 11:47."
        - title: "Typed inputs into workflow_dispatch"
          description: "The new revision, the target environment, and the feature flag set all pass through as named workflow inputs."
        - title: "workflow_run webhook closes the loop"
          description: "GitHub fires workflow_run on completion. Kestra's Pause task resumes when the matching run ID arrives."
        - title: "One execution ID covers dbt, GitHub Actions, and Slack"
          description: "Debugging starts in the Kestra UI. The execution links directly to the dbt run, the Actions run, and the Slack message."
          wide: true
    - badge: "Reactive"
      badgeIcon: "mdi:message-outline"
      title: "Open a GitHub issue automatically when a production flow fails"
      description: "A scheduled flow that loads warehouse data fails on the dbt step. The errors branch runs issues.Create against the data-platform repo with the failing step name, the execution URL, the last 50 log lines, and an @-mention for the on-call rotation. The same branch comments on the most recent PR that touched the failing model. Engineers wake up to context, not a paging alert."
      flow:
        - node: "scheduled flow"
          label: "cron"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "load + transform"
          label: "main task chain"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "errors branch"
          label: "on any failure"
          pluginClass: "io.kestra.plugin.core.flow.Subflow"
        - node: "find recent PR"
          label: "pulls.Search"
          pluginClass: "io.kestra.plugin.github.pulls.Search"
        - node: "open issue"
          label: "issues.Create"
          pluginClass: "io.kestra.plugin.github.issues.Create"
        - node: "comment on PR"
          label: "issues.Comment"
          pluginClass: "io.kestra.plugin.github.issues.Comment"
      items:
        - title: "Cross-repo issue creation"
          description: "The failure happens in the orchestrator. The issue opens in the repo that owns the model. GitHub Actions cannot easily do this across repos."
        - title: "Context, not just an alert"
          description: "The issue body has the execution URL, the failing step, the last logs, and a link back to the runtime view in Kestra."
        - title: "PR comment with the same context"
          description: "If the failing model was touched in a recent PR, the flow finds it via pulls.Search and posts the same context as a PR comment."
          wide: true
    - badge: "Multi-repo"
      badgeIcon: "mdi:magnify"
      title: "Dispatch the same workflow to every repo with a tag"
      description: "repositories.Search returns every repo in the org tagged platform-service. A ForEach iterates over the result. Per repo, actions.RunWorkflow fires the same security-scan.yml workflow with the scan profile as input. Each workflow_run webhook updates a running summary in Kestra. Slack posts the final report with per-repo pass or fail. GitHub Actions matrices cannot span repositories. Kestra can."
      flow:
        - node: "schedule"
          label: "nightly"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "find repos"
          label: "topic:platform-service"
          pluginClass: "io.kestra.plugin.github.repositories.Search"
        - node: "ForEach repo"
          label: "dispatch per repo"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "dispatch workflow"
          label: "security-scan.yml"
          pluginClass: "io.kestra.plugin.github.actions.RunWorkflow"
        - node: "aggregate results"
          label: "per-repo pass/fail"
          pluginClass: "io.kestra.plugin.core.flow.Pause"
        - node: "summary"
          label: "Slack report"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Search defines the fleet"
          description: "Tag-based, language-based, or topic-based filters in repositories.Search. The list updates itself as repos are added or labeled."
        - title: "Per-repo isolation"
          description: "Each dispatched workflow runs in its own repo with the repo's own secrets and runners. Kestra coordinates, GitHub Actions executes."
        - title: "One summary instead of N tabs"
          description: "The flow aggregates per-repo results and posts a single Slack report. The Actions tab in each repo still shows the raw run."
          wide: true
    - badge: "Promotion"
      badgeIcon: "mdi:gate-arrow-right"
      title: "Approval-gated prod deploy with full pre-flight"
      description: "An image lands in the registry. Kestra runs Trivy for critical CVEs and Cosign for signature verify. It pulls the staging workflow_run status via the GitHub API to confirm tests passed there. The summary surfaces in the Kestra UI: scan result, sig status, staging test pass count, candidate digest. A Pause task waits for a named reviewer. On resume, actions.RunWorkflow fires deploy-prod.yml with the verified digest and the reviewer name baked into the workflow input."
      flow:
        - node: "image push"
          label: "registry webhook"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "trivy scan"
          label: "CRITICAL check"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "cosign verify"
          label: "signature check"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "fetch staging status"
          label: "GitHub API"
          pluginClass: "io.kestra.plugin.core.http.Request"
        - node: "approval gate"
          label: "named reviewer"
          gate: true
          pluginClass: "io.kestra.plugin.core.flow.Pause"
        - node: "dispatch prod"
          label: "deploy-prod.yml"
          pluginClass: "io.kestra.plugin.github.actions.RunWorkflow"
        - node: "wait + notify"
          label: "workflow_run + Slack"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Gate sits before the dispatch, not inside the workflow"
          description: "GitHub Environments protect deployments inside a workflow. Kestra gates the dispatch itself, so the workflow_run never starts until pre-flight passes and a reviewer resumes."
        - title: "Reviewer name passes into the workflow"
          description: "The Pause output includes the reviewer identity. That value flows into the workflow_dispatch input, so the Actions log shows who approved the release."
        - title: "Pre-flight evidence stays in one place"
          description: "Trivy output, Cosign result, staging test summary, and the reviewer signature all live in the Kestra execution. The Actions log links back."
          wide: true

