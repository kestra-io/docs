blueprints:
  title: "Blueprints for GitHub Actions orchestration."
  lead: "One blueprint per use case above. Copy the YAML, set your GitHub PAT, point at your repo, ship it."
  items:
    - name: "Dispatch deploy workflow when dbt finishes"
      title: "Trigger a GitHub Actions deploy when upstream data is ready"
      description: "Kestra catches the dbt completion webhook, runs a freshness check, dispatches the deploy workflow with the new revision, waits for the workflow_run completion event, then posts to Slack with the deploy URL."
      href: "/blueprints?tags=Infrastructure"
      plugins:
        - "io.kestra.plugin.core.trigger.Webhook"
        - "io.kestra.plugin.github.actions.RunWorkflow"
        - "io.kestra.plugin.core.flow.Pause"
        - "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      code: |
        id: github-actions-deploy-on-dbt
        namespace: company.platform

        inputs:
          - id: revision
            type: STRING
            description: "Git revision (commit SHA) to deploy."
          - id: environment
            type: STRING
            defaults: "prod"

        triggers:
          - id: dbt_complete
            type: io.kestra.plugin.core.trigger.Webhook
            key: dbt-deploy

        tasks:
          - id: freshness_check
            type: io.kestra.plugin.core.http.Request
            uri: "https://warehouse.example.com/freshness"
            method: GET

          - id: dispatch_deploy
            type: io.kestra.plugin.github.actions.RunWorkflow
            oauthToken: "{{ secret('GITHUB_TOKEN') }}"
            repository: "company/platform"
            workflowId: "deploy.yml"
            ref: "main"
            inputs:
              revision: "{{ inputs.revision }}"
              environment: "{{ inputs.environment }}"
              triggered_by: "kestra"

          - id: wait_for_workflow_run
            type: io.kestra.plugin.core.flow.Pause
            description: |
              Waiting for GitHub Actions workflow_run webhook on revision {{ inputs.revision }}.
              The workflow's final step posts back to this Kestra execution.

          - id: notify
            type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
            url: "{{ secret('SLACK_WEBHOOK') }}"
            payload: |
              {
                "text": ":rocket: Deployed {{ inputs.revision }} to {{ inputs.environment }}. <{{ execution.url }}|Execution>"
              }

        errors:
          - id: notify_failure
            type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
            url: "{{ secret('SLACK_WEBHOOK') }}"
            payload: |
              {
                "text": ":alert: Dispatch failed for {{ inputs.revision }}. <{{ execution.url }}|View execution>"
              }
    - name: "Open issue on flow failure"
      title: "Errors branch opens a GitHub issue with execution context"
      description: "When a production flow fails, the errors branch finds the most recent PR touching the relevant code, opens a GitHub issue with the failing step and execution URL, and posts the same context as a PR comment."
      href: "/blueprints?tags=Infrastructure"
      plugins:
        - "io.kestra.plugin.github.pulls.Search"
        - "io.kestra.plugin.github.issues.Create"
        - "io.kestra.plugin.github.issues.Comment"
      code: |
        id: failure-to-github-issue
        namespace: company.platform

        inputs:
          - id: repo
            type: STRING
            defaults: "company/data-platform"
          - id: search_path
            type: STRING
            defaults: "models/marts"

        tasks:
          - id: data_pipeline
            type: io.kestra.plugin.dbt.cli.DbtCLI
            commands:
              - dbt build --target prod

        errors:
          - id: find_recent_pr
            type: io.kestra.plugin.github.pulls.Search
            oauthToken: "{{ secret('GITHUB_TOKEN') }}"
            query: "repo:{{ inputs.repo }} is:merged sort:updated-desc {{ inputs.search_path }}"

          - id: open_issue
            type: io.kestra.plugin.github.issues.Create
            oauthToken: "{{ secret('GITHUB_TOKEN') }}"
            repository: "{{ inputs.repo }}"
            title: ":fire: Production flow failed: {{ flow.id }}"
            body: |
              The scheduled flow `{{ flow.id }}` in namespace `{{ flow.namespace }}` failed.

              **Failing step**: `{{ task.id }}`
              **Execution**: {{ execution.url }}
              **Triggered at**: {{ execution.startDate }}

              cc @oncall-rotation
            labels:
              - "incident"
              - "p1"

          - id: comment_on_pr
            type: io.kestra.plugin.github.issues.Comment
            oauthToken: "{{ secret('GITHUB_TOKEN') }}"
            repository: "{{ inputs.repo }}"
            issueNumber: "{{ outputs.find_recent_pr.uri | jq('.[0].number') | first }}"
            body: |
              :warning: A production flow that touches code in this PR has just failed.
              See execution: {{ execution.url }}
    - name: "Cross-repo workflow dispatch"
      title: "Run the same workflow across every repo with a tag"
      description: "Searches the org for every repo with the platform-service topic, dispatches the security-scan.yml workflow per repo, waits for each workflow_run completion, and posts a single summary to Slack with per-repo pass or fail."
      href: "/blueprints?tags=Infrastructure"
      plugins:
        - "io.kestra.plugin.github.repositories.Search"
        - "io.kestra.plugin.core.flow.ForEach"
        - "io.kestra.plugin.github.actions.RunWorkflow"
      code: |
        id: cross-repo-security-scan
        namespace: company.platform

        inputs:
          - id: org
            type: STRING
            defaults: "company"
          - id: topic
            type: STRING
            defaults: "platform-service"

        triggers:
          - id: nightly
            type: io.kestra.plugin.core.trigger.Schedule
            cron: "0 3 * * *"

        tasks:
          - id: find_repos
            type: io.kestra.plugin.github.repositories.Search
            oauthToken: "{{ secret('GITHUB_TOKEN') }}"
            query: "org:{{ inputs.org }} topic:{{ inputs.topic }}"

          - id: dispatch_each
            type: io.kestra.plugin.core.flow.ForEach
            values: "{{ outputs.find_repos.uri }}"
            tasks:
              - id: dispatch_scan
                type: io.kestra.plugin.github.actions.RunWorkflow
                oauthToken: "{{ secret('GITHUB_TOKEN') }}"
                repository: "{{ json(taskrun.value).full_name }}"
                workflowId: "security-scan.yml"
                ref: "main"
                inputs:
                  profile: "critical-only"
                  triggered_by: "kestra-nightly"

          - id: summary
            type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
            url: "{{ secret('SLACK_WEBHOOK') }}"
            payload: |
              {
                "text": ":mag: Nightly security scan dispatched across {{ outputs.find_repos.uri | length }} repos. <{{ execution.url }}|View execution>"
              }

