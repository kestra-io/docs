title: "Orchestrate Hugging Face with Kestra: scheduled inference, batch ML pipelines, and model workflows"
description: "Trigger Hugging Face inference on data arrival or a schedule, fan out batch processing, chain model calls with data prep and result storage, and trace every inference run in one execution history."

tool:
  name: "Hugging Face"
  pluginClass: "io.kestra.plugin.huggingface.Inference"
  color: "#FFD21E"

hero:
  title: "Put Hugging Face inference into automated, observable pipelines."
  description: "Hugging Face runs the models. Kestra decides when inference runs, what data feeds it, and where results go. Schedule batch jobs, trigger on file arrival, and trace every model call in one execution history."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Hugging Face provides the models and inference infrastructure. Kestra wraps inference calls in observable pipelines: triggers <code>io.kestra.plugin.huggingface.Inference</code> when new data arrives or on a schedule, fans out batch inference across a list of records with <code>ForEach</code>, retries on API rate limits without re-running the data prep, and logs the model name, inputs, and outputs alongside every other step in one execution record."

pillars:
  title: "Above the Hugging Face inference layer."
  subtitle: "Hugging Face handles the models and the Inference API. Kestra handles when inference runs, what feeds it, how results are stored, and where the cross-system audit trail lives."
  items:
    - icon: "mdi:clock-outline"
      title: "Scheduled batch inference"
      description: "Running Hugging Face inference as a script has no scheduling, no per-item retry on rate limits, and no execution history. Kestra wraps it: a <code>Schedule</code> trigger fires the flow, <code>huggingface.Inference</code> runs the batch, and every model name, input, and output lands in a searchable execution record."
    - icon: "mdi:lightning-bolt-outline"
      title: "Trigger inference on data arrival"
      description: "New records should not wait for the next cron window to be classified or embedded. Kestra triggers inference the moment a file lands in S3 or GCS, or when a webhook fires. The model runs on fresh data immediately, with the event metadata available as named variables in the task."
    - icon: "mdi:source-branch"
      title: "Parallel inference with rate limit control"
      description: "Batch inference across a large dataset can hit API rate limits if sent all at once. Kestra fans out via <code>ForEach</code> with a <code>concurrencyLimit</code>, retries failed items in isolation on rate limit errors, and isolates slow or failed items with <code>allowFailure</code> so one bad record does not stop the batch."
    - icon: "mdi:pipe-disconnected"
      title: "Full ML pipeline in one flow"
      description: "Inference is one step in a larger pipeline: fetch the data, preprocess it, run the model, and write results to a database or vector store. Kestra chains these as ordered tasks in one flow. A database write failure retries the write without re-running the Hugging Face inference, and the full sequence shares one execution ID."
    - icon: "mdi:shield-check-outline"
      title: "Output validation before downstream write"
      description: "Model outputs that fail a quality check should not be written to production. Kestra runs a validation step after inference, and branches to a Slack alert if the output confidence score or format does not meet the threshold. Only validated results continue to the downstream write."
    - icon: "mdi:eye-outline"
      title: "Model call visibility per run"
      description: "When a classification result looks wrong, the question is what model ran, on what input, and what it returned. Kestra logs the Hugging Face task inputs and outputs alongside the data fetch and the database write in one execution record. No searching through application logs."

useCases:
  title: "How teams use Hugging Face and Kestra"
  subtitle: "Patterns ML engineering teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Batch inference"
      badgeIcon: "mdi:format-list-bulleted"
      title: "Scheduled batch classification with per-item retry"
      description: "A daily schedule fetches a dataset, fans it out via <code>ForEach</code>, runs <code>huggingface.Inference</code> per item with a concurrency limit, and writes results to a database. Rate-limited items retry in isolation without touching completed ones."
      flow:
        - node: "schedule"
          label: "daily trigger"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "fetch dataset"
          label: "pull records"
          pluginClass: "io.kestra.plugin.core.http.Download"
        - node: "for each"
          label: "fan out"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "hf inference"
          label: "classify per item"
          pluginClass: "io.kestra.plugin.huggingface.Inference"
      items:
        - title: "Per-item retry"
          description: "A rate limit error retries that item only, not the whole batch."
        - title: "Bounded concurrency"
          description: "<code>concurrencyLimit</code> caps parallel API calls to stay under rate limits."
        - title: "Model and score logged"
          description: "Model name and confidence score land in execution outputs per item."
          wide: true
    - badge: "Event-driven"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Trigger inference when a file arrives"
      description: "A new data file lands in S3. Kestra fires immediately, runs Hugging Face inference against the file, validates output confidence, and writes results to the database. No cron lag between upload and inference."
      flow:
        - node: "s3 trigger"
          label: "file arrives"
          pluginClass: "io.kestra.plugin.aws.s3.Trigger"
        - node: "hf inference"
          label: "run model"
          pluginClass: "io.kestra.plugin.huggingface.Inference"
        - node: "validate output"
          label: "confidence check"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "write results"
          label: "store output"
          pluginClass: "io.kestra.plugin.jdbc.duckdb.Query"
      items:
        - title: "No cron lag"
          description: "Inference fires the moment the file appears, not at the next interval."
        - title: "File path from trigger"
          description: "The S3 key flows directly into the inference task as a variable."
        - title: "Validate before writing"
          description: "Low-confidence outputs are routed to a review queue, not the database."
          wide: true
    - badge: "Embedding pipeline"
      badgeIcon: "mdi:vector-line"
      title: "Embed documents and write to a vector store"
      description: "New documents arrive on a schedule. Kestra fetches them, runs the Hugging Face embedding model, and writes the vectors to Weaviate. A failed vector write retries without re-running the embedding step."
      flow:
        - node: "schedule"
          label: "periodic fetch"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "fetch docs"
          label: "pull documents"
          pluginClass: "io.kestra.plugin.core.http.Download"
        - node: "hf embed"
          label: "run embedding"
          pluginClass: "io.kestra.plugin.huggingface.Inference"
        - node: "weaviate write"
          label: "store vectors"
          pluginClass: "io.kestra.plugin.weaviate.BatchCreate"
      items:
        - title: "Embedding model logged"
          description: "Model name and vector dimension land in the execution output."
        - title: "Write retries in isolation"
          description: "A Weaviate write failure retries without re-running the HF embedding."
        - title: "One execution ID"
          description: "Fetch, embed, and write share one history view for debugging."
          wide: true
    - badge: "Multi-model"
      badgeIcon: "mdi:source-branch"
      title: "Run two models in parallel and merge results"
      description: "Some pipelines need two models on the same input: a classifier and an entity extractor, for example. Kestra runs both Hugging Face inference tasks in parallel, waits for both to complete, then merges the outputs before writing to the database."
      flow:
        - node: "fetch input"
          label: "get record"
          pluginClass: "io.kestra.plugin.core.http.Download"
        - node: "parallel"
          label: "run both models"
          pluginClass: "io.kestra.plugin.core.flow.Parallel"
        - node: "hf classify"
          label: "classifier"
          pluginClass: "io.kestra.plugin.huggingface.Inference"
        - node: "merge + write"
          label: "combine outputs"
          pluginClass: "io.kestra.plugin.jdbc.duckdb.Query"
      items:
        - title: "Both models run concurrently"
          description: "Parallel execution cuts wall time compared to sequential inference."
        - title: "Outputs merged by name"
          description: "Each task's output is available by name in the merge step."
        - title: "One retry per model"
          description: "A failure in one model retries that model only, not the other."
          wide: true

