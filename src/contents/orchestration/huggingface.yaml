faq:
  - question: "What does Kestra add to a Hugging Face inference workflow?"
    answer: "Hugging Face runs the models and provides the Inference API. Kestra wraps inference calls in observable, automated pipelines: triggers <code>io.kestra.plugin.huggingface.Inference</code> on schedules or events, fans out batch inference with per-item retry on rate limits, chains inference with upstream data prep and downstream storage, and logs every model name, input, and output in one searchable execution record."
  - question: "Can Kestra trigger Hugging Face inference when a file lands in S3?"
    answer: "Yes. The <code>io.kestra.plugin.aws.s3.Trigger</code> watches a bucket prefix and starts the flow the moment a matching file appears. The file path is available as a named variable in the <code>huggingface.Inference</code> task, so the model runs immediately on the exact file that just landed."
  - question: "How does Kestra handle rate limit errors on the Hugging Face API?"
    answer: "Set a retry count and exponential backoff on the <code>huggingface.Inference</code> task. If the API returns a rate limit error, Kestra retries that task only. The data preparation step that ran before it is not re-executed. For batch fan-outs, each item has its own retry so a rate-limited item retries in isolation without affecting completed items."
  - question: "Can Kestra chain Hugging Face inference with a vector store write?"
    answer: "Yes. Kestra has a native <code>io.kestra.plugin.weaviate.BatchCreate</code> plugin. Run the inference task, take its output, and pass the vectors to the Weaviate write task in the same flow. A failed Weaviate write retries the write step only, without re-running the Hugging Face inference."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers fully self-hosted deployment on Docker or Kubernetes, a managed cloud version, and air-gapped options for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted keeps your pipeline execution and API credentials inside your own network."

