title: "Orchestrate Azure with Kestra: Blob triggers, Event Hub, Service Bus, Functions, Batch, Data Factory"
description: "Trigger on Blob and Event Hub arrivals, stream Service Bus messages, call Functions, and run Data Factory pipelines and Batch jobs from one flow, no Logic Apps glue between services."

tool:
  name: "Azure"
  pluginClass: "io.kestra.plugin.azure.cli.AzCLI"
  color: "#0078d4"

hero:
  title: "Orchestrate Azure without the Logic Apps glue."
  description: "Trigger on Blob and Data Lake arrivals, stream Event Hub and Service Bus messages, call Functions, and kick off Data Factory pipelines and Batch jobs, all from one flow. Chain storage, compute, and messaging into a single execution history instead of wiring Logic Apps, Event Grid subscriptions, and Function bindings between every pair of services."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Azure's Blob Storage, Event Hub, Service Bus, Functions, Batch, and Data Factory each work well alone, but chaining them today usually means a Logic App, an Event Grid subscription, and a Function binding wired one pair at a time. Kestra triggers on a blob arrival or an Event Hub message, calls a Function, publishes to Service Bus, and runs a Data Factory pipeline or a <a href='/orchestration/microsoft-fabric'>Microsoft Fabric</a> job, all inside one execution history. Provision the underlying resources with <a href='/orchestration/terraform'>Terraform</a> and the whole estate runs from one control plane."

pillars:
  title: "Above Azure's per-service triggers and Logic Apps glue."
  subtitle: "Azure ships 41 tasks and 7 triggers across storage, messaging, compute, and Batch, each with its own trigger surface. Kestra wires them into one flow, with one execution history, without Logic Apps connectors, Event Grid subscriptions, or Function bindings between every pair of services."
  items:
    - icon: "mdi:cloud-upload-outline"
      title: "Blob and Data Lake triggers fire on arrival, not on a Data Factory schedule"
      description: "<code>blob.Trigger</code> and <code>adls.Trigger</code> poll a container on an interval, filter by prefix and regex, and fire once per matched file. The <code>action</code> property moves or deletes processed blobs so the same file never fires twice. No Event Grid subscription or Data Factory storage-event trigger is required just to react to a new file."
    - icon: "mdi:lightning-bolt-outline"
      title: "Event Hub streaming, batch and real-time, in the same flow"
      description: "<code>eventhubs.RealtimeTrigger</code> starts an event processor that fires one execution per message; <code>eventhubs.Consume</code> polls in batches on a schedule for aggregation and threshold checks. Both checkpoint to Blob Storage automatically, so no separate Stream Analytics job is needed just to track what has already been read."
    - icon: "mdi:message-arrow-right-outline"
      title: "Service Bus queues and topics orchestrated without a Logic App relay"
      description: "<code>servicebus.Publish</code>, <code>servicebus.Consume</code>, and the polling and real-time triggers read and write queues and topic subscriptions directly. A message becomes a flow input or output without a Logic App connector translating between the bus and whatever runs next."
    - icon: "mdi:function-variant"
      title: "Functions callable from any trigger, not just Event Grid or Blob bindings"
      description: "<code>function.HttpFunction</code> invokes an Azure Function over HTTP from any Kestra trigger: a webhook, a Kafka message, a dbt completion, a schedule. A Function no longer needs its own Event Grid subscription or Blob-triggered binding to run; it becomes one step in a larger flow instead of an isolated endpoint."
    - icon: "mdi:transit-connection-variant"
      title: "Cross-service chains span the whole estate in one execution"
      description: "A single flow can move from a blob arrival through a Function transform, a Service Bus publish, and a Data Factory run, with retries scoped to each step and one execution ID covering every hop. Today that same chain usually means a Logic App workflow stitching four services' native triggers together by hand."
    - icon: "mdi:currency-usd"
      title: "Cost-aware Batch scaling and storage lifecycle, enforced automatically"
      description: "<code>monitoring.Query</code> reads a pool's utilization metric, an <code>If</code> task decides whether to scale, and <code>batch.pool.Resize</code> adjusts dedicated and low-priority node counts. <code>blob.DeleteList</code> clears blobs past a retention prefix on the same schedule. Both run as an automated gate, not a person approving a cost dashboard."

useCases:
  title: "How teams use Azure and Kestra"
  subtitle: "Patterns cloud platform teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Event-driven"
      badgeIcon: "mdi:cloud-upload-outline"
      title: "Route blob arrivals into cross-cloud and cross-service pipelines"
      description: "<code>blob.Trigger</code> polls the <code>stage</code> container under a prefix, moves each processed file to an archive path, and fans it out with a <code>ForEach</code>. Files can load into a cross-cloud warehouse, trigger a dbt build, or feed a Data Factory pipeline, all from one arrival event, without an Event Grid rule per destination."
      flow:
        - node: "blob trigger"
          label: "prefix filter"
          pluginClass: "io.kestra.plugin.azure.storage.blob.Trigger"
        - node: "for each blob"
          label: "parallel fan-out"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "load downstream"
          label: "cross-cloud warehouse"
          pluginClass: "io.kestra.plugin.gcp.bigquery.Load"
        - node: "dbt build"
          label: "transform"
          pluginClass: "io.kestra.plugin.dbt.cloud.TriggerRun"
      items:
        - title: "One trigger, many destinations"
          description: "Prefix-based routing lives in the flow, not in a Data Factory linked service per target."
        - title: "Move-after-processing prevents duplicates"
          description: "The <code>action</code> property moves processed blobs so the next poll never reprocesses them."
        - title: "Audit trail covers the whole chain"
          description: "One execution links the blob event, the load, and the transform, across clouds if needed."
          wide: true
    - badge: "Streaming"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Watch Event Hub volume and page on-call before a silent drop becomes an outage"
      description: "A schedule runs <code>eventhubs.Consume</code> every 5 minutes to pull whatever landed in a 30-second window. An <code>If</code> task compares the count against the floor for a healthy producer. Below it, <code>PagerDutyAlert</code> fires with a dedup key, so a stalled producer pages on-call before a downstream job fails on missing data."
      flow:
        - node: "every 5 min"
          label: "schedule"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "consume batch"
          label: "window count"
          pluginClass: "io.kestra.plugin.azure.eventhubs.Consume"
        - node: "below floor?"
          label: "If gate"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "page on-call"
          label: "dedup key"
          pluginClass: "io.kestra.plugin.pagerduty.PagerDutyAlert"
      items:
        - title: "Checkpointed, never double-counts"
          description: "Consume checkpoints to Blob Storage, so each window only counts events not yet read."
        - title: "One incident, not one per poll"
          description: "The PagerDuty dedup key keeps repeated low-volume windows on a single incident."
        - title: "Tunable per hub"
          description: "The volume floor is a flow value, not a hardcoded threshold buried in a Function."
          wide: true
    - badge: "Cross-service"
      badgeIcon: "mdi:transit-connection-variant"
      title: "Chain Blob, Functions, and Service Bus into one execution across the estate"
      description: "A blob arrival calls <code>function.HttpFunction</code> to validate and reshape the file, publishes the result with <code>servicebus.Publish</code> for any downstream subscriber, then runs <code>datafactory.CreateRun</code> for the heavier processing. Teams gets one notification for the whole chain, not one per service."
      flow:
        - node: "blob trigger"
          label: "new file"
          pluginClass: "io.kestra.plugin.azure.storage.blob.Trigger"
        - node: "azure function"
          label: "transform"
          pluginClass: "io.kestra.plugin.azure.function.HttpFunction"
        - node: "service bus publish"
          label: "notify subscribers"
          pluginClass: "io.kestra.plugin.azure.servicebus.Publish"
        - node: "data factory pipeline"
          label: "downstream ETL"
          pluginClass: "io.kestra.plugin.azure.datafactory.CreateRun"
        - node: "notify"
          label: "Teams"
          pluginClass: "io.kestra.plugin.microsoft365.teams.TeamsIncomingWebhook"
      items:
        - title: "Four services, one execution ID"
          description: "Blob, Functions, Service Bus, and Data Factory share one audit trail end to end."
        - title: "No Logic App relay"
          description: "Each hop calls the next service's plugin task directly, no connector translating between them."
        - title: "Retries stay local"
          description: "A Function timeout retries the Function step only, not the whole chain."
          wide: true
    - badge: "Cost & lifecycle"
      badgeIcon: "mdi:currency-usd"
      title: "Scale Batch pools on utilization and retire cold blobs on the same schedule"
      description: "An hourly flow runs <code>monitoring.Query</code> against a Batch pool's utilization metric. An <code>If</code> task decides whether to scale, and <code>batch.pool.Resize</code> sets new dedicated and low-priority counts. The same run purges blobs past a retention prefix with <code>blob.DeleteList</code>, both automated, no dashboard click."
      flow:
        - node: "hourly schedule"
          label: "cron"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "query pool metric"
          label: "Monitor.Query"
          pluginClass: "io.kestra.plugin.azure.monitoring.Query"
        - node: "scale decision"
          label: "If gate"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "resize pool"
          label: "scale nodes"
          pluginClass: "io.kestra.plugin.azure.batch.pool.Resize"
        - node: "purge cold blobs"
          label: "retention cleanup"
          pluginClass: "io.kestra.plugin.azure.storage.blob.DeleteList"
      items:
        - title: "Automated, not a human click"
          description: "The scale and purge decisions are both an <code>If</code> gate, not an approval step."
        - title: "Cost and storage in one run"
          description: "Compute scaling and blob retention share the same schedule and execution ID."
        - title: "Dedicated and low-priority tuned separately"
          description: "<code>targetDedicatedNodes</code> and <code>targetLowPriorityNodes</code> scale independently."
          wide: true
    - badge: "Disaster recovery"
      badgeIcon: "mdi:backup-restore"
      title: "Archive backups into a dated prefix and gate the expiry cleanup behind a human review"
      description: "A weekly flow lists a container, copies each blob into a dated archive prefix with <code>blob.Copy</code>, and notifies Slack with the count. The storage account's own GRS or RA-GRS replication handles the actual cross-region copy. The flow then <code>Pauses</code> before deleting expired backups; a named reviewer resumes it, and only then does <code>blob.DeleteList</code> remove them. Deleting a backup is worth a second pair of eyes."
      flow:
        - node: "weekly schedule"
          label: "cron"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "list container"
          label: "source container"
          pluginClass: "io.kestra.plugin.azure.storage.blob.List"
        - node: "copy to archive"
          label: "dated prefix"
          pluginClass: "io.kestra.plugin.azure.storage.blob.Copy"
        - node: "notify"
          label: "Slack summary"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
        - node: "approval gate"
          label: "before expiry delete"
          gate: true
          pluginClass: "io.kestra.plugin.core.flow.Pause"
        - node: "delete expired"
          label: "after resume"
          pluginClass: "io.kestra.plugin.azure.storage.blob.DeleteList"
      items:
        - title: "Cross-region copy runs unattended"
          description: "Only the destructive step, deleting expired backups, waits on a human."
        - title: "Named reviewer, logged"
          description: "The Pause task records who approved the deletion and when."
        - title: "Replication and cleanup share one history"
          description: "The copy count, the approval, and the delete all trace to one execution."
          wide: true

