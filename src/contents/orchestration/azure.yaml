  eyebrow: "Deeper comparison"
  title: "Kestra vs Azure Data Factory"
  description: "Side-by-side breakdown across event triggers, cross-service chaining, Batch cost guardrails, and running off the Azure-managed-only model."
  cta:
    label: "See the full comparison"
