faq:
  - question: "What's the difference between Azure Data Factory and Kestra?"
    answer: "Data Factory is Microsoft's managed ETL and pipeline service, strong at Azure-native data movement and mapping data flows inside the Azure portal. Kestra is a general-purpose orchestrator that treats Data Factory as one plugin among many: it triggers <code>datafactory.CreateRun</code> on a blob arrival or Event Hub message, chains it with Functions and Service Bus, and adds approval gates and cross-cloud steps that Data Factory's own trigger surface cannot reach. Use Data Factory for the pipeline itself; use Kestra for what happens before and after it."
  - question: "What does Kestra add to an Azure-native setup?"
    answer: "Event-driven triggers across Blob, ADLS, Event Hub, and Service Bus that fire without an Event Grid subscription per source; a single execution history spanning Functions, Service Bus, and Data Factory instead of per-service logs; and chaining into non-Azure tools like <a href='/orchestration/kubernetes'>Kubernetes</a> or <a href='/orchestration/slack'>Slack</a>, all inside the same flow."
  - question: "How does Kestra consume Azure Event Hubs?"
    answer: "Two ways. <code>io.kestra.plugin.azure.eventhubs.RealtimeTrigger</code> starts an event processor that fires one execution per message, for true real-time handling. <code>io.kestra.plugin.azure.eventhubs.Consume</code> polls in batches on a schedule, useful for aggregation, volume checks, or a windowed summary downstream. Both checkpoint to Blob Storage automatically, so reprocessing never happens across runs. Event Hubs also speaks the Kafka protocol; teams standardizing on Kafka semantics can compare notes on the <a href='/orchestration/kafka'>Kafka orchestration page</a>."
  - question: "How does the approval gate before a destructive action work?"
    answer: "<code>io.kestra.plugin.core.flow.Pause</code> stops the flow and waits for a named reviewer to resume it from the UI or the API, optionally with a timeout and an automatic behavior (resume, warn, fail) if nobody responds in time. It is reserved for the one step worth a second pair of eyes, like deleting expired backup blobs, not bolted onto every routine Blob or Service Bus run."
  - question: "Can Kestra run Azure Batch jobs alongside cost guardrails?"
    answer: "Yes. <code>io.kestra.plugin.azure.batch.job.Create</code> runs tasks on an existing pool and waits for completion. Pair it with <code>io.kestra.plugin.azure.monitoring.Query</code> to read pool utilization and <code>io.kestra.plugin.azure.batch.pool.Resize</code> to adjust <code>targetDedicatedNodes</code> and <code>targetLowPriorityNodes</code> automatically, so the pool scales to the workload instead of running at a fixed size around the clock."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted gives complete control over where your pipeline execution and credentials live."

