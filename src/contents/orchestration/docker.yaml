faq:
  - question: "How does Kestra sign a Docker image with Cosign?"
    answer: "The flow captures <code>imageId</code> (the sha256 digest) from the <code>docker.Build</code> output, then runs <code>cosign sign --yes registry/repo@<digest></code> via a <code>scripts.shell.Commands</code> task. Two modes are supported: key-based (Cosign private key stored in the Kestra secrets backend) and keyless via Sigstore OIDC (set <code>COSIGN_EXPERIMENTAL=1</code>, no key management needed). Signing the digest, not the tag, binds the signature to the immutable artifact, so retagging or repushing under a different tag doesn't break verification."
  - question: "Why promote by digest instead of by tag?"
    answer: "Tags are mutable. The same <code>latest</code> tag can point to different images at different times, which means the artifact that passed your tests is not guaranteed to be the artifact running in prod. A sha256 digest is the cryptographic identity of the image bytes. Capture <code>outputs.build.imageId</code> at build time, push it under a staging tag, run your tests against <code>repo@sha256:...</code>, then retag the same digest for prod. The promotion never rebuilds, never repulls a base image, never lets in drift."
  - question: "Can I use Compose for ephemeral integration test environments?"
    answer: "Yes. <code>docker.Compose</code> brings up a stack with the dependencies your tests need (Postgres, Redis, queue, the app). Use a unique compose project name per execution (<code>-p pr-{{ trigger.body.pr_number }}</code>) so parallel runs don't collide. Always put a second <code>docker compose down -v</code> task in the <code>errors</code> branch, otherwise a failed test leaves containers and volumes on the runner. <code>--wait</code> on <code>compose up</code> plus Compose v2 healthchecks gives you 'service is ready' semantics."
  - question: "Can a task in the same flow run inside an image I just built?"
    answer: "Yes. Capture <code>outputs.build.imageId</code> from <code>docker.Build</code>, then set it on the next task: <code>containerImage: \"{{ outputs.build.imageId }}\"</code> with the Docker task runner and <code>pullPolicy: NEVER</code>. The task runs in the local image you just built, without a registry round-trip. This is the pattern data scientists use to ship a custom Python runtime and the workload that needs it in one execution."
  - question: "What does Kestra add to a docker build + docker push setup?"
    answer: "Docker is a CLI. It builds and pushes images when you run the command, but it has no scheduler, no event triggers, no pause-and-resume between staging and prod, no native chaining with cloud auth, and no shared history for the steps that run before or after. Kestra adds all of those. Every <code>docker build</code> becomes a workflow step: triggered on Git push or schedule, gated by a reviewer, scanned and signed before push, retried on transient registry errors, and auditable across the full pipeline including the deploy step. The same flows can pair Docker with <a href='/plugins/plugin-ansible'>Ansible</a> for host configuration, with <a href='/orchestration/terraform'>Terraform</a> for the underlying infrastructure, and with the broader <a href='/infra-automation'>infrastructure automation</a> patterns Kestra supports."
  - question: "Does Kestra replace Jenkins, GitHub Actions, or GitLab CI?"
    answer: "It can, but it doesn't have to. Many teams start by adding Kestra above an existing CI: GitHub Actions builds the image and posts the digest, Kestra picks it up via webhook, runs Trivy + Cosign, pauses for approval, and triggers the Kubernetes rollout against the signed digest. When the team is ready, the build itself can move into Kestra with <code>docker.Build</code>."
  - question: "How does the short-lived registry token pattern work?"
    answer: "Each cloud has a Kestra task for short-lived credentials. <code>aws.ecr.GetAuthToken</code> returns a 12-hour ECR token. <code>gcp.auth.OauthAccessToken</code> returns a one-hour OAuth token for Artifact Registry (use <code>accessToken.tokenValue</code> in the password field). <code>azure.auth.OauthAccessToken</code> returns an ACR token. <code>docker.Build</code> and <code>docker.Push</code> consume them directly via the <code>credentials</code> property. No long-lived registry passwords in CI variables."
  - question: "How does Kestra handle multi-arch buildx builds?"
    answer: "<code>docker.Build</code> accepts a <code>platforms</code> array, passed straight to <code>buildx</code>. Set <code>platforms: [linux/amd64, linux/arm64]</code> and the daemon builds both, tags them under the same manifest list, and pushes the manifest in one step. No separate workflow per architecture."
  - question: "Where does the Docker daemon actually run?"
    answer: "On whichever worker the task is scheduled on. For local builds, mount the host's Docker socket: <code>volumes: [/var/run/docker.sock:/var/run/docker.sock]</code> on the Docker task runner. On Kubernetes, use a DinD sidecar or a remote daemon endpoint via the <code>host:</code> property. Per-worker isolation means the prod-push worker doesn't see staging credentials."
  - question: "Is the Docker plugin Enterprise-only?"
    answer: "No. The <code>io.kestra.plugin.docker</code> plugin ships in the open-source edition. Kestra Enterprise adds Apps, namespace-scoped RBAC, audit logs, worker isolation, and SSO, which teams running multi-tenant build platforms typically want on top."

