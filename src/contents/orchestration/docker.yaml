title: "Orchestrate Docker with Kestra: signed builds, digest promotion, Compose stacks"
description: "Build, scan with Trivy, sign with Cosign, and promote the same sha256 digest from staging to prod, with Compose stacks for tests and guaranteed teardown."

tool:
  name: "Docker"
  pluginClass: "io.kestra.plugin.docker.Build"
  color: "#2496ED"

hero:
  title: "Sign Docker digests once. Promote them everywhere."
  description: "Build, scan with Trivy, sign with Cosign, and push in one flow. Promote the same sha256 digest from staging to prod without rebuilding, bring up Compose stacks for integration tests with guaranteed teardown, and reuse images as task runtimes."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Replace Jenkinsfile glue with a workflow engine that builds, Trivy-scans, Cosign-signs, and promotes the same sha256 digest from staging to prod, and chains Docker with <a href='/orchestration/kubernetes'>Kubernetes</a>, <a href='/orchestration/argocd'>Argo CD</a>, and short-lived ECR/GAR/ACR tokens in one audited flow. Never rebuild between envs; drop long-lived registry passwords from CI vars."

pillars:
  title: "Around every docker build, every digest, every stack."
  subtitle: "What Kestra wraps around your Docker pipelines: how images get signed, how a single sha256 digest travels from staging to prod, how Compose stacks come up for tests and tear down on every exit path, and where the audit lives."
  items:
    - icon: "mdi:certificate-outline"
      title: "Build, Trivy scan, Cosign sign, in one flow"
      description: "<code>docker.Build</code> produces the image and emits the <code>imageId</code> (sha256 digest). <code>trivy.cli.TrivyCLI</code> fails the flow on HIGH or CRITICAL CVEs. A shell task runs <code>cosign sign --key cosign.key</code> against the digest, not the tag. Admission controllers downstream can verify the signature is on the same artifact you tested."
    - icon: "mdi:source-pull"
      title: "Promote the same digest, never rebuild between environments"
      description: "Capture the <code>imageId</code> from the build step, push it to the staging registry, run smoke tests, then push the same digest to the prod registry under a new tag. The artifact you signed and scanned is the artifact you ship. Tags are mutable, sha256 is not."
    - icon: "mdi:layers-triple-outline"
      title: "Compose stacks for ephemeral integration tests"
      description: "<code>docker.Compose</code> brings up a full stack (app, Postgres, Redis, queue) for the duration of one flow. Tests run against the live stack. An <code>errors</code> branch fires <code>docker compose down -v</code> on every exit path, so containers and volumes never leak across CI runs."
    - icon: "mdi:cube-send"
      title: "Build a custom task-runner image and use it in the same flow"
      description: "<code>docker.Build</code> produces a Python or R image with your data dependencies pre-installed. The next task, <code>scripts.python.Commands</code>, references that <code>imageId</code> as its <code>containerImage</code> with <code>pullPolicy: NEVER</code>. One execution covers build, test, and the workload that uses the image."
    - icon: "mdi:cloud-lock-outline"
      title: "Short-lived ECR, Artifact Registry, ACR tokens"
      description: "<code>aws.ecr.GetAuthToken</code>, <code>gcp.auth.OauthAccessToken</code>, and <code>azure.auth.OauthAccessToken</code> fetch fresh credentials at the start of the run. <code>docker.Build</code> and <code>docker.Push</code> consume them through the <code>credentials</code> property. No registry passwords sit in CI variables."
    - icon: "mdi:shield-check-outline"
      title: "Approval gate between staging and prod registry push"
      description: "Build once, push the digest to staging. The Pause task surfaces the scan summary, the signature, and the digest in the UI. A named reviewer approves, then the same digest gets a prod tag and a second <code>docker.Push</code> ships it. Reviewer identity and resume timestamp land in the execution history."

useCases:
  title: "How platform teams use Docker and Kestra"
  subtitle: "Patterns DevOps and platform engineers run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Supply chain"
      badgeIcon: "mdi:certificate-outline"
      title: "Build, Trivy scan, Cosign sign, push the signed digest"
      description: "<code>docker.Build</code> produces the image and emits the digest. <code>trivy.cli.TrivyCLI</code> scans and fails on HIGH/CRITICAL. A shell step runs <code>cosign sign</code> against the digest using a key from the Kestra secrets backend (keyless via Sigstore works too). The signed digest pushes to the registry along with its <code>.sig</code> reference. Admission controllers verify on deploy."
      flow:
        - node: "Git tag webhook"
          label: "release"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "docker build"
          label: "emits sha256"
          pluginClass: "io.kestra.plugin.docker.Build"
        - node: "trivy scan"
          label: "fail on HIGH"
          pluginClass: "io.kestra.plugin.trivy.cli.TrivyCLI"
        - node: "cosign sign"
          label: "digest, not tag"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "docker push"
          label: "image + .sig"
          pluginClass: "io.kestra.plugin.docker.Push"
        - node: "notify"
          label: "Slack with digest"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Sign the digest, not the tag"
          description: "Cosign binds the signature to the immutable sha256, so retagging doesn't break verification."
        - title: "Trivy gate before sign"
          description: "Scan exits non-zero on HIGH/CRITICAL. The flow halts, the sign step never runs on a vulnerable image."
        - title: "SBOM stored per execution"
          description: "Trivy outputs the SBOM as a task artifact, downloadable from the execution UI alongside the signature."
        - title: "Keyless option via Sigstore"
          description: "Use OIDC-based keyless signing (<code>COSIGN_EXPERIMENTAL=1</code>) when you don't want to manage Cosign keys."
    - badge: "Promotion"
      badgeIcon: "mdi:source-pull"
      title: "Digest-pinned promotion from staging to prod"
      description: "Build the image once, capture the <code>imageId</code> (sha256). Push to the staging registry under the version tag. Run smoke tests against the staging digest. The Pause task surfaces the digest. On approval, <code>docker.Tag</code> retags the same digest for prod and <code>docker.Push</code> promotes it. The artifact tested in staging is bit-for-bit the artifact running in prod."
      flow:
        - node: "tag webhook"
          label: "vX.Y.Z"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "docker build"
          label: "capture digest"
          pluginClass: "io.kestra.plugin.docker.Build"
        - node: "push staging"
          label: "vX.Y.Z-staging"
          pluginClass: "io.kestra.plugin.docker.Push"
        - node: "smoke test"
          label: "pull by digest"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "approve promotion"
          label: "Pause + reviewer"
          gate: true
          pluginClass: "io.kestra.plugin.core.flow.Pause"
        - node: "retag for prod"
          label: "same digest"
          pluginClass: "io.kestra.plugin.docker.Tag"
        - node: "push prod"
          label: "vX.Y.Z"
          pluginClass: "io.kestra.plugin.docker.Push"
      items:
        - title: "Never rebuild between envs"
          description: "The same sha256 moves from dev to staging to prod, so what was scanned is what ships."
        - title: "Pin smoke tests to the digest"
          description: "Pull <code>repo@sha256:...</code>, not <code>repo:latest</code>, so the test runs against the artifact you'll promote."
        - title: "Reviewer logged on approval"
          description: "Pause records the resumer and resume timestamp, attached to the execution."
        - title: "Rollback is a retag"
          description: "Re-promote the previous digest under the prod tag if the new version fails post-deploy."
    - badge: "Ephemeral stack"
      badgeIcon: "mdi:layers-triple-outline"
      title: "Compose stack for integration tests with guaranteed teardown"
      description: "On a PR webhook, <code>docker.Compose</code> brings up the full stack: app container, Postgres, Redis, message queue. A health-check loop waits until services accept connections. The test runner executes against the live stack. The <code>errors</code> branch fires <code>docker compose down -v</code> so containers and volumes never survive a failed run."
      flow:
        - node: "PR webhook"
          label: "integration tests"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "compose up"
          label: "full stack"
          pluginClass: "io.kestra.plugin.docker.Compose"
        - node: "wait for ready"
          label: "health probe loop"
          pluginClass: "io.kestra.plugin.core.http.Request"
        - node: "run tests"
          label: "pytest / go test"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "post results"
          label: "PR comment"
          pluginClass: "io.kestra.plugin.github.actions.RunWorkflow"
        - node: "compose down"
          label: "errors branch too"
          pluginClass: "io.kestra.plugin.docker.Compose"
      items:
        - title: "Teardown on every exit path"
          description: "An <code>errors</code> branch runs <code>compose down -v</code> on test failures, so volumes never leak."
        - title: "Health check before test"
          description: "Probe app, db, and queue with <code>core.http.Request</code> retry until ready. No flaky 'connection refused' on first run."
        - title: "Network-isolated by default"
          description: "Services reach each other on the internal Compose network. No host port conflicts across parallel runs."
        - title: "PR-scoped execution history"
          description: "Every PR run has its own execution, its own compose project, its own log."
    - badge: "Task runner"
      badgeIcon: "mdi:cube-send"
      title: "Build a custom task-runner image and use it in the same flow"
      description: "<code>docker.Build</code> produces a Python image with pandas, polars, and your internal libraries pre-installed. The next task, <code>scripts.python.Commands</code>, references the freshly built <code>imageId</code> as its <code>containerImage</code> with <code>pullPolicy: NEVER</code>. Data scientists ship a custom runtime and the workload that needs it in one execution."
      flow:
        - node: "Git push"
          label: "data-tools repo"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "docker build"
          label: "custom python image"
          pluginClass: "io.kestra.plugin.docker.Build"
        - node: "python workload"
          label: "containerImage = imageId"
          pluginClass: "io.kestra.plugin.scripts.python.Commands"
        - node: "output to S3"
          label: "results"
          pluginClass: "io.kestra.plugin.aws.s3.Upload"
      items:
        - title: "Same flow, build + use"
          description: "No registry push needed for the build/use loop, <code>pullPolicy: NEVER</code> references the local image directly."
        - title: "imageId is the contract"
          description: "<code>outputs.build.imageId</code> is the sha256, so the runtime is pinned to the exact build."
        - title: "Per-namespace task-runner images"
          description: "Different teams build and use their own runtime image without polluting a shared base."
          wide: true

