title: "Orchestrate Dataproc with Kestra: serverless Spark batches, lakehouse chains, and readiness-gated jobs"
description: "Submit Spark and PySpark jobs to Dataproc Serverless on a schedule or event, gate them on data readiness, chain GCS to Spark to BigQuery, and get retries and lineage around every batch."

tool:
  name: "Dataproc"
  pluginClass: "io.kestra.plugin.gcp.dataproc.batches.SparkSubmit"
  color: "#4285F4"

hero:
  title: "Drive Dataproc Spark jobs from a real pipeline."
  description: "Dataproc runs the Spark. Kestra runs everything around the submit: trigger it on a schedule or event, gate it on upstream readiness, chain it from GCS to BigQuery, and get per-step retries and one execution history across the whole lakehouse."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Submitting a Spark job is one API call; the pipeline around it is not. Kestra runs Dataproc Serverless batches as steps in a flow: it gates a job on a <a href='/orchestration/bigquery'>BigQuery</a> readiness check, chains <a href='/orchestration/gcs'>GCS</a> to Spark to BigQuery, fans batches out over partitions, and adds retries, backfills, and alerting that the Dataproc API alone does not provide. Serverless batches provision and tear down their own compute, so there is no cluster to manage."

pillars:
  title: "Above the Dataproc submit call."
  subtitle: "Dataproc runs the Spark engine and the serverless compute. Kestra runs the steps around the batch: what triggers it, what it depends on, what it chains to, and how it is retried."
  items:
    - icon: "mdi:server-off"
      title: "Serverless batches, no cluster to manage"
      description: "Dataproc Serverless batches provision compute, run, and tear it down per job. Kestra submits <code>io.kestra.plugin.gcp.dataproc.batches.SparkSubmit</code> or <code>PySparkSubmit</code> on a schedule or event, so there is no cluster to size, keep warm, or forget to delete, and cost tracks the job rather than uptime."
    - icon: "mdi:gate-arrow-right"
      title: "Gate a job on upstream readiness"
      description: "Running Spark on missing data wastes compute. Kestra checks <a href='/orchestration/bigquery'>BigQuery</a> (or a <a href='/orchestration/gcs'>GCS</a> marker) for fresh rows, then an <code>If</code> submits the batch only when the readiness check passes. This is the dependency Dataproc cannot express: do not burn compute until the upstream data has landed."
    - icon: "mdi:pipe-disconnected"
      title: "GCS to Spark to BigQuery in one flow"
      description: "The lakehouse chain is multi-step: stage raw files, transform with Spark, load the curated output. Kestra runs <code>PySparkSubmit</code> against <a href='/orchestration/gcs'>GCS</a> data, then <code>bigquery.LoadFromGcs</code> into a gold table, as ordered steps with retries and one execution ID across the chain."
    - icon: "mdi:replay"
      title: "Retries, backfills, and replay"
      description: "A failed submit has no automatic recovery across the broader pipeline. Kestra retries individual steps with backoff, backfills a dated range, and replays from the failing task, so a transient batch failure does not mean re-running everything by hand or losing the run's history."
    - icon: "mdi:language-python"
      title: "Spark, PySpark, and Spark SQL"
      description: "Different jobs need different entry points. Kestra submits JVM Spark with <code>SparkSubmit</code>, Python with <code>PySparkSubmit</code>, and SQL scripts with <code>SparkSqlSubmit</code>, each as a typed task, so a mixed-language Spark workload runs from one declarative flow instead of scattered submit scripts."
    - icon: "mdi:cube-outline"
      title: "Chained with dbt and the warehouse"
      description: "Dataproc has no view of the <a href='/orchestration/dbt-core'>dbt</a> models or the warehouse it feeds. Kestra runs the Spark batch, then a dbt build, then a <a href='/orchestration/bigquery'>BigQuery</a> validation query, so heavy transformation and analytics-engineering steps live in one flow with shared run IDs."

useCases:
  title: "How teams use Dataproc and Kestra"
  subtitle: "Patterns data engineering teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Serverless"
      badgeIcon: "mdi:server-off"
      title: "Submit a Spark batch with no cluster to manage"
      description: "A Spark job needs to run on a cadence without a standing cluster. Kestra submits it to Dataproc Serverless on a <code>Schedule</code>, which provisions and tears down its own compute per run, and Slack reports the final batch state. Cost tracks the job, not uptime."
      flow:
        - node: "schedule"
          label: "nightly"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "spark submit"
          label: "serverless batch"
          pluginClass: "io.kestra.plugin.gcp.dataproc.batches.SparkSubmit"
        - node: "slack"
          label: "batch state"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "No cluster lifecycle"
          description: "Serverless batches provision and tear down compute automatically."
        - title: "Cost tracks the job"
          description: "You pay for the batch, not for a cluster sitting idle between runs."
        - title: "Scheduled with retries"
          description: "A failed batch retries; the run lands in execution history."
          wide: true
    - badge: "Lakehouse"
      badgeIcon: "mdi:pipe-disconnected"
      title: "Run the GCS to Spark to BigQuery chain"
      description: "Raw files in <a href='/orchestration/gcs'>GCS</a> need transformation before analytics. Kestra runs a PySpark batch that reads the raw data and writes curated Parquet back to GCS, then loads it into a <a href='/orchestration/bigquery'>BigQuery</a> gold table. Microsoft Teams confirms the refresh."
      flow:
        - node: "schedule"
          label: "daily"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "pyspark submit"
          label: "transform"
          pluginClass: "io.kestra.plugin.gcp.dataproc.batches.PySparkSubmit"
        - node: "bigquery load"
          label: "load gold"
          pluginClass: "io.kestra.plugin.gcp.bigquery.LoadFromGcs"
        - node: "teams"
          label: "on complete"
          pluginClass: "io.kestra.plugin.microsoft365.teams.TeamsIncomingWebhook"
      items:
        - title: "Raw to gold in one flow"
          description: "Transform with Spark, then load the curated output to the warehouse."
        - title: "One execution ID"
          description: "Debug the Spark step and the load from a single run view."
        - title: "Event-driven option"
          description: "Trigger on a <a href='/orchestration/gcs'>GCS</a> marker file instead of a schedule."
          wide: true
    - badge: "Readiness gate"
      badgeIcon: "mdi:gate-arrow-right"
      title: "Gate a PySpark batch on data readiness"
      description: "A nightly batch should not run on a half-loaded source. Kestra queries <a href='/orchestration/bigquery'>BigQuery</a> for today's row count, and an <code>If</code> submits the PySpark batch only when the count clears the bar, otherwise it skips and reports. Discord confirms either outcome."
      flow:
        - node: "bigquery query"
          label: "readiness check"
          pluginClass: "io.kestra.plugin.gcp.bigquery.Query"
        - node: "gate"
          label: "ready?"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "pyspark submit"
          label: "run on pass"
          pluginClass: "io.kestra.plugin.gcp.dataproc.batches.PySparkSubmit"
        - node: "discord"
          label: "ran or skipped"
          pluginClass: "io.kestra.plugin.discord.DiscordIncomingWebhook"
      items:
        - title: "No wasted compute"
          description: "The batch runs only when the source data has actually landed."
        - title: "Skip is explicit"
          description: "A not-ready run reports a skip instead of failing silently."
        - title: "Tune the rule"
          description: "Swap the count check for a freshness timestamp or marker file."
          wide: true
    - badge: "Transform"
      badgeIcon: "mdi:cube-outline"
      title: "Chain Spark SQL with a dbt build"
      description: "Heavy SQL transformation runs in Spark, modeling runs in <a href='/orchestration/dbt-core'>dbt</a>. Kestra submits a Spark SQL batch, then runs <code>dbt build</code> on the result, then validates with a <a href='/orchestration/bigquery'>BigQuery</a> query, so the two transformation layers run as one flow with shared run IDs. Email confirms."
      flow:
        - node: "spark sql"
          label: "heavy transform"
          pluginClass: "io.kestra.plugin.gcp.dataproc.batches.SparkSqlSubmit"
        - node: "dbt build"
          label: "model"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "bigquery query"
          label: "validate"
          pluginClass: "io.kestra.plugin.gcp.bigquery.Query"
        - node: "email"
          label: "on complete"
          pluginClass: "io.kestra.plugin.email.MailSend"
      items:
        - title: "Two layers, one flow"
          description: "Spark SQL and dbt run in order with outputs flowing between them."
        - title: "Validate before publish"
          description: "A <a href='/orchestration/bigquery'>BigQuery</a> check gates anything that reads the result."
        - title: "Shared run IDs"
          description: "The Spark batch and dbt build share one execution for debugging."
          wide: true
    - badge: "Fan-out"
      badgeIcon: "mdi:source-branch"
      title: "Fan PySpark batches out over partitions"
      description: "Reprocessing many partitions one after another is slow. Kestra fans the submits out with a <code>ForEach</code>, running a PySpark batch per partition in parallel on Dataproc Serverless, then reports completion. A backfill that took hours serially finishes as parallel batches."
      flow:
        - node: "schedule"
          label: "backfill"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "for each"
          label: "per partition"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "pyspark submit"
          label: "batch per partition"
          pluginClass: "io.kestra.plugin.gcp.dataproc.batches.PySparkSubmit"
        - node: "telegram"
          label: "on complete"
          pluginClass: "io.kestra.plugin.telegram.TelegramSend"
      items:
        - title: "Parallel partitions"
          description: "<code>ForEach</code> submits a batch per partition concurrently."
        - title: "Serverless scales out"
          description: "Each batch gets its own compute, so parallel runs do not contend."
        - title: "Bounded concurrency"
          description: "A concurrency limit caps how many batches run at once."
          wide: true

