faq:
  - question: "Does Kestra need a Dataproc cluster to run Spark?"
    answer: "No. Kestra submits to Dataproc Serverless with <code>io.kestra.plugin.gcp.dataproc.batches.SparkSubmit</code> and <code>PySparkSubmit</code>, which provision compute for the batch and tear it down when it finishes. There is no cluster to size, keep warm, or remember to delete, and cost tracks the job rather than cluster uptime. You only orchestrate the data dependencies around the batch."
  - question: "How does Kestra stop a Spark job from running on missing data?"
    answer: "Run a readiness check first, for example a <a href='/orchestration/bigquery'>BigQuery</a> query counting today's source rows, then use <code>io.kestra.plugin.core.flow.If</code> to submit the batch only when the count clears your threshold. Otherwise the flow reports a skip. This is the upstream dependency Dataproc cannot express on its own, so you never burn serverless compute on a half-loaded source."
  - question: "Can Kestra run the GCS to Spark to BigQuery lakehouse chain?"
    answer: "Yes. A <code>PySparkSubmit</code> batch reads raw files from <a href='/orchestration/gcs'>GCS</a> and writes curated Parquet back, then <code>io.kestra.plugin.gcp.bigquery.LoadFromGcs</code> loads that output into a gold table, as ordered steps in one flow with retries and a shared execution ID. Trigger it on a schedule or on a GCS marker file for an event-driven refresh."
  - question: "Which Spark job types does Kestra support on Dataproc?"
    answer: "Kestra submits JVM Spark with <code>SparkSubmit</code> (mainClass and jarFileUris), Python with <code>PySparkSubmit</code> (mainPythonFileUri), and SQL scripts with <code>SparkSqlSubmit</code>, plus SparkR. Each is a typed task with a region and the usual file, args, and runtime properties, so a mixed-language Spark workload runs from one declarative flow."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted keeps your Dataproc credentials and job configuration entirely within your own infrastructure."

