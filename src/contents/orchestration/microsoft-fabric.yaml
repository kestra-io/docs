title: "Orchestrate Microsoft Fabric with Kestra: event-driven notebooks, pipelines, and OneLake"
description: "Trigger Fabric notebooks, data pipelines, and Spark jobs on any event, layer OneLake bronze to gold, query the Fabric warehouse, and chain Fabric with the rest of your stack."

tool:
  name: "Microsoft Fabric"
  pluginClass: "io.kestra.plugin.microsoft.fabric.data.engineering.RunPipeline"
  color: "#0094e5"

hero:
  title: "Run Microsoft Fabric jobs as steps in a bigger flow."
  description: "Fabric runs the notebooks, pipelines, and lakehouse. Kestra decides when each job fires, what runs next, and what happens beyond Fabric. Trigger on any event, wait for completion, layer OneLake bronze to gold, and chain with dbt, on-prem databases, and the rest of your stack in one execution history."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Fabric's built-in scheduler fires notebooks and pipelines on a cron inside the Fabric workspace. Kestra runs above it: it triggers <code>RunPipeline</code>, <code>RunNotebook</code>, and <code>RunSparkJob</code> the moment an upstream event lands, waits for terminal status, layers OneLake bronze to gold, and chains Fabric with <a href='/orchestration/dbt-core'>dbt</a>, <a href='/orchestration/kafka'>Kafka</a>, and on-prem systems that the Fabric scheduler cannot reach. One execution history spans the whole pipeline, inside Fabric and beyond it."

pillars:
  title: "Above the Fabric workspace scheduler."
  subtitle: "Fabric runs the notebooks, pipelines, Spark, and OneLake. Kestra runs the steps around them: what triggers each job, what runs next, who is alerted, and where the cross-tool audit trail lives."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "Event-driven Fabric jobs, not workspace cron"
      description: "Fabric's scheduler fires items on a fixed cadence inside the workspace. Kestra triggers <code>io.kestra.plugin.microsoft.fabric.data.engineering.RunPipeline</code> the moment an upstream event lands: a webhook, an Azure Blob arrival, a <a href='/orchestration/kafka'>Kafka</a> message, or a schedule. The Fabric job runs on the event, not on the next workspace tick."
    - icon: "mdi:notebook-outline"
      title: "Notebooks, pipelines, and Spark as flow steps"
      description: "<code>RunNotebook</code>, <code>RunPipeline</code>, and <code>RunSparkJob</code> each submit a Fabric item job and wait for completion by default (polling every 5s). Each becomes one step in a larger Kestra flow, so a notebook can be bracketed by the load before it and the activation after it, with per-step retries."
    - icon: "mdi:layers-triple-outline"
      title: "OneLake medallion, orchestrated"
      description: "The OneLake tasks (<code>onelake.Upload</code>, <code>Download</code>, <code>Delete</code>) move files in and out of a Lakehouse over the ADLS Gen2 API. Kestra layers raw into bronze, conforms to silver, and aggregates into gold as ordered steps, each retrying independently, with the whole refresh under one execution ID."
    - icon: "mdi:database-search-outline"
      title: "Fabric Warehouse queries in the flow"
      description: "<code>warehouse.Query</code> runs SQL against a Fabric Warehouse over JDBC with service-principal auth, returning rows or writing results to internal storage. A query result can gate the next step, feed a notebook, or branch the flow, so the warehouse is part of the pipeline, not a dead end."
    - icon: "mdi:pipe-disconnected"
      title: "Chain Fabric beyond Microsoft"
      description: "Fabric orchestrates within the Microsoft estate. Kestra chains a Fabric pipeline with a <a href='/orchestration/dbt-core'>dbt</a> build, an on-prem database extract, a warehouse load, or a <a href='/orchestration/kafka'>Kafka</a> event in one flow, so Fabric is one step in a pipeline that spans the whole stack, not an island."
    - icon: "mdi:cloud-sync-outline"
      title: "Self-hosted control plane, cross-cloud"
      description: "Kestra runs self-hosted on Docker or Kubernetes, or air-gapped, and is not bound to the Microsoft cloud. It orchestrates Fabric alongside other clouds and on-prem from one control plane, which matters for regulated workloads that cannot be driven from a single vendor's scheduler."

useCases:
  title: "How teams use Microsoft Fabric and Kestra"
  subtitle: "Patterns cloud data teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Event-driven"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Trigger a Fabric pipeline on an upstream event"
      description: "A webhook (or Azure Blob arrival, or <a href='/orchestration/kafka'>Kafka</a> message) fires the flow, Kestra runs <code>RunPipeline</code> and waits for terminal status, then branches on the result. The Fabric pipeline runs when the source is confirmed ready, not on a workspace schedule."
      flow:
        - node: "webhook"
          label: "any HTTP signal"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "fabric pipeline"
          label: "run + wait"
          pluginClass: "io.kestra.plugin.microsoft.fabric.data.engineering.RunPipeline"
        - node: "branch"
          label: "on result"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "notify"
          label: "Slack on failure"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Wait built in"
          description: "<code>RunPipeline</code> polls the job instance until terminal, failing on Failed or Cancelled."
        - title: "Fire on the event"
          description: "The pipeline runs on a webhook, file, or message, not the next cron tick."
        - title: "Branch on the outcome"
          description: "An <code>If</code> task routes success and failure to different paths."
          wide: true
    - badge: "Notebook"
      badgeIcon: "mdi:notebook-outline"
      title: "Run a Fabric notebook and chain dbt"
      description: "Kestra runs a Fabric <code>RunNotebook</code> job, waits for it, then triggers a <a href='/orchestration/dbt-core'>dbt</a> build on the output and confirms on <a href='/orchestration/slack'>Slack</a>. The notebook is one step in a chain it could not express inside the workspace alone."
      flow:
        - node: "schedule"
          label: "nightly"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "fabric notebook"
          label: "run + wait"
          pluginClass: "io.kestra.plugin.microsoft.fabric.data.engineering.RunNotebook"
        - node: "dbt build"
          label: "transform output"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "notify"
          label: "on complete"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Notebook as a step"
          description: "<code>RunNotebook</code> submits the item job and waits for completion."
        - title: "Chain past Fabric"
          description: "The notebook output feeds dbt, a warehouse load, or an on-prem system."
        - title: "Retry in isolation"
          description: "A dbt retry never re-runs the notebook."
          wide: true
    - badge: "Lakehouse"
      badgeIcon: "mdi:layers-triple-outline"
      title: "Bronze to silver to gold on OneLake"
      description: "The medallion pattern on OneLake. Kestra downloads raw files from bronze with <code>onelake.Download</code>, runs a Spark job to conform to silver, then uploads aggregated gold with <code>onelake.Upload</code>. Each hop is a step with its own retry."
      flow:
        - node: "onelake download"
          label: "bronze raw"
          pluginClass: "io.kestra.plugin.microsoft.fabric.onelake.Download"
        - node: "spark job"
          label: "conform to silver"
          pluginClass: "io.kestra.plugin.microsoft.fabric.data.engineering.RunSparkJob"
        - node: "onelake upload"
          label: "gold aggregate"
          pluginClass: "io.kestra.plugin.microsoft.fabric.onelake.Upload"
        - node: "notify"
          label: "on complete"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Each layer is a step"
          description: "Bronze, silver, and gold hops each retry independently."
        - title: "Spark for the heavy hop"
          description: "<code>RunSparkJob</code> handles the conform-and-aggregate work."
        - title: "One refresh, one history"
          description: "The whole medallion run shares one execution ID."
          wide: true
    - badge: "Warehouse"
      badgeIcon: "mdi:database-search-outline"
      title: "Gate a flow on a Fabric Warehouse query"
      description: "Kestra runs a <code>warehouse.Query</code> against the Fabric Warehouse, branches on the result with an <code>If</code> task, and only proceeds when a freshness or row-count check passes. A failed check halts the flow and pages PagerDuty before downstream runs."
      flow:
        - node: "warehouse query"
          label: "freshness check"
          pluginClass: "io.kestra.plugin.microsoft.fabric.warehouse.Query"
        - node: "branch"
          label: "pass or halt"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "downstream"
          label: "proceed on pass"
          pluginClass: "io.kestra.plugin.microsoft.fabric.data.engineering.RunPipeline"
        - node: "pagerduty"
          label: "page on fail"
          pluginClass: "io.kestra.plugin.pagerduty.PagerDutyAlert"
      items:
        - title: "Query gates the flow"
          description: "A <code>warehouse.Query</code> result decides whether downstream runs."
        - title: "Service-principal auth"
          description: "JDBC with Active Directory service principal, no interactive login."
        - title: "Halt on bad data"
          description: "A failed check pages the on-call before anything downstream runs."
          wide: true
    - badge: "Ingestion"
      badgeIcon: "mdi:database-import-outline"
      title: "Land on-prem data in OneLake, then process it"
      description: "Kestra extracts from an on-prem database, uploads the result to OneLake with <code>onelake.Upload</code>, then runs a Fabric pipeline on it, all in one flow with one execution ID. The pattern brings data Fabric cannot reach natively into the Lakehouse."
      flow:
        - node: "on-prem extract"
          label: "query a database"
          pluginClass: "io.kestra.plugin.jdbc.postgresql.CopyOut"
        - node: "onelake upload"
          label: "into Fabric"
          pluginClass: "io.kestra.plugin.microsoft.fabric.onelake.Upload"
        - node: "fabric pipeline"
          label: "process"
          pluginClass: "io.kestra.plugin.microsoft.fabric.data.engineering.RunPipeline"
        - node: "notify"
          label: "on complete"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Reach what Fabric cannot"
          description: "On-prem databases and file shares land in OneLake through one flow."
        - title: "One history end to end"
          description: "The extract, the OneLake upload, and the Fabric run share one execution ID."
        - title: "Step retries stay local"
          description: "A Fabric retry never re-runs the on-prem extract."
          wide: true

