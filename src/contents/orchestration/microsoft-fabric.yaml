faq:
  - question: "What's the difference between the Fabric scheduler and Kestra?"
    answer: "Fabric's built-in scheduler fires notebooks, pipelines, and Spark jobs on a cron inside the workspace. It has no view of what runs before or after across other tools. Kestra runs above Fabric: it triggers <code>RunPipeline</code>, <code>RunNotebook</code>, and <code>RunSparkJob</code> on real events, waits for terminal status, layers OneLake, and chains Fabric with <a href='/orchestration/dbt-core'>dbt</a>, <a href='/orchestration/kafka'>Kafka</a>, and on-prem systems in one execution history. Kestra works with Fabric, not instead of it."
  - question: "How does Kestra run a Fabric notebook or pipeline?"
    answer: "The <code>io.kestra.plugin.microsoft.fabric.data.engineering.RunNotebook</code>, <code>RunPipeline</code>, and <code>RunSparkJob</code> tasks submit a Fabric item job via the scheduler API and wait for completion by default (polling every 5 seconds, failing on Failed, Cancelled, or Deduped). Because each is one task in a Kestra flow, the job can chain with steps Fabric cannot express on its own, like a dbt build or an approval branch."
  - question: "Can Kestra orchestrate a medallion architecture on OneLake?"
    answer: "Yes. The OneLake tasks (<code>onelake.Download</code>, <code>onelake.Upload</code>, <code>onelake.Delete</code>) move files in and out of a Lakehouse over the ADLS Gen2 API. A flow downloads bronze, runs a <code>RunSparkJob</code> to conform to silver, and uploads aggregated gold, with each layer a retrying step and the whole refresh under one execution ID."
  - question: "Can Kestra query a Fabric Warehouse?"
    answer: "Yes. <code>io.kestra.plugin.microsoft.fabric.warehouse.Query</code> runs SQL against a Fabric Warehouse over JDBC with Active Directory service-principal authentication. It can return rows or write results to internal storage, so a query result can gate the next step, feed a notebook, or branch the flow."
  - question: "Can Kestra land on-prem or external data in OneLake?"
    answer: "Yes. Kestra extracts from an on-prem database, an SFTP server, or any HTTP source, uploads the result to OneLake with <code>onelake.Upload</code>, and runs a Fabric pipeline on it, all in one flow with one execution ID. This brings data Fabric cannot reach natively into the Lakehouse, and the same approach works for any cloud you also run."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. Unlike the Fabric scheduler, Kestra is not bound to the Microsoft cloud, so it orchestrates Fabric alongside other clouds and on-prem from one control plane."

