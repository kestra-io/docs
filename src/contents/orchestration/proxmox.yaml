faq:
  - question: "Does Kestra replace Proxmox VE?"
    answer: "No. Proxmox runs your VMs and containers. Kestra calls the Proxmox REST API through the <code>io.kestra.plugin.proxmox</code> plugin to run the operations you used to script: <code>vm.Clone</code>, <code>container.Create</code>, <code>snapshot.Create</code>, <code>backup.Restore</code>, <code>vm.Migrate</code>, and so on. The hypervisor stays where it is. Kestra orchestrates the workflow around your cluster."
  - question: "How does the VMware-to-Proxmox migration actually work?"
    answer: "Proxmox VE 9 ships an ESXi Import Wizard that connects directly to an ESXi host or datastore, converts disk formats (VMDK to qcow2 or raw), and registers the VM in Proxmox. The flow stops the source VM in vCenter (Proxmox does not live-migrate from VMware), drives the import via the Proxmox API, waits for the task UPID, then starts the new VM in Proxmox and runs a health probe. Most import failures come from unconsolidated VMware snapshots, so the flow refuses to start until that pre-flight check passes."
  - question: "Can the same flow manage both QEMU VMs and LXC containers?"
    answer: "Yes. The plugin splits into <code>vm.*</code> tasks for QEMU and <code>container.*</code> tasks for LXC, with matching shape (Create, Clone, Start, Stop, Migrate, Update). Snapshot and backup tasks accept a <code>resourceType</code> property so the same task type works on either. Proxmox is the only mainstream hypervisor that runs both side by side, and the plugin exposes both fully."
  - question: "How does live migration coordination work?"
    answer: "<code>vm.Migrate</code> sets <code>online: true</code> for live migration on QEMU VMs that support it. The task returns a Proxmox UPID. <code>task.WaitForTask</code> polls the UPID until <code>exitstatus=OK</code> or the timeout. For LXC containers, migration involves a short restart on the target node (LXC does not live-migrate). The node drain blueprint above iterates with <code>ForEach</code> so the whole node empties before the maintenance gate."
  - question: "How does Kestra authenticate to the Proxmox API?"
    answer: "Use a Proxmox API token, not a root password. Create a token in the Proxmox UI under Datacenter, Permissions, API Tokens, scoped to a service user with the minimum required privileges (PVEVMAdmin, PVEDatastoreUser, and so on). Store the token ID and secret in Kestra's secrets backend and reference them via <code>pluginDefaults</code> on <code>io.kestra.plugin.proxmox</code> at the namespace or flow level. Every Proxmox task picks them up without repeating credentials."
  - question: "Is the Proxmox plugin Enterprise-only?"
    answer: "No. The <code>io.kestra.plugin.proxmox</code> plugin ships in the open-source edition. Kestra Enterprise adds Apps (typed self-service forms), namespace-scoped RBAC, audit logs, worker isolation, and SSO, which Proxmox shops running multi-team clusters typically want on top."
  - question: "Can Kestra run in an air-gapped Proxmox lab or production cluster?"
    answer: "Yes. Kestra ships self-hosted on Docker or Kubernetes (often itself running on Proxmox), runs fully air-gapped, and supports remote workers close to each Proxmox node. The open-source edition includes unlimited workflows and event-driven triggers with no external dependency on Kestra's infrastructure. See <a href='/infra-automation'>Kestra for infrastructure automation</a> for the broader picture across Proxmox, Terraform, Ansible, and cloud APIs."
  - question: "Where does Kestra fit alongside Ansible and Terraform for Proxmox?"
    answer: "Each tool keeps its job. Use <a href='/orchestration/terraform'>Terraform</a> with the telmate/proxmox provider to declare the desired state of VMs, networks, and storage. Use <a href='/orchestration/ansible'>Ansible</a> to configure the guests once they exist. Use Kestra above both: schedule and gate the Terraform run, hand outputs to Ansible, snapshot before patching, drive ESXi imports, and run vzdump restore drills, all in one execution history."

