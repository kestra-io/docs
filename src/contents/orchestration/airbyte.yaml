title: "Orchestrate Airbyte with Kestra: event-driven syncs, ELT chains, and warehouse-aware ingestion"
description: "Trigger Airbyte syncs from any event, chain them with dbt and reverse-ETL, wait for terminal status, and trace every connector run across the data stack from one place."

tool:
  name: "Airbyte"
  pluginClass: "io.kestra.plugin.airbyte.connections.Sync"
  color: "#615EFF"

hero:
  title: "Fire Airbyte syncs the moment work is ready."
  description: "Airbyte moves the data. Kestra decides when each sync runs, what happens after it lands, and what to do when it fails. Trigger on any event, wait for terminal status, chain straight into dbt and reverse-ETL, and trace every connector run in one execution history."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Airbyte's built-in scheduler fires connector syncs on a cron cadence. Kestra runs above it: it triggers <code>Sync</code> the moment an upstream event lands, waits for the job to reach a terminal state, then chains straight into <a href='/orchestration/dbt-core'>dbt</a> transforms and <a href='/orchestration/hightouch'>Hightouch</a> activation in one flow. A failed transform retries without re-syncing the connector, and every sync, build, and activation shares one execution ID and one place to debug."

pillars:
  title: "Above the Airbyte sync scheduler."
  subtitle: "Airbyte owns the connectors and the EL. Kestra owns the steps around the sync: when it triggers, what runs after it, who approves the load, and where the cross-tool audit trail lives."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "Event-driven syncs, not cron-only"
      description: "Airbyte's scheduler fires on a fixed cadence whether the source is ready or not. Kestra triggers <code>io.kestra.plugin.airbyte.connections.Sync</code> the moment an upstream event lands, a webhook, an S3 file, a <a href='/orchestration/slack'>Slack</a> command, or a database change. Ingestion starts when there is actually something to ingest."
    - icon: "mdi:timer-sand"
      title: "Wait for terminal status, then continue"
      description: "Firing a sync and hoping is not orchestration. <code>Sync</code> waits for the job to reach a terminal state by default, polling every second; <code>CheckStatus</code> can poll a job started elsewhere. The next task only runs after the sync confirms success, so transforms never read half-loaded tables."
    - icon: "mdi:pipe-disconnected"
      title: "Full ELT chain in one flow"
      description: "Airbyte's run history stops at the connector. It has no record of the <a href='/orchestration/dbt-core'>dbt</a> build that shaped the data or the <a href='/orchestration/hightouch'>Hightouch</a> sync that activated it. Kestra runs ingestion, transform, and activation as steps in one flow with run IDs flowing forward and one shared execution ID."
    - icon: "mdi:source-branch"
      title: "Parallel connector fan-out with isolation"
      description: "A warehouse refresh often means a dozen connector syncs. Kestra fans them out with <code>ForEach</code> and <code>concurrencyLimit</code>, and <code>allowFailure</code> isolates a single failing connector so the rest still complete. A targeted alert routes to the owner of the broken connection."
    - icon: "mdi:refresh"
      title: "Resets and backfills without re-plumbing"
      description: "A schema change forces a connection reset and a full re-sync. The <code>cloud.jobs.Reset</code> task clears connector state and <code>cloud.jobs.Sync</code> reloads, driven from a typed flow input so a backfill is a form submission, not a manual console click. The same flow handles the nightly incremental and the on-demand full reload."
    - icon: "mdi:eye-outline"
      title: "Cross-stack history with sync metrics"
      description: "When data looks stale, you need to know whether the sync ran, how many records moved, and what happened next. Airbyte tracks the connector job; Kestra surfaces its emitted metrics next to the dbt build and the activation sync, every step timestamped and attributed to a trigger source."

useCases:
  title: "How teams use Airbyte and Kestra"
  subtitle: "Patterns data engineering teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Full ELT"
      badgeIcon: "mdi:pipe-disconnected"
      title: "Airbyte to dbt to activation in one flow"
      description: "Kestra runs the Airbyte sync, waits for terminal status, builds <a href='/orchestration/dbt-core'>dbt</a> models on the freshly landed data, then fires the <a href='/orchestration/hightouch'>Hightouch</a> sync. <a href='/orchestration/slack'>Slack</a> confirms. A dbt retry never re-runs the Airbyte sync."
      flow:
        - node: "schedule or event"
          label: "trigger"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "airbyte sync"
          label: "ingest + wait"
          pluginClass: "io.kestra.plugin.airbyte.connections.Sync"
        - node: "dbt build"
          label: "transform"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "hightouch sync"
          label: "activate"
          pluginClass: "io.kestra.plugin.hightouch.Sync"
        - node: "slack"
          label: "on complete"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Wait built in"
          description: "<code>Sync</code> blocks until terminal status, so dbt never reads a half-loaded table."
        - title: "Step retries stay local"
          description: "A dbt retry never re-runs the sync; an activation retry never re-runs dbt."
        - title: "One execution ID across the stack"
          description: "Sync metrics, dbt results, and the activation run in one view."
          wide: true
    - badge: "Event-driven"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Trigger a sync from any event"
      description: "Replace the cron schedule with a push. A webhook (or S3 arrival, or <a href='/orchestration/slack'>Slack</a> command) fires the flow, Kestra runs the matching Airbyte connection, waits for completion, and branches on the result. The sync runs when the source is confirmed ready."
      flow:
        - node: "webhook"
          label: "any HTTP signal"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "airbyte sync"
          label: "run + wait"
          pluginClass: "io.kestra.plugin.airbyte.connections.Sync"
        - node: "branch"
          label: "on result"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "notify"
          label: "Slack on failure"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Push, not polling"
          description: "Ingestion fires on the event that matters, not the next interval."
        - title: "Parameters from the trigger"
          description: "The connection ID can come from <code>trigger.body</code> at run time."
        - title: "Branch on the outcome"
          description: "An <code>If</code> task routes success and failure to different paths."
          wide: true
    - badge: "Fan-out"
      badgeIcon: "mdi:source-branch"
      title: "Run many connector syncs in parallel"
      description: "A warehouse refresh means many connections at once. Kestra fans them out via <code>ForEach</code> with a <code>concurrencyLimit</code>, runs each <code>Sync</code>, and isolates failures with <code>allowFailure</code> so one broken connector does not block the rest. The owner of the failing connection gets paged."
      flow:
        - node: "schedule"
          label: "refresh window"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "for each conn"
          label: "fan out"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "airbyte sync"
          label: "per connection"
          pluginClass: "io.kestra.plugin.airbyte.connections.Sync"
        - node: "notify"
          label: "owner ping"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Bounded parallelism"
          description: "<code>concurrencyLimit</code> caps how many syncs run at once."
        - title: "Per-connector isolation"
          description: "<code>allowFailure</code> keeps one bad connection from halting the batch."
        - title: "Owner-aware alerts"
          description: "<a href='/orchestration/slack'>Slack</a> routes by connection so the right team is paged."
          wide: true
    - badge: "Backfill"
      badgeIcon: "mdi:refresh"
      title: "Reset and full re-sync from one input"
      description: "A schema change needs a connection reset and full reload. Kestra runs <code>cloud.jobs.Reset</code> to clear state, then <code>cloud.jobs.Sync</code> to reload, with the connection ID and full-vs-incremental mode as typed inputs. The nightly incremental and the on-demand backfill share one flow."
      flow:
        - node: "manual input"
          label: "full=true"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "reset"
          label: "clear state"
          pluginClass: "io.kestra.plugin.airbyte.cloud.jobs.Reset"
        - node: "sync"
          label: "full reload"
          pluginClass: "io.kestra.plugin.airbyte.cloud.jobs.Sync"
        - node: "notify"
          label: "on complete"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Reset then reload, ordered"
          description: "<code>Reset</code> clears state before <code>Sync</code> reloads."
        - title: "Mode from a typed input"
          description: "Full-vs-incremental is a flow input, not a code change."
        - title: "Self-service via Kestra Apps"
          description: "Trigger a backfill from a form without touching YAML."
          wide: true
    - badge: "Quality gate"
      badgeIcon: "mdi:shield-check-outline"
      title: "Validate the load before transforms run"
      description: "Kestra runs the sync, waits, then checks row counts or runs a <a href='/orchestration/dbt-core'>dbt</a> source freshness test. If the load is short or stale, it halts and pages PagerDuty before any transform touches the data. Clean loads continue to the build."
      flow:
        - node: "airbyte sync"
          label: "ingest + wait"
          pluginClass: "io.kestra.plugin.airbyte.connections.Sync"
        - node: "freshness check"
          label: "dbt source test"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "branch"
          label: "pass or halt"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "pagerduty"
          label: "page on stale"
          pluginClass: "io.kestra.plugin.pagerduty.PagerDutyAlert"
      items:
        - title: "Gate before transform"
          description: "A short or stale load halts the flow before dbt runs."
        - title: "Freshness as a hard check"
          description: "A dbt source freshness test decides pass or halt."
        - title: "PagerDuty on failure"
          description: "Stale ingestion pages the on-call, not just a log line."
          wide: true

