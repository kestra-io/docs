faq:
  - question: "What's the difference between Airbyte's built-in scheduler and Kestra?"
    answer: "Airbyte's scheduler fires connector syncs on a fixed cadence and manages connector config. It has no view of what runs after a sync. Kestra runs above it: it triggers <code>io.kestra.plugin.airbyte.connections.Sync</code> on an upstream event, waits for terminal status, then chains straight into <a href='/orchestration/dbt-core'>dbt</a> and <a href='/orchestration/hightouch'>Hightouch</a>, with one execution history across every tool. Kestra works with both Airbyte OSS and Airbyte Cloud."
  - question: "Does the Airbyte task wait for the sync to finish?"
    answer: "Yes. <code>io.kestra.plugin.airbyte.connections.Sync</code> waits for the job to reach a terminal state by default, polling every second for up to 60 minutes (tune with pollFrequency and maxDuration). The <code>connections.CheckStatus</code> task polls a job started elsewhere. The next task only runs after the sync confirms success, so transforms never read a half-loaded table."
  - question: "Can Kestra trigger an Airbyte sync when a file lands or a webhook fires?"
    answer: "Yes. Kestra has native triggers for webhooks, <a href='/orchestration/aws'>S3</a> arrivals, schedules, and more. The trigger fires the flow with the event payload in <code>trigger.body</code>, and the <code>Sync</code> task runs the matching connection ID. No custom webhook receiver, no polling loop."
  - question: "How do I run a full reset and backfill?"
    answer: "Use <code>io.kestra.plugin.airbyte.cloud.jobs.Reset</code> to clear connection state, then <code>cloud.jobs.Sync</code> to reload. Parameterize the connection ID and the full-vs-incremental mode as typed flow inputs so the nightly incremental and the on-demand backfill share one flow, and wrap it in a Kestra App so non-engineers can trigger a backfill from a form."
  - question: "Can one flow run many connector syncs at once?"
    answer: "Yes. A <code>ForEach</code> with a <code>concurrencyLimit</code> caps how many syncs run in parallel. <code>allowFailure</code> on the inner <code>Sync</code> isolates a single failing connector so the rest complete, and a targeted <a href='/orchestration/slack'>Slack</a> alert routes to the owner of the broken connection rather than spamming the channel."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted keeps your pipeline execution and connector credentials inside your own network."

