faq:
  - question: "Does Kestra replace Argo CD?"
    answer: "No. Argo CD owns the Kubernetes reconciliation: the Application objects, the cluster state, the rollback target, and the GitOps source of truth. Kestra calls the Argo CD API through the io.kestra.plugin.argocd plugin to run apps.Sync and apps.Status as flow tasks. Argo CD stays where it is. Kestra orchestrates the workflow around it: when to sync, what to check first, who approves promotion to prod, and what runs after."
  - question: "How does Kestra trigger Argo CD?"
    answer: "Kestra fires argocd app sync from any event source: a webhook (GitHub Actions completion, registry image push), a cron schedule, an S3 file landing, a Kafka message, a Terraform apply finishing, or a manual trigger from the Kestra UI. The trigger payload passes through as flow inputs, so the sync hits the exact application and revision the upstream event specified. This replaces the reconcile lag from Argo CD's git polling interval with an immediate, event-driven sync."
  - question: "How does the approval gate work between staging and prod?"
    answer: "Kestra's Pause task suspends the flow after the staging sync confirms Synced and Healthy via apps.Status. The result is surfaced in the Kestra UI alongside the Argo CD revision and the smoke-test output. A named reviewer reads it and explicitly resumes. Only then does the prod apps.Sync fire with the same revision. The reviewer identity and timestamp are recorded automatically in the execution history."
  - question: "Can Kestra chain Terraform with Argo CD in a single flow?"
    answer: "Yes. terraform apply runs as the first task and publishes outputs (cluster endpoint, ingress IP, kubeconfig path). Those outputs flow forward into an Ansible step that configures the underlying nodes, then into the apps.Sync task that deploys the app. If Ansible fails, Kestra retries the Ansible step only. The Terraform apply does not re-run. The whole chain shares one execution ID. See <a href='/orchestration/terraform'>Terraform orchestration with Kestra</a> for the full pattern."
  - question: "How does Kestra authenticate to Argo CD?"
    answer: "Use an Argo CD API token, not a username and password. Create a token in Argo CD scoped to a service account with the minimum required privileges (typically applications, sync and applications, get). Store the token and the Argo CD server URL in Kestra's secrets backend and reference them via pluginDefaults on io.kestra.plugin.argocd at the namespace or flow level. Every Argo CD task picks them up without repeating credentials."
  - question: "Is the Argo CD plugin Enterprise-only?"
    answer: "No. The io.kestra.plugin.argocd plugin ships in the open-source edition with apps.Sync and apps.Status tasks. Kestra Enterprise adds Apps (typed self-service forms so non-engineers can trigger a deploy through a form), namespace-scoped RBAC, audit logs, worker isolation, and SSO. Platform teams running Argo CD across many app teams typically want these on top."
  - question: "Where does Kestra fit alongside Argo Workflows?"
    answer: "Argo Workflows is a workflow engine for Kubernetes (the other half of the Argo project). Kestra is a general-purpose orchestrator. The two solve different problems: Argo Workflows is great for Kubernetes-native batch jobs (ML training, data processing) where every step is a Pod. Kestra orchestrates across tools (Terraform, Ansible, Argo CD, dbt, Airbyte, ServiceNow), schedules with native event triggers, and gives you one execution history across the whole stack. Use both if you have Pod-native batch work alongside cross-tool orchestration."
  - question: "Can Kestra run in an air-gapped Kubernetes cluster alongside Argo CD?"
    answer: "Yes. Kestra ships self-hosted on Docker or Kubernetes (often itself deployed by Argo CD), runs fully air-gapped, and supports remote workers close to each cluster. The open-source edition includes unlimited workflows and event-driven triggers, with no external dependency on Kestra's infrastructure. See <a href='/infra-automation'>Kestra for infrastructure automation</a> for the broader picture across Argo CD, Terraform, Ansible, and Kubernetes."

