faq:
  - question: "What does Kestra add to SurrealDB?"
    answer: "SurrealDB handles storage, graph traversal, and SurrealQL. Kestra wraps it in observable, automated workflows: triggers <code>io.kestra.plugin.surrealdb.Query</code> on events or schedules, sequences multi-step SurrealQL operations with per-step retries, chains SurrealDB with HTTP fetches and downstream notifications, and logs every query run with its result and execution context."
  - question: "Can Kestra trigger a SurrealDB query on a webhook or file arrival?"
    answer: "Yes. Kestra has native triggers for webhooks, S3 and GCS file arrivals, schedules, and more. When the trigger fires, Kestra starts the flow and runs <code>surrealdb.Query</code> as the next step. The query receives trigger metadata as named variables, so a webhook payload can parameterize the SurrealQL at run time."
  - question: "How does Kestra handle multi-step SurrealQL workflows?"
    answer: "Each SurrealQL operation is a separate task in the flow, with its own retry policy, timeout, and output. A validation failure retries the validation step only, without re-running the upstream write. Task outputs flow forward by name, so the result of a SELECT is available to a subsequent UPDATE or notify step."
  - question: "Can Kestra load data from an HTTP API into SurrealDB automatically?"
    answer: "Yes. A flow can use <code>io.kestra.plugin.core.http.Request</code> to fetch the payload, process it, and pass the result to <code>surrealdb.Query</code> for the upsert. Each step retries independently, so a transient network error on the fetch retries the fetch without touching SurrealDB, and a failed upsert retries the upsert without re-fetching."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers fully self-hosted deployment on Docker or Kubernetes, a managed cloud version, and air-gapped options for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted keeps your pipeline execution and database credentials inside your own network."

