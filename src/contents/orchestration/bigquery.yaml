title: "Orchestrate BigQuery with Kestra: event-driven loads, partition-aware refreshes, and governed queries"
description: "Load BigQuery on GCS arrivals or Pub/Sub events, refresh only the partitions that changed, chain with dbt and ingestion, and trace every query across the data stack from one place."

tool:
  name: "BigQuery"
  pluginClass: "io.kestra.plugin.gcp.bigquery.Query"
  color: "#4285f4"

hero:
  title: "Run BigQuery jobs on the event that matters."
  description: "BigQuery runs the SQL and the warehouse. Kestra decides when each job fires, what feeds it, and how much it scans. Load on a GCS arrival, refresh only the changed partitions, chain with ingestion and dbt, and trace every query in one execution history."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "BigQuery Scheduled Queries fire SQL on a cron, but they do not load from object storage, chain to other tools, retry one step, or reprocess only the partitions that changed. Kestra runs above BigQuery: it loads the moment a file lands in GCS, reacts to Pub/Sub in real time, chains BigQuery with <a href='/orchestration/airbyte'>Airbyte</a> ingestion and <a href='/orchestration/dbt-core'>dbt</a> transforms, and refreshes only the changed date range so cost tracks the delta. A transient transform retry never re-runs the load."

pillars:
  title: "Above BigQuery Scheduled Queries."
  subtitle: "BigQuery runs the SQL, the storage, and the slots. Kestra runs the steps around the query: what triggers it, what feeds it, how much it scans, and where the cross-tool audit trail lives."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "Event-driven loads, not query cron"
      description: "Scheduled Queries fire on a fixed cadence whether the source is ready or not. Kestra triggers a BigQuery job the moment the upstream step confirms: <code>io.kestra.plugin.gcp.gcs.Trigger</code> on a new object, <code>pubsub.RealtimeTrigger</code> per message, or <code>bigquery.Trigger</code> when a sentinel query returns rows. The load runs on the event, not the next tick."
    - icon: "mdi:database-arrow-down"
      title: "Load, query, and extract orchestrated"
      description: "Kestra runs <code>bigquery.LoadFromGcs</code> to load objects, <code>bigquery.Query</code> to run SQL jobs, and <code>bigquery.ExtractToGcs</code> to export, as ordered steps with per-step retries. A failed query retries without re-loading the data, and outputs flow forward to whatever reads the table next."
    - icon: "mdi:table-clock"
      title: "Partition-aware incremental refreshes"
      description: "Reprocessing a whole table to update one day is slow and expensive. Kestra targets only the changed range: <code>bigquery.DeletePartitions</code> clears the affected dates, then <code>bigquery.LoadFromGcs</code> reloads just those partitions. Cost and runtime track the delta, and clearing before loading makes a rerun safe to repeat."
    - icon: "mdi:pipe-disconnected"
      title: "Full data stack around the warehouse"
      description: "BigQuery has no view of the <a href='/orchestration/airbyte'>Airbyte</a> sync that fed it or the <a href='/orchestration/dbt-core'>dbt</a> models downstream. Kestra runs ingestion, the load, the transform, and the <a href='/orchestration/hightouch'>Hightouch</a> activation as steps in one flow with job IDs flowing forward and one shared execution ID."
    - icon: "mdi:cash-multiple"
      title: "Cost guardrails before a query runs"
      description: "BigQuery bills by bytes scanned. A flow runs a dry-run query first, branches on the estimate with an <code>io.kestra.plugin.core.flow.If</code> task, and only runs the real job under a threshold. Pairing the dry-run guardrail with partition-aware loads keeps both bytes scanned and runtime tied to the actual delta."
    - icon: "mdi:account-cog-outline"
      title: "Self-service queries for analysts"
      description: "Analysts should not need console access to run a parameterized export. Kestra Apps wraps a <code>Query</code> flow in a typed form: pick the date range, run the query, get the result file. Every run lands in execution history with the requesting user, so self-service is still audited."

useCases:
  title: "How teams use BigQuery and Kestra"
  subtitle: "Patterns cloud data teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Event-driven"
      badgeIcon: "mdi:database-arrow-down"
      title: "Load BigQuery when a file lands in GCS"
      description: "The GCS <code>Trigger</code> fires on a new object, Kestra runs <code>LoadFromGcs</code> into BigQuery, then triggers <a href='/orchestration/dbt-core'>dbt</a> against the loaded table and confirms on <a href='/orchestration/slack'>Slack</a>. The load runs on arrival, not on a clock."
      flow:
        - node: "gcs trigger"
          label: "object lands"
          pluginClass: "io.kestra.plugin.gcp.gcs.Trigger"
        - node: "bigquery load"
          label: "LoadFromGcs"
          pluginClass: "io.kestra.plugin.gcp.bigquery.LoadFromGcs"
        - node: "dbt build"
          label: "transform"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "slack"
          label: "on complete"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Trigger on arrival"
          description: "<code>gcs.Trigger</code> fires on CREATE or UPDATE under a prefix."
        - title: "Load then transform"
          description: "dbt runs only after <code>LoadFromGcs</code> confirms the table is loaded."
        - title: "Move processed files"
          description: "The trigger can MOVE or DELETE objects so they do not re-fire."
          wide: true
    - badge: "Streaming"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Stream Pub/Sub events into BigQuery"
      description: "The <code>pubsub.RealtimeTrigger</code> starts one execution per message. Kestra routes by payload, runs a <code>bigquery.Query</code> insert, and acks the message. Use the batch <code>pubsub.Trigger</code> for grouped micro-batch inserts instead."
      flow:
        - node: "pubsub trigger"
          label: "per message"
          pluginClass: "io.kestra.plugin.gcp.pubsub.RealtimeTrigger"
        - node: "route"
          label: "by type"
          pluginClass: "io.kestra.plugin.core.flow.Switch"
        - node: "bigquery insert"
          label: "write row"
          pluginClass: "io.kestra.plugin.gcp.bigquery.Query"
        - node: "notify"
          label: "on event"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "One execution per message"
          description: "RealtimeTrigger fans each Pub/Sub message into its own run."
        - title: "Route by payload"
          description: "A <code>Switch</code> sends each message type down its own path."
        - title: "Batch mode available"
          description: "Swap to <code>pubsub.Trigger</code> for grouped micro-batch inserts."
          wide: true
    - badge: "Full stack"
      badgeIcon: "mdi:pipe-disconnected"
      title: "Ingest, load, transform, activate around BigQuery"
      description: "<a href='/orchestration/airbyte'>Airbyte</a> syncs into GCS, Kestra loads BigQuery, builds <a href='/orchestration/dbt-core'>dbt</a> models, then fires the <a href='/orchestration/hightouch'>Hightouch</a> activation. One flow, one execution ID, step-local retries across every service."
      flow:
        - node: "airbyte sync"
          label: "ingest to GCS"
          pluginClass: "io.kestra.plugin.airbyte.connections.Sync"
        - node: "bigquery load"
          label: "LoadFromGcs"
          pluginClass: "io.kestra.plugin.gcp.bigquery.LoadFromGcs"
        - node: "dbt build"
          label: "transform"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "hightouch sync"
          label: "activate"
          pluginClass: "io.kestra.plugin.hightouch.Sync"
      items:
        - title: "One execution ID across services"
          description: "GCS object, BigQuery job ID, and dbt results in one view."
        - title: "Step retries stay local"
          description: "A dbt retry never re-runs the load or the Airbyte sync."
        - title: "Outputs flow forward"
          description: "The load's destination table feeds the dbt and activation steps."
          wide: true
    - badge: "Incremental"
      badgeIcon: "mdi:table-clock"
      title: "Refresh only the partitions that changed"
      description: "A daily load should not rescan the whole table. Kestra runs <code>DeletePartitions</code> for the affected date range, then <code>LoadFromGcs</code> reloads just those partitions. Cost and runtime track the delta, not the table size."
      flow:
        - node: "schedule"
          label: "daily window"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "delete partitions"
          label: "clear range"
          pluginClass: "io.kestra.plugin.gcp.bigquery.DeletePartitions"
        - node: "load partitions"
          label: "reload range"
          pluginClass: "io.kestra.plugin.gcp.bigquery.LoadFromGcs"
        - node: "notify"
          label: "on complete"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Touch only the delta"
          description: "<code>DeletePartitions</code> plus <code>LoadFromGcs</code> reprocess just the changed dates."
        - title: "Cost tracks the change"
          description: "Runtime and bytes scanned scale with the delta, not the table."
        - title: "Idempotent reloads"
          description: "Clearing then loading the range makes a rerun safe to repeat."
          wide: true
    - badge: "Big data"
      badgeIcon: "mdi:cloud-sync-outline"
      title: "Extract to GCS and run a Dataproc Spark batch"
      description: "Kestra exports a BigQuery table to GCS with <code>ExtractToGcs</code>, submits a Spark batch to Dataproc Serverless, then loads the result back into BigQuery. The Spark job is one step in the flow, not a standalone island."
      flow:
        - node: "bigquery extract"
          label: "to GCS"
          pluginClass: "io.kestra.plugin.gcp.bigquery.ExtractToGcs"
        - node: "dataproc spark"
          label: "PySpark batch"
          pluginClass: "io.kestra.plugin.gcp.dataproc.batches.PySparkSubmit"
        - node: "bigquery load"
          label: "result back"
          pluginClass: "io.kestra.plugin.gcp.bigquery.LoadFromGcs"
        - node: "notify"
          label: "on complete"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Spark as a step"
          description: "<code>PySparkSubmit</code> runs on Dataproc Serverless inside the flow."
        - title: "Extract and reload"
          description: "BigQuery to GCS to Spark to BigQuery, all ordered."
        - title: "One history for the batch"
          description: "The extract, Spark job, and reload share one execution ID."
          wide: true

