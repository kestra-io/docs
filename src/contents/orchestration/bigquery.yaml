faq:
  - question: "What's the difference between BigQuery Scheduled Queries and Kestra?"
    answer: "Scheduled Queries run a SQL statement on a cron inside BigQuery. They cannot load from GCS, wait on an <a href='/orchestration/airbyte'>Airbyte</a> sync, retry one step, or chain to <a href='/orchestration/dbt-core'>dbt</a> and <a href='/orchestration/hightouch'>Hightouch</a>. Kestra runs above the warehouse: it triggers <code>io.kestra.plugin.gcp.bigquery.Query</code> and <code>LoadFromGcs</code> on real events, refreshes only changed partitions, and gives one execution history across every tool. Kestra works with BigQuery, not instead of it."
  - question: "Can Kestra load BigQuery when a file lands in GCS?"
    answer: "Yes. The <code>io.kestra.plugin.gcp.gcs.Trigger</code> polls a bucket prefix and fires on a new or updated object. The <code>bigquery.LoadFromGcs</code> task then loads it, and a <code>dbt</code> build can run against the loaded table immediately after. The trigger can MOVE or DELETE processed objects so the same file does not fire twice."
  - question: "How does Kestra avoid reprocessing a whole BigQuery table?"
    answer: "Target only the changed range. <code>io.kestra.plugin.gcp.bigquery.DeletePartitions</code> clears the affected date partitions, then <code>bigquery.LoadFromGcs</code> reloads just those partitions. Cost and runtime scale with the delta, not the table size, and because the range is cleared before it is loaded, a rerun is safe to repeat."
  - question: "Can Kestra control BigQuery query cost?"
    answer: "Yes. BigQuery bills by bytes scanned, so a flow runs a dry-run query first, branches on the estimate with an <code>If</code> task, and only runs the real job under a threshold. Pairing the dry-run guardrail with partition-aware loads keeps both the bytes scanned and the runtime tied to the actual delta."
  - question: "Can Kestra stream Pub/Sub events into BigQuery?"
    answer: "Yes. The <code>pubsub.RealtimeTrigger</code> starts one execution per message for low-latency inserts, or the batch <code>pubsub.Trigger</code> groups messages for micro-batch loads. A <code>bigquery.Query</code> insert (or a load for larger batches) writes the rows, and messages are acked on success."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. Unlike Cloud Composer, Kestra is not tied to GCP, so it can orchestrate BigQuery alongside <a href='/orchestration/aws'>AWS</a>, <a href='/orchestration/snowflake'>Snowflake</a>, and on-prem systems from one control plane."

