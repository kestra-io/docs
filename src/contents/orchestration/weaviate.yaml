title: "Orchestrate Weaviate with Kestra: scheduled ingestion, RAG pipelines, and vector database automation"
description: "Trigger document embedding and ingestion when new content arrives, chain embedding models with Weaviate writes, run scheduled batch upserts, and trace every step of the RAG pipeline in one execution history."

tool:
  name: "Weaviate"
  pluginClass: "io.kestra.plugin.weaviate.BatchCreate"
  color: "#00D2D2"

hero:
  title: "Keep Weaviate fed from automated, observable pipelines."
  description: "Weaviate stores and retrieves vectors for semantic search and RAG. Kestra orchestrates the pipelines that feed it: trigger embedding and ingestion when new content arrives, chain with the embedding model, and trace every step in one execution history."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Weaviate handles vector storage and semantic retrieval. Kestra orchestrates what feeds it and what queries it: triggers the embedding step when new documents arrive, runs <code>io.kestra.plugin.weaviate.BatchCreate</code> to insert objects after the embedding completes, chains <code>io.kestra.plugin.weaviate.Query</code> for downstream retrieval, and traces the full document-to-vector pipeline in one execution history with the source, embedding model, object count, and run timestamp."

pillars:
  title: "Above the Weaviate ingestion layer."
  subtitle: "Weaviate handles vector indexing, semantic retrieval, and schema management. Kestra handles when ingestion runs, what generates the embeddings, who approves schema changes, and where the full pipeline audit trail lives."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "Event-driven ingestion, not polling"
      description: "New documents should be in the vector store as soon as they arrive, not at the next cron tick. Kestra triggers the embedding and ingestion pipeline the moment a file lands in S3 or GCS, or when a webhook fires. <code>io.kestra.plugin.weaviate.BatchCreate</code> runs only after the embedding step confirms success."
    - icon: "mdi:vector-line"
      title: "Embedding model chained before the write"
      description: "Writing to Weaviate requires vectors. Kestra chains the embedding step immediately before the write: <code>io.kestra.plugin.huggingface.Inference</code> or <code>io.kestra.plugin.openai.ChatCompletion</code> generates the vectors, then <code>BatchCreate</code> writes them. A Weaviate write failure retries the write without re-running the embedding."
    - icon: "mdi:database-import-outline"
      title: "Scheduled batch upsert pipelines"
      description: "Keeping a Weaviate instance current often means periodic batch updates from a content system, a database, or a data lake. Kestra runs a scheduled fetch, embedding, and upsert as ordered steps. An upsert failure retries the upsert only, and every batch run is timestamped with its object count in the execution log."
    - icon: "mdi:schema"
      title: "Schema initialization in deployment flows"
      description: "Weaviate schemas must exist before data can be written. Kestra can run <code>io.kestra.plugin.weaviate.SchemaCreate</code> as part of a deployment or environment setup flow, confirming schema creation before ingestion tasks run downstream. No manual console steps in the provisioning process."
    - icon: "mdi:magnify"
      title: "RAG query as a pipeline step"
      description: "Retrieval-augmented generation pipelines query Weaviate and feed the result to an LLM. Kestra runs <code>io.kestra.plugin.weaviate.Query</code> as a task, passes the retrieved context to the LLM completion step, and logs the query, the retrieved objects, and the model response together in one execution record."
    - icon: "mdi:eye-outline"
      title: "Full ingestion pipeline visibility"
      description: "When semantic search results look stale, the question is whether the latest documents were ingested, which embedding model ran, and how many objects were written. Kestra logs every step of the ingestion pipeline in one execution record, so debugging does not require checking three separate systems."

useCases:
  title: "How teams use Weaviate and Kestra"
  subtitle: "Patterns AI engineering teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Event-driven ingestion"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Embed and ingest documents on file arrival"
      description: "A new document lands in S3. Kestra fires immediately, runs the Hugging Face embedding model, and writes the vectors to Weaviate. A failed Weaviate write retries without re-running the embedding step."
      flow:
        - node: "s3 trigger"
          label: "doc arrives"
          pluginClass: "io.kestra.plugin.aws.s3.Trigger"
        - node: "embed doc"
          label: "generate vectors"
          pluginClass: "io.kestra.plugin.huggingface.Inference"
        - node: "weaviate write"
          label: "batch upsert"
          pluginClass: "io.kestra.plugin.weaviate.BatchCreate"
        - node: "slack"
          label: "confirm ingestion"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "No cron lag"
          description: "Ingestion fires the moment the file appears, not at the next interval."
        - title: "Write retries in isolation"
          description: "A Weaviate failure retries the write without re-running the embedding."
        - title: "Object count logged"
          description: "The number of objects written lands in the execution output."
          wide: true
    - badge: "Scheduled batch"
      badgeIcon: "mdi:clock-outline"
      title: "Periodic batch upsert from a content source"
      description: "A nightly schedule fetches new or updated content, runs the embedding model across the batch, and upserts into Weaviate. Failed items retry at the item level, and the run is logged with total object count and embedding model name."
      flow:
        - node: "schedule"
          label: "nightly trigger"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "fetch content"
          label: "pull new records"
          pluginClass: "io.kestra.plugin.core.http.Request"
        - node: "embed batch"
          label: "generate vectors"
          pluginClass: "io.kestra.plugin.huggingface.Inference"
        - node: "weaviate upsert"
          label: "batch write"
          pluginClass: "io.kestra.plugin.weaviate.BatchCreate"
      items:
        - title: "Embedding before write"
          description: "The embedding step confirms before <code>BatchCreate</code> runs."
        - title: "Upsert retries locally"
          description: "A write failure retries the upsert without re-fetching or re-embedding."
        - title: "Object count in execution log"
          description: "How many objects were written is visible in the execution output."
          wide: true
    - badge: "RAG pipeline"
      badgeIcon: "mdi:magnify"
      title: "Ingest documents and serve RAG queries"
      description: "Documents are ingested into Weaviate on arrival. On demand, Kestra runs a RAG query: <code>weaviate.Query</code> retrieves relevant objects, then passes the context to a LangChain4J or OpenAI completion step. The query, retrieved context, and model response are logged together."
      flow:
        - node: "webhook"
          label: "query request"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "weaviate query"
          label: "semantic retrieval"
          pluginClass: "io.kestra.plugin.weaviate.Query"
        - node: "llm completion"
          label: "generate answer"
          pluginClass: "io.kestra.plugin.langchain4j.rag.ChatCompletion"
        - node: "return result"
          label: "HTTP response"
          pluginClass: "io.kestra.plugin.core.http.Request"
      items:
        - title: "Retrieved context logged"
          description: "The objects returned by Weaviate land in the execution output."
        - title: "Model response traced"
          description: "Prompt, retrieved context, and model response are in one record."
        - title: "Retry LLM in isolation"
          description: "A rate limit error retries the completion without re-querying Weaviate."
          wide: true
    - badge: "Schema setup"
      badgeIcon: "mdi:database-cog-outline"
      title: "Initialize Weaviate schema as part of deployment"
      description: "A deployment flow creates the Weaviate schema with <code>SchemaCreate</code> before any ingestion tasks run. Schema creation is confirmed before the next step runs, and the whole setup is repeatable across environments."
      flow:
        - node: "deploy trigger"
          label: "environment setup"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "schema create"
          label: "initialize schema"
          pluginClass: "io.kestra.plugin.weaviate.SchemaCreate"
        - node: "seed data"
          label: "initial batch"
          pluginClass: "io.kestra.plugin.weaviate.BatchCreate"
        - node: "notify"
          label: "confirm setup"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Schema first, data second"
          description: "Seeding only runs after <code>SchemaCreate</code> confirms success."
        - title: "Auditable setup"
          description: "Who triggered the deployment and when is in the execution record."
        - title: "Repeatable across environments"
          description: "The same flow runs in dev and prod with different input parameters."
          wide: true

