faq:
  - question: "What does Kestra add to a Weaviate ingestion workflow?"
    answer: "Weaviate handles vector storage and semantic retrieval. Kestra wraps the ingestion pipeline in an observable, automated flow: triggers on file arrivals or schedules, chains the embedding step immediately before <code>io.kestra.plugin.weaviate.BatchCreate</code>, retries write failures without re-running the embedding, and logs every step with the object count, embedding model, and run timestamp."
  - question: "Can Kestra trigger Weaviate ingestion when a file lands in S3 or GCS?"
    answer: "Yes. The <code>io.kestra.plugin.aws.s3.Trigger</code> or <code>io.kestra.plugin.gcp.gcs.Trigger</code> watches a bucket prefix and starts the flow the moment a matching file appears. The file path is available as a named variable in the embedding and ingestion tasks."
  - question: "How does Kestra chain an embedding model with a Weaviate write?"
    answer: "They are separate tasks in the same flow. The embedding task runs first and its output flows forward by name to the <code>io.kestra.plugin.weaviate.BatchCreate</code> task. If the Weaviate write fails, Kestra retries the write step only, without re-running the embedding step. This saves embedding API cost on transient write errors."
  - question: "Can Kestra initialize a Weaviate schema as part of a deployment flow?"
    answer: "Yes. <code>io.kestra.plugin.weaviate.SchemaCreate</code> runs as an ordered task in a deployment or environment setup flow. The next task only runs after schema creation confirms success. The same flow can be parameterized to work across dev and prod with different Weaviate cluster URLs."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers fully self-hosted deployment on Docker or Kubernetes, a managed cloud version, and air-gapped options for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted keeps your pipeline execution and Weaviate API keys inside your own network."

