faq:
  - question: "What does Kestra add to a LangChain application?"
    answer: "LangChain defines the chain logic, prompts, and retrievers. Kestra wraps those chains in observable, automated workflows: triggers on schedules or events, retries LLM calls at the task level without re-running data prep, pauses for human approval before publishing, and logs every prompt, model, and output in one searchable execution record."
  - question: "Does Kestra have a native LangChain plugin?"
    answer: "Kestra has a native <code>langchain4j</code> plugin that covers text completion, RAG document ingestion, and RAG chat completion. For teams using the Python LangChain library directly, Kestra runs it via <code>io.kestra.plugin.scripts.python.Script</code> in an isolated container with full execution logging."
  - question: "How does Kestra handle LLM rate limit retries?"
    answer: "Each task in Kestra has its own retry configuration. Set a retry count and backoff on the <code>TextCompletion</code> or Python script task. If the LLM call hits a rate limit, Kestra retries that task only. The data preparation step that ran before it is not re-executed, so retries are fast and do not waste compute."
  - question: "Can Kestra pause a flow for a human to review AI output before publishing?"
    answer: "Yes. The <code>io.kestra.plugin.core.flow.Pause</code> task halts execution and surfaces the current state in the Kestra UI. A reviewer can inspect the LLM output, approve or reject it from the UI, and the flow continues or branches accordingly. Who approved and when is recorded in the execution history."
  - question: "Can Kestra trigger a RAG ingestion pipeline when a new document arrives?"
    answer: "Yes. An S3 or GCS trigger fires the flow the moment a matching file lands in the bucket. The file path from the trigger is available as a named variable in the <code>langchain4j.rag.IngestDocument</code> task, so the embedding and indexing step runs immediately without a polling interval."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers fully self-hosted deployment on Docker or Kubernetes, a managed cloud version, and air-gapped options for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted keeps your pipeline execution, prompts, and model credentials inside your own network."

