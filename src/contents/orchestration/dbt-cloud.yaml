title: "Orchestrate dbt Cloud with Kestra: event-driven triggers, full-pipeline coordination, and cross-stack visibility"
description: "Trigger dbt Cloud jobs when Fivetran finishes, chain with downstream activation, add approval gates, and track every run across your data stack in one place."

tool:
  name: "dbt Cloud"
  pluginClass: "io.kestra.plugin.dbt.cloud.TriggerRun"
  color: "#FF694A"

hero:
  title: "Your dbt Cloud jobs, fully orchestrated."
  description: "Trigger dbt Cloud jobs from Fivetran completions, S3 events, or Kafka messages. Coordinate Hightouch syncs after each job, replay any step from history, and span Airbyte, dbt Cloud, and Hightouch in one execution view."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

pillars:
  title: "Above the dbt Cloud job runner."
  subtitle: "dbt Cloud solves transformation scheduling inside the dbt layer. Kestra solves what surrounds it: when jobs trigger, what runs after them, and where the audit trail lives."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "Event-driven triggers instead of cron-only scheduling"
      description: "dbt Cloud fires on a cron schedule or a Git event. If your Fivetran sync runs long, dbt starts building on stale data. Kestra triggers the dbt Cloud job the moment the upstream step confirms completion — whether that's a Fivetran sync, a file arrival in S3, or a webhook from any API — and halts the downstream activation layer until dbt confirms success."
    - icon: "mdi:pipe-disconnected"
      title: "Full-pipeline coordination with step-level retries"
      description: "dbt Cloud's lineage stops at the dbt boundary. It has no visibility into the Fivetran connector feeding it or the Hightouch sync consuming the output. Kestra runs all three as steps in a single flow. If dbt fails, Kestra retries only the dbt step — Fivetran does not re-sync. Outputs flow forward between steps, and the entire pipeline shares one execution ID."
    - icon: "mdi:eye-outline"
      title: "Cross-stack execution history with attribution"
      description: "Something breaks in the activation layer. You need to know whether dbt completed cleanly, which run produced the data, and who triggered it. dbt Cloud's history covers the dbt job. It has no record of the Fivetran sync that preceded it or the Hightouch sync that followed. Kestra logs every step across every tool with a trigger source, a timestamp, and a direct link to the failing task."

useCases:
  title: "How teams use dbt Cloud and Kestra"
  subtitle: "Patterns data engineering teams run in production. Pick one, copy the YAML, ship it through CI."
  items:
    - badge: "Full pipeline"
      badgeIcon: "mdi:pipe-disconnected"
      title: "Ingestion-to-activation pipeline"
      description: "Fivetran syncs raw data, then Kestra triggers the dbt Cloud job and waits for it to confirm success, then fires the Hightouch sync. All three run as sequential steps in a single Kestra flow. If dbt fails, Kestra retries it without re-running the Fivetran sync."
      flow:
        - node: "trigger"
          label: "on schedule or event"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "fivetran sync"
          label: "ingest raw"
          pluginClass: "io.kestra.plugin.fivetran.connectors.Sync"
        - node: "dbt Cloud job"
          label: "transform"
          pluginClass: "io.kestra.plugin.dbt.cloud.TriggerRun"
        - node: "hightouch sync"
          label: "activate"
          pluginClass: "io.kestra.plugin.core.http.Request"
        - node: "notify"
          label: "Slack on complete"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Step-level retries"
          description: "Retry only the failed step. Fivetran does not re-sync on a dbt failure."
        - title: "Outputs flow forward"
          description: "Pass artifacts and run IDs between Fivetran, dbt Cloud, and Hightouch."
        - title: "One execution ID across all tools"
          description: "Single place to debug the full pipeline, not three separate dashboards."
          wide: true
    - badge: "Event-driven"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Trigger dbt Cloud when Fivetran finishes"
      description: "Replace the cron schedule that fires whether source data is ready or not. Kestra listens for the Fivetran sync completion event and triggers the dbt Cloud job the moment ingestion confirms success. No polling, no builds starting before the source data is confirmed ready."
      flow:
        - node: "fivetran sync"
          label: "sync complete"
          pluginClass: "io.kestra.plugin.fivetran.connectors.Sync"
        - node: "dbt Cloud job"
          label: "trigger + wait"
          pluginClass: "io.kestra.plugin.dbt.cloud.TriggerRun"
        - node: "check result"
          label: "job status"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "notify"
          label: "Slack on failure"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Push-based, not polling"
          description: "dbt Cloud fires when the data is actually ready, not on the next interval."
        - title: "Webhook and API triggers"
          description: "Fire from any HTTP call, Kafka message, S3 event, or database change."
        - title: "No overlap between runs"
          description: "Kestra waits for each step to confirm before starting the next."
          wide: true
    - badge: "Governance"
      badgeIcon: "mdi:shield-check-outline"
      title: "Approval gate before promoting to production"
      description: "Run the dbt Cloud job against the staging environment. Pause the flow on the output. A named reviewer reads the result in the Kestra UI and resumes the flow. Only then does the production job trigger. The reviewer's identity and timestamp are logged automatically in the execution history."
      flow:
        - node: "dbt Cloud (staging)"
          label: "staging environment"
          pluginClass: "io.kestra.plugin.dbt.cloud.TriggerRun"
        - node: "pause / review"
          label: "human approves"
          gate: true
          pluginClass: "io.kestra.plugin.core.flow.Pause"
        - node: "dbt Cloud (prod)"
          label: "production environment"
          pluginClass: "io.kestra.plugin.dbt.cloud.TriggerRun"
        - node: "audit log"
          label: "who + when"
          pluginClass: "io.kestra.plugin.core.log.Log"
      items:
        - title: "Native pause + resume"
          description: "Built-in Pause task suspends execution until a reviewer approves."
        - title: "Reviewer + timestamp logged"
          description: "Identity and approval moment stored in execution history automatically."
        - title: "Separate jobs per environment"
          description: "Trigger different dbt Cloud job IDs for staging and production in the same flow."
        - title: "Full audit trail"
          description: "Every production promotion is linked to a reviewer and a moment in time."
    - badge: "Multi-env"
      badgeIcon: "mdi:source-branch"
      title: "Chained dbt Cloud jobs with dependency ordering"
      description: "Some pipelines require multiple dbt Cloud jobs in a specific sequence — ingestion models first, then downstream marts, then final activation models. Kestra runs each job in order, waits for confirmation, and passes the run ID forward. If job 2 fails, job 3 does not start. A single Slack alert links directly to the failed step."
      flow:
        - node: "dbt job 1"
          label: "ingestion models"
          pluginClass: "io.kestra.plugin.dbt.cloud.TriggerRun"
        - node: "dbt job 2"
          label: "mart models"
          pluginClass: "io.kestra.plugin.dbt.cloud.TriggerRun"
        - node: "dbt job 3"
          label: "activation models"
          pluginClass: "io.kestra.plugin.dbt.cloud.TriggerRun"
        - node: "notify"
          label: "on complete or fail"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Ordered job execution"
          description: "Each dbt Cloud job runs only after the previous confirms success."
        - title: "Run ID passed forward"
          description: "Reference the upstream job's run ID in downstream steps for traceability."
        - title: "Single alert on failure"
          description: "One Slack message with a link to the exact job that failed."
          wide: true
    - badge: "Operations"
      badgeIcon: "mdi:tune-vertical"
      title: "Parameterized job runs with flow inputs"
      description: "Trigger different dbt Cloud jobs from the same Kestra flow by passing the job ID and custom environment variables as flow inputs at run time. One flow definition covers both the nightly full build job and the on-demand incremental job — the trigger or input determines which job fires, no duplicate flow definitions required."
      flow:
        - node: "trigger"
          label: "on event or input"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "dbt Cloud job"
          label: "job ID from input"
          pluginClass: "io.kestra.plugin.dbt.cloud.TriggerRun"
        - node: "notify"
          label: "on complete"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Flow inputs"
          description: "Pass job IDs, environment names, and custom fields as typed inputs."
        - title: "Same flow, multiple triggers"
          description: "Nightly full builds and on-demand refreshes share one YAML."
        - title: "Kestra Apps for self-service"
          description: "Non-engineers trigger specific jobs through a form without touching YAML."
          wide: true

