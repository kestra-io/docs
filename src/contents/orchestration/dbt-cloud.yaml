faq:
  - question: "What's the difference between dbt Cloud's native scheduler and Kestra?"
    answer: "dbt Cloud's scheduler runs dbt jobs on a cron schedule or Git event, handles CI on pull requests, and hosts the dbt IDE. It was designed for dbt-specific workflows. Kestra sits above that and handles everything the dbt Cloud scheduler can't: triggering dbt Cloud jobs when Fivetran finishes, chaining downstream activation steps, adding approval gates between staging and production, and giving you a unified execution history across every tool in the stack. Kestra works with dbt Cloud, not instead of it."
  - question: "What does Kestra add to a dbt Cloud setup?"
    answer: "When your pipeline also involves Fivetran, Hightouch, or any other tool, dbt Cloud has no mechanism to coordinate those steps — the scheduler was built for dbt workflows. Kestra wraps the entire pipeline: it triggers the dbt Cloud job when the upstream sync completes, waits for dbt to confirm success, then fires the downstream activation layer. Every step shares one execution ID and one place to debug."
  - question: "Can Kestra trigger a dbt Cloud job when Fivetran finishes?"
    answer: "Kestra's Fivetran plugin runs a connector sync and waits for completion before the next task starts. The dbt Cloud task then triggers and waits for the dbt job to confirm success. This replaces the cron schedule that fires whether or not source data is ready, so dbt never builds on stale inputs."
  - question: "How does the approval gate work before a production dbt Cloud job?"
    answer: "Kestra's Pause task suspends the flow after the staging job completes. The result is surfaced in the Kestra UI. A named reviewer reads it and explicitly resumes the flow. Only then does the production job trigger. The reviewer identity and timestamp are logged automatically in the execution history. This works across any two dbt Cloud job IDs — staging and production are both passed as flow inputs."
  - question: "Can Kestra chain multiple dbt Cloud jobs in dependency order?"
    answer: "Each dbt Cloud job runs as a separate task inside a single Kestra flow. Kestra waits for each job to confirm success before starting the next. If job 2 fails, job 3 does not start, and Kestra posts a Slack alert with the run ID of the failing job and a link to the execution. The run IDs flow forward between tasks for traceability."
  - question: "Does Kestra replace dbt Cloud, or does it work alongside it?"
    answer: "Kestra works alongside dbt Cloud. dbt Cloud keeps running your transformations and managing the dbt IDE, lineage, and CI. Kestra handles the orchestration layer above it: scheduling based on upstream events, chaining with other tools, approval gates, and cross-stack visibility. Teams that want to move from dbt Cloud to dbt Core can also use Kestra — the <code>DbtCLI</code> task runs dbt Core commands directly without needing the dbt Cloud API."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted gives complete control over where your pipeline execution and credentials live, with no external dependency on Kestra's infrastructure."

