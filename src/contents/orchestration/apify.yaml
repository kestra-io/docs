faq:
  - question: "How do Apify and Kestra work together?"
    answer: "Apify runs the actor: the scraper, the proxies, the anti-blocking, and the dataset. Kestra orchestrates everything around it. <code>io.kestra.plugin.apify.actor.Run</code> waits for the run, <code>dataset.Get</code> pulls the items, and the same flow loads them into <a href='/orchestration/bigquery'>BigQuery</a> or <a href='/orchestration/snowflake'>Snowflake</a>, transforms them with <a href='/orchestration/dbt-core'>dbt</a>, or embeds them for RAG, with cost caps and a quality gate around it. The two are complementary: Apify gets the data, Kestra makes it flow through your stack."
  - question: "Can Kestra trigger downstream work the moment an actor finishes?"
    answer: "Yes. <code>actor.Run</code> blocks until the run reaches a terminal status, then exposes <code>defaultDatasetId</code>, <code>status</code>, and <code>usageTotalUsd</code> as outputs. The next task starts only after the run confirms, so there is no webhook receiver to build and no gap between the scrape and the load. <code>dataset.Get</code> then polls the items API with backoff in case the actor is still writing."
  - question: "How do I stop an Apify actor from running up a bill?"
    answer: "Set <code>maxItems</code> and <code>maxTotalChargeUsd</code> on the <code>Run</code> task to cap pay-per-result and total spend, plus <code>memory</code> and <code>requestTimeout</code> for the run envelope. The run returns <code>usageTotalUsd</code>, so an automated <code>io.kestra.plugin.core.flow.If</code> can branch on the real cost or item count and halt the pipeline before any downstream task processes the data."
  - question: "Can Kestra load scraped data straight into a warehouse?"
    answer: "Yes. After <code>dataset.Get</code>, write the items to internal storage, reshape them, and load with a native task: <code>io.kestra.plugin.jdbc.postgresql.CopyIn</code> for Postgres, or the BigQuery and Snowflake equivalents. Chain a <a href='/orchestration/dbt-core'>dbt</a> build afterward and the whole scrape-to-model pipeline runs as one execution with per-step retries."
  - question: "Does Apify data work for RAG and AI pipelines?"
    answer: "It is one of the most common Apify patterns. The Website Content Crawler returns clean Markdown, which Kestra chunks and embeds with <code>io.kestra.plugin.ai.rag.IngestDocument</code> into a KV store, Pinecone, Qdrant, or PGVector. Running it on a schedule with <code>drop: true</code> keeps the index fresh, so an <code>AIAgent</code> always answers from the latest crawl."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted gives complete control over where your scraped data and Apify token live, which matters when the data is sensitive."

