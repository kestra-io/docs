title: "Orchestrate Apify with Kestra: scheduled web scraping into your warehouse, vector store, and CRM"
description: "Run Apify actors on a schedule, wait for the dataset, enforce cost and quality guardrails, and chain scrapes into Postgres, BigQuery, RAG vector stores, and HubSpot from one flow."

tool:
  name: "Apify"
  pluginClass: "io.kestra.plugin.apify.actor.Run"
  color: "#20A34E"

hero:
  title: "Turn Apify scrapes into pipelines, not just datasets."
  description: "Apify runs the actor and drops the result in a dataset. Then what? Kestra waits for the run to finish, pulls the items, checks them, and loads them into your warehouse, vector store, or CRM. Cost caps and an automated quality gate stop a runaway crawl or a broken selector before it costs you money or ships bad data."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Apify runs the actor and lands the result in a dataset; Kestra turns that into a finished pipeline. <code>io.kestra.plugin.apify.actor.Run</code> waits for the run, surfaces the dataset ID and cost, and <code>dataset.Get</code> reads the items straight into the next task. From there one flow loads them into <a href='/orchestration/bigquery'>BigQuery</a> or <a href='/orchestration/snowflake'>Snowflake</a>, transforms them with <a href='/orchestration/dbt-core'>dbt</a>, embeds them into a vector store for RAG, or pushes them to a CRM, with cost caps and a quality gate so a runaway crawl or a broken selector never reaches production."

pillars:
  title: "Everything around the Apify scrape."
  subtitle: "Apify runs the actor, the proxies, and the Store. Kestra runs the steps around the scrape: what waits for it, what validates it, what it feeds, and where the audit trail lives."
  items:
    - icon: "mdi:timer-sync-outline"
      title: "Wait for the actor, then act on the data"
      description: "When an Apify run finishes, the data is sitting in a dataset and the next move is yours: fetch it, validate it, route it onward. Kestra's <code>actor.Run</code> blocks until the run finishes, then exposes <code>defaultDatasetId</code>, <code>status</code>, and <code>usageTotalUsd</code> as outputs. <code>dataset.Get</code> reads the items into the next task, so there is no receiver to host and no polling script to maintain."
    - icon: "mdi:cash-multiple"
      title: "Cost caps enforced at the source"
      description: "Apify actors bill per compute unit or per result, so a misconfigured crawl is a real bill. The <code>Run</code> task sets <code>maxItems</code>, <code>maxTotalChargeUsd</code>, <code>memory</code>, and <code>requestTimeout</code> as native run caps, and the run returns <code>usageTotalUsd</code>. An automated <code>If</code> can branch on actual cost or item count and halt the pipeline before you pay to process garbage, with no human in the loop."
    - icon: "mdi:pipe"
      title: "Scrape to warehouse, vector store, or CRM in one flow"
      description: "Apify stops at the dataset. Kestra chains the scrape to a <a href='/orchestration/dbt-core'>dbt</a> transform and a <a href='/orchestration/bigquery'>BigQuery</a>, <a href='/orchestration/snowflake'>Snowflake</a>, or Postgres load, to embeddings for a vector store, or to a HubSpot upsert. Step retries stay local: a load retry never re-runs the scrape, and the actor run ID flows forward into every downstream task for traceability."
    - icon: "mdi:filter-check-outline"
      title: "Quality gate before bad scrapes ship"
      description: "Scrapers degrade silently when a site changes its markup: empty datasets, half-null rows, a selector that stopped matching, and the run still reports success. Kestra runs an automated check on the item count and null ratio with <code>io.kestra.plugin.core.flow.If</code> and halts before the data reaches a warehouse or a CRM, paging the owner instead of poisoning a table downstream."
    - icon: "mdi:source-branch"
      title: "Parallel fan-out with per-target isolation"
      description: "Scraping fifty competitor URLs or fifty search terms in a single actor run gives you one blob and one failure mode. Kestra's <code>ForEach</code> runs many <code>Run</code> calls concurrently with a <code>concurrencyLimit</code>, and <code>allowFailure</code> isolates a blocked target so a single 403 or CAPTCHA wall does not sink the batch. Each target's items land tagged with their source."
    - icon: "mdi:account-cog-outline"
      title: "Self-service scrapes for non-engineers"
      description: "Growth, research, and sales teams should not file a ticket to run a one-off scrape. Kestra Apps wraps a scrape flow in a typed form: enter a URL or a search term, run the actor, get the dataset. Every run lands in execution history with the requester's identity, so self-service does not mean unaudited."

useCases:
  title: "How teams use Apify and Kestra"
  subtitle: "Patterns data and AI teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Scrape to warehouse"
      badgeIcon: "mdi:database-import-outline"
      title: "Land a scheduled scrape in the warehouse"
      description: "A daily actor scrapes places, listings, or prices, and Kestra lands the rows in <a href='/orchestration/bigquery'>BigQuery</a>, <a href='/orchestration/snowflake'>Snowflake</a>, or Postgres. <code>Run</code> caps the cost, <code>dataset.Get</code> pulls the items, a reshape step types the columns, and a load retry never re-runs the scrape."
      flow:
        - node: "schedule"
          label: "daily trigger"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "apify run"
          label: "scrape"
          pluginClass: "io.kestra.plugin.apify.actor.Run"
        - node: "dataset get"
          label: "fetch items"
          pluginClass: "io.kestra.plugin.apify.dataset.Get"
        - node: "postgres load"
          label: "CopyIn"
          pluginClass: "io.kestra.plugin.jdbc.postgresql.CopyIn"
        - node: "slack"
          label: "row count"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Run caps stop runaway cost"
          description: "<code>maxItems</code> and <code>maxTotalChargeUsd</code> bound the bill before the crawl starts."
        - title: "Load retries stay local"
          description: "A Postgres or warehouse retry never re-triggers the Apify actor."
        - title: "Swap the destination by task"
          description: "Point the same flow at BigQuery, Snowflake, or DuckDB by changing the load task."
          wide: true
    - badge: "Data for AI"
      badgeIcon: "mdi:brain"
      title: "Keep a RAG index fresh from the live web"
      description: "Apify's Website Content Crawler returns clean, boilerplate-free text, the ideal input for retrieval. Kestra crawls on a schedule, embeds it into a vector store with <code>IngestDocument</code>, and drops the previous index so answers never go stale. An <code>AIAgent</code> step then answers grounded questions from the fresh crawl."
      flow:
        - node: "schedule"
          label: "nightly trigger"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "apify crawl"
          label: "clean text"
          pluginClass: "io.kestra.plugin.apify.actor.Run"
        - node: "dataset get"
          label: "fetch text"
          pluginClass: "io.kestra.plugin.apify.dataset.Get"
        - node: "embed"
          label: "vector store"
          pluginClass: "io.kestra.plugin.ai.rag.IngestDocument"
        - node: "discord"
          label: "index refreshed"
          pluginClass: "io.kestra.plugin.discord.DiscordIncomingWebhook"
      items:
        - title: "Clean text in, good chunks out"
          description: "The crawler strips navs and footers so embeddings index content, not boilerplate."
        - title: "Drop and refresh on schedule"
          description: "<code>drop: true</code> rebuilds the index each run so retrieval reflects the latest crawl."
        - title: "KV store now, Pinecone later"
          description: "Start on the built-in KV store, then switch to Pinecone, Qdrant, or PGVector for scale."
          wide: true
    - badge: "Guardrail"
      badgeIcon: "mdi:shield-check-outline"
      title: "Halt and page when a scrape degrades"
      description: "Scrapes break quietly when a site ships new markup. Kestra runs the actor under hard cost caps, then an automated <code>If</code> checks the item count. A healthy count promotes the data; a count below the threshold pages the on-call via <a href='/orchestration/slack'>Slack</a> or PagerDuty, so a broken selector never poisons a table."
      flow:
        - node: "apify run"
          label: "caps on"
          pluginClass: "io.kestra.plugin.apify.actor.Run"
        - node: "dataset get"
          label: "fetch items"
          pluginClass: "io.kestra.plugin.apify.dataset.Get"
        - node: "quality gate"
          label: "item count check"
          gate: true
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "pagerduty"
          label: "page on degrade"
          pluginClass: "io.kestra.plugin.pagerduty.PagerDutyAlert"
      items:
        - title: "Automated gate, no human wait"
          description: "<code>If</code> branches on item count or null ratio; nobody has to watch a dashboard."
        - title: "Cost bounded at the source"
          description: "<code>maxTotalChargeUsd</code> caps spend even when a crawl misbehaves."
        - title: "Page on degradation, not just failure"
          description: "An empty-but-successful run still alerts, because empty data is the real risk."
          wide: true
    - badge: "Fan-out"
      badgeIcon: "mdi:source-branch"
      title: "Scrape many targets in parallel, isolate failures"
      description: "Competitive monitoring means scraping dozens of sites or search terms on one schedule. Kestra's <code>ForEach</code> runs the actor across every target with a bounded <code>concurrencyLimit</code>, and <code>allowFailure</code> keeps one blocked target from sinking the batch. Only changed targets trigger an alert."
      flow:
        - node: "schedule"
          label: "trigger"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "for each target"
          label: "fan out"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "apify run"
          label: "per target"
          pluginClass: "io.kestra.plugin.apify.actor.Run"
        - node: "compare"
          label: "changed?"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "slack"
          label: "on change"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Bounded concurrency"
          description: "<code>concurrencyLimit</code> respects Apify and target rate limits while still running in parallel."
        - title: "One failure is contained"
          description: "<code>allowFailure</code> per target means a 403 on one site does not fail the run."
        - title: "Alert only on change"
          description: "An <code>If</code> compares against the last run and notifies only when something moved."
          wide: true
    - badge: "Lead gen"
      badgeIcon: "mdi:account-search-outline"
      title: "Turn scraped leads into CRM records"
      description: "The fastest payback for scraping is lead generation. Kestra runs a Google Maps or contact-details actor, dedups and validates the rows, then upserts them into HubSpot with <code>io.kestra.plugin.hubspot.contacts.Create</code>. <a href='/orchestration/slack'>Slack</a> posts the count of new contacts so sales sees the pipeline fill in real time."
      flow:
        - node: "schedule"
          label: "trigger"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "apify run"
          label: "scrape leads"
          pluginClass: "io.kestra.plugin.apify.actor.Run"
        - node: "dataset get"
          label: "fetch rows"
          pluginClass: "io.kestra.plugin.apify.dataset.Get"
        - node: "hubspot"
          label: "upsert contact"
          pluginClass: "io.kestra.plugin.hubspot.contacts.Create"
        - node: "slack"
          label: "new contacts"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Dedup before the CRM"
          description: "A transform step drops duplicates so HubSpot does not fill with repeats."
        - title: "Upsert, not just insert"
          description: "Search-then-update keeps existing contacts clean on re-runs."
        - title: "Sales sees the fill"
          description: "Slack posts the count of new and updated contacts after every run."
          wide: true

