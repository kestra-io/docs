blueprints:
  title: "Blueprints for Gemini orchestration."
  lead: "Production-ready flows. Copy the YAML, drop in your API key, ship it."
  items:
    - name: "Structured decision"
      blueprintId: "ai-check-weather-gemini"
      title: "Turn a natural-language question into a structured go/no-go decision"
      description: "<code>StructuredOutputCompletion</code> answers with a JSON schema instead of prose. An <code>If</code> task branches on the boolean field, then posts to <a href='/plugins/plugin-slack'>Slack</a> and blocks time on a Google Calendar when the answer says to act."
      href: "/blueprints"
    - name: "Multi-model routing"
      blueprintId: "ai-model-router"
      title: "Route each prompt to the best-fit model across four providers"
      description: "A cheap classifier tags every prompt, then a <code>Switch</code> sends reasoning prompts to Gemini, coding prompts to Claude, and search prompts to Perplexity, falling back to a cost-efficient default for everything else."
      href: "/blueprints"
    - name: "Multimodal extraction"
      blueprintPlaceholder: true
      title: "Extract structured expense data from receipt images"
      description: "Watches an S3 inbox for receipt photos, describes each one with <code>MultimodalCompletion</code>, reshapes the answer into typed JSON with a second <code>StructuredOutputCompletion</code> call, and posts the result to Google Chat."
      href: "/blueprints"
      plugins:
        - "io.kestra.plugin.aws.s3.Trigger"
        - "io.kestra.plugin.gemini.MultimodalCompletion"
        - "io.kestra.plugin.gemini.StructuredOutputCompletion"
        - "io.kestra.plugin.googleworkspace.chat.GoogleChatIncomingWebhook"
      code: |
        id: gemini-multimodal-receipt-extraction
        namespace: company.team

        tasks:
          - id: describe_receipt
            type: io.kestra.plugin.gemini.MultimodalCompletion
            apiKey: "{{ secret('GEMINI_API_KEY') }}"
            model: "gemini-2.5-flash"
            contents:
              - content: "List the vendor name, purchase date, currency, and total amount printed on this receipt as plain labeled text."
              - mimeType: "image/jpeg"
                content: "{{ trigger.objects | jq('.[0].uri') | first }}"

          - id: structure_fields
            type: io.kestra.plugin.gemini.StructuredOutputCompletion
            apiKey: "{{ secret('GEMINI_API_KEY') }}"
            model: "gemini-2.5-flash-lite"
            prompt: "Reformat this receipt description into the required fields. Description: {{ outputs.describe_receipt.text }}"
            jsonResponseSchema: |
              {
                "type": "object",
                "properties": {
                  "vendor": { "type": "string" },
                  "purchaseDate": { "type": "string" },
                  "currency": { "type": "string" },
                  "total": { "type": "number" }
                },
                "required": ["vendor", "purchaseDate", "total"]
              }

          - id: notify_finance
            type: io.kestra.plugin.googleworkspace.chat.GoogleChatIncomingWebhook
            url: "{{ secret('GOOGLE_CHAT_WEBHOOK') }}"
            payload: |
              { "text": "Receipt processed: {{ outputs.structure_fields.predictions | first }}" }

        triggers:
          - id: new_receipt
            type: io.kestra.plugin.aws.s3.Trigger
            bucket: "expense-receipts"
            prefix: "inbox/"
            interval: "PT5M"
            action: NONE
            disabled: true

