  title: "Kestra vs the orchestration alternatives Gemini teams evaluate"
  subtitle: "Gemini's API answers one prompt at a time. The alternatives below are what teams reach for to turn that into a production pipeline with retries, fan-out, and history."
  competitors:
    - name: "Python scripts + LangChain"
    - name: "n8n"
      logoAsset: "n8n"
    - name: "Temporal"
      logoAsset: "temporal"
  rows:
    - feature: "Retry and fallback across model versions"
      kestra: "✓ Native retry policy plus a runIf-gated fallback chain"
      values:
        - "Hand-rolled try/except per call"
        - "No native model fallback, a custom Function node required"
        - "Durable execution retries the activity automatically"
    - feature: "Structured JSON output enforcement"
      kestra: "✓ Native StructuredOutputCompletion with a jsonResponseSchema"
      values:
        - "Pydantic or JSON-mode parsing glued on top of the SDK"
        - "Manual JSON parsing inside a Function node"
        - "Application code owns schema validation"
    - feature: "Batch fan-out with concurrency control"
      kestra: "✓ ForEach with a concurrencyLimit"
      values:
        - "asyncio.Semaphore or a queue library"
        - "Split In Batches node, no native rate limiting"
        - "Child workflows per item, more setup"
    - feature: "Multimodal input (image plus text)"
      kestra: "✓ Native MultimodalCompletion"
      values:
        - "google-genai SDK called directly"
        - "HTTP Request node to the Gemini API"
        - "An activity wraps the same SDK call"
    - feature: "Execution history and lineage"
      kestra: "✓ Full UI history per task, per attempt"
      values:
        - "Custom logging, no built-in UI"
        - "Execution log per node run"
        - "Built-in workflow history, code-first"
    - feature: "Team already comfortable with"
      kestra: "Declarative YAML, versioned in Git"
      values:
        - "Python and prompt engineering"
        - "Low-code, drag-and-drop"
        - "Go, Java, or Python SDK and durable-execution concepts"

faq:
  - question: "What's the difference between plugin-gemini and the Vertex AI plugin?"
    answer: "<code>plugin-gemini</code> calls the public Gemini API directly with an <code>apiKey</code> secret, no GCP project required. The <a href='/orchestration/vertex-ai'>Vertex AI</a> plugin calls the same model family through Google Cloud's IAM, service accounts, and per-project quotas. Pick plugin-gemini when a team just needs an API key; pick Vertex AI when the call must sit inside existing GCP governance and billing."
  - question: "What does Kestra add to a Gemini API key setup?"
    answer: "A trigger to start the call (webhook, schedule, or storage event), a <code>retry</code> policy and <code>runIf</code>-gated fallback for when the model returns a 503, a <code>concurrency</code> cap to protect your quota, and a chain into whatever runs next: a <a href='/orchestration/slack'>Slack</a> alert, a <a href='/orchestration/bigquery'>BigQuery</a> write, or a <a href='/orchestration/git'>Git</a>-versioned prompt. One execution history covers the Gemini call and every step around it."
  - question: "How do I get structured JSON out of Gemini instead of prose?"
    answer: "Use <code>io.kestra.plugin.gemini.StructuredOutputCompletion</code> with a <code>prompt</code> and a <code>jsonResponseSchema</code>. The response MIME type is fixed to <code>application/json</code>, so the model's answer always matches the schema's shape, and a downstream <code>If</code> or database write can rely on the same fields every run."
  - question: "How does the model fallback pattern actually work?"
    answer: "The primary <code>ChatCompletion</code> task carries a <code>retry</code> policy for transient noise. A second task with the same <code>type</code> but an older <code>model</code> is gated by <code>runIf: \"{{ outputs.primary.predictions is not defined }}\"</code>, so it only runs when the first produced nothing. Chain a third for a second fallback, and notify only when a fallback task actually fired."
  - question: "Can I process images and generate video with the same plugin?"
    answer: "Yes. <code>io.kestra.plugin.gemini.MultimodalCompletion</code> takes mixed text and image parts in one call and returns text plus any generated images. <code>io.kestra.plugin.gemini.VideoGeneration</code> creates a short video with Google's Veo 3 model through the same API key. Put a <code>Pause</code> task in front of anything that publishes a generated video externally; that is the one place a human review genuinely belongs in this plugin's use cases."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted gives complete control over where your pipeline execution and API keys live."

