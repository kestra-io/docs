faq:
  - question: "Does Kestra require Git to run?"
    answer: "No. Kestra runs flows whether or not they live in Git. The Git plugin is opt-in for teams who want version control on the flow definitions, audit history of who changed what, peer review through PRs, and reproducible environments via TenantSync. Without the plugin, flows live in Kestra's database and the UI is the only editor. With the plugin, Git becomes the source of truth and the UI becomes a runtime view."
  - question: "Which Git providers work with the Git plugin?"
    answer: "Any Git provider that speaks HTTPS or SSH: GitHub, GitHub Enterprise Server, GitLab, GitLab self-hosted, Bitbucket, Gitea, Codeberg, AWS CodeCommit, Azure DevOps Repos. Authentication is by username plus personal access token (HTTPS) or SSH private key. The plugin uses standard Git protocols, no provider-specific APIs."
  - question: "What's the difference between PushFlows and NamespaceSync?"
    answer: "PushFlows is one-way: Kestra to Git. It exports flows from a source namespace and commits them, optionally rewriting the namespace and deleting Git files that no longer exist in Kestra. NamespaceSync is bidirectional and configurable via sourceOfTruth (GIT or KESTRA). NamespaceSync also covers Namespace Files, apps, unit tests, and custom blueprints in addition to flows. Use PushFlows for export-only flows. Use NamespaceSync when Git is meant to be authoritative."
  - question: "How does Kestra handle conflicts between Git and Kestra?"
    answer: "The sourceOfTruth setting decides. With sourceOfTruth: GIT, the Git branch wins: Kestra reconciles to match the branch, deleting flows not in Git unless their namespace is in protectedNamespaces. With sourceOfTruth: KESTRA, Kestra wins and the next push overwrites the Git branch. To avoid both ends drifting independently, pick one direction and stick with it per namespace. Many teams pick GIT for prod and KESTRA for dev."
  - question: "Can I review changes before they land in Git or in Kestra?"
    answer: "Yes, every push and sync task has dryRun: true. The task computes the full diff and writes it to internal storage as an ion file without applying anything. Plug into a review workflow: dryRun runs on schedule, posts the diff to Slack or attaches it to an auto-opened PR, a Pause task waits for human approval, then the same task re-runs with dryRun: false to apply."
  - question: "Can git.Clone pull from private repos?"
    answer: "Yes, via either HTTPS with username + password (personal access token) or SSH with privateKey + passphrase. The credentials go through Kestra's secrets backend. cloneSubmodules: true pulls nested submodules using the same credentials when the submodule URL is on the same provider, or matching credentials in the worker's SSH config."
  - question: "Is the Git plugin Enterprise-only?"
    answer: "No. The io.kestra.plugin.git plugin ships in the open-source edition with every task: Clone, NamespaceSync, TenantSync, PushFlows, PushNamespaceFiles, PushDashboards, PushExecutionFiles, SyncFlows, SyncFlow, SyncNamespaceFiles, SyncDashboards. Kestra Enterprise adds Apps for self-service (engineers trigger a Git sync via a typed form), namespace-scoped RBAC, audit logs, and worker isolation. The Git operations themselves are open source."
  - question: "How does Kestra handle Git operations in an air-gapped environment?"
    answer: "Point the url at your internal Git provider (self-hosted GitLab, Gitea, or a bare HTTP Git server). Use the trustedCaPemPath property on PushFlows and related tasks to add your internal CA bundle to the JVM truststore. Kestra workers run inside the air gap and reach the internal Git provider directly, no external network required. See <a href='/infra-automation'>Kestra for infrastructure automation</a> for the broader self-hosted picture."

