title: "Orchestrate Kestra with Git: flows as code, bidirectional namespace sync, dryRun diffs"
description: "Push flows, dashboards, and Namespace Files to any Git provider. Sync back on schedule. Treat Git as source of truth with dryRun diffs and protected namespaces."

tool:
  name: "Git"
  pluginClass: "io.kestra.plugin.git.NamespaceSync"
  color: "#F1502F"

hero:
  title: "Version every flow. Sync from Git."
  description: "Push flows, dashboards, Namespace Files, and execution outputs to any Git provider. Pull back on schedule or webhook. Treat Git as the source of truth, with bidirectional namespace sync, dryRun diffs before every change, protected namespaces, and clone any external repo at flow runtime."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Make Git the source of truth for every flow with an orchestration engine that listens to schedules or PR webhooks, handles bidirectional namespace sync with dryRun diffs and protected namespaces, and chains Clone with <a href='/orchestration/terraform'>Terraform</a>, dbt, and <a href='/orchestration/ansible'>Ansible</a> pulled fresh at runtime. Cut the gap from Git merge to deploy down to the next 5-minute reconcile."

pillars:
  title: "Around every flow, every namespace, every tenant."
  subtitle: "Kestra runs orchestration. Git holds the source of truth for what runs. The plugin lets you choose which side wins, push and pull by artifact type, sync an entire tenant, dryRun every change first, and clone external repos at runtime so the working directory is always fresh."
  items:
    - icon: "mdi:source-branch-sync"
      title: "GIT or KESTRA: pick which side wins, every sync"
      description: "NamespaceSync syncs one namespace between a Git branch and Kestra. Set sourceOfTruth: GIT and Kestra reconciles to match the repo, deleting flows that disappeared from main. Set sourceOfTruth: KESTRA and the repo follows what was edited in the UI. whenMissingInSource controls deletion behavior: DELETE, KEEP, or FAIL. The direction is explicit, never implicit."
    - icon: "mdi:transfer-up"
      title: "Push by artifact type, parallel-safe"
      description: "Four push tasks, one per artifact. PushFlows commits flow YAML under _flows/. PushNamespaceFiles commits files under _files/. PushDashboards commits saved dashboards under _dashboards/. PushExecutionFiles commits run outputs under _outputs/. Run them in parallel across different namespaces, or sequence them inside one namespace to avoid merge conflicts."
    - icon: "mdi:earth"
      title: "TenantSync moves the entire orchestrator state through Git"
      description: "TenantSync synchronizes every namespace, flow, Namespace File, and dashboard in a tenant in one task. Push from staging-Kestra, pull into prod-Kestra, gated by review. The whole platform state moves between environments through a Git branch with protectedNamespaces keeping critical prod namespaces safe from accidental deletion."
    - icon: "mdi:eye-check-outline"
      title: "dryRun every push and sync before it lands"
      description: "Every push and sync task supports dryRun: true. The task computes the full diff and writes it to Kestra's internal storage as an ion file without applying anything. Plug into a review workflow: dryRun on a Schedule, post the diff to Slack or open a PR, gate the apply behind human approval, then re-run with dryRun: false."
    - icon: "mdi:download-outline"
      title: "Clone any external repo at flow runtime"
      description: "git.Clone brings external code into the working directory at execution time. Pin a branch, a tag, or a commit. cloneSubmodules: true pulls submodules. The cloned files become the input to subsequent steps (dbt CLI, Terraform CLI, scripts.python). No baked-in artifacts in container images, no stale copies, no rebuild to ship a new dbt project version."
    - icon: "mdi:shield-lock-outline"
      title: "protectedNamespaces stops accidental destruction"
      description: "The protectedNamespaces list (defaults to [system]) is never deleted, even when whenMissingInSource: DELETE would otherwise remove it. Add prod, finance, or compliance to the list and a Git sync cannot accidentally wipe them. Combine with dryRun for two independent safety layers before a destructive operation."

useCases:
  title: "How platform teams use Kestra and Git"
  subtitle: "Patterns teams ship in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Source of truth"
      badgeIcon: "mdi:source-branch-sync"
      title: "Git is authoritative. Kestra reconciles every five minutes."
      description: "A scheduled flow in the system namespace runs NamespaceSync with sourceOfTruth: GIT every five minutes against the main branch of the platform repo. Flows added in Git appear in Kestra. Flows deleted in Git disappear from Kestra (except those listed in protectedNamespaces). The Kestra UI becomes a read-only window onto what is committed to main."
      flow:
        - node: "every 5 min"
          label: "schedule"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "sync from git"
          label: "sourceOfTruth: GIT"
          pluginClass: "io.kestra.plugin.git.NamespaceSync"
        - node: "report changes"
          label: "diff summary"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Drift between Git and Kestra is reconciled"
          description: "If someone edits a flow in the UI by mistake, the next sync overwrites it from main. The intended state lives in Git."
        - title: "Deletions propagate, safely"
          description: "Remove a flow from Git and the next sync removes it from Kestra, unless its namespace is in protectedNamespaces."
        - title: "Commit and run are the same trigger"
          description: "Merge a PR to main and the next 5-minute sync deploys it. No separate CI step, no kestra-deploy.sh script."
        - title: "Diff summary surfaces every reconcile"
          description: "The NamespaceSync output includes a diff file. The follow-up Slack step posts what changed since the last reconcile."
          wide: true
    - badge: "Export"
      badgeIcon: "mdi:transfer-up"
      title: "Continuous export: every Kestra change pushed back to Git"
      description: "An hourly flow runs PushFlows with dryRun: true against the platform repo. The diff lands in Kestra's internal storage. A follow-up step posts a link to the diff in Slack with a review request. Once approved (manually, or by a bot that opens a PR), the same task re-runs with dryRun: false and commits. Every change in Kestra ends up in Git with attributable authorship."
      flow:
        - node: "hourly"
          label: "schedule"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "dry-run export"
          label: "dryRun: true"
          pluginClass: "io.kestra.plugin.git.PushFlows"
        - node: "post diff"
          label: "Slack link"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
        - node: "human gate"
          label: "review and approve"
          gate: true
          pluginClass: "io.kestra.plugin.core.flow.Pause"
        - node: "apply"
          label: "dryRun: false"
          pluginClass: "io.kestra.plugin.git.PushFlows"
        - node: "confirm"
          label: "commit URL to Slack"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "dryRun before any commit"
          description: "The first PushFlows runs in plan-only mode. No commit lands until the reviewer resumes the flow."
        - title: "Per-artifact granularity"
          description: "Run PushFlows, PushNamespaceFiles, PushDashboards in parallel for the same namespace, each landing in its own _flows / _files / _dashboards subdirectory."
        - title: "Commit URL flows forward"
          description: "PushFlows output includes the commitURL. The follow-up Slack message includes a direct link to the commit on GitHub or GitLab."
          wide: true
    - badge: "Runtime input"
      badgeIcon: "mdi:download-outline"
      title: "Clone the dbt project at runtime, never bake artifacts into the image"
      description: "The flow runs Clone against the data-platform repo at a pinned branch. Submodules pulled. The dbt project lands in the working directory. The next task runs dbt build against the freshly cloned project. Branch, tag, or commit can be pinned per-execution as a flow input, so the same flow definition deploys feature branches in CI and main in prod without a container rebuild."
      flow:
        - node: "scheduled"
          label: "or webhook"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "clone dbt repo"
          label: "pinned ref"
          pluginClass: "io.kestra.plugin.git.Clone"
        - node: "dbt build"
          label: "fresh source"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "post results"
          label: "Slack with revision"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Ref is a flow input"
          description: "Pass branch, tag, or commit at execution time. CI runs the feature branch, prod runs main, no separate flow definition."
        - title: "Submodules pulled when needed"
          description: "cloneSubmodules: true brings in nested repos (shared macros, dbt packages, internal libs) at runtime."
        - title: "Working directory is the cloned repo"
          description: "The dbt CLI task does not need a separate path config. The clone landed in working dir, dbt picks it up directly."
        - title: "No container rebuild to ship a new project version"
          description: "Updating the dbt models is a Git push, not a Docker image rebuild and registry push."
          wide: true
    - badge: "Promotion"
      badgeIcon: "mdi:earth"
      title: "Promote orchestrator state from staging to prod through Git"
      description: "A release flow in staging-Kestra runs TenantSync with sourceOfTruth: KESTRA, dryRun: true. The diff lands and Slack posts the link. After human approval (Pause + reviewer), the same task re-runs with dryRun: false to commit the staging state to a release branch. A second flow in prod-Kestra runs TenantSync with sourceOfTruth: GIT and protectedNamespaces: [prod-finance, prod-compliance] to safely apply. The entire platform state moves through Git, gated, audited, reversible."
      flow:
        - node: "release trigger"
          label: "manual or schedule"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "dry-run from staging"
          label: "TenantSync KESTRA, dryRun"
          pluginClass: "io.kestra.plugin.git.TenantSync"
        - node: "review"
          label: "named reviewer"
          gate: true
          pluginClass: "io.kestra.plugin.core.flow.Pause"
        - node: "commit staging"
          label: "TenantSync KESTRA, apply"
          pluginClass: "io.kestra.plugin.git.TenantSync"
        - node: "apply to prod"
          label: "TenantSync GIT + protected"
          pluginClass: "io.kestra.plugin.git.TenantSync"
        - node: "release notes"
          label: "Slack to platform"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Whole-tenant promotion in one task"
          description: "TenantSync handles every namespace, flow, Namespace File, and dashboard in the tenant at once. No per-namespace orchestration loop."
        - title: "Protected namespaces never deleted"
          description: "prod-finance, prod-compliance stay safe even if whenMissingInSource: DELETE. Add prod-billing or any other critical namespace as needed."
        - title: "Two dryRun gates before prod changes"
          description: "First on staging export, then on prod apply. Two independent reviews before any destructive operation runs in prod."
        - title: "Reversible via Git history"
          description: "Every promotion is a Git commit. Reverting the platform state is a git revert + re-run TenantSync, not a manual recovery."
          wide: true

