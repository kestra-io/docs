title: "Orchestrate OPA with Kestra: policy-as-code gates, Rego deployment, decision audit"
description: "Evaluate Rego policies before destructive flow steps. Upload from Git with dryRun review. Audit every decision in execution history. EE plugin, self-hosted."

tool:
  name: "OPA"
  pluginClass: "io.kestra.plugin.ee.opa.policy.Evaluate"
  color: "#7E7CD5"

hero:
  title: "Ask OPA before every destructive step."
  description: "Evaluate Rego policies on Terraform plans, Kubernetes manifests, IAM changes, and secret rotations as flow tasks. Upload policies from Git with dryRun review. Audit every decision in the execution history. Compile partial evaluations for hot paths. Self-hosted OPA, air-gapped friendly, fully under your control."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Put policy-as-code inline with a declarative workflow engine that listens to release triggers, schedules, or webhooks, evaluates Rego policies on Terraform plans, Kubernetes manifests, IAM changes, or NetBox device mutations before any write, and chains OPA decisions with <a href='/orchestration/terraform'>Terraform</a>, <a href='/orchestration/kubernetes'>Kubernetes</a>, and audit reports in one execution history. Self-hosted OPA, decision IDs linked to flow executions, compliance evidence written automatically."

pillars:
  title: "Around every write, every change, every commit."
  subtitle: "OPA evaluates the Rego decisions. Kestra puts those decisions inline in every flow that changes state: before terraform apply, before kubectl.Apply, before IAM key rotation, before opening firewall ports. Policy-as-code stops being a Kubernetes admission webhook only; it becomes a first-class gate in the orchestrator."
  items:
    - icon: "mdi:gate-arrow-right"
      title: "policy.Evaluate gates destructive operations"
      description: "policy.Evaluate calls OPA's Data API at /v1/data/{path} with a JSON input document built from the flow's current context: the Terraform plan output, the Kubernetes manifest, the IAM policy change, the firewall rule mutation. OPA returns a Rego decision; the flow's If task branches on it. Allow continues; deny halts and routes to an errors branch with the violation reasons."
    - icon: "mdi:upload"
      title: "policy.Upload deploys Rego from Git, with dryRun review"
      description: "policy.Upload PUTs a Rego module to /v1/policies/{id}, overwriting existing content. Chain with git.Clone to fetch the policy repo at flow runtime, opa test for unit tests, then push to OPA on green. A Pause task between validate and push lets a reviewer inspect changes that affect prod policies. The Rego file in Git is the source of truth."
    - icon: "mdi:format-list-checks"
      title: "policy.List reconciles loaded modules with Git"
      description: "policy.List returns every policy module on the OPA server. A weekly reconciliation flow diffs the result against the Rego files in Git. Modules in OPA but not in Git get flagged for removal. Modules in Git but not in OPA fire policy.Upload. The OPA bundle stays in sync with declared intent, with drift surfaced as Slack alerts."
    - icon: "mdi:flash"
      title: "policy.Compile for partial evaluation in hot paths"
      description: "policy.Compile uses OPA's Compile API to partially evaluate a Rego query, returning residual queries. Use when most of the logic can be pre-computed and only one runtime value changes per evaluation. The hot-path flow evaluates the residual only, cutting latency for high-frequency gating like per-request authorization or per-row data classification."
    - icon: "mdi:history"
      title: "Decision audit linked to flow execution"
      description: "Each policy.Evaluate response includes a decision_id when OPA's decision logging is enabled. The Kestra execution history records the decision_id alongside the input document and the result. Auditors can trace a policy decision from the OPA decision log back to the Kestra flow that triggered it, the inputs that produced it, and what ran afterward. SOX, ISO 27001, and SOC 2 evidence written automatically."
    - icon: "mdi:shield-lock-outline"
      title: "Gate writes, not reads"
      description: "Put policy.Evaluate before every task that creates, updates, or deletes state: terraform apply, kubectl.Apply, aws.iam mutations, NetBox device.Create, Cloudflare dns.records.Upsert. Reads (Get, List, Query) skip the gate. Latency overhead lands only on operations that actually change the world, and every state change is recorded as a policy decision."

useCases:
  title: "How platform and security teams use OPA and Kestra"
  subtitle: "Patterns engineering teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Pre-apply gate"
      badgeIcon: "mdi:gate-arrow-right"
      title: "Evaluate the terraform plan against OPA before apply runs"
      description: "terraform plan runs and captures the JSON output. policy.Evaluate sends the plan as input to OPA's terraform/deny policy. OPA returns the violations array; if empty, the flow proceeds to terraform apply. If not, the flow halts and the errors branch posts the violation reasons to Slack with the plan attached. Compliance enforcement happens before the infrastructure changes land, not after."
      flow:
        - node: "release trigger"
          label: "manual or schedule"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "terraform plan"
          label: "JSON output"
          pluginClass: "io.kestra.plugin.terraform.cli.TerraformCLI"
        - node: "evaluate policy"
          label: "OPA terraform/deny"
          pluginClass: "io.kestra.plugin.ee.opa.policy.Evaluate"
        - node: "decision branch"
          label: "If violations"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "apply or halt"
          label: "with decision_id logged"
          pluginClass: "io.kestra.plugin.terraform.cli.TerraformCLI"
        - node: "audit slack"
          label: "violation details if any"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Plan never sees prod if it violates policy"
          description: "The apply task is gated by an If on the policy decision. A bad plan halts the flow before terraform touches state."
        - title: "Violations route to the right channel"
          description: "OPA's violation array names the offending resource. The Slack message includes the resource and the rule that fired, with a link to the policy in the repo."
        - title: "Decision ID linked to the execution"
          description: "The OPA decision_id is recorded in the Kestra output. Auditors trace from decision log to plan to flow to reviewer."
        - title: "Reusable across environments"
          description: "Same flow pattern for dev / staging / prod. The policy path or input shape differs per environment, the gate logic stays identical."
          wide: true
    - badge: "K8s gate"
      badgeIcon: "mdi:cube-outline"
      title: "Validate Kubernetes manifests with OPA before kubectl apply"
      description: "Before kubectl.Apply, policy.Evaluate runs the manifest through OPA's kubernetes/admission policy. OPA returns allow plus a violations list. If allowed, the flow applies. If denied, the flow stops and the errors branch opens a GitHub issue with the violation reasons attached. Pattern works for clusters where you cannot install an admission webhook (managed K8s, customer tenant clusters, multi-cloud), using the same Rego you would use server-side."
      flow:
        - node: "release trigger"
          label: "manual or webhook"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "load manifest"
          label: "from Git or input"
          pluginClass: "io.kestra.plugin.git.Clone"
        - node: "OPA admission"
          label: "policy.Evaluate"
          pluginClass: "io.kestra.plugin.ee.opa.policy.Evaluate"
        - node: "branch on allow"
          label: "If allow"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "kubectl apply"
          label: "if allow"
          pluginClass: "io.kestra.plugin.kubernetes.kubectl.Apply"
        - node: "open issue"
          label: "if deny"
          pluginClass: "io.kestra.plugin.github.issues.Create"
      items:
        - title: "Works without an admission webhook"
          description: "For clusters where you cannot install OPA Gatekeeper or a Validating Admission Webhook, run the same Rego policy in the flow."
        - title: "Reuses your existing Rego"
          description: "The same kubernetes/admission policy that would run server-side runs here. No policy fork, no duplicate logic."
        - title: "Failure produces a structured GitHub issue"
          description: "The errors branch opens an issue with the violations array, the manifest excerpt, and the execution URL."
          wide: true
    - badge: "Policy lifecycle"
      badgeIcon: "mdi:source-branch"
      title: "Pull Rego from Git, unit-test, dryRun gate, push to OPA"
      description: "Weekly policy sync flow. git.Clone pulls the policy repo at the main branch. A Shell task runs opa test for unit tests. policy.Compile validates each policy parses cleanly. A Pause task gates on the diff between current OPA state (policy.List) and the Git state. After approval, policy.Upload deploys the updated modules. Failed unit tests stop the flow before any change reaches OPA."
      flow:
        - node: "weekly schedule"
          label: "cron"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "clone policy repo"
          label: "Git source of truth"
          pluginClass: "io.kestra.plugin.git.Clone"
        - node: "opa test"
          label: "unit tests"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "validate parse"
          label: "policy.Compile"
          pluginClass: "io.kestra.plugin.ee.opa.policy.Compile"
        - node: "list current"
          label: "policy.List"
          pluginClass: "io.kestra.plugin.ee.opa.policy.List"
        - node: "diff review"
          label: "Pause for approval"
          gate: true
          pluginClass: "io.kestra.plugin.core.flow.Pause"
        - node: "upload to OPA"
          label: "policy.Upload"
          pluginClass: "io.kestra.plugin.ee.opa.policy.Upload"
        - node: "notify"
          label: "Slack with modules"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Tests gate every deploy"
          description: "opa test runs the Rego unit tests. Failures halt the flow before policy.Upload fires."
        - title: "Compile catches parse errors early"
          description: "policy.Compile validates each module parses cleanly. Syntax errors never reach the live OPA server."
        - title: "Human gate before prod-policy changes"
          description: "The Pause task surfaces the diff between current OPA state and the Git source. A reviewer approves before changes apply."
          wide: true
    - badge: "Audit"
      badgeIcon: "mdi:clipboard-check-outline"
      title: "Cross-stack daily compliance audit"
      description: "A scheduled audit flow pulls current state from each stack: aws.cloudformation.Get for stack outputs, kubectl.Get for K8s resources, terraform state list outputs, NetBox device.List for the inventory. For each, policy.Evaluate runs the compliance rules. Violations are aggregated into a Slack-friendly daily report. The report links to OPA decision IDs and to the affected resources. Compliance posture becomes a continuous signal, not a quarterly audit drill."
      flow:
        - node: "daily schedule"
          label: "off-hours"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "pull aws state"
          label: "cloudformation, IAM"
          pluginClass: "io.kestra.plugin.aws.cloudformation.Create"
        - node: "pull k8s state"
          label: "kubectl.Get"
          pluginClass: "io.kestra.plugin.kubernetes.kubectl.Get"
        - node: "pull terraform"
          label: "state list"
          pluginClass: "io.kestra.plugin.terraform.cli.TerraformCLI"
        - node: "evaluate per stack"
          label: "policy.Evaluate"
          pluginClass: "io.kestra.plugin.ee.opa.policy.Evaluate"
        - node: "aggregate report"
          label: "violations rolled up"
          pluginClass: "io.kestra.plugin.scripts.python.Script"
        - node: "post to slack"
          label: "with decision IDs"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Same policies, multiple sources"
          description: "The Rego policy library covers AWS, Kubernetes, Terraform state, and NetBox inventory. One policy set, many evaluations."
        - title: "Daily signal, not quarterly audit"
          description: "Violations land in Slack within 24 hours. Auditors see a continuous compliance posture, not a frozen point-in-time snapshot."
        - title: "Decision IDs link to OPA decision log"
          description: "Every violation in the report includes the OPA decision_id, so investigators trace from the report row to the policy, to the input, to the flow."
          wide: true

