blueprints:
  title: "Blueprints for OPA orchestration."
  lead: "One blueprint per use case above. Copy the YAML, point at your OPA server, ship it."
  items:
    - name: "OPA gate before terraform apply"
      title: "terraform plan output evaluated by OPA; apply gated on the decision"
      description: "Runs terraform plan with JSON output, sends the plan as input to OPA's terraform/deny policy, branches on the violations array. If empty, terraform apply runs. If not, the flow halts and posts the violation details to Slack."
      href: "/blueprints?tags=Infrastructure"
      flowDiagram:
        source:
          label: "Release trigger"
          sublabel: "manual or schedule"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        workflow:
          label: "OPA gate before apply"
          sublabel: "policy violations halt"
        tools:
          - label: "terraform plan"
            pluginClass: "io.kestra.plugin.terraform.cli.TerraformCLI"
          - label: "policy.Evaluate"
            pluginClass: "io.kestra.plugin.ee.opa.policy.Evaluate"
          - label: "If gate"
            pluginClass: "io.kestra.plugin.core.flow.If"
          - label: "terraform apply"
            pluginClass: "io.kestra.plugin.terraform.cli.TerraformCLI"
        outcome:
          label: "Compliant infra change"
          sublabel: "decision_id audited"
          icon: "mdi:gate-arrow-right"
      plugins:
        - "io.kestra.plugin.terraform.cli.TerraformCLI"
        - "io.kestra.plugin.ee.opa.policy.Evaluate"
        - "io.kestra.plugin.core.flow.If"
        - "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      code: |
        id: opa-gated-terraform-apply
        namespace: company.platform

        inputs:
          - id: tf_directory
            type: STRING
            defaults: "infra/prod"

        tasks:
          - id: terraform_plan
            type: io.kestra.plugin.terraform.cli.TerraformCLI
            inputFiles:
              main.tf: "{{ read('main.tf') }}"
            commands:
              - terraform init
              - terraform plan -out=plan.tfplan
              - terraform show -json plan.tfplan > plan.json
            outputFiles:
              - plan.json

          - id: evaluate_policy
            type: io.kestra.plugin.ee.opa.policy.Evaluate
            url: "{{ secret('OPA_URL') }}"
            token: "{{ secret('OPA_TOKEN') }}"
            policyPath: "terraform/deny"
            input: "{{ read(outputs.terraform_plan.outputFiles['plan.json']) | fromJson }}"
            metrics: true

          - id: gate_apply
            type: io.kestra.plugin.core.flow.If
            condition: "{{ outputs.evaluate_policy.result | length == 0 }}"
            then:
              - id: terraform_apply
                type: io.kestra.plugin.terraform.cli.TerraformCLI
                commands:
                  - terraform apply -auto-approve plan.tfplan

              - id: notify_success
                type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
                url: "{{ secret('SLACK_WEBHOOK') }}"
                payload: |
                  {
                    "text": ":white_check_mark: Terraform applied. OPA decision: {{ outputs.evaluate_policy.decisionId }}. <{{ execution.url }}|View>"
                  }
            else:
              - id: notify_violation
                type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
                url: "{{ secret('SLACK_WEBHOOK') }}"
                payload: |
                  {
                    "text": ":no_entry: OPA blocked the apply. Violations: {{ outputs.evaluate_policy.result | json }}. Decision ID: {{ outputs.evaluate_policy.decisionId }}. <{{ execution.url }}|View>"
                  }
    - name: "Policy lifecycle: Git to OPA with tests and gate"
      title: "Pull Rego from Git, run opa test, validate, gate, upload"
      description: "Weekly flow that pulls the policy repo, runs opa test for unit tests, validates each policy parses via policy.Compile, lists current OPA modules, pauses for a human to approve the diff, then policy.Upload deploys."
      href: "/blueprints?tags=Infrastructure"
      flowDiagram:
        source:
          label: "Weekly schedule"
          sublabel: "Monday 04:00"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        workflow:
          label: "Policy lifecycle from Git"
          sublabel: "tests gate the upload"
        tools:
          - label: "git.Clone"
            pluginClass: "io.kestra.plugin.git.Clone"
          - label: "opa test"
            pluginClass: "io.kestra.plugin.scripts.shell.Commands"
          - label: "Pause / review"
            pluginClass: "io.kestra.plugin.core.flow.Pause"
          - label: "policy.Upload"
            pluginClass: "io.kestra.plugin.ee.opa.policy.Upload"
        outcome:
          label: "Policies deployed"
          sublabel: "tests + diff reviewed"
          icon: "mdi:source-branch"
      plugins:
        - "io.kestra.plugin.git.Clone"
        - "io.kestra.plugin.scripts.shell.Commands"
        - "io.kestra.plugin.ee.opa.policy.Compile"
        - "io.kestra.plugin.ee.opa.policy.List"
        - "io.kestra.plugin.core.flow.Pause"
        - "io.kestra.plugin.ee.opa.policy.Upload"
      code: |
        id: opa-policy-from-git
        namespace: company.security

        triggers:
          - id: weekly
            type: io.kestra.plugin.core.trigger.Schedule
            cron: "0 4 * * 1"

        tasks:
          - id: clone_policies
            type: io.kestra.plugin.git.Clone
            url: https://github.com/company/opa-policies
            branch: main
            username: "{{ secret('GIT_USERNAME') }}"
            password: "{{ secret('GIT_TOKEN') }}"

          - id: run_tests
            type: io.kestra.plugin.scripts.shell.Commands
            commands:
              - opa test ./policies -v

          - id: validate_parse
            type: io.kestra.plugin.ee.opa.policy.Compile
            url: "{{ secret('OPA_URL') }}"
            token: "{{ secret('OPA_TOKEN') }}"
            query: "data.terraform.deny"

          - id: list_current
            type: io.kestra.plugin.ee.opa.policy.List
            url: "{{ secret('OPA_URL') }}"
            token: "{{ secret('OPA_TOKEN') }}"
            fetchType: FETCH

          - id: review_diff
            type: io.kestra.plugin.core.flow.Pause
            description: |
              Tests passed and policies parsed. Review the diff against current OPA state and resume to deploy.
              Current modules: {{ outputs.list_current.size }}.

          - id: upload_terraform_policy
            type: io.kestra.plugin.ee.opa.policy.Upload
            url: "{{ secret('OPA_URL') }}"
            token: "{{ secret('OPA_TOKEN') }}"
            policyId: "terraform/deny"
            policy: "{{ read('policies/terraform/deny.rego') }}"

          - id: notify
            type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
            url: "{{ secret('SLACK_WEBHOOK') }}"
            payload: |
              {
                "text": ":scroll: OPA policies updated from main. <{{ execution.url }}|View execution>"
              }
    - name: "Daily cross-stack compliance audit"
      title: "Pull AWS + K8s + Terraform state, evaluate against compliance policies, report"
      description: "Scheduled daily audit that aggregates state across stacks, runs policy.Evaluate against each, and posts a violation report to Slack with decision IDs."
      href: "/blueprints?tags=Infrastructure"
      flowDiagram:
        source:
          label: "Daily schedule"
          sublabel: "off-hours cron"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        workflow:
          label: "Cross-stack audit"
          sublabel: "AWS + K8s + Terraform"
        tools:
          - label: "aws.cli IAM"
            pluginClass: "io.kestra.plugin.aws.cli.AwsCLI"
          - label: "kubectl.Get"
            pluginClass: "io.kestra.plugin.kubernetes.kubectl.Get"
          - label: "policy.Evaluate"
            pluginClass: "io.kestra.plugin.ee.opa.policy.Evaluate"
          - label: "Slack report"
            pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
        outcome:
          label: "Daily compliance signal"
          sublabel: "violations with decision IDs"
          icon: "mdi:clipboard-check-outline"
      plugins:
        - "io.kestra.plugin.aws.cli.AwsCLI"
        - "io.kestra.plugin.kubernetes.kubectl.Get"
        - "io.kestra.plugin.ee.opa.policy.Evaluate"
        - "io.kestra.plugin.scripts.python.Script"
      code: |
        id: opa-daily-compliance-audit
        namespace: company.security

        triggers:
          - id: daily
            type: io.kestra.plugin.core.trigger.Schedule
            cron: "0 6 * * *"

        tasks:
          - id: list_iam
            type: io.kestra.plugin.aws.cli.AwsCLI
            commands:
              - aws iam list-users --output json > iam_users.json
              - aws iam list-roles --output json > iam_roles.json
            outputFiles:
              - iam_users.json
              - iam_roles.json

          - id: list_k8s_deployments
            type: io.kestra.plugin.kubernetes.kubectl.Get
            namespace: "production"
            kind: Deployment
            fetchType: STORE

          - id: evaluate_iam_policy
            type: io.kestra.plugin.ee.opa.policy.Evaluate
            url: "{{ secret('OPA_URL') }}"
            token: "{{ secret('OPA_TOKEN') }}"
            policyPath: "compliance/iam"
            input:
              users: "{{ read(outputs.list_iam.outputFiles['iam_users.json']) | fromJson }}"
              roles: "{{ read(outputs.list_iam.outputFiles['iam_roles.json']) | fromJson }}"

          - id: evaluate_k8s_policy
            type: io.kestra.plugin.ee.opa.policy.Evaluate
            url: "{{ secret('OPA_URL') }}"
            token: "{{ secret('OPA_TOKEN') }}"
            policyPath: "compliance/kubernetes"
            input:
              deployments: "{{ outputs.list_k8s_deployments.items }}"

          - id: build_report
            type: io.kestra.plugin.scripts.python.Script
            beforeCommands:
              - pip install --quiet jinja2
            script: |
              import json
              iam = {{ outputs.evaluate_iam_policy.result | json }}
              k8s = {{ outputs.evaluate_k8s_policy.result | json }}
              violations = (iam or []) + (k8s or [])
              with open("report.md", "w") as f:
                  f.write(f"# Daily compliance report\n\nViolations found: {len(violations)}\n\n")
                  for v in violations:
                      f.write(f"- {v}\n")
            outputFiles:
              - report.md

          - id: notify
            type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
            url: "{{ secret('SLACK_WEBHOOK') }}"
            payload: |
              {
                "text": ":chart_with_downwards_trend: Daily compliance audit. IAM decision: {{ outputs.evaluate_iam_policy.decisionId }}, K8s decision: {{ outputs.evaluate_k8s_policy.decisionId }}. <{{ execution.url }}|View report>"
              }

comparison:
  title: "Kestra vs OPA orchestration alternatives"
  subtitle: "Kestra wraps the OPA REST API with first-class tasks for policy evaluation, lifecycle, and audit. The competitors below are how teams typically wire OPA decisions into operational flows today."
  competitors:
    - name: "OPA admission webhook (K8s only)"
      pluginClass: "io.kestra.plugin.kubernetes.core.PodCreate"
    - name: "conftest in CI scripts"
      pluginClass: "io.kestra.plugin.scripts.shell.Commands"
    - name: "Custom OPA HTTP client in CI"
      pluginClass: "io.kestra.plugin.scripts.shell.Commands"
  rows:
    - feature: "Evaluate before terraform apply, kubectl, IAM changes"
      kestra: "✓ policy.Evaluate as a flow task before any write"
      values:
        - "K8s only, not Terraform or IAM"
        - "Run in CI, no runtime gate"
        - "Custom code per gate"
    - feature: "Upload Rego from Git with dryRun review"
      kestra: "✓ git.Clone + policy.Compile + Pause + policy.Upload"
      values:
        - "Helm or ConfigMap mounts, manual review"
        - "Not in scope"
        - "Custom upload logic"
    - feature: "Reconcile loaded modules with declared Git state"
      kestra: "✓ policy.List + diff + Upload/Delete"
      values:
        - "Manual"
        - "Not in scope"
        - "Custom reconcile loop"
    - feature: "Partial evaluation for hot paths"
      kestra: "✓ policy.Compile returns residual queries"
      values:
        - "Not exposed"
        - "Not in scope"
        - "Custom HTTP client"
    - feature: "Decision audit linked to flow execution"
      kestra: "✓ decisionId recorded with execution outputs"
      values:
        - "OPA decision log only, no flow correlation"
        - "CI run log only"
        - "Custom correlation"
    - feature: "Same policies gate Terraform, K8s, IAM, NetBox"
      kestra: "✓ One policy library, many evaluations"
      values:
        - "K8s admission only"
        - "CI checks per repo"
        - "Custom per integration"
    - feature: "Cross-stack daily compliance audit"
      kestra: "✓ One flow pulls state from each stack, evaluates, reports"
      values:
        - "Not in scope (admission, not audit)"
        - "Not in scope (CI, not runtime)"
        - "Custom orchestration"
    - feature: "Self-hosted, air-gapped"
      kestra: "✓ Self-hosted Kestra calls self-hosted OPA"
      values:
        - "Self-hosted"
        - "Self-hosted"
        - "Self-hosted"

faq:
  - question: "Is the OPA plugin Enterprise-only?"
    answer: "Yes. The io.kestra.plugin.ee.opa plugin is part of Kestra Enterprise. The open-source edition can call OPA's REST API via io.kestra.plugin.core.http.Request, but you lose the typed task shape (policy.Evaluate with input as a structured object, policy.Upload with policy module ID, policy.List with fetchType handling) and end up writing more YAML to handle pagination, response parsing, and error semantics."
  - question: "How is this different from the OPA admission webhook?"
    answer: "The admission webhook gates Kubernetes API requests at the cluster boundary, server-side. This plugin gates flow operations at the orchestrator boundary, before any task that writes state to AWS, Kubernetes, NetBox, Terraform, or Cloudflare. Use the admission webhook when Kubernetes is the only enforcement point. Use this plugin when policy decisions span infrastructure tools, and when the cluster type does not support webhook installation (managed K8s, customer clusters, multi-cloud)."
  - question: "Where does OPA run?"
    answer: "OPA runs as a standalone server you operate yourself: as a sidecar in a Kubernetes Pod, as a systemd service, or as a container. Kestra reaches it via HTTPS at the URL you configure in the plugin. The decision logic stays inside your network, the Rego policies stay in your Git, and the audit trail stays inside Kestra's execution history. No external dependency on a SaaS policy service."
  - question: "Can the same Rego policies gate both Terraform and Kubernetes?"
    answer: "Yes, with a shared policy library that takes different input shapes. The terraform/deny policy expects a Terraform plan JSON. The kubernetes/admission policy expects an AdmissionRequest-shaped input. A common rules module shares helpers (e.g., contains_label, has_resource_limits). The flow that gates Terraform sends the plan; the flow that gates Kubernetes sends the manifest; both call policy.Evaluate with the right policyPath."
  - question: "What does the decision audit look like?"
    answer: "When OPA decision logging is enabled, each policy.Evaluate response includes a decision_id. The Kestra execution stores the decision_id in outputs.evaluate_policy.decisionId, the input document used, the policy path, and the result. The OPA decision log holds the full decision metadata. To audit a violation, start from the Slack alert (which carries the decision_id), look up the decision in OPA's log, and look up the flow execution in Kestra. Three systems, two IDs, one path."
  - question: "How do I unit-test policies before they land in OPA?"
    answer: "Run opa test in a Shell task before policy.Upload. opa test runs the Rego unit tests in the policy repo and exits non-zero on failure, which halts the Kestra flow before any policy reaches the live OPA server. Pair with a Pause task between the test run and the upload to require human approval on policy changes that touch prod gates."
  - question: "Can Kestra deploy an OPA bundle instead of individual policies?"
    answer: "policy.Upload PUTs one module at a time to /v1/policies/{id}. For bundle deployment (a tar.gz of multiple policies plus data documents), OPA's bundle service mode is the right pattern: serve bundles from S3 or a Git-backed HTTP server, OPA polls for updates. Kestra can orchestrate the bundle build and the S3 upload (aws.s3.Upload), but it does not push bundles directly. For per-policy lifecycle and decisions, policy.Upload is the right task."
  - question: "Can OPA decisions trigger downstream flows beyond the evaluate task?"
    answer: "Yes. The decision result lands in outputs.evaluate_policy.result, which any downstream task can read. If a policy decision routes a flow to a remediation subflow (e.g., a non-compliant resource fires a Terraform reconcile flow), use Kestra's Subflow task with the decision result as input. The chain stays in one execution history."

