blueprints:
  title: "Blueprints for Terraform orchestration."
  lead: "Production-ready workflows. Copy the YAML, point it at your state backend."
  items:
    - name: "Terraform from a Git repo with remote state"
      title: "Terraform from a Git repo with remote state"
      description: "Clone a Git repository, run <code>terraform init</code> against an S3 backend, then <code>terraform plan</code> and <code>terraform apply</code>. Both outputs are captured as task artifacts. Add the Schedule or Webhook trigger to run on cron or on every merge."
      href: "/blueprints"
      plugins:
        - "io.kestra.plugin.core.flow.WorkingDirectory"
        - "io.kestra.plugin.git.Clone"
        - "io.kestra.plugin.terraform.cli.TerraformCLI"
      code: |
        id: git-terraform
        namespace: company.team

        tasks:
          - id: git
            type: io.kestra.plugin.core.flow.WorkingDirectory
            tasks:
              - id: clone_repository
                type: io.kestra.plugin.git.Clone
                url: https://github.com/anna-geller/kestra-ci-cd
                branch: main

              - id: terraform
                type: io.kestra.plugin.terraform.cli.TerraformCLI
                beforeCommands:
                  - terraform init
                inputFiles:
                  terraform.tfvars: |
                    username            = "cicd"
                    password            = "{{ secret('CI_CD_PASSWORD') }}"
                    hostname            = "https://demo.kestra.io"
                outputFiles:
                  - "*.txt"
                commands:
                  - terraform plan 2>&1 | tee plan_output.txt
                  - terraform apply -auto-approve 2>&1 | tee apply_output.txt
                env:
                  AWS_ACCESS_KEY_ID: "{{ secret('AWS_ACCESS_KEY_ID') }}"
                  AWS_SECRET_KEY_ID: "{{ secret('AWS_SECRET_KEY_ID') }}"
                  AWS_DEFAULT_REGION: "{{ secret('AWS_DEFAULT_REGION') }}"
    - name: "Self-service VM provisioning on GCP"
      title: "Self-service VM provisioning on GCP"
      description: "A form-driven flow: pick a region, size, OS, and environment. Kestra generates a standardized hostname, reserves an IP from an external IPAM, runs <code>terraform apply</code> to create the VM, then posts the result and external IP to Slack. State is tracked in Kestra KV."
      href: "/blueprints"
      plugins:
        - "io.kestra.plugin.scripts.python.Script"
        - "io.kestra.plugin.terraform.cli.TerraformCLI"
        - "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
        - "io.kestra.plugin.core.kv.Set"
      code: |
        id: create-vm-gcp-terraform
        namespace: solutions.infra

        inputs:
          - id: region
            type: SELECT
            values: [us-central1, us-east1]
            defaults: us-central1
          - id: vmSize
            type: SELECT
            values: [Small, Medium, Large, n1-standard-1]
            defaults: n1-standard-1
          - id: env
            type: SELECT
            values: [Development, Staging, Production]
            defaults: Development

        tasks:
          - id: generateCustomHostname
            type: io.kestra.plugin.scripts.python.Script
            dependencies:
              - kestra
            script: |
              from kestra import Kestra
              env_code = "{{ inputs.env | slice(0, 3) }}"
              index_code = {{ kv('getVMIndex', errorOnMissing = false) ?? 1 }}
              vm_name = f"gcp{env_code}vm{index_code}".lower()
              Kestra.outputs({'customHostname': vm_name, 'index_code': index_code})

          - id: createVM
            type: io.kestra.plugin.terraform.cli.TerraformCLI
            inputFiles:
              main.tf: |
                resource "google_compute_instance" "default" {
                  name         = "{{ outputs.generateCustomHostname.vars.customHostname }}"
                  machine_type = "{{ inputs.vmSize }}"
                  zone         = "{{ inputs.region }}-a"

                  boot_disk {
                    initialize_params {
                      image = "ubuntu-2204-jammy-v20240614"
                    }
                  }

                  network_interface {
                    network = "default"
                    access_config {}
                  }
                }

                output "external_ip" {
                  value = google_compute_instance.default.network_interface[0].access_config[0].nat_ip
                }
              gcp-svc-account.json: "{{ secret('GCP_SVC_ACCOUNT') }}"
            env:
              GOOGLE_APPLICATION_CREDENTIALS: gcp-svc-account.json
            beforeCommands:
              - terraform init
            commands:
              - terraform apply -auto-approve -json
              - terraform output -raw external_ip > external_ip.txt
            outputFiles:
              - "*.txt"

          - id: notify
            type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
            url: "{{ secret('SLACK_WEBHOOK') }}"
            messageText: |
              {{ outputs.generateCustomHostname.vars.customHostname }} created.
              External IP: {{ read(outputs.createVM.outputFiles['external_ip.txt']) }}
    - name: "Provision GitHub repos with the Terraform GitHub provider"
      title: "Provision GitHub repos with the Terraform GitHub provider"
      description: "A multi-tool example: Terraform manages a SaaS resource (a GitHub repository) and Kestra orchestrates the run. The flow exposes <code>repository_name</code> and <code>description</code> as inputs, runs <code>terraform plan</code> then <code>terraform apply</code>, and captures both outputs. Wrap the same flow in a Kestra App for self-service repo creation."
      href: "/blueprints"
      plugins:
        - "io.kestra.plugin.terraform.cli.TerraformCLI"
      code: |
        id: create-repository
        namespace: company.team

        inputs:
          - id: repository_name
            type: STRING
          - id: description
            type: STRING

        tasks:
          - id: terraform
            type: io.kestra.plugin.terraform.cli.TerraformCLI
            inputFiles:
              main.tf: |
                terraform {
                  required_providers {
                    github = {
                      source  = "integrations/github"
                      version = "~> 6.0"
                    }
                  }
                }

                provider "github" {
                  token = "{{ secret('GITHUB_TOKEN') }}"
                }

                resource "github_repository" "{{inputs.repository_name}}" {
                  name        = "{{inputs.repository_name}}"
                  description = "{{ inputs.description }}"
                  auto_init   = true
                  visibility = "public"
                }
            beforeCommands:
              - terraform init
            commands:
              - terraform plan 2>&1 | tee plan_output.txt
              - terraform apply -auto-approve 2>&1 | tee apply_output.txt
            outputFiles:
              - "*.txt"

