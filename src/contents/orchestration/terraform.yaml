title: "Orchestrate Terraform with Kestra: scheduling, approval gates, and multi-tool coordination"
description: "Terraform provisions infrastructure. Kestra orchestrates the runs. Add scheduled plans, approval gates between plan and apply, retries, and chaining with Ansible or ArgoCD, without touching your Terraform code."

tool:
  name: "Terraform"
  pluginClass: "io.kestra.plugin.terraform.cli.TerraformCLI"
  color: "#7B42BC"

hero:
  title: "Your Terraform runs, fully orchestrated."
  description: "Terraform is a CLI. It has no scheduler, no native pause between <code>plan</code> and <code>apply</code>, no shared history with the steps that run before or after. Kestra wraps every run with cron and event triggers, a reviewer gate, automatic retries, and one execution view across Terraform, Ansible, and ArgoCD."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

pillars:
  title: "Four things Kestra adds to every Terraform run."
  subtitle: "Terraform solves reproducibility. Kestra solves the operational layer around it: when runs happen, who approves them, what runs next, and where the audit lives."
  items:
    - icon: "mdi:source-branch"
      title: "Plan, gate, and apply as one flow"
      description: "<code>terraform plan</code> and <code>terraform apply</code> become two steps in a Kestra flow. The flow pauses between them on a Pause task, surfaces the plan diff in the UI, and resumes only after a named reviewer approves. The decision is logged with a timestamp and identity."
    - icon: "mdi:clock-outline"
      title: "Native scheduling and drift detection"
      description: "Kestra runs <code>terraform plan</code> on a cron or interval schedule and checks the output. If the plan is non-empty, the flow routes the diff to Slack, email, or a webhook. No cron job on a jump box, no polling script, no missed drift."
    - icon: "mdi:pipe-disconnected"
      title: "Coordination with Ansible, ArgoCD, and the rest of the stack"
      description: "Terraform provisions the VM. Ansible configures it. ArgoCD ships the app. All three run as sequential tasks in one flow, with Terraform outputs (IPs, resource IDs) passed forward and per-step retries on the step that fails. The Terraform step does not re-run when Ansible fails."
    - icon: "mdi:eye-outline"
      title: "Per-step execution history with attribution"
      description: "Every run captures the trigger source, the inputs, the plan output, the apply result, and the reviewer. The record is searchable by date, status, or operator. Auditors get evidence by default, attached to the execution that produced it."

useCases:
  title: "How platform teams use Terraform and Kestra"
  subtitle: "Patterns infrastructure teams run in production. Pick one, copy the YAML, wire it to your stack."
  items:
    - badge: "Scheduled"
      badgeIcon: "mdi:clock-outline"
      title: "Scheduled drift detection"
      description: "Run <code>terraform plan</code> on a cron schedule against the production state. If the plan returns a non-empty diff, Kestra captures the output, posts the change set to Slack, and links straight to the execution. No one has to remember to check."
      flow:
        - node: "cron trigger"
          label: "on schedule"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "terraform plan"
          label: "capture diff"
          pluginClass: "io.kestra.plugin.terraform.cli.TerraformCLI"
        - node: "diff check"
          label: "non-empty?"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "alert"
          label: "Slack / email"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Cron + interval schedules"
          description: "Native scheduler with cron, fixed intervals, or condition-based triggers."
        - title: "Plan output stored per run"
          description: "Every drift check is timestamped, attributed, and replayable in the UI."
        - title: "Slack / email / webhook routing"
          description: "Route the diff to the team that owns the affected modules."
          wide: true
    - badge: "Governance"
      badgeIcon: "mdi:shield-check-outline"
      title: "Approval gate between plan and apply"
      description: "Run <code>terraform plan</code> automatically. Pause the flow on the plan output. A named reviewer reads the diff in the Kestra UI and resumes the flow. Only then does <code>terraform apply</code> run. The approver and timestamp land in the execution history."
      flow:
        - node: "trigger"
          label: "on event or PR"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "terraform plan"
          label: "capture diff"
          pluginClass: "io.kestra.plugin.terraform.cli.TerraformCLI"
        - node: "pause / review"
          label: "human approves"
          gate: true
          pluginClass: "io.kestra.plugin.core.flow.Pause"
        - node: "terraform apply"
          label: "with retries"
          pluginClass: "io.kestra.plugin.terraform.cli.TerraformCLI"
        - node: "audit log"
          label: "who + when"
          pluginClass: "io.kestra.plugin.core.log.Log"
      items:
        - title: "Native pause + resume"
          description: "Built-in Pause task suspends execution until a reviewer approves."
        - title: "Reviewer + timestamp logged"
          description: "Identity and approval moment stored in execution history automatically."
        - title: "Retry on transient apply errors"
          description: "Configure a per-step retry policy on <code>terraform apply</code> with backoff."
        - title: "Replayable from any step"
          description: "Re-run the apply without re-running the plan, or vice versa."
    - badge: "Full pipeline"
      badgeIcon: "mdi:pipe-disconnected"
      title: "Provision with Terraform, configure with Ansible, deploy with ArgoCD"
      description: "Run <code>terraform apply</code> to provision the VM, hand the outputs (IP, hostname) to <code>ansible-playbook</code> to configure the app, then trigger an <code>argocd app sync</code> for the deployment. If Ansible fails, Kestra retries the Ansible step. The Terraform apply does not re-run."
      flow:
        - node: "trigger"
          label: "on demand or schedule"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "terraform apply"
          label: "provision VM"
          pluginClass: "io.kestra.plugin.terraform.cli.TerraformCLI"
        - node: "ansible-playbook"
          label: "configure app"
          pluginClass: "io.kestra.plugin.ansible.cli.AnsibleCLI"
        - node: "argocd sync"
          label: "deploy"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "notify"
          label: "Slack + CMDB"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Step-level retries"
          description: "Retry only the failed step. The Terraform apply is not re-run on Ansible failure."
        - title: "Outputs flow forward"
          description: "Pass IPs, resource IDs, and Terraform output values into the next task."
        - title: "Shared execution context"
          description: "One execution ID across Terraform, Ansible, and ArgoCD. One UI to debug."
        - title: "Single audit history"
          description: "Search every run by date, status, or operator from one place."
    - badge: "Multi-env"
      badgeIcon: "mdi:source-branch"
      title: "Promotion across dev, staging, and production"
      description: "One flow runs <code>terraform apply</code> against the dev workspace, validates, pauses for a reviewer, applies against staging, validates again, pauses, then applies against production. Each gate logs the approver. Each apply runs against its own remote state."
      flow:
        - node: "trigger"
          label: "git push or webhook"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "dev apply"
          label: "workspace = dev"
          pluginClass: "io.kestra.plugin.terraform.cli.TerraformCLI"
        - node: "review"
          label: "gate"
          gate: true
          pluginClass: "io.kestra.plugin.core.flow.Pause"
        - node: "staging apply"
          label: "workspace = staging"
          pluginClass: "io.kestra.plugin.terraform.cli.TerraformCLI"
        - node: "review"
          label: "gate"
          gate: true
          pluginClass: "io.kestra.plugin.core.flow.Pause"
        - node: "prod apply"
          label: "workspace = prod"
          pluginClass: "io.kestra.plugin.terraform.cli.TerraformCLI"
      items:
        - title: "Workspace as a flow input"
          description: "Pass the target workspace, var-file, or backend config as a flow input."
        - title: "Promotion stops on failure"
          description: "A failed staging apply halts the flow before the production run."
        - title: "Reviewer per environment"
          description: "Different approvers per gate, with the identity logged at each step."
    - badge: "Self-service"
      badgeIcon: "mdi:account-multiple-outline"
      title: "Self-service VM and resource provisioning"
      description: "Wrap a Terraform module behind a Kestra App: a form with typed inputs (region, size, owner) that runs the same flow every time. Engineers request infrastructure without cloning the repo, editing HCL, or holding cloud console access."
      flow:
        - node: "Kestra App"
          label: "form input"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "generate hostname"
          label: "naming convention"
          pluginClass: "io.kestra.plugin.scripts.python.Script"
        - node: "terraform apply"
          label: "provision"
          pluginClass: "io.kestra.plugin.terraform.cli.TerraformCLI"
        - node: "notify"
          label: "Slack + IP"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Typed inputs and dropdowns"
          description: "Form inputs validated before the flow runs. No malformed <code>tfvars</code>."
        - title: "RBAC on who can run what"
          description: "Role-based access on the form itself, not on the cloud console."
        - title: "Same flow, every request"
          description: "Every provision goes through the same audited, retry-aware execution."
          wide: true
    - badge: "Operations"
      badgeIcon: "mdi:database-cog-outline"
      title: "State backend migration with auth and verification"
      description: "Move Terraform state from one backend to another (on-prem database to Azure Blob, S3 to GCS, local to remote) as one auditable flow. Kestra handles the credentialed auth step, backs up the source state, runs <code>terraform state mv</code>, and verifies the new backend before marking the migration complete."
      flow:
        - node: "auth"
          label: "workload identity"
          pluginClass: "io.kestra.plugin.azure.auth.OauthAccessToken"
        - node: "state backup"
          label: "snapshot source"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "terraform state mv"
          label: "migrate"
          pluginClass: "io.kestra.plugin.terraform.cli.TerraformCLI"
        - node: "verify"
          label: "list new backend"
          pluginClass: "io.kestra.plugin.azure.storage.blob.List"
        - node: "notify"
          label: "on complete"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Credentialed execution"
          description: "Pull workload identity tokens or static secrets from a vault, scoped per task."
        - title: "Backup before migrate"
          description: "Snapshot the source state to a versioned location before touching anything."
        - title: "Post-migration verification"
          description: "List the new backend, confirm the state file is present, halt if not."

