title: "Orchestrate Kafka with Kestra: per-record triggers, streaming ETL, and event production"
description: "Start a flow per Kafka record or on batched pulls, stream events into the warehouse, produce events after a pipeline, and trace every consumer run without running your own consumer service."

tool:
  name: "Kafka"
  pluginClass: "io.kestra.plugin.kafka.Consume"
  color: "#00bfa5"

hero:
  title: "Turn Kafka records into Kestra workflows."
  description: "Kafka moves the events. Kestra turns them into work: one execution per record in real time, or batched pulls on an interval, with the consumer, retries, and downstream chain handled for you. Stream into the warehouse, produce events after a pipeline, and trace every record in one history."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Reacting to Kafka usually means running and babysitting your own consumer service. Kestra makes the topic a trigger: <code>RealtimeTrigger</code> starts one execution per record, <code>Trigger</code> batches records on an interval, and <code>Consume</code> reads mid-flow. From there it chains straight into <a href='/orchestration/snowflake'>Snowflake</a> or <a href='/orchestration/bigquery'>BigQuery</a> loads, <a href='/orchestration/dbt-core'>dbt</a> transforms, and notifications, with retries and one execution history per record. No consumer infrastructure to operate."

pillars:
  title: "Above a hand-rolled consumer service."
  subtitle: "Kafka owns the log, the partitions, and the offsets. Kestra owns what happens to each record: how it triggers a flow, what runs next, who is alerted, and where the per-record audit trail lives."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "One execution per record, in real time"
      description: "The <code>io.kestra.plugin.kafka.RealtimeTrigger</code> consumes records as they arrive and starts one execution per record, with manual offset commits and configurable deserializers. No long-running consumer to write, deploy, and monitor; the trigger is the consumer, and each record gets its own traced run."
    - icon: "mdi:timer-outline"
      title: "Batched pulls for grouped work"
      description: "When per-record is too granular, the <code>Trigger</code> polls on a fixed interval (default one minute), batches records into one execution, and stores them in internal storage. Use it for micro-batch loads into the warehouse where grouping beats one-at-a-time."
    - icon: "mdi:database-import-outline"
      title: "Streaming ETL into the warehouse"
      description: "<code>Consume</code> writes fetched records to internal storage as ION, ready to load into <a href='/orchestration/snowflake'>Snowflake</a> or <a href='/orchestration/bigquery'>BigQuery</a>. A flow can consume a topic, transform with <a href='/orchestration/dbt-core'>dbt</a>, and land curated rows, turning a raw stream into warehouse tables with retries on each step."
    - icon: "mdi:upload-outline"
      title: "Produce events after a pipeline"
      description: "Orchestration is not only consuming. <code>Produce</code> publishes records to a topic with configurable serializers and transactional sends, so a flow can emit a completion event, a CDC-style change, or a downstream signal once its work is done. Other consumers and Kestra triggers pick it up."
    - icon: "mdi:account-multiple-outline"
      title: "Share groups and queue semantics"
      description: "Modern Kafka supports share groups for queue-style consumption with explicit acknowledgements. Kestra exposes this through <code>groupType: SHARE</code> on the consume and trigger tasks, so a topic can be worked as a queue with multiple competing consumers, not just a partitioned log."
    - icon: "mdi:server-off"
      title: "No consumer infrastructure to run"
      description: "The usual cost of reacting to Kafka is a fleet of consumer apps to deploy, scale, and page on. Kestra runs the consumer inside the orchestrator, so reacting to a topic is a trigger definition, not a service. Offsets, retries, and execution history come built in."

useCases:
  title: "How teams use Kafka and Kestra"
  subtitle: "Patterns streaming and platform teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Realtime"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Start a flow for every Kafka record"
      description: "The <code>RealtimeTrigger</code> starts one execution per record. Kestra routes by payload, runs the matching work, and alerts on anomalies. Each record gets its own traced run, with no consumer service to operate."
      flow:
        - node: "kafka trigger"
          label: "per record"
          pluginClass: "io.kestra.plugin.kafka.RealtimeTrigger"
        - node: "route"
          label: "by payload"
          pluginClass: "io.kestra.plugin.core.flow.Switch"
        - node: "process"
          label: "matching work"
          pluginClass: "io.kestra.plugin.scripts.python.Commands"
        - node: "notify"
          label: "on anomaly"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "One execution per record"
          description: "RealtimeTrigger fans each record into its own traced run."
        - title: "Manual offset commits"
          description: "Offsets commit after the work succeeds, so failures replay."
        - title: "Route by content"
          description: "A <code>Switch</code> sends each record type down its own path."
          wide: true
    - badge: "Streaming ETL"
      badgeIcon: "mdi:database-import-outline"
      title: "Stream a topic into the warehouse"
      description: "The batch <code>Trigger</code> pulls records on an interval, Kestra transforms them, and loads into <a href='/orchestration/snowflake'>Snowflake</a> or <a href='/orchestration/bigquery'>BigQuery</a>. Micro-batching turns a raw stream into curated warehouse tables with per-step retries."
      flow:
        - node: "kafka trigger"
          label: "batched pull"
          pluginClass: "io.kestra.plugin.kafka.Trigger"
        - node: "transform"
          label: "shape records"
          pluginClass: "io.kestra.plugin.serdes.json.IonToJson"
        - node: "warehouse load"
          label: "Snowflake / BQ"
          pluginClass: "io.kestra.plugin.gcp.bigquery.Load"
        - node: "notify"
          label: "on complete"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Micro-batch by interval"
          description: "The <code>Trigger</code> groups records into one execution per pull."
        - title: "ION to warehouse"
          description: "Consumed records land as ION, ready to load."
        - title: "Retries per step"
          description: "A failed load retries without re-consuming the batch."
          wide: true
    - badge: "Produce"
      badgeIcon: "mdi:upload-outline"
      title: "Emit an event when a pipeline finishes"
      description: "After a flow completes its work, <code>Produce</code> publishes a completion or CDC-style event to a topic. Downstream consumers and other Kestra flows react to it, decoupling the producer from everyone who cares."
      flow:
        - node: "schedule"
          label: "pipeline runs"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "do work"
          label: "the pipeline"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "kafka produce"
          label: "emit event"
          pluginClass: "io.kestra.plugin.kafka.Produce"
        - node: "notify"
          label: "on publish"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Decouple downstream"
          description: "Consumers react to the event without coupling to the producer."
        - title: "Transactional sends"
          description: "<code>Produce</code> uses transactional sends by default."
        - title: "Trigger other flows"
          description: "A Kestra trigger on the topic chains the next pipeline."
          wide: true
    - badge: "Queue"
      badgeIcon: "mdi:account-multiple-outline"
      title: "Work a topic as a queue with share groups"
      description: "With <code>groupType: SHARE</code>, multiple competing consumers pull from one topic with explicit acks, queue-style. Kestra runs the worker logic per record and acks on success, so a backlog drains across parallel executions."
      flow:
        - node: "kafka trigger"
          label: "share group"
          pluginClass: "io.kestra.plugin.kafka.RealtimeTrigger"
        - node: "work item"
          label: "process"
          pluginClass: "io.kestra.plugin.scripts.python.Commands"
        - node: "branch"
          label: "ack or retry"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "notify"
          label: "on failure"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Queue semantics"
          description: "Share groups give competing-consumer behavior with explicit acks."
        - title: "Drains in parallel"
          description: "A backlog spreads across parallel executions."
        - title: "Ack on success"
          description: "Records ack only after the work completes."
          wide: true
    - badge: "Bridge"
      badgeIcon: "mdi:transit-connection-variant"
      title: "Bridge Kafka to another cloud or system"
      description: "Kestra consumes a Kafka topic and writes to <a href='/orchestration/aws'>AWS</a> S3, a database, or an HTTP API, bridging Kafka to systems it does not reach natively. One execution history covers the consume and the downstream write."
      flow:
        - node: "kafka consume"
          label: "read topic"
          pluginClass: "io.kestra.plugin.kafka.Consume"
        - node: "transform"
          label: "shape payload"
          pluginClass: "io.kestra.plugin.serdes.json.IonToJson"
        - node: "s3 upload"
          label: "to AWS"
          pluginClass: "io.kestra.plugin.aws.s3.Upload"
        - node: "notify"
          label: "on complete"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Reach non-Kafka systems"
          description: "Land records in S3, a database, or an API in the same flow."
        - title: "One history end to end"
          description: "The consume and the downstream write share one execution ID."
        - title: "Retries on the write"
          description: "A failed upload retries without re-consuming the records."
          wide: true

