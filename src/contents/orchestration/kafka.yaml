faq:
  - question: "How does Kestra consume from Kafka without a separate service?"
    answer: "The trigger is the consumer. <code>io.kestra.plugin.kafka.RealtimeTrigger</code> consumes records as they arrive and starts one execution per record; <code>Trigger</code> polls on an interval and batches records into one execution. Both run inside Kestra with manual offset commits, so there is no standalone consumer app to deploy, scale, and page on."
  - question: "What's the difference between RealtimeTrigger and Trigger?"
    answer: "<code>RealtimeTrigger</code> starts one execution per record for low-latency, per-event processing. <code>Trigger</code> polls on a fixed interval (default one minute), groups records into one execution, and stores them in internal storage for micro-batch processing. Choose per-record for latency, batch for throughput and grouped loads."
  - question: "Can Kestra stream a Kafka topic into Snowflake or BigQuery?"
    answer: "Yes. <code>Consume</code> (or the batch <code>Trigger</code>) writes records to internal storage as ION, then a load task lands them in <a href='/orchestration/snowflake'>Snowflake</a> or <a href='/orchestration/bigquery'>BigQuery</a>, optionally transforming with <a href='/orchestration/dbt-core'>dbt</a> in between. Each step retries independently, so a failed load does not re-consume the batch."
  - question: "Can a flow produce events back to Kafka?"
    answer: "Yes. The <code>io.kestra.plugin.kafka.Produce</code> task publishes records to a topic with configurable serializers and transactional sends enabled by default. A common pattern emits a completion or CDC-style event after a pipeline finishes, which downstream consumers and other Kestra triggers react to."
  - question: "Does Kestra support Kafka share groups?"
    answer: "Yes. Set <code>groupType: SHARE</code> on the consume and trigger tasks for queue-style consumption with explicit acknowledgements, where multiple competing consumers pull from one topic. The default <code>groupType: CONSUMER</code> keeps classic consumer-group behavior with partitioned assignment."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. Self-hosting keeps the consumer, the credentials, and the data inside your own network, which matters when the Kafka cluster carries regulated event streams."

