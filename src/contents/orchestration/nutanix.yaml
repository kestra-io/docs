faq:
  - question: "Does Kestra replace AHV or Prism Central?"
    answer: "No. AHV stays as your hypervisor, Prism Central stays as your management plane. Kestra calls the Prism Central v4 APIs (VMM for VM lifecycle, dataprotection for recovery points) through the <code>io.kestra.plugin.ee.nutanix</code> plugin, and reaches other Nutanix surfaces (Move, Categories, LCM) through the generic <code>core.http.Request</code> task. Kestra orchestrates the workflow around your cluster, not the cluster itself."
  - question: "How do I orchestrate a VMware-to-AHV migration with Nutanix Move?"
    answer: "Move handles the data copy, Kestra handles the wave. The flow: inventory the VMware source with <code>vmware.vcenter.ListVms</code>, log in to Move (<code>POST /v2/users/login</code>), create or pick a migration plan, poll <code>/v2/plans/{id}/workloads/list</code> until each workload reaches state 5 (ready for cutover), gate the wave with the Pause task, then post the <code>cutover</code> action per workload. Once cutover succeeds, call <code>nutanix.ahv.StartVm</code> on the target and hand off to the <a href='/plugins/plugin-ansible'>Ansible plugin</a> for domain join and agent install. The vCenter source stays live until cutover, so the rollback path is to power the source back on if the post-cutover health check fails."
  - question: "What about Nutanix Self-Service (Calm) and X-Play?"
    answer: "Calm (renamed NCM Self-Service) is the catalog layer above Prism. X-Play is the runbook layer. Both are what Kestra replaces. Calm blueprints become Kestra YAML flows that can still call your existing Python actions. The Calm self-service catalog becomes Kestra Apps with typed inputs, RBAC, and an execution audit trail. X-Play playbooks become Kestra flows triggered by alerts, schedule, or webhook. AHV stays where it is."
  - question: "How does the recovery point pattern work?"
    answer: "<code>CreateVmSnapshot</code> emits a recovery point through the dataprotection v4 API and returns a <code>snapshotExtId</code>. That ID is stored in the execution outputs and reusable from any downstream task, including the <code>errors</code> branch. If the post-change health probe fails, <code>RestoreVmSnapshot</code> runs against that exact ID and reverts the VM. Both crash-consistent and application-consistent (Guest Tools quiesce) modes are supported, with optional <code>expirationTime</code> so old recovery points cycle out automatically."
  - question: "Can Kestra replicate recovery points across clusters for DR?"
    answer: "Yes, through the v4 dataprotection API. The flow: <code>CreateVmSnapshot</code> on the production cluster, then a <code>core.http.Request</code> POST to the v4 replication endpoint, then <code>ListVmSnapshots</code> on the DR cluster to verify the replica landed. Set retention per environment via the <code>expirationTime</code> field. The same flow can be flipped for a DR drill: restore on the DR cluster, validate, restore production routing."
  - question: "How does Kestra handle Prism Central credentials?"
    answer: "Credentials come from Kestra's secrets backend (built-in, or HashiCorp Vault, CyberArk, AWS Secrets Manager, GCP Secret Manager) and are injected at task execution time. The plugin accepts a bearer <code>token</code> or a <code>username</code> and <code>password</code>, plus the Prism Central <code>host</code> (and optional <code>port</code>, defaulting to 9440). Set them once via <code>pluginDefaults</code> at flow or namespace level and every Nutanix task picks them up."
  - question: "How does ListVms filtering actually work?"
    answer: "The VMM v4 API supports OData on <code>ListVms</code>. The plugin exposes <code>filter</code>, <code>orderBy</code>, <code>select</code>, and pagination directly. Examples: <code>powerState eq 'ON' and contains(name, 'prod-')</code>, or <code>categories/any(c: c eq 'dept/finance')</code>. With <code>fetchType: STORE</code> the result lands as an ION file in internal storage, so downstream Python tasks can stream through 10,000 VM rows without loading them all in memory."
  - question: "Is the Nutanix plugin Enterprise-only?"
    answer: "Yes, the <code>io.kestra.plugin.ee.nutanix</code> plugin is part of Kestra Enterprise. Kestra Enterprise also includes Apps, RBAC, audit logs, worker isolation, and SSO, which infrastructure teams replacing Calm typically need on top. For the broader context across Terraform, Ansible, Argo CD, and cloud APIs, see <a href='/infra-automation'>Kestra for infrastructure automation</a> and the dedicated <a href='/orchestration/terraform'>Terraform orchestration page</a>."
  - question: "Can Kestra run inside an air-gapped Nutanix environment?"
    answer: "Yes. Kestra ships self-hosted on Docker or Kubernetes, runs fully air-gapped, and supports per-cluster control planes with remote workers close to each Prism Central endpoint. AD-backed authentication, least-privilege RBAC, and log shipping to the enterprise SIEM are all supported on-prem with no external dependency."

