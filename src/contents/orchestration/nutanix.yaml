    - name: "Nutanix Self-Service (Calm)"
    - name: "HPE Morpheus"
      logoAsset: "morpheus"
    - name: "Jenkins + scripts"
      pluginClass: "io.kestra.plugin.jenkins.JobBuild"
  rows:
    - feature: "Workflow language"
      kestra: "✓ Declarative YAML, Git-native, plus polyglot scripts (Python, JS, Bash, Groovy, R)"
      values:
        - "Calm blueprints (DSL) plus Python actions"
        - "Cypher / Morpheus-specific scripts"
        - "Groovy pipelines"
    - feature: "Scheduling"
      kestra: "✓ Native cron + intervals + events"
      values:
        - "Calm scheduler (basic)"
        - "Native scheduler"
        - "Cron in pipelines"
    - feature: "Snapshot-first patching with rollback"
      kestra: "✓ Native, snapshotExtId flows forward"
      values:
        - "Custom Calm blueprint per pattern"
        - "Built-in policy actions"
        - "Manual via shell + REST"
    - feature: "Chain with Ansible, Terraform, ServiceNow"
      kestra: "✓ Native, with outputs"
      values:
        - "Calm integrations (limited extensibility)"
        - "Built-in connectors (proprietary)"
        - "Possible, glue scripts required"
    - feature: "Self-service forms with RBAC"
      kestra: "✓ Kestra Apps, typed inputs"
      values:
        - "Calm self-service catalog"
        - "Built-in self-service catalog"
        - "Parameterized build"
    - feature: "Per-VM execution history with attribution"
      kestra: "✓ Execution view + task state"
      values:
        - "Calm run history"
        - "Morpheus task history"
        - "Build history"
    - feature: "Air-gapped / private network deploy"
      kestra: "✓ Self-hosted, per-zone control plane"
      values:
        - "Centralized appliance"
        - "Centralized appliance"
        - "Self-hosted"
    - feature: "Orchestrate beyond Nutanix"
      kestra: "✓ 1300+ plugins, cross-stack"
      values:
        - "Nutanix-centric, multi-cloud add-ons"
        - "Multi-cloud (proprietary connectors)"
        - "Possible, plugin-dependent"

faq:
  - question: "Does Kestra replace AHV or Prism Central?"
    answer: "No. AHV is your hypervisor, Prism Central is your management plane, and both stay in place. Kestra calls the Prism Central v4 APIs (VMM for lifecycle, dataprotection for snapshots) through the <code>io.kestra.plugin.ee.nutanix</code> plugin to run the operations you used to script: <code>CreateVm</code>, <code>CloneVm</code>, <code>CreateVmSnapshot</code>, <code>RestoreVmSnapshot</code>, and so on. Kestra orchestrates the workflow around your cluster."
  - question: "What about Nutanix Calm / NCM Self-Service?"
    answer: "Calm (renamed NCM Self-Service) is the automation and self-service layer Nutanix ships above Prism Central. That is the layer Kestra replaces. Calm blueprints become Kestra YAML flows. The Calm self-service catalog becomes Kestra Apps with typed inputs and RBAC. Calm Python actions stay where they are: Kestra can call them, or you can move them inline into <code>scripts.python.Commands</code>. The hypervisor doesn't move, only the orchestration UI above it."
  - question: "How does the snapshot-and-restore pattern work?"
    answer: "<code>CreateVmSnapshot</code> emits a recovery point through the Nutanix dataprotection v4 API and returns a <code>snapshotExtId</code>. That ID is stored in the execution outputs and reusable from any downstream task, including the <code>errors</code> branch. If the post-change health probe fails, <code>RestoreVmSnapshot</code> runs against that exact ID and reverts the VM. Both crash-consistent and application-consistent modes are supported, with optional expiration so old recovery points don't pile up."
  - question: "Can Kestra chain Nutanix with Terraform, Ansible, and ServiceNow in one flow?"
    answer: "Yes. Each tool runs as a task in one Kestra flow. <code>CreateVm</code> with <code>wait: true</code> emits the VM's IP and AHV extId. The next Ansible task templates those into the inventory and runs the playbook. ServiceNow lands the CMDB record. If Ansible fails, Kestra retries only that step, the Nutanix create is not re-run. One execution ID, one audit trail, one place to debug."
  - question: "How does Kestra handle Prism Central credentials?"
    answer: "Credentials come from Kestra's secrets backend (built-in, or HashiCorp Vault, CyberArk, AWS Secrets Manager, GCP Secret Manager) and are injected at task execution time. The plugin accepts a bearer <code>token</code> or a <code>username</code> and <code>password</code>, plus the Prism Central <code>host</code> (and optional <code>port</code>, defaulting to 9440). Set them once via <code>pluginDefaults</code> at flow or namespace level and every Nutanix task picks them up."
  - question: "Is the Nutanix plugin Enterprise-only?"
    answer: "Yes, the <code>io.kestra.plugin.ee.nutanix</code> plugin is part of Kestra Enterprise. Kestra Enterprise also includes the Apps layer, RBAC, audit logs, worker isolation, and SSO that infrastructure teams replacing Calm typically need."
  - question: "Can Kestra run inside an air-gapped Nutanix environment?"
    answer: "Yes. Kestra ships self-hosted on Docker or Kubernetes, runs fully air-gapped, and supports per-cluster control planes with remote workers close to each Prism Central endpoint. AD-backed authentication, least-privilege RBAC, and log shipping to the enterprise SIEM are all supported on-prem with no external dependency."

