blueprints:
  title: "Blueprints for Nutanix orchestration."
  lead: "One blueprint per use case above. Copy the YAML, point it at your Prism Central, ship it."
  items:
    - name: "Safe patching with rollback"
      title: "Pre-patch snapshot, OS update, rollback on health-check failure"
      description: "Provisions or selects an AHV VM, emits a pre-patch recovery point, runs the OS update over SSH, waits for reboot, and probes a health endpoint. The <code>errors</code> branch restores the snapshot and notifies Slack on failure. Shipped as a working blueprint in the Kestra catalog."
      href: "/blueprints?tags=Infrastructure"
      plugins:
        - "io.kestra.plugin.ee.nutanix.ahv.CreateVm"
        - "io.kestra.plugin.ee.nutanix.snapshot.CreateVmSnapshot"
        - "io.kestra.plugin.scripts.shell.Commands"
        - "io.kestra.plugin.ee.nutanix.snapshot.RestoreVmSnapshot"
        - "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      code: |
        id: nutanix-safe-patching-workflow
        namespace: company.team
        description: Provision a Nutanix AHV VM, emit VM/snapshot assets, apply OS updates, and rollback automatically on failure.

        inputs:
          - id: vm_name
            type: STRING
            defaults: "prod-web-server-01"

        tasks:
          - id: provision_vm
            type: io.kestra.plugin.ee.nutanix.ahv.CreateVm
            wait: true
            vm:
              name: "{{ inputs.vm_name }}"
              description: "VM created by Kestra"
              cluster:
                extId: "{{ secret('NUTANIX_CLUSTER_EXT_ID') }}"
              resources:
                numSockets: 1
                numCoresPerSocket: 2
                memorySizeBytes: 2147483648
                disks: []

          - id: safe_patching_block
            type: io.kestra.plugin.core.flow.Sequential
            tasks:
              - id: pre_patch_snapshot
                type: io.kestra.plugin.ee.nutanix.snapshot.CreateVmSnapshot
                vmExtId: "{{ outputs.provision_vm.vmExtId }}"
                snapshotName: "pre_patch_{{ execution.id }}"

              - id: apply_updates
                type: io.kestra.plugin.scripts.shell.Commands
                commands:
                  - ssh -o StrictHostKeyChecking=no admin@{{ outputs.provision_vm.vmIpAddresses[0] }} "sudo apt update && sudo apt upgrade -y && sudo reboot"

              - id: wait_for_boot
                type: io.kestra.plugin.core.flow.Pause
                delay: PT1M

              - id: health_check
                type: io.kestra.plugin.core.http.Request
                uri: "http://{{ outputs.provision_vm.vmIpAddresses[0] }}/health"
                method: "GET"

              - id: notify_success
                type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
                url: "{{ secret('SLACK_WEBHOOK') }}"
                messageText: ":white_check_mark: Patching succeeded for {{ inputs.vm_name }}."

        errors:
          - id: rollback
            type: io.kestra.plugin.ee.nutanix.snapshot.RestoreVmSnapshot
            snapshotExtId: "{{ outputs.safe_patching_block.pre_patch_snapshot.snapshotExtId }}"

          - id: notify_oncall
            type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
            url: "{{ secret('SLACK_WEBHOOK') }}"
            messageText: ":alert: Patching failed for {{ inputs.vm_name }}, rolled back to pre-patch state. <{{ execution.url }}|View execution>"

        pluginDefaults:
          - type: io.kestra.plugin.ee.nutanix
            values:
              host: "{{ secret('NUTANIX_HOST') }}"
              token: "{{ secret('NUTANIX_TOKEN') }}"
    - name: "Provision, configure, register"
      title: "Provision an AHV VM, configure with Ansible, register in ServiceNow"
      description: "<code>CreateVm</code> creates a VM and waits for an IP. <code>ansible-playbook</code> joins the domain and installs agents, with per-step retries. <code>ServiceNow.Post</code> lands a CMDB record. Slack confirms when all three steps succeed."
      href: "/blueprints?tags=Infrastructure"
      plugins:
        - "io.kestra.plugin.ee.nutanix.ahv.CreateVm"
        - "io.kestra.plugin.ansible.cli.AnsibleCLI"
        - "io.kestra.plugin.servicenow.Post"
        - "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      code: |
        id: nutanix-provision-configure-register
        namespace: company.platform

        inputs:
          - id: vm_name
            type: STRING
            defaults: "app-server-01"
          - id: environment
            type: SELECT
            values: [dev, staging, production]
            defaults: staging

        tasks:
          - id: provision_vm
            type: io.kestra.plugin.ee.nutanix.ahv.CreateVm
            wait: true
            vm:
              name: "{{ inputs.vm_name }}"
              description: "Provisioned by Kestra execution {{ execution.id }}"
              cluster:
                extId: "{{ secret('NUTANIX_CLUSTER_EXT_ID') }}"
              resources:
                numSockets: 2
                numCoresPerSocket: 2
                memorySizeBytes: 4294967296
                disks: []

          - id: ansible_configure
            type: io.kestra.plugin.ansible.cli.AnsibleCLI
            inputFiles:
              inventory.ini: |
                [app]
                {{ inputs.vm_name }} ansible_host={{ outputs.provision_vm.vmIpAddresses[0] }} ansible_user=ubuntu
              configure.yml: "{{ read(secret('ANSIBLE_PLAYBOOK')) }}"
            commands:
              - ansible-playbook -i inventory.ini configure.yml --extra-vars "env={{ inputs.environment }}"
            retry:
              type: constant
              interval: PT2M
              maxAttempt: 3

          - id: servicenow_register
            type: io.kestra.plugin.servicenow.Post
            domain: "{{ secret('SERVICENOW_DOMAIN') }}"
            username: "{{ secret('SERVICENOW_USER') }}"
            password: "{{ secret('SERVICENOW_PASSWORD') }}"
            clientId: "{{ secret('SERVICENOW_CLIENT_ID') }}"
            clientSecret: "{{ secret('SERVICENOW_CLIENT_SECRET') }}"
            table: cmdb_ci_server
            data:
              name: "{{ inputs.vm_name }}"
              ip_address: "{{ outputs.provision_vm.vmIpAddresses[0] }}"
              environment: "{{ inputs.environment }}"
              short_description: "Provisioned by Kestra execution {{ execution.id }}"

          - id: notify
            type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
            url: "{{ secret('SLACK_WEBHOOK') }}"
            payload: |
              {
                "text": ":rocket: {{ inputs.vm_name }} provisioned on Nutanix ({{ outputs.provision_vm.vmIpAddresses[0] }}), configured with Ansible, and registered in ServiceNow."
              }

        pluginDefaults:
          - type: io.kestra.plugin.ee.nutanix
            values:
              host: "{{ secret('NUTANIX_HOST') }}"
              token: "{{ secret('NUTANIX_TOKEN') }}"
    - name: "Ephemeral CI environments"
      title: "Clone an AHV VM for CI, run tests, decommission at end of pipeline"
      description: "On a CI webhook, <code>CloneVm</code> creates a fresh AHV VM from a golden template. The test suite runs against it over SSH. <code>DeleteVm</code> runs in the main flow on success and from the <code>errors</code> branch on failure, so the VM is always torn down."
      href: "/blueprints?tags=Infrastructure"
      plugins:
        - "io.kestra.plugin.ee.nutanix.ahv.CloneVm"
        - "io.kestra.plugin.scripts.shell.Commands"
        - "io.kestra.plugin.ee.nutanix.ahv.DeleteVm"
        - "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      code: |
        id: nutanix-ephemeral-ci-environment
        namespace: company.ci

        triggers:
          - id: ci_webhook
            type: io.kestra.plugin.core.trigger.Webhook
            key: nutanix_ci_env

        tasks:
          - id: clone_vm
            type: io.kestra.plugin.ee.nutanix.ahv.CloneVm
            sourceExtId: "{{ secret('NUTANIX_CI_TEMPLATE_EXT_ID') }}"
            cloneOverrides:
              name: "ci-{{ trigger.body.pipeline_id }}"
            wait: true

          - id: run_tests
            type: io.kestra.plugin.scripts.shell.Commands
            commands:
              - ssh -o StrictHostKeyChecking=no ci@{{ outputs.clone_vm.vmIpAddresses[0] }} "./run-ci.sh {{ trigger.body.pipeline_id }}"

          - id: delete_vm
            type: io.kestra.plugin.ee.nutanix.ahv.DeleteVm
            vmExtId: "{{ outputs.clone_vm.vmExtId }}"

          - id: notify_success
            type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
            url: "{{ secret('SLACK_WEBHOOK') }}"
            messageText: ":white_check_mark: CI run {{ trigger.body.pipeline_id }} passed and VM was decommissioned."

        errors:
          - id: cleanup_vm
            type: io.kestra.plugin.ee.nutanix.ahv.DeleteVm
            vmExtId: "{{ outputs.clone_vm.vmExtId }}"

          - id: notify_failure
            type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
            url: "{{ secret('SLACK_WEBHOOK') }}"
            messageText: ":alert: CI run {{ trigger.body.pipeline_id }} failed, VM was torn down. <{{ execution.url }}|View execution>"

        pluginDefaults:
          - type: io.kestra.plugin.ee.nutanix
            values:
              host: "{{ secret('NUTANIX_HOST') }}"
              token: "{{ secret('NUTANIX_TOKEN') }}"

