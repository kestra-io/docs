title: "Orchestrate Nutanix HCI with Kestra: AHV lifecycle, snapshots, and recovery"
description: "Nutanix powers your hyperconverged infrastructure. Kestra runs the workflows around it: trigger on schedule or events, capture recovery points before patching, restore automatically on failure, and chain Nutanix with Ansible, Terraform, and ServiceNow."

tool:
  name: "Nutanix"
  pluginClass: "io.kestra.plugin.ee.nutanix.ahv.CreateVm"
  color: "#024DA1"

hero:
  title: "Your Nutanix clusters, fully orchestrated."
  description: "Trigger AHV tasks from cron, webhooks, or any HTTP signal. Capture crash- or app-consistent recovery points before patching, restore on a failed health check, and chain Nutanix with Ansible, Terraform, and ServiceNow in one execution history."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

pillars:
  title: "Above Prism, around every AHV operation."
  subtitle: "What Kestra wraps around your Nutanix clusters: when actions fire, what gets a recovery point first, who approves a destructive op, and where the audit lives. Prism Central and your AHV hosts stay in place. The Calm / Self-Service catalog gets replaced."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "Schedule and event triggers wrapped around AHV operations"
      description: "Native cron, fixed intervals, webhooks, S3 file arrivals, Kafka messages, and database row changes fire a Nutanix task directly. The trigger payload reaches the flow as <code>trigger.body</code>, so the right VM gets the right inputs from a single execution. No webhook bus on Prism, no polling script."
    - icon: "mdi:camera-outline"
      title: "Crash- or app-consistent recovery points before any risky change"
      description: "<code>CreateVmSnapshot</code> emits a crash- or application-consistent recovery point through the Nutanix dataprotection v4 API, with optional expiration. <code>RestoreVmSnapshot</code> reverts on a failed health check. The <code>snapshotExtId</code> flows forward, so every change has a documented rollback target."
    - icon: "mdi:transit-connection-variant"
      title: "AHV provisioning, Ansible configuration, ServiceNow registration, in one flow"
      description: "<code>CreateVm</code> creates a VM through the VMM v4 API and, with <code>wait: true</code>, polls until the first IPv4 address is available. The IP flows into <code>ansible-playbook</code> to join the domain and install agents. <code>ServiceNow.Post</code> lands the CMDB record. One execution ID across all three."
    - icon: "mdi:source-branch"
      title: "Template lifecycle as code"
      description: "<code>CloneTemplate</code>, <code>ConvertVmToTemplate</code>, <code>ConvertTemplateToVm</code>, and <code>CloneVm</code> chain together as flow steps. Versioned base images become typed inputs in a Kestra App, so operators deploy from a dropdown instead of clicking through Prism Central. Every template change has an execution attached."
    - icon: "mdi:shield-check-outline"
      title: "Approval gates and self-service forms in front of every destructive action"
      description: "The Pause task suspends the flow before <code>DeleteVm</code>, <code>ResetVm</code>, or a template conversion. A Kestra App is a typed form bound to the flow: dropdowns for the cluster, the VM, the recovery point, the target environment. Operators submit. RBAC controls who can launch what."
    - icon: "mdi:history"
      title: "Per-VM, per-task execution history"
      description: "Every AHV task captures the VM <code>extId</code>, the operator, the inputs, and the async <code>taskExtId</code> returned by the v4 API. The record is searchable by date, status, or VM. Auditors get evidence by default, attached to the execution that produced it."

useCases:
  title: "How infrastructure teams use Nutanix and Kestra"
  subtitle: "Patterns AHV admins and platform teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Operations"
      badgeIcon: "mdi:camera-outline"
      title: "Pre-patch snapshot, OS update, rollback on health-check failure"
      description: "<code>CreateVmSnapshot</code> emits a crash-consistent recovery point on the target AHV VM. A Shell task runs the OS update over SSH and reboots the VM. An HTTP probe checks the application. On any failure, the <code>errors</code> branch fires <code>RestoreVmSnapshot</code> against the same <code>snapshotExtId</code> and pages the on-call. Shipped as a working Kestra blueprint."
      flow:
        - node: "cron trigger"
          label: "patch window"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "pre-patch snapshot"
          label: "recovery point"
          pluginClass: "io.kestra.plugin.ee.nutanix.snapshot.CreateVmSnapshot"
        - node: "ssh patch"
          label: "apt / yum upgrade"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "health check"
          label: "HTTP probe"
          pluginClass: "io.kestra.plugin.core.http.Request"
        - node: "rollback on fail"
          label: "restore snapshot"
          pluginClass: "io.kestra.plugin.ee.nutanix.snapshot.RestoreVmSnapshot"
        - node: "notify"
          label: "Slack"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Snapshot ID captured per run"
          description: "<code>snapshotExtId</code> is stored in the execution outputs and reusable from the rollback branch."
        - title: "Crash- or app-consistent"
          description: "Pick the consistency mode per VM; the v4 API supports both, with optional expiration."
        - title: "Automatic rollback"
          description: "The <code>errors</code> branch restores the snapshot if the post-patch probe fails, no human required."
        - title: "On-call alert with execution link"
          description: "Slack message includes the VM name, snapshot ID, and the URL of the failing execution."
      signal: "Published as the <code>nutanix-safe-patching-workflow</code> blueprint in the Kestra catalog."
    - badge: "Full pipeline"
      badgeIcon: "mdi:pipe-disconnected"
      title: "Provision an AHV VM, configure with Ansible, register in ServiceNow"
      description: "<code>CreateVm</code> creates a VM on a target Nutanix cluster through the VMM v4 API. With <code>wait: true</code> the task polls for the first IPv4 address. That IP flows into <code>ansible-playbook</code> to join the domain, install agents, and apply config. <code>ServiceNow.Post</code> lands a CMDB record. Slack confirms."
      flow:
        - node: "ServiceNow webhook"
          label: "approved ticket"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "Create AHV VM"
          label: "wait for IP"
          pluginClass: "io.kestra.plugin.ee.nutanix.ahv.CreateVm"
        - node: "ansible-playbook"
          label: "configure host"
          pluginClass: "io.kestra.plugin.ansible.cli.AnsibleCLI"
        - node: "ServiceNow"
          label: "CMDB update"
          pluginClass: "io.kestra.plugin.servicenow.Post"
        - node: "notify"
          label: "Slack"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "wait: true returns the IP"
          description: "Kestra polls the VMM v4 API until the first IPv4 address is available, then continues."
        - title: "Outputs flow forward"
          description: "Pass the VM name, IP, and AHV extId into the Ansible inventory and the ServiceNow record."
        - title: "Step-level retries"
          description: "Retry only the failed step. The <code>CreateVm</code> does not re-run when the playbook fails."
        - title: "CMDB stays in sync"
          description: "Every provision lands a record in ServiceNow with the Nutanix metadata attached."
    - badge: "Ephemeral"
      badgeIcon: "mdi:cog-refresh-outline"
      title: "Ephemeral AHV environments for CI, decommissioned at end of pipeline"
      description: "On a CI webhook, <code>CloneVm</code> creates a fresh AHV VM from a golden template. The test suite runs against it. <code>DeleteVm</code> tears it down when the pipeline finishes, or on failure through the <code>errors</code> branch. The VM <code>extId</code>, IP, and run logs stay in the execution history for post-mortems."
      flow:
        - node: "CI webhook"
          label: "pipeline start"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "Clone VM"
          label: "from template"
          pluginClass: "io.kestra.plugin.ee.nutanix.ahv.CloneVm"
        - node: "run tests"
          label: "ssh / pytest"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "Delete VM"
          label: "always"
          pluginClass: "io.kestra.plugin.ee.nutanix.ahv.DeleteVm"
        - node: "notify"
          label: "Slack"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "One template, many CI runs"
          description: "Clone from a single AHV template so every pipeline gets the same baseline."
        - title: "Guaranteed teardown"
          description: "The <code>DeleteVm</code> step runs from the errors branch on any failure, so leaks don't pile up."
        - title: "Per-pipeline audit trail"
          description: "Every CI run has a Kestra execution with the VM extId and test output attached."
    - badge: "Self-service"
      badgeIcon: "mdi:account-multiple-outline"
      title: "Self-service VM operations behind a Kestra App"
      description: "Replace the Calm / Self-Service catalog with a typed form. Operators pick the cluster, template, recovery point, and target environment from dropdowns. The same audited flow runs every time. RBAC controls who can launch what. No Prism Central console handouts."
      flow:
        - node: "Kestra App"
          label: "typed form"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "validate inputs"
          label: "RBAC + schema"
          pluginClass: "io.kestra.plugin.core.log.Log"
        - node: "Clone or Create VM"
          label: "AHV"
          pluginClass: "io.kestra.plugin.ee.nutanix.ahv.CloneVm"
        - node: "ansible-playbook"
          label: "configure"
          pluginClass: "io.kestra.plugin.ansible.cli.AnsibleCLI"
        - node: "notify"
          label: "Slack + audit"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Typed inputs and dropdowns"
          description: "Form inputs validated before the run. Cluster, template, network all picked from live data."
        - title: "RBAC on who can run what"
          description: "Role-based access on the form itself, not on Prism Central handouts."
        - title: "Same flow, every request"
          description: "Every submission goes through the same audited, retry-aware execution."
          wide: true

