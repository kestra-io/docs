faq:
  - question: "What's the difference between SQL Server Agent and Kestra?"
    answer: "SQL Server Agent runs job steps, T-SQL scripts, and SSIS packages on a schedule inside one instance. It has no concept of an external event, cannot bulk-load across two instances in chunks, and cannot react to CDC without extra tooling. Kestra runs above the instance: it triggers <code>io.kestra.plugin.jdbc.sqlserver.Query</code> or <code>Queries</code> on a schedule or an event, chains SQL Server with <a href='/orchestration/snowflake'>Snowflake</a> or <a href='/orchestration/slack'>Slack</a>, and gives one execution history across every tool. Kestra works alongside Agent, not instead of it, for teams keeping existing jobs running."
  - question: "What does Kestra add to a SQL Server setup?"
    answer: "Kestra chains SQL Server extraction with <a href='/orchestration/microsoft-fabric'>Microsoft Fabric</a> OneLake, <a href='/orchestration/dbt-core'>dbt</a> transforms on the loaded tables, or Slack and Teams alerts, all inside one execution history. It adds event triggers Agent does not have, chunked bulk inserts between instances, and CDC via Debezium with no Kafka Connect cluster to run."
  - question: "How does Kestra bulk-load data between two SQL Server instances?"
    answer: "<code>io.kestra.plugin.jdbc.sqlserver.Batch</code> reads a stored result set (usually the output of a prior <code>Query</code> with <code>fetchType: STORE</code>) and inserts it into the destination using prepared-statement JDBC batches, in chunks of 1,000 rows by default. Point <code>table</code> at the destination and Kestra auto-discovers the columns, or supply an explicit parameterized <code>sql</code> insert. Transient failures retry and resume from the last committed chunk."
  - question: "Can Kestra react to SQL Server CDC without deploying Kafka Connect?"
    answer: "Yes. <code>io.kestra.plugin.debezium.sqlserver.RealtimeTrigger</code> embeds the Debezium engine directly and starts one flow execution per captured row change, with no Kafka cluster or Kafka Connect deployment to operate. Use <code>io.kestra.plugin.debezium.sqlserver.Trigger</code> instead if you want to batch changes on a polling interval rather than react to every row in real time."
  - question: "How does Kestra run a transactional, multi-statement SQL Server load?"
    answer: "Use <code>io.kestra.plugin.jdbc.sqlserver.Queries</code> to run the staging insert, the MERGE, and a watermark update as one transaction, since <code>transaction</code> defaults to <code>true</code>. If any statement fails, the whole batch rolls back, so the target table never holds a half-applied load. Set <code>transaction: false</code> only if your statements intentionally need independent commits."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted gives complete control over where your pipeline execution and database credentials live."

