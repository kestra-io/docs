title: "Orchestrate SQL Server with Kestra: event-driven queries, chunked bulk loads, and CDC without Kafka"
description: "Trigger SQL Server queries on events instead of Agent cron jobs, bulk-load between instances in chunks, run transactional multi-statement loads, and react to CDC changes without deploying Kafka Connect."

tool:
  name: "SQL Server"
  pluginClass: "io.kestra.plugin.jdbc.sqlserver.Query"
  color: "#ee352c"

hero:
  title: "Drive SQL Server from events, not SQL Server Agent's clock."
  description: "SQL Server Agent runs job steps and SSIS packages on a schedule inside one instance. Kestra decides when a query runs, what feeds it, and what runs next. Trigger on file arrivals or upstream flows, bulk-load between instances in chunks, run multi-statement loads as one transaction, and react to row-level changes in real time."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "SQL Server Agent covers job scheduling inside the instance. Kestra covers everything around it: it bulk-loads changed rows between instances in chunks, chains a SQL Server extract with <a href='/orchestration/snowflake'>Snowflake</a> or object storage in one flow, and reacts to change data capture in real time with no Kafka Connect cluster to operate. A failed batch rolls back as one transaction, and every run posts to <a href='/orchestration/slack'>Slack</a> or Teams on completion or failure."

pillars:
  title: "Above the SQL Server Agent job step."
  subtitle: "SQL Server Agent runs T-SQL, stored procedures, and SSIS packages on a clock. Kestra runs the steps around the query: what triggers it, how data moves between instances, who gets notified, and where the cross-tool audit trail lives."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "Event-driven queries, not Agent cron"
      description: "SQL Server Agent runs job steps on a schedule and has no concept of an upstream event. Kestra triggers <code>io.kestra.plugin.jdbc.sqlserver.Query</code> the moment a file lands, an API responds, or another flow finishes, and the <code>Trigger</code> task polls SQL Server itself and starts a flow when a query returns rows."
    - icon: "mdi:database-arrow-right-outline"
      title: "Chunked bulk inserts across instances"
      description: "Moving rows between SQL Server instances usually means a linked server, an SSIS package, or a hand-rolled loop. <code>io.kestra.plugin.jdbc.sqlserver.Batch</code> reads a stored result set and bulk-inserts it in configurable chunks (1,000 rows by default) using prepared-statement JDBC batches, with retry and resume on transient failures."
    - icon: "mdi:swap-horizontal"
      title: "Transactional multi-statement loads"
      description: "A load is rarely one statement: stage, dedupe, MERGE, update a watermark. <code>io.kestra.plugin.jdbc.sqlserver.Queries</code> runs the whole block as one transaction (the default, via <code>transaction: true</code>), so a failure rolls back the batch and a partial load never lands on the target table."
    - icon: "mdi:database-sync-outline"
      title: "CDC without standing up Kafka Connect"
      description: "SQL Server's own change data capture writes to system tables, but nothing in SQL Server itself turns that into a downstream action. <code>io.kestra.plugin.debezium.sqlserver.RealtimeTrigger</code> embeds the Debezium engine directly, starting one execution per row change with no Kafka cluster or Kafka Connect deployment required."
    - icon: "mdi:transit-connection-variant"
      title: "Cross-system chains beyond the Microsoft stack"
      description: "SQL Server Agent only knows the instance it runs on. Kestra chains a SQL Server extract with <a href='/orchestration/snowflake'>Snowflake</a>, object storage, <a href='/orchestration/slack'>Slack</a>, or a REST API in the same flow, so a cross-database migration shows up as one execution instead of three disconnected jobs."
    - icon: "mdi:history"
      title: "Full audit trail and replay across a fragmented estate"
      description: "SSIS packages are binary, hard to diff, and their run history lives inside Agent's own tables. Every Kestra execution stores its inputs, outputs, and logs, so a failed nightly load can be inspected, fixed, and replayed from the exact step that failed, without re-running the whole chain."

useCases:
  title: "How teams use SQL Server and Kestra"
  subtitle: "Patterns data platform teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Incremental sync"
      badgeIcon: "mdi:database-sync-outline"
      title: "Move only what changed between two SQL Server instances"
      description: "A nightly sync used to mean a linked server query or a custom loop. Kestra reads a watermark from the KV Store, pulls changed rows with <code>Query</code>, and bulk-inserts the delta with <code>Batch</code> in 1,000-row chunks. The same pattern feeds a <a href='/orchestration/snowflake'>Snowflake</a> warehouse just as easily."
      flow:
        - node: "read watermark"
          label: "KV Store"
          pluginClass: "io.kestra.plugin.core.kv.Get"
        - node: "extract delta"
          label: "changed rows"
          pluginClass: "io.kestra.plugin.jdbc.sqlserver.Query"
        - node: "bulk insert"
          label: "chunked batches"
          pluginClass: "io.kestra.plugin.jdbc.sqlserver.Batch"
        - node: "advance watermark"
          label: "on success only"
          pluginClass: "io.kestra.plugin.core.kv.Set"
      items:
        - title: "Resumable after failure"
          description: "The watermark only advances once the destination load commits."
        - title: "Chunked, not row-by-row"
          description: "<code>Batch</code> sends 1,000-row JDBC batches per round trip by default."
        - title: "No external state table"
          description: "Watermark state lives in Kestra's own KV Store, no schema change needed."
          wide: true
    - badge: "CDC"
      badgeIcon: "mdi:pulse"
      title: "React to row changes the moment they happen"
      description: "SQL Server's CDC captures changes into system tables, but nothing acts on them. <code>io.kestra.plugin.debezium.sqlserver.RealtimeTrigger</code> streams row-level changes, one execution per row, with no <a href='/orchestration/kafka'>Kafka</a> or Kafka Connect cluster to run. High-value changes alert Teams; every change is logged for audit."
      flow:
        - node: "CDC stream"
          label: "row changed"
          pluginClass: "io.kestra.plugin.debezium.sqlserver.RealtimeTrigger"
        - node: "log change"
          label: "audit trail"
          pluginClass: "io.kestra.plugin.core.log.Log"
        - node: "check value"
          label: "threshold?"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "notify"
          label: "Teams"
          pluginClass: "io.kestra.plugin.microsoft365.teams.TeamsIncomingWebhook"
      items:
        - title: "No Kafka Connect cluster"
          description: "The Debezium engine runs embedded in the trigger, not as a separate connector deployment."
        - title: "One execution per row"
          description: "Each change is independently retried, logged, and replayable."
        - title: "Selective alerting"
          description: "An <code>If</code> branches on value so routine changes stay quiet."
          wide: true
    - badge: "Reporting"
      badgeIcon: "mdi:file-chart-outline"
      title: "Replace Agent report jobs and Database Mail"
      description: "An Agent job step can run a stored procedure, but attaching a CSV to an authenticated email and skipping empty days takes custom T-SQL and Database Mail configuration. Kestra runs the aggregate query, converts the result to CSV with <code>IonToCsv</code>, and emails it only when the day produced rows."
      flow:
        - node: "schedule"
          label: "06:00 UTC"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "aggregate"
          label: "daily report"
          pluginClass: "io.kestra.plugin.jdbc.sqlserver.Query"
        - node: "has data?"
          label: "skip if empty"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "email"
          label: "CSV attached"
          pluginClass: "io.kestra.plugin.email.MailSend"
      items:
        - title: "No empty-attachment noise"
          description: "The email only sends when the query returns rows."
        - title: "Backfillable on demand"
          description: "Rerun any past day by passing a date input, no code changes."
        - title: "Failure never silent"
          description: "A Slack alert fires separately from the report email itself."
          wide: true
    - badge: "Event-driven"
      badgeIcon: "mdi:flash-outline"
      title: "Start a flow when SQL Server has new work to process"
      description: "Some pipelines should react to data, not clocks. The SQL Server <code>Trigger</code> polls a queue-style table on an interval and starts a flow when the query returns rows, then marks them processed with <code>afterSQL</code> so the same rows never fire the trigger twice."
      flow:
        - node: "SQL Server trigger"
          label: "pending rows"
          pluginClass: "io.kestra.plugin.jdbc.sqlserver.Trigger"
        - node: "process"
          label: "per row"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "notify"
          label: "Slack on done"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Poll-based data trigger"
          description: "Fires on rows returned, not on the next cron tick."
        - title: "afterSQL marks processed"
          description: "Sentinel rows are flagged so they do not re-trigger."
        - title: "Fan out per row"
          description: "A <code>ForEach</code> processes each returned row independently."
          wide: true
    - badge: "Transactional load"
      badgeIcon: "mdi:table-sync"
      title: "Stage, dedupe, and MERGE as one atomic load"
      description: "An incremental load is rarely one statement: stage new rows, dedupe, MERGE into the target, update a watermark. <code>io.kestra.plugin.jdbc.sqlserver.Queries</code> runs the whole block as one transaction by default, so a failed MERGE rolls back everything and the target never holds a half-applied batch."
      flow:
        - node: "stage load"
          label: "new rows"
          pluginClass: "io.kestra.plugin.jdbc.sqlserver.Query"
        - node: "merge"
          label: "upsert + dedup"
          pluginClass: "io.kestra.plugin.jdbc.sqlserver.Queries"
        - node: "row check"
          label: "validate"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "notify"
          label: "on complete"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "One transaction, all or nothing"
          description: "<code>Queries</code> wraps the MERGE and watermark update; a failure rolls back."
        - title: "Idempotent reruns"
          description: "The watermark means a rerun resumes from the last committed batch."
        - title: "Dedup in the MERGE"
          description: "Late or duplicate rows collapse on the merge key, not downstream."
          wide: true

