faq:
  - question: "Does Kestra replace ServiceNow Flow Designer or Orchestration?"
    answer: "No. Flow Designer is excellent for in-platform automations (form to record, approval to update, integration to MID server). ServiceNow Orchestration is a paid add-on for content packs. Kestra is a general-purpose orchestrator that uses ServiceNow tickets as triggers and uses the ServiceNow Table API to read CMDB context and write back results. Use Flow Designer for SN-native flows. Use Kestra when the work spans outside SN and needs to chain with Terraform, dbt, Argo CD, Kubernetes, or any of 1300+ plugins."
  - question: "How does Kestra authenticate to ServiceNow?"
    answer: "Two options. Basic Auth: username and password (or a dedicated integration user with role itil or admin), passed as Kestra secrets. OAuth password grant: client ID, client secret, plus a username and password. Tokens go through Kestra's secrets backend and are decrypted per task. For high-security deployments, use a dedicated integration user with the minimum table-level ACLs (e.g. read on cmdb_ci_appl, write on change_request, write on incident)."
  - question: "Should I use webhooks or polling for ticket triggers?"
    answer: "Webhooks for real-time response (change request approval to flow start in seconds), polling for environments where webhooks are not feasible (firewall constraints, MID server limitations). For webhooks, create a ServiceNow Business Rule that POSTs to a Kestra Webhook trigger URL on the desired condition (state change to approved, category match, etc.). For polling, run a scheduled flow with servicenow.Get filtered by the same criteria; mark processed tickets via a custom field or use Kestra's deduplication."
  - question: "Can the plugin write to any table?"
    answer: "Yes. servicenow.Post, servicenow.Get, servicenow.Update, and servicenow.Delete all accept the table name as a property. Use them against change_request, incident, problem, sc_request (service catalog request), cmdb_ci and its subtables, kb_knowledge, or any custom table your instance has. The plugin uses the Table REST API, which is uniform across tables."
  - question: "Can Kestra create CIs in CMDB?"
    answer: "Yes. servicenow.Post against cmdb_ci, cmdb_ci_appl, cmdb_ci_linux_server, or any subtable creates a CI record. Auto-create from a reconciliation flow with a review-needed tag for the network team to confirm. For more complex CMDB shapes (relationships, IRE-based identification), use a discovery integration upstream and let Kestra orchestrate the lifecycle around the discovery output."
  - question: "How does Kestra reach a self-hosted (on-premises) ServiceNow?"
    answer: "If ServiceNow is reachable on HTTPS from Kestra workers, the plugin works directly. For ServiceNow instances behind a corporate firewall, run Kestra workers inside the same network or use a ServiceNow MID server to proxy. The plugin makes ordinary REST calls, so any HTTPS-reachable instance works regardless of hosting model."
  - question: "Is the ServiceNow plugin Enterprise-only?"
    answer: "No. The io.kestra.plugin.servicenow plugin ships in the open-source edition with Get, Post, Update, and Delete tasks against any ServiceNow table. Kestra Enterprise adds Apps (typed self-service forms so non-engineers can trigger a runbook through a UI), namespace-scoped RBAC, audit logs, worker isolation, and SSO. Useful when many teams share a Kestra instance and you need to scope who can write to which ServiceNow tables."
  - question: "How does the runbook ticket close-loop work in detail?"
    answer: "Three updates per runbook flow. On start: servicenow.Update sets state=work_in_progress with work_notes mentioning the Kestra execution ID. Per step: optional servicenow.Update with progress in work_notes. On end: servicenow.Update sets state=closed_successful (or closed_incomplete) with close_code, close_notes containing the execution URL, and any per-step result links. The ticket reads as a real-time progress log; the audit reads as a closed record with the orchestration receipts attached."

