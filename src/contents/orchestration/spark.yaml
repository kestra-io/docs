title: "Orchestrate Apache Spark with Kestra: event-driven jobs, cluster lifecycle, and end-to-end data pipelines"
description: "Trigger Spark jobs when upstream data is ready, provision and tear down clusters for cost control, chain with ingestion and warehouse loads, and trace every job across the pipeline from one place."

tool:
  name: "Apache Spark"
  pluginClass: "io.kestra.plugin.spark.SparkCLI"
  color: "#E25A1C"

hero:
  title: "Run Spark jobs when data is ready, not on a schedule."
  description: "Spark runs the distributed computation. Kestra decides when each job starts, sequences what feeds it, and chains the result into downstream loads and transforms in one auditable pipeline."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Spark handles the distributed processing. Kestra orchestrates everything around it: triggers <code>io.kestra.plugin.spark.SparkCLI</code> the moment upstream ingestion confirms rather than waiting for the next cron window, provisions a Dataproc or EMR cluster on demand and tears it down after the job to control costs, and chains Spark with ingestion upstream and a warehouse load downstream in one flow with a shared execution ID."

pillars:
  title: "Above the Spark job scheduler."
  subtitle: "Spark owns the distributed execution engine. Kestra owns the steps around the job: when it triggers, what cluster it runs on, what validates the output, and where the cross-tool audit trail lives."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "Event-driven jobs, not cron submissions"
      description: "Submitting a Spark job on a fixed schedule means it may run on incomplete upstream data. Kestra triggers <code>io.kestra.plugin.spark.SparkCLI</code> the moment the upstream step confirms, whether that is a file landing in GCS or S3, an ingestion sync completing, or a webhook. The job always runs on fresh input."
    - icon: "mdi:server-network"
      title: "Cluster provisioning and teardown"
      description: "Ephemeral clusters save money. Kestra can provision a Dataproc cluster before the job via <code>io.kestra.plugin.gcp.dataproc.batches.PySparkSubmit</code>, run the workload, and tear it down after. An error handler ensures teardown runs even when the job fails, so no cluster is left running after an error."
    - icon: "mdi:pipe-disconnected"
      title: "Full pipeline in one flow"
      description: "A Spark job is one step in a larger pipeline. Kestra runs the ingestion step upstream, the Spark transform, and the downstream warehouse load as ordered tasks in one flow. A warehouse load failure retries without re-running the Spark job, and every step shares one execution ID for debugging."
    - icon: "mdi:shield-check-outline"
      title: "Data quality gate before submission"
      description: "Running a large Spark job on bad input wastes cluster time and budget. Kestra can check row counts or run a schema validation step before <code>SparkCLI</code> fires. If input data fails the check, the flow halts and pages the team before any compute is consumed."
    - icon: "mdi:source-branch"
      title: "Parallel job fan-out per partition"
      description: "Some pipelines process multiple partitions or datasets independently. Kestra fans out Spark jobs with <code>ForEach</code> and a <code>concurrencyLimit</code>, runs each job in isolation, and isolates failures with <code>allowFailure</code> so one bad partition does not halt the whole batch."
    - icon: "mdi:eye-outline"
      title: "Unified execution history across the stack"
      description: "When a downstream dashboard is stale, the question is whether the Spark job ran, what it processed, and what happened next. Kestra surfaces the Spark job logs next to the ingestion step and the warehouse load, every step timestamped and attributed to the trigger that started it."

useCases:
  title: "How teams use Apache Spark and Kestra"
  subtitle: "Patterns data platform teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Event-driven"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Trigger a Spark job when a file lands"
      description: "A raw file arrives in GCS or S3. Kestra triggers immediately, runs the PySpark job against the new file, validates the output row count, and loads the result into the warehouse. No cron lag between file arrival and processing."
      flow:
        - node: "gcs trigger"
          label: "file arrives"
          pluginClass: "io.kestra.plugin.gcp.gcs.Trigger"
        - node: "pyspark job"
          label: "process file"
          pluginClass: "io.kestra.plugin.gcp.dataproc.batches.PySparkSubmit"
        - node: "row check"
          label: "validate output"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "bq load"
          label: "load result"
          pluginClass: "io.kestra.plugin.gcp.bigquery.Query"
      items:
        - title: "No cron lag"
          description: "The job fires the moment the file arrives, not at the next scheduled window."
        - title: "Validate before loading"
          description: "An <code>If</code> task checks output row count before writing to BigQuery."
        - title: "Retry the load in isolation"
          description: "A BigQuery load failure retries without re-running the Spark job."
          wide: true
    - badge: "Cluster lifecycle"
      badgeIcon: "mdi:server-network"
      title: "Provision cluster, run job, tear down"
      description: "Kestra submits a PySpark batch to Dataproc, waits for completion, then the cluster is torn down automatically. An error handler ensures teardown runs even on job failure so no compute is left running."
      flow:
        - node: "schedule"
          label: "nightly batch"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "pyspark submit"
          label: "run + wait"
          pluginClass: "io.kestra.plugin.gcp.dataproc.batches.PySparkSubmit"
        - node: "validate"
          label: "output check"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "notify"
          label: "Slack on done"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Ephemeral cluster"
          description: "Compute runs only for the duration of the job, not overnight."
        - title: "Teardown on failure"
          description: "Error handler ensures the cluster is cleaned up even when the job errors."
        - title: "Wait built in"
          description: "The task blocks until the batch reaches terminal status."
          wide: true
    - badge: "Full pipeline"
      badgeIcon: "mdi:pipe-disconnected"
      title: "Ingest to Spark to warehouse in one flow"
      description: "Kestra runs the ingestion step, waits for it to confirm, fires the Spark transform, then loads the result into a warehouse. A warehouse load failure retries the load only, without re-running the expensive Spark job upstream."
      flow:
        - node: "airbyte sync"
          label: "ingest"
          pluginClass: "io.kestra.plugin.airbyte.connections.Sync"
        - node: "spark job"
          label: "transform"
          pluginClass: "io.kestra.plugin.spark.SparkCLI"
        - node: "warehouse load"
          label: "load result"
          pluginClass: "io.kestra.plugin.gcp.bigquery.Query"
        - node: "slack"
          label: "on complete"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Three tools, one execution"
          description: "Ingest, transform, and load share one execution ID."
        - title: "Local retries"
          description: "A warehouse load failure retries in isolation without re-running Spark."
        - title: "One place to debug"
          description: "All step logs and outputs live in the same execution view."
          wide: true
    - badge: "Quality gate"
      badgeIcon: "mdi:shield-check-outline"
      title: "Validate input schema before Spark runs"
      description: "Running a large Spark job on malformed input wastes cluster compute and time. Kestra runs a schema and row-count validation step first. If input data fails, the flow halts and pages the team before any cluster spins up."
      flow:
        - node: "s3 trigger"
          label: "new data arrives"
          pluginClass: "io.kestra.plugin.aws.s3.Trigger"
        - node: "validate input"
          label: "schema + row count"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "spark job"
          label: "run if valid"
          pluginClass: "io.kestra.plugin.spark.SparkCLI"
        - node: "notify"
          label: "alert if invalid"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Gate before compute"
          description: "Bad input halts the flow before any cluster is provisioned."
        - title: "Alert the right team"
          description: "Slack routes the failure to the data owner, not a generic channel."
        - title: "Retry on valid re-upload"
          description: "Once corrected data is re-uploaded, the flow restarts cleanly."
          wide: true

