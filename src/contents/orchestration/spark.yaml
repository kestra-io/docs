faq:
  - question: "How does Kestra trigger a Spark job when upstream data is ready?"
    answer: "Kestra has native triggers for GCS file arrivals, S3 arrivals, webhooks, database row changes, and more. When the upstream event fires, Kestra starts the flow and runs <code>io.kestra.plugin.spark.SparkCLI</code> or <code>io.kestra.plugin.gcp.dataproc.batches.PySparkSubmit</code> as the next step. The Spark job only runs after the upstream trigger confirms, not on a fixed cron schedule."
  - question: "Can Kestra provision and tear down a Spark cluster in the same flow?"
    answer: "For Google Cloud Dataproc, <code>io.kestra.plugin.gcp.dataproc.batches.PySparkSubmit</code> submits a serverless batch job that Dataproc manages. For cluster-based setups, Kestra can call cloud provider APIs in shell tasks to provision and teardown, with error handlers ensuring teardown runs even when the job fails."
  - question: "How does Kestra chain a Spark job with ingestion and a downstream warehouse load?"
    answer: "Each step is a separate task in one flow. An ingestion plugin runs first, Kestra waits for it to confirm, then <code>SparkCLI</code> runs the transform, and a warehouse task loads the output. A failure in the warehouse load step retries that step only, without re-running the expensive Spark job upstream. Every step shares one execution ID."
  - question: "Can Kestra validate input data before the Spark job runs?"
    answer: "Yes. Add an <code>io.kestra.plugin.core.flow.If</code> task before the Spark submission to check row counts, schema, or freshness. If the check fails, the flow halts and sends an alert before any cluster compute is consumed. This pattern prevents wasted cluster time on bad input data."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers fully self-hosted deployment on Docker or Kubernetes, a managed cloud version, and air-gapped options for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted keeps your pipeline execution and cloud credentials inside your own network."

