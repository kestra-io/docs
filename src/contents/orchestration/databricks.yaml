title: "Orchestrate Databricks with Kestra: event-driven jobs, cluster lifecycle, and cross-stack data pipelines"
description: "Trigger Databricks jobs when upstream data is ready, chain with ingestion and downstream loads, control cluster costs, and trace every job run across your full stack from one execution history."

tool:
  name: "Databricks"
  pluginClass: "io.kestra.plugin.databricks.job.CreateRun"
  color: "#FF3621"

hero:
  title: "Run Databricks jobs when data is ready, not on a schedule."
  description: "Databricks runs the lakehouse compute. Kestra decides when each job fires, what feeds it, and what happens with the output. Chain jobs with ingestion and warehouse loads, control cluster costs, and trace every run in one place."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Databricks handles the distributed lakehouse compute. Kestra orchestrates everything around it: triggers <code>io.kestra.plugin.databricks.job.CreateRun</code> the moment upstream ingestion confirms rather than waiting for the next cron window, chains the Databricks job with upstream syncs and downstream warehouse writes in one flow with a shared execution ID, and logs every step — the job ID, run state, and output — in one searchable execution record."

pillars:
  title: "Above the Databricks job scheduler."
  subtitle: "Databricks Workflows coordinates jobs inside the lakehouse. Kestra coordinates the steps around those jobs: what triggers them, what data feeds them, what runs after, and where the cross-stack audit trail lives."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "Event-driven jobs, not fixed cron"
      description: "Submitting a Databricks job on a fixed schedule means it may run on incomplete upstream data. Kestra triggers <code>io.kestra.plugin.databricks.job.CreateRun</code> the moment the upstream step confirms — whether that is a file landing in S3 or ADLS, an Airbyte sync completing, or a webhook. The job always runs on fresh input."
    - icon: "mdi:pipe-disconnected"
      title: "Full pipeline in one flow"
      description: "A Databricks job is one step in a larger pipeline. Kestra runs the ingestion step upstream, the Databricks job, and the downstream warehouse load as ordered tasks in one flow. A load failure retries without re-running the expensive lakehouse job, and every step shares one execution ID for debugging."
    - icon: "mdi:server-network"
      title: "Cluster cost control"
      description: "Databricks compute is billed by the minute. Kestra chains a cluster creation step, the job run, and a deletion step in one flow, with an error handler that ensures deletion runs even when the job fails. No cluster is left running after an error."
    - icon: "mdi:shield-check-outline"
      title: "Quality gate before job submission"
      description: "Running a Databricks job on malformed input wastes DBU and time. Kestra can check row counts or run a schema validation step before <code>CreateRun</code> fires. If input data fails the check, the flow halts and pages the team before any compute is consumed."
    - icon: "mdi:source-branch"
      title: "Parallel job fan-out across notebooks"
      description: "Some pipelines process multiple partitions or datasets independently. Kestra fans out Databricks job runs with <code>ForEach</code> and a <code>concurrencyLimit</code>, runs each in isolation, and isolates failures with <code>allowFailure</code> so one bad partition does not halt the whole batch."
    - icon: "mdi:eye-outline"
      title: "Unified execution history across the stack"
      description: "When a downstream dashboard is stale, the question is whether the Databricks job ran, what it processed, and what happened next. Kestra surfaces the job run ID and state next to the upstream sync and the downstream load, every step timestamped and attributed to the trigger that started it."

useCases:
  title: "How teams use Databricks and Kestra"
  subtitle: "Patterns data platform teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Event-driven"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Trigger a Databricks job when a file lands"
      description: "A raw file arrives in S3 or ADLS. Kestra triggers immediately, runs a Databricks job against the new file, validates the output row count, and loads the result into the warehouse. No cron lag between file arrival and processing."
      flow:
        - node: "s3 trigger"
          label: "file arrives"
          pluginClass: "io.kestra.plugin.aws.s3.Trigger"
        - node: "databricks job"
          label: "run notebook"
          pluginClass: "io.kestra.plugin.databricks.job.CreateRun"
        - node: "row check"
          label: "validate output"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "warehouse load"
          label: "load result"
          pluginClass: "io.kestra.plugin.gcp.bigquery.Query"
      items:
        - title: "No cron lag"
          description: "The job fires the moment the file arrives, not at the next scheduled window."
        - title: "Validate before loading"
          description: "An <code>If</code> task checks output row count before writing to the warehouse."
        - title: "Retry the load in isolation"
          description: "A warehouse load failure retries without re-running the Databricks job."
          wide: true
    - badge: "Full pipeline"
      badgeIcon: "mdi:pipe-disconnected"
      title: "Ingest with Airbyte, transform in Databricks, load to warehouse"
      description: "Kestra chains an Airbyte sync, a Databricks notebook run, and a downstream warehouse write as ordered steps in one flow. A warehouse load failure retries the load only, without re-running the expensive lakehouse transform."
      flow:
        - node: "airbyte sync"
          label: "ingest raw data"
          pluginClass: "io.kestra.plugin.airbyte.connections.Sync"
        - node: "databricks job"
          label: "transform in lakehouse"
          pluginClass: "io.kestra.plugin.databricks.job.CreateRun"
        - node: "warehouse load"
          label: "write result"
          pluginClass: "io.kestra.plugin.gcp.bigquery.Query"
        - node: "slack"
          label: "on complete"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Three tools, one execution"
          description: "Ingest, transform, and load share one execution ID."
        - title: "Local retries"
          description: "A warehouse load failure retries in isolation without re-running the Databricks job."
        - title: "One place to debug"
          description: "All step logs and outputs live in the same execution view."
          wide: true
    - badge: "Cluster lifecycle"
      badgeIcon: "mdi:server-network"
      title: "Create cluster, run job, delete cluster"
      description: "Kestra creates a Databricks cluster, waits for it to be ready, runs the job, then deletes the cluster. An error handler ensures deletion runs even on job failure so no compute is left running and billed."
      flow:
        - node: "schedule"
          label: "nightly batch"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "create cluster"
          label: "provision compute"
          pluginClass: "io.kestra.plugin.databricks.cluster.CreateCluster"
        - node: "databricks job"
          label: "run notebook"
          pluginClass: "io.kestra.plugin.databricks.job.CreateRun"
        - node: "delete cluster"
          label: "teardown compute"
          pluginClass: "io.kestra.plugin.databricks.cluster.DeleteCluster"
      items:
        - title: "Billed only for job duration"
          description: "Cluster is torn down immediately after the job completes."
        - title: "Teardown on failure"
          description: "Error handler ensures the cluster is deleted even when the job errors."
        - title: "Wait built in"
          description: "CreateRun blocks until the run reaches terminal status."
          wide: true
    - badge: "Quality gate"
      badgeIcon: "mdi:shield-check-outline"
      title: "Validate input before the Databricks job runs"
      description: "Kestra runs a row-count and schema check on the input before submitting the Databricks job. If validation fails, the flow halts and pages the team before any DBU is consumed."
      flow:
        - node: "fivetran sync"
          label: "upstream ingest"
          pluginClass: "io.kestra.plugin.fivetran.connectors.Sync"
        - node: "validate input"
          label: "schema + row count"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "databricks job"
          label: "run if valid"
          pluginClass: "io.kestra.plugin.databricks.job.CreateRun"
        - node: "notify"
          label: "alert if invalid"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Gate before DBU spend"
          description: "Bad input halts the flow before any cluster compute is billed."
        - title: "Alert the right team"
          description: "Slack routes the failure to the data owner, not a generic channel."
        - title: "Retry on corrected data"
          description: "Once upstream data is fixed, the flow restarts cleanly from the gate."
          wide: true

