faq:
  - question: "How does Kestra trigger a Databricks job when upstream data is ready?"
    answer: "Kestra has native triggers for S3 and ADLS file arrivals, webhooks, and sync completions from tools like Airbyte and Fivetran. When the upstream event fires, Kestra starts the flow and runs <code>io.kestra.plugin.databricks.job.CreateRun</code> as the next step. The job only runs after the upstream trigger confirms, not on a fixed cron schedule."
  - question: "Can Kestra control Databricks cluster lifecycle in one flow?"
    answer: "Yes. Chain <code>io.kestra.plugin.databricks.cluster.CreateCluster</code>, <code>io.kestra.plugin.databricks.job.CreateRun</code>, and <code>io.kestra.plugin.databricks.cluster.DeleteCluster</code> as sequential tasks in one flow. Add an <code>errors</code> block that also calls <code>DeleteCluster</code> so the cluster is always torn down and billed compute stops, even when the job fails."
  - question: "How does Kestra chain a Databricks job with ingestion and a downstream warehouse load?"
    answer: "Each step is a separate task in one flow. An ingestion plugin runs first, Kestra waits for it to confirm, then <code>CreateRun</code> fires the Databricks job, and a warehouse task loads the output. A failure in the warehouse load step retries that step only, without re-running the Databricks job. Every step shares one execution ID."
  - question: "Can Kestra validate input data before the Databricks job runs?"
    answer: "Yes. Add an <code>io.kestra.plugin.core.flow.If</code> task before <code>CreateRun</code> to check row counts, schema, or data freshness. If the check fails, the flow halts and sends a Slack alert before any cluster compute is billed. This pattern prevents wasted DBU on bad input data."
  - question: "How is this different from Databricks Workflows?"
    answer: "Databricks Workflows coordinates jobs that run inside the Databricks lakehouse. Kestra orchestrates the steps around those jobs: what triggers them (file arrivals, external sync completions, webhooks), what data feeds them, what runs after (warehouse loads, notifications, downstream APIs), and where the cross-stack audit trail lives. Kestra also manages non-Databricks steps in the same flow without requiring everything to live inside the Databricks workspace."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers fully self-hosted deployment on Docker or Kubernetes, a managed cloud version, and air-gapped options for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted keeps your pipeline execution and cloud credentials inside your own network."

