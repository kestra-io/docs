title: "Orchestrate Fivetran with Kestra: event-driven syncs, ELT chains, and warehouse-aware ingestion"
description: "Trigger Fivetran connector syncs from any event, wait for terminal sync status, chain with dbt and activation in one flow, and trace every connector run across the data stack from one place."

tool:
  name: "Fivetran"
  pluginClass: "io.kestra.plugin.fivetran.connectors.Sync"
  color: "#0073FF"

hero:
  title: "Fire Fivetran syncs when data is ready, not on a clock."
  description: "Fivetran moves the data. Kestra decides when each sync runs, what happens after it lands, and what to do when it fails. Trigger on any event, wait for terminal status, chain straight into dbt and reverse-ETL, and trace every connector run in one execution history."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Fivetran's built-in scheduler fires connector syncs on a fixed cadence. Kestra runs above it: triggers <code>io.kestra.plugin.fivetran.connectors.Sync</code> the moment an upstream event lands, waits for the job to complete, then chains straight into <a href='/orchestration/dbt-core'>dbt</a> transforms and <a href='/orchestration/hightouch'>Hightouch</a> activation in one flow. A failed transform retries without re-running the Fivetran connector, and every sync, build, and activation shares one execution ID."

pillars:
  title: "Above the Fivetran sync scheduler."
  subtitle: "Fivetran owns the connectors and the EL. Kestra owns the steps around the sync: when it triggers, what runs after it, who approves the load, and where the cross-tool audit trail lives."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "Event-driven syncs, not cron-only"
      description: "Fivetran's scheduler fires on a fixed cadence whether the source is ready or not. Kestra triggers <code>io.kestra.plugin.fivetran.connectors.Sync</code> the moment an upstream event lands: a webhook, an S3 file, a <a href='/orchestration/slack'>Slack</a> command, or a database change. Ingestion starts when there is actually something to ingest."
    - icon: "mdi:timer-sand"
      title: "Wait for terminal status, then continue"
      description: "Firing a sync and moving on is not orchestration. <code>Sync</code> waits for the connector job to reach a terminal state before the next task runs. Transforms never read half-loaded tables, and retries only fire after a confirmed failure rather than a timeout guess."
    - icon: "mdi:pipe-disconnected"
      title: "Full ELT chain in one flow"
      description: "Fivetran's run history stops at the connector. It has no record of the <a href='/orchestration/dbt-core'>dbt</a> build that shaped the data or the <a href='/orchestration/hightouch'>Hightouch</a> sync that activated it. Kestra runs ingestion, transform, and activation as steps in one flow with run IDs flowing forward and one shared execution ID."
    - icon: "mdi:source-branch"
      title: "Parallel connector fan-out with isolation"
      description: "A warehouse refresh often means a dozen connector syncs. Kestra fans them out with <code>ForEach</code> and <code>concurrencyLimit</code>, and <code>allowFailure</code> isolates a single failing connector so the rest still complete. A targeted alert routes to the team responsible for the broken connection."
    - icon: "mdi:shield-check-outline"
      title: "Quality gate before transforms run"
      description: "A short or stale sync should never feed production models. Kestra can check row counts or run a <a href='/orchestration/dbt-core'>dbt</a> source freshness test after the sync, and halt the flow before dbt runs if the load looks wrong. Downstream models only run when the data is confirmed clean."
    - icon: "mdi:eye-outline"
      title: "Cross-stack history with sync metrics"
      description: "When data looks stale, the question is whether the sync ran, how many records moved, and what happened next. Fivetran tracks the connector job. Kestra surfaces its results next to the dbt build and the activation run, every step timestamped and attributed to the trigger source."

useCases:
  title: "How teams use Fivetran and Kestra"
  subtitle: "Patterns data engineering teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Full ELT"
      badgeIcon: "mdi:pipe-disconnected"
      title: "Fivetran to dbt to activation in one flow"
      description: "Kestra runs the Fivetran sync, waits for terminal status, builds <a href='/orchestration/dbt-core'>dbt</a> models on the freshly landed data, then fires the <a href='/orchestration/hightouch'>Hightouch</a> sync. <a href='/orchestration/slack'>Slack</a> confirms. A dbt retry never re-runs the Fivetran sync."
      flow:
        - node: "schedule or event"
          label: "trigger"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "fivetran sync"
          label: "ingest + wait"
          pluginClass: "io.kestra.plugin.fivetran.connectors.Sync"
        - node: "dbt build"
          label: "transform"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "hightouch sync"
          label: "activate"
          pluginClass: "io.kestra.plugin.hightouch.Sync"
        - node: "slack"
          label: "on complete"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Wait built in"
          description: "<code>Sync</code> blocks until terminal status, so dbt never reads a half-loaded table."
        - title: "Step retries stay local"
          description: "A dbt retry never re-runs the sync; an activation retry never re-runs dbt."
        - title: "One execution ID across the stack"
          description: "Sync metrics, dbt results, and the activation run in one view."
          wide: true
    - badge: "Event-driven"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Trigger a sync from any event"
      description: "Replace the cron schedule with a push. A webhook, an S3 arrival, or a <a href='/orchestration/slack'>Slack</a> command fires the flow. Kestra runs the matching Fivetran connection, waits for completion, and branches on the result. The sync runs when the source is confirmed ready."
      flow:
        - node: "webhook"
          label: "any HTTP signal"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "fivetran sync"
          label: "run + wait"
          pluginClass: "io.kestra.plugin.fivetran.connectors.Sync"
        - node: "branch"
          label: "on result"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "notify"
          label: "Slack on failure"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Push, not polling"
          description: "Ingestion fires on the event that matters, not the next interval."
        - title: "Parameters from the trigger"
          description: "The connector ID can come from <code>trigger.body</code> at run time."
        - title: "Branch on the outcome"
          description: "An <code>If</code> task routes success and failure to different paths."
          wide: true
    - badge: "Fan-out"
      badgeIcon: "mdi:source-branch"
      title: "Run many connector syncs in parallel"
      description: "A warehouse refresh means many connections at once. Kestra fans them out via <code>ForEach</code> with a <code>concurrencyLimit</code>, runs each <code>Sync</code>, and isolates failures with <code>allowFailure</code> so one broken connector does not block the rest. The owner of the failing connection gets paged."
      flow:
        - node: "schedule"
          label: "refresh window"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "for each conn"
          label: "fan out"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "fivetran sync"
          label: "per connection"
          pluginClass: "io.kestra.plugin.fivetran.connectors.Sync"
        - node: "notify"
          label: "owner ping"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Bounded parallelism"
          description: "<code>concurrencyLimit</code> caps how many syncs run at once."
        - title: "Per-connector isolation"
          description: "<code>allowFailure</code> keeps one bad connection from halting the batch."
        - title: "Owner-aware alerts"
          description: "<a href='/orchestration/slack'>Slack</a> routes by connection so the right team is paged."
          wide: true
    - badge: "Quality gate"
      badgeIcon: "mdi:shield-check-outline"
      title: "Validate the load before transforms run"
      description: "Kestra runs the sync, waits, then checks row counts or runs a <a href='/orchestration/dbt-core'>dbt</a> source freshness test. If the load is short or stale, it halts and pages the team before any transform touches the data. Clean loads continue to the build."
      flow:
        - node: "fivetran sync"
          label: "ingest + wait"
          pluginClass: "io.kestra.plugin.fivetran.connectors.Sync"
        - node: "freshness check"
          label: "dbt source test"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "branch"
          label: "pass or halt"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "slack"
          label: "page on stale"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Gate before transform"
          description: "A short or stale load halts the flow before dbt runs."
        - title: "Freshness as a hard check"
          description: "A dbt source freshness test decides pass or halt."
        - title: "Alert on stale data"
          description: "Stale ingestion pages the team, not just a log line."
          wide: true

