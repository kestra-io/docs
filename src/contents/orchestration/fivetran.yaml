faq:
  - question: "What's the difference between Fivetran's built-in scheduler and Kestra?"
    answer: "Fivetran's scheduler fires connector syncs on a fixed cadence and manages connector config. It has no view of what runs after a sync. Kestra runs above it: triggers <code>io.kestra.plugin.fivetran.connectors.Sync</code> on an upstream event, waits for terminal status, then chains straight into <a href='/orchestration/dbt-core'>dbt</a> and <a href='/orchestration/hightouch'>Hightouch</a>, with one execution history across every tool. Kestra works alongside Fivetran, not instead of it."
  - question: "Does the Fivetran task wait for the sync to finish?"
    answer: "The <code>io.kestra.plugin.fivetran.connectors.Sync</code> task runs the connector sync and waits for the job to reach a terminal state before the next task starts. Transforms never read a half-loaded table, and retries only fire after a confirmed failure."
  - question: "Can Kestra trigger a Fivetran sync when a file lands or a webhook fires?"
    answer: "Yes. Kestra has native triggers for webhooks, S3 arrivals, schedules, and more. The trigger fires the flow with the event payload, and the <code>Sync</code> task runs the matching connector ID. No custom receiver or polling loop required."
  - question: "How do I run many Fivetran connectors in parallel without one failure blocking the rest?"
    answer: "Use a <code>ForEach</code> with a <code>concurrencyLimit</code> to cap how many syncs run at once. Set <code>allowFailure: true</code> on the inner <code>Sync</code> task to isolate a single failing connector. A targeted Slack alert routes to the owner of the broken connection rather than halting the entire batch."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers fully self-hosted deployment on Docker or Kubernetes, a managed cloud version, and air-gapped options for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted keeps your pipeline execution and connector credentials inside your own network."

