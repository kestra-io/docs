title: "Orchestrate Postgres with Kestra: scheduled loads, CDC triggers, and ELT around your database"
description: "Bulk-load files with COPY, run transactional multi-statement loads, react to row changes with Debezium CDC, and chain Postgres with dbt and object storage from one execution history."

tool:
  name: "Postgres"
  pluginClass: "io.kestra.plugin.jdbc.postgresql.Query"
  color: "#336791"

hero:
  title: "Take Postgres beyond pg_cron and nightly scripts."
  description: "Postgres stores and queries the data. Kestra decides when each job runs, what feeds it, and what runs next: bulk-load files the moment they land, run transactional multi-statement loads, react to row changes with CDC, and trace every statement in one execution history."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "pg_cron schedules SQL inside one database on a clock. Kestra runs everything around Postgres: it downloads a file and bulk-loads it with COPY the moment it arrives, chains Postgres with <a href='/orchestration/dbt-core'>dbt</a> transforms and <a href='/orchestration/aws'>S3</a> in one flow, runs multi-statement loads as a single transaction so a partial batch never lands, and reacts to row changes with Debezium CDC. Every run gets retries, backfills, and a logged history that pg_cron cannot give you."

pillars:
  title: "Above the database scheduler."
  subtitle: "Postgres runs the storage, the queries, and the COPY. Kestra runs the steps around the query: what triggers it, what feeds it, what runs next, and where the cross-tool audit trail lives."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "Event-driven jobs, not database cron"
      description: "pg_cron fires SQL inside one database on a fixed clock. If the upstream extract slips, it runs on stale data. Kestra triggers <code>io.kestra.plugin.jdbc.postgresql.Query</code> the moment the upstream step confirms, whether that is a file landing in <a href='/orchestration/aws'>S3</a>, a webhook, or an <a href='/orchestration/airbyte'>Airbyte</a> sync. The <code>Trigger</code> task also polls Postgres and starts a flow when a query returns rows."
    - icon: "mdi:tray-arrow-up"
      title: "Bulk loading orchestrated end to end"
      description: "Loading a file means download it, create the table, COPY it in, then validate the count. Kestra runs <code>core.http.Download</code>, then <code>io.kestra.plugin.jdbc.postgresql.CopyIn</code> over the COPY protocol (the fastest path in Postgres), then a row check as ordered steps with per-step retries. A failed COPY retries without re-downloading the file."
    - icon: "mdi:swap-horizontal"
      title: "Transactional multi-statement loads"
      description: "An incremental load is rarely one statement: stage the rows, MERGE into the target, dedup, update a watermark. <code>io.kestra.plugin.jdbc.postgresql.Queries</code> runs them as one transaction, so a failure rolls back and a half-applied batch never lands. The next run resumes cleanly from the last committed watermark."
    - icon: "mdi:pipe-disconnected"
      title: "Full ELT in one flow"
      description: "Postgres has no view of the connector that fed it or the <a href='/orchestration/dbt-core'>dbt</a> models that read it. Kestra runs ingestion, the Postgres load, the transform, and the reverse-ETL push as steps in one flow. Run IDs flow forward and the whole chain shares one execution ID, so you debug load, transform, and sync from one screen, not three."
    - icon: "mdi:radar"
      title: "Real-time CDC with Debezium"
      description: "Time-based scheduling cannot react to a single changed row. <code>io.kestra.plugin.debezium.postgres.RealtimeTrigger</code> reads the Postgres write-ahead log and starts one execution per change, so inserts and updates fan out to downstream systems like <a href='/orchestration/kafka'>Kafka</a> the instant they commit, with no polling lag and no missed rows."
    - icon: "mdi:account-cog-outline"
      title: "Self-service queries for analysts"
      description: "Analysts should not need database credentials to run a parameterized export. Kestra Apps wraps a <code>Query</code> flow in a typed form: pick the date range, run the query, get the result file. Every run lands in execution history with the requesting user, so self-service does not mean unaudited."

useCases:
  title: "How teams use Postgres and Kestra"
  subtitle: "Patterns data engineering teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Bulk load"
      badgeIcon: "mdi:tray-arrow-up"
      title: "Extract and bulk-load files into Postgres"
      description: "A CSV lands or an API exposes a dataset. Kestra downloads it, runs a <code>Query</code> to create the table if needed, then bulk-loads it with <code>CopyIn</code> over the COPY protocol. A row-count check gates anything downstream, and a failed load retries without re-downloading the file."
      flow:
        - node: "download"
          label: "fetch file"
          pluginClass: "io.kestra.plugin.core.http.Download"
        - node: "create table"
          label: "DDL"
          pluginClass: "io.kestra.plugin.jdbc.postgresql.Query"
        - node: "copy in"
          label: "bulk load"
          pluginClass: "io.kestra.plugin.jdbc.postgresql.CopyIn"
        - node: "row check"
          label: "validate"
          pluginClass: "io.kestra.plugin.core.flow.If"
      items:
        - title: "COPY, not row-by-row inserts"
          description: "<code>CopyIn</code> streams the file in one operation, the fastest load path in Postgres."
        - title: "Validate before downstream"
          description: "An <code>If</code> branches on the loaded row count before anything reads the table."
        - title: "Retry the load in isolation"
          description: "A COPY failure retries on its own without re-running the download."
          wide: true
    - badge: "Parallel ETL"
      badgeIcon: "mdi:source-branch"
      title: "Fan one extract out to Postgres and S3 at once"
      description: "One source, two sinks. Kestra downloads the data, transforms it in Python, then writes it in parallel to Postgres with <code>CopyIn</code> and to <a href='/orchestration/aws'>S3</a> as a backup. Each write is isolated, so a slow S3 upload never blocks the database load, and an email confirms with the row count."
      flow:
        - node: "download"
          label: "fetch source"
          pluginClass: "io.kestra.plugin.core.http.Download"
        - node: "transform"
          label: "shape rows"
          pluginClass: "io.kestra.plugin.scripts.python.Script"
        - node: "copy in"
          label: "load Postgres"
          pluginClass: "io.kestra.plugin.jdbc.postgresql.CopyIn"
        - node: "s3 upload"
          label: "archive"
          pluginClass: "io.kestra.plugin.aws.s3.Upload"
        - node: "email"
          label: "row count"
          pluginClass: "io.kestra.plugin.email.MailSend"
      items:
        - title: "Transform once, load twice"
          description: "A single Python step shapes the rows for both Postgres and the S3 archive."
        - title: "Per-sink failure isolation"
          description: "Each sink writes independently, so one slow target never blocks the other."
        - title: "Seconds, not minutes"
          description: "Extract, transform, and a dual load finish in one short execution."
          wide: true
    - badge: "ELT"
      badgeIcon: "mdi:cube-outline"
      title: "Transform in place with dbt from Git"
      description: "Models live in version control, not in the database. Kestra clones the <a href='/orchestration/dbt-core'>dbt</a> project, runs <code>dbt build</code> against Postgres in a container, then posts to Microsoft Teams. A failing test stops the chain before downstream consumers read half-built tables."
      flow:
        - node: "schedule"
          label: "nightly"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "git clone"
          label: "pull dbt project"
          pluginClass: "io.kestra.plugin.git.Clone"
        - node: "dbt build"
          label: "transform"
          pluginClass: "io.kestra.plugin.dbt.cli.DbtCLI"
        - node: "teams"
          label: "on complete"
          pluginClass: "io.kestra.plugin.microsoft365.teams.TeamsIncomingWebhook"
      items:
        - title: "Models stay version-controlled"
          description: "<code>git.Clone</code> pulls the exact committed dbt project before every build."
        - title: "Tests gate the build"
          description: "A failing <code>dbt test</code> halts the flow before consumers read the tables."
        - title: "Swap the target database"
          description: "Point the same flow at <a href='/orchestration/snowflake'>Snowflake</a> or Redshift by changing the dbt profile."
          wide: true
    - badge: "CDC"
      badgeIcon: "mdi:radar"
      title: "React to Postgres row changes in real time"
      description: "Some pipelines react to data, not clocks. The Debezium <code>Trigger</code> reads the Postgres write-ahead log and starts a flow the moment rows change, posts the change count to <a href='/orchestration/slack'>Slack</a>, then processes the captured payload in Python. No polling lag, no missed commits."
      flow:
        - node: "debezium trigger"
          label: "WAL change"
          pluginClass: "io.kestra.plugin.debezium.postgres.Trigger"
        - node: "slack"
          label: "change count"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
        - node: "to json"
          label: "serialize"
          pluginClass: "io.kestra.plugin.serdes.json.IonToJson"
        - node: "process"
          label: "downstream work"
          pluginClass: "io.kestra.plugin.scripts.python.Script"
      items:
        - title: "Capture from the WAL"
          description: "Debezium streams inserts, updates, and deletes straight from the write-ahead log."
        - title: "One execution per change batch"
          description: "Each committed change set starts its own run with the payload attached."
        - title: "Process in any language"
          description: "The captured JSON flows into a Python, shell, or SQL step for downstream work."
          wide: true
    - badge: "Reverse-ETL"
      badgeIcon: "mdi:account-switch-outline"
      title: "Sync changed Postgres rows to a SaaS app"
      description: "Operational data lives in Postgres, but the sales team works in the CRM. The Postgres <code>Trigger</code> polls for changed rows, fans them out with <code>ForEach</code>, and creates or updates each record in HubSpot, so the CRM stays current without a nightly batch and a Discord ping confirms the run."
      flow:
        - node: "postgres trigger"
          label: "changed rows"
          pluginClass: "io.kestra.plugin.jdbc.postgresql.Trigger"
        - node: "for each"
          label: "per record"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "hubspot"
          label: "create or update"
          pluginClass: "io.kestra.plugin.hubspot.contacts.Create"
        - node: "discord"
          label: "on complete"
          pluginClass: "io.kestra.plugin.discord.DiscordIncomingWebhook"
      items:
        - title: "Poll only the changed rows"
          description: "The <code>Trigger</code> query returns new or updated records, not the whole table."
        - title: "Fan out per record"
          description: "<code>ForEach</code> creates or updates each row in the destination independently."
        - title: "Any SaaS destination"
          description: "Swap the HubSpot task for Salesforce, <a href='/orchestration/slack'>Slack</a>, or any API target."
          wide: true

