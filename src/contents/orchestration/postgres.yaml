faq:
  - question: "What's the difference between pg_cron and Kestra?"
    answer: "pg_cron schedules SQL statements inside a single Postgres database on a cron cadence. It has no view of the file that should feed the table, the <a href='/orchestration/dbt-core'>dbt</a> models downstream, or the API that consumes the result, and it offers no retries, backfills, or execution history. Kestra runs above the database: it triggers <code>io.kestra.plugin.jdbc.postgresql.Query</code> when the upstream step confirms, bulk-loads files with <code>CopyIn</code>, runs multi-statement loads as transactions, and gives one execution history across every tool. Kestra works with Postgres, not instead of it."
  - question: "How does Kestra bulk-load a file into Postgres?"
    answer: "Two ordered tasks: <code>core.http.Download</code> (or any extract step) lands the file in Kestra internal storage, then <code>io.kestra.plugin.jdbc.postgresql.CopyIn</code> streams it into the table over the Postgres COPY protocol, the fastest bulk-load path. Because they are separate tasks, a failed COPY retries without re-downloading the file, and an <code>If</code> task can gate downstream work on the loaded row count."
  - question: "Can Kestra trigger a flow when Postgres rows change?"
    answer: "Yes, two ways. <code>io.kestra.plugin.jdbc.postgresql.Trigger</code> polls the database on an interval and starts a flow when a query returns rows, using afterSQL to mark them processed so they do not fire twice. For true change data capture, <code>io.kestra.plugin.debezium.postgres.RealtimeTrigger</code> reads the write-ahead log and starts one execution per committed change, with no polling lag."
  - question: "How does Kestra run an incremental load without partial writes?"
    answer: "Use <code>io.kestra.plugin.jdbc.postgresql.Queries</code> to run the staging load, the MERGE into the target, and the watermark update as one transaction. If any statement fails, the whole transaction rolls back, so the target never holds a half-applied batch. Because the watermark only advances on commit, a rerun resumes cleanly from the last committed point."
  - question: "Can Kestra sync Postgres data to a SaaS app?"
    answer: "Yes. The Postgres <code>Trigger</code> polls for new or changed rows, a <code>ForEach</code> fans them out, and a destination task creates or updates each record in the target system, for example <code>io.kestra.plugin.hubspot.contacts.Create</code> or a Salesforce task. This reverse-ETL pattern keeps the CRM current from operational Postgres data without a separate nightly batch."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted gives complete control over where your pipeline execution and database credentials live."

