title: "Orchestrate Kedro with Kestra: scheduling, retries, and full-pipeline visibility"
description: "Wrap every Kedro training run with event triggers, approval gates before model promotion, retries, and full execution visibility, without touching your nodes, catalog, or conf directory."

tool:
  name: "Kedro"
  pluginClass: "io.kestra.plugin.scripts.shell.Commands"
  color: "#FFC800"

hero:
  title: "Your Kedro runs, fully orchestrated."
  description: "Kedro structures your ML pipelines. It has no scheduler, no event triggers, and no production monitoring. Kestra wraps every run with event-driven scheduling, automatic retries, and end-to-end execution visibility across everything that runs before and after Kedro."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Kedro handles code structure and the data catalog. Kestra handles when it runs: trigger <code>kedro run</code> on a cron schedule or when new training data lands in S3, add an approval gate before model promotion, retry only the failed step on failure, and chain upstream ingestion with downstream model registration in one audited flow."

pillars:
  title: "Around every Kedro run."
  subtitle: "Kedro solves code structure and reproducibility. Kestra solves everything around it: when it runs, what triggers it, what happens next, and who ran what and when."
  items:
    - icon: "mdi:source-branch"
      title: "Per-step retries and downstream coordination"
      description: "Kedro is a single step in most production ML workflows. It has no scheduler, no event triggers, and no awareness of upstream ingestion or downstream model serving. Kestra treats Kedro as one node in a flow: it waits for upstream confirmation before firing, retries only the Kedro step on failure, and blocks model deployment until training is confirmed successful."
    - icon: "mdi:account-clock-outline"
      title: "Execution history with attribution"
      description: "A model degrades. Predictions drift. With cron jobs or CI pipelines, finding when the last training run happened, against which data snapshot, requires archaeology across log files. Kestra logs every execution with a trigger source, a timestamp, and the full run parameters. The training history is there before you need it."
    - icon: "mdi:eye-outline"
      title: "Per-node failure visibility"
      description: "When <code>kedro run</code> fails in CI or on a remote server, diagnosing which node failed means parsing terminal output or SSHing into a machine. Kestra captures every node's output, failure reason, and retry attempt in a single execution view: timestamped, attributed, and visible to everyone on the team without log archaeology."

useCases:
  title: "How teams use Kedro and Kestra"
  subtitle: "Patterns ML and data engineering teams run in production. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Scheduled"
      badgeIcon: "mdi:clock-outline"
      title: "Scheduled training run with alerting"
      description: "Run <code>kedro run</code> on a cron schedule. If any node fails, Kestra captures the failure context and routes it to Slack with the exact node name and error output. No one manually parses CI logs or SSHes into a training server to understand what broke."
      flow:
        - node: "cron trigger"
          label: "on schedule"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "kedro run"
          label: "all nodes"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "capture output"
          label: "model artifact"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "alert"
          label: "Slack / email"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Cron + interval schedules"
          description: "Native scheduler with cron, fixed intervals, or condition-based triggers."
        - title: "Per-node failure context"
          description: "Slack / email routing with the failing node name and error output attached."
        - title: "Direct link to failed runs"
          description: "Click straight to the failing execution view, no log archaeology."
          wide: true
    - badge: "Governance"
      badgeIcon: "mdi:shield-check-outline"
      title: "Approval gate before production deployment"
      description: "Run the Kedro pipeline against a staging dataset first. Pass the model metrics to a named reviewer. Only promote the model artifact to production after explicit approval. Full audit trail of who approved what and when. Stops the deployment if staging validation fails."
      flow:
        - node: "kedro run (staging)"
          label: "staging env"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "validate metrics"
          label: "accuracy / loss"
          pluginClass: "io.kestra.plugin.scripts.python.Script"
        - node: "pause / review"
          label: "human approves"
          gate: true
          pluginClass: "io.kestra.plugin.core.flow.Pause"
        - node: "deploy to prod"
          label: "model registry"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "audit log"
          label: "who + when"
          pluginClass: "io.kestra.plugin.core.log.Log"
      items:
        - title: "Native pause + resume"
          description: "Built-in Pause task suspends execution until a reviewer approves."
        - title: "Reviewer + timestamp logged"
          description: "Identity and approval moment stored in execution history automatically."
        - title: "Stop on staging failure"
          description: "Pipeline halts before production deployment if staging validation fails."
        - title: "Full audit trail"
          description: "Every promotion linked to a reviewer and a moment in time, replayable."
    - badge: "Full pipeline"
      badgeIcon: "mdi:pipe-disconnected"
      title: "End-to-end ML pipeline"
      description: "Ingest raw features from S3, run the Kedro training pipeline, register the model artifact in MLflow, and trigger a downstream deployment or notification. All steps run in a single Kestra flow. If Kedro fails, Kestra retries only the training step without re-pulling the raw data."
      flow:
        - node: "trigger"
          label: "on schedule"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "fetch features"
          label: "S3 / warehouse"
          pluginClass: "io.kestra.plugin.aws.s3.Download"
        - node: "kedro run"
          label: "train + evaluate"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "register model"
          label: "MLflow / registry"
          pluginClass: "io.kestra.plugin.scripts.python.Script"
        - node: "notify"
          label: "on complete"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Step-level retries"
          description: "Retry only the Kedro step. Feature ingestion does not re-run."
        - title: "Outputs flow forward"
          description: "Pass model artifacts and metadata between steps in the same execution."
        - title: "Shared execution context"
          description: "One execution ID across all tools. One place to debug."
        - title: "Single audit history"
          description: "Search every run by date, status, or trigger source from one UI."
    - badge: "Event-driven"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Event-driven retraining"
      description: "Trigger Kedro retraining when a new batch of labeled data lands in S3, when a data quality check passes, or when an API webhook signals that fresh features are ready. No cron job that fires whether or not there is new training data."
      flow:
        - node: "S3 event"
          label: "new data arrived"
          pluginClass: "io.kestra.plugin.aws.s3.Trigger"
        - node: "kedro run"
          label: "on trigger"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "evaluate model"
          label: "metrics check"
          pluginClass: "io.kestra.plugin.scripts.python.Script"
        - node: "notify"
          label: "on complete"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "S3 / Kafka native triggers"
          description: "File arrivals and message events as first-class triggers."
        - title: "Webhook + API triggers"
          description: "Fire Kedro retraining from any HTTP call, no glue service required."
        - title: "Database change triggers"
          description: "React to new labeled data arriving in any upstream system."
        - title: "Push-based, not polling"
          description: "Training starts the moment data is ready, not on the next cron interval."
    - badge: "Operations"
      badgeIcon: "mdi:tune-vertical"
      title: "Multi-environment Kedro run"
      description: "Run the same Kedro pipeline across dev, staging, and production environments by passing the Kedro environment name as a flow input. One flow definition handles nightly full training runs and on-demand targeted runs triggered by a team member, without duplicate flow definitions per environment."
      flow:
        - node: "trigger"
          label: "input: env name"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "kedro run --env"
          label: "env from input"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "capture output"
          label: "model artifact"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "notify"
          label: "on complete"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Flow inputs"
          description: "Pass environment names and node selectors as flow parameters at run time."
        - title: "Same flow, multiple envs"
          description: "Nightly full builds and on-demand runs share one YAML definition."
        - title: "Self-service for non-engineers"
          description: "Kestra Apps can expose environment selection as a form for non-engineers."
          wide: true

