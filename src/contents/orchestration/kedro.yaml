faq:
  - question: "What does Kestra add to a Kedro setup?"
    answer: "Kedro structures how you write and test ML pipeline code. It has no scheduler, no event triggers, no approval gates, and no shared monitoring layer. Kestra provides all of those. Every <code>kedro run</code> becomes a workflow step: triggered on schedule or by events, monitored in a single UI, retried on failure, and auditable across your full team."
  - question: "Can I use Kedro and Kestra together?"
    answer: "Kedro and Kestra occupy different layers of the stack, and combining them is a common pattern. Kedro handles code structure: defining nodes, managing the data catalog, and enforcing project conventions for your Python data science work. Kestra handles the orchestration layer: scheduling Kedro pipeline runs, reacting to upstream events, chaining non-Python steps around Kedro, and monitoring execution in production. Run <code>kedro run</code> as a Script task in Kestra and you get the structure benefits of Kedro with the production operations of Kestra."
  - question: "Can Kestra schedule Kedro runs automatically?"
    answer: "Kestra has a native scheduler that supports cron expressions, interval-based triggers, and event-based triggers. Run <code>kedro run</code> every night, when new labeled data lands in S3, or when a webhook fires from your data platform, without any external cron job or server to maintain."
  - question: "Can I keep using Kedro's project structure and data catalog?"
    answer: "Kestra runs <code>kedro run</code> as a shell command inside an isolated container. Your Kedro project structure, catalog.yml, and conf directory are unchanged. Kestra wraps the execution: it decides when the run fires, what happens if it fails, and what runs after it completes."
  - question: "How does Kestra handle Kedro pipeline failures?"
    answer: "Kestra captures the full output of <code>kedro run</code>, including which node failed and the error output. You can configure the workflow to alert on failure (Slack, email, webhook), block downstream steps until the issue is resolved, or retry the Kedro step a configurable number of times. Upstream steps do not re-run on a retry. All configurable in YAML without custom Python code."
  - question: "How does the approval gate work before a production Kedro run?"
    answer: "Kestra's Pause task suspends workflow execution after the staging run completes. The execution is surfaced in the Kestra UI with the run output visible. A named reviewer logs in, confirms the model metrics, and explicitly resumes the flow. Only then does the production <code>kedro run</code> proceed. The approval is logged with a timestamp and reviewer identity automatically."
  - question: "Can Kestra chain Kedro with upstream data ingestion and downstream model serving?"
    answer: "Each tool runs as a task inside a single Kestra flow. A data ingestion job runs first, Kedro trains the model, and a downstream step registers the artifact in MLflow or triggers a deployment pipeline. If Kedro fails, Kestra retries only the training step without re-pulling the raw data. Kestra's 1,300+ plugins cover most tools in a modern ML stack."
  - question: "Is Kedro a workflow orchestrator?"
    answer: "Kedro's own documentation is explicit: it is not an orchestrator. The framework provides pipeline definitions, data catalog management, and project structure for Python code. To run those pipelines on a schedule or in response to events, you need a separate orchestrator like Kestra. Kedro ships plugins to translate its pipeline definitions into the orchestrator's task format."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on your own infrastructure (Docker or Kubernetes), a managed cloud version, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted gives complete control over where your model artifacts and training data flow, with no external dependency on Kestra's infrastructure."

