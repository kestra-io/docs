title: "Orchestrate DuckDB with Kestra: scheduled analytics, file-to-query pipelines, and data quality gates"
description: "Trigger DuckDB queries when files arrive or on a schedule, chain analytics steps with ingestion and export, run quality checks before downstream writes, and trace every query pipeline in one execution history."

tool:
  name: "DuckDB"
  pluginClass: "io.kestra.plugin.jdbc.duckdb.Query"
  color: "#FFCE00"

hero:
  title: "Turn DuckDB queries into observable, automated pipelines."
  description: "DuckDB runs fast in-process analytics. Kestra decides when each query fires, what data feeds it, and where the results go. Schedule reports, chain with ingestion and export, and trace every run in one place."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "DuckDB runs in-process OLAP queries fast and without a server. Kestra wraps those queries in observable pipelines: downloads files from HTTP or S3 the moment they land, runs <code>io.kestra.plugin.jdbc.duckdb.Query</code> for the analytics step, exports results, and notifies on completion or failure. The query step retries in isolation if a downstream export fails, and every run lands in execution history with the data source, row count, and the user or trigger that started it."

pillars:
  title: "Above the DuckDB query layer."
  subtitle: "DuckDB handles the in-process query engine. Kestra handles when queries run, what feeds them, where results go, and where the full pipeline audit trail lives."
  items:
    - icon: "mdi:tray-arrow-down"
      title: "Fetch data, then query"
      description: "DuckDB can query remote files directly, but coordinating the download, the query, and the downstream export requires scripting. Kestra runs <code>io.kestra.plugin.core.http.Download</code> or an S3 trigger to bring the file in, then <code>jdbc.duckdb.Query</code> for the analysis. A failed export retries without re-running the query."
    - icon: "mdi:clock-outline"
      title: "Scheduled analytics reports"
      description: "Ad-hoc DuckDB queries become scheduled reports when wrapped in a Kestra flow. A <code>Schedule</code> trigger fires the flow, the query runs, and the result is serialized to CSV and sent to Slack or written to object storage. Every run is timestamped, attributed, and searchable."
    - icon: "mdi:shield-check-outline"
      title: "Quality gate before downstream writes"
      description: "If DuckDB is the transform step before loading to a warehouse or BI tool, a bad result can corrupt downstream tables. Kestra runs a row-count or null-check query first. If the check fails, the flow halts before anything is written, and the team is paged."
    - icon: "mdi:pipe-disconnected"
      title: "DuckDB as a step in the ELT chain"
      description: "DuckDB fits naturally as a lightweight transform step between an ingestion sync and a downstream export. Kestra chains Airbyte or Fivetran ingestion, a DuckDB transform, and a warehouse write as ordered tasks in one flow. Each step retries independently with a shared execution ID."
    - icon: "mdi:lightning-bolt-outline"
      title: "Event-driven analytics on file arrival"
      description: "Waiting for a cron window to process a file that already arrived is wasteful. An S3 or GCS trigger fires the flow the moment a matching file lands, Kestra runs the DuckDB query against it, and exports the result. No polling, no lag."
    - icon: "mdi:eye-outline"
      title: "Full pipeline visibility"
      description: "When a report looks wrong, the question is whether the query ran, what input it saw, and what it produced. Kestra logs the DuckDB query, the row count returned, and every downstream step in one execution record. No digging through cron logs."

useCases:
  title: "How teams use DuckDB and Kestra"
  subtitle: "Patterns data teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Scheduled report"
      badgeIcon: "mdi:clock-outline"
      title: "Download, query, and export on a schedule"
      description: "A daily schedule fires the flow. Kestra downloads a CSV from HTTP or S3, runs a DuckDB analytics query, serializes the result, and sends it to Slack. A failed serialization retries without re-downloading the file or re-running the query."
      flow:
        - node: "schedule"
          label: "daily trigger"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "http download"
          label: "fetch file"
          pluginClass: "io.kestra.plugin.core.http.Download"
        - node: "duckdb query"
          label: "run analytics"
          pluginClass: "io.kestra.plugin.jdbc.duckdb.Query"
        - node: "slack"
          label: "send result"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "Step retries stay local"
          description: "A Slack failure retries the notification without re-running the query."
        - title: "Full execution record"
          description: "Query, row count, and output path land in one execution view."
        - title: "Parameterized by date"
          description: "The schedule trigger date is available to the query as a named variable."
          wide: true
    - badge: "Event-driven"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Trigger a DuckDB query when a file lands"
      description: "A file appears in S3 or GCS. Kestra fires immediately, runs the DuckDB query against the new file, and exports the result. No waiting for the next cron window."
      flow:
        - node: "s3 trigger"
          label: "file arrives"
          pluginClass: "io.kestra.plugin.aws.s3.Trigger"
        - node: "duckdb query"
          label: "run query"
          pluginClass: "io.kestra.plugin.jdbc.duckdb.Query"
        - node: "export csv"
          label: "serialize result"
          pluginClass: "io.kestra.plugin.serdes.csv.IonToCsv"
        - node: "notify"
          label: "Slack confirm"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "No cron lag"
          description: "The query fires the moment the file arrives, not at the next interval."
        - title: "S3 key available in context"
          description: "The trigger passes the file path to the DuckDB query automatically."
        - title: "Export retries in isolation"
          description: "A failed CSV export retries without re-running the DuckDB query."
          wide: true
    - badge: "Quality gate"
      badgeIcon: "mdi:shield-check-outline"
      title: "Validate data before the downstream write"
      description: "DuckDB runs a null-count and row-count check on the input before anything is written downstream. If the check fails, Kestra halts the flow and pages the team. Clean data continues to the export."
      flow:
        - node: "ingest"
          label: "upstream sync"
          pluginClass: "io.kestra.plugin.airbyte.connections.Sync"
        - node: "duckdb check"
          label: "quality validation"
          pluginClass: "io.kestra.plugin.jdbc.duckdb.Query"
        - node: "branch"
          label: "pass or halt"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "warehouse write"
          label: "load if clean"
          pluginClass: "io.kestra.plugin.gcp.bigquery.Query"
      items:
        - title: "Halt before bad data writes"
          description: "A failed check stops the flow before any warehouse write happens."
        - title: "Branch on result"
          description: "Pass routes to the write; fail routes to the alert."
        - title: "Reusable check pattern"
          description: "The same DuckDB check query works across multiple pipelines."
          wide: true
    - badge: "ELT step"
      badgeIcon: "mdi:pipe-disconnected"
      title: "Airbyte to DuckDB transform to export"
      description: "An Airbyte sync lands raw data, Kestra waits for it, runs a DuckDB transform, and exports the result. DuckDB handles the lightweight transform without a warehouse or cluster, and a failed export retries in isolation."
      flow:
        - node: "airbyte sync"
          label: "ingest raw data"
          pluginClass: "io.kestra.plugin.airbyte.connections.Sync"
        - node: "duckdb transform"
          label: "lightweight transform"
          pluginClass: "io.kestra.plugin.jdbc.duckdb.Query"
        - node: "export result"
          label: "write to S3"
          pluginClass: "io.kestra.plugin.aws.s3.Upload"
        - node: "slack"
          label: "on complete"
          pluginClass: "io.kestra.plugin.notifications.slack.SlackIncomingWebhook"
      items:
        - title: "No warehouse required"
          description: "DuckDB handles the transform step in-process without external compute."
        - title: "Export retries locally"
          description: "A failed S3 upload retries without re-running the transform."
        - title: "One execution ID"
          description: "Ingest, transform, and export share one history view."
          wide: true

