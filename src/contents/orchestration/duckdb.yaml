faq:
  - question: "Does DuckDB have a scheduler, and why use Kestra?"
    answer: "DuckDB is an in-process SQL engine: it runs inside your application or a single process, executes queries, then exits. It has no scheduler, no orchestration, no retries, and no persistence beyond the process. Kestra provides all of that around it. It triggers <code>io.kestra.plugin.jdbc.duckdb.Query</code> on a cron <code>Schedule</code> or an event, sequences it with downloads, Python, and notifications, persists the results to storage, and gives one execution history. Kestra turns a local DuckDB analysis into a scheduled, observable production job."
  - question: "How does Kestra query a CSV or Parquet file with DuckDB?"
    answer: "Use the DuckDB <code>Query</code> task's <code>inputFiles</code> property to write the file into the task working directory, then read it in SQL with <code>read_csv_auto('file.csv')</code> or <code>read_parquet</code>. For remote files, run <code>INSTALL httpfs; LOAD httpfs;</code> in a <code>Queries</code> task to read straight from an S3 or HTTP URL. Set <code>fetchType: STORE</code> to stream the result to Kestra internal storage as ION for the next task."
  - question: "How do I persist a DuckDB database between tasks?"
    answer: "A default in-memory DuckDB is lost when the task ends. Set <code>outputFiles</code> to capture specific result files, or <code>outputDbFile: true</code> to persist the entire <code>.duckdb</code> database to internal storage. Downstream tasks and flows read those outputs by URI, so you can split a pipeline across tasks while keeping the same database state."
  - question: "Can Kestra run dbt or SQLMesh on DuckDB?"
    answer: "Yes. Kestra clones the project with <code>git.Clone</code>, then runs <code>io.kestra.plugin.dbt.cli.DbtCLI</code> or <code>io.kestra.plugin.sqlmesh.cli.SQLMeshCLI</code> against a DuckDB target in a container. Because DuckDB runs in-process with no credentials, it is the fastest engine for model CI and pull-request checks. The same flow can target <a href='/orchestration/snowflake'>Snowflake</a> or <a href='/orchestration/bigquery'>BigQuery</a> for production by changing the profile."
  - question: "Can I scale from local DuckDB to MotherDuck?"
    answer: "Yes, with no SQL rewrite. Point the same <code>Query</code> task at MotherDuck by setting the JDBC URL to <code>jdbc:duckdb:md:my_db?motherduck_token={{ secret('MOTHERDUCK_TOKEN') }}</code>. A flow that prototyped against a local in-memory database then runs against a shared, cloud-hosted DuckDB, so you scale from a laptop to a team without rebuilding the pipeline."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted keeps your DuckDB files and the data they read entirely within your own infrastructure."

