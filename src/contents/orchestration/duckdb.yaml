title: "Orchestrate DuckDB with Kestra: scheduled file analytics, productionized notebooks, and dbt on an in-process engine"
description: "Query CSV and Parquet in place, schedule and persist DuckDB runs, productionize a notebook ETL, and run dbt or SQLMesh on a DuckDB engine, all from one execution history."

tool:
  name: "DuckDB"
  pluginClass: "io.kestra.plugin.jdbc.duckdb.Query"
  color: "#FFF100"

hero:
  title: "Take DuckDB from your laptop to production."
  description: "DuckDB runs the SQL in-process, fast and local. Kestra gives it what an in-process engine cannot: a schedule, retries, multi-step pipelines, and somewhere to persist the result. Query files in place, productionize a notebook ETL, and run dbt on DuckDB, all with one execution history."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "DuckDB is an in-process engine with no scheduler and no persistence beyond the process. Kestra wraps it with everything production needs: it queries a remote CSV or <a href='/orchestration/aws'>S3</a> Parquet file in place, schedules the run, persists the result and even the <code>.duckdb</code> file to storage, and chains DuckDB with Python, <a href='/orchestration/dbt-core'>dbt</a>, and <a href='/orchestration/slack'>Slack</a> in one flow. The throwaway notebook session becomes a scheduled, observable job."

pillars:
  title: "Production scaffolding for an in-process engine."
  subtitle: "DuckDB runs the SQL, the file reads, and the joins. Kestra runs the steps around the query: what triggers it, what feeds it, where the result is persisted, and how it scales out."
  items:
    - icon: "mdi:clock-outline"
      title: "A scheduler for an in-process engine"
      description: "DuckDB cannot trigger itself; it runs once, in a process, then exits. Kestra drives <code>io.kestra.plugin.jdbc.duckdb.Query</code> on a cron <code>Schedule</code>, on a file arrival, or on a webhook, with per-run retries and backfills. The analysis you ran by hand becomes a job that runs on time, every time, and alerts you when it does not."
    - icon: "mdi:file-search-outline"
      title: "Query files in place, no warehouse"
      description: "DuckDB reads CSV, Parquet, and JSON directly from a URL or object store. Kestra's <code>inputFiles</code> writes the file into the task working directory so the SQL reads it by name, and <code>fetchType: STORE</code> streams the result to internal storage. You get warehouse-style analytics over a lake with zero infrastructure to provision."
    - icon: "mdi:content-save-outline"
      title: "Persist the ephemeral database"
      description: "A default in-memory DuckDB vanishes when the process ends. Kestra's <code>outputFiles</code> and <code>outputDbFile</code> capture query results and the whole <code>.duckdb</code> file into internal storage, so the next task or flow reads them. The in-process engine gains durable, shareable state without running a server."
    - icon: "mdi:pipe-disconnected"
      title: "Multi-step pipelines around the query"
      description: "Real work is download, transform, query, serialize, notify. DuckDB does one SQL step. Kestra sequences it with <code>core.http.Download</code>, a Python or Polars transform, a <code>serdes</code> conversion, and a notification, with outputs flowing between tasks. The SQL becomes one node in a real DAG, not the whole script."
    - icon: "mdi:cube-outline"
      title: "dbt and SQLMesh on a DuckDB engine"
      description: "DuckDB is the fastest way to run <a href='/orchestration/dbt-core'>dbt</a> or SQLMesh models in CI, with no warehouse credentials. Kestra clones the project with <code>git.Clone</code>, runs <code>dbt build</code> or <code>SQLMeshCLI</code> against DuckDB in a container, then queries the result. Prototype locally, then point the same flow at <a href='/orchestration/snowflake'>Snowflake</a> for production."
    - icon: "mdi:cloud-sync-outline"
      title: "Scale out to MotherDuck when you need to"
      description: "Local DuckDB is perfect until the data or the team outgrows one process. The same <code>Query</code> task points at MotherDuck by changing the JDBC URL to <code>jdbc:duckdb:md:</code> with a token, so a flow that prototyped on a laptop runs against a shared cloud database with no rewrite of the SQL."

useCases:
  title: "How teams use DuckDB and Kestra"
  subtitle: "Patterns analytics engineering teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "In-place analytics"
      badgeIcon: "mdi:file-search-outline"
      title: "Query a remote file without loading a warehouse"
      description: "A dataset lives behind a URL or in object storage. Kestra downloads it, runs a DuckDB <code>Query</code> with <code>inputFiles</code> so the SQL reads it by name, then exports the result as CSV. Warehouse-style aggregation over a flat file, with nothing to provision and the result streamed to storage."
      flow:
        - node: "download"
          label: "fetch file"
          pluginClass: "io.kestra.plugin.core.http.Download"
        - node: "duckdb query"
          label: "SQL in place"
          pluginClass: "io.kestra.plugin.jdbc.duckdb.Query"
        - node: "to csv"
          label: "export result"
          pluginClass: "io.kestra.plugin.serdes.csv.IonToCsv"
      items:
        - title: "Read by filename"
          description: "<code>inputFiles</code> drops the file in the working dir so <code>read_csv_auto</code> just works."
        - title: "Result streamed to storage"
          description: "<code>fetchType: STORE</code> writes rows to internal storage as ION for the next task."
        - title: "Zero infrastructure"
          description: "No warehouse, no credentials, no cluster. DuckDB runs in the task process."
          wide: true
    - badge: "Scheduled report"
      badgeIcon: "mdi:calendar-clock"
      title: "Run a weekly SQL summary and post it to Slack"
      description: "Business metrics live in a CSV or object store, and someone keeps checking them by hand. Kestra runs a DuckDB <code>Queries</code> aggregation on a cron <code>Schedule</code>, formats the numbers, and posts a summary to <a href='/orchestration/slack'>Slack</a> every Monday, replacing the manual spreadsheet check with a job."
      flow:
        - node: "schedule"
          label: "every Monday"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "duckdb queries"
          label: "aggregate"
          pluginClass: "io.kestra.plugin.jdbc.duckdb.Queries"
        - node: "slack"
          label: "post summary"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Analytics on a clock"
          description: "A cron <code>Schedule</code> runs the report without anyone opening a notebook."
        - title: "httpfs for remote files"
          description: "<code>INSTALL httpfs; LOAD httpfs;</code> lets DuckDB query the file straight from a URL."
        - title: "Numbers where the team is"
          description: "The summary lands in the channel, not in a file someone has to open."
          wide: true
    - badge: "Notebook to prod"
      badgeIcon: "mdi:flask-outline"
      title: "Productionize a REST-API-to-DuckDB ETL"
      description: "An analyst's notebook pulls an API, shapes it in Polars, and queries it in DuckDB. Kestra runs the same three steps as a flow: <code>http.Request</code> fetches the data, a Python step transforms it with <code>outputFiles</code>, then a DuckDB <code>Query</code> aggregates it, on a schedule with retries."
      flow:
        - node: "api request"
          label: "fetch JSON"
          pluginClass: "io.kestra.plugin.core.http.Request"
        - node: "python"
          label: "Polars transform"
          pluginClass: "io.kestra.plugin.scripts.python.Script"
        - node: "duckdb query"
          label: "analyze"
          pluginClass: "io.kestra.plugin.jdbc.duckdb.Query"
      items:
        - title: "Same steps, now scheduled"
          description: "The notebook's fetch, transform, and query become three ordered, retryable tasks."
        - title: "Polars hands off to DuckDB"
          description: "Python writes a file via <code>outputFiles</code> that DuckDB reads with <code>inputFiles</code>."
        - title: "No more it-works-on-my-machine"
          description: "Each step runs in a pinned container, so the run is reproducible anywhere."
          wide: true
    - badge: "Transformations"
      badgeIcon: "mdi:cube-outline"
      title: "Run dbt or SQLMesh models on DuckDB from Git"
      description: "Transformation projects live in version control. Kestra clones the repo, runs <code>SQLMeshCLI</code> (or <code>dbt build</code>) against a DuckDB engine in a container, then queries the materialized result. A fast, credential-free CI engine for models you later ship to a cloud warehouse."
      flow:
        - node: "git clone"
          label: "pull project"
          pluginClass: "io.kestra.plugin.git.Clone"
        - node: "sqlmesh"
          label: "run models"
          pluginClass: "io.kestra.plugin.sqlmesh.cli.SQLMeshCLI"
        - node: "duckdb queries"
          label: "query result"
          pluginClass: "io.kestra.plugin.jdbc.duckdb.Queries"
        - node: "teams"
          label: "on complete"
          pluginClass: "io.kestra.plugin.microsoft365.teams.TeamsIncomingWebhook"
      items:
        - title: "Credential-free CI"
          description: "DuckDB runs the models in-process, so pull-request checks need no warehouse."
        - title: "dbt or SQLMesh"
          description: "Swap <code>SQLMeshCLI</code> for <code>dbt.cli.DbtCLI</code>; the engine stays DuckDB."
        - title: "Promote to a cloud warehouse"
          description: "Point the same flow at <a href='/orchestration/bigquery'>BigQuery</a> or Snowflake for production runs."
          wide: true
    - badge: "Caching"
      badgeIcon: "mdi:cached"
      title: "Cache an expensive upstream pull in a join pipeline"
      description: "A slow-changing reference table is downloaded on every run, wasting time and load. Kestra caches that download for 24 hours with <code>taskCache</code>, pulls only the fresh transactional data each run, then joins both in DuckDB, so the heavy fetch happens once a day, not every execution."
      flow:
        - node: "cached pull"
          label: "reference (TTL 24h)"
          pluginClass: "io.kestra.plugin.core.http.Download"
        - node: "fresh pull"
          label: "transactions"
          pluginClass: "io.kestra.plugin.core.http.Download"
        - node: "duckdb query"
          label: "join + profit"
          pluginClass: "io.kestra.plugin.jdbc.duckdb.Query"
      items:
        - title: "taskCache with a TTL"
          description: "The reference download is reused for 24 hours, cutting load on the source."
        - title: "Fresh data still flows"
          description: "Only the transactional pull runs every execution; the join sees both."
        - title: "Less time, less cost"
          description: "The expensive fetch happens once a day instead of on every run."
          wide: true

