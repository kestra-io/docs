faq:
  - question: "What does Kestra add to a DuckDB query?"
    answer: "DuckDB runs the query fast and in-process. Kestra wraps it in an observable pipeline: triggers <code>io.kestra.plugin.jdbc.duckdb.Query</code> on a schedule or when a file arrives, downloads the input if needed, exports the result, and sends a notification. Every step has its own retry policy and every run lands in a searchable execution history."
  - question: "Can Kestra trigger a DuckDB query when a file lands in S3 or GCS?"
    answer: "Yes. The <code>io.kestra.plugin.aws.s3.Trigger</code> or <code>io.kestra.plugin.gcp.gcs.Trigger</code> watches a bucket prefix and starts the flow the moment a matching file appears. The file path from the trigger is available as a named variable in the DuckDB query task, so the query runs against the exact file that just landed."
  - question: "How does Kestra use DuckDB as a data quality gate?"
    answer: "Add a DuckDB query task that checks row counts, null rates, or schema after an ingestion step. Pipe the result to an <code>io.kestra.plugin.core.flow.If</code> task that halts the flow if the check fails and routes to a Slack alert. Downstream writes only happen when the DuckDB validation passes."
  - question: "Can DuckDB be a transform step between Airbyte and a warehouse?"
    answer: "Yes. Airbyte syncs the raw data, Kestra waits for terminal status, runs the DuckDB transform on the landed files, and exports the result to the warehouse. Each step retries independently so a warehouse write failure retries the write only, without re-running the Airbyte sync or the DuckDB transform."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers fully self-hosted deployment on Docker or Kubernetes, a managed cloud version, and air-gapped options for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted keeps your pipeline execution and credentials inside your own network."

