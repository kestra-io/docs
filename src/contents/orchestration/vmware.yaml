faq:
  - question: "Does Kestra replace VMware vCenter and ESXi?"
    answer: "No. vCenter and ESXi continue to run your VMs. Kestra calls the vCenter and ESXi APIs through the <code>io.kestra.plugin.ee.vmware</code> plugin to run the operations you used to script: <code>CloneVm</code>, <code>CreateVmSnapshot</code>, <code>RestoreVmFromSnapshot</code>, <code>UpdateVm</code>, and so on. The hypervisor stays where it is. Kestra orchestrates the workflow around it."
  - question: "What about vRealize Automation (vRA) and vRealize Orchestrator (vRO)?"
    answer: "vRA and vRO (now bundled as VMware Aria Automation) sit above vCenter as the automation and self-service layer. That is the layer Kestra replaces. BHP cut licensing cost by 90% and reduced time-to-deliver from 6 months to 6 days by moving off Aria Automation onto Kestra, while keeping vCenter and ESXi exactly as they were. The vRA service catalog becomes Kestra Apps. vRO actions (JavaScript, PowerShell, or Python) become Kestra YAML flows that can still call the same scripts. The hypervisor doesn't move."
  - question: "Does the plugin work with both vCenter-managed clusters and standalone ESXi hosts?"
    answer: "Yes. The plugin ships two task groups: <code>io.kestra.plugin.ee.vmware.vcenter.*</code> for vCenter-managed environments, and <code>io.kestra.plugin.ee.vmware.esxi.*</code> for standalone ESXi hosts. The task names match (CreateVm, StartVm, CreateVmSnapshot, RestoreVmFromSnapshot, and so on), so the same flow shape works against either endpoint. Template and clone operations are vCenter-only."
  - question: "How do the vCenter and ESXi event triggers actually work?"
    answer: "The <code>vcenter.Trigger</code> and <code>esxi.Trigger</code> poll the API on a configurable interval (default PT2M, supports PT1M). They emit events matching a <code>VmEventType</code> (VM_CREATED, VM_REMOVED, VM_POWERED_OFF, VM_SUSPENDED, VM_FAILED_TO_POWER_ON, and others) and a <code>vmNameRegex</code>. The events land in the flow as <code>trigger.events</code>, a list you iterate with <code>ForEach</code>. No webhook setup on vCenter, no extra service running."
  - question: "Can I chain a vCenter clone with Terraform, Ansible, and ServiceNow in one flow?"
    answer: "Yes. Each tool runs as a task in one Kestra flow. <code>CloneVm</code> emits the VM's IP, hostname, and UUID. The next Ansible task templates those into the inventory and runs the playbook. ServiceNow lands the CMDB record. If Ansible fails, Kestra retries only that step, the vCenter clone is not re-run. One execution ID, one audit trail, one place to debug. BHP runs this exact pattern in production."
  - question: "How does Kestra handle vCenter and ESXi credentials?"
    answer: "Credentials come from Kestra's secrets backend (built-in, or HashiCorp Vault, CyberArk, AWS Secrets Manager, GCP Secret Manager) and are injected at task execution time. The plugin accepts <code>username</code> and <code>password</code> as templated strings, typically <code>{{ secret('VMWARE_VCENTER_USERNAME') }}</code> and <code>{{ secret('VMWARE_VCENTER_PASSWORD') }}</code>. Workers can run inside a restricted OT or DMZ network zone so the credentials never leave that boundary."
  - question: "Is the VMware plugin Enterprise-only?"
    answer: "Yes, the <code>io.kestra.plugin.ee.vmware</code> plugin is part of Kestra Enterprise. Kestra Enterprise also includes the Apps layer, RBAC, audit logs, worker isolation, and SSO that infrastructure teams replacing vRA/vRO typically need."
  - question: "Can Kestra run inside an air-gapped, multi-zone OT environment?"
    answer: "Yes. Kestra ships self-hosted on Docker or Kubernetes, runs fully air-gapped, and supports per-zone control planes with remote workers close to each vCenter or ESXi endpoint. BHP deploys this pattern across four OT assets plus one IT, each scoped to its own network zone, with AD-backed authentication, least-privilege RBAC, and logs shipped to the enterprise SIEM."

