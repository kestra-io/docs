faq:
  - question: "Does Kestra replace VMware vCenter and ESXi?"
    answer: "No. vCenter and ESXi continue to run your VMs. Kestra calls the vCenter and ESXi APIs through the <a href='/plugins/plugin-ee-vmware'>VMware plugin</a> to run the operations you used to script: CloneVm, CreateVmSnapshot, RestoreVmFromSnapshot, UpdateVm, and so on. The hypervisor stays where it is. Kestra orchestrates the workflow around it."
  - question: "What about vRealize Automation (vRA) and vRealize Orchestrator (vRO)?"
    answer: "vRA and vRO (now bundled as VMware Aria Automation) sit above vCenter as the automation and self-service layer. That is the layer Kestra replaces. The vRA service catalog becomes Kestra Apps with typed inputs and RBAC. vRO actions (JavaScript, PowerShell, or Python) become Kestra YAML flows that can still call the same scripts. vCenter and ESXi stay where they are."
  - question: "Does the plugin work with both vCenter-managed clusters and standalone ESXi hosts?"
    answer: "Yes. The plugin ships two task groups: io.kestra.plugin.ee.vmware.vcenter.* for vCenter-managed environments, and io.kestra.plugin.ee.vmware.esxi.* for standalone ESXi hosts. The task names match (CreateVm, StartVm, CreateVmSnapshot, RestoreVmFromSnapshot, and so on), so the same flow shape works against either endpoint. Template and clone operations are vCenter-only."
  - question: "How do the vCenter and ESXi event triggers actually work?"
    answer: "The vcenter.Trigger and esxi.Trigger poll the API on a configurable interval (default PT2M, supports PT1M). They emit events matching a VmEventType (VM_CREATED, VM_REMOVED, VM_POWERED_OFF, VM_SUSPENDED, VM_FAILED_TO_POWER_ON, and others) and a vmNameRegex. The events land in the flow as trigger.events, a list you iterate with ForEach. No webhook setup on vCenter, no extra service running."
  - question: "Can I chain a vCenter clone with Terraform, Ansible, and ServiceNow in one flow?"
    answer: "Yes. Each tool runs as a task in one Kestra flow. CloneVm emits the VM's IP, hostname, and UUID. The next <a href='/orchestration/ansible'>Ansible</a> task templates those into the inventory and runs the playbook. <a href='/orchestration/servicenow'>ServiceNow</a> lands the CMDB record. If Ansible fails, Kestra retries only that step, the vCenter clone is not re-run. One execution ID, one audit trail, one place to debug."
  - question: "How does Kestra handle vCenter and ESXi credentials?"
    answer: "Credentials come from Kestra's secrets backend (built-in, or HashiCorp Vault, CyberArk, AWS Secrets Manager, GCP Secret Manager) and are injected at task execution time. The plugin accepts username and password as templated strings, typically rendered with the secret() function from VMWARE_VCENTER_USERNAME and VMWARE_VCENTER_PASSWORD. Workers can run inside a restricted OT or DMZ network zone so the credentials never leave that boundary."
  - question: "Is the VMware plugin Enterprise-only?"
    answer: "Yes, the io.kestra.plugin.ee.vmware plugin is part of <a href='/enterprise'>Kestra Enterprise</a>. Kestra Enterprise also includes the Apps layer, RBAC, audit logs, worker isolation, and SSO that infrastructure teams replacing vRA/vRO typically need. See <a href='/infra-automation'>Kestra for infrastructure automation</a> for the broader picture across <a href='/orchestration/terraform'>Terraform</a>, <a href='/orchestration/ansible'>Ansible</a>, and cloud APIs."
  - question: "Can Kestra run inside an air-gapped, multi-zone OT environment?"
    answer: "Yes. Kestra ships self-hosted on Docker or <a href='/orchestration/kubernetes'>Kubernetes</a>, runs fully air-gapped, and supports per-zone control planes with remote workers close to each vCenter or ESXi endpoint. AD-backed authentication, least-privilege RBAC, and log shipping to the enterprise SIEM are all supported with no external dependency on Kestra's infrastructure."

