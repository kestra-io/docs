title: "Orchestrate VMware and your virtualization ecosystem with Kestra: VMs, snapshots, events"
description: "VMware powers your virtualization ecosystem. Kestra runs the workflows around it: trigger on VM events, snapshot before patching, gate destructive ops, and chain VMware with Terraform, Ansible, and ServiceNow."

tool:
  name: "VMware"
  pluginClass: "io.kestra.plugin.ee.vmware.vcenter.CreateVm"
  color: "#00B135"

hero:
  title: "Your VMware estate, fully orchestrated."
  description: "Trigger VM tasks from cron, VMware events, webhooks, or any HTTP signal. Snapshot before patching, gate destructive ops with the Pause task, retry only the failed step, and chain VMware with Ansible, Terraform, and ServiceNow in one execution history."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

pillars:
  title: "Above vCenter, around every VM operation."
  subtitle: "What Kestra wraps around vSphere: when actions fire, what gets a snapshot first, who approves a delete, and where the audit lives. Your vCenter and ESXi hosts stay in place. The vRA/vRO catalog gets replaced."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "Event triggers on vCenter and ESXi lifecycle"
      description: "The <code>vcenter.Trigger</code> and <code>esxi.Trigger</code> poll the API every minute or two for VM lifecycle events: created, removed, powered off, suspended, failed to power on. Filter by event type and a VM name regex. The payload reaches the flow as <code>trigger.events</code>, so cleanup, alerts, or DR steps run with the right VM in context."
    - icon: "mdi:camera-outline"
      title: "Snapshot-first maintenance with automatic rollback"
      description: "<code>CreateVmSnapshot</code> runs before patches, template refreshes, or risky reconfigurations. <code>RestoreVmFromSnapshot</code> reverts on a failed health check. The snapshot ID flows forward, so every patch run has a rollback target captured per execution."
    - icon: "mdi:transit-connection-variant"
      title: "vCenter clone, Ansible configure, ServiceNow register, in one flow"
      description: "After <code>CloneVm</code> finishes, the VM's IP, hostname, and UUID flow into the next task. <code>ansible-playbook</code> joins the domain and installs agents. ServiceNow gets a new CMDB record. Kestra customer BHP, a Fortune 500 industrial company, runs this exact sequence across its corporate IT and OT (operational technology, the systems running its plants and sites) network zones."
    - icon: "mdi:shield-check-outline"
      title: "Approval gates and self-service forms in front of every destructive action"
      description: "The Pause task suspends the flow before delete, reset, or template conversion. A Kestra App turns the operation into a typed form: dropdowns for the VM, the snapshot, the datastore, the target environment. Operators submit. RBAC controls who can launch what. BHP replaced its vRA self-service catalog with this pattern."
    - icon: "mdi:network-outline"
      title: "Per-zone control plane for multi-domain isolation"
      description: "Kestra runs as a self-hosted control plane inside each OT or IT network zone, with remote workers close to the vSphere endpoint. No external connectivity, no shared control plane across regulated boundaries. BHP deploys this across four OT assets and one IT, each scoped to its own zone."
    - icon: "mdi:history"
      title: "Per-VM, per-event execution history"
      description: "Every operation captures the trigger source, the VM name, the snapshot taken, the operator, and the resulting state. The record is searchable by date, status, or VM. Auditors get evidence by default, attached to the execution that produced it."

useCases:
  title: "How infrastructure teams use VMware and Kestra"
  subtitle: "Patterns vSphere admins and platform teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Full pipeline"
      badgeIcon: "mdi:pipe-disconnected"
      title: "Provision from a vCenter template, configure with Ansible, register in ServiceNow"
      description: "<code>io.kestra.plugin.ee.vmware.vcenter.CloneVm</code> deploys a VM from a golden template. The VM's IP and hostname flow into <code>ansible-playbook</code>, which joins the domain, installs agents, and applies config. ServiceNow gets a new CMDB entry. Slack confirms. BHP runs this pattern across four OT environments and one IT."
      flow:
        - node: "ServiceNow webhook"
          label: "approved ticket"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "Clone from template"
          label: "vCenter"
          pluginClass: "io.kestra.plugin.ee.vmware.vcenter.CloneVm"
        - node: "ansible-playbook"
          label: "configure host"
          pluginClass: "io.kestra.plugin.ansible.cli.AnsibleCLI"
        - node: "ServiceNow"
          label: "CMDB update"
          pluginClass: "io.kestra.plugin.servicenow.Post"
        - node: "notify"
          label: "Slack"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Step-level retries"
          description: "Retry only the failed step. The <code>CloneVm</code> does not re-run when the playbook fails."
        - title: "Outputs flow forward"
          description: "Pass the VM name, IP, and vCenter UUID into the Ansible inventory and the ServiceNow record."
        - title: "Single execution context"
          description: "One execution ID across vCenter, Ansible, and ServiceNow. One UI to debug."
        - title: "CMDB stays in sync"
          description: "Every provision lands a record in ServiceNow with the vCenter metadata attached."
    - badge: "Operations"
      badgeIcon: "mdi:camera-outline"
      title: "Pre-patch snapshot, OS update, rollback on health-check failure"
      description: "<code>CreateVmSnapshot</code> captures the pre-patch state. A Shell or Ansible task runs the OS update over SSH. An HTTP probe checks the application after reboot. On failure, <code>RestoreVmFromSnapshot</code> rolls back automatically and Slack alerts the on-call. The snapshot ID is preserved per execution so the rollback always lands on the right state."
      flow:
        - node: "cron trigger"
          label: "patch window"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "snapshot"
          label: "pre-patch"
          pluginClass: "io.kestra.plugin.ee.vmware.vcenter.CreateVmSnapshot"
        - node: "ssh patch"
          label: "apt / yum upgrade"
          pluginClass: "io.kestra.plugin.scripts.shell.Commands"
        - node: "health check"
          label: "HTTP probe"
          pluginClass: "io.kestra.plugin.core.http.Request"
        - node: "rollback on fail"
          label: "restore snapshot"
          pluginClass: "io.kestra.plugin.ee.vmware.vcenter.RestoreVmFromSnapshot"
        - node: "notify"
          label: "Slack"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Snapshot captured per run"
          description: "<code>snapshotExtId</code> is stored in the execution outputs and reusable downstream."
        - title: "Automatic rollback on health failure"
          description: "An <code>errors</code> branch fires <code>RestoreVmFromSnapshot</code> if the post-patch probe fails."
        - title: "Replayable per VM"
          description: "Re-run the patch on the same VM with the same snapshot from the execution UI."
        - title: "On-call alert with execution link"
          description: "Slack message includes the VM name, snapshot ID, and the URL of the failing execution."
    - badge: "Event-driven"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Event-driven cleanup on vCenter VM removal"
      description: "The <code>vcenter.Trigger</code> polls for VM removal events. When a VM disappears from vCenter, a <code>ForEach</code> loops over the events, removes the DNS A record, deletes the Active Directory computer object via PowerShell, and posts a CrowdStrike API call to hide the host. The whole offboarding sequence runs without a human in the loop."
      flow:
        - node: "vCenter Trigger"
          label: "VM_REMOVED"
          pluginClass: "io.kestra.plugin.ee.vmware.vcenter.Trigger"
        - node: "ForEach event"
          label: "per VM"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "Remove DNS"
          label: "PowerShell"
          pluginClass: "io.kestra.plugin.scripts.powershell.Commands"
        - node: "Remove AD entry"
          label: "PowerShell"
          pluginClass: "io.kestra.plugin.scripts.powershell.Commands"
        - node: "CrowdStrike hide"
          label: "API call"
          pluginClass: "io.kestra.plugin.core.http.Request"
      items:
        - title: "Polling at PT1M or PT2M"
          description: "Sub-minute event detection without a webhook on vCenter."
        - title: "Filter by event type and VM name"
          description: "Match only <code>VmRemovedEvent</code> on names matching a regex (production, staging, test)."
        - title: "Per-event execution"
          description: "Each removed VM gets its own ForEach iteration and its own log line."
        - title: "Idempotent cleanup steps"
          description: "Skip steps that already ran if the DNS or AD entry is already gone."
      signal: "Published as the <code>vm-event-based-cleanup</code> blueprint in the Kestra catalog."
    - badge: "Self-service"
      badgeIcon: "mdi:account-multiple-outline"
      title: "Self-service VM operations behind a Kestra App"
      description: "Replace the vRA service catalog with a typed form. Operators pick the template, datastore, network, and target environment from dropdowns. The same audited flow runs every time: clone, configure, register. RBAC controls who can launch what."
      flow:
        - node: "Kestra App"
          label: "typed form"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "validate inputs"
          label: "RBAC + schema"
          pluginClass: "io.kestra.plugin.core.log.Log"
        - node: "Clone VM"
          label: "from template"
          pluginClass: "io.kestra.plugin.ee.vmware.vcenter.CloneVm"
        - node: "ansible-playbook"
          label: "configure"
          pluginClass: "io.kestra.plugin.ansible.cli.AnsibleCLI"
        - node: "notify"
          label: "Slack + audit"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Typed inputs and dropdowns"
          description: "Form inputs validated before the run. Datastore, network, template all picked from live data."
        - title: "RBAC on who can run what"
          description: "Role-based access on the form itself, not on vCenter console handouts."
        - title: "Same flow, every request"
          description: "Every submission goes through the same audited, retry-aware execution."
          wide: true

