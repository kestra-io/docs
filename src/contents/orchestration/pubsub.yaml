title: "Orchestrate Google Cloud Pub/Sub with Kestra: per-message pipelines, streaming loads, and event publishing"
description: "Start one execution per Pub/Sub message, micro-batch events into BigQuery, fan messages out to databases and APIs, and publish completion events, all with retries and one execution history."

tool:
  name: "Pub/Sub"
  pluginClass: "io.kestra.plugin.gcp.pubsub.Publish"
  color: "#4285F4"

hero:
  title: "Turn every Pub/Sub message into a pipeline."
  description: "Pub/Sub moves the messages. Kestra runs the work each one should trigger: start an execution per message, validate and load it, fan it out to a database or API, or publish events from a finished pipeline, all with retries and one execution history."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Pub/Sub delivers a message and acks it, but it runs no multi-step pipeline, keeps no execution history, and coordinates no sinks. Kestra supplies all of it: a realtime trigger starts one governed run per message, micro-batches events into <a href='/orchestration/bigquery'>BigQuery</a>, fans messages out to <a href='/orchestration/postgres'>Postgres</a> or an API, and publishes completion events back to a topic. If your events live in <a href='/orchestration/kafka'>Kafka</a> instead, the same patterns apply there."

pillars:
  title: "A pipeline layer on top of Pub/Sub."
  subtitle: "Pub/Sub runs the topics, the delivery, and the acks. Kestra runs the steps around the message: what each one triggers, how it is validated and loaded, where it fans out, and how it is replayed."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "One execution per message"
      description: "Pub/Sub delivers a message; it does not run a transform, a load, and a notification per message. <code>io.kestra.plugin.gcp.pubsub.RealtimeTrigger</code> starts one execution for each message, with the payload at <code>{{ trigger.data }}</code>, so a message becomes a governed run that fans out to a database, an API, or a warehouse, with step retries."
    - icon: "mdi:database-import-outline"
      title: "Streaming loads into BigQuery"
      description: "Per-row streaming into the warehouse hits DML and quota limits fast. The Pub/Sub <code>Trigger</code> micro-batches messages on a short interval, and Kestra converts them with <code>serdes.json.IonToJson</code> and appends them to <a href='/orchestration/bigquery'>BigQuery</a> in one load job, staying under quotas while keeping latency low."
    - icon: "mdi:upload-network-outline"
      title: "Publish events from a pipeline"
      description: "Other systems need to know when work finishes. <code>io.kestra.plugin.gcp.pubsub.Publish</code> emits a structured completion event (run id, status, row count) plus attributes to a topic, so a finished Kestra flow becomes a fan-out signal that downstream consumers and other flows react to."
    - icon: "mdi:source-branch"
      title: "Fan out to databases and APIs"
      description: "A message often needs to land in more than one place. Kestra validates each message with an <code>If</code>, then upserts it into <a href='/orchestration/postgres'>Postgres</a>, writes it to Firestore, or calls a downstream API with <code>core.http.Request</code>, isolating failures per sink so one bad target never blocks the others."
    - icon: "mdi:replay"
      title: "Retries and replay with history"
      description: "Pub/Sub redelivers on nack and dead-letters after N attempts, but gives no per-message execution record. Kestra logs one execution per message, retries individual steps with backoff, and lets you replay from a point, so a transient sink outage is recoverable with full visibility instead of a lost message."
    - icon: "mdi:swap-horizontal"
      title: "Bridge Pub/Sub with the rest of the stack"
      description: "Pub/Sub does not own the dbt model, the warehouse load, or the <a href='/orchestration/kafka'>Kafka</a> topic next to it. Kestra chains consume, transform, load, and notify in one flow, so a Pub/Sub event drives a real cross-tool pipeline rather than ending at the subscriber boundary."

useCases:
  title: "How teams use Pub/Sub and Kestra"
  subtitle: "Patterns data platform teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Streaming ETL"
      badgeIcon: "mdi:database-import-outline"
      title: "Stream Pub/Sub events into BigQuery"
      description: "Events flow in continuously and need to land in the warehouse. The Pub/Sub <code>Trigger</code> micro-batches messages on a short interval, Kestra converts them to newline-delimited JSON, and appends them to a raw <a href='/orchestration/bigquery'>BigQuery</a> table, staying under per-row DML limits while keeping data fresh."
      flow:
        - node: "pubsub trigger"
          label: "micro-batch"
          pluginClass: "io.kestra.plugin.gcp.pubsub.Trigger"
        - node: "to json"
          label: "serialize"
          pluginClass: "io.kestra.plugin.serdes.json.IonToJson"
        - node: "bigquery load"
          label: "append batch"
          pluginClass: "io.kestra.plugin.gcp.bigquery.Load"
        - node: "slack"
          label: "on load"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Micro-batch, not per row"
          description: "One load job per batch stays under BigQuery's per-row DML quotas."
        - title: "Land raw, parse later"
          description: "Autodetect captures the envelope; model the data field downstream."
        - title: "Tune latency vs batch"
          description: "Lower the interval for freshness or raise maxRecords for bigger batches."
          wide: true
    - badge: "Per-message"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Process each message into Postgres in real time"
      description: "Each message needs validation and a durable write. The <code>RealtimeTrigger</code> starts one execution per message, an <code>If</code> validates the payload, and a <a href='/orchestration/postgres'>Postgres</a> <code>Query</code> upserts it with safe named parameters. Microsoft Teams is alerted if a message fails to land."
      flow:
        - node: "realtime trigger"
          label: "per message"
          pluginClass: "io.kestra.plugin.gcp.pubsub.RealtimeTrigger"
        - node: "validate"
          label: "branch"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "postgres upsert"
          label: "named params"
          pluginClass: "io.kestra.plugin.jdbc.postgresql.Query"
        - node: "teams"
          label: "on failure"
          pluginClass: "io.kestra.plugin.microsoft365.teams.TeamsIncomingWebhook"
      items:
        - title: "Governed run per message"
          description: "Each message gets its own execution history with step-level retries."
        - title: "Safe parameter binding"
          description: "Named parameters bind values rather than concatenating into SQL."
        - title: "Validate before writing"
          description: "An <code>If</code> skips or routes messages that fail the check."
          wide: true
    - badge: "Publish"
      badgeIcon: "mdi:upload-network-outline"
      title: "Publish a completion event after a pipeline"
      description: "Downstream systems should react when a pipeline finishes. Kestra runs a <a href='/orchestration/bigquery'>BigQuery</a> aggregation, then <code>Publish</code> emits a structured event (run id, status, row count) to a topic, so consumers and other flows pick it up. Email confirms the publish."
      flow:
        - node: "schedule"
          label: "daily"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "bigquery query"
          label: "aggregate"
          pluginClass: "io.kestra.plugin.gcp.bigquery.Query"
        - node: "pubsub publish"
          label: "emit event"
          pluginClass: "io.kestra.plugin.gcp.pubsub.Publish"
        - node: "email"
          label: "on publish"
          pluginClass: "io.kestra.plugin.email.MailSend"
      items:
        - title: "Finished pipeline, fan-out signal"
          description: "A completion event lets many consumers react to one run."
        - title: "Attributes for filtering"
          description: "Source and flow attributes ride alongside the JSON payload."
        - title: "JSON messages"
          description: "<code>serdeType: JSON</code> publishes the payload consumers parse directly."
          wide: true
    - badge: "NoSQL sink"
      badgeIcon: "mdi:database-outline"
      title: "Push events into Firestore in real time"
      description: "Operational events need a low-latency document store. The <code>RealtimeTrigger</code> starts one run per message and <code>firestore.Set</code> writes the parsed document keyed by an id from the payload, so application state stays current the moment an event arrives. Discord confirms."
      flow:
        - node: "realtime trigger"
          label: "per message"
          pluginClass: "io.kestra.plugin.gcp.pubsub.RealtimeTrigger"
        - node: "firestore set"
          label: "write document"
          pluginClass: "io.kestra.plugin.gcp.firestore.Set"
        - node: "discord"
          label: "on write"
          pluginClass: "io.kestra.plugin.discord.DiscordIncomingWebhook"
      items:
        - title: "Document per event"
          description: "Each message becomes a Firestore document keyed from the payload."
        - title: "Millisecond freshness"
          description: "State updates the instant the message arrives, not on a cron tick."
        - title: "Parse with jq"
          description: "Pull fields out of <code>trigger.data</code> to build the document."
          wide: true
    - badge: "Bridge"
      badgeIcon: "mdi:transit-connection-variant"
      title: "Bridge a Pub/Sub event to a downstream API"
      description: "An event in Pub/Sub needs to reach a system that does not subscribe to it. The <code>RealtimeTrigger</code> starts a run per message, an <code>If</code> filters on the payload, and <code>core.http.Request</code> calls the target API, so two systems that do not natively connect are bridged through one governed flow."
      flow:
        - node: "realtime trigger"
          label: "per message"
          pluginClass: "io.kestra.plugin.gcp.pubsub.RealtimeTrigger"
        - node: "filter"
          label: "branch"
          pluginClass: "io.kestra.plugin.core.flow.If"
        - node: "http request"
          label: "call API"
          pluginClass: "io.kestra.plugin.core.http.Request"
        - node: "slack"
          label: "on call"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Connect the unconnected"
          description: "Bridge Pub/Sub to any HTTP API without a custom subscriber service."
        - title: "Filter before calling"
          description: "An <code>If</code> only calls the API for messages that matter."
        - title: "Retries on the call"
          description: "A transient API error retries the request, not the whole pipeline."
          wide: true

