faq:
  - question: "Can Kestra start a flow for every Pub/Sub message?"
    answer: "Yes. <code>io.kestra.plugin.gcp.pubsub.RealtimeTrigger</code> consumes a subscription and starts one execution per message, with the payload at <code>{{ trigger.data }}</code> and the envelope (messageId, attributes) alongside it. Each message becomes a governed run that can validate, transform, load, and notify, with per-task retries and full execution history. For batched ingestion instead, the <code>Trigger</code> polls and consumes messages in micro-batches."
  - question: "How does Kestra stream Pub/Sub events into BigQuery without hitting quotas?"
    answer: "The Pub/Sub <code>Trigger</code> consumes messages in micro-batches on a short interval; Kestra converts the batch with <code>io.kestra.plugin.serdes.json.IonToJson</code> and appends it to <a href='/orchestration/bigquery'>BigQuery</a> in one load job with <code>io.kestra.plugin.gcp.bigquery.Load</code>. One load per batch stays well under BigQuery's per-row streaming and DML limits while keeping latency low. Land raw and model downstream."
  - question: "Can Kestra publish messages to a Pub/Sub topic?"
    answer: "Yes. <code>io.kestra.plugin.gcp.pubsub.Publish</code> sends one or more messages to a topic, each with a <code>data</code> payload and optional <code>attributes</code>. A common pattern is emitting a completion event (run id, status, row count) when a pipeline finishes, so downstream consumers and other Kestra flows react. Pub/Sub serde is STRING or JSON only."
  - question: "What's the difference between the Pub/Sub Trigger and RealtimeTrigger?"
    answer: "<code>RealtimeTrigger</code> starts one execution per message as it arrives, exposing <code>{{ trigger.data }}</code>, and is best for per-message pipelines. <code>Trigger</code> polls the subscription on an interval and consumes a batch, exposing a file at <code>{{ trigger.uri }}</code>, and is best for micro-batched loads into a warehouse. Pick per-message for low-latency fan-out, batched for efficient bulk loading."
  - question: "Is Kestra self-hosted or managed?"
    answer: "Kestra offers multiple deployment options: fully self-hosted on Docker or Kubernetes, a managed cloud version, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted keeps your service account credentials and message payloads entirely within your own infrastructure."

