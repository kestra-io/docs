title: "Orchestrate Ansible with Kestra: triggers, approval gates, and cross-tool coordination"
description: "Wrap every Ansible playbook with event triggers, wave approval gates, per-host retries, and chaining with Terraform and ServiceNow, no inventory changes."

tool:
  name: "Ansible"
  pluginClass: "io.kestra.plugin.ansible.cli.AnsibleCLI"
  color: "#EE0000"

hero:
  title: "Your Ansible playbooks, fully orchestrated."
  description: "Trigger ansible-playbook from cron, webhooks, S3 events, or any HTTP signal. Gate waves with the Pause task, parse per-host results with the Kestra callback, retry only the failed step, and chain Terraform and ServiceNow in one execution history."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

pillars:
  title: "Around every Ansible run."
  subtitle: "What Kestra wraps around every playbook run: when it fires, how it composes with other tools, what comes out of it, and who gets to launch it."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "Schedule and event triggers wrapped around ansible-playbook"
      description: "Native cron, fixed intervals, webhooks, S3 file arrivals, Kafka messages, and database row changes all fire a playbook run directly. The trigger payload is available inside the flow as <code>trigger.body</code>, so the right host gets the right inputs from a single execution."
    - icon: "mdi:shield-check-outline"
      title: "Wave-by-wave promotion with named reviewers"
      description: "The Pause task suspends execution after each wave. The play recap surfaces in the UI. A reviewer reads it, optionally adds a comment, then resumes into the next environment. Each gate stores the reviewer identity inline with the execution."
    - icon: "mdi:transit-connection-variant"
      title: "Terraform outputs flow into the Ansible inventory automatically"
      description: "When <code>terraform apply</code> finishes, its outputs (IPs, hostnames, resource IDs) become task variables. The next Ansible task templates them straight into <code>inventory.ini</code>. One execution ID across both steps, no manual copy-paste between tools."
    - icon: "mdi:format-list-bulleted-square"
      title: "Per-host results from the Kestra Ansible callback, iterable in YAML"
      description: "The Kestra Ansible callback emits structured per-host outputs after each play. A <code>ForEach</code> task loops over the hosts and branches on <code>changed</code>, <code>failed</code>, or any fact. Route alerts by tag, hand failing hosts to a remediation flow, or upload the play recap to S3."
    - icon: "mdi:account-multiple-outline"
      title: "Self-service forms in front of playbooks, with RBAC"
      description: "A Kestra App is a typed form bound to a flow: dropdowns for the target host, the environment, the version. An operator submits the form, the same audited playbook runs every time, role-based access controls who can launch what."
    - icon: "mdi:history"
      title: "Replay any step from any past execution"
      description: "Every play, every host, every task output is stored per execution. Open last week's run, click into the failing host, replay that step against the same target. The original inventory, vars, and <code>ansible.cfg</code> are preserved with the run, so the replay matches the original conditions."

useCases:
  title: "How platform teams use Ansible and Kestra"
  subtitle: "Patterns infrastructure teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Full pipeline"
      badgeIcon: "mdi:pipe-disconnected"
      title: "Provision with Terraform, configure with Ansible, register in ServiceNow"
      description: "Run <code>terraform apply</code> to spin up the VM. Hand the outputs (IP, hostname) to <code>ansible-playbook</code> to join the domain, install agents, and apply config. Then update the ServiceNow CMDB and post to Slack. One execution ID, one audit trail across all four steps."
      flow:
        - node: "trigger"
          label: "on demand or schedule"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "terraform apply"
          label: "provision VM"
          pluginClass: "io.kestra.plugin.terraform.cli.TerraformCLI"
        - node: "ansible-playbook"
          label: "configure host"
          pluginClass: "io.kestra.plugin.ansible.cli.AnsibleCLI"
        - node: "ServiceNow"
          label: "CMDB update"
          pluginClass: "io.kestra.plugin.servicenow.Post"
        - node: "notify"
          label: "Slack"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Step-level retries"
          description: "Retry only the failed step. The Terraform apply does not re-run when the playbook fails."
        - title: "Outputs flow forward"
          description: "Pass IPs, hostnames, and Terraform output values into the Ansible inventory."
        - title: "Single execution context"
          description: "One ID across Terraform, Ansible, and ServiceNow, with one place to debug."
        - title: "CMDB stays in sync"
          description: "Every provision lands a record in ServiceNow with the inventory metadata attached."
    - badge: "Governance"
      badgeIcon: "mdi:shield-check-outline"
      title: "Scheduled drift detection that alerts only on change"
      description: "Run the playbook against the fleet on a nightly schedule. Kestra parses the per-host results from the Ansible callback, loops through hosts with a <code>ForEach</code>, and posts a Slack alert only when a host comes back with <code>changed: true</code>. Clean runs stay quiet."
      flow:
        - node: "cron trigger"
          label: "on schedule"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "ansible-playbook"
          label: "enforce state"
          pluginClass: "io.kestra.plugin.ansible.cli.AnsibleCLI"
        - node: "ForEach host"
          label: "per-host check"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "alert"
          label: "if changed"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Native cron scheduler"
          description: "Built-in schedule and interval triggers. No cron job on a jump box, no Tower instance."
        - title: "Per-host result parsing"
          description: "The Kestra Ansible callback emits structured outputs the flow can iterate over."
        - title: "Alert only on changed=true"
          description: "Keeps Slack noise low and draws attention to real drift, not clean enforcement runs."
        - title: "Full playbook output stored per run"
          description: "Every nightly check is timestamped, attributed, and replayable from the execution UI."
      signal: "Pattern published in the Kestra blueprint <code>ansible-config-drift</code>."
    - badge: "Event-driven"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Event-triggered remediation from monitoring alerts"
      description: "A Splunk or CloudWatch alert fires on high CPU or a failed health check. The webhook hits Kestra, Kestra runs the remediation playbook against the affected host, updates the ServiceNow incident with the result, and posts to Slack. Same flow, same audit trail, whether the alert fires once a week or a hundred times a day."
      flow:
        - node: "webhook"
          label: "alert payload"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "ansible-playbook"
          label: "remediate host"
          pluginClass: "io.kestra.plugin.ansible.cli.AnsibleCLI"
        - node: "ServiceNow"
          label: "update incident"
          pluginClass: "io.kestra.plugin.servicenow.Update"
        - node: "notify"
          label: "Slack"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Webhook + API triggers"
          description: "Fire a playbook from Splunk, PagerDuty, ServiceNow, or any HTTP source. No glue service required."
        - title: "Incident enrichment"
          description: "Push the playbook's diagnostic output back into the ServiceNow ticket as a work note."
        - title: "Per-execution audit trail"
          description: "Every remediation has an inventory snapshot, payload, host result, and operator on record."
        - title: "Replay on the same host"
          description: "Re-run the playbook against the original target with one click from the execution view."
    - badge: "Self-service"
      badgeIcon: "mdi:account-multiple-outline"
      title: "Self-service playbook runs through a UI form"
      description: "Wrap a playbook behind a Kestra App: a typed form with dropdowns for the target host, environment, and version. Operators run the playbook from the form. RBAC controls who can run what. No SSH key handouts, no ad-hoc <code>ansible-playbook</code> on someone's laptop."
      flow:
        - node: "Kestra App"
          label: "form input"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "validate inputs"
          label: "RBAC + schema"
          pluginClass: "io.kestra.plugin.core.log.Log"
        - node: "ansible-playbook"
          label: "with --extra-vars"
          pluginClass: "io.kestra.plugin.ansible.cli.AnsibleCLI"
        - node: "notify"
          label: "Slack + audit"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Typed inputs and dropdowns"
          description: "Form inputs validated before the run. No malformed <code>--extra-vars</code>, no typos on the limit."
        - title: "RBAC on who can run what"
          description: "Role-based access on the form itself, not on raw SSH keys to production hosts."
        - title: "Same playbook, every request"
          description: "Every form submission goes through the same audited, retry-aware execution."
          wide: true

