faq:
  - question: "How does check-mode drift detection actually work?"
    answer: "Run the playbook with <code>--check --diff</code> on a schedule. The Kestra Ansible callback (<code>stdout_callback = yaml</code> plus the Kestra-specific output) emits per-host JSON. A <code>ForEach</code> task iterates over the hosts and branches on <code>changed</code>. The flow only alerts when a host actually drifted, so clean enforcement nights stay quiet. The full diff and recap are stored as task artifacts on the execution."
  - question: "How does the approval gate work between dev, staging, and production waves?"
    answer: "Kestra's Pause task suspends the flow after a wave completes. The playbook output is surfaced in the Kestra UI. A named reviewer reads it, optionally adds a comment, and resumes. Only then does the next wave run. The reviewer identity and timestamp land in the execution history. Different reviewers can be wired to different namespaces or environments through RBAC."
  - question: "Can I drive a rolling restart with <code>serial:</code> and verify between batches?"
    answer: "Yes. Set <code>serial: 1</code> (or <code>10%</code>) in the play. Ansible enforces the batching. After the playbook task returns, a Kestra <code>ForEach</code> loops over the per-host callback output and a <code>core.http.Request</code> probes each host's health endpoint with a retry policy. A failed probe halts the flow before the next wave, so the rest of the fleet stays on the old version."
  - question: "What's the difference between Kestra and Ansible Automation Platform (AAP / Tower / AWX)?"
    answer: "AAP is the Red Hat-owned operational layer for Ansible: a runner, a UI, surveys, RBAC, and the EDA controller for event triggers. Kestra is a general-purpose orchestrator. It schedules playbook runs, adds native pause-and-resume between waves, parses per-host results via the Kestra Ansible callback, and chains Ansible with Terraform, ServiceNow, NetBox, ArgoCD, and your own scripts in one flow. AAP is Ansible-centric by design. Kestra works alongside AAP if you already run it, or replaces it when you want one orchestrator across the full stack."
  - question: "Can I keep my existing playbooks and inventory as-is?"
    answer: "Yes. The <code>io.kestra.plugin.ansible.cli.AnsibleCLI</code> task runs <code>ansible-playbook</code> exactly as you do today. Inventory, roles, vars, Vault files, and <code>ansible.cfg</code> stay where they are. You point Kestra at the playbook through inline <code>inputFiles</code>, Namespace Files, or a Git clone task. Nothing in the playbook itself changes."
  - question: "Does Kestra work with Ansible Vault and dynamic inventories?"
    answer: "Yes. Vault files come through Kestra's secrets backend (built-in or HashiCorp Vault) and are mounted into the task working directory at run time. Dynamic inventories work the same way they do on the CLI: include the script or plugin in the task, set the inventory path, and run <code>ansible-playbook -i</code> against it. Inventories built from a Terraform output or a NetBox query at the start of the flow are a common pattern, see the dynamic-inventory blueprint above."
  - question: "Can Kestra react to an alert from Splunk or PagerDuty and run a remediation playbook?"
    answer: "Yes. The <code>io.kestra.plugin.core.trigger.Webhook</code> trigger exposes a signed endpoint. Wire Splunk, PagerDuty, ServiceNow, or any HTTP source to that URL. The alert payload is available in the flow as <code>trigger.body</code>, so the playbook runs against the right host with the right inputs."
  - question: "Do I need a separate AWX or Tower instance to run Kestra?"
    answer: "No. Kestra runs <code>ansible-playbook</code> directly through its task runner, on the worker, in a container, or remotely via SSH. No AWX, no Tower, no EDA controller. Teams already on AAP can keep it: Kestra calls AAP jobs over the API the same way it calls <a href='/orchestration/terraform'>Terraform</a> or Jenkins."
  - question: "Is Kestra self-hosted? Can it run air-gapped?"
    answer: "Kestra ships self-hosted on Docker or Kubernetes, as a managed cloud, or air-gapped for regulated environments. The open-source edition includes unlimited workflows and event-driven triggers. Self-hosted gives full control over where playbooks execute, with no external dependency on Kestra's infrastructure. See <a href='/infra-automation'>Kestra for infrastructure automation</a> for the broader picture across Terraform, Ansible, and cloud APIs."

