blueprints:
  title: "Blueprints for Ansible orchestration."
  lead: "One blueprint per use case above. Copy the YAML, point it at your inventory, ship it."
  items:
    - name: "Provision, configure, register"
      title: "Provision with Terraform, configure with Ansible, register in ServiceNow"
      description: "<code>terraform apply</code> provisions the VM and writes the private IP to a task artifact. <code>ansible-playbook</code> joins the host to the domain and installs agents, with per-step retries. The next task posts a record into the ServiceNow CMDB. Slack confirms when all three steps succeed."
      href: "/blueprints"
      plugins:
        - "io.kestra.plugin.terraform.cli.TerraformCLI"
        - "io.kestra.plugin.ansible.cli.AnsibleCLI"
        - "io.kestra.plugin.servicenow.Post"
        - "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      code: |
        id: provision-configure-register
        namespace: company.platform

        inputs:
          - id: hostname
            type: STRING
          - id: environment
            type: SELECT
            values: [dev, staging, production]
            defaults: staging

        tasks:
          - id: terraform_apply
            type: io.kestra.plugin.terraform.cli.TerraformCLI
            beforeCommands:
              - terraform init
            commands:
              - terraform apply -auto-approve -var "hostname={{ inputs.hostname }}"
              - terraform output -raw private_ip > private_ip.txt
            outputFiles:
              - "private_ip.txt"

          - id: ansible_configure
            type: io.kestra.plugin.ansible.cli.AnsibleCLI
            inputFiles:
              inventory.ini: |
                [app]
                {{ inputs.hostname }} ansible_host={{ read(outputs.terraform_apply.outputFiles['private_ip.txt']) }} ansible_user=ubuntu
              configure.yml: "{{ read(secret('ANSIBLE_PLAYBOOK')) }}"
            commands:
              - ansible-playbook -i inventory.ini configure.yml --extra-vars "env={{ inputs.environment }}"
            retry:
              type: constant
              interval: PT2M
              maxAttempt: 3

          - id: servicenow_register
            type: io.kestra.plugin.servicenow.Post
            domain: "{{ secret('SERVICENOW_DOMAIN') }}"
            username: "{{ secret('SERVICENOW_USER') }}"
            password: "{{ secret('SERVICENOW_PASSWORD') }}"
            clientId: "{{ secret('SERVICENOW_CLIENT_ID') }}"
            clientSecret: "{{ secret('SERVICENOW_CLIENT_SECRET') }}"
            table: cmdb_ci_server
            data:
              name: "{{ inputs.hostname }}"
              ip_address: "{{ read(outputs.terraform_apply.outputFiles['private_ip.txt']) }}"
              environment: "{{ inputs.environment }}"
              short_description: "Provisioned by execution {{ execution.id }}"

          - id: notify
            type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
            url: "{{ secret('SLACK_WEBHOOK') }}"
            payload: |
              {
                "text": ":rocket: {{ inputs.hostname }} provisioned ({{ read(outputs.terraform_apply.outputFiles['private_ip.txt']) }}), configured, and registered in ServiceNow."
              }
    - name: "Scheduled drift detection"
      title: "Scheduled drift detection with alerting on change"
      description: "Runs the playbook nightly against the fleet using the Kestra Ansible callback to emit per-host structured output. A <code>ForEach</code> loops through hosts and posts a Slack alert only when <code>changed: true</code>. Clean enforcement runs stay quiet."
      href: "/blueprints"
      plugins:
        - "io.kestra.plugin.ansible.cli.AnsibleCLI"
        - "io.kestra.plugin.core.trigger.Schedule"
        - "io.kestra.plugin.core.flow.ForEach"
        - "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      code: |
        id: ansible-config-drift
        namespace: company.infra

        triggers:
          - id: nightly
            type: io.kestra.plugin.core.trigger.Schedule
            cron: "0 3 * * *"

        tasks:
          - id: enforce_state
            type: io.kestra.plugin.ansible.cli.AnsibleCLI
            namespaceFiles:
              enabled: true
            taskRunner:
              type: io.kestra.plugin.core.runner.Process
            ansibleConfig: |
              [defaults]
              interpreter_python = auto_silent
              log_path={{ workingDir }}/ansible.log
              stdout_callback = yaml
            commands:
              - ansible-playbook -i inventory.ini myplaybook.yml

          - id: loop_hosts
            type: io.kestra.plugin.core.flow.ForEach
            values: "{{ outputs.enforce_state.vars.outputs }}"
            tasks:
              - id: alert_on_change
                type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
                runIf: "{{ (taskrun.value | jq('.changed') | first) == true }}"
                url: "{{ secret('SLACK_WEBHOOK') }}"
                messageText: "Drift detected: {{ taskrun.value | jq('.msg') | first ?? 'config changed on host' }}"
    - name: "Event-triggered remediation"
      title: "Event-triggered remediation from a monitoring webhook"
      description: "A monitoring alert fires the webhook, Kestra runs the remediation playbook against the affected host using the alert payload to build an inline inventory, updates the ServiceNow incident with the playbook output, then posts to Slack. Every execution has an audit trail."
      href: "/blueprints"
      plugins:
        - "io.kestra.plugin.core.trigger.Webhook"
        - "io.kestra.plugin.ansible.cli.AnsibleCLI"
        - "io.kestra.plugin.servicenow.Update"
        - "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      code: |
        id: ansible-remediation-from-alert
        namespace: company.infra

        triggers:
          - id: alert_webhook
            type: io.kestra.plugin.core.trigger.Webhook
            key: ansible_remediation

        tasks:
          - id: remediate_host
            type: io.kestra.plugin.ansible.cli.AnsibleCLI
            inputFiles:
              inventory.ini: |
                [target]
                {{ trigger.body.host }} ansible_user=ops
              remediate.yml: "{{ read(secret('REMEDIATION_PLAYBOOK')) }}"
            commands:
              - ansible-playbook -i inventory.ini remediate.yml --extra-vars "incident={{ trigger.body.incident_id }}"
            retry:
              type: constant
              interval: PT1M
              maxAttempt: 2

          - id: update_incident
            type: io.kestra.plugin.servicenow.Update
            domain: "{{ secret('SERVICENOW_DOMAIN') }}"
            username: "{{ secret('SERVICENOW_USER') }}"
            password: "{{ secret('SERVICENOW_PASSWORD') }}"
            clientId: "{{ secret('SERVICENOW_CLIENT_ID') }}"
            clientSecret: "{{ secret('SERVICENOW_CLIENT_SECRET') }}"
            table: incident
            sysId: "{{ trigger.body.incident_id }}"
            data:
              state: "6"
              work_notes: "Auto-remediation ran via Kestra execution {{ execution.id }}. Host: {{ trigger.body.host }}."

          - id: notify
            type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
            url: "{{ secret('SLACK_WEBHOOK') }}"
            payload: |
              {
                "text": ":hammer_and_wrench: Remediated {{ trigger.body.host }} for incident {{ trigger.body.incident_id }}. <{{ execution.url }}|View execution>"
              }

