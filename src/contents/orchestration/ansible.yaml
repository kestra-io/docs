title: "Orchestrate Ansible with Kestra: drift detection, rolling waves, dynamic inventory"
description: "Drive ansible-playbook from cron and events, gate wave promotion, parse per-host results via the Kestra callback, and chain with Terraform and ServiceNow."

tool:
  name: "Ansible"
  pluginClass: "io.kestra.plugin.ansible.cli.AnsibleCLI"
  color: "#EE0000"

hero:
  title: "Add state, gates, and visibility to Ansible."
  description: "Run ansible-playbook from cron, webhooks, or any HTTP signal. Add step-level retries, parsed per-host results via the Kestra callback, approval gates between waves, and chain Ansible with Terraform, NetBox, or ServiceNow in one execution history."
  cta:
    label: "Book a Demo"
    href: "/demo"
  secondaryCta:
    label: "Get Started"
    href: "/get-started"

nutshell: "Replace Ansible Tower / AAP with a workflow engine that listens to cron, webhooks, or alerts, handles drift detection and rolling waves with per-host verification, and chains ansible-playbook with <a href='/orchestration/terraform'>Terraform</a>, <a href='/orchestration/netbox'>NetBox</a>, and <a href='/orchestration/servicenow'>ServiceNow</a>. Drop the AAP subscription; halt a wave at the first failed health probe."

pillars:
  title: "Around every playbook, every host, every wave."
  subtitle: "What Kestra wraps around your Ansible runs: when playbooks fire, what comes back per host through the callback, who approves the next wave, and where the audit lives. Your playbooks, roles, inventory, and Vault stay where they are."
  items:
    - icon: "mdi:lightning-bolt-outline"
      title: "Schedule and event triggers wrapped around ansible-playbook"
      description: "Native cron, fixed intervals, webhooks, S3 file arrivals, Kafka messages, and database row changes all fire <code>ansible-playbook</code> directly. The trigger payload reaches the flow as <code>trigger.body</code>, so the right host gets the right <code>--extra-vars</code> from a single execution. No AWX, no Tower, no EDA controller."
    - icon: "mdi:magnify-scan"
      title: "Check mode + diff mode as drift detection"
      description: "Run the playbook with <code>--check --diff</code> on a nightly schedule. The Kestra Ansible callback emits per-host changes, the flow surfaces only the hosts that drifted, and the diff lands in Slack. No enforcement, no surprises, the whole fleet audited overnight."
    - icon: "mdi:transit-connection-variant"
      title: "Inventory built at run time from Terraform, NetBox, or vCenter"
      description: "A <code>terraform output</code>, a NetBox API call, or <code>vmware.vcenter.ListVms</code> writes the inventory at the start of the flow. The next task templates it into <code>inventory.ini</code>. No stale static inventory file, no manual sync between source of truth and what Ansible reads."
    - icon: "mdi:format-list-bulleted-square"
      title: "Per-host results from the Kestra Ansible callback, iterable in YAML"
      description: "The Kestra Ansible callback emits structured per-host outputs after each play. A <code>ForEach</code> task loops over the hosts and branches on <code>changed</code>, <code>failed</code>, or any fact. Route alerts by tag, hand failing hosts to a remediation flow, or upload the play recap to S3."
    - icon: "mdi:server-network"
      title: "Rolling restarts with serial + health verification between batches"
      description: "Set <code>serial: 1</code> (or <code>10%</code>) in the play. The playbook runs against one batch at a time. Between batches, a Kestra HTTP probe checks the service is healthy. A failed probe halts the flow before the next batch, preserving the rest of the fleet."
    - icon: "mdi:history"
      title: "Replay any host from any past execution"
      description: "Every play, every host, every task output is stored per execution. Open last week's run, click into the failing host, replay that step against the same target. The original inventory, vars, and <code>ansible.cfg</code> are preserved with the run, so the replay matches the original conditions."

useCases:
  title: "How platform teams use Ansible and Kestra"
  subtitle: "Patterns infrastructure teams run in production today. Each one shows the flow end to end, with the real plugin classes in play."
  items:
    - badge: "Drift detection"
      badgeIcon: "mdi:magnify-scan"
      title: "Nightly check-mode audit, alert only on drift"
      description: "Run the playbook with <code>--check --diff</code> against the fleet on a nightly schedule. The Kestra Ansible callback emits structured per-host output. A <code>ForEach</code> loops through hosts and posts a Slack alert only when a host comes back with <code>changed: true</code>. Clean runs stay quiet, the play recap stays attached to the execution for audit."
      flow:
        - node: "cron trigger"
          label: "nightly"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "ansible-playbook --check"
          label: "diff mode"
          pluginClass: "io.kestra.plugin.ansible.cli.AnsibleCLI"
        - node: "ForEach host"
          label: "per-host change?"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "alert"
          label: "only on drift"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Check mode runs are non-destructive"
          description: "<code>--check</code> + <code>--diff</code> reports what would change without touching the host."
        - title: "Callback emits structured outputs"
          description: "The Kestra Ansible callback writes per-host JSON the flow can iterate with <code>ForEach</code>."
        - title: "Alert only on changed=true"
          description: "Keeps Slack quiet on clean nights, surfaces only the hosts that drifted."
        - title: "Full play recap stored per run"
          description: "Every nightly audit is timestamped, attributed, and replayable from the execution UI."
      signal: "Published as the <code>ansible-config-drift</code> blueprint in the Kestra catalog."
    - badge: "Rolling wave"
      badgeIcon: "mdi:server-network"
      title: "Rolling OS patch wave with serial + HTTP health probe between batches"
      description: "<code>ansible-playbook</code> with <code>serial: 1</code> patches one host at a time. Between batches, a Kestra <code>core.http.Request</code> task probes the application health endpoint. If the probe fails, the flow halts before the next batch and pages on-call. No half-broken fleet, no manual stop-the-pipeline."
      flow:
        - node: "patch window"
          label: "scheduled"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "ansible-playbook serial: 1"
          label: "one host at a time"
          pluginClass: "io.kestra.plugin.ansible.cli.AnsibleCLI"
        - node: "ForEach host"
          label: "verify between batches"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "health probe"
          label: "halt on fail"
          pluginClass: "io.kestra.plugin.core.http.Request"
        - node: "notify"
          label: "Slack on halt"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "serial picks the batch size"
          description: "<code>serial: 1</code>, <code>serial: 10%</code>, or a mix. Ansible enforces the batching, Kestra runs the verify task per batch."
        - title: "HTTP probe gates the next batch"
          description: "<code>core.http.Request</code> with a retry policy decides whether the wave continues."
        - title: "Halt on failure preserves the rest of the fleet"
          description: "The flow exits before the next batch, the unpatched hosts stay on the old version."
        - title: "Per-batch execution log"
          description: "Each batch has its own log line in the execution, with the host list and the probe result."
    - badge: "Event-driven"
      badgeIcon: "mdi:lightning-bolt-outline"
      title: "Event-triggered remediation from monitoring alerts"
      description: "A Splunk or CloudWatch alert fires on high CPU or a failed health check. The webhook hits Kestra, Kestra runs the remediation playbook against the affected host (inline inventory built from the alert payload), updates the ServiceNow incident with the playbook output, and posts to Slack. Same flow, same audit trail, whether the alert fires once a week or a hundred times a day."
      flow:
        - node: "webhook"
          label: "alert payload"
          pluginClass: "io.kestra.plugin.core.trigger.Webhook"
        - node: "ansible-playbook"
          label: "remediate host"
          pluginClass: "io.kestra.plugin.ansible.cli.AnsibleCLI"
        - node: "ServiceNow"
          label: "update incident"
          pluginClass: "io.kestra.plugin.servicenow.Update"
        - node: "notify"
          label: "Slack"
          pluginClass: "io.kestra.plugin.slack.notifications.SlackIncomingWebhook"
      items:
        - title: "Webhook + API triggers"
          description: "Fire a playbook from Splunk, PagerDuty, ServiceNow, or any HTTP source. No glue service required."
        - title: "Inline inventory from alert payload"
          description: "The host name from <code>trigger.body</code> becomes a one-line <code>inventory.ini</code>, scoped to the affected host only."
        - title: "Incident enrichment"
          description: "Push the playbook's diagnostic output back into the ServiceNow ticket as a work note."
        - title: "Replay on the same host"
          description: "Re-run the playbook against the original target with one click from the execution view."
    - badge: "Dynamic inventory"
      badgeIcon: "mdi:transit-connection-variant"
      title: "Inventory from NetBox or Terraform output, then play against it"
      description: "<code>terraform output</code> or a NetBox device query emits the inventory at the start of the flow. The next task templates it into <code>inventory.ini</code> (or hands it as a JSON dynamic inventory). The playbook runs against the freshly resolved hosts. No stale static inventory file, no manual sync between source of truth and Ansible."
      flow:
        - node: "trigger"
          label: "schedule or webhook"
          pluginClass: "io.kestra.plugin.core.trigger.Schedule"
        - node: "fetch inventory"
          label: "Terraform / NetBox"
          pluginClass: "io.kestra.plugin.terraform.cli.TerraformCLI"
        - node: "ansible-playbook"
          label: "fresh inventory"
          pluginClass: "io.kestra.plugin.ansible.cli.AnsibleCLI"
        - node: "ForEach host"
          label: "per-host result"
          pluginClass: "io.kestra.plugin.core.flow.ForEach"
        - node: "ServiceNow"
          label: "CMDB reconcile"
          pluginClass: "io.kestra.plugin.servicenow.Update"
      items:
        - title: "Single source of truth"
          description: "The inventory comes from the tool that actually knows the hosts: Terraform state, NetBox DCIM, or a cloud API."
        - title: "Templated into inventory.ini per run"
          description: "Inline <code>inputFiles</code> writes the inventory from <code>outputs.fetch_inventory</code> at the start of the playbook task."
        - title: "Refresh per execution"
          description: "Every run sees the current state, not yesterday's snapshot."
          wide: true

