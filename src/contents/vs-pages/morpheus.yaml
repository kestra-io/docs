title: "Kestra vs. HPE Morpheus: Declarative Orchestration vs. Hybrid Cloud Management"
description: "Compare Kestra vs HPE Morpheus: open-source declarative workflow orchestration in YAML vs. proprietary hybrid cloud management platform. See features, setup, and when to choose each."
competitorName: HPE Morpheus

intro:
  title: "Kestra vs. HPE Morpheus: Declarative Orchestration vs. Hybrid Cloud Management"
  description: "HPE Morpheus is a hybrid cloud management platform that centralizes provisioning, monitoring, and cost governance behind a self-service portal. Kestra is an open-source orchestration engine that lets any engineer define, version, and deploy workflows in YAML. Different tools, different jobs."

philosophy:
  mainTitle: Orchestration Engine vs. Cloud Management Platform
  kestra:
    title: "Purpose-Built Workflow Orchestration"
    description: "Declarative YAML workflows versioned in Git, executed in isolated containers, deployed through CI/CD. Orchestrate data pipelines, infrastructure automation, business processes, and AI workflows from one platform. Any engineer can build and ship workflows without waiting on a platform team."
    subCardText: '"How do we let every team build, version, and ship workflows across data, infrastructure, and business processes?"'
  competitor:
    title: Unified Hybrid Cloud Management
    description: "HPE Morpheus provides a single pane of glass for provisioning, managing, and governing infrastructure across private and public clouds. Self-service catalogs, built-in CMDB, cost analytics, and brownfield discovery are bundled into one proprietary platform managed by a cloud operations team."
    shadowColor: "#3DB5E6"
    subCardBg: "var(--ks-background-blue-light)"
    subCardText: '"How do we give developers a self-service portal for VMs, containers, and apps across every cloud while keeping costs and compliance in check?"'

businessValue:
  mainTitle: "Workflow Orchestration vs. Cloud Operations Portal"
  kestra:
    title: Open-Source Orchestration
    list:
      - "Data pipelines, infrastructure automation, business processes, and AI workflows in one platform"
      - "Any engineer ships workflows in YAML through Git and CI/CD"
      - "Event-driven at core: react to webhooks, file uploads, messages, and API events"
      - "Open source with 1200+ plugins, transparent pricing, and no vendor lock-in"
      - "Self-service for non-engineers via Kestra Apps with dynamic forms and approvals"
  competitor:
    title: Hybrid Cloud Management
    list:
      - "Unified provisioning and lifecycle management across AWS, Azure, GCP, VMware, and bare metal"
      - "Built-in CMDB, monitoring, logging, and cost optimization in one platform"
      - "Self-service catalog for VMs, containers, Kubernetes clusters, and applications"
      - "Brownfield discovery automatically imports existing infrastructure into the platform"
      - "Proprietary licensing with per-workload pricing"
    shadowColor: "#3DB5E6"
    bulletColor: "#3DB5E6"
  footerText: "HPE Morpheus is the right choice when your primary need is a unified cloud management portal with provisioning, CMDB, cost governance, and brownfield discovery across hybrid infrastructure. Kestra is the right choice when you need a general-purpose orchestration engine for workflows that span data pipelines, infrastructure operations, business processes, and AI — versioned in Git and deployed through CI/CD."

setupSpeed:
  title: Time to First Workflow
  subtitle: "HPE Morpheus requires deploying an appliance, connecting cloud endpoints, configuring service plans and groups, and setting up the self-service catalog before users can provision anything. Kestra's single Docker Compose command stands up a production-shaped environment in minutes."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready (database and config included). Open the UI, pick a Blueprint, run it."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: "Hours to"
      two: Days
    description: "Production deployment requires installing the HPE Morpheus appliance (Ubuntu/CentOS VM or AWS AMI), configuring the embedded MySQL and Elasticsearch services, connecting cloud endpoints (AWS, Azure, vCenter), defining groups, service plans, and provisioning policies. The self-service catalog needs instance types, layouts, and node types configured before users can provision resources."
    shadowColor: "#3DB5E6"
    command: |
      # 1. Deploy HPE Morpheus appliance (VM or AMI)
      sudo rpm -i morpheus-appliance-x.x.x.el8.x86_64.rpm
      sudo morpheus-ctl reconfigure

      # 2. Access the HPE Morpheus UI at https://<appliance-ip>
      # 3. Add cloud endpoints (AWS, Azure, vCenter, etc.)
      # 4. Configure groups, service plans, and policies
      # 5. Define instance types, layouts, and node types
      # 6. Set up the self-service catalog
      # 7. Create users, roles, and tenants
    lang: sh

easeOfUse:
  title: YAML Workflows vs. GUI-Driven Provisioning
  kestra:
    title: "Kestra: Any engineer, any language"
    description: "YAML is readable on day 1. Our docs are embedded in the UI for easy reference, the <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes workflows for you, or start with our library of Blueprints. Engineers deploy through Git, same as application code."
    code: |
      id: cloud_provision
      namespace: infra.cloud

      inputs:
        - id: cloud_provider
          type: SELECT
          values: [aws, azure, gcp]
        - id: instance_type
          type: STRING
        - id: environment
          type: SELECT
          values: [dev, staging, prod]

      tasks:
        - id: request_approval
          type: io.kestra.plugin.core.flow.Pause
          onResume:
            - id: approved_by
              type: STRING

        - id: provision
          type: io.kestra.plugin.terraform.cli.TerraformCLI
          commands:
            - terraform init
            - terraform apply -auto-approve
          env:
            TF_VAR_provider: "{{ inputs.cloud_provider }}"
            TF_VAR_instance: "{{ inputs.instance_type }}"
            TF_VAR_env: "{{ inputs.environment }}"

        - id: configure
          type: io.kestra.plugin.ansible.cli.AnsibleCLI
          commands:
            - ansible-playbook setup.yml
              -i "{{ outputs.provision.vars.ip }}"

        - id: register_cmdb
          type: io.kestra.plugin.core.http.Request
          uri: "https://cmdb.internal/api/assets"
          method: POST
          body: |
            {"ip": "{{ outputs.provision.vars.ip }}", "env": "{{ inputs.environment }}"}
    lang: yaml
  competitor:
    title: "Morpheus: GUI-driven provisioning"
    description: "HPE Morpheus provides a rich web UI for provisioning and managing infrastructure. Instance types, layouts, and node types are configured in the GUI or via the API. Morpheus supports Terraform, ARM, CloudFormation, and Helm as spec templates, but orchestration logic is defined through the task engine UI or API calls rather than declarative code files."
    shadowColor: "#3DB5E6"
    code: |
      {
        "instance": {
          "name": "web-server-prod",
          "instanceType": { "code": "ubuntu" },
          "layout": { "code": "ubuntu-22.04-single" },
          "plan": { "code": "vm-1024" }
        },
        "group": { "id": 1 },
        "cloud": { "id": 3 },
        "config": {
          "resourcePoolId": 42,
          "noAgent": false,
          "customOptions": {
            "environment": "prod",
            "department": "engineering"
          }
        },
        "volumes": [
          {
            "rootVolume": true,
            "size": 50,
            "storageType": 1
          }
        ],
        "networkInterfaces": [
          { "network": { "id": 5 } }
        ]
      }
    lang: json

