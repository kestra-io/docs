platformStrengths:
  title: Kestra Is Built for How Modern Teams Work
  features:
    - title: Orchestration, not just provisioning
      description: "HPE Morpheus excels at provisioning and managing cloud resources. But modern teams need to orchestrate workflows that span data pipelines, infrastructure operations, business processes, and AI. Kestra is purpose-built for this: a single platform where a Terraform apply, a dbt run, an API call, and a Slack notification live in one declarative YAML flow."
    - title: Open source, transparent pricing
      description: "Kestra's open-source core is free with 1200+ plugins and unlimited event-driven workflows. Enterprise features (RBAC, SSO, audit logs, multi-tenancy) are available without per-workload metering. HPE Morpheus uses proprietary per-workload licensing that scales with the number of managed instances."
    - title: Event-driven from the start
      description: "Kestra was built event-driven from day one: webhooks, S3 uploads, Kafka messages, database changes, and API events are first-class YAML triggers. HPE Morpheus focuses on catalog-driven provisioning and scheduled tasks. When your automation needs to react to real-time events across systems, Kestra's architecture is purpose-built for it."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "You need a general-purpose orchestration engine for workflows spanning data, infrastructure, business processes, and AI."
      - "Developers should own their workflows in YAML and Git, not depend on a cloud ops team."
      - "Event-driven automation is critical: reacting to webhooks, file uploads, messages, and API events in real time."
      - "Open source and transparent pricing matter. No per-workload fees, no proprietary lock-in."
      - "Non-engineers need to trigger and monitor workflows through self-service Apps without learning a new platform."
  competitor:
    title: Choose HPE Morpheus When
    list:
      - "You need a unified cloud management platform with provisioning, CMDB, monitoring, and cost governance in one tool."
      - "Brownfield discovery is a priority — you need to import and manage existing cloud resources automatically."
      - "A self-service provisioning catalog for VMs, containers, and applications is the primary requirement."
      - "Built-in cost analytics, budget enforcement, and optimization recommendations are essential for your cloud strategy."
      - "You manage infrastructure across VMware, AWS, Azure, GCP, OpenStack, and bare metal and need one operational console."
    shadowColor: "#3DB5E6"
    bulletColor: "#3DB5E6"

commonQuestions:
  - question: How is Kestra different from HPE Morpheus?
    answer: "Kestra is a workflow orchestration engine — it coordinates tasks across systems using declarative YAML workflows versioned in Git. HPE Morpheus is a hybrid cloud management platform that bundles provisioning, CMDB, monitoring, cost management, and governance into one portal. Kestra orchestrates what happens (data pipelines, infrastructure tasks, business logic, AI workflows). Morpheus manages where it runs (cloud resources, VMs, containers, cost). They solve fundamentally different problems."
  - question: Can Kestra replace HPE Morpheus for cloud provisioning?
    answer: "Kestra can orchestrate cloud provisioning using Terraform, Ansible, and cloud-native CLI plugins, and it can provide self-service forms through Kestra Apps. However, Kestra does not include built-in CMDB, brownfield discovery, cost analytics, or cloud resource lifecycle management. If provisioning is just one step in a larger workflow (provision, configure, test, deploy, notify), Kestra is the better fit. If you need a full cloud management platform, Morpheus covers more of that surface."
  - question: Does Kestra support the same cloud providers as HPE Morpheus?
    answer: "Kestra's 1200+ plugin library covers AWS, Azure, GCP, and Kubernetes natively. For VMware vSphere, OpenStack, and bare metal — where Morpheus has deep integrations — Kestra orchestrates through Terraform providers and CLI tools rather than native connectors. Both platforms support multi-cloud, but HPE Morpheus provides a management layer over the infrastructure while Kestra provides an orchestration layer for workflows that use it."
  - question: How does Kestra handle self-service compared to Morpheus?
    answer: "Morpheus offers a built-in self-service catalog where users pick from pre-configured instance types, layouts, and service plans with policy enforcement. Kestra Apps provide dynamic forms backed by live data (API calls, database queries) with inline approval gates and RBAC per namespace. Morpheus is more turnkey for VM and container provisioning catalogs. Kestra Apps are more flexible for any workflow — provisioning, data requests, incident response, business approvals — because the form is just an input to a YAML workflow."
  - question: Morpheus has a built-in CMDB. What does Kestra offer?
    answer: "Kestra does not include a built-in CMDB. Kestra integrates with external CMDBs like ServiceNow, or any system with an API, through HTTP Request tasks and dedicated plugins. If you need Kestra to register newly provisioned resources in a CMDB, that is a task in your YAML workflow. HPE Morpheus's built-in CMDB with brownfield discovery is a genuine differentiator for teams that need asset inventory and lifecycle management without a separate tool."
  - question: How does pricing compare between Kestra and Morpheus?
    answer: "Kestra's open-source edition is free with 1200+ plugins and unlimited workflows. Enterprise features (RBAC, SSO, audit logs, multi-tenancy) are available on Kestra Enterprise and Kestra Cloud with transparent pricing. HPE Morpheus uses proprietary per-workload licensing based on the number of managed instances. As your infrastructure scales, Morpheus costs grow with workload count while Kestra pricing is based on compute infrastructure."
  - question: Can Kestra and Morpheus work together?
    answer: "Yes. Some organizations use Morpheus as the cloud management and provisioning layer while Kestra orchestrates higher-level workflows that span data pipelines, infrastructure operations, and business processes. Kestra can trigger Morpheus API calls to provision resources as a step in a larger workflow, then continue with configuration, testing, deployment, and notification steps that Morpheus does not handle."
  - question: How hard is it to migrate from HPE Morpheus to Kestra?
    answer: "The migration depends on what you use Morpheus for. If Morpheus primarily orchestrates provisioning tasks, those translate well to Kestra YAML workflows with Terraform and Ansible plugins. HPE Morpheus's CMDB, cost analytics, and monitoring capabilities would need to be replaced with dedicated tools (ServiceNow, CloudHealth, Datadog). Most teams start by building new workflows in Kestra while keeping Morpheus for cloud management, then gradually shift orchestration logic over."
  - question: Does Kestra support brownfield infrastructure discovery?
    answer: "No. Brownfield discovery — automatically importing and managing existing cloud resources — is not a Kestra feature. This is a core Morpheus capability. Kestra can query cloud APIs to discover resources as part of a workflow (e.g., list all untagged EC2 instances and apply tags), but it does not maintain a persistent inventory of discovered infrastructure the way Morpheus does."
  - question: Which tool is better for cost management?
    answer: "Morpheus includes built-in cost analytics, budget enforcement, and optimization recommendations across clouds. Kestra does not provide cost management features. If cost governance is a primary concern, Morpheus or a dedicated FinOps tool (CloudHealth, Kubecost, Vantage) is the right choice. Kestra can orchestrate cost-related workflows — like shutting down unused resources on a schedule — but it does not track or analyze cloud spending."
  - question: How does Kestra's event-driven architecture compare to Morpheus?
    answer: "Kestra was built event-driven from the start. Webhooks, S3 uploads, Kafka messages, database changes, and API events are first-class YAML triggers with unlimited event-driven workflows in open source. HPE Morpheus focuses on catalog-driven provisioning and scheduled tasks. It supports API-driven automation and can respond to monitoring alerts, but it lacks native event stream triggers for Kafka, SQS, or Pulsar. If your automation needs to react to real-time events across systems, Kestra is purpose-built for it."
