platformStrengths:
  title: "Kestra Solves What Rundeck Cannot"
  features:
    - title: "Windows & PowerShell as First-Class Citizens"
      description: "Kestra workers run natively on Windows with full PowerShell task support. No SSH workarounds, no Cygwin hacks. If your runbooks include Windows servers, Kestra handles them the same way it handles Linux—with the same YAML, retries, and audit trail."
    - title: "Inline Approvals Without a Separate Tool"
      description: "Add human approval gates directly in your YAML workflow as Pause tasks with dynamic forms. Approvers get notified via Slack, email, or your ITSM—and their decision is logged with a timestamp. No separate approval workflow tool required."
    - title: "Event-Driven from the Ground Up"
      description: "Trigger any workflow from a webhook, a ServiceNow ticket, a Kafka message, a file appearing on S3, or a schedule. Kestra's event-driven architecture means runbooks respond to real events—not just manual button clicks. This is how you reduce MTTR without adding oncall burden."

decisionGuide:
  mainTitle: "When to Choose Kestra vs. Rundeck"
  kestra:
    title: "Choose Kestra When"
    list:
      - "You need reliable HA with no dropped jobs and proper queue management."
      - "Workflows span Ansible, Terraform, PowerShell, and cloud APIs in one flow."
      - "Windows server automation and PowerShell are part of your runbook stack."
      - "Approval workflows, dynamic forms, and audit trails are required."
      - "Event-driven automation (from alerts, tickets, queues) is a priority."
  competitor:
    title: "Rundeck Works Well When"
    list:
      - "Your automation is primarily SSH-based script execution on Linux nodes."
      - "Self-service access to simple scripts with RBAC is the main requirement."
      - "You're running a small fleet and don't need multi-tenant namespace isolation."
      - "PagerDuty on-call integration is already central to your incident workflow."
    shadowColor: "#FF9900"
    bulletColor: "#FF9900"

commonQuestions:
  - question: "What is Rundeck and how does it differ from Kestra?"
    answer: "Rundeck is an open-source runbook automation tool (now maintained as PagerDuty Process Automation OSS) that gives operations teams self-service access to scripts and Ansible playbooks via a web UI with fine-grained ACLs and SSH-based execution. Kestra is a broader orchestration platform: it covers everything Rundeck does for runbook automation and adds declarative YAML workflows, event-driven triggers, complex multi-step orchestration, 1,200+ plugins, and native Windows/PowerShell support. Where Rundeck treats each job as a standalone click-to-run action, Kestra coordinates jobs as steps in larger workflows with data passing, conditions, and parallelism."
  - question: "Can I migrate my existing Rundeck jobs to Kestra?"
    answer: "Yes. Rundeck jobs export as YAML or XML, and most of the step definitions map directly to Kestra task types. Shell command steps become io.kestra.plugin.scripts.shell.Commands tasks; Ansible steps become io.kestra.plugin.ansible.cli.AnsibleCLI tasks; notification steps become Slack or email plugin tasks. The Kestra team and community have documented migration patterns. Your existing node inventory and credentials can be referenced via Kestra's secrets manager and input parameters."
  - question: "Does Kestra support Rundeck's ACL/RBAC model?"
    answer: "Yes, with more granularity. Kestra uses namespaces as the isolation boundary, with per-namespace RBAC that controls who can view, execute, create, or administer workflows. This gives platform teams more control than Rundeck's project + ACL model—especially in multi-tenant environments where different teams share infrastructure but need isolated workflows."
  - question: "How does Kestra handle the high-availability issues that affect Rundeck?"
    answer: "Kestra's Kafka-powered queue ensures that no execution is dropped even if a worker fails. Workers pick up queued tasks automatically after restart, and retries are configurable at the task level. This directly addresses the queue throttling and dropped job issues that Rundeck users (including Mercy Health) experience at scale. Kestra also supports multiple worker groups with dedicated queues for priority workloads."
  - question: "Can Kestra run on-premises and air-gapped like Rundeck?"
    answer: "Yes. Kestra is fully self-hosted with no external dependencies. It runs on-premises, in air-gapped environments, on Kubernetes, or on Docker. Internal Postgres and S3-compatible storage (MinIO) are used for state and artifacts. Organizations like the Austrian Ministry of Defense run Kestra in fully offline environments—which was a key reason they migrated from Rundeck."
  - question: "Is Kestra open-source like Rundeck?"
    answer: "Yes. Kestra is Apache 2.0 licensed—truly open-source with no usage restrictions. Rundeck OSS is also open-source (Apache 2.0), but the enterprise features (SSO, advanced audit, clustering) require a PagerDuty Process Automation subscription. Kestra's Enterprise Edition adds governance, multi-tenancy, and enterprise secrets management on top of the open-source core."
