title: "Kestra vs. Control-M: Modern Orchestration Without the Legacy Tax"
description: "Compare Kestra vs BMC Control-M: Open-source, developer-first orchestration in YAML vs. proprietary enterprise workload automation with per-job licensing. See features, setup, and migration path."
competitorName: Control-M

intro:
  title: "Kestra vs. Control-M: Modern Orchestration Without the Legacy Tax"
  description: "Control-M centralizes batch workload scheduling behind an ops team. Kestra lets any engineer build and ship workflows in YAML. No per-job licensing, no tickets."

philosophy:
  mainTitle: Two Eras of Orchestration
  kestra:
    title: "Developer Self-Service Orchestration"
    description: "Declarative YAML workflows versioned in Git, executed in isolated containers, deployed through CI/CD. Existing scripts, ETL jobs, and load plans run as-is. Any engineer can build and ship workflows without filing a ticket. No ops team in the critical path."
    subCardText: '"How do we let every team build and ship workflows without a central automation team slowing them down?"'
  competitor:
    title: Centralized Workload Automation
    description: "Enterprise batch scheduler built around a central Control-M/Server, managed by an operations team. Jobs are defined in a GUI or JSON, scheduled through the server, and executed by agents deployed on target hosts. Changes flow through the ops team."
    shadowColor: "#FE5100"
    subCardBg: "var(--ks-background-orange-light)"
    subCardText: '"How do we schedule and monitor batch jobs across our mainframe and distributed systems?"'

businessValue:
  mainTitle: "Developer Self-Service vs. Central Bottleneck"
  kestra:
    title: Self-Service Automation
    list:
      - "Data pipelines, infrastructure automation, business processes, and AI workflows"
      - "Any engineer ships workflows in YAML through Git and CI/CD"
      - "Event-driven at core: react to real events, not just batch schedules"
      - "Open source with 26k+ GitHub stars, no per-job licensing"
      - "Self-service for non-engineers via Kestra Apps"
  competitor:
    title: Centralized Batch Scheduling
    list:
      - "Batch workload scheduling across mainframe and distributed systems"
      - "Central ops team defines and manages jobs"
      - "Schedule-first architecture (event-driven features added in January 2026 SaaS release)"
      - "Proprietary per-job licensing with execution volume caps"
      - "Steep learning curve with complex upgrade process"
    shadowColor: "#FE5100"
    bulletColor: "#FE5100"
  footerText: "Control-M fits organizations with mainframe workloads and a centralized ops team managing all automation. Kestra is the right choice if you want developers to own their own workflows, need event-driven automation beyond batch scheduling, or need to orchestrate across legacy and modern systems without routing everything through an ops team."

setupSpeed:
  title: Time to First Workflow
  subtitle: "Control-M requires installing the Enterprise Manager, a Control-M/Server, and agents on each target host, then configuring connections between them. Kestra's single Docker Compose command stands up everything in a format that's already production-shaped."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready (database and config included). Open the UI, pick a Blueprint, run it."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: "Days to"
      two: Weeks
    description: "Production deployment requires installing Control-M/Enterprise Manager, Control-M/Server, and Control-M/Agents on each target host. Configuration involves database setup, agent-server connectivity, and security policies. The free Workbench sandbox helps with job authoring, but production infrastructure takes significant setup."
    shadowColor: "#FE5100"
    command: |
      # 1. Install Control-M/Enterprise Manager (central console)
      # 2. Install Control-M/Server (scheduling engine + database)
      # 3. Install Control-M/Agent on each target host
      # 4. Configure agent-server connectivity
      # 5. Set up security policies and user roles
      # 6. Define jobs via GUI or Jobs-as-Code JSON

      # Or use Control-M Workbench (free sandbox) for local dev
      docker run -dt -p 8443:8443 controlm/workbench:latest
    lang: sh

easeOfUse:
  title: YAML Anyone Can Read vs. JSON Behind an Ops Team
  kestra:
    title: "Kestra: Any engineer, any language"
    description: "YAML is readable on day 1. Our docs are embedded in the UI for easy reference, the <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes workflows for you, or start with our library of Blueprints. Engineers deploy through Git, same as application code."
    code: |
      id: server_provision
      namespace: infra.ops

      inputs:
        - id: vm_name
          type: STRING
        - id: environment
          type: SELECT
          values: [dev, staging, prod]

      tasks:
        - id: request_approval
          type: io.kestra.plugin.core.flow.Pause
          onResume:
            - id: approved_by
              type: STRING

        - id: provision
          type: io.kestra.plugin.terraform.cli.TerraformCLI
          commands:
            - terraform apply -auto-approve
          env:
            TF_VAR_vm_name: "{{ inputs.vm_name }}"
            TF_VAR_env: "{{ inputs.environment }}"

        - id: configure
          type: io.kestra.plugin.ansible.cli.AnsibleCLI
          commands:
            - ansible-playbook configure.yml
              -i "{{ outputs.provision.vars.ip }}"

        - id: close_ticket
          type: io.kestra.plugin.core.http.Request
          uri: "https://instance.service-now.com/api/now/table/change_request/{{ trigger.body.sys_id }}"
          method: PATCH
          headers:
            Content-Type: "application/json"
          body: '{"state": "resolved"}'
    lang: yaml
  competitor:
    title: "Control-M: JSON definitions managed by ops"
    description: "Jobs-as-Code uses JSON with Control-M-specific properties like RunAs, Host, and Application. Job definitions are authored in the GUI or JSON, then deployed through the Automation API. Modifying orchestration logic typically requires the operations team."
    shadowColor: "#FE5100"
    code: |
      {
        "ServerProvision": {
          "Type": "Folder",
          "Application": "Infra",
          "SubApplication": "Provisioning",
          "Defaults": {
            "Host": "prod-agent-01",
            "RunAs": "infra_user"
          },
          "RunTerraform": {
            "Type": "Job:Command",
            "Command": "terraform apply -auto-approve",
            "Host": "terraform-agent"
          },
          "ConfigureServer": {
            "Type": "Job:Command",
            "Command": "ansible-playbook configure.yml",
            "Host": "ansible-agent"
          },
          "CloseTicket": {
            "Type": "Job:Script",
            "FileName": "close_ticket.py",
            "FilePath": "/opt/scripts/servicenow"
          }
        }
      }
    lang: json

