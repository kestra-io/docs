platformStrengths:
  title: Kestra Is Built for How Modern Teams Work
  features:
    - title: No agents, no ops tickets
      description: "Control-M requires installing and maintaining agents on every target host, with changes routed through a central operations team. Kestra runs tasks in isolated Docker containers. Engineers deploy through Git and CI/CD, the same way they deploy application code."
    - title: Open source, transparent pricing
      description: "Kestra's open-source core is free with 1200+ plugins. Enterprise features (RBAC, SSO, audit logs) are available without per-job metering. Control-M's proprietary licensing starts at $2,400/month with per-job overage fees that grow with execution volume."
    - title: Event-driven, not just batch
      description: "Kestra was built event-driven from the start: webhooks, S3 uploads, Kafka messages, database changes, and API events are first-class YAML triggers. Unlimited event-driven workflows in open source. Control-M added event-driven capabilities in its v26 SaaS release, but the core architecture remains schedule-first."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "You want developers to build and ship workflows themselves, not file tickets with a central automation team."
      - "You need event-driven orchestration that reacts to real-time events, not just cron and batch schedules."
      - "You're orchestrating data pipelines, infrastructure, and business processes across languages and teams."
      - "Open-source foundations and transparent pricing matter. No per-job fees, no proprietary lock-in."
      - "Non-engineers need to trigger and monitor workflows without learning a new tool."
  competitor:
    title: Choose Control-M When
    list:
      - "You have mainframe workloads that need scheduling alongside distributed and cloud jobs."
      - "A centralized operations team manages all automation and you want a single pane of glass."
      - "You need native managed file transfer with SFTP, AS2, and PGP encryption."
      - "Your organization is already invested in the BMC ecosystem and Control-M is the standard."
      - "Regulatory requirements demand a Gartner Magic Quadrant Leader in workload automation."
    shadowColor: "#FE5100"
    bulletColor: "#FE5100"

commonQuestions:
  - question: How hard is it to migrate from Control-M to Kestra?
    answer: "Kestra doesn't require you to rewrite your business logic. Shell scripts, Python code, SQL queries, and file transfer operations work as-is in Kestra's Script and plugin tasks. The migration is mostly about translating Control-M job definitions (GUI or JSON) into Kestra's YAML format and replacing agent-based execution with containerized tasks. Most teams start new workflows in Kestra and migrate existing jobs incrementally."
  - question: We have thousands of Control-M jobs. Is incremental migration realistic?
    answer: "Yes. Kestra and Control-M can run side by side. Start by building new workflows in Kestra while existing Control-M jobs continue running. Migrate jobs in batches, starting with the simplest ones. Kestra's webhook and API triggers can bridge the two systems during the transition, letting Control-M trigger Kestra workflows or vice versa."
  - question: Control-M has native mainframe support. Does Kestra?
    answer: "Kestra is not designed for mainframe job scheduling. If you have significant mainframe workloads, Control-M or a dedicated mainframe scheduler is the right tool for that layer. However, many organizations use Kestra for everything except mainframe, reducing their Control-M footprint and licensing costs to only where it's truly needed."
  - question: How does Kestra's pricing compare to Control-M?
    answer: "Kestra's open-source edition is free with 1200+ plugins and unlimited event-driven workflows. Enterprise features (RBAC, SSO, audit logs, multi-tenancy) are available on Kestra Enterprise and Kestra Cloud without per-job metering. Control-M's SaaS Starter Pack begins at $2,400/month with capped execution volume and per-job overage fees. Enterprise pricing is custom and typically involves six-figure annual contracts."
  - question: Does Kestra support the same integrations as Control-M?
    answer: "Kestra's 1200+ plugin library covers cloud providers (AWS, Azure, GCP), data warehouses (Snowflake, BigQuery, Databricks), databases, message queues (Kafka, RabbitMQ, Pulsar), and CI/CD tools. Control-M has native connectors for SAP, mainframe systems, and managed file transfer (SFTP, AS2, PGP) that Kestra doesn't replicate directly. For cloud-native and data platform integrations, both tools cover the same ground."
  - question: How does Kestra handle access control compared to Control-M?
    answer: "Kestra provides namespace isolation with RBAC, SSO/SAML, audit logs for every execution, and secrets management integration with AWS Secrets Manager, HashiCorp Vault, and Azure Key Vault. Control-M offers role-based access through its Enterprise Manager, but multi-tenancy requires complex configuration across servers and agents. Kestra's governance model is built into the platform rather than layered across distributed components."
  - question: Control-M has Jobs-as-Code. How is that different from Kestra's YAML workflows?
    answer: "Control-M's Jobs-as-Code lets you define jobs in JSON and deploy them through the Automation API with CI/CD integration. Kestra's YAML workflows serve a similar purpose but with key differences. YAML is more readable than Control-M's nested JSON. Kestra workflows are self-contained (tasks, triggers, schedules, and retries in one file) while Control-M jobs reference external server and agent configurations. Kestra workflows run anywhere Docker runs, while Control-M jobs require the full server and agent infrastructure."
  - question: We use Control-M for managed file transfer. What's the Kestra equivalent?
    answer: "Kestra handles file transfers through plugins for S3, GCS, Azure Blob, SFTP, and HTTP. For organizations that need enterprise MFT features like AS2, PGP encryption, or FTP over SSL with compliance audit trails, Control-M's native MFT module is purpose-built for that. Many teams keep Control-M for regulated file transfers while using Kestra for everything else."
  - question: How does Kestra's event-driven architecture compare to Control-M's?
    answer: "Control-M was built as a batch scheduler. Event-driven capabilities were introduced in the v26 SaaS release, supporting Kafka, Amazon SQS, and RabbitMQ triggers. Kestra was event-driven from the start: webhooks, S3 and GCS uploads, Kafka and Pulsar messages, database changes, and API events are first-class YAML triggers. Unlimited event-driven workflows are available in the open-source version, with no execution caps or overage fees."
