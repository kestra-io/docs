    - feature: AI approach
      kestra: "Pipeline orchestration for any AI workload"
      competitor: "Visual AI agent builder (LangChain, MCP, vector stores)"
    - feature: License
      kestra: "Apache 2.0 (open-source)"
      competitor: "Sustainable Use License (source-available)"
    - feature: Plugins / Integrations
