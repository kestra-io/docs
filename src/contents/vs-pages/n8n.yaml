  kestra:
    description: "Orchestrate across data pipelines, infrastructure operations, AI workloads, and business workflows in one unified platform. Distributed, isolated, and built for production."
  competitor:
    description: "Purpose-built for connecting apps and building visual automations. Strong AI agent tooling. Not designed for infrastructure orchestration or multi-team isolation at scale."
    shadowColor: "#FF9F7A"

