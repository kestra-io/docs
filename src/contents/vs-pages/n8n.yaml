decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "You're orchestrating data pipelines, infrastructure, or AI workloads at production scale."
      - "Your team works across languages—Python, SQL, Bash, R, Go. You need orchestration that isn't locked to JavaScript."
