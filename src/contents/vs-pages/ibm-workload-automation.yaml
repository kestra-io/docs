commonQuestions:
  - question: How hard is it to migrate from IBM Workload Automation to Kestra?
    answer: "Kestra doesn't require you to rewrite your business logic. Shell scripts, Python code, SQL queries, and file transfer operations work as-is in Kestra's Script and plugin tasks. The migration is mostly about translating IBM WA job definitions and job streams into Kestra's YAML format and replacing agent-based execution with containerized tasks. Most teams start new workflows in Kestra and migrate existing jobs incrementally, leaving mainframe workloads on IBM WA."
  - question: We have thousands of IBM WA jobs. Is incremental migration realistic?
    answer: "Yes. Kestra and IBM Workload Automation can run side by side. Start by building new workflows in Kestra while existing IBM WA jobs continue running. Migrate jobs in batches, starting with the simplest distributed workloads. Kestra's webhook and API triggers can bridge the two systems during the transition, letting IBM WA trigger Kestra workflows or vice versa. Many organizations keep IBM WA only for mainframe jobs and move everything else to Kestra."
  - question: IBM Workload Automation has native z/OS mainframe support. Does Kestra?
    answer: "Kestra is not designed for z/OS mainframe job scheduling. If you have significant mainframe workloads with JCL jobs, IBM Workload Automation or a dedicated mainframe scheduler is the right tool for that layer. However, many organizations use Kestra for everything except mainframe, reducing their IBM WA footprint and licensing costs to only where mainframe integration is truly needed."
  - question: How does Kestra's pricing compare to IBM Workload Automation?
    answer: "Kestra's open-source edition is free with 1200+ plugins and unlimited event-driven workflows. Enterprise features (RBAC, SSO, audit logs, multi-tenancy) are available on Kestra Enterprise and Kestra Cloud without per-job metering. IBM Workload Automation uses PVU-based licensing where costs scale with the number of processors running the Master Domain Manager, agents, and connected systems. Enterprise pricing requires engaging IBM sales."
  - question: Does Kestra support the same integrations as IBM Workload Automation?
    answer: "Kestra's 1200+ plugin library covers cloud providers (AWS, Azure, GCP), data warehouses (Snowflake, BigQuery, Databricks), databases, message queues (Kafka, RabbitMQ, Pulsar), and CI/CD tools. IBM WA has native connectors for z/OS, IBM MQ, Db2, SAP, and PeopleSoft that Kestra doesn't replicate directly. For cloud-native and data platform integrations, both tools cover the same ground. The gap is primarily in mainframe and IBM-specific ecosystem integrations."
  - question: How does Kestra handle access control compared to IBM Workload Automation?
    answer: "Kestra provides namespace isolation with RBAC, SSO/SAML, audit logs for every execution, and secrets management integration with AWS Secrets Manager, HashiCorp Vault, and Azure Key Vault. IBM WA offers role-based access through the Dynamic Workload Console and workstation-level security, but multi-tenancy requires complex configuration across the Master Domain Manager, domains, and agents. Kestra's governance model is built into the platform rather than layered across distributed components."
  - question: What is the Dynamic Workload Console, and does Kestra have an equivalent?
    answer: "The Dynamic Workload Console is IBM WA's web-based monitoring and management interface for viewing job status, managing schedules, and handling exceptions. Kestra's built-in UI serves a similar purpose but goes further: it includes a visual workflow editor, real-time execution monitoring, log inspection, embedded documentation, and an AI Copilot for building workflows. Kestra's UI is also where developers author workflows, not just where operators monitor them."
  - question: IBM WA supports Fault-Tolerant and Dynamic Agents. Why doesn't Kestra need agents?
    answer: "IBM WA's agent architecture (Fault-Tolerant Agents for persistent connections, Dynamic Agents for on-demand provisioning) was designed for an era when distributed execution required permanent software installations on target hosts. Kestra uses Docker containers for task execution: each task runs in an isolated container that spins up on demand and tears down when complete. No agent software to install, patch, or maintain on target hosts. This eliminates agent sprawl and reduces operational overhead."
  - question: We use IBM WA as part of IBM Cloud Pak for Business Automation. Can Kestra replace that?
    answer: "IBM Cloud Pak for Business Automation bundles IBM WA with other IBM automation products (Business Automation Workflow, Operational Decision Manager, etc.). Kestra replaces the workload orchestration layer but is not a direct replacement for IBM's business process management or decision management tools. If your primary need is job scheduling and workflow orchestration, Kestra covers that. If you rely heavily on IBM's BPM or ODM capabilities, those are separate concerns."
  - question: How does Kestra's event-driven architecture compare to IBM WA's?
    answer: "IBM Workload Automation supports file-based triggers and some event-driven capabilities, but its core architecture is built around scheduling plans, run cycles, and time-based dependencies. Kestra was event-driven from the start: webhooks, S3 and GCS uploads, Kafka and Pulsar messages, database changes, and API events are first-class YAML triggers. Unlimited event-driven workflows are available in the open-source version, with no execution caps or licensing overhead."
  - question: Can we replace IBM Workload Automation with cron or Ansible instead of Kestra?
    answer: "Teams sometimes reach for cron jobs or config management tools as an IBM WA replacement because they're already in the stack. These tools lack workflow orchestration fundamentals: event-driven triggers, DAG-based dependency management, retries with backoff, real-time execution monitoring, and cross-job observability. The result is usually cron jobs wrapped around scripts with no visibility into failures. Kestra is purpose-built for orchestration and can call Ansible playbooks or Terraform plans as tasks within a workflow."
