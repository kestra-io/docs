      description: "IBM Workload Automation requires installing and maintaining Fault-Tolerant or Dynamic Agents on every target host, with changes routed through a central operations team. Kestra runs tasks in isolated Docker containers. Engineers deploy through Git and CI/CD, the same way they deploy application code."
    - title: Open source, transparent pricing
      description: "Kestra's open-source core is free with 1200+ plugins. Enterprise features (RBAC, SSO, audit logs) are available without per-job metering. IBM Workload Automation uses proprietary PVU-based licensing, and costs scale with the number of processors running the Master Domain Manager, agents, and connected systems."
    - title: Event-driven, not just batch
      description: "Kestra was built event-driven from the start: webhooks, S3 uploads, Kafka messages, database changes, and API events are first-class YAML triggers. Unlimited event-driven workflows in open source. IBM Workload Automation is fundamentally a batch scheduler. While it supports file-based and event-driven triggers, the core architecture is built around scheduling plans, run cycles, and time-based job dependencies."

