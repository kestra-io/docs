title: "Kestra vs. IBM Workload Automation: Modern Orchestration vs. Legacy Enterprise Scheduling"
description: "Compare Kestra vs IBM Workload Automation (formerly Tivoli Workload Scheduler): Open-source, event-driven orchestration in YAML vs. agent-based enterprise job scheduling with proprietary licensing. See features, setup, and migration path."
competitorName: IBM Workload Automation

intro:
  title: "Kestra vs. IBM Workload Automation: Modern Orchestration vs. Legacy Enterprise Scheduling"
  description: "IBM Workload Automation centralizes batch scheduling behind a multi-component infrastructure and an operations team. Kestra lets any engineer build and ship workflows in YAML. No agents, no proprietary licensing, no weeks-long deployments."

philosophy:
  mainTitle: Two Eras of Orchestration
  kestra:
    title: "Developer Self-Service Orchestration"
    description: "Declarative YAML workflows versioned in Git, executed in isolated containers, deployed through CI/CD. Existing scripts, ETL jobs, and batch processes run as-is. Any engineer can build and ship workflows without filing a ticket. No ops team in the critical path."
    subCardText: '"How do we let every team build and ship workflows without a central automation team slowing them down?"'
  competitor:
    title: Centralized Enterprise Job Scheduling
    description: "Enterprise batch scheduler built around a Master Domain Manager, Backup Domain Manager, and agents deployed on every target host. Jobs are defined through the Dynamic Workload Console or command line, scheduled through the engine, and executed by Fault-Tolerant or Dynamic Agents. Changes flow through the operations team."
    shadowColor: "#1f70c1"
    subCardBg: "var(--ks-background-blue-light)"
    subCardText: '"How do we schedule and monitor batch jobs across our mainframe, distributed, and cloud systems from a single console?"'

businessValue:
  mainTitle: "Developer Self-Service vs. Agent-Based Central Scheduling"
  kestra:
    title: Self-Service Automation
    list:
      - "Data pipelines, infrastructure automation, business processes, and AI workflows"
      - "Any engineer ships workflows in YAML through Git and CI/CD"
      - "Event-driven at core: react to real events, not just batch schedules"
      - "Open source with 1200+ plugins, no per-job licensing, and transparent pricing"
      - "Self-service for non-engineers via Kestra Apps"
  competitor:
    title: Centralized Batch Scheduling
    list:
      - "Batch workload scheduling across z/OS mainframe, distributed, and cloud environments"
      - "Central ops team defines and manages jobs through the Dynamic Workload Console"
      - "Schedule-first architecture with deep mainframe integration"
      - "Proprietary IBM licensing tied to processor value units (PVUs)"
      - "Complex multi-component installation requiring dedicated infrastructure team"
    shadowColor: "#1f70c1"
    bulletColor: "#1f70c1"
  footerText: "IBM Workload Automation fits organizations with z/OS mainframe workloads and deep investment in the IBM ecosystem. Kestra is the right choice if you want developers to own their own workflows, need event-driven automation beyond batch scheduling, or need to orchestrate across legacy and modern systems without routing everything through a centralized operations team."

setupSpeed:
  title: Time to First Workflow
  subtitle: "IBM Workload Automation requires installing a Master Domain Manager, a Backup Domain Manager, a database (Db2 or Oracle), and agents on each target host, then configuring connectivity and security between all components. Kestra's single Docker Compose command stands up everything in a format that's already production-shaped."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready (database and config included). Open the UI, pick a Blueprint, run it."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: "Weeks to"
      two: Months
    description: "Production deployment requires installing the Master Domain Manager (MDM), optionally a Backup Domain Manager (BDM), a supported database (Db2 or Oracle), and Fault-Tolerant or Dynamic Agents on every target host. Configuration involves network connectivity, security certificates, agent-engine pairing, and user role setup through the Dynamic Workload Console."
    shadowColor: "#1f70c1"
    command: |
      # 1. Provision supported database (Db2 or Oracle)
      # 2. Install Master Domain Manager (MDM)
      # 3. Install Backup Domain Manager (BDM) for HA
      # 4. Install Dynamic Workload Console (monitoring UI)
      # 5. Install Fault-Tolerant Agents on each target host
      # 6. Configure agent-engine connectivity and certificates
      # 7. Set up user roles and security policies
      # 8. Define job streams and scheduling plans

      # For z/OS: install IWA z/OS controller + tracker agents
      # For cloud: configure Dynamic Agents on cloud VMs
    lang: sh

easeOfUse:
  title: YAML Anyone Can Read vs. Proprietary Job Definitions
  kestra:
    title: "Kestra: Any engineer, any language"
    description: "YAML is readable on day 1. Our docs are embedded in the UI for easy reference, the <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes workflows for you, or start with our library of Blueprints. Engineers deploy through Git, same as application code."
    code: |
      id: batch_processing
      namespace: finance.batch

      inputs:
        - id: run_date
          type: DATE
        - id: region
          type: SELECT
          values: [NA, EMEA, APAC]

      tasks:
        - id: extract
          type: io.kestra.plugin.jdbc.db2.Query
          sql: |
            SELECT * FROM transactions
            WHERE region = '{{ inputs.region }}'
            AND process_date = '{{ inputs.run_date }}'

        - id: transform
          type: io.kestra.plugin.scripts.python.Script
          script: |
            import pandas as pd
            df = pd.read_csv("{{ outputs.extract.uri }}")
            df['status'] = 'processed'
            df.to_csv("{{ outputDir }}/batch_output.csv")

        - id: load
          type: io.kestra.plugin.gcp.bigquery.Load
          from: "{{ outputs.transform.outputFiles['batch_output.csv'] }}"
          destinationTable: "warehouse.fact_transactions"

        - id: notify
          type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
          url: "{{ secret('SLACK_WEBHOOK') }}"
          payload: |
            {"text": "Batch processing complete for {{ inputs.region }}"}
    lang: yaml
  competitor:
    title: "IBM WA: Job definitions in proprietary format"
    description: "Jobs are defined through the Dynamic Workload Console GUI or via the composer command-line interface using IBM's proprietary job definition language (JSDL). Job streams group related jobs with dependencies, time restrictions, and resource requirements. Modifying scheduling logic typically requires the operations team and familiarity with IBM-specific concepts like workstations, job streams, and scheduling plans."
    shadowColor: "#1f70c1"
    code: |
      # IBM WA job stream definition (composer CLI syntax)
      # Requires Master Domain Manager running + agents installed

      SCHEDULE FINANCE#BATCH_PROCESSING
        ON RUNCYCLE RULE1 "FREQ=DAILY"
        :
        FINANCE#EXTRACT_DATA
          SCRIPTNAME "/opt/scripts/extract.sh"
          STREAMLOGON finance_user
          DESCRIPTION "Extract transactions from Db2"
          RECOVERY STOP
        END

        FINANCE#TRANSFORM_DATA
          SCRIPTNAME "/opt/scripts/transform.py"
          STREAMLOGON finance_user
          DESCRIPTION "Transform and validate data"
          FOLLOWS FINANCE#EXTRACT_DATA
          RECOVERY STOP
        END

        FINANCE#LOAD_DATA
          SCRIPTNAME "/opt/scripts/load.sh"
          STREAMLOGON finance_user
          DESCRIPTION "Load into data warehouse"
          FOLLOWS FINANCE#TRANSFORM_DATA
          RECOVERY STOP
        END
      END
    lang: sh

