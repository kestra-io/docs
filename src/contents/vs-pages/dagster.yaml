commonQuestions:
  - question: How do I migrate from Dagster to Kestra?
    answer: "Migration is straightforward because Kestra doesn't require you to refactor your code. Extract your Python logic from Dagster's @asset decorators and run it directly as a Script task in Kestra. Your SQL queries, Shell scripts, and Python code work as-is. Define the orchestration flow in YAML—triggering, scheduling, dependencies—and you're done. Most teams migrate incrementally, running both platforms in parallel during transition."
  - question: How does Kestra handle my scripts?
    answer: "Kestra is language-agnostic. Run Python, SQL, Go, and more—either inline in your YAML or from external files. Scripts execute in isolated Docker containers by default, with full control over dependencies. No decorators, no wrappers, no framework-specific syntax. Your code stays portable."
  - question: Does Kestra work with Python?
    answer: "Yes. Python is a first-class citizen in Kestra with a dedicated plugin. Write inline Python in your YAML or reference external .py files. Install any pip packages. Use the optional Kestra Python library to pass outputs and metrics back to the orchestrator—but it's not required. Your existing Python scripts run without modification."
  - question: How much time do I need to get started?
    answer: "Five minutes. Download the Docker Compose file, run docker compose up, and open the UI at localhost:8080. Pick a Blueprint, customize it, and execute. No Python environment to configure, no virtual environments to manage, no framework concepts to learn first. If you know YAML (or can read it), you can build workflows immediately."
  - question: Can Kestra handle the same data pipeline use cases as Dagster?
    answer: "Yes. Kestra orchestrates ETL/ELT pipelines, dbt models, data quality checks, and warehouse operations. The difference: Kestra uses declarative YAML for orchestration while letting you write transformation logic in any language. You get the same data pipeline capabilities without being locked into Python or the asset abstraction."
  - question: What about data lineage and observability?
    answer: "Kestra provides built-in execution logs, metrics, and topology views for every workflow. Track inputs, outputs, and dependencies across tasks. For data-specific lineage, integrate with tools like OpenLineage or your existing data catalog. Kestra focuses on workflow observability; pair it with purpose-built lineage tools for deep data tracking."

