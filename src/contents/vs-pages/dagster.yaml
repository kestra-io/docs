setupSpeed:
  title: Time to First Workflow
  subtitle: "Dagster requires restructuring your logic into Software-Defined Assets with @asset decorators, IOManagers, and repository definitions. Kestra takes a simpler approach: define orchestration in declarative YAML, write business logic in whatever language fits the task."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready—database and config included. Open the UI, pick a Blueprint, run it. No Python environment to wrestle with."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: "~30"
      two: Minutes
    description: "Requires Python environment setup, understanding of assets/definitions structure, and refactoring your code into Dagster's Assets."
    shadowColor: "#A5CCFE"
    command: |
      pip install dagster dagster-webserver
      dagster dev

      # Now restructure your code...
    lang: python

easeOfUse:
  title: Workflows Your Whole Team Can Read
  kestra:
    title: "Kestra: Readable by your whole team"
    description: "YAML is readable on day 1. Our docs are embedded in the UI for easy reference,  the <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes workflows for you, or start with our library of Blueprints. No special training required."
    code: |
      id: daily_report
      namespace: analytics

      triggers:
        - id: daily
          type: io.kestra.plugin.core.trigger.Schedule
          cron: "0 8 * * *"

      tasks:
        - id: run_dbt
          type: io.kestra.plugin.dbt.cli.DbtCLI
          commands:
            - dbt run --select reporting

        - id: notify
          type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
          url: "{{ secret('SLACK_WEBHOOK') }}"
          messageText: "Daily report ready"
    lang: yaml
  competitor:
    title: "Dagster: Requires the Python developer lens"
    description: "Requires Python environment setup, understanding of assets/definitions structure, and refactoring your code into Dagster's Assets."
    shadowColor: "#A5CCFE"
    code: |
      from dagster import asset, define_asset_job, AssetSelection, ScheduleDefinition, Definitions
      import subprocess, requests, os

      @asset
      def dbt_report():
          subprocess.run(["dbt", "run", "--select", "reporting"], check=True)

      @asset(deps=[dbt_report])
      def slack_notification():
          requests.post(os.environ["SLACK_WEBHOOK"], json={"text": "Daily report ready"})

      report_job = define_asset_job("report_job", selection=AssetSelection.all())
      daily_schedule = ScheduleDefinition(job=report_job, cron_schedule="0 8 * * *")
      defs = Definitions(
          assets=[dbt_report, slack_notification],
          schedules=[daily_schedule],
      )
    lang: python

