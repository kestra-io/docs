platformStrengths:
  title: Kestra Is Built for How Data Teams Actually Work
  features:
    - title: No refactoring required
      description: "Bring existing Python scripts, SQL queries, and Shell commands. Kestra orchestrates them in YAML without wrapping them in decorators or operators. Your code stays portable and your team stays unblocked."
    - title: Orchestrate beyond data pipelines
      description: "Data pipelines, infrastructure automation, and business processes run from one platform. Airflow 3 remains scoped to data pipeline orchestration for Python teams."
    - title: Event-driven, not just scheduled
      description: "Native triggers for S3, webhooks, Kafka, database changes, and API events. Workflows start when things happen, not when a cron schedule fires. Unlimited event-driven workflows in open source."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "Your team writes Python, SQL, Bash, and dbt, and you want orchestration that doesn't force everyone into Python decorators."
      - "You need event-driven workflows that respond to real-time events, not just cron schedules."
      - "You're managing data, infrastructure, and business processes and want one control plane."
      - "Non-engineers need to trigger or monitor workflows without writing code."
      - "You're evaluating orchestrators during the Airflow 2 EOL window and want to compare options before committing."
  competitor:
    title: Choose Airflow 3 When
    list:
      - "Your team is Python-native and invested in the Airflow ecosystem: custom operators, trained staff, institutional knowledge."
      - "You're running on managed services (MWAA, Cloud Composer) and expect Airflow 3 support soon."
      - "Airflow's Python-only and batch-first constraints aren't blocking your roadmap."
      - "You have significant custom operator libraries you'd need to rebuild elsewhere."
    shadowColor: "#E8F5E9"
    bulletColor: "#4CAF50"

commonQuestions:
  - question: How hard is it to migrate from Airflow to Kestra?
    answer: "Migration is gentler than the Airflow 3 upgrade for most teams. Kestra doesn't require you to refactor your business logic. Bring existing Python scripts, SQL queries, and Shell commands as-is and define orchestration in YAML. Most teams migrate incrementally using the Strangler Fig pattern, running Kestra alongside Airflow and moving pipelines one by one. Kestra can trigger Airflow DAGs during the transition via the Airflow REST API, so there's no forced cutover and production stays stable throughout."
  - question: Does Kestra support the same data pipeline use cases as Airflow?
    answer: "Yes. Kestra orchestrates ETL and ELT pipelines, dbt models, data quality checks, warehouse operations, and file transfers. With 1200+ plugins, it covers the same integrations as Airflow's provider ecosystem: AWS, GCP, Azure, Snowflake, BigQuery, Databricks, Kafka, and more. The difference is that Kestra uses declarative YAML for orchestration while letting you write transformation logic in any language, without wrapping everything in Python operators."
  - question: How does Kestra handle workflow versioning?
    answer: "Kestra maintains revision history for every workflow. Each time you save a flow, Kestra creates a new revision. You can view the diff between revisions, roll back to a previous version, and track changes over time. Airflow 3 introduced DAG versioning as a new feature. Kestra has offered workflow revisions since its early releases, and they integrate with Git-based CI/CD workflows through the Kestra Terraform provider and GitHub Actions."
  - question: Can Kestra and Airflow run in parallel during migration?
    answer: "Yes, and this is the recommended approach. Run both systems simultaneously and migrate workflows incrementally. Kestra can trigger existing Airflow DAGs via the Airflow REST API, which means you can shift orchestration responsibility gradually without a big-bang cutover. Teams typically start with new workflows in Kestra, then migrate existing pipelines in order of complexity. The Strangler Fig pattern keeps production stable and lets migration progress at a pace the organization controls."
  - question: What about Airflow's ecosystem of providers and operators?
    answer: "Kestra's 1200+ plugin library covers the same integrations as Airflow's provider ecosystem: cloud providers, databases, data warehouses, message queues, and modern data stack tools. Instead of Python operator classes, Kestra uses declarative plugin tasks defined in YAML. Your existing Python code runs directly in Script tasks without modification. Custom operator logic becomes a Script or HTTP task in most cases, with no framework-specific wrapper required."
  - question: How does Kestra's event-driven architecture differ from Airflow's?
    answer: "Airflow is a batch-first scheduler. It added Sensors and Deferrable Operators to support event-driven patterns, but these work around a fundamentally schedule-centric architecture. Kestra is event-driven at its core. Native triggers for S3 and GCS uploads, webhooks, Kafka and Pulsar messages, database changes, and API events start workflows instantly when events occur. No polling workarounds, no glue code. Unlimited event-driven workflows are available in the open-source version."
