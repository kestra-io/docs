title: "Kestra vs. Apache Airflow: Orchestrate Your Stack, Not Just Your DAGs"
description: "Compare Kestra vs Apache Airflow: Declarative YAML orchestration for any language vs. Python DAGs. See features, setup time, and migration considerations."
competitorName: Airflow

intro:
  title: "Kestra vs. Apache Airflow: Orchestrate Your Stack, Not Just Your DAGs"
  description: "Airflow schedules Python pipelines for data engineering teams. Kestra orchestrates workflows across your entire stack. One serves Python-native data teams. The other changes what's possible for your business."

philosophy:
  mainTitle: Two Architectures, Two Philosophies
  kestra:
    title: "Universal Orchestration: Pipelines and Workflows"
    description: "Declarative orchestration layer where YAML describes intent and any language executes. Orchestration is configuration, not code. Data pipelines, infrastructure automation, and business processes run from a single control plane without forcing every task into one language."
    subCardText: '"How do we run data pipelines, infrastructure jobs, and business workflows from one place?"'
  competitor:
    title: Python DAG Execution Engine
    description: "A Python-based workflow engine where DAGs are executable programs. Workflows are Python code that the scheduler runs. Everything—scheduling, dependencies, retries—is defined in Python and tied to the Airflow runtime."
    shadowColor: "#E8F5E9"
    subCardBg: "var(--ks-background-green-light)"
    subCardText: '"How do we schedule and monitor our Python data pipelines?"'

businessValue:
  mainTitle: "Python Pipeline Scheduling vs. Universal Workflow Orchestration"
  kestra:
    title: Universal Workflows
    list:
      - "Data pipelines, infrastructure automation, business processes, AI workflows"
      - "Multi-language: Python, SQL, Bash, Go, Node.js, R"
      - "Event-driven at core: respond to real events, not just schedules"
      - "Self-service for non-engineers via Kestra Apps"
      - "One control plane for the entire organization"
  competitor:
    title: Data Pipelines for Python Teams
    list:
      - "Schedule-first pipeline orchestration (event-driven features added in v3)"
      - "Python workflow definitions (Bash/SQL via operators)"
      - "Data engineering scope"
      - "Limited multi-tenancy"
      - "Serves Python-native data teams"
    shadowColor: "#E8F5E9"
    bulletColor: "#4CAF50"
  footerText: "Airflow works well for Python-native teams invested in the Airflow ecosystem, especially with Airflow 3's improved event-driven features and Task SDK. Kestra is the right choice if you need multi-language teams to contribute in YAML, event-driven execution as a first-class primitive, or orchestration that spans data, infrastructure, and business workflows."

setupSpeed:
  title: Time to First Workflow
  subtitle: "Airflow's standalone command works for local development, but production deployments need an API server, DAG processor, metadata database, and executor configured separately. Kestra's single Docker Compose command stands up everything in a format that's already production-shaped."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready (database and config included). Open the UI, pick a Blueprint, run it. No Python environment, no DAG library to configure."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: "~30"
      two: Minutes
    description: "The standalone command gets a dev instance running quickly, but on SQLite with no parallelism. Production requires installing providers, configuring the API server, DAG processor, metadata DB, and executor separately."
    shadowColor: "#E8F5E9"
    command: |
      pip install apache-airflow
      pip install apache-airflow-providers-standard

      # Dev: airflow standalone (SQLite, no parallelism)
      # Production: configure API server, DAG processor,
      # metadata DB, and executor separately
      # Then write your DAGs in Python...
    lang: sh

easeOfUse:
  title: Workflows Your Whole Team Can Read
  kestra:
    title: "Kestra: Readable by Your Whole Team"
    description: "YAML is readable on day 1. Our docs are embedded in the UI for easy reference, the <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes workflows for you, or start with our library of Blueprints. No Python knowledge required to understand or modify a workflow."
    code: |
      id: daily_etl
      namespace: data.production

      tasks:
        - id: extract
          type: io.kestra.plugin.scripts.python.Script
          script: |
            # Paste your existing extraction logic here
            result = {"records": 1000}

        - id: transform
          type: io.kestra.plugin.dbt.cli.DbtCLI
          commands:
            - dbt run --select staging

      triggers:
        - id: daily
          type: io.kestra.plugin.core.trigger.Schedule
          cron: "0 0 * * *"
    lang: yaml
  competitor:
    title: "Airflow: Python knowledge required for workflow authoring"
    description: "DAG definitions, retry logic, and scheduling are all Python code. Airflow can run Bash and SQL via operators, but modifying orchestration logic requires Python. Non-Python contributors can view runs in the UI but can't author or edit workflows directly."
    shadowColor: "#E8F5E9"
    code: |
      from airflow import DAG
      from airflow.operators.python import PythonOperator
      from airflow.operators.bash import BashOperator
      from datetime import datetime

      def extract_data(**context):
          # extraction logic
          return {"records": 1000}

      with DAG('daily_etl', start_date=datetime(2024, 1, 1), schedule='@daily') as dag:
          extract = PythonOperator(
              task_id='extract',
              python_callable=extract_data,
          )
          transform = BashOperator(
              task_id='transform',
              bash_command='dbt run --select staging',
          )
          extract >> transform
    lang: python

