platformStrengths:
  title: Kestra Is Built for How Data Teams Actually Work
  features:
    - title: No refactoring required
      description: "Bring existing Python scripts, SQL queries, and Shell commands. Kestra orchestrates them in YAML without wrapping them in decorators or operators. Your code stays portable and your team stays unblocked."
    - title: Orchestrate beyond data pipelines
      description: "Data pipelines, infrastructure automation, and business processes run from one platform. Airflow focuses on data pipeline orchestration. Infrastructure and business workflows are possible through Python operators but aren't first-class use cases."
    - title: Event-driven, not just scheduled
      description: "Native triggers for S3, webhooks, Kafka, database changes, and API events. Airflow 3 added Asset Watchers for event-driven scheduling, but triggers in Kestra are first-class YAML declarations, not layered onto a schedule-first core. Unlimited event-driven workflows in open source."

decisionGuide:
  mainTitle: The Right Tool for the Right Job
  kestra:
    title: Choose Kestra When
    list:
      - "Your team writes Python, SQL, Bash, and dbt, and you want orchestration that doesn't force everyone into Python decorators."
      - "You need event-driven workflows that respond to real-time events, not just cron schedules."
      - "You're managing data, infrastructure, and business processes and want one control plane."
      - "Non-engineers need to trigger or monitor workflows without writing code."
      - "You're evaluating orchestrators and want to compare architectures before committing."
  competitor:
    title: Choose Airflow When
    list:
      - "Your team is Python-native and invested in the Airflow ecosystem: custom operators, trained staff, institutional knowledge."
      - "You're running on managed services (MWAA, Cloud Composer) and are locked into the Airflow ecosystem."
      - "Python-based DAG definitions and Airflow's scheduling model fit your team's workflow."
      - "You have significant custom operator libraries you'd need to rebuild elsewhere."
    shadowColor: "#E8F5E9"
    bulletColor: "#4CAF50"

commonQuestions:
  - question: How hard is it to migrate from Airflow to Kestra?
    answer: "Kestra doesn't require you to refactor your business logic. Bring existing Python scripts, SQL queries, and Shell commands as-is and define orchestration in YAML. Most teams start new workflows in Kestra and migrate existing pipelines incrementally, using Kestra's Airflow REST API trigger to keep both systems running until the cutover is complete."
  - question: I'm on Airflow 2 and evaluating whether to upgrade to Airflow 3 or switch to Kestra. How should I think about that decision?
    answer: "Both paths require real work. Upgrading to Airflow 3 means removing SubDAGs, updating deprecated context variables, moving operators to the new providers package, and splitting your webserver into an API server and DAG processor—every change is Airflow-specific. Migrating to Kestra means extracting business logic from DAG files and defining orchestration in YAML; your Python, SQL, and Shell code stays unchanged and portable. The lift is similar. The difference is what you get at the end: Airflow 3 modernizes the scheduler and adds event-driven features, but DAGs are still Python. Kestra lets any team member contribute workflows in YAML, with tasks running in Python, SQL, Bash, or any language in isolated containers."
  - question: I'm running Airflow on MWAA or Cloud Composer. How does that affect my options?
    answer: "Managed Airflow services mean you're on AWS or Google's upgrade timeline, not your own. Airflow 3 support on MWAA and Cloud Composer typically lags the open-source release by months. Kestra runs anywhere—Docker, Kubernetes, any cloud—and covers the same AWS, GCP, and Azure integrations you're already using."
  - question: Does Kestra support the same data pipeline use cases as Airflow?
    answer: "Yes. Kestra orchestrates ETL and ELT pipelines, dbt models, data quality checks, warehouse operations, and file transfers. With 1200+ plugins, it covers the same integrations as Airflow's provider ecosystem: AWS, GCP, Azure, Snowflake, BigQuery, Databricks, Kafka, and more—defined in declarative YAML instead of Python operator classes."
  - question: How does Kestra handle workflow versioning?
    answer: "Kestra stores a revision history for every workflow. Each save creates a new revision you can diff, roll back, or audit. Revisions integrate with Git-based CI/CD through the Kestra Terraform provider and GitHub Actions. Airflow requires external tooling to approximate the same."
  - question: How do Airflow 3 Assets compare to Kestra's asset model?
    answer: "Airflow 3 Assets trigger DAGs when upstream DAGs produce named data outputs—a data-aware scheduling mechanism scoped to the Airflow ecosystem. Kestra's approach is broader: workflows can be triggered by file arrivals in S3, Kafka messages, database row changes, API callbacks, or outputs from any other workflow. The dependency model isn't limited to Airflow-produced assets or data pipelines."
  - question: What about Airflow's ecosystem of providers and operators?
    answer: "Kestra's 1200+ plugin library covers the same integrations as Airflow's provider ecosystem. Instead of Python operator classes, Kestra uses declarative plugin tasks in YAML. Your existing Python code runs directly in Script tasks without modification, and custom operator logic becomes a Script or HTTP task without any framework-specific wrapper."
  - question: How does Kestra's event-driven architecture differ from Airflow's?
    answer: "Airflow was built as a schedule-first orchestrator. Airflow 3 adds Asset Watchers and event-driven scheduling, which is a real improvement. Kestra was built event-driven from the start: webhooks, S3 and GCS uploads, Kafka and Pulsar messages, database changes, and API events are first-class YAML triggers. Unlimited event-driven workflows are available in the open-source version."
  - question: How does Kestra handle multi-tenancy and access control compared to Airflow?
    answer: "Airflow's access control is coarse-grained—hard team boundaries typically require separate deployments. Kestra provides namespace isolation out of the box, with RBAC permissions, secrets, and execution history scoped per namespace. Enterprise deployments add SSO/SAML, audit logs for every execution, and tenant-level isolation across a single instance."
  - question: Airflow 3 introduced a new Task SDK that decouples task execution from the scheduler. How does Kestra's execution model compare?
    answer: "The Airflow 3 Task SDK lets tasks run outside the scheduler process, which is a real improvement. Kestra separates scheduling and execution at the architecture level: tasks run in isolated Docker containers with per-task dependency declarations, so there's no shared Python environment and no dependency conflicts. The tradeoff is some overhead for lightweight tasks—for ETL, ML pipelines, and data-intensive workloads, the isolation is worth it."