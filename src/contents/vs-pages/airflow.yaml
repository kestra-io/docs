title: "Kestra vs. Apache Airflow 3: Modern Orchestration vs. a Legacy Rebuilt"
description: "Compare Kestra vs Apache Airflow 3: Declarative YAML orchestration for any language vs. Python DAGs rebuilt for modern infrastructure. See features, setup time, and migration considerations."
competitorName: Airflow

intro:
  title: "Kestra vs. Apache Airflow 3: Modern Orchestration vs. a Legacy Rebuilt"
  description: "Airflow 3 is a meaningful upgrade. But it modernizes the interface without changing the architecture. If you're facing a forced Airflow 2 migration and wondering whether to upgrade or switch, this is what the comparison actually looks like."

philosophy:
  mainTitle: Two Architectures, Not Just Two Tools
  kestra:
    title: "Universal Orchestration: Pipelines and Workflows"
    description: "Declarative orchestration layer where YAML describes intent and any language executes. Orchestration is configuration, not code. Data pipelines, infrastructure automation, and business processes run from a single control plane without forcing every task into one language."
    subCardText: '"How do I orchestrate workflows across Python, SQL, and Bash without making everything Python?"'
  competitor:
    title: Python DAG Execution Engine
    description: "A Python-based workflow engine where DAGs are executable programs. Airflow 3 modernizes the platform with a new React UI, Task SDK, DAG versioning, and a FastAPI-based REST API. The orchestration model itself remains unchanged: workflows are Python code that the scheduler runs."
    shadowColor: "#E8F5E9"
    subCardBg: "var(--ks-background-green-light)"
    subCardText: '"How do I make Airflow production-grade for my Python data team?"'

businessValue:
  mainTitle: "Python Pipeline Scheduling vs. Universal Workflow Orchestration"
  kestra:
    title: Universal Workflows
    list:
      - "Data pipelines, infrastructure automation, business processes, AI workflows"
      - "Multi-language: Python, SQL, Bash, Go, Node.js, R"
      - "Event-driven at core: respond to real events, not just schedules"
      - "Self-service for non-engineers via Kestra Apps"
      - "One control plane for the entire organization"
  competitor:
    title: Data Pipelines for Python Teams
    list:
      - "Batch-first pipeline scheduling"
      - "Python-only workflow definitions"
      - "Data engineering scope"
      - "Improved governance in Airflow 3, still limited multi-tenancy"
      - "Serves Python-native data teams"
    shadowColor: "#E8F5E9"
    bulletColor: "#4CAF50"
  footerText: "Airflow 3 is the right choice for Python-native teams with heavy existing investment in the Airflow ecosystem. Kestra is the right choice if you need multi-language teams to contribute, event-driven execution beyond cron, or orchestration that spans data, infrastructure, and business workflows. Either way, the forced Airflow 2 migration is a natural evaluation moment."

setupSpeed:
  title: Time to First Workflow
  subtitle: "Airflow 3 splits the webserver into two components: an API server and a separate DAG processor. Standard operators moved to a separate package. Deployment complexity increased with the upgrade. Kestra takes the opposite approach: define orchestration in declarative YAML and run it in minutes."
  kestra:
    title:
      one: "~5"
      two: Minutes
    description: "Download the Docker Compose file, spin it up, and you're ready (database and config included). Open the UI, pick a Blueprint, run it. No Python environment, no DAG library to configure."
    command: |
      curl -o docker-compose.yml \
      https://raw.githubusercontent.com/kestra-io/kestra/develop/docker-compose.yml
      docker compose up

      # Open localhost:8080
      # Pick a Blueprint, run it. Done.
    lang: sh
  competitor:
    title:
      one: "~45"
      two: Minutes
    description: "Install core and the new providers package separately. Airflow 3 splits the webserver into API server and DAG processor. Both need to be configured, monitored, and scaled independently. Then start refactoring your DAGs."
    shadowColor: "#E8F5E9"
    command: |
      pip install apache-airflow
      pip install apache-airflow-providers-standard

      # Airflow 3: API server + DAG processor run separately
      # Update Kubernetes manifests, Helm values, and monitoring
      # Then refactor SubDAGs, context variables, and import paths...
    lang: sh

easeOfUse:
  title: Workflows Your Whole Team Can Read
  kestra:
    title: "Kestra: Readable by your whole team"
    description: "YAML is readable on day 1. Our docs are embedded in the UI for easy reference, the <a href='/docs/ai-tools/ai-copilot' target='_blank'>AI Copilot</a> writes workflows for you, or start with our library of Blueprints. No Python knowledge required to understand or modify a workflow."
    code: |
      id: daily_etl
      namespace: data.production

      tasks:
        - id: extract
          type: io.kestra.plugin.scripts.python.Script
          script: |
            # Paste your existing extraction logic here
            result = {"records": 1000}

        - id: transform
          type: io.kestra.plugin.dbt.cli.DbtCLI
          commands:
            - dbt run --select staging

      triggers:
        - id: daily
          type: io.kestra.plugin.core.trigger.Schedule
          cron: "0 0 * * *"
    lang: yaml
  competitor:
    title: "Airflow 3: Python knowledge required even for simple orchestration"
    description: "Changing retry logic or scheduling means editing Python and redeploying. Non-Python contributors still can't participate directly. Airflow 3 improves developer ergonomics for Python teams but doesn't change who can contribute."
    shadowColor: "#E8F5E9"
    code: |
      from airflow import DAG
      from airflow.operators.python import PythonOperator
      from airflow.operators.bash import BashOperator
      from datetime import datetime

      def extract_data(**context):
          # extraction logic
          return {"records": 1000}

      with DAG('daily_etl', start_date=datetime(2024, 1, 1), schedule='@daily') as dag:
          extract = PythonOperator(
              task_id='extract',
              python_callable=extract_data,
          )
          transform = BashOperator(
              task_id='transform',
              bash_command='dbt run --select staging',
          )
          extract >> transform
    lang: python

