<svg xmlns="http://www.w3.org/2000/svg" width="860" height="360" viewBox="0 0 860 360" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="860" height="360" fill="#ffffff"/>

  <!-- title -->
  <text x="40" y="44" font-size="22" font-weight="700" fill="#111827">Load: converting a document to BSON</text>

  <!-- BEFORE row -->
  <text x="40" y="104" font-size="15" font-weight="700" fill="#b91c1c">BEFORE</text>

  <!-- A -->
  <rect x="120" y="78" width="150" height="56" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="195" y="103" font-size="14" font-weight="700" text-anchor="middle" fill="#3730a3">Java Map</text>
  <text x="195" y="122" font-size="11" text-anchor="middle" fill="#6b7280">already in memory</text>

  <!-- arrow 1 -->
  <line x1="270" y1="106" x2="350" y2="106" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="350,106 340,101 340,111" fill="#9ca3af"/>
  <text x="310" y="96" font-size="10" text-anchor="middle" fill="#6b7280">serialize</text>

  <!-- B (wasted) -->
  <rect x="350" y="78" width="160" height="56" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="430" y="103" font-size="14" font-weight="700" text-anchor="middle" fill="#b91c1c">JSON text</text>
  <text x="430" y="122" font-size="11" text-anchor="middle" fill="#b91c1c">throwaway</text>

  <!-- arrow 2 -->
  <line x1="510" y1="106" x2="590" y2="106" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="590,106 580,101 580,111" fill="#9ca3af"/>
  <text x="550" y="96" font-size="10" text-anchor="middle" fill="#6b7280">parse</text>

  <!-- C -->
  <rect x="590" y="78" width="150" height="56" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="665" y="103" font-size="14" font-weight="700" text-anchor="middle" fill="#065f46">BSON document</text>
  <text x="665" y="122" font-size="11" text-anchor="middle" fill="#6b7280">what Mongo needs</text>

  <text x="120" y="162" font-size="12" fill="#b91c1c">extra step does no useful work: 4952 bytes garbage, 1247 ns per document</text>

  <!-- divider -->
  <line x1="40" y1="200" x2="820" y2="200" stroke="#e5e7eb" stroke-width="1"/>

  <!-- AFTER row -->
  <text x="40" y="262" font-size="15" font-weight="700" fill="#047857">AFTER</text>

  <!-- A -->
  <rect x="120" y="236" width="150" height="56" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="195" y="261" font-size="14" font-weight="700" text-anchor="middle" fill="#3730a3">Java Map</text>
  <text x="195" y="280" font-size="11" text-anchor="middle" fill="#6b7280">already in memory</text>

  <!-- arrow direct -->
  <line x1="270" y1="264" x2="590" y2="264" stroke="#10b981" stroke-width="2.5"/>
  <polygon points="590,264 580,259 580,269" fill="#10b981"/>
  <text x="430" y="254" font-size="11" text-anchor="middle" font-weight="700" fill="#047857">new Document(map)</text>

  <!-- C -->
  <rect x="590" y="236" width="150" height="56" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="665" y="261" font-size="14" font-weight="700" text-anchor="middle" fill="#065f46">BSON document</text>
  <text x="665" y="280" font-size="11" text-anchor="middle" fill="#6b7280">what Mongo needs</text>

  <text x="120" y="320" font-size="12" fill="#047857">straight from map to document: 440 bytes garbage, 49 ns per document (~11x less, ~25x faster)</text>
</svg>
